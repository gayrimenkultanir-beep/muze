<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .announcement-block { background: #ffffff; border-radius: 12px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .slider-container { width: 100%; height: 400px; position: relative; overflow: hidden; background-color: #f8f9fa; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.4s ease-in-out; }
        .slider-wrapper img { min-width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        .slider-dots { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.5); border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); }
        .dot.active { background: #4a6cf7; }
        .content-group { padding: 25px; }
        .date-label { background: #e1e7ff; color: #4a6cf7; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .announcement-title { font-size: 1.5rem; font-weight: 600; margin: 15px 0 10px; }
        .details-text { color: #666; line-height: 1.7; white-space: pre-line; }
        #imgModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #imgModal img { max-width: 90%; max-height: 90%; border: 3px solid white; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom:30px;">
        <h1>Duyuru Panosu</h1>
    </header>
    <div id="loading" style="text-align: center;">Görseller ve içerik yükleniyor...</div>
    <div id="feed"></div>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    // DRIVE LINKINI DOĞRUDAN RESİM OLARAK GÖRÜNTÜLEMEK İÇİN EN GÜVENLİ FORMAT
    function getDriveDirectLink(url) {
        if (!url || typeof url !== 'string' || url.trim() === "") return null;
        
        let fileId = "";
        try {
            if (url.includes('id=')) {
                fileId = url.split('id=')[1].split('&')[0];
            } else if (url.includes('/d/')) {
                fileId = url.split('/d/')[1].split('/')[0];
            }
            
            if (fileId) {
                // Bu format doğrudan görseli indirmeye zorlamadan tarayıcıda açar
                return `https://drive.google.com/uc?export=view&id=${fileId}`;
            }
        } catch (e) {
            console.error("Link dönüştürme hatası:", url);
        }
        return url; // Eğer drive linki değilse orijinal linki dön
    }

    function slideTo(blockId, index) {
        const wrapper = document.querySelector(`#block-${blockId} .slider-wrapper`);
        const dots = document.querySelectorAll(`#block-${blockId} .dot`);
        if(wrapper) wrapper.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach(d => d.classList.remove('active'));
        if(dots[index]) dots[index].classList.add('active');
    }

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            document.getElementById('loading').style.display = 'none';
            const feed = document.getElementById('feed');
            
            results.data.forEach((row, index) => {
                // Görsel isimlerinin tam eşleştiğinden emin olun (Sheets'teki başlıklarla aynı olmalı)
                const imgLinks = [
                    getDriveDirectLink(row['görsel1']),
                    getDriveDirectLink(row['görsel2']),
                    getDriveDirectLink(row['görsel3'])
                ].filter(url => url !== null);

                let sliderContent = '';
                let dotsContent = '';

                if (imgLinks.length > 0) {
                    sliderContent = `<div class="slider-wrapper">`;
                    imgLinks.forEach(img => {
                        sliderContent += `<img src="${img}" loading="lazy" onclick="event.stopPropagation(); document.getElementById('imgModal').style.display='flex'; document.getElementById('modalImg').src='${img}'">`;
                    });
                    sliderContent += `</div>`;

                    if (imgLinks.length > 1) {
                        dotsContent = `<div class="slider-dots">`;
                        imgLinks.forEach((_, i) => {
                            dotsContent += `<div class="dot ${i===0?'active':''}" onclick="slideTo(${index}, ${i})"></div>`;
                        });
                        dotsContent += `</div>`;
                    }
                } else {
                    sliderContent = `<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#999;">Görsel Mevcut Değil</div>`;
                }

                const block = `
                    <div class="announcement-block" id="block-${index}">
                        <div class="slider-container">
                            ${sliderContent}
                            ${dotsContent}
                        </div>
                        <div class="content-group">
                            <span class="date-label">${row['tarih'] || ''}</span>
                            <h2 class="announcement-title">${row['duyuru metni'] || ''}</h2>
                            <p class="details-text">${row['detaylar'] || ''}</p>
                        </div>
                    </div>
                `;
                feed.innerHTML += block;
            });
        }
    });
</script>

</body>
</html>
