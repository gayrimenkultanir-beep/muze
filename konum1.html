<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>II. Bayezid Külliyesi — Gezi Rehberi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8b6914;
    --cream: #f5ead8;
    --cream-dark: #e8d5b0;
    --ink: #1a1208;
    --ink-mid: #3d2b0e;
    --stone: #7a6645;
    --panel-bg: rgba(26, 18, 8, 0.88);
    --border: rgba(201, 168, 76, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--ink);
    color: var(--cream);
    position: relative;
  }

  /* ── MAP CANVAS ── */
  #map-container {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: #2a1f0a;
  }

  #map-svg {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  /* ── HEADER ── */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(26,18,8,0.97) 0%, rgba(26,18,8,0.0) 100%);
    padding: 14px 18px 30px;
    pointer-events: none;
  }

  #header-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(201,168,76,0.6);
    line-height: 1.4;
  }

  #header-sub {
    font-family: 'Lora', serif;
    font-size: 10px;
    color: var(--stone);
    letter-spacing: 0.18em;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* ── STATUS PANEL ── */
  #status-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(to top, rgba(26,18,8,0.98) 60%, transparent);
    padding: 16px 18px 28px;
  }

  #location-card {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    backdrop-filter: blur(12px);
    transition: all 0.5s ease;
    min-height: 70px;
  }

  #location-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--stone);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  #location-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 15px;
    color: var(--gold-light);
    line-height: 1.3;
    transition: all 0.4s ease;
  }

  #location-name.outside {
    color: var(--stone);
    font-size: 13px;
    font-family: 'Lora', serif;
    font-style: italic;
  }

  #location-desc {
    font-size: 11px;
    color: var(--cream-dark);
    margin-top: 5px;
    opacity: 0.8;
    font-style: italic;
  }

  /* ── CONTROLS ── */
  #controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #locate-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--ink);
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }

  #locate-btn:active { transform: scale(0.97); }
  #locate-btn.tracking { background: linear-gradient(135deg, #1a4a2a, #2d7a4a); color: var(--cream); }

  #sound-btn {
    width: 48px; height: 48px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  #sound-btn.muted { color: var(--stone); }

  /* ── USER PIN ── */
  #user-pin {
    position: absolute;
    z-index: 200;
    transform: translate(-50%, -100%);
    display: none;
    pointer-events: none;
    transition: left 0.6s ease, top 0.6s ease;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
  }

  #user-pin.visible { display: block; }

  .pin-bubble {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border-radius: 10px 10px 10px 2px;
    padding: 6px 10px;
    font-family: 'Lora', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    max-width: 140px;
    white-space: normal;
    text-align: center;
    line-height: 1.3;
    box-shadow: 0 2px 12px rgba(201,168,76,0.5);
    animation: pinPulse 2s infinite;
  }

  @keyframes pinPulse {
    0%, 100% { box-shadow: 0 2px 12px rgba(201,168,76,0.5); }
    50% { box-shadow: 0 2px 24px rgba(201,168,76,0.9); }
  }

  .pin-dot {
    width: 14px; height: 14px;
    background: var(--gold);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    margin: 0 auto;
    margin-top: -3px;
  }

  .pin-accuracy {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.08);
    pointer-events: none;
  }

  /* ── AREA POLYGONS ── */
  .area-poly {
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .area-poly:hover { opacity: 0.85; }
  .area-poly.active { stroke-width: 2.5 !important; }

  .area-label {
    font-family: 'Lora', serif;
    font-size: 10px;
    fill: rgba(255,240,200,0.85);
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* ── GPS STATUS ── */
  #gps-status {
    font-size: 10px;
    color: var(--stone);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.08em;
    min-height: 16px;
  }

  /* ── TOAST ── */
  #toast {
    position: absolute;
    top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(26,18,8,0.95);
    border: 1px solid var(--gold-dark);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 12px;
    color: var(--gold-light);
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show { opacity: 1; }

  /* ── LEGEND ── */
  #legend-btn {
    position: absolute;
    top: 70px; right: 14px;
    z-index: 110;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(26,18,8,0.9);
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  #legend {
    position: absolute;
    top: 118px; right: 14px;
    z-index: 110;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: none;
    min-width: 160px;
  }

  #legend.open { display: block; }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0;
    font-size: 11px;
    color: var(--cream-dark);
    cursor: pointer;
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ornament */
  #ornament {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 1s ease;
  }

  #ornament.loading { opacity: 0.12; }
</style>

</div>

// ══════════════════════════════════════════════
// GEO → SVG PROJECTION
// ══════════════════════════════════════════════
// Bounding box hesapla
let allLats = [], allLons = [];
RAW_ZONES.forEach(z => z.coords.forEach(([lat, lon]) => { allLats.push(lat); allLons.push(lon); }));
const minLat = Math.min(...allLats), maxLat = Math.max(...allLats);
const minLon = Math.min(...allLons), maxLon = Math.max(...allLons);

const SVG_W = 800, SVG_H = 900;
const PAD = 60;

function geoToSVG(lat, lon) {
  const x = PAD + (lon - minLon) / (maxLon - minLon) * (SVG_W - 2*PAD);
  // lat ters çevir (kuzey yukarı)
  const y = SVG_H - PAD - (lat - minLat) / (maxLat - minLat) * (SVG_H - 2*PAD);
  return [x, y];
}

// ══════════════════════════════════════════════
// CONVEX HULL — 4 köşeden doğru polygon üret
// ══════════════════════════════════════════════
function convexHull(points) {
  const pts = [...points].sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  const cross = (O, A, B) => (A[0]-O[0])*(B[1]-O[1]) - (A[1]-O[1])*(B[0]-O[0]);
  const lower = [], upper = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  for (let i = pts.length-1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

// ══════════════════════════════════════════════
// ÇAKIŞMA DÜZELTME — polygon shrink
// ══════════════════════════════════════════════
function shrinkPolygon(svgPts, factor=0.015) {
  const cx = svgPts.reduce((s,p)=>s+p[0],0)/svgPts.length;
  const cy = svgPts.reduce((s,p)=>s+p[1],0)/svgPts.length;
  return svgPts.map(([x,y]) => [
    cx + (x - cx) * (1 - factor),
    cy + (y - cy) * (1 - factor)
  ]);
}

// ══════════════════════════════════════════════
// ZONE BUILD
// ══════════════════════════════════════════════
const ZONES = RAW_ZONES.map(zone => {
  const svgRaw = zone.coords.map(([lat,lon]) => geoToSVG(lat, lon));
  const hull = convexHull(svgRaw);
  const svgPts = shrinkPolygon(hull, 0.02);
  const cx = svgPts.reduce((s,p)=>s+p[0],0)/svgPts.length;
  const cy = svgPts.reduce((s,p)=>s+p[1],0)/svgPts.length;
  return { ...zone, svgPts, cx, cy };
});

// ══════════════════════════════════════════════
// RENDER SVG ZONES
// ══════════════════════════════════════════════
const polyLayer = document.getElementById('polygons-layer');
const labelLayer = document.getElementById('labels-layer');

ZONES.forEach(zone => {
  const pts = zone.svgPts.map(p => p.join(',')).join(' ');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', zone.fill);
  poly.setAttribute('stroke', zone.color);
  poly.setAttribute('stroke-width', '1.5');
  poly.setAttribute('stroke-linejoin', 'round');
  poly.setAttribute('class', 'area-poly');
  poly.setAttribute('id', 'poly-' + zone.id);
  poly.addEventListener('click', () => showZoneInfo(zone));
  polyLayer.appendChild(poly);

  const label = document.createElementNS('http://www.w3.org/2000/svg','text');
  label.setAttribute('x', zone.cx);
  label.setAttribute('y', zone.cy);
  label.setAttribute('class', 'area-label');
  label.textContent = zone.name;
  labelLayer.appendChild(label);
});

// ══════════════════════════════════════════════
// LEGEND
// ══════════════════════════════════════════════
const legend = document.getElementById('legend');
legend.innerHTML = '<div style="font-size:10px;color:var(--stone);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;font-family:\'Lora\',serif">Bölümler</div>' +
  ZONES.map(z => `<div class="legend-item" onclick="focusZone('${z.id}')">
    <div class="legend-dot" style="background:${z.fill};border:1px solid ${z.color}"></div>
    <span>${z.name}</span>
  </div>`).join('');

function toggleLegend() {
  document.getElementById('legend').classList.toggle('open');
}

function focusZone(id) {
  const zone = ZONES.find(z => z.id === id);
  if (zone) showZoneInfo(zone);
  document.getElementById('legend').classList.remove('open');
}

// ══════════════════════════════════════════════
// POINT-IN-POLYGON (ray casting)
// ══════════════════════════════════════════════
function pointInPolygon(lat, lon, zone) {
  const pt = geoToSVG(lat, lon);
  const px = pt[0], py = pt[1];
  const poly = zone.svgPts;
  let inside = false;
  for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
    const xi=poly[i][0], yi=poly[i][1];
    const xj=poly[j][0], yj=poly[j][1];
    const intersect = ((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function findZone(lat, lon) {
  return ZONES.find(z => pointInPolygon(lat, lon, z)) || null;
}

// ══════════════════════════════════════════════
// SPEECH
// ══════════════════════════════════════════════
let soundEnabled = true;
let lastSpoken = '';

function speak(text) {
  if (!soundEnabled) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'tr-TR';
    utt.rate = 0.92;
    utt.pitch = 1.0;
    utt.volume = 1.0;
    // Türkçe ses varsa seç
    const voices = window.speechSynthesis.getVoices();
    const trVoice = voices.find(v => v.lang.startsWith('tr'));
    if (trVoice) utt.voice = trVoice;
    window.speechSynthesis.speak(utt);
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
  showToast(soundEnabled ? 'Sesli rehber açık' : 'Sesli rehber kapalı');
}

// Sesleri önceden yükle
window.addEventListener('load', () => {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
  }
});

// ══════════════════════════════════════════════
// UI STATE
// ══════════════════════════════════════════════
function showZoneInfo(zone) {
  document.getElementById('location-name').className = '';
  document.getElementById('location-name').textContent = zone.name;
  document.getElementById('location-desc').textContent = zone.desc;

  // highlight polygon
  document.querySelectorAll('.area-poly').forEach(p => p.classList.remove('active'));
  const activePoly = document.getElementById('poly-' + zone.id);
  if (activePoly) {
    activePoly.classList.add('active');
    activePoly.setAttribute('stroke-width', '3');
  }
}

function updateLocationDisplay(zone) {
  const nameEl = document.getElementById('location-name');
  const descEl = document.getElementById('location-desc');

  if (zone) {
    nameEl.className = '';
    nameEl.textContent = zone.name;
    descEl.textContent = zone.desc;

    if (lastSpoken !== zone.id) {
      lastSpoken = zone.id;
      setTimeout(() => speak(`Şu an ${zone.announce}`), 300);
    }

    // highlight
    document.querySelectorAll('.area-poly').forEach(p => {
      p.setAttribute('stroke-width', '1.5');
      p.classList.remove('active');
    });
    const activePoly = document.getElementById('poly-' + zone.id);
    if (activePoly) {
      activePoly.setAttribute('stroke-width', '3');
      activePoly.style.filter = 'url(#glow)';
      ZONES.filter(z => z.id !== zone.id).forEach(z => {
        const el = document.getElementById('poly-' + z.id);
        if (el) el.style.filter = '';
      });
    }
  } else {
    nameEl.className = 'outside';
    nameEl.textContent = 'Külliye alanı dışındasınız';
    descEl.textContent = 'Lütfen külliye sınırları içine giriniz.';
    if (lastSpoken !== 'outside') {
      lastSpoken = 'outside';
    }
    document.querySelectorAll('.area-poly').forEach(p => {
      p.setAttribute('stroke-width', '1.5');
      p.style.filter = '';
    });
  }
}

// ══════════════════════════════════════════════
// GPS TRACKING
// ══════════════════════════════════════════════
let watchId = null;
let isTracking = false;

function startTracking() {
  if (isTracking) {
    stopTracking();
    return;
  }

  if (!navigator.geolocation) {
    showToast('Tarayıcınız konum desteklemiyor');
    return;
  }

  document.getElementById('ornament').classList.add('loading');
  document.getElementById('gps-status').textContent = 'GPS sinyali aranıyor...';

  const options = {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 2000
  };

  watchId = navigator.geolocation.watchPosition(onPosition, onError, options);
  isTracking = true;

  const btn = document.getElementById('locate-btn');
  btn.classList.add('tracking');
  btn.innerHTML = '<span>◉</span> Takip Aktif';

  speak('Konum takibi başladı. Külliye içinde ilerlediğinizde size rehberlik edeceğim.');
}

function stopTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  isTracking = false;

  const btn = document.getElementById('locate-btn');
  btn.classList.remove('tracking');
  btn.innerHTML = '<span>◎</span> Konumumu Göster';

  document.getElementById('user-pin').classList.remove('visible');
  document.getElementById('gps-status').textContent = 'Takip durduruldu';
  document.getElementById('ornament').classList.remove('loading');
}

function onPosition(pos) {
  document.getElementById('ornament').classList.remove('loading');
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  // SVG koordinatına dönüştür
  const [svgX, svgY] = geoToSVG(lat, lon);

  // Ekran koordinatına çevir (SVG viewBox → ekran)
  const svgEl = document.getElementById('map-svg');
  const bbox = svgEl.getBoundingClientRect();
  const scaleX = bbox.width / SVG_W;
  const scaleY = bbox.height / SVG_H;

  const screenX = bbox.left + svgX * scaleX;
  const screenY = bbox.top + svgY * scaleY;

  // Pin yerleştir
  const pin = document.getElementById('user-pin');
  pin.style.left = screenX + 'px';
  pin.style.top = screenY + 'px';
  pin.classList.add('visible');

  // Doğruluk çemberi
  const accPx = (acc / 111000) * (SVG_H - 2*PAD) / (maxLat - minLat) * scaleY;
  const accEl = document.getElementById('pin-accuracy');
  accEl.style.width = Math.max(20, accPx*2) + 'px';
  accEl.style.height = Math.max(20, accPx*2) + 'px';

  // Bölge tespiti
  const zone = findZone(lat, lon);

  // Pin yazısı güncelle
  const pinText = document.getElementById('pin-text');
  pinText.textContent = zone ? zone.name + 'desiniz' : 'Külliye dışı';

  // UI güncelle
  updateLocationDisplay(zone);

  const accText = acc < 10 ? 'Mükemmel GPS' : acc < 20 ? 'İyi GPS' : acc < 50 ? 'Orta GPS' : 'Zayıf GPS';
  document.getElementById('gps-status').textContent = `${accText} · ±${Math.round(acc)}m · ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
}

function onError(err) {
  document.getElementById('ornament').classList.remove('loading');
  let msg = 'Konum alınamadı';
  if (err.code === 1) msg = 'Konum izni verilmedi. Lütfen tarayıcı ayarlarından izin verin.';
  else if (err.code === 2) msg = 'GPS sinyali alınamıyor. Açık alanda deneyin.';
  else if (err.code === 3) msg = 'Konum zaman aşımına uğradı. Tekrar deneyin.';
  document.getElementById('gps-status').textContent = msg;
  showToast(msg);
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
// İlk yüklemede animasyon
setTimeout(() => {
  document.getElementById('ornament').style.animation = 'none';
}, 2000);

// Pin'i pencere resize'da güncelle
window.addEventListener('resize', () => {
  if (isTracking && watchId !== null) {
    // son konumu yeniden çiz — bir sonraki GPS güncellemesi gelince yenilenir
  }
});

// Ses sentezi sesleri yükle
if ('speechSynthesis' in window) {
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    window.speechSynthesis.getVoices();
  });
}

// Debug: Test modu için tıklama ile konum simülasyonu (SVG'ye tıkla)
document.getElementById('map-svg').addEventListener('click', (e) => {
  if (isTracking) return; // gerçek GPS aktifse pas geç
  const svg = e.currentTarget;
  const rect = svg.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;
  const svgX = clickX / rect.width * SVG_W;
  const svgY = clickY / rect.height * SVG_H;

  // SVG → Geo dönüşüm (ters)
  const lon = minLon + (svgX - PAD) / (SVG_W - 2*PAD) * (maxLon - minLon);
  const lat = minLat + (SVG_H - PAD - svgY) / (SVG_H - 2*PAD) * (maxLat - minLat);

  // Simulate position
  const fakePos = {
    coords: { latitude: lat, longitude: lon, accuracy: 5 }
  };

  // Show pin
  const pin = document.getElementById('user-pin');
  pin.style.left = e.clientX + 'px';
  pin.style.top = e.clientY + 'px';
  pin.classList.add('visible');

  const zone = findZone(lat, lon);
  const pinText = document.getElementById('pin-text');
  pinText.textContent = zone ? zone.name : 'Külliye dışı';
  updateLocationDisplay(zone);
  document.getElementById('gps-status').textContent = `Simülasyon · ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
});
</script>
