<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MİNİPAN POS</title>
<style>
/* ============================================================
   MİNİPAN POS — Faz 1 iskeleti
   Modern wafflecı POS · rol bazlı arayüz · tek dosya
   ============================================================ */

:root{
  /* Nötr taban — soğuk değil, hafif sıcak gri */
  --bg:        #f7f6f3;
  --surface:   #ffffff;
  --surface-2: #f0eeea;
  --line:      #e4e1da;
  --line-2:    #d4d0c6;

  /* Metin */
  --ink:       #1c1b18;
  --ink-2:     #6b685f;
  --ink-3:     #9d9a90;

  /* Marka — waffle: sıcak amber + sıcak çikolata vurgu */
  --brand:     #f0a728;   /* amber — birincil aksiyon */
  --brand-d:   #c9851a;
  --brand-ink: #4a3206;
  --brand-soft:#fdf2dd;

  --cocoa:     #6b3f23;   /* çikolata — sıcak vurgu */
  --cocoa-soft:#f3e8e0;

  /* Durum */
  --ok:        #1f9d63;
  --ok-soft:   #e2f4ea;
  --warn:      #e08a1e;
  --warn-soft: #fbeed6;
  --danger:    #d8493f;
  --danger-soft:#fbe7e5;
  --err:       #d8493f;
  --err-soft:  #fbe7e5;
  --info:      #2f7ed8;
  --info-soft: #e6f0fb;

  /* Rol renkleri */
  --r-kasa:    #2f7ed8;
  --r-mudur:   #7a4ddb;
  --r-genel:   #1f9d63;

  --radius:    14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --shadow:    0 1px 2px rgba(28,27,24,.04), 0 4px 16px rgba(28,27,24,.06);
  --shadow-lg: 0 8px 40px rgba(28,27,24,.12);

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", system-ui, sans-serif;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select{font-family:inherit; font-size:15px}

/* ---------- Giriş ekranı ---------- */
#login{
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(120% 120% at 50% 0%, #fff6e6 0%, var(--bg) 55%);
}
.login-card{
  width:min(420px,92vw);
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  padding:36px 32px;
  text-align:center;
}
.logo{
  font-size:30px; font-weight:800; letter-spacing:-.5px;
  display:inline-flex; align-items:center; gap:10px; margin-bottom:4px;
}
.logo .mark{
  width:42px; height:42px; border-radius:12px;
  background:linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%);
  display:grid; place-items:center; font-size:24px;
}
.login-sub{color:var(--ink-2); margin:2px 0 26px; font-size:14px}
.role-pick{display:grid; gap:10px}
.role-btn{
  display:flex; align-items:center; gap:14px;
  padding:16px 18px; border-radius:var(--radius);
  background:var(--surface-2); border:1.5px solid transparent;
  text-align:left; transition:all .15s;
}
.role-btn:hover{border-color:var(--line-2); background:#fff}
.role-btn:active{transform:scale(.98)}
.role-dot{width:38px; height:38px; border-radius:10px; flex:none; display:grid; place-items:center; font-size:19px; color:#fff}
.role-btn .rb-name{font-weight:700; font-size:15px}
.role-btn .rb-desc{font-size:12.5px; color:var(--ink-2)}

/* ---------- Uygulama kabuğu ---------- */
#app{display:none; height:100%; flex-direction:column}
#app.on{display:flex}

.topbar{
  height:60px; flex:none;
  background:var(--surface); border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:14px; padding:0 18px;
}
.tb-logo{font-weight:800; font-size:18px; letter-spacing:-.3px; display:flex; align-items:center; gap:8px}
.tb-logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-d));display:grid;place-items:center;font-size:17px}
.tb-branch{
  font-size:13px; color:var(--ink-2); padding:5px 12px;
  background:var(--surface-2); border-radius:99px; font-weight:600;
}
.tb-spacer{flex:1}
.role-chip{
  display:flex; align-items:center; gap:8px;
  padding:6px 14px 6px 8px; border-radius:99px;
  background:var(--surface-2); font-weight:600; font-size:13px;
}
.role-chip .rc-dot{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:14px}
.tb-out{padding:8px 14px; border-radius:10px; font-weight:600; font-size:13px; color:var(--ink-2)}
.tb-out:hover{background:var(--danger-soft); color:var(--danger)}

.body{flex:1; display:flex; min-height:0}

/* Sol gezinme — role göre değişen sekmeler */
.nav{
  width:76px; flex:none; background:var(--surface); border-right:1px solid var(--line);
  display:flex; flex-direction:column; padding:12px 0; gap:4px;
}
.nav-item{
  margin:0 10px; padding:12px 0; border-radius:var(--radius-sm);
  display:flex; flex-direction:column; align-items:center; gap:5px;
  color:var(--ink-3); font-size:10.5px; font-weight:600; transition:all .12s;
}
.nav-item .ni-ic{font-size:21px}
.nav-item:hover{background:var(--surface-2); color:var(--ink-2)}
.nav-item.active{background:var(--brand-soft); color:var(--brand-d)}

.main{flex:1; min-width:0; min-height:0; overflow-y:auto; padding:22px 26px; display:flex; flex-direction:column}
.main > *{flex:none}
.main > .pos-grid{flex:1; min-height:0}
.main > .ode-ekran{flex:1; min-height:0}
/* Ödeme ekranındayken main scroll etmesin — taşma sütunların kendi içinde scroll olsun */
.main:has(> .ode-ekran){overflow:hidden}

/* ---------- POS satış ekranı ---------- */
.pos-grid{display:grid; grid-template-columns:1fr 380px; gap:22px; height:100%; min-height:0; overflow:hidden}
.kasa-masa-grid-layout{grid-template-columns:1fr 500px}
@media(max-width:980px){
  .pos-grid{grid-template-columns:1fr; overflow:visible; height:auto}
  .kasa-masa-grid-layout{grid-template-columns:1fr}
  .pos-sol,.kasa-sol-kol{overflow:visible}
  .pos-sol .prod-grid{overflow:visible}
  .main{display:block}
}
/* Sol kolon: başlık+kategori sabit, ürünler kaydırılır */
.pos-sol{display:flex; flex-direction:column; min-height:0; overflow:hidden}
.pos-sol .sec-head,.pos-sol .cat-row{flex:none}
.pos-sol .prod-grid{flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding-right:4px; align-content:start; grid-auto-rows:max-content}
/* Kasa masalar sol kolon — kaydırılır, başlık+sekme yukarıda kalır */
.kasa-sol-kol{display:flex; flex-direction:column; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-right:4px}
.kasa-sol-kol .sec-head,.kasa-sol-kol .kasa-sekme-row{position:sticky; top:0; z-index:2; background:var(--bg)}
.kasa-sol-kol .kasa-sekme-row{padding-bottom:12px}

.sec-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
.sec-head h2{font-size:19px; font-weight:800; margin:0; letter-spacing:-.3px}
.sec-head .sh-sub{font-size:13px; color:var(--ink-2)}

.cat-row{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap}
.cat-pill{
  padding:9px 16px; border-radius:99px; font-weight:700; font-size:13.5px;
  background:var(--surface); border:1.5px solid var(--line); color:var(--ink-2);
}
.cat-pill.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}

.prod-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px}
.prod{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px; text-align:left; transition:all .12s; position:relative; overflow:hidden;
}
.pos-sol .prod{min-height:104px}
.prod:hover{border-color:var(--brand); box-shadow:var(--shadow)}
.prod:active{transform:scale(.97)}
.prod .p-emoji{font-size:30px; margin-bottom:8px; display:block}
.prod .p-name{font-weight:700; font-size:14px; line-height:1.25; margin-bottom:3px}
.prod .p-price{font-weight:800; font-size:15px; color:var(--brand-d)}
.prod.out{opacity:.45; pointer-events:none}
.prod .p-out{position:absolute; top:8px; right:8px; font-size:10px; font-weight:800; background:var(--danger-soft); color:var(--danger); padding:3px 7px; border-radius:6px}

/* Sepet / adisyon */
.cart{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg);
  display:flex; flex-direction:column; overflow:hidden; height:100%; min-height:0;
}
.cart-top{padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex:none}
.cart-top .ct-table{font-weight:800; font-size:16px}
.cart-top .ct-session{font-size:12px; color:var(--ink-2)}
.cart-items{flex:1; overflow-y:auto; padding:8px 0; min-height:120px}
.ci{display:flex; align-items:center; gap:10px; padding:10px 18px}
.ci:hover{background:var(--surface-2)}
.ci .ci-q{font-weight:800; color:var(--brand-d); width:26px; font-size:14px}
.ci .ci-name{flex:1; font-size:14px; font-weight:600}
.ci .ci-name small{display:block; color:var(--ink-3); font-weight:500; font-size:11.5px}
.ci .ci-price{font-weight:700; font-size:14px}
.cart-empty{padding:40px 20px; text-align:center; color:var(--ink-3); font-size:13.5px}
.cart-foot{border-top:1px solid var(--line); padding:16px 18px; flex:none}
.cart-total{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px}
.cart-total .cf-lbl{font-size:14px; color:var(--ink-2); font-weight:600}
.cart-total .cf-amt{font-size:26px; font-weight:800; letter-spacing:-.5px}
.cart-odenen{margin-bottom:10px; padding:10px 12px; background:var(--ok-soft); border-radius:var(--radius-sm)}
.co-satir{display:flex; justify-content:space-between; font-size:13px; font-weight:600; color:var(--ink-2)}
.co-satir.odendi{color:var(--ok); font-weight:800; margin-top:3px}
.cart-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.btn{
  padding:15px; border-radius:var(--radius-sm); font-weight:700; font-size:14.5px;
  display:flex; align-items:center; justify-content:center; gap:7px; transition:all .12s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand); color:var(--brand-ink)}
.btn-primary:hover{background:var(--brand-d); color:#fff}
.btn-ghost{background:var(--surface-2); color:var(--ink-2)}
.btn-ghost:hover{background:var(--line)}
.btn-lock{background:var(--surface-2); color:var(--ink-3)}
.btn-lock:hover{background:var(--warn-soft); color:var(--warn)}
.btn-full{grid-column:1/-1}

/* ---------- Müdür / genel müdür panel kartları ---------- */
.kpi-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:22px}
.kpi{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px}
.kpi .k-lbl{font-size:12.5px; color:var(--ink-2); font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:6px}
.kpi .k-val{font-size:26px; font-weight:800; letter-spacing:-.5px}
.kpi .k-val small{font-size:14px; font-weight:600; color:var(--ink-3)}
.kpi .k-trend{font-size:12px; font-weight:700; margin-top:4px}
.k-trend.up{color:var(--ok)} .k-trend.down{color:var(--danger)}

/* Şube kartları (genel müdür canlı izleme) */
.branch-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px}
.bcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; position:relative}
.bcard .b-status{position:absolute; top:16px; right:16px; width:11px; height:11px; border-radius:99px}
.b-status.green{background:var(--ok)} .b-status.yellow{background:var(--warn)} .b-status.red{background:var(--danger)}
.bcard .b-name{font-weight:800; font-size:16px; margin-bottom:2px}
.bcard .b-meta{font-size:12.5px; color:var(--ink-2); margin-bottom:14px}
.bcard .b-stats{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.bstat .bs-l{font-size:11px; color:var(--ink-3); font-weight:600}
.bstat .bs-v{font-size:17px; font-weight:800}
.bcard .b-flag{margin-top:12px; padding:8px 11px; border-radius:9px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:7px}
.b-flag.ok{background:var(--ok-soft); color:var(--ok)}
.b-flag.warn{background:var(--warn-soft); color:var(--warn)}

/* Yetki rozeti / kilit göstergesi */
.locked-note{
  background:var(--warn-soft); border:1px solid #f0d9a8; border-radius:var(--radius);
  padding:16px 18px; display:flex; gap:13px; align-items:flex-start; margin-bottom:20px;
}
.locked-note .ln-ic{font-size:20px; flex:none}
.locked-note .ln-t{font-weight:700; font-size:14px; margin-bottom:2px}
.locked-note .ln-d{font-size:13px; color:var(--ink-2)}

.table-wrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
table{width:100%; border-collapse:collapse}
th{text-align:left; font-size:12px; color:var(--ink-2); font-weight:700; padding:13px 16px; border-bottom:1px solid var(--line); background:var(--surface-2)}
td{padding:13px 16px; border-bottom:1px solid var(--line); font-size:14px}
tr:last-child td{border-bottom:none}
.tag{display:inline-block; padding:3px 9px; border-radius:7px; font-size:11.5px; font-weight:700}
.tag.locked{background:var(--surface-2); color:var(--ink-3)}
.tag.edit{background:var(--ok-soft); color:var(--ok)}

/* ---------- Modal (şifre yükseltme) ---------- */
.modal-bg{position:fixed; inset:0; z-index:120; background:rgba(28,27,24,.45); display:none; align-items:center; justify-content:center}
.modal-bg.on{display:flex}
.modal{width:min(380px,92vw); background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:28px; text-align:center}
.modal .m-ic{width:54px;height:54px;border-radius:14px;background:var(--warn-soft);color:var(--warn);display:grid;place-items:center;font-size:26px;margin:0 auto 14px}
.modal h3{margin:0 0 6px; font-size:18px; font-weight:800}
.modal p{margin:0 0 20px; color:var(--ink-2); font-size:13.5px}
.modal input{width:100%; padding:14px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); text-align:center; font-size:20px; letter-spacing:6px; margin-bottom:16px}
.modal input:focus{outline:none; border-color:var(--brand)}
.modal-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}

.empty-state{text-align:center; padding:60px 20px; color:var(--ink-3)}
.empty-state .es-ic{font-size:44px; margin-bottom:12px}
.empty-state .es-t{font-size:16px; font-weight:700; color:var(--ink-2); margin-bottom:4px}

/* ---------- Opsiyon seçim modalı ---------- */
.opt-modal{
  width:min(480px,94vw); max-height:92vh; background:var(--surface);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  display:flex; flex-direction:column; overflow:hidden;
}
@media(max-width:520px){
  .modal-bg{align-items:flex-end}
  .opt-modal{width:100%; max-height:90vh; border-radius:var(--radius-lg) var(--radius-lg) 0 0; animation:sheetUp .25s ease}
}
@keyframes sheetUp{from{transform:translateY(40px); opacity:.6} to{transform:translateY(0); opacity:1}}
.opt-head{display:flex; align-items:center; gap:14px; padding:18px 20px; border-bottom:1px solid var(--line)}
.opt-head .opt-emoji{font-size:32px}
.opt-head .opt-name{font-weight:800; font-size:17px; line-height:1.2}
.opt-head .opt-base{font-size:13px; color:var(--ink-2)}
.opt-head .opt-x{margin-left:auto; width:34px; height:34px; border-radius:10px; background:var(--surface-2); color:var(--ink-2); font-size:15px; font-weight:700}
.opt-body{flex:1; overflow-y:auto; padding:6px 20px}
/* Gruplu accordion opsiyon ekranı */
.opt-bolum-baslik{font-size:20px; font-weight:800; color:var(--ink); margin:18px 0 10px}
.opt-bolum-baslik:first-child{margin-top:6px}
.opt-acc{background:var(--surface-2); border:1.5px solid transparent; border-radius:14px; margin-bottom:10px; overflow:hidden; transition:border-color .15s}
.opt-acc.acik{background:var(--surface); border-color:var(--line)}
.opt-acc.eksik.acik{border-color:var(--brand)}
.opt-acc-bas{width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 18px; background:none; border:none; cursor:pointer; text-align:left}
.oga-ad{font-size:16px; font-weight:800; color:var(--ink)}
.oga-sag{display:flex; align-items:center; gap:10px}
.oga-rozet{font-size:11px; font-weight:700; color:var(--ink-3); background:var(--surface); border:1px solid var(--line); padding:3px 9px; border-radius:99px; white-space:nowrap}
.opt-acc.acik .oga-rozet{background:var(--surface-2)}
.oga-rozet.zor{color:var(--brand-d); border-color:var(--brand); background:var(--brand-soft)}
.oga-secili{font-size:12.5px; font-weight:700; color:var(--brand-d); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.oga-ok{font-size:18px; color:var(--ink-3); transition:transform .2s; display:inline-block}
.opt-acc.acik .oga-ok{transform:rotate(180deg)}
.opt-acc-ic{padding:0 14px 14px; display:flex; flex-direction:column; gap:7px}
.opt-not-alan{margin-top:18px}
.opt-not-h{font-size:14px; font-weight:800; margin-bottom:8px}
.opt-grup{padding:14px 0; border-bottom:1px solid var(--surface-2)}
.opt-grup:last-child{border-bottom:none}
.opt-grup-h{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:10px}
.opt-grup-h .og-ad{font-weight:800; font-size:15px}
.og-meta{display:flex; align-items:center; gap:8px; flex:none}
.og-sayac{font-size:12px; font-weight:800; color:var(--ink-3)}
.og-tip{font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:99px}
.og-zor{background:var(--danger-soft); color:var(--danger)}
.og-coklu{background:var(--info-soft); color:var(--info)}
.opt-secenekler{display:grid; gap:7px}
.opt-sec{
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  border-radius:var(--radius-sm); background:var(--surface-2);
  border:1.5px solid transparent; text-align:left; transition:all .12s;
}
.opt-sec:active{transform:scale(.99)}
.opt-sec.on{background:var(--brand-soft); border-color:var(--brand)}
.opt-sec.opt-ist{background:transparent; border:1.5px dashed var(--line-2)}
.opt-sec.opt-ist.on{background:var(--surface-2); border-style:solid; border-color:var(--ink-3)}
.opt-sec.opt-disabled{opacity:.38; pointer-events:none}
.os-mark{width:23px; height:23px; flex:none; border-radius:7px; border:2px solid var(--line-2);
  display:grid; place-items:center; font-size:13px; font-weight:800; color:#fff; background:#fff}
.os-mark.radio{border-radius:99px}
.opt-sec.on .os-mark{background:var(--brand); border-color:var(--brand); color:var(--brand-ink)}
.os-ad{flex:1; font-size:14px; font-weight:600}
.os-fiyat{font-weight:800; font-size:13px; color:var(--brand-d); flex:none}
.os-kcal{font-weight:700; font-size:11.5px; color:#c0392b; flex:none; white-space:nowrap; margin-right:2px}
/* İsteğe bağlı adetli seçenek */
.opt-adetli{display:flex; align-items:center; gap:10px; cursor:default}
.opt-adetli.on{border-color:var(--brand); background:var(--brand-soft)}
.os-adet-kontrol{display:flex; align-items:center; gap:8px; margin-left:auto; flex:none}
.osa-btn{width:30px; height:30px; border-radius:8px; background:var(--surface); border:1.5px solid var(--line); font-size:17px; font-weight:800; color:var(--ink); display:flex; align-items:center; justify-content:center; line-height:1; cursor:pointer}
.osa-art{background:var(--brand); border-color:var(--brand); color:var(--brand-ink)}
.osa-n{min-width:20px; text-align:center; font-weight:800; font-size:15px}
.osa-btn.opt-disabled{opacity:.35; pointer-events:none}
/* === FİYAT/ÜRÜN YÖNETİMİ SEKMELERİ === */
.fyt-sekme-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px}
.fyt-sekme{padding:10px 16px; border-radius:99px; background:var(--surface); border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2)}
.fyt-sekme.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}
/* Kategori yönetimi */
.kat-yonetim-liste{display:flex; flex-direction:column; gap:8px}
.kat-yonetim-satir{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 15px}
.kys-emoji{font-size:22px}
.kys-gorsel-alan{width:46px; height:46px; min-width:46px; display:grid; place-items:center}
.kys-gorsel{width:46px; height:46px; border-radius:9px; object-fit:cover; border:1px solid var(--line)}
.kys-btn.gorsel{background:var(--brand-soft); color:var(--brand-d)}
.kys-ad{flex:1; font-weight:700; font-size:14px}
.kys-sayi{font-size:12px; color:var(--ink-3)}
.kys-aksiyon{display:flex; gap:5px}
.kys-btn{width:32px; height:32px; border-radius:8px; background:var(--surface-2); border:1px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2); display:flex; align-items:center; justify-content:center}
.kys-btn:disabled{opacity:.3}
.kys-btn.sil{color:var(--err); border-color:#e8a59e}
/* Seçenek grupları */
.sg-liste{display:flex; flex-direction:column; gap:10px}
.sg-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:14px}
.sg-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.sg-ad{font-size:16px; font-weight:800}
.sg-aksiyon{display:flex; gap:5px}
.sg-limit{margin-bottom:10px}
.sg-limit-rozet{font-size:11.5px; font-weight:700; color:var(--ink-3); background:var(--surface-2); padding:4px 11px; border-radius:99px}
.sg-limit-rozet.zor{color:var(--brand-d); background:var(--brand-soft)}
.sg-secenek-liste{display:flex; flex-direction:column; gap:6px}
.sg-sec-satir{display:flex; align-items:center; gap:10px; background:var(--surface-2); border-radius:9px; padding:9px 12px}
.sg-sec-satir.sg-ist{background:#fff4e6; border:1px solid #f0c98a}
.sg-sec-ad{flex:1; font-size:13.5px; font-weight:600}
.sg-sec-ek{font-size:12.5px; font-weight:800; color:var(--brand-d)}
.sg-sec-ek.bos{color:var(--ink-3); font-weight:400}
.sg-ucretsiz-rozet{display:inline-block; margin-left:8px; font-size:11px; font-weight:800; color:var(--ok); background:var(--ok-soft); border-radius:99px; padding:2px 9px}
.sg-kart.sg-ucretsiz{border-color:#bfe3cd}
.sga-ucret-not{font-size:11.5px; color:var(--ink-3); margin-top:7px; line-height:1.4}
.uf-ucret-secim{display:flex; gap:7px; margin:8px 0}
.uf-ucret{flex:1; padding:9px; border-radius:9px; background:var(--surface); border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2); cursor:pointer}
.uf-ucret.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.uf-sec-ek.ucretsiz{color:var(--ok); font-weight:700; font-size:11.5px; white-space:nowrap}
.sg-sec-sil{width:24px; height:24px; min-width:24px; border-radius:6px; background:var(--err-soft); color:var(--err); border:none; font-size:10px; font-weight:800}
.sg-sec-bos{font-size:12.5px; color:var(--ink-3); text-align:center; padding:10px}
.sg-sec-ekle-row{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap}
.sg-sec-ekle{padding:8px 14px; border-radius:8px; background:var(--brand-soft); border:1.5px solid var(--brand); font-size:12.5px; font-weight:700; color:var(--brand-d)}
.sg-ist-ekle{padding:8px 14px; border-radius:8px; background:#fff4e6; border:1.5px solid #f0c98a; font-size:12.5px; font-weight:700; color:#b06d10}
.sga-govde{padding:18px 20px; display:flex; flex-direction:column; gap:14px}
.sg-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.sg-ad{font-size:15px; font-weight:800}
.sg-aksiyon{display:flex; gap:6px}
.sg-secenekler{display:flex; flex-wrap:wrap; gap:6px}
.sg-chip{display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); border:1px solid var(--line); border-radius:99px; padding:5px 10px; font-size:12.5px; font-weight:600}
.sg-chip b{color:var(--brand-d)}
.sg-chip-x{width:16px; height:16px; border-radius:50%; background:var(--err-soft); color:var(--err); font-size:9px; font-weight:800; border:none}
.sg-bos{font-size:12px; color:var(--ink-3)}
/* Ürün listesi */
.uy-liste{display:flex; flex-direction:column; gap:8px}
.uy-satir{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:10px 14px}
.uy-satir.uy-pasif{opacity:.55}
.uy-gorsel{width:48px; height:48px; min-width:48px; border-radius:10px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:24px; overflow:hidden}
.uy-gorsel img{width:100%; height:100%; object-fit:cover}
.uy-bilgi{flex:1}
.uy-ad{font-weight:700; font-size:14px}
.uy-meta{font-size:12px; color:var(--ink-3); margin-top:2px}
.uy-aksiyon{display:flex; gap:5px}
.uy-sira{display:flex; flex-direction:column; gap:3px; flex-shrink:0}
.uy-sira-btn{width:30px; height:24px; border-radius:7px; background:var(--surface-2); border:1px solid var(--line); color:var(--cocoa); font-size:11px; font-weight:800; cursor:pointer; line-height:1; display:flex; align-items:center; justify-content:center}
.uy-sira-btn:active:not(:disabled){background:var(--brand-soft); border-color:var(--brand)}
.uy-sira-btn:disabled{opacity:.3; cursor:default}
.uy-sira-not{font-size:12px; color:var(--ink-3); background:var(--surface-2); border-radius:9px; padding:8px 12px; margin-bottom:4px}
/* Ürün formu */
.uf-head{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line)}
.uf-baslik{font-size:17px; font-weight:800}
.uf-govde{padding:16px 20px; max-height:62vh; overflow-y:auto; display:flex; flex-direction:column; gap:14px}
.uf-gorsel-alan{display:flex; gap:14px; align-items:center}
.uf-gorsel-onizleme{width:80px; height:80px; min-width:80px; border-radius:14px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:38px; overflow:hidden; border:1px solid var(--line)}
.uf-gorsel-onizleme img{width:100%; height:100%; object-fit:cover}
.uf-gorsel-btnlar{display:flex; flex-direction:column; gap:8px}
.uf-yukle-btn{padding:9px 14px; border-radius:9px; background:var(--brand); color:var(--brand-ink); font-size:13px; font-weight:800; cursor:pointer; text-align:center}
.uf-gorsel-sil,.uf-emoji-btn{padding:8px 14px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line); font-size:12.5px; font-weight:700; color:var(--ink-2)}
.uf-alan{display:flex; flex-direction:column; gap:6px}
.uf-alan label{font-size:12px; font-weight:700; color:var(--ink-3)}
.uf-input{padding:11px 13px; border-radius:10px; border:1.5px solid var(--line); font-size:14px; font-weight:600; background:var(--surface); color:var(--ink); width:100%; box-sizing:border-box}
.uf-input:focus{border-color:var(--brand); outline:none}
.uf-textarea{min-height:60px; resize:vertical; font-family:inherit}
.uf-ikili{display:flex; gap:12px}
.uf-ikili .uf-alan{flex:1}
.uf-mag-alan{margin-top:12px}
.uf-mag-not{font-weight:400; color:var(--ink-3); font-size:11px}
.uf-mag-row{display:flex; align-items:center; gap:12px}
.uf-mag-input{max-width:120px}
.uf-mag-kars{font-size:13px; font-weight:700; color:var(--brand-d)}
/* QR menü Mag puan rozeti (dikkat çekici) */
.qr-mag-rozet{display:inline-flex; align-items:center; gap:3px; background:linear-gradient(135deg,#fff0d6,#ffe0a8); color:#9a6212; border:1px solid #f0c878; border-radius:99px; padding:3px 9px; font-size:11.5px; font-weight:800; white-space:nowrap; box-shadow:0 1px 4px rgba(240,167,40,.25); animation:magPulse 2s ease-in-out infinite}
@keyframes magPulse{0%,100%{transform:scale(1);box-shadow:0 1px 4px rgba(240,167,40,.25)}50%{transform:scale(1.04);box-shadow:0 2px 10px rgba(240,167,40,.45)}}
/* === MAG PUAN SEKMESİ === */
.mag-sekme-bar{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap}
.mag-sekme{padding:10px 16px; border-radius:11px; background:var(--surface-2); border:1.5px solid var(--line); font-size:14px; font-weight:700; color:var(--ink-2); cursor:pointer}
.mag-sekme.on{background:var(--brand); border-color:var(--brand); color:#fff}
.mag-ayar-baslik{font-size:16px; font-weight:800; color:var(--cocoa); margin-bottom:6px}
.mag-ayar-aciklama{font-size:12.5px; color:var(--ink-3); line-height:1.5; margin-bottom:16px}
.mag-kur-row{display:flex; align-items:center; gap:12px; margin-bottom:10px}
.mag-kur-lbl{font-size:18px; font-weight:800; color:var(--ink)}
.mag-kur-input{width:120px; padding:12px 14px; border-radius:11px; border:2px solid var(--brand); font-size:20px; font-weight:800; text-align:center; color:var(--ink); background:var(--surface)}
.mag-kur-tl{font-size:18px; font-weight:700; color:var(--ink-2)}
.mag-kur-ornek{font-size:13px; color:var(--brand-d); font-weight:700; background:var(--brand-soft); border-radius:9px; padding:9px 13px; margin-bottom:16px; display:inline-block}
.mag-kur-kaydet{padding:13px 22px; border-radius:12px; background:var(--ok); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer; display:block}
/* raporlama */
.mag-rapor-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:14px}
.mag-rapor-kart{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; box-shadow:var(--shadow)}
.mag-rapor-kart.yesil{background:var(--ok-soft); border-color:#bfe3cd}
.mag-rapor-kart.kirmizi{background:var(--err-soft); border-color:#f0c0ba}
.mrk-ust{font-size:12.5px; font-weight:700; color:var(--ink-2); margin-bottom:8px}
.mrk-deger{font-size:32px; font-weight:900; color:var(--cocoa); line-height:1}
.mrk-alt{font-size:12px; color:var(--ink-3); margin-top:4px; font-weight:600}
.mag-rapor-not{font-size:12.5px; color:var(--ink-3); line-height:1.6; background:var(--surface-2); border-radius:10px; padding:12px 14px; margin-bottom:18px}
.mag-top-baslik{font-size:15px; font-weight:800; color:var(--cocoa); margin-bottom:10px}
.mag-top-liste{display:flex; flex-direction:column; gap:8px}
.mag-top-satir{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 14px}
.mag-top-no{width:26px; height:26px; border-radius:50%; background:var(--brand-soft); color:var(--brand-d); font-weight:800; font-size:13px; display:grid; place-items:center}
.mag-top-ad{flex:1; font-weight:700; font-size:14px}
.mag-top-mag{font-weight:800; color:var(--brand-d); font-size:14px; text-align:right}
.mag-top-mag small{display:block; font-size:11px; color:var(--ink-3); font-weight:600}
/* üye tablosu */
.mag-uye-bilgi{font-size:13px; color:var(--ink-2); font-weight:600; margin-bottom:10px}
.mag-uye-tablo-sar{overflow-x:auto; border:1px solid var(--line); border-radius:14px; background:var(--surface)}
.mag-uye-tablo{width:100%; border-collapse:collapse; font-size:13.5px}
.mag-uye-tablo th{background:var(--surface-2); padding:12px 14px; text-align:left; font-weight:800; font-size:12px; color:var(--cocoa); border-bottom:2px solid var(--line); white-space:nowrap}
.mag-uye-tablo th.sag{text-align:right}
.mag-uye-tablo td{padding:12px 14px; border-bottom:1px solid var(--line); vertical-align:middle}
.mag-uye-tablo td.sag{text-align:right}
.mag-uye-satir{cursor:pointer}
.mag-uye-satir:hover td{background:#fdf6ec}
.mag-uye-ad{font-weight:700}
.mag-uye-mail{font-size:12.5px; color:var(--ink-2)}
.mag-uye-tel{font-size:12px; color:var(--ink-3)}
.mag-uye-mag{font-weight:800; color:var(--brand-d); font-size:15px}
.mag-uye-tl{font-weight:700; color:var(--ink)}
.mag-uye-ok{color:var(--ink-3); font-size:18px; font-weight:800}
.mag-uye-bos{text-align:center; padding:24px; color:var(--ink-3)}
/* üye detay modal */
.mag-uye-modal-ic{background:#fff; border-radius:18px; max-width:480px; width:94%; margin:auto; max-height:88vh; display:flex; flex-direction:column}
.mag-uye-modal-bas{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line); font-size:16px; font-weight:800; color:var(--cocoa)}
.mag-uye-modal-govde{padding:18px 20px; overflow-y:auto}
.mag-uye-ozet{display:flex; gap:12px; margin-bottom:14px}
.muo-kart{flex:1; background:var(--brand-soft); border-radius:12px; padding:14px; text-align:center}
.muo-lbl{font-size:12px; font-weight:700; color:var(--ink-2); margin-bottom:5px}
.muo-deger{font-size:26px; font-weight:900; color:var(--brand-d); line-height:1}
.muo-alt{font-size:12px; color:var(--ink-3); margin-top:3px; font-weight:600}
.mag-uye-iletisim{display:flex; flex-direction:column; gap:5px; font-size:13.5px; color:var(--ink-2); background:var(--surface-2); border-radius:10px; padding:12px 14px; margin-bottom:16px}
.mag-islem-baslik{font-size:14px; font-weight:800; color:var(--cocoa); margin-bottom:10px}
.mag-islem-liste{display:flex; flex-direction:column; gap:8px}
.mag-islem-bos{text-align:center; padding:20px; color:var(--ink-3); font-size:13px}
.mag-islem-satir{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 13px}
.mag-islem-tip{font-size:12.5px; font-weight:800}
.mag-islem-tip.kazanim{color:var(--ok)}
.mag-islem-tip.harcama{color:var(--err)}
.mag-islem-ac{font-size:13px; color:var(--ink); margin-top:3px}
.mag-islem-tarih{font-size:11px; color:var(--ink-3); margin-top:3px}
.mag-islem-deger{font-weight:800; font-size:15px; text-align:right; white-space:nowrap}
.mag-islem-deger.kazanim{color:var(--ok)}
.mag-islem-deger.harcama{color:var(--err)}
.mag-islem-deger small{display:block; font-size:11px; color:var(--ink-3); font-weight:600}
/* === KADEME (Bronz/Gümüş/Altın) === */
.mag-kademe-rozet{display:inline-flex; align-items:center; gap:3px; border:1.5px solid; border-radius:99px; padding:3px 10px; font-size:12px; font-weight:800; white-space:nowrap}
.mag-kademe-blok{border:1.5px solid; border-radius:14px; padding:14px 16px; margin-bottom:14px}
.mag-kademe-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:6px}
.mag-kademe-ad{font-size:18px; font-weight:900}
.mag-kademe-carpan{font-size:12.5px; font-weight:700; color:var(--ink-2); background:rgba(0,0,0,.05); border-radius:99px; padding:4px 11px}
.mag-kademe-ilerleme{height:8px; background:rgba(0,0,0,.08); border-radius:99px; overflow:hidden; margin-bottom:7px}
.mag-kademe-bar{height:100%; border-radius:99px; transition:width .4s}
.mag-kademe-kalan{font-size:12.5px; font-weight:700; color:var(--ink-2)}
/* kademe ayar tablosu */
.mag-kademe-tablo{margin:14px 0}
.mag-kademe-th,.mag-kademe-tr{display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:10px; align-items:center}
.mag-kademe-th{font-size:11.5px; font-weight:800; color:var(--ink-3); padding:0 0 8px; border-bottom:1px solid var(--line); margin-bottom:8px}
.mag-kademe-tr{padding:7px 0}
.mag-kademe-isim{font-size:14px; font-weight:800}
.mag-kademe-input{width:100%; padding:9px 11px; border-radius:9px; border:1.5px solid var(--line); font-size:14px; font-weight:700; text-align:center; background:var(--surface); color:var(--ink)}
.mag-kademe-input:disabled{opacity:.5; background:var(--surface-2)}
.mag-kademe-carpan-row{display:flex; align-items:center; gap:6px}
.mag-kademe-x{font-size:14px; font-weight:800; color:var(--ink-3)}
.mag-kademe-not{font-size:11.5px; color:var(--ink-3); line-height:1.5; margin-bottom:14px}
/* kademe dağılım kartları */
.mag-kademe-dagilim{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px}
.mag-kdg-kart{background:var(--surface); border:1.5px solid var(--line); border-radius:13px; padding:14px; text-align:center}
.mag-kdg-ust{font-size:14px; font-weight:800; margin-bottom:6px}
.mag-kdg-say{font-size:28px; font-weight:900; color:var(--cocoa); line-height:1}
.mag-kdg-alt{font-size:11.5px; color:var(--ink-3); margin-top:4px; font-weight:600}
/* === MAG KUTLAMA POP-UP (sepete ekleme patlaması) === */
.mag-kutlama-bg{position:fixed; inset:0; z-index:300; display:none; align-items:center; justify-content:center; pointer-events:none; background:rgba(28,20,8,0)}
.mag-kutlama-bg.on{display:flex; animation:magBgFade 1.8s ease}
@keyframes magBgFade{0%{background:rgba(28,20,8,0)}15%{background:rgba(28,20,8,.35)}80%{background:rgba(28,20,8,.35)}100%{background:rgba(28,20,8,0)}}
.mag-kutlama-ic{position:relative; width:100%; max-width:420px; height:100%; display:flex; align-items:center; justify-content:center}
.mag-kutlama-patlama{position:relative; z-index:2; text-align:center; background:linear-gradient(135deg,#fff8ec,#ffeccb); border:2px solid #f0c878; border-radius:24px; padding:30px 36px; box-shadow:0 20px 60px rgba(180,120,20,.5); animation:magPatla .55s cubic-bezier(.18,1.5,.4,1)}
@keyframes magPatla{0%{transform:scale(.2) rotate(-12deg);opacity:0}60%{transform:scale(1.12) rotate(4deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.mag-kutlama-ikon{font-size:60px; animation:magZipla .6s ease infinite alternate}
@keyframes magZipla{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-8px) scale(1.08)}}
.mag-kutlama-puan{font-size:34px; font-weight:900; color:#d8851a; margin-top:6px; text-shadow:0 2px 8px rgba(216,133,26,.3); letter-spacing:.5px}
.mag-kutlama-slogan{font-size:17px; font-weight:800; color:#9a6212; margin-top:8px; letter-spacing:1px}
.mag-kutlama-alt{font-size:14px; font-weight:700; color:#b8841a; margin-top:10px; background:rgba(240,167,40,.18); border-radius:99px; padding:6px 16px; display:inline-block}
.mag-konfeti-kat{position:absolute; inset:0; overflow:hidden; z-index:1; pointer-events:none}
.mag-konfeti{position:absolute; top:-20px; width:11px; height:11px; border-radius:2px; opacity:.95; animation:magKonfetiDus linear forwards}
@keyframes magKonfetiDus{0%{top:-20px;opacity:1}100%{top:105%;opacity:.3}}
.uf-aktif{display:flex; align-items:center; gap:10px; cursor:pointer; background:var(--surface-2); padding:11px 14px; border-radius:10px}
.uf-aktif span{font-size:13px; font-weight:600; color:var(--ink-2)}
.uf-grup-baslik{font-size:14px; font-weight:800; margin-top:8px; padding-top:14px; border-top:1px solid var(--line)}
.uf-grup-bos{font-size:12.5px; color:var(--ink-3); text-align:center; padding:14px}
.uf-grup-kart{background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:10px}
.uf-grup-ust{display:flex; gap:8px; align-items:center}
.uf-grup-ad{flex:1; padding:9px 12px; border-radius:9px; border:1.5px solid var(--line); font-size:13.5px; font-weight:700; background:var(--surface)}
.uf-grup-sil{width:34px; height:34px; min-width:34px; border-radius:9px; background:var(--err-soft); color:var(--err); border:none; font-size:14px}
.uf-tasi-grup{display:flex; flex-direction:column; gap:2px; margin-right:2px}
.uf-tasi-sec{display:flex; flex-direction:column; gap:1px; margin-right:2px}
.uf-tasi-btn{width:26px; height:16px; min-width:26px; border-radius:5px; background:var(--surface-2); border:1px solid var(--line); color:var(--ink-2); font-size:8px; line-height:1; padding:0; cursor:pointer; display:flex; align-items:center; justify-content:center}
.uf-tasi-btn.sm{width:22px; height:14px; min-width:22px; font-size:7px}
.uf-tasi-btn:disabled{opacity:.25; cursor:default}
.uf-tasi-btn:not(:disabled):active{background:var(--brand-soft); border-color:var(--brand)}
.uf-grup-ayar{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.uf-tip-secim{display:flex; gap:6px}
.uf-tip{padding:7px 12px; border-radius:8px; background:var(--surface); border:1.5px solid var(--line); font-size:12px; font-weight:700; color:var(--ink-2)}
.uf-tip.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.uf-minmax{display:flex; gap:6px; align-items:center}
.uf-minmax label{font-size:11px; font-weight:700; color:var(--ink-3)}
.uf-mm-input{width:48px; padding:7px; border-radius:8px; border:1.5px solid var(--line); font-size:13px; font-weight:700; text-align:center; background:var(--surface)}
.uf-mm-not{font-size:10.5px; color:var(--ink-3)}
.uf-secenekler{display:flex; flex-direction:column; gap:6px}
.uf-secenek-satir{display:flex; gap:6px; align-items:center}
.uf-sec-ad{flex:1; padding:8px 11px; border-radius:8px; border:1.5px solid var(--line); font-size:13px; background:var(--surface)}
.uf-sec-ek{display:flex; align-items:center; gap:1px; font-size:12px; font-weight:700; color:var(--ink-3)}
.uf-sec-ek-input{width:44px; padding:7px 4px; border-radius:7px; border:1.5px solid var(--line); font-size:13px; font-weight:700; text-align:center; background:var(--surface)}
.uf-sec-sil{width:28px; height:28px; min-width:28px; border-radius:7px; background:var(--err-soft); color:var(--err); border:none; font-size:11px; font-weight:800}
.uf-sec-ekle-row{display:flex; gap:8px; margin-top:2px}
.uf-sec-ekle,.uf-sec-hazir{padding:8px 12px; border-radius:8px; background:var(--surface); border:1.5px dashed var(--line); font-size:12px; font-weight:700; color:var(--ink-2)}
.uf-sec-hazir{border-style:solid; background:var(--brand-soft); color:var(--brand-d); border-color:var(--brand)}
.uf-grup-ekle{width:100%; padding:12px; border-radius:10px; background:var(--brand-soft); color:var(--brand-d); font-weight:800; font-size:13.5px; border:1.5px dashed var(--brand)}
.uf-kaydet{margin:8px 20px 20px; padding:15px; border-radius:12px; background:var(--brand); color:var(--brand-ink); font-size:15px; font-weight:800; border:none; width:calc(100% - 40px)}
/* Hazır grup seçim modalı */
.gsm-head{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line)}
.gsm-baslik{font-size:16px; font-weight:800}
.gsm-ara{padding:14px 20px 8px}
.gsm-liste{padding:0 20px; max-height:50vh; overflow-y:auto; display:flex; flex-direction:column; gap:8px}
.gsm-kart{text-align:left; background:var(--surface); border:1.5px solid var(--line); border-radius:12px; padding:12px 14px; cursor:pointer; width:100%}
.gsm-kart:active{background:var(--brand-soft); border-color:var(--brand)}
.gsm-kart-ad{font-size:14px; font-weight:800; color:var(--ink)}
.gsm-say{font-size:11px; font-weight:600; color:var(--ink-3); background:var(--surface-2); padding:1px 8px; border-radius:99px; margin-left:6px}
.gsm-kart-ornek{font-size:12px; color:var(--ink-3); margin-top:4px; line-height:1.4}
.gsm-bos-btn{margin:12px 20px 20px; padding:13px; border-radius:11px; background:var(--surface-2); border:1.5px dashed var(--line); font-size:13.5px; font-weight:800; color:var(--ink-2); width:calc(100% - 40px)}
/* Seçenekler havuzu sekmesi */
.sec-ara-kutu{margin-bottom:12px}
.sec-sube-row{display:flex; align-items:center; gap:10px; margin-bottom:12px; background:var(--surface-2); padding:10px 14px; border-radius:10px}
.sec-sube-row label{font-size:13px; font-weight:700; color:var(--ink-2)}
.sec-sube-row .gf-select{flex:1; max-width:280px}
.secpool-liste{display:flex; flex-direction:column; gap:7px}
.secpool-satir{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:10px 14px}
.sp-ad{flex:1; font-weight:700; font-size:13.5px}
.sp-ek{font-size:12px; font-weight:800; color:var(--brand-d)}
.sp-ek.sp-ucretsiz{color:var(--ink-3); font-weight:600}
.secpool-satir.sp-kapali{opacity:.7; background:var(--err-soft)}
.sp-durum-acik{font-size:12px; font-weight:700; color:var(--ok)}
.sp-fiyat{font-size:13px; font-weight:800; color:var(--brand-d); white-space:nowrap}
.sp-kcal{font-size:12px; font-weight:700; color:#c0392b; white-space:nowrap}
.kalem-kcal{display:inline-block; font-size:11px; font-weight:700; color:#c0392b; background:#fdecea; border-radius:6px; padding:1px 6px; margin-left:4px; white-space:nowrap; vertical-align:middle}
.opt-kcal{display:inline-block; font-size:11.5px; font-weight:700; color:#c0392b; margin-left:6px}
.qr-card-kcal{display:inline-flex; align-items:center; gap:3px; font-size:11.5px; font-weight:700; color:#c0392b; background:#fdecea; border-radius:99px; padding:2px 9px; white-space:nowrap}
.qr-card-kcal-row{margin:2px 0 4px}
.qr-si-ad .kalem-kcal{font-size:10.5px}
.sp-fiyat .sp-ucretsiz2{color:var(--ink-3); font-weight:500}
.sp-durum-kapali{font-size:11.5px; font-weight:700; color:var(--err)}
.sp-kapat-btn{padding:6px 13px; border-radius:8px; background:var(--err-soft); border:1px solid #e8a59e; color:var(--err); font-size:12px; font-weight:800}
.sp-kapat-btn.acik{background:var(--ok-soft); border-color:var(--ok); color:var(--ok)}
/* Seçenek kapatma modalı */
.skm-bilgi{padding:14px 20px; font-size:13px; color:var(--ink-2); line-height:1.5; border-bottom:1px solid var(--line)}
.skm-secenekler{padding:16px 20px; display:flex; flex-direction:column; gap:10px}
.skm-opt{text-align:left; background:var(--surface); border:1.5px solid var(--line); border-radius:12px; padding:14px 16px; cursor:pointer; display:flex; flex-direction:column; gap:3px}
.skm-opt:active{background:var(--brand-soft); border-color:var(--brand)}
.skm-opt-ad{font-size:14.5px; font-weight:800}
.skm-opt-not{font-size:12px; color:var(--ink-3)}
.skm-input-alan{padding:18px 20px 24px; display:flex; flex-direction:column; gap:14px}
.skm-input-alan .uf-input{font-size:16px; text-align:center}
.skm-uygula{padding:15px 20px; border-radius:11px; background:var(--err); color:#fff; font-size:15px; font-weight:800; border:none; width:100%}
.sp-aksiyon{display:flex; gap:5px}
.sp-sec-kart.ekli{opacity:.5}
/* Ürün formu: özel ad inputları + grup adı dropdown */
select.uf-grup-ad{flex:1; cursor:pointer}
.uf-grup-ozel{width:100%; box-sizing:border-box; margin-top:8px; padding:9px 12px; border-radius:9px; border:1.5px solid var(--brand); font-size:13.5px; font-weight:700; background:var(--surface)}
select.uf-sec-ad{flex:1; cursor:pointer; padding:8px 11px; border-radius:8px; border:1.5px solid var(--line); font-size:13px; background:var(--surface)}
.uf-sec-ozel{flex:1; min-width:70px; padding:8px 11px; border-radius:8px; border:1.5px solid var(--brand); font-size:13px; background:var(--surface)}
.opt-not{width:100%; min-height:60px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm);
  padding:11px 13px; font-size:14px; resize:vertical; font-family:inherit}
.opt-not:focus{outline:none; border-color:var(--brand)}
.opt-foot{display:flex; align-items:center; gap:14px; padding:14px 20px; border-top:1px solid var(--line)}
.opt-toplam{flex:1}
.opt-toplam .ot-l{font-size:12px; color:var(--ink-2); font-weight:600}
.opt-toplam .ot-v{font-size:22px; font-weight:800; letter-spacing:-.5px}
.opt-foot .btn{flex:1; max-width:200px}

/* ---------- Hesap bölme ---------- */
.bol-modlar{display:grid; grid-template-columns:repeat(4,1fr); gap:7px; padding:14px 20px; border-bottom:1px solid var(--line)}
.bol-mod{display:flex; flex-direction:column; align-items:center; gap:5px; padding:11px 4px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:11.5px; font-weight:700; border:1.5px solid transparent}
.bol-mod.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.bol-mod .bm-ic{font-size:19px}
.bol-aciklama{font-size:12.5px; color:var(--ink-2); padding:6px 0 12px; font-weight:600}
.bol-urun{padding:12px 0; border-bottom:1px solid var(--surface-2)}
.bol-urun-ad{font-weight:700; font-size:14px; margin-bottom:8px; display:flex; justify-content:space-between}
.bol-urun-ad span{color:var(--brand-d); font-weight:800}
.bol-urun-kisiler{display:flex; gap:7px; flex-wrap:wrap}
.bol-kisi-btn{padding:8px 14px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:13px; font-weight:700; border:1.5px solid transparent}
.bol-kisi-btn.on{background:var(--cocoa); color:#fff; border-color:var(--cocoa)}
.bol-paylar{margin-top:8px; display:flex; flex-direction:column; gap:8px}
.bol-pay{display:flex; align-items:center; justify-content:space-between; padding:13px 15px; border-radius:var(--radius-sm); background:var(--surface-2)}
.bol-pay.odendi{background:var(--ok-soft)}
.bol-pay-ad{font-weight:700; font-size:14.5px}
.bol-pay.odendi .bol-pay-ad{color:var(--ok)}
.bol-pay-sag{display:flex; align-items:center; gap:12px}
.bol-pay-tutar{font-weight:800; font-size:15px}
.bol-pay-al{padding:8px 18px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:13px; font-weight:800}
.bol-pay-al:active{transform:scale(.96)}
.bol-pay-durum{font-size:12px; font-weight:800; color:var(--ok)}
.bol-tumu{margin-left:9px; padding:4px 10px; border-radius:99px; background:var(--cocoa-soft); color:var(--cocoa); font-size:11px; font-weight:800; vertical-align:middle}
.bol-tumu.on{background:var(--cocoa); color:#fff}

/* Kişi yönetimi */
.bol-kisi-yonet{padding:4px 0 14px; border-bottom:1px solid var(--surface-2); margin-bottom:12px}
.bky-baslik{font-size:13px; font-weight:800; color:var(--ink-2); margin-bottom:10px}
.bky-liste{display:flex; flex-direction:column; gap:8px}
.bky-kisi{display:flex; gap:8px; align-items:center}
.bky-ad{flex:1; padding:10px 13px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:14px; font-weight:600}
.bky-ad:focus{outline:none; border-color:var(--brand)}
.bky-sil{width:38px; height:38px; flex:none; border-radius:var(--radius-sm); background:var(--danger-soft); color:var(--danger); font-size:14px; font-weight:700}
.bky-sil:active{transform:scale(.94)}
.bky-ekle{margin-top:4px; padding:11px; border-radius:var(--radius-sm); background:var(--cocoa-soft); color:var(--cocoa); font-size:13.5px; font-weight:800; border:1.5px dashed var(--cocoa)}

/* Ödeme yöntemi seçimi */
.oy-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:8px 0}
.oy-btn{display:flex; flex-direction:column; align-items:center; gap:8px; padding:20px 12px; border-radius:var(--radius); background:var(--surface-2); border:1.5px solid transparent; transition:all .12s}
.oy-btn:hover{border-color:var(--brand); background:var(--brand-soft)}
.oy-btn:active{transform:scale(.97)}
.oy-ic{font-size:30px}
.oy-ad{font-size:14px; font-weight:800}
.oy-btn:last-child:nth-child(odd){grid-column:1/-1}

/* Ödeme ekranı sadakat */
.od-sadakat-sec{background:var(--cocoa-soft); border-radius:var(--radius); padding:14px 16px; margin-bottom:14px}
.od-ss-baslik{font-weight:800; font-size:15px; color:var(--cocoa); margin-bottom:2px}
.od-ss-alt{font-size:12.5px; color:var(--ink-2); margin-bottom:10px}
.od-tel-row{display:flex; gap:8px}
.od-tel-input{flex:1; padding:11px 13px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:14px}
.od-tel-input:focus{outline:none; border-color:var(--brand)}
.od-tel-btn{padding:0 18px; border-radius:var(--radius-sm); background:var(--cocoa); color:#fff; font-weight:800; font-size:14px}
.od-ss-not{font-size:11.5px; color:var(--ink-3); margin-top:8px}
.od-musteri{background:var(--brand-soft); border-radius:var(--radius); padding:14px 16px; margin-bottom:14px}
.od-m-ust{display:flex; justify-content:space-between; align-items:center}
.od-m-ad{font-weight:800; font-size:16px}
.od-m-mag{font-weight:800; font-size:16px; color:var(--brand-d)}
.od-m-damga{font-size:12px; color:var(--ink-2); font-weight:600; margin-top:2px}
.od-bozdurma{margin-top:12px; padding-top:12px; border-top:1px solid #f0d9a8}
.od-bz-baslik{font-size:13px; font-weight:700; margin-bottom:8px}
.od-bz-kontrol{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.od-bz-btn{width:38px; height:36px; border-radius:9px; background:#fff; border:1.5px solid var(--line-2); font-weight:800; font-size:13px}
.od-bz-btn:active{transform:scale(.94)}
.od-bz-deger{flex:1; text-align:center; font-weight:800; font-size:14px; min-width:80px}
.od-bz-max{padding:0 14px; height:36px; border-radius:9px; background:var(--cocoa); color:#fff; font-weight:800; font-size:12.5px}
.od-bz-indirim{margin-top:8px; font-size:13px; font-weight:800; color:var(--ok)}

/* Mag kullanım kod akışı */
.od-mag-kilit{margin-top:12px; padding-top:12px; border-top:1px solid #f0d9a8}
.od-mk-bilgi{font-size:12.5px; color:var(--ink-2); line-height:1.5; margin-bottom:10px; font-weight:600}
.od-kod-gonder{width:100%; padding:13px; border-radius:var(--radius-sm); background:var(--cocoa); color:#fff; font-size:14px; font-weight:800}
.od-kod-gonder:active{transform:scale(.97)}
.od-kod-row{display:flex; gap:8px}
.od-kod-input{flex:1; padding:12px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:18px; text-align:center; letter-spacing:5px; font-weight:800}
.od-kod-input:focus{outline:none; border-color:var(--brand)}
.od-kod-dogrula{padding:0 18px; border-radius:var(--radius-sm); background:var(--ok); color:#fff; font-weight:800; font-size:14px}
.od-kod-tekrar{width:100%; margin-top:8px; padding:8px; background:none; color:var(--ink-3); font-size:12px; font-weight:700}
.od-bz-acik{background:var(--ok-soft); border-radius:var(--radius-sm); padding:12px; border-top:none}
.od-kazanc{margin-top:12px; font-size:13px; color:var(--ink-2); text-align:center}
.od-kazanc strong{color:var(--brand-d)}
.od-tahsil-baslik{font-size:15px; font-weight:700; margin-bottom:12px; text-align:center}
.od-tahsil-baslik strong{font-size:18px; color:var(--ink)}
.od-tahsil-baslik s{color:var(--ink-3); font-weight:600; font-size:14px}
.oy-tam{background:var(--brand-soft)!important; border-color:var(--brand)!important}

/* ============================================================
   MUTFAK EKRANI (KDS) — tablet/büyük ekran
   ============================================================ */
#kdsApp{display:none; position:fixed; inset:0; z-index:95; background:#1a1d21; overflow-y:auto; color:#e8e8e8}
.kds-screen{max-width:1100px; margin:0 auto; min-height:100%; padding:0 0 30px}
.kds-top{display:flex; align-items:center; gap:14px; padding:16px 20px; background:#22262b; position:sticky; top:0; z-index:5; border-bottom:1px solid #2e3238}
.kds-top .qr-close{background:#2e3238; color:#e8e8e8}
.kds-title{flex:1; font-size:19px; font-weight:800}
.kds-saat{font-size:16px; font-weight:800; color:var(--brand)}
.kds-sekme-row{display:flex; gap:10px; padding:14px 20px; position:sticky; top:65px; z-index:4; background:#1a1d21}
.kds-sekme{flex:1; padding:13px; border-radius:12px; background:#22262b; color:#9aa0a6; font-size:15px; font-weight:800}
.kds-sekme.on{background:var(--brand); color:#1a1d21}
.kds-bos{text-align:center; padding:80px 20px; color:#6a7077; font-size:16px}

/* Masa kartları */
.kds-masa-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; padding:6px 20px}
.kds-masa-kart{text-align:left; background:#22262b; border:2px solid #2e3238; border-radius:16px; padding:16px}
.kds-masa-kart.acil{border-color:#e67e22; animation:kdsPulse 2s infinite}
@keyframes kdsPulse{0%,100%{border-color:#e67e22} 50%{border-color:#4a3520}}
.kds-masa-kart:active{transform:scale(.98)}
.kmk-ust{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
.kmk-no{font-size:19px; font-weight:800; color:#fff}
.kmk-dk{font-size:13px; color:#9aa0a6; font-weight:700}
.kmk-kisi{font-size:13px; color:#9aa0a6; margin-bottom:12px}
.kmk-durum{display:flex; flex-wrap:wrap; gap:6px}
.kmk-rozet{font-size:11.5px; font-weight:800; padding:5px 10px; border-radius:99px}
.kmk-rozet.bek{background:#4a3520; color:#f0a050}
.kmk-rozet.haz{background:#1e3a52; color:#5bacf0}
.kmk-rozet.tamam{background:#1e4030; color:#5bd08a}

/* Sipariş akışı */
.kds-akis-list{display:flex; flex-direction:column; gap:12px; padding:6px 20px}
.kds-akis-kart{background:#22262b; border-radius:14px; padding:14px 16px}
.kak-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.kak-masa{font-size:13px; font-weight:800; color:#9aa0a6}
.kak-durum{font-size:11.5px; font-weight:800; padding:4px 10px; border-radius:99px}
.kak-ad{font-size:17px; font-weight:800; color:#fff; margin-bottom:4px}
.kak-secim{font-size:13px; color:#9aa0a6; margin-bottom:12px; line-height:1.4}
.kak-aksiyon{display:flex; gap:8px; flex-wrap:wrap}
.kak-btn{padding:11px 16px; border-radius:10px; font-size:13.5px; font-weight:800}
.kak-btn.haz{background:#2980b9; color:#fff}
.kak-btn.gonder{background:#27ae60; color:#fff}
.kak-btn.iptal{background:#3a2e2e; color:#e0928a}
.kak-btn:active{transform:scale(.96)}

/* Masa detayı */
.kds-detay{padding:6px 20px}
.kds-kisi-blok{margin-bottom:20px}
.kds-kisi-ad{font-size:16px; font-weight:800; color:var(--brand); margin-bottom:10px}
.kds-kalem{background:#22262b; border-radius:12px; padding:13px 15px; margin-bottom:10px}
.kds-kalem.iptalli{opacity:.45}
.kds-kalem.iptalli .kk-ad{text-decoration:line-through}
.kk-ust{display:flex; justify-content:space-between; align-items:baseline}
.kk-ad{font-size:15.5px; font-weight:800; color:#fff}
.kk-fiyat{font-size:15px; font-weight:800; color:var(--brand)}
.kk-durum{font-size:12px; font-weight:700; margin-top:2px}
.kk-opsiyonlar{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
.kk-ops{display:inline-flex; align-items:center; gap:6px; background:#2e3238; color:#c8ccd0; font-size:12px; font-weight:600; padding:5px 8px 5px 11px; border-radius:99px}
.kk-ops-x{width:18px; height:18px; border-radius:99px; background:#3a2e2e; color:#e0928a; font-size:10px; font-weight:800; display:grid; place-items:center}
.kk-aksiyon{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
.kk-tamam{font-size:13px; font-weight:800; color:#5bd08a; align-self:center}

/* ============================================================
   GARSON EKRANI (tablet/mobil)
   ============================================================ */
#garsonApp{display:none; position:fixed; inset:0; z-index:95; background:var(--bg); overflow-y:auto}
.grs-screen{max-width:640px; margin:0 auto; min-height:100%; background:var(--surface)}
.grs-top{display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--surface); position:sticky; top:0; z-index:5; border-bottom:1px solid var(--line)}
.grs-top .qr-close{background:var(--surface-2)}
.grs-title{flex:1; text-align:center; font-size:17px; font-weight:800}
.grs-tutar-rozet{padding:7px 14px; border-radius:99px; background:var(--brand-soft); color:var(--brand-d); font-weight:800; font-size:14px}

/* Masa grid */
.grs-masa-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; padding:16px}
.grs-masa{background:var(--surface-2); border:2px solid transparent; border-radius:16px; padding:18px 14px; text-align:center; min-height:110px; display:flex; flex-direction:column; justify-content:center; gap:6px}
.grs-masa.dolu{background:var(--surface); border-color:var(--brand)}
.grs-masa:active{transform:scale(.97)}
.grs-m-no{font-size:19px; font-weight:800}
.grs-m-bilgi{font-size:12.5px; color:var(--ink-2)}
.grs-m-tutar{font-size:15px; font-weight:800; color:var(--brand-d)}
.grs-m-bos{font-size:13px; color:var(--ink-3); font-weight:600}

/* Masa detayı */
.grs-detay{padding:14px 18px}
.grs-bos-detay{text-align:center; padding:40px 20px; color:var(--ink-3); font-size:14px; line-height:1.6}
.grs-kisi-blok{margin-bottom:16px; background:var(--surface-2); border-radius:var(--radius); padding:14px}
.grs-kisi-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.grs-kisi-ad{font-size:15.5px; font-weight:800}
.grs-ekle-btn{padding:7px 14px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:13px; font-weight:800}
.grs-ekle-btn:active{transform:scale(.95)}
.grs-kalem{display:flex; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--line)}
.grs-kalem:last-child{border-bottom:none}
.grs-kalem.iptal{opacity:.4}
.grs-kalem.iptal .grs-k-ad{text-decoration:line-through}
.grs-k-bilgi{flex:1}
.grs-k-ad{font-weight:700; font-size:14px; display:block}
.grs-k-secim{font-size:11.5px; color:var(--ink-2); margin-top:2px}
.grs-k-sag{text-align:right; white-space:nowrap}
.grs-k-durum{font-size:11px; font-weight:700; display:block}
.grs-k-fiyat{font-size:14px; font-weight:800}
.grs-foot{padding:14px 18px 30px; position:sticky; bottom:0; background:var(--surface); border-top:1px solid var(--line)}
.grs-yeni-kisi{width:100%; padding:14px; border-radius:var(--radius-sm); background:var(--cocoa-soft); color:var(--cocoa); font-size:14px; font-weight:800; border:1.5px dashed var(--cocoa)}

/* Garson menü */
.grs-kat-row{position:sticky; top:57px; z-index:4; display:flex; gap:8px; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--line); overflow-x:auto; scrollbar-width:none}
.grs-kat-row::-webkit-scrollbar{display:none}
.grs-menu-list{padding:14px 16px; display:flex; flex-direction:column; gap:10px}
.grs-urun{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 16px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); text-align:left}
.grs-urun:active{border-color:var(--brand); transform:scale(.99)}
.grs-urun.tukendi{opacity:.5; pointer-events:none}
.grs-u-info{flex:1}
.grs-u-ad{font-weight:700; font-size:15px}
.grs-u-desc{font-size:11.5px; color:var(--ink-2); margin-top:2px}
.grs-u-sag{display:flex; align-items:center; gap:10px}
.grs-u-fiyat{font-weight:800; font-size:15px; color:var(--brand-d)}
.grs-u-add{width:34px; height:34px; border-radius:99px; background:var(--brand); color:var(--brand-ink); display:grid; place-items:center; font-size:22px; font-weight:700}
.grs-u-tukendi{font-size:11px; font-weight:800; color:var(--danger); background:var(--danger-soft); padding:6px 10px; border-radius:8px}

/* ---------- Kasa masa detayı ---------- */
.kasa-masa-detay{display:flex; flex-direction:column; gap:14px; margin-bottom:14px}
.kmd-bos{text-align:center; padding:40px; color:var(--ink-3); font-size:14px}
.kmd-kisi{background:var(--surface-2); border-radius:var(--radius); padding:14px 16px}
.kmd-kisi-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.kmd-kisi-aksiyon{display:flex; gap:8px; align-items:center}
.kmd-kisi-ode{padding:7px 14px; border-radius:99px; background:var(--ok); color:#fff; font-size:12.5px; font-weight:800}
.kmd-kisi-ode:active{transform:scale(.95)}
.kmd-odendi{opacity:.7}
.kmd-odendi .kmd-kisi-ad{color:var(--ok)}
.kmd-odendi-rozet{font-size:12px; font-weight:800; color:var(--ok)}
.kmd-kisi-ad{font-size:15.5px; font-weight:800}
.kmd-kisi-ad small{color:var(--brand-d); font-weight:800; margin-left:6px}
.kmd-ekle{padding:7px 14px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:13px; font-weight:800}
.kmd-kalem{background:var(--surface); border-radius:var(--radius-sm); padding:11px 13px; margin-bottom:8px}
.kmd-kalem:last-child{margin-bottom:0}
.kmd-kalem.iptal{opacity:.45}
.kmd-kalem.iptal .kmd-k-ad{text-decoration:line-through}
.kmd-k-ust{display:flex; justify-content:space-between; align-items:baseline}
.kmd-k-ad{font-weight:700; font-size:14.5px}
.kmd-k-fiyat{font-weight:800; font-size:14.5px}
.kmd-k-durum{font-size:11.5px; font-weight:700; margin-top:2px}
.kmd-ops{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px}
.kmd-op{display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); font-size:12px; font-weight:600; padding:5px 8px 5px 11px; border-radius:99px}
.kmd-op-x{width:18px; height:18px; border-radius:99px; background:var(--danger-soft); color:var(--danger); font-size:10px; font-weight:800; display:grid; place-items:center}
.kmd-k-aksiyon{margin-top:10px}
.kmd-iptal{padding:7px 14px; border-radius:8px; background:var(--danger-soft); color:var(--danger); font-size:12.5px; font-weight:800}
.kmd-foot{display:flex; gap:10px; padding:14px 0 4px; position:sticky; bottom:0; background:var(--bg)}
.kmd-foot .btn{flex:1}
.kmd-foot .btn-primary{flex:2}
.ci .ci-name small{display:block; color:var(--ink-3); font-weight:500; font-size:11px; line-height:1.3; margin-top:1px}

/* ---------- Opsiyon kapatma (stok) ---------- */
.opt-kapat-mod{margin-left:auto; padding:7px 13px; border-radius:99px; background:var(--surface-2);
  color:var(--ink-2); font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px}
.opt-kapat-mod.on{background:var(--warn-soft); color:var(--warn)}
.opt-head .opt-x{margin-left:8px}
.kapat-bilgi{padding:10px 20px; background:var(--warn-soft); color:var(--brand-ink); font-size:12.5px; font-weight:600; line-height:1.4}
.opt-sec.opt-kapali{opacity:.4}
.opt-sec.opt-kapali .os-ad{text-decoration:line-through; text-decoration-color:var(--ink-3)}
.opt-sec.opt-kapali .os-mark{border-style:dashed}
.kapat-etiket{font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:99px; background:var(--surface-2); color:var(--ink-3); flex:none}
.kapat-etiket.stok{background:var(--danger-soft); color:var(--danger)}
/* kapatma modu satırı */
.opt-kapat-row{cursor:pointer}
.opt-kapat-row .kapat-tgl{width:24px; height:24px; flex:none; border-radius:99px; display:grid; place-items:center;
  font-size:13px; font-weight:800; background:var(--ok-soft); color:var(--ok)}
.opt-kapat-row.kapali{background:var(--danger-soft); border-color:#f0c0bc}
.opt-kapat-row.kapali .kapat-tgl{background:var(--danger); color:#fff}
.opt-kapat-row.kapali .os-ad{text-decoration:line-through}
.kapat-etiket.force{background:var(--warn-soft); color:var(--warn)}
.force-btn{margin-left:auto; flex:none; font-size:11px; font-weight:800; padding:5px 11px; border-radius:99px;
  background:var(--ink); color:#fff; white-space:nowrap}
.force-btn.on{background:var(--warn); color:#fff}

/* ============================================================
   QR MENÜ — müşteri telefonu (mobil tam ekran)
   ============================================================ */
#qrApp{display:none; position:fixed; inset:0; z-index:95; background:var(--bg); overflow-y:auto}
.qr-screen{max-width:480px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; background:var(--surface); position:relative}
.qr-close{position:absolute; top:14px; left:14px; z-index:5; width:36px; height:36px; border-radius:99px; background:rgba(255,255,255,.85); backdrop-filter:blur(6px); font-size:16px; font-weight:700; color:var(--ink); box-shadow:var(--shadow)}

/* Karşılama */
.qr-giris{justify-content:center; align-items:center; padding:30px 24px; background:radial-gradient(130% 90% at 50% 0%, #fff2dc 0%, var(--surface) 60%)}
.qr-hero{text-align:center; margin-bottom:30px}
.qr-logo{font-size:64px; margin-bottom:6px}
.qr-brand{font-size:30px; font-weight:800; letter-spacing:-.5px}
.qr-masa-rozet{display:inline-block; margin-top:12px; padding:8px 16px; border-radius:99px; background:var(--cocoa); color:#fff; font-size:13px; font-weight:700}
.qr-giris-kart{width:100%; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow)}
.qr-g-baslik{font-size:20px; font-weight:800; margin-bottom:4px}
.qr-g-alt{font-size:13.5px; color:var(--ink-2); line-height:1.5; margin-bottom:18px}
.qr-ad-input{width:100%; padding:15px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:16px; margin-bottom:14px}
.qr-ad-input:focus{outline:none; border-color:var(--brand)}
.qr-geo{margin-top:14px; text-align:center; font-size:12px; color:var(--ok); font-weight:600}

.qr-btn-primary{width:100%; padding:16px; border-radius:var(--radius-sm); background:var(--brand); color:var(--brand-ink); font-size:15.5px; font-weight:800}
.qr-btn-primary:active{transform:scale(.98); background:var(--brand-d); color:#fff}
.qr-btn-ghost{width:100%; padding:14px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:14px; font-weight:700; margin-top:10px}

/* === MOBİL DOKUNMA DÜZELTMESİ — buton ölü bölge giderme === */
/* Tüm QR butonları: dokunma her noktada algılansın, child elementler tıklamayı yutmasın */
#qrApp button{touch-action:manipulation; -webkit-tap-highlight-color:transparent; position:relative; cursor:pointer; -webkit-user-select:none; user-select:none}
#qrApp button > *{pointer-events:none}
/* + ekle ve kapat gibi buton-İÇİ-buton istisnaları korunur (kendileri buton, ayrı algılanır) */

/* Menü üst bar */
.qr-topbar{position:sticky; top:0; z-index:4; display:flex; align-items:center; padding:12px 14px; background:var(--surface); border-bottom:1px solid var(--line)}
.qr-topbar .qr-close{position:static; box-shadow:none; background:var(--surface-2)}
.qr-tb-mid{flex:1; text-align:center}
.qr-tb-brand{font-size:16px; font-weight:800}
.qr-tb-masa{font-size:11.5px; color:var(--ink-2)}

/* Kategori şeridi */
.qr-kat-row{position:sticky; top:60px; z-index:3; display:flex; gap:8px; padding:12px 14px; background:var(--surface); border-bottom:1px solid var(--line); overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none}
.qr-kat-row::-webkit-scrollbar{display:none}
.qr-kat{flex:none; padding:9px 16px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:13.5px; font-weight:700; white-space:nowrap}
.qr-kat.on{background:var(--cocoa); color:#fff}
.qr-servis-row{display:flex; gap:8px; padding:12px 14px 0}
.qr-yardim-row{display:flex; gap:8px; padding:10px 14px 0; flex-wrap:wrap}
.qr-yardim{flex:1; min-width:fit-content; padding:9px 12px; border-radius:99px; background:var(--surface-2); border:1.5px solid var(--line); color:var(--ink-2); font-size:12.5px; font-weight:700; white-space:nowrap}
.qr-yardim:active{background:var(--brand-soft); border-color:var(--brand)}
.qr-servis{flex:1; padding:11px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:13.5px; font-weight:800; border:1.5px solid transparent}
.qr-servis.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}

/* Kategori ızgarası (2'li büyük kartlar) */
.qr-kat-baslik{font-size:20px; font-weight:800; padding:18px 18px 12px}
.qr-kat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 16px}
.qr-kat-kart{width:100%; padding:0; margin:0; box-sizing:border-box; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow); text-align:left; display:flex; flex-direction:column}
.qr-kat-kart:active{transform:scale(.97)}
.qkk-gorsel{width:100%; aspect-ratio:4/3; flex:0 0 auto; display:grid; place-items:center}
/* === ÜRÜN PUAN/YORUM === */
.yld{color:#d8d2c4} .yld.dolu{color:#f5a623}
.qr-puan-rozet{display:inline-flex; align-items:center; gap:3px; background:#fdeef0; color:#d8493f; border:none; border-radius:99px; padding:3px 10px; font-size:11.5px; font-weight:800; margin:3px 0 5px; cursor:pointer}
.qr-puan-rozet.bos{background:var(--surface-2); color:var(--ink-3); font-weight:700}
.qpr-yildiz{color:#f5a623}
.qpr-adet{font-weight:600; opacity:.8}
.qr-yorum-screen{background:var(--surface-2)}
.qr-yorum-top{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:var(--brand); color:#fff}
.qr-yorum-top .qr-close{background:rgba(255,255,255,.2); color:#fff}
.qr-yorum-baslik{font-size:17px; font-weight:800}
.qr-yorum-urunad{font-size:20px; font-weight:800; text-align:center; padding:18px 16px 14px}
.qr-yorum-ozet{display:flex; gap:18px; background:var(--surface); margin:0 14px; border-radius:16px; padding:18px; box-shadow:var(--shadow)}
.qyo-sol{text-align:center; display:flex; flex-direction:column; gap:3px; justify-content:center; min-width:90px}
.qyo-puan{font-size:38px; font-weight:800; line-height:1}
.qyo-yildiz{font-size:15px}
.qyo-adet{font-size:12px; color:var(--ink-3); font-weight:600}
.qyo-dagilim{flex:1; display:flex; flex-direction:column; gap:5px; justify-content:center}
.qyo-satir{display:flex; align-items:center; gap:8px; font-size:12px}
.qyo-y{color:#f5a623; font-weight:700; white-space:nowrap; min-width:26px}
.qyo-bar{flex:1; height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden}
.qyo-bar-dolu{height:100%; background:var(--brand); border-radius:99px}
.qyo-n{font-weight:700; color:var(--ink-2); min-width:14px; text-align:right}
.qr-yorum-bos{text-align:center; color:var(--ink-3); padding:40px 20px; font-size:14px}
.qr-yorum-liste{padding:16px 14px; display:flex; flex-direction:column; gap:10px}
.qr-yorum-kart{background:var(--surface); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow)}
.qyk-ust{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
.qyk-isim{font-weight:800; font-size:14px}
.qyk-yildiz{font-size:13px}
.qyk-metin{font-size:13.5px; color:var(--ink-2); line-height:1.5; margin-bottom:6px}
.qyk-tarih{font-size:11.5px; color:var(--ink-3); text-align:right}
.qr-yorum-ekle-btn{position:sticky; bottom:0; margin:14px; width:calc(100% - 28px); padding:16px; border-radius:14px; background:var(--brand); color:#fff; border:none; font-size:16px; font-weight:800; box-shadow:var(--shadow-lg)}
.qye-govde{padding:6px 16px; display:flex; flex-direction:column; gap:18px}
.qye-alan{display:flex; flex-direction:column; gap:8px}
.qye-alan label{font-size:13px; font-weight:800; color:var(--ink-2)}
.qye-yildiz-sec{display:flex; gap:6px; justify-content:center}
.qye-yld{font-size:38px; background:none; border:none; color:#d8d2c4; cursor:pointer; padding:0}
.qye-yld.on{color:#f5a623}
.qye-input,.qye-textarea{padding:13px 14px; border-radius:11px; border:1.5px solid var(--line); font-size:15px; background:var(--surface); font-family:inherit}
.qye-textarea{min-height:90px; resize:vertical}
.qye-bilgi{font-size:12.5px; color:var(--ink-3); background:var(--surface-2); padding:11px 13px; border-radius:10px; line-height:1.5}
/* Genel Fiyatlar: tavsiye + şube */
.fy-mudur-not{background:#fff7e6; border:1px solid #f0d9a8; color:#8a6212; padding:11px 14px; border-radius:11px; font-size:12.5px; line-height:1.5; margin-bottom:12px}
.fy-urun-kart{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px; box-shadow:var(--shadow)}
.fy-urun-bas{display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:10px; border-bottom:2px solid var(--surface-2)}
.fy-urun-bas .fy-emoji{font-size:24px}
.fy-urun-bas .fy-ad{font-size:17px; font-weight:800}
.fy-blok{background:var(--surface-2); border-radius:12px; padding:11px 13px; margin-bottom:9px}
.fy-blok.tavsiye-blok{background:var(--brand-soft); border:1px solid var(--brand)}
.fy-blok-bas{font-size:12.5px; font-weight:800; color:var(--ink-2); text-align:center; margin-bottom:9px; letter-spacing:.2px}
.fy-blok.tavsiye-blok .fy-blok-bas{color:var(--brand-d)}
.fy-blok-govde{display:flex; gap:10px}
.fyb-hucre{flex:1; display:flex; flex-direction:column; gap:6px; align-items:center; text-align:center}
.fyb-kanal-ad{font-size:11px; font-weight:800; color:var(--cocoa); letter-spacing:.3px}
.fyb-alt{display:flex; align-items:center; gap:7px; flex-wrap:wrap; justify-content:center}
.fyb-fiyat{font-size:15px; font-weight:800; color:var(--ink)}
.fyb-fiyat.tavsiye{color:var(--ink-3); font-weight:600}
.fyb-fiyat-btn{padding:6px 11px; border-radius:8px; background:var(--surface); border:1.5px solid var(--brand); color:var(--brand-d); font-size:14px; font-weight:800; cursor:pointer}
.fyb-fiyat-btn.tavsiye{border-color:var(--line); color:var(--ink-3); font-weight:600}
.fyb-durum{width:30px; min-width:30px; height:30px; border-radius:8px; border:none; font-size:14px; font-weight:900; cursor:pointer; display:inline-flex; align-items:center; justify-content:center}
.fyb-durum.acik{background:var(--ok-soft); color:var(--ok)}
.fyb-durum.kapali{background:var(--err-soft); color:var(--err)}
.fyb-durum.salt{cursor:default; opacity:.85}
.fyb-kapali-not{font-size:10px; color:var(--err); font-weight:700; text-align:center}
.fyb-fiyat.fy-dusuk,.fyb-fiyat.fy-yuksek{color:var(--err)}
.fyb-fiyat-btn.fy-dusuk,.fyb-fiyat-btn.fy-yuksek{color:var(--err); border-color:var(--err)}
.fyb-fark-not{font-size:10px; font-weight:800; text-align:center; padding:2px 7px; border-radius:99px; white-space:nowrap}
.fyb-fark-not.dusuk{color:var(--err); background:var(--err-soft)}
.fyb-fark-not.yuksek{color:#b06d10; background:#fff4e6}
/* === MASA NOT BÖLÜMÜ === */
.masa-not-blok{background:#fffaf0; border:1px solid #f0e2c8; border-radius:12px; padding:11px 13px; margin:10px 0}
.mnb-bas{font-size:12.5px; font-weight:800; color:var(--cocoa); margin-bottom:8px}
.mnb-say{background:var(--brand); color:#fff; border-radius:99px; padding:1px 7px; font-size:11px; margin-left:4px}
.mnb-liste{display:flex; flex-direction:column; gap:6px; margin-bottom:9px}
.mnb-not{display:flex; justify-content:space-between; align-items:center; background:var(--surface); border-radius:8px; padding:7px 11px; font-size:13px}
.mnb-not-metin{color:var(--ink)}
.mnb-not-sil{background:none; border:none; color:var(--err); font-size:13px; cursor:pointer; font-weight:800}
.mnb-ekle{display:flex; gap:7px}
.mnb-input{flex:1; padding:9px 12px; border-radius:9px; border:1.5px solid var(--line); font-size:13.5px}
.mnb-ekle-btn{width:42px; border-radius:9px; background:var(--brand); color:#fff; border:none; font-size:20px; font-weight:800; cursor:pointer}
.kmd-k-parcali{font-size:11.5px; font-weight:700; color:#b06d10; background:#fff4e6; padding:4px 9px; border-radius:7px; margin-top:4px; display:inline-block}
.kmd-k-parcali.tam{color:var(--ok); background:var(--ok-soft)}
/* === ÖDEME EKRANI (3 sütun) === */
.ode-ekran{display:flex; flex-direction:column; height:100%; min-height:0; gap:0}
.ode-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 16px; background:linear-gradient(135deg,var(--cocoa),#7d4a28); color:#fff; border-radius:14px; margin-bottom:10px}
.ode-geri,.ode-fis-yazdir{background:rgba(255,255,255,.18); color:#fff; border:none; padding:9px 14px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer}
.ode-baslik{font-size:16px; font-weight:800}
.ode-not-bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:#fffaf0; border:1px solid #f0e2c8; border-radius:11px; padding:9px 12px; margin-bottom:10px}
.ode-not-input{flex:1; min-width:160px; padding:8px 11px; border-radius:8px; border:1.5px solid var(--line); font-size:13px}
.ode-not-btn{padding:8px 14px; border-radius:8px; background:var(--brand); color:#fff; border:none; font-weight:700; cursor:pointer}
.ode-not-liste{display:flex; gap:6px; flex-wrap:wrap; width:100%}
.ode-not-cip{background:var(--surface); border:1px solid var(--line); border-radius:99px; padding:4px 11px; font-size:12px; display:flex; align-items:center; gap:6px}
.ode-not-cip button{background:none; border:none; color:var(--err); cursor:pointer; font-weight:800}
.ode-govde{display:grid; grid-template-columns:1.1fr 1.1fr 1fr; gap:12px; flex:1; min-height:0}
.ode-kol-bas{font-size:13px; font-weight:800; color:var(--cocoa); margin-bottom:10px; text-align:center; padding-bottom:8px; border-bottom:2px solid var(--surface-2)}
.ode-sol,.ode-orta,.ode-sag{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; display:flex; flex-direction:column; min-height:0}
.ode-sol{overflow-y:auto; overflow-x:hidden}
/* SOL: yöntemler */
.ode-ozet-kutu{background:var(--surface-2); border-radius:11px; padding:12px; margin-bottom:12px}
.ode-ozet-satir{display:flex; justify-content:space-between; font-size:13.5px; padding:3px 0; color:var(--ink-2)}
.ode-ozet-satir.ind{color:var(--err)}
.ode-ozet-satir.ana{font-size:17px; font-weight:800; color:var(--ink); border-top:1.5px dashed var(--line); margin-top:5px; padding-top:8px}
.ode-ind-btn{width:100%; padding:10px; border-radius:9px; background:#fff4e6; border:1px solid #f0d9a8; color:#8a6212; font-weight:700; font-size:13px; cursor:pointer; margin-bottom:12px}
.ode-yontem-liste{display:flex; flex-direction:column; gap:9px; margin-bottom:12px}
.ode-yontem-satir{display:flex; gap:9px; align-items:stretch; min-height:48px}
.ode-yontem-satir.aktif .ode-yontem-btn{border-color:var(--brand); background:var(--brand-soft)}
.ode-yontem-btn{flex:1; padding:12px 13px; border-radius:11px; background:var(--surface-2); border:1.5px solid var(--line); font-size:14.5px; font-weight:800; color:var(--ink); cursor:pointer; text-align:left; display:flex; align-items:center}
