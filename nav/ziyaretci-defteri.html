<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gönül Köprüsü - Ziyaretçi Defteri</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="components.css">
    <style>
        .defter-container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .input-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .yorum-kart { background: #f9f9f9; padding: 15px; border-left: 5px solid #8b4513; margin-bottom: 10px; border-radius: 4px; }
        .yorum-sahibi { font-weight: bold; color: #8b4513; display: block; }
        .yorum-sehir { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <div class="defter-container">
        <h2>🖋️ Gönül Köprüsü</h2>
        <p>Külliye yolculuğunuz hakkındaki düşüncelerinizi buraya bırakabilirsiniz.</p>

        <div class="yorum-form">
            <div class="input-group">
                <input type="text" id="userName" placeholder="Adınız Soyadınız">
            </div>
            <div class="input-group">
                <input type="text" id="userCity" placeholder="Şehriniz">
            </div>
            <div class="input-group">
                <textarea id="userMessage" rows="4" placeholder="Duygu ve düşünceleriniz..."></textarea>
            </div>
            <button id="btnGonder" class="btn">İzi Bırak ✨</button>
        </div>

        <hr>
        <h3>📜 Ziyaretçi Notları</h3>
        <div id="yorumlarListesi"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDXbfeuczA_aOJcB7YegqrGK29yaWHD-PM",
            authDomain: "edirnesaglikmuze.firebaseapp.com",
            projectId: "edirnesaglikmuze",
            storageBucket: "edirnesaglikmuze.firebasestorage.app",
            messagingSenderId: "707402210781",
            appId: "1:707402210781:web:fb65c71ca2557575e4aa34"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        document.getElementById('btnGonder').onclick = function() {
            const name = document.getElementById('userName').value.trim();
            const city = document.getElementById('userCity').value.trim();
            const msg  = document.getElementById('userMessage').value.trim();
            if (name && msg) {
                db.collection("ziyaretci_notlari").add({
                    isim: name, sehir: city || 'Belirtilmedi', mesaj: msg,
                    tarih: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => { alert("Duygularınız Gönül Köprüsü'ne eklendi!"); location.reload(); })
                  .catch(err => { alert('Hata: ' + err.message); });
            } else { alert("Lütfen isim ve mesaj alanını boş bırakmayın."); }
        };

        const liste = document.getElementById('yorumlarListesi');
        db.collection("ziyaretci_notlari").orderBy("tarih","desc").limit(20).get()
          .then(snap => {
              if (snap.empty) { liste.innerHTML='<p style="color:#999;font-style:italic">Henüz mesaj yok ✨</p>'; return; }
              snap.forEach(doc => {
                  const d = doc.data();
                  const div = document.createElement('div');
                  div.className = 'yorum-kart';
                  div.innerHTML = '<span class="yorum-sahibi">'+d.isim+' <span class="yorum-sehir">('+d.sehir+')</span></span><p>'+d.mesaj+'</p>';
                  liste.appendChild(div);
              });
          }).catch(err => { liste.innerHTML='<p style="color:red">Yüklenemedi: '+err.message+'</p>'; });
    </script>
</body>
</html>
