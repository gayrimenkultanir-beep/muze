<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Personel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* 🧭 header */
.header{
  padding:30px;
  text-align:center;
  font-size:28px;
  letter-spacing:1px;
}

/* 🧱 grid */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:25px;
  padding:30px;
}

/* 👤 kart */
.card{
  background:#1a1a1a;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
}

/* 🖼️ foto */
.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

/* 📄 bilgi */
.info{
  padding:15px;
}

.name{
  font-size:18px;
  font-weight:bold;
}

.role{
  font-size:14px;
  opacity:0.7;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="header">
  👤 Müze Personeli
</div>

<div class="container" id="personelList"></div>

<script>
const personel = [
  {
    name:"Ahmet Yılmaz",
    role:"Müze Müdürü",
    img:"images/personel/1.jpg"
  },
  {
    name:"Ayşe Demir",
    role:"Rehber",
    img:"images/personel/2.jpg"
  },
  {
    name:"Mehmet Kaya",
    role:"Araştırmacı",
    img:"images/personel/3.jpg"
  }
];

const container = document.getElementById("personelList");

personel.forEach(p => {

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${p.img}">
    <div class="info">
      <div class="name">${p.name}</div>
      <div class="role">${p.role}</div>
    </div>
  `;

  container.appendChild(div);

});
</script>

</body>
</html>
