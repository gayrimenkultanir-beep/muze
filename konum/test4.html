<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müze Navigasyon v2 PRO</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
background:black;
font-family:Arial;
}

#camera{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.55);
}

#ui{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

/* START */
#startBtn{
position:absolute;
z-index:20;
padding:14px 20px;
border:none;
border-radius:12px;
background:lime;
font-weight:bold;
font-size:16px;
}

/* RING */
.ring{
width:280px;
height:280px;
border-radius:50%;
border:2px solid rgba(0,255,200,0.25);
position:absolute;
transform-origin:center;
will-change:transform;
}

.arrow{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-bottom:40px solid red;
}

.center{
width:10px;
height:10px;
background:white;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* UI TEXT */
#status{
position:absolute;
bottom:90px;
color:white;
font-size:22px;
font-weight:bold;
text-shadow:0 0 10px black;
}

#dist{
position:absolute;
bottom:55px;
color:rgba(255,255,255,0.7);
font-size:14px;
}

#hint{
position:absolute;
bottom:25px;
color:rgba(255,255,255,0.5);
font-size:13px;
}

</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="ui">

<button id="startBtn">BAŞLAT</button>

<div class="ring" id="ring">
<div class="arrow"></div>
<div class="center"></div>
</div>

<div id="status">Hazır</div>
<div id="dist"></div>
<div id="hint"></div>

</div>

<script>

/* =========================
   🗺 ROUTE SYSTEM (MULTI POINT READY)
========================= */
const ROUTE = [
{
lat: 37.8596227,
lng: 27.2728099,
name: "Hedef Nokta"
}
];

let currentIndex = 0;

/* =========================
   🎯 TARGET
========================= */
function getTarget(){
return ROUTE[currentIndex];
}

/* =========================
   📷 CAMERA
========================= */
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>{
document.getElementById("camera").srcObject = s;
});

/* =========================
   🧠 MATH ENGINE
========================= */
const M = {

toRad:d=>d*Math.PI/180,
toDeg:r=>r*180/Math.PI,

bearing(lat1,lng1,lat2,lng2){
let dLng=this.toRad(lng2-lng1);

let y=Math.sin(dLng)*Math.cos(this.toRad(lat2));
let x=Math.cos(this.toRad(lat1))*Math.sin(this.toRad(lat2))-
Math.sin(this.toRad(lat1))*Math.cos(this.toRad(lat2))*Math.cos(dLng);

return (this.toDeg(Math.atan2(y,x))+360)%360;
},

distance(lat1,lng1,lat2,lng2){
const R=6371000;
let dLat=this.toRad(lat2-lat1);
let dLng=this.toRad(lng2-lng1);

let a=Math.sin(dLat/2)**2 +
Math.cos(this.toRad(lat1))*Math.cos(this.toRad(lat2))*
Math.sin(dLng/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
},

diff(a,b){
return ((b-a+540)%360)-180;
}

};

/* =========================
   📡 STATE
========================= */
let heading = 0;
let bearing = 0;
let smoothHeading = 0;

/* =========================
   🔥 FILTERS (PRO LEVEL)
========================= */
function smoothAngle(cur,target){

let d = M.diff(cur,target);

// hız limiti
const maxStep = 2.8;
d = Math.max(-maxStep,Math.min(maxStep,d));

// easing
return cur + d;
}

/* =========================
   🚀 START SYSTEM
========================= */
document.getElementById("startBtn").onclick = async ()=>{

document.getElementById("startBtn").style.display="none";

/* GPS permission */
navigator.geolocation.getCurrentPosition(()=>{});

/* compass permission */
if(typeof DeviceOrientationEvent.requestPermission==="function"){
await DeviceOrientationEvent.requestPermission().catch(()=>{});
}

startGPS();
startCompass();

};

/* =========================
   📍 GPS ENGINE (WITH ACCURACY FILTER)
========================= */
function startGPS(){

navigator.geolocation.watchPosition(pos=>{

if(pos.coords.accuracy > 25) return; // 🔥 FILTER

let t = getTarget();

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

bearing = M.bearing(lat,lng,t.lat,t.lng);

let dist = M.distance(lat,lng,t.lat,t.lng);

document.getElementById("dist").innerText =
"Mesafe: " + dist.toFixed(1) + " m";

/* ARRIVAL CHECK */
if(dist < 3){
document.getElementById("status").innerText = "📍 VARIŞ";
document.getElementById("status").style.color="lime";
return;
}

},{enableHighAccuracy:true});

}

/* =========================
   🧭 COMPASS ENGINE
========================= */
function startCompass(){

window.addEventListener("deviceorientation",e=>{

let h = e.alpha;
if(e.webkitCompassHeading) h = e.webkitCompassHeading;
if(h == null) return;

/* smooth drift fix */
smoothHeading = smoothAngle(smoothHeading,h);
heading = smoothHeading;

let diff = M.diff(heading,bearing);

/* rotate */
document.getElementById("ring").style.transform =
`rotate(${-diff}deg)`;

/* UI logic */
let status = document.getElementById("status");
let hint = document.getElementById("hint");

if(Math.abs(diff)<=10){
status.innerText="👉 İLERLEYİNİZ";
status.style.color="lime";
hint.innerText="";
}
else if(Math.abs(diff)<=25){
status.innerText="Yaklaştınız";
status.style.color="orange";

hint.innerText =
diff > 0 ? "➡ Sağa dön" : "⬅ Sola dön";
}
else{
status.innerText="Yön aranıyor...";
status.style.color="white";

hint.innerText =
diff > 0 ? "Sağa yönlen" : "Sola yönlen";
}

});

}

</script>

</body>
</html>
