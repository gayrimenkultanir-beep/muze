<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamera Navigasyon</title>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

/* Kamera */
#cam {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Üst bilgi */
#topBox {
  position:fixed;
  top:10%;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

#arrow {
  font-size:70px;
}

#text {
  font-size:20px;
  margin-top:5px;
}

#distance {
  font-size:16px;
  opacity:0.8;
}

/* Alt butonlar */
#controls {
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-around;
  z-index:10;
}

.btn {
  padding:15px 20px;
  border-radius:10px;
  background:rgba(0,0,0,0.5);
  color:white;
  font-size:16px;
  min-width:90px;
  text-align:center;
}

.active {
  background:#00c853;
}

.warn {
  background:#ff5252;
}

/* Bildirim */
#notify {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:black;
  color:white;
  padding:20px;
  border-radius:10px;
  display:none;
  z-index:20;
}
</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>

<div id="topBox">
  <div id="arrow"></div>
  <div id="text"></div>
  <div id="distance"></div>
</div>

<div id="controls">
  <div id="leftBtn" class="btn">Sola dön</div>
  <div id="okBtn" class="btn">Tamam</div>
  <div id="rightBtn" class="btn">Sağa dön</div>
</div>

<div id="notify">Şu an sunum odasındasınız</div>

<script>
// 📍 HEDEF
const TARGET = { lat: 37.8596296, lng: 27.2728122 };

// 📍 BAŞLANGIÇ
let userLat = 37.8595412;
let userLng = 27.2725581;

let heading = 0;
let arrived = false;

// 📷 Kamera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  document.getElementById("cam").srcObject = stream;
});

// 📍 Konum
navigator.geolocation.watchPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
});

// 🧭 Pusula
window.addEventListener("deviceorientationabsolute", e => {
  if (e.alpha !== null) heading = e.alpha;
});

// 📐 Bearing
function getBearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  const dLon = toRad(lon2 - lon1);

  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x =
    Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// 📏 Mesafe
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const toRad = d => d * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 🔄 fark
function getDiff(target, current) {
  let diff = target - current;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return diff;
}

// 🔄 ana loop
setInterval(() => {

  if (arrived) return;

  const bearing = getBearing(userLat, userLng, TARGET.lat, TARGET.lng);
  const diff = getDiff(bearing, heading);
  const dist = getDistance(userLat, userLng, TARGET.lat, TARGET.lng);

  const leftBtn = document.getElementById("leftBtn");
  const rightBtn = document.getElementById("rightBtn");
  const okBtn = document.getElementById("okBtn");

  // reset
  leftBtn.classList.remove("active");
  rightBtn.classList.remove("active");
  okBtn.classList.remove("active");

  let text = "";
  let arrow = "";

  if (Math.abs(diff) < 12) {
    okBtn.classList.add("active");
    text = "Doğru ilerleyin";
    arrow = "⬆️";
  } else if (diff > 12) {
    rightBtn.classList.add("active");
    text = "Sağa dön";
    arrow = "";
  } else {
    leftBtn.classList.add("active");
    text = "Sola dön";
    arrow = "";
  }

  document.getElementById("arrow").innerHTML = arrow;
  document.getElementById("text").innerHTML = text;
  document.getElementById("distance").innerHTML = Math.round(dist) + " metre";

  // 📍 varış
  if (dist < 6) {
    arrived = true;
    document.getElementById("notify").style.display = "block";
  }

}, 300);

</script>

</body>
</html>
