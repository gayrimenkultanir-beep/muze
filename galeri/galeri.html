<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel Galeri - Sultan II. Bayezid Külliyesi Sağlık Müzesi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #d4af37; 
            --dark: #0f1a24; 
            --parchment: #f4e7c8; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Playfair Display', serif;
            background: #fdf5e6 url("../assets/background.jpg") fixed center/cover;
            padding-top: 130px;
            color: #2b2b2b;
            overflow-x: hidden;
        }

        /* --- NAVİGASYON --- */
        .nav-wrapper { width: 100%; display: flex; justify-content: center; position: fixed; top: 0; left: 0; z-index: 2000; padding: 0 20px; }
        .nav { 
            width: 100%; max-width: 1240px; background: var(--dark); border: 2px solid var(--gold); border-top: none;
            color: var(--gold); display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 30px; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu-btn { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            cursor: pointer; padding: 8px 18px; font-family: 'Cinzel'; border-radius: 4px; 
        }

        #globalDropdown {
            display: none; position: absolute; right: 30px; top: calc(100% + 10px);
            background: var(--dark); border: 2px solid var(--gold); min-width: 260px;
            border-radius: 8px; z-index: 3000;
        }
        #globalDropdown.active { display: block; }
        .dropdown-link { display: block; padding: 12px 25px; color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 13px; border-bottom: 1px solid rgba(212,175,55,0.1); }

        /* --- GALERİ KARTLARI --- */
        .container { max-width: 1240px; margin: 0 auto 50px; padding: 0 20px; }
        .gallery-card {
            background: var(--parchment); border: 2px solid var(--gold);
            border-radius: 12px; margin-bottom: 60px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        .card-header { background: var(--dark); color: var(--gold); padding: 25px; text-align: center; font-family: 'Cinzel'; border-bottom: 2px solid var(--gold); }
        .card-body { padding: 40px 20px; text-align: center; }
        .category-desc { max-width: 850px; margin: 0 auto 30px; line-height: 1.8; font-size: 18px; font-style: italic; }

        /* --- SLIDER (3:2) --- */
        .slider-wrapper {
            position: relative; width: 100%; max-width: 900px; 
            margin: 0 auto; overflow: hidden; border: 8px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: #222;
            aspect-ratio: 3 / 2;
        }
        .slider-track { display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: zoom-in; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(15, 26, 36, 0.8); color: var(--gold);
            border: 1px solid var(--gold); width: 50px; height: 50px;
            cursor: pointer; font-size: 24px; z-index: 10; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        .image-counter { margin-top: 15px; font-family: 'Cinzel'; font-size: 14px; font-weight: bold; }

        /* --- TAM EKRAN LIGHTBOX (GELİŞTİRİLMİŞ) --- */
        .lightbox {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 9999; justify-content: center; align-items: center; 
        }
        .lightbox.active { display: flex; }
        
        /* Görselin Tam Ekran Boyutu ve 3:2 Sabitliği */
        .lb-content {
            position: relative;
            width: 95vw;
            height: calc(95vw * (2/3)); /* 3:2 oranını korur */
            max-width: calc(90vh * (3/2)); /* Yüksekliğe göre taşmayı önler */
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .lightbox-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 3:2 alanı içinde tam doluluk sağlar */
        }

        .close-lb { position: absolute; top: -50px; right: 0; color: #fff; font-size: 40px; cursor: pointer; font-family: 'Cinzel'; }
        
        .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.5);
            width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 30px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .lb-nav:hover { background: var(--gold); color: var(--dark); border-color: var(--gold); }
        .lb-prev { left: -80px; }
        .lb-next { right: -80px; }

        .lb-info { 
            position: absolute; bottom: -40px; left: 0; right: 0;
            color: var(--gold); font-family: 'Cinzel'; text-align: center; font-size: 16px;
        }

        @media (max-width: 1100px) {
            .lb-prev { left: 10px; }
            .lb-next { right: 10px; }
            .close-lb { top: 10px; right: 10px; z-index: 10001; }
        }

        .site-footer {
            background: var(--dark); color: var(--gold); text-align: center;
            padding: 40px; border: 2px solid var(--gold); border-radius: 15px;
            max-width: 1240px; margin: 0 auto 40px; font-family: 'Cinzel';
        }
    </style>
</head>
<body>

    <div class="nav-wrapper">
        <nav class="nav">
            <div class="logo">
                <div style="font-size:12px;">T.C. TRAKYA ÜNİVERSİTESİ</div>
                <div style="font-family:'Cinzel';">Sultan II. Bayezid Külliyesi Sağlık Müzesi</div>
            </div>
            <button class="menu-btn" id="menuBtn">MENÜ ☰</button>
            <div id="globalDropdown">
                <a href="../index.html" class="dropdown-link">Ana Sayfa</a>
                <a href="../galeri/galeri.html" class="dropdown-link">Görsel Galeri</a>
            </div>
        </nav>
    </div>

    <div class="container" style="margin-top: 50px;" id="galleryRoot"></div>

    <div class="container">
        <footer class="site-footer">
            <div>EDİRNE SAĞLIK MÜZESİ DİJİTAL ARŞİVİ</div>
            <p style="font-size: 11px; margin-top: 10px;">&copy; 2026 Tüm Hakları Saklıdır</p>
        </footer>
    </div>

    <div class="lightbox" id="lightbox">
        <div class="lb-content">
            <span class="close-lb" onclick="closeLB()">KAPAT ×</span>
            <button class="lb-nav lb-prev" onclick="changeLB(-1)">&#10094;</button>
            <img src="" class="lightbox-img" id="lbImg">
            <button class="lb-nav lb-next" onclick="changeLB(1)">&#10095;</button>
            <div class="lb-info" id="lbCounter"></div>
        </div>
    </div>

    <script>
        const categories = [
            "Tarihi Fotoğraflar", "Restorasyon Öncesi Görseller", "Genel Görüntüler",
            "Darüşşifa", "Medrese", "İmaret", 
            "Diğer Bölümler", "Gravür ve Minyatürler", "Ödüller"
        ];

        const description = "Görseller, sadece birer anı değil; 1488'den bugüne uzanan merhamet yolculuğunun görsel şahitleridir.";

        const galleryRoot = document.getElementById('galleryRoot');
        let currentPositions = new Array(categories.length).fill(0);

        categories.forEach((catName, catIdx) => {
            const card = document.createElement('div');
            card.className = 'gallery-card';

            let slidesHtml = '';
            for (let i = 1; i <= 20; i++) {
                // Windows Parantezli Format: cat_0_ (1).jpg
                const imgSrc = `../galeri/images/cat_${catIdx}_ (${i}).jpg`;
                slidesHtml += `
                    <div class="slide" onclick="openLB(${catIdx}, ${i-1})">
                        <img src="${imgSrc}" 
                             onerror="this.src='https://via.placeholder.com/900x600?text=${catName}+${i}'" 
                             alt="${catName}">
                    </div>`;
            }

            card.innerHTML = `
                <div class="card-header"><h2>${catIdx + 1}. ${catName.toUpperCase()}</h2></div>
                <div class="card-body">
                    <p class="category-desc">${description}</p>
                    <div class="slider-wrapper">
                        <button class="nav-btn prev-btn" onclick="moveSlider(${catIdx}, -1)">&#10094;</button>
                        <div class="slider-track" id="track-${catIdx}">
                            ${slidesHtml}
                        </div>
                        <button class="nav-btn next-btn" onclick="moveSlider(${catIdx}, 1)">&#10095;</button>
                    </div>
                    <div class="image-counter" id="count-${catIdx}">Görsel: 1 / 20</div>
                </div>
            `;
            galleryRoot.appendChild(card);
        });

        function moveSlider(catIdx, direction) {
            currentPositions[catIdx] += direction;
            if (currentPositions[catIdx] < 0) currentPositions[catIdx] = 19;
            if (currentPositions[catIdx] > 19) currentPositions[catIdx] = 0;
            const track = document.getElementById(`track-${catIdx}`);
            track.style.transform = `translateX(-${currentPositions[catIdx] * 100}%)`;
            document.getElementById(`count-${catIdx}`).innerText = `Görsel: ${currentPositions[catIdx] + 1} / 20`;
        }

        let activeCat = 0; let activeImg = 0;

        function openLB(catIdx, imgIdx) {
            activeCat = catIdx; activeImg = imgIdx;
            updateLB();
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLB() { 
            document.getElementById('lightbox').classList.remove('active'); 
            document.body.style.overflow = 'auto'; 
        }

        function changeLB(dir) {
            activeImg += dir;
            if (activeImg < 0) activeImg = 19;
            if (activeImg > 19) activeImg = 0;
            updateLB();
        }

        function updateLB() {
            const track = document.getElementById(`track-${activeCat}`);
            const slides = track.querySelectorAll('img');
            const lbImg = document.getElementById('lbImg');
            lbImg.src = slides[activeImg].src;
            document.getElementById('lbCounter').innerText = `${categories[activeCat]} - ${activeImg + 1} / 20`;
        }

        // Klavye desteği (Sağ-Sol Ok ve ESC)
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === "ArrowRight") changeLB(1);
            if (e.key === "ArrowLeft") changeLB(-1);
            if (e.key === "Escape") closeLB();
        });

        const menuBtn = document.getElementById('menuBtn');
        const dropdown = document.getElementById('globalDropdown');
        menuBtn.onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('active'); };
        window.onclick = () => dropdown.classList.remove('active');
    </script>
</body>
</html>
