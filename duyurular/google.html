<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu - Ok Tuşlu Slider</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }

        .announcement-block {
            background: white;
            border-radius: 16px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #e1e4e8;
        }

        /* SLIDER ALANI */
        .slider-container {
            width: 100%;
            height: 450px;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slider-wrapper img {
            min-width: 100%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* OK TUŞLARI */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            transition: 0.3s;
        }

        .nav-btn:hover { background: rgba(0, 0, 0, 0.7); }
        .prev-btn { left: 15px; }
        .next-btn { right: 15px; }

        /* Noktalar */
        .slider-dots {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.3);
        }

        .dot.active { background: #1a73e8; transform: scale(1.2); }

        .text-container { padding: 30px; }
        .date-text { color: #1a73e8; font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .title-text { font-size: 1.7rem; font-weight: 600; margin-bottom: 15px; color: #1a1a1a; }
        .details-text { color: #555; line-height: 1.8; white-space: pre-line; }

        @media (max-width: 600px) { .slider-container { height: 300px; } }
    </style>
</head>
<body>

<div class="container">
    <div id="feed-container">
        <p style="text-align:center;">Duyurular yükleniyor...</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';
    
    // Her bloğun o anki görsel indeksini tutan obje
    const sliderStates = {};

    function getThumbId(url) {
        if (!url || !url.includes('drive.google.com')) return null;
        let id = "";
        try {
            if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
            else id = url.split('/d/')[1].split('/')[0];
            return `https://lh3.googleusercontent.com/u/0/d/${id}`;
        } catch (e) { return null; }
    }

    // Gelişmiş Kaydırma Fonksiyonu
    function moveSlider(blockId, index, total) {
        // İndeksi sınırlar içinde tut (döngüsel slider)
        if (index >= total) index = 0;
        if (index < 0) index = total - 1;

        sliderStates[blockId] = index;
        
        const block = document.getElementById(`block-${blockId}`);
        const wrapper = block.querySelector('.slider-wrapper');
        const dots = block.querySelectorAll('.dot');
        
        wrapper.style.transform = `translateX(-${index * 100}%)`;
        
        dots.forEach((d, i) => {
            d.classList.toggle('active', i === index);
        });
    }

    Papa.parse(sheetCsvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            results.data.forEach((row, bId) => {
                const imgUrls = [
                    getThumbId(row['görsel1']),
                    getThumbId(row['görsel2']),
                    getThumbId(row['görsel3'])
                ].filter(u => u !== null);

                sliderStates[bId] = 0; // Başlangıç indeksi
                let sliderHtml = '';
                
                if (imgUrls.length > 0) {
                    let images = '';
                    let dots = '';
                    let navButtons = '';

                    imgUrls.forEach((src, i) => {
                        images += `<img src="${src}">`;
                        if (imgUrls.length > 1) {
                            dots += `<div class="dot ${i===0?'active':''}" onclick="moveSlider(${bId}, ${i}, ${imgUrls.length})"></div>`;
                        }
                    });

                    // Eğer birden fazla görsel varsa butonları ekle
                    if (imgUrls.length > 1) {
                        navButtons = `
                            <button class="nav-btn prev-btn" onclick="moveSlider(${bId}, sliderStates[${bId}] - 1, ${imgUrls.length})">&#10094;</button>
                            <button class="nav-btn next-btn" onclick="moveSlider(${bId}, sliderStates[${bId}] + 1, ${imgUrls.length})">&#10095;</button>
                        `;
                    }

                    sliderHtml = `
                        <div class="slider-container">
                            ${navButtons}
                            <div class="slider-wrapper">${images}</div>
                            <div class="slider-dots">${dots}</div>
                        </div>`;
                }

                container.innerHTML += `
                    <div class="announcement-block" id="block-${bId}">
                        ${sliderHtml}
                        <div class="text-container">
                            <span class="date-text">${row['tarih'] || ''}</span>
                            <div class="title-text">${row['duyuru metni'] || ''}</div>
                            <div class="details-text">${row['detaylar'] || ''}</div>
                        </div>
                    </div>`;
            });
        }
    });
</script>

</body>
</html>
