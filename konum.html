<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>II. Bayezid Külliyesi — Navigasyon</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8b6914;
    --cream: #f5ead8;
    --cream-dark: #e8d5b0;
    --ink: #1a1208;
    --ink-mid: #3d2b0e;
    --stone: #7a6645;
    --panel-bg: rgba(26, 18, 8, 0.92);
    --border: rgba(201, 168, 76, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
    background: var(--ink);
    font-family: 'Lora', Georgia, serif;
    color: var(--cream);
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }

  /* ── HEADER ── */
  #header {
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(26,18,8,0.98), rgba(61,43,14,0.95));
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  #header-text { flex: 1; min-width: 0; }

  #header-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(10px, 3vw, 14px);
    letter-spacing: 0.1em;
    color: var(--gold-light);
    text-shadow: 0 0 16px rgba(201,168,76,0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #header-sub {
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* Compass display top-right in header */
  #heading-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  #compass-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: rgba(26,18,8,0.8);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #compass-needle {
    width: 100%; height: 100%;
    position: absolute;
    top:0; left:0;
    transition: transform 0.3s ease;
    display: flex; align-items: center; justify-content: center;
  }

  #compass-needle svg { width: 28px; height: 28px; }

  #heading-val {
    font-size: 8px;
    color: var(--stone);
    letter-spacing: 0.1em;
    font-family: monospace;
  }

  #legend-btn {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 17px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── MAP AREA ── */
  #map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1a1208;
    min-height: 0;
  }

  /* The rotating map container — centered on user */
  #map-rotate-container {
    position: absolute;
    width: 100%; height: 100%;
    top: 0; left: 0;
    /* transform-origin is the user's screen position (center of wrap) */
    transform-origin: 50% 50%;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }

  /* The pan container — shifts map so user is centered */
  #map-pan-container {
    position: absolute;
    width: 1600px; height: 1720px; /* 2× SVG dimensions */
    transition: left 0.4s ease, top 0.4s ease;
    will-change: left, top;
  }

  #map-svg {
    width: 800px;
    height: 860px;
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  /* ── USER PIN — fixed at screen center ── */
  #user-pin {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -100%);
    display: none;
    pointer-events: none;
    z-index: 60;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.8));
  }

  #user-pin.visible { display: block; }

  /* Arrow-style user marker pointing up (direction of travel) */
  .pin-arrow {
    width: 0; height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 26px solid var(--gold);
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.8));
    margin: 0 auto;
    animation: arrowPulse 1.8s infinite;
  }

  .pin-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold-light);
    border: 2px solid var(--ink);
    margin: 2px auto 0;
    box-shadow: 0 0 10px rgba(201,168,76,0.9);
  }

  @keyframes arrowPulse {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(201,168,76,0.7)); }
    50% { filter: drop-shadow(0 0 18px rgba(201,168,76,1)); }
  }

  /* Accuracy ring */
  #acc-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.35);
    background: rgba(201,168,76,0.06);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 55;
    display: none;
    transition: width 0.5s ease, height 0.5s ease;
  }

  #acc-ring.visible { display: block; }

  /* ── HEADING ARROW on map (north indicator) ── */
  #north-indicator {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 70;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(26,18,8,0.88);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 11px;
    color: var(--gold);
    font-family: serif;
    flex-direction: column;
    gap: 0;
  }

  #north-indicator .n-letter {
    font-size: 9px;
    color: var(--gold);
    line-height: 1;
    font-family: 'Cinzel Decorative', serif;
  }

  #north-indicator .n-arrow {
    font-size: 14px;
    line-height: 1;
    transition: transform 0.35s ease;
  }

  /* ── BOTTOM PANEL ── */
  #bottom-panel {
    flex-shrink: 0;
    background: linear-gradient(to top, rgba(26,18,8,0.99), rgba(26,18,8,0.95));
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    z-index: 100;
  }

  #location-card {
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    margin-bottom: 9px;
    min-height: 60px;
  }

  #location-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--stone);
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  #location-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(11px, 3.5vw, 15px);
    color: var(--gold-light);
    line-height: 1.3;
    transition: all 0.4s ease;
  }

  #location-name.outside {
    color: var(--stone);
    font-size: 12px;
    font-family: 'Lora', serif;
    font-style: italic;
  }

  #location-desc {
    font-size: 10px;
    color: var(--cream-dark);
    margin-top: 3px;
    opacity: 0.8;
    font-style: italic;
    line-height: 1.4;
  }

  /* ── CONTROLS ── */
  #controls {
    display: flex;
    gap: 9px;
    align-items: center;
  }

  #locate-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 10px;
    padding: 12px 10px;
    font-family: 'Lora', serif;
    font-size: clamp(12px, 3.5vw, 14px);
    color: var(--ink);
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 4px 18px rgba(201,168,76,0.3);
    -webkit-appearance: none;
    transition: all 0.2s ease;
  }

  #locate-btn:active { transform: scale(0.97); opacity: 0.9; }

  #locate-btn.tracking {
    background: linear-gradient(135deg, #1a4a2a, #2d7a4a);
    color: var(--cream);
    box-shadow: 0 4px 18px rgba(45,122,74,0.4);
  }

  #orient-btn {
    flex-shrink: 0;
    width: 46px; height: 46px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    font-size: 19px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-appearance: none;
    transition: all 0.2s ease;
  }

  #orient-btn:active { transform: scale(0.95); }
  #orient-btn.active { background: rgba(201,168,76,0.25); border-color: var(--gold); }

  #sound-btn {
    flex-shrink: 0;
    width: 46px; height: 46px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    font-size: 19px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-appearance: none;
    transition: all 0.2s ease;
  }

  #sound-btn:active { transform: scale(0.95); }
  #sound-btn.muted { color: var(--stone); background: rgba(122,102,69,0.1); }

  /* ── GPS STATUS ── */
  #gps-status {
    font-size: 9px;
    color: var(--stone);
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.06em;
    min-height: 12px;
  }

  /* ── SVG STYLES ── */
  .area-poly {
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .area-poly.active {
    stroke-width: 3 !important;
  }

  .area-label {
    font-family: 'Lora', serif;
    font-size: 9px;
    fill: rgba(255,240,200,0.9);
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.7);
    stroke-width: 2px;
  }

  /* ── LEGEND ── */
  #legend {
    position: absolute;
    top: 8px;
    left: 8px;
    z-index: 200;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: none;
    min-width: 170px;
    max-height: 55vh;
    overflow-y: auto;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  #legend.open { display: block; }

  .legend-title {
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    font-size: 11px;
    color: var(--cream-dark);
    cursor: pointer;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }

  .legend-item:last-child { border-bottom: none; }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 75px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,18,8,0.96);
    border: 1px solid var(--gold-dark);
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 11px;
    color: var(--gold-light);
    z-index: 500;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    max-width: 88vw;
    text-align: center;
  }

  #toast.show { opacity: 1; }

  /* Mode indicator badge */
  #mode-badge {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,18,8,0.85);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px 12px;
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    z-index: 65;
    white-space: nowrap;
  }
</style>
</head>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-text">
      <div id="header-title">II. Bayezid Külliyesi</div>
      <div id="header-sub">Edirne · Navigasyon</div>
    </div>
    <div id="heading-display">
      <div id="compass-ring">
        <div id="compass-needle">

            <!-- North red -->

            <!-- South white -->
            <polygon points="14,26 17,14 14,16 11,14" fill="rgba(201,168,76,0.5)"/>
          </svg>
        </div>
      </div>
      <div id="heading-val">—°</div>
    </div>
    <button id="legend-btn" onclick="toggleLegend()">⊞</button>
  </div>

  <!-- MAP -->
  <div id="map-wrap" id="map-wrap">

    <!-- Accuracy ring (fixed at center) -->
    <div id="acc-ring"></div>

    <!-- North indicator (top-right of map) -->
    <div id="north-indicator" onclick="recenterNorth()" title="Kuzeye kilitle">
      <span class="n-letter">K</span>
      <span class="n-arrow" id="north-arrow">↑</span>
    </div>

    <!-- Legend dropdown -->
    <div id="legend"></div>

    <!-- Mode badge -->
    <div id="mode-badge">Haritaya dokun → simüle et</div>

    <!-- Rotating map container -->
    <div id="map-rotate-container">
      <!-- Panning container (moves to center user) -->
      <div id="map-pan-container">
        <svg id="map-svg" viewBox="0 0 800 860" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <pattern id="bg-pattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
              <rect width="30" height="30" fill="#1a1208"/>
              <circle cx="15" cy="15" r="0.4" fill="rgba(201,168,76,0.12)"/>
            </pattern>
          </defs>
          <rect width="800" height="860" fill="url(#bg-pattern)"/>
          <g id="polygons-layer"></g>
          <g id="labels-layer"></g>

          <!-- Scale bar -->
          <g transform="translate(30,820)">
            <line x1="0" y1="0" x2="80" y2="0" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
            <line x1="0" y1="-4" x2="0" y2="4" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
            <line x1="80" y1="-4" x2="80" y2="4" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
            <text x="40" y="-8" text-anchor="middle" font-size="9" fill="rgba(201,168,76,0.6)" font-family="serif">~50m</text>
          </g>
        </svg>
      </div>
    </div>

    <!-- User arrow — always at screen center -->
    <div id="user-pin">
      <div class="pin-arrow"></div>
      <div class="pin-dot"></div>
    </div>

  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom-panel">
    <div id="location-card">
      <div id="location-label">📍 Bulunduğunuz Alan</div>
      <div id="location-name" class="outside">Haritaya dokunarak keşfedin</div>
      <div id="location-desc"></div>
    </div>
    <div id="controls">
      <button id="locate-btn" onclick="startTracking()">
        <span>◎</span> Konumumu Göster
      </button>
      <button id="orient-btn" onclick="toggleOrientMode()" title="Yön kilidi">🧭</button>
      <button id="sound-btn" onclick="toggleSound()">🔊</button>
    </div>
    <div id="gps-status"></div>
  </div>

</div>

<div id="toast"></div>

// ══════════════════════════════════════
// PROJECTION
// ══════════════════════════════════════
let allLats = [], allLons = [];
RAW_ZONES.forEach(z => z.coords.forEach(([lat, lon]) => {
  allLats.push(lat); allLons.push(lon);
}));

const minLat = Math.min(...allLats), maxLat = Math.max(...allLats);
const minLon = Math.min(...allLons), maxLon = Math.max(...allLons);
const SVG_W = 800, SVG_H = 860;
const PAD_X = 55, PAD_TOP = 80, PAD_BOT = 55;

function geoToSVG(lat, lon) {
  const x = PAD_X + (lon - minLon) / (maxLon - minLon) * (SVG_W - 2 * PAD_X);
  const y = PAD_TOP + (1 - (lat - minLat) / (maxLat - minLat)) * (SVG_H - PAD_TOP - PAD_BOT);
  return [x, y];
}

// ══════════════════════════════════════
// CONVEX HULL + BUILD ZONES
// ══════════════════════════════════════
function convexHull(pts) {
  const p = [...pts].sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  const cross = (O,A,B) => (A[0]-O[0])*(B[1]-O[1]) - (A[1]-O[1])*(B[0]-O[0]);
  const lo = [], hi = [];
  for (const q of p) {
    while (lo.length >= 2 && cross(lo[lo.length-2], lo[lo.length-1], q) <= 0) lo.pop();
    lo.push(q);
  }
  for (let i = p.length-1; i >= 0; i--) {
    const q = p[i];
    while (hi.length >= 2 && cross(hi[hi.length-2], hi[hi.length-1], q) <= 0) hi.pop();
    hi.push(q);
  }
  hi.pop(); lo.pop();
  return lo.concat(hi);
}

function shrink(pts, f=0.02) {
  const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const cy = pts.reduce((s,p)=>s+p[1],0)/pts.length;
  return pts.map(([x,y]) => [cx+(x-cx)*(1-f), cy+(y-cy)*(1-f)]);
}

const ZONES = RAW_ZONES.map(zone => {
  const raw = zone.coords.map(([lat,lon]) => geoToSVG(lat, lon));
  const hull = convexHull(raw);
  const svgPts = shrink(hull, 0.02);
  const cx = svgPts.reduce((s,p)=>s+p[0],0)/svgPts.length;
  const cy = svgPts.reduce((s,p)=>s+p[1],0)/svgPts.length;
  return { ...zone, svgPts, cx, cy };
});

// ══════════════════════════════════════
// RENDER SVG ZONES
// ══════════════════════════════════════
const polyLayer = document.getElementById('polygons-layer');
const labelLayer = document.getElementById('labels-layer');

ZONES.forEach(zone => {
  const pts = zone.svgPts.map(p => p.join(',')).join(' ');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', zone.fill);
  poly.setAttribute('stroke', zone.color);
  poly.setAttribute('stroke-width', '1.8');
  poly.setAttribute('stroke-linejoin', 'round');
  poly.setAttribute('class', 'area-poly');
  poly.setAttribute('id', 'poly-' + zone.id);
  poly.addEventListener('click', () => showZoneInfo(zone));
  polyLayer.appendChild(poly);

  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x', zone.cx);
  lbl.setAttribute('y', zone.cy);
  lbl.setAttribute('class', 'area-label');
  lbl.textContent = zone.name;
  labelLayer.appendChild(lbl);
});

// ══════════════════════════════════════
// LEGEND
// ══════════════════════════════════════
const legendEl = document.getElementById('legend');
legendEl.innerHTML = `<div class="legend-title">Bölümler</div>` +
  ZONES.map(z => `<div class="legend-item" onclick="focusZone('${z.id}')">
    <div class="legend-dot" style="background:${z.fill};border:1px solid ${z.color}"></div>
    <span>${z.name}</span>
  </div>`).join('');

function toggleLegend() { legendEl.classList.toggle('open'); }
function focusZone(id) {
  const zone = ZONES.find(z => z.id === id);
  if (zone) showZoneInfo(zone);
  legendEl.classList.remove('open');
}

document.getElementById('map-wrap').addEventListener('click', (e) => {
  if (!e.target.closest('#legend') && !e.target.closest('#legend-btn')) {
    legendEl.classList.remove('open');
  }
});

// ══════════════════════════════════════
// POINT IN POLYGON
// ══════════════════════════════════════
function pointInPolygon(lat, lon, zone) {
  const [px, py] = geoToSVG(lat, lon);
  const poly = zone.svgPts;
  let inside = false;
  for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
    const [xi,yi] = poly[i], [xj,yj] = poly[j];
    if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}

function findZone(lat, lon) {
  return ZONES.find(z => pointInPolygon(lat, lon, z)) || null;
}

// ══════════════════════════════════════
// NAVIGATION STATE
// ══════════════════════════════════════
let currentHeading = 0;     // degrees, 0=north, clockwise
let currentSVGX = null;     // user position in SVG coords
let currentSVGY = null;
let orientMode = true;      // true = rotate map to heading
let isTracking = false;
let watchId = null;
let lastLat = null, lastLon = null;
let lastSpoken = '';
let soundEnabled = true;

// Smoothed heading (for movement-based heading)
let smoothedHeading = 0;
let deviceHeadingAvailable = false;

// ══════════════════════════════════════
// MAP ROTATION & PAN
// ══════════════════════════════════════
function applyMapTransform() {
  const wrap = document.getElementById('map-wrap');
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;

  const rotContainer = document.getElementById('map-rotate-container');
  const panContainer = document.getElementById('map-pan-container');

  // SVG is 800×860 — scale to fit wrap width
  const svgScale = wrapW / SVG_W;

  // Pan: position the SVG so user position is at screen center
  if (currentSVGX !== null && currentSVGY !== null) {
    const targetLeft = wrapW / 2 - currentSVGX * svgScale;
    const targetTop  = wrapH / 2 - currentSVGY * svgScale;
    panContainer.style.left = targetLeft + 'px';
    panContainer.style.top  = targetTop  + 'px';
  } else {
    // Default: center the whole map
    const totalW = SVG_W * svgScale;
    const totalH = SVG_H * svgScale;
    panContainer.style.left = (wrapW - totalW) / 2 + 'px';
    panContainer.style.top  = (wrapH - totalH) / 2 + 'px';
  }

  // Scale the SVG element
  document.getElementById('map-svg').style.width  = SVG_W * svgScale + 'px';
  document.getElementById('map-svg').style.height = SVG_H * svgScale + 'px';

  // Rotate the whole container around screen center (user position)
  const rotation = orientMode ? -currentHeading : 0;
  rotContainer.style.transform = `rotate(${rotation}deg)`;
  rotContainer.style.transformOrigin = `${wrapW/2}px ${wrapH/2}px`;

  // North indicator arrow: counter-rotate to show true north direction
  const northAngle = orientMode ? currentHeading : 0;
  document.getElementById('north-indicator').style.transform = 
    orientMode ? `rotate(0deg)` : `rotate(0deg)`;
  
  // Compass needle in header: always shows absolute heading
  document.getElementById('compass-needle').style.transform = `rotate(${currentHeading}deg)`;
  document.getElementById('heading-val').textContent = Math.round(currentHeading) + '°';

  // North arrow in map shows where north is relative to current map orientation
  document.getElementById('north-arrow').style.transform = 
    orientMode ? `rotate(${currentHeading}deg)` : `rotate(0deg)`;
}

// ══════════════════════════════════════
// SMOOTH HEADING INTERPOLATION
// ══════════════════════════════════════
function lerpAngle(from, to, t) {
  let diff = ((to - from + 540) % 360) - 180;
  return (from + diff * t + 360) % 360;
}

function setHeading(deg) {
  currentHeading = lerpAngle(currentHeading, deg, 0.25);
  applyMapTransform();
}

// ══════════════════════════════════════
// DEVICE ORIENTATION (compass)
// ══════════════════════════════════════
function initDeviceOrientation() {
  // iOS 13+ needs permission
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') listenOrientation();
        else showToast('Pusula izni verilmedi — hareket yönü kullanılacak');
      })
      .catch(() => showToast('Pusula erişim hatası'));
  } else if (typeof DeviceOrientationEvent !== 'undefined') {
    listenOrientation();
  } else {
    showToast('Bu cihazda pusula sensörü yok — hareket yönü kullanılacak');
  }
}

function listenOrientation() {
  let hasWebkitCompass = false;
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', (e) => {
    if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
      hasWebkitCompass = true;
      handleWebkitCompass(e);
    } else if (!hasWebkitCompass) {
      handleOrientation(e);
    }
  }, true);
}

function handleWebkitCompass(e) {
  deviceHeadingAvailable = true;
  const heading = e.webkitCompassHeading || 0;
  setHeading(heading);
}

function handleOrientation(e) {
  if (e.absolute && e.alpha !== null) {
    deviceHeadingAvailable = true;
    // Convert alpha/beta/gamma to compass heading
    const alpha = e.alpha || 0;
    const heading = (360 - alpha) % 360;
    setHeading(heading);
  }
}

// ══════════════════════════════════════
// MOVEMENT-BASED HEADING (GPS)
// ══════════════════════════════════════
function calcBearing(lat1, lon1, lat2, lon2) {
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ══════════════════════════════════════
// GPS POSITION
// ══════════════════════════════════════
function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  
  // Native heading from GPS (if available and reliable)
  if (pos.coords.heading !== null && pos.coords.heading !== undefined &&
      !isNaN(pos.coords.heading) && pos.coords.speed > 0.3) {
    if (!deviceHeadingAvailable) {
      setHeading(pos.coords.heading);
    }
  }

  // Movement-based bearing
  if (lastLat !== null && !deviceHeadingAvailable) {
    const dist = Math.sqrt(
      Math.pow((lat - lastLat) * 111320, 2) +
      Math.pow((lon - lastLon) * 111320 * Math.cos(lat * Math.PI/180), 2)
    );
    if (dist > 0.5) { // only if moved > 0.5m
      const bearing = calcBearing(lastLat, lastLon, lat, lon);
      setHeading(bearing);
    }
  }

  lastLat = lat; lastLon = lon;

  // Update SVG position
  const [svgX, svgY] = geoToSVG(lat, lon);
  currentSVGX = svgX;
  currentSVGY = svgY;

  // Accuracy ring size
  const wrap = document.getElementById('map-wrap');
  const svgScale = wrap.clientWidth / SVG_W;
  const metersPerSVGUnit = (maxLat - minLat) * 111320 / (SVG_H - PAD_TOP - PAD_BOT);
  const ringPx = (acc / metersPerSVGUnit) * svgScale;
  const ring = document.getElementById('acc-ring');
  ring.style.width  = ringPx * 2 + 'px';
  ring.style.height = ringPx * 2 + 'px';
  ring.classList.add('visible');

  applyMapTransform();

  const zone = findZone(lat, lon);
  updateLocationDisplay(zone);

  const accText = acc < 10 ? '✦ Mükemmel GPS' : acc < 20 ? '✦ İyi GPS' : acc < 50 ? '◇ Orta GPS' : '○ Zayıf GPS';
  document.getElementById('gps-status').textContent = `${accText} · ±${Math.round(acc)}m · ${Math.round(currentHeading)}°`;
}

function onError(err) {
  let msg = 'Konum alınamadı';
  if (err.code === 1) msg = 'Konum izni verilmedi';
  else if (err.code === 2) msg = 'GPS sinyali alınamıyor';
  else if (err.code === 3) msg = 'Zaman aşımı — tekrar deneyin';
  document.getElementById('gps-status').textContent = msg;
  showToast(msg);
}

// ══════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════
function startTracking() {
  if (isTracking) { stopTracking(); return; }
  if (!navigator.geolocation) { showToast('Tarayıcınız konum desteklemiyor'); return; }

  document.getElementById('gps-status').textContent = 'GPS sinyali aranıyor…';
  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true, timeout: 15000, maximumAge: 1000
  });
  isTracking = true;

  const btn = document.getElementById('locate-btn');
  btn.classList.add('tracking');
  btn.innerHTML = '<span>◉</span> Takip Aktif';

  document.getElementById('user-pin').classList.add('visible');
  document.getElementById('mode-badge').textContent = 'GPS takibi aktif';

  // Request compass permission on iOS
  initDeviceOrientation();

  speak('Konum takibi başladı. Külliye içinde ilerlediğinizde harita yönünüze göre döner.');
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  isTracking = false;
  const btn = document.getElementById('locate-btn');
  btn.classList.remove('tracking');
  btn.innerHTML = '<span>◎</span> Konumumu Göster';
  document.getElementById('user-pin').classList.remove('visible');
  document.getElementById('acc-ring').classList.remove('visible');
  document.getElementById('gps-status').textContent = 'Takip durduruldu';
  document.getElementById('mode-badge').textContent = 'Haritaya dokun → simüle et';
  currentSVGX = null; currentSVGY = null;
  currentHeading = 0;
  applyMapTransform();
}

function toggleOrientMode() {
  orientMode = !orientMode;
  const btn = document.getElementById('orient-btn');
  btn.classList.toggle('active', orientMode);
  showToast(orientMode ? 'Yön kilidi açık — harita döner' : 'Yön kilidi kapalı — harita sabit');
  applyMapTransform();
}

function recenterNorth() {
  if (orientMode) {
    orientMode = false;
    document.getElementById('orient-btn').classList.remove('active');
    showToast('Kuzey yukarı — yön kilidi kapalı');
  } else {
    orientMode = true;
    document.getElementById('orient-btn').classList.add('active');
    showToast('Yön kilidi açık');
  }
  applyMapTransform();
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
  showToast(soundEnabled ? 'Sesli rehber açık' : 'Sesli rehber kapalı');
}

// ══════════════════════════════════════
// SPEECH
// ══════════════════════════════════════
function speak(text) {
  if (!soundEnabled || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'tr-TR'; utt.rate = 0.9; utt.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const trVoice = voices.find(v => v.lang.startsWith('tr'));
  if (trVoice) utt.voice = trVoice;
  window.speechSynthesis.speak(utt);
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
}

// ══════════════════════════════════════
// UI ZONE DISPLAY
// ══════════════════════════════════════
function showZoneInfo(zone) { setActiveZone(zone); }

function setActiveZone(zone) {
  document.querySelectorAll('.area-poly').forEach(p => {
    p.setAttribute('stroke-width','1.8');
    p.style.filter = '';
    p.classList.remove('active');
  });
  if (zone) {
    document.getElementById('location-name').className = '';
    document.getElementById('location-name').textContent = zone.name;
    document.getElementById('location-desc').textContent = zone.desc;
    const poly = document.getElementById('poly-' + zone.id);
    if (poly) {
      poly.setAttribute('stroke-width','3');
      poly.style.filter = 'url(#glow)';
      poly.classList.add('active');
    }
  } else {
    document.getElementById('location-name').className = 'outside';
    document.getElementById('location-name').textContent = 'Külliye alanı dışındasınız';
    document.getElementById('location-desc').textContent = 'Lütfen külliye sınırları içine giriniz.';
  }
}

function updateLocationDisplay(zone) {
  setActiveZone(zone);
  if (zone && lastSpoken !== zone.id) {
    lastSpoken = zone.id;
    setTimeout(() => speak(`Şu an ${zone.announce}`), 300);
  } else if (!zone && lastSpoken !== 'outside') {
    lastSpoken = 'outside';
  }
}

// ══════════════════════════════════════
// SIMULATION — tap on map when not tracking
// ══════════════════════════════════════
let simHeading = 0;
let lastSimX = null, lastSimY = null;

document.getElementById('map-wrap').addEventListener('click', (e) => {
  if (isTracking) return;
  if (e.target.closest('#legend') || e.target.closest('#legend-btn') ||
      e.target.closest('#north-indicator')) return;

  const wrap = document.getElementById('map-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const clickX = e.clientX - wrapRect.left;
  const clickY = e.clientY - wrapRect.top;
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;

  // Convert screen click → SVG coords (accounting for rotation & pan)
  const svgScale = wrapW / SVG_W;

  // Undo rotation
  const cx = wrapW / 2, cy = wrapH / 2;
  const rad = currentHeading * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  const dx = clickX - cx, dy = clickY - cy;
  const unrotX = cx + dx * cos + dy * sin;
  const unrotY = cy - dx * sin + dy * cos;

  // Undo pan
  const panLeft = parseFloat(document.getElementById('map-pan-container').style.left || '0');
  const panTop  = parseFloat(document.getElementById('map-pan-container').style.top  || '0');
  const svgX = (unrotX - panLeft) / svgScale;
  const svgY = (unrotY - panTop)  / svgScale;

  // SVG → geo
  const lon = minLon + (svgX - PAD_X) / (SVG_W - 2*PAD_X) * (maxLon - minLon);
  const lat = minLat + (1 - (svgY - PAD_TOP) / (SVG_H - PAD_TOP - PAD_BOT)) * (maxLat - minLat);

  // Compute movement heading
  if (lastSimX !== null) {
    const distX = svgX - lastSimX;
    const distY = svgY - lastSimY;
    if (Math.abs(distX) > 2 || Math.abs(distY) > 2) {
      // In SVG: up = north, right = east
      // heading = atan2(east, north) = atan2(distX, -distY)
      const heading = (Math.atan2(distX, -distY) * 180 / Math.PI + 360) % 360;
      simHeading = heading;
      setHeading(simHeading);
    }
  }

  lastSimX = svgX;
  lastSimY = svgY;

  currentSVGX = svgX;
  currentSVGY = svgY;

  document.getElementById('user-pin').classList.add('visible');
  document.getElementById('mode-badge').textContent = `Simülasyon · ${Math.round(currentHeading)}°`;

  applyMapTransform();

  const zone = findZone(lat, lon);
  updateLocationDisplay(zone);
  document.getElementById('gps-status').textContent =
    `Simülasyon · ${lat.toFixed(5)}, ${lon.toFixed(5)} · ${Math.round(currentHeading)}°`;
});

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
window.addEventListener('resize', () => {
  if (currentSVGX !== null) applyMapTransform();
});

// Orient mode ON by default
document.getElementById('orient-btn').classList.add('active');

// Initial render (north up, centered)
applyMapTransform();
