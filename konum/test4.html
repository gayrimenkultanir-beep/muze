<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hassas Navigasyon: Sunum Odası</title>
    <style>
        :root { --aligned: #00ffc8; --near: #ffae00; --far: #ff4d4d; }
        body { margin: 0; height: 100vh; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        
        #camera { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        
        #ui { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        
        /* HİZALAMA İKONU */
        #target-icon {
            position: absolute; top: 12%; width: 110px; height: 110px;
            background: rgba(0, 255, 200, 0.15); border: 4px solid var(--aligned);
            border-radius: 25px; display: flex; align-items: center; justify-content: center;
            font-size: 55px; opacity: 0; transform: scale(0.6);
            transition: all 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.3);
            box-shadow: 0 0 40px var(--aligned); backdrop-filter: blur(8px);
        }
        #target-icon.active { opacity: 1; transform: scale(1); }

        /* PUSULA */
        .compass-wrap { position: relative; width: 300px; height: 300px; }
        .ring { position: absolute; inset: 0; border: 5px solid rgba(255,255,255,0.1); border-radius: 50%; transition: all 0.4s; }
        .inner-compass { width: 100%; height: 100%; position: absolute; transition: transform 0.6s cubic-bezier(0.1, 0.3, 0.2, 1); }
        #arrow { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 55px solid #666; transition: border-bottom-color 0.4s; }

        /* HUD PANEL */
        #hud { position: absolute; bottom: 40px; width: 85%; background: rgba(0,0,0,0.7); padding: 25px; border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(12px); }
        #status { font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        #dist { font-size: 22px; color: var(--aligned); margin-top: 10px; font-family: 'Courier New', monospace; }
        #gps-info { font-size: 10px; opacity: 0.5; margin-top: 8px; }

        /* OVERLAY */
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn { padding: 20px 60px; font-size: 22px; background: var(--aligned); border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: black; box-shadow: 0 10px 30px rgba(0,255,200,0.4); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="margin-bottom: 5px; color: var(--aligned);">HASSAS RADAR</h1>
    <p style="opacity: 0.6; margin-bottom: 35px;">Hedef: Sunum Odası</p>
    <button class="btn" onclick="init()">NAVİGASYONU AÇ</button>
</div>

<video id="camera" autoplay playsinline></video>

<div id="ui">
    <div id="target-icon">🚪</div>
    <div class="compass-wrap">
        <div id="status-ring" class="ring"></div>
        <div id="compass" class="inner-compass">
            <div id="arrow"></div>
        </div>
    </div>

    <div id="hud">
        <div id="status">BAĞLANILIYOR...</div>
        <div id="dist">0.0 m</div>
        <div id="gps-info">Doğruluk: Hesaplanıyor...</div>
    </div>
</div>

<script>
// SUNUM ODASI KOORDİNATLARI
const TARGET = { lat: 37.8596227, lng: 27.2728099 };

let state = { heading: 0, bearing: 0, dist: 0, accuracy: 0 };

async function init() {
    document.getElementById("start-screen").style.display = "none";

    // 1. Kamera Başlat
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    document.getElementById("camera").srcObject = stream;

    // 2. GPS Başlat (Zorunlu Yüksek Hassasiyet)
    navigator.geolocation.watchPosition(updatePos, handleError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
    });

    // 3. Sensör Başlat
    if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') window.addEventListener("deviceorientation", handleCompass);
        } else {
            window.addEventListener("deviceorientation", handleCompass);
        }
    }
}

function updatePos(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    state.accuracy = pos.coords.accuracy;

    // Gerçek Mesafe Hesaplama (Küresel Kosinüs Yasası)
    state.dist = getPreciseDistance(lat, lng, TARGET.lat, TARGET.lng);
    
    // Gerçek İstikamet Açısı
    state.bearing = getBearing(lat, lng, TARGET.lat, TARGET.lng);
    
    document.getElementById("gps-info").innerText = `GPS Hassasiyeti: ±${state.accuracy.toFixed(1)} metre`;
    updateUI();
}

function handleCompass(e) {
    // Android/iOS evrensel pusula verisi
    let heading = e.webkitCompassHeading || (360 - e.alpha);
    if (heading === undefined) return;

    // Damping (Yumuşatma) katsayısını 0.08'e çektim (Daha hızlı tepki için)
    state.heading = state.heading + (heading - state.heading) * 0.08;
    updateUI();
}

function updateUI() {
    // Yön farkını hesapla
    let diff = (state.bearing - state.heading + 540) % 360 - 180;
    const absDiff = Math.abs(diff);

    const compass = document.getElementById("compass");
    const arrow = document.getElementById("arrow");
    const ring = document.getElementById("status-ring");
    const status = document.getElementById("status");
    const distEl = document.getElementById("dist");
    const icon = document.getElementById("target-icon");

    compass.style.transform = `rotate(${diff}deg)`;

    // Dinamik Durumlar
    if (absDiff < 12) {
        applyStyle("var(--aligned)", "TAM İSTİKAMET", true);
    } else if (absDiff < 45) {
        applyStyle("var(--near)", "YAKLAŞTINIZ", false);
    } else {
        applyStyle("var(--far)", "YÖNÜNÜZÜ BULUN", false);
    }

    function applyStyle(color, text, isGood) {
        arrow.style.borderBottomColor = color;
        ring.style.borderColor = color;
        ring.style.boxShadow = `0 0 25px ${color}`;
        status.innerText = text;
        status.style.color = color;
        isGood ? icon.classList.add("active") : icon.classList.remove("active");
    }

    // Kilometre mi Metre mi kontrolü (Çok uzaksa km gösterir)
    if (state.dist > 1000) {
        distEl.innerText = `${(state.dist / 1000).toFixed(2)} km`;
    } else {
        distEl.innerText = `${state.dist.toFixed(1)} metre`;
    }
}

// HASSAS MATEMATİK FONKSİYONLARI
function getPreciseDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000; // Metre cinsinden dünya yarıçapı
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;
    return Math.acos( Math.sin(φ1)*Math.sin(φ2) + Math.cos(φ1)*Math.cos(φ2)*Math.cos(Δλ) ) * R;
}

function getBearing(lat1, lon1, lat2, lon2) {
    const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
    const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
    return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
}

function handleError(err) {
    alert("Konum alınamıyor: " + err.message);
}
</script>
</body>
</html>
