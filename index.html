}
/* Üyenin kademe ölçüt değeri (toplam ömür-boyu kazanım veya güncel bakiye) */
function uyeKademeDeger(uye){
  if(!uye) return 0;
  if(SADAKAT.kademeOlcut==="bakiye") return uye.mag||0;
  // toplam ömür-boyu kazanım: işlem geçmişindeki kazanımların toplamı (yoksa bakiye)
  if(uye.toplamKazanim!=null) return uye.toplamKazanim;
  let t=0;
  (uye.islemler||[]).forEach(i=>{ if(i.tip==="kazanim") t+=i.mag; });
  return t>0 ? t : (uye.mag||0);
}
/* Üyenin mevcut kademesi */
function uyeKademe(uye){
  const deger = uyeKademeDeger(uye);
  let sec = SADAKAT.kademeler[0];
  SADAKAT.kademeler.forEach(k=>{ if(deger>=k.esik) sec=k; });
  return sec;
}
/* Üyenin bir üst kademeye kalan Mag'ı (yoksa null = en üst) */
function uyeKademeSonraki(uye){
  const deger = uyeKademeDeger(uye);
  const ust = SADAKAT.kademeler.filter(k=>k.esik>deger).sort((a,b)=>a.esik-b.esik)[0];
  if(!ust) return null;
  return { kademe:ust, kalan: ust.esik-deger };
}
/* ============================================================
   KADEME İLERLEME ÇUBUĞU — ortak HTML üreticisi
   boyut: "buyuk" (profil/üye detay) | "orta" (kasa) | "kucuk" (QR şerit)
   ============================================================ */
function kademeIlerlemeHtml(uye, boyut){
  boyut = boyut || "orta";
  const deger = uyeKademeDeger(uye);
  const suanki = uyeKademe(uye);
  const sonraki = uyeKademeSonraki(uye);
  // mevcut kademenin alt eşiği
  const altEsik = suanki.esik || 0;
  let yuzde, kalanMetin;
  if(sonraki){
    const aralik = sonraki.kademe.esik - altEsik;
    yuzde = aralik>0 ? Math.min(100, Math.max(0, Math.round(((deger-altEsik)/aralik)*100))) : 0;
    kalanMetin = sonraki.kademe.ic+" <strong>"+sonraki.kademe.ad+"</strong> olmaya <strong>"+sonraki.kalan+" "+SADAKAT.ad+"</strong> kaldı";
  } else {
    yuzde = 100;
    kalanMetin = "👑 En yüksek seviye · <strong>"+suanki.ad+"</strong>";
  }
  // kademe noktaları (madalyalar)
  let noktalar = '';
  SADAKAT.kademeler.forEach(k=>{
    const ulasildi = deger>=k.esik;
    const aktif = k.ad===suanki.ad;
    noktalar += '<div class="kad-nokta'+(ulasildi?' ulasildi':'')+(aktif?' aktif':'')+'" style="--kad-renk:'+k.renk+'">'+
      '<span class="kad-nokta-ic">'+k.ic+'</span>'+
      '<span class="kad-nokta-ad">'+k.ad+'</span>'+
    '</div>';
  });
  return '<div class="kademe-ilerleme kad-'+boyut+'">'+
    '<div class="kad-bar-row">'+
      '<div class="kad-bar"><div class="kad-bar-dolu" style="width:'+yuzde+'%; background:'+suanki.renk+'"></div></div>'+
    '</div>'+
    '<div class="kad-noktalar">'+noktalar+'</div>'+
    '<div class="kad-kalan">'+kalanMetin+'</div>'+
  '</div>';
}
/* Üyenin kademe rozeti (madalya + ad) — küçük etiket */
function kademeRozetHtml(uye){

/* Bir ürünün kazandıracağı Mag puanı (ürüne özel; yoksa orandan) */
function urunMagPuan(p){
  if(!p) return 0;
  if(p.mag!=null && p.mag!=="") return Math.max(0, Math.round(p.mag));
  // ürüne mag girilmemişse: fiyattan orana göre türet
  return Math.round((p.fiyat||0) * SADAKAT.kazancOrani);
}

const SPLASH_KEY = "minipan_splash_v1";
function splashYukle(){
  const v = MPStore.get(SPLASH_KEY, null, {version:1});
  if(v) Object.assign(SPLASH, v);
}
function splashKaydet(){ MPStore.set(SPLASH_KEY, SPLASH, 1); }

/* Mail ile bul (asıl kimlik) */
function musteriBulMail(mail){ return CUSTOMERS[(mail||"").toLowerCase().trim()] || null; }
/* Telefon ile bul (ikincil — kasada hızlı erişim) */
function musteriBulTel(tel){
  const t=(tel||"").replace(/\D/g,"");
  return Object.values(CUSTOMERS).find(m=>m.tel===t) || null;
}
/* Genel arama — mail veya telefon */
function musteriBul(anahtar){
  if(!anahtar) return null;
  if(String(anahtar).includes("@")) return musteriBulMail(anahtar);
  return musteriBulTel(anahtar) || CUSTOMERS[anahtar] || null;
}

/* Ürün görseli — gerçek foto URL varsa onu, yoksa degrade+emoji */
function urunGorsel(p, buyuk){
  if(p.img) return '<div class="qr-img" style="background-image:url('+p.img+')"></div>';
  const tonlar = {
    "Tatlılar":"#f3e2c8,#e8c89a", "Pastalar":"#efe0d2,#d8b89a",
    "İçecekler":"#d8e8f0,#b0d0e0", "Gazozlar":"#f0e0e8,#e0c0d0",
    "Dondurmalar":"#f5e8f0,#e8d0e0", "Çikolata Sosları":"#e8dcc8,#cdb89a"
  };
  const t = tonlar[p.kat] || "#f0eeea,#d4d0c6";
  return '<div class="qr-img qr-img-ph" style="background:linear-gradient(135deg,'+t+')">'+
         '<span style="font-size:'+(buyuk?'90px':'40px')+';opacity:.85">'+p.emoji+'</span></div>';
}

function openQR(){
  document.getElementById("login").style.display="none";
  QR = { masa:"1", masaKat:"İç Salon", sube:"Edirne Atatürk", kisi:"", tel:"", musteri:null, sepet:[], view:"splash", aktifKat:"Tatlılar" };
  renderQR();
  document.getElementById("qrApp").style.display="block";
  // splash sadece "Devam et" butonuyla geçer (otomatik geçiş yok)
}
function closeQR(){
  clearTimeout(QR._splashTimer);
  document.getElementById("qrApp").style.display="none";
  document.getElementById("login").style.display="flex";
  const bar=document.getElementById("qrSepetBarSabit"); if(bar) bar.remove();
}
function renderQR(){
  sessionsKaydet();
  const el = document.getElementById("qrApp");
  if(QR.view==="splash")        el.innerHTML = qrSplashHtml();
  else if(QR.view==="bildirim") el.innerHTML = qrBildirimHtml();
  else if(QR.view==="karsilama")el.innerHTML = qrKarsilamaHtml();
  else if(QR.view==="kayit")    el.innerHTML = qrKayitHtml();
  else if(QR.view==="kurtarma") el.innerHTML = qrKurtarmaHtml();
  else if(QR.view==="giris")    el.innerHTML = qrGirisHtml();
  else if(QR.view==="kategoriler") el.innerHTML = qrKategorilerHtml();
  else if(QR.view==="menu")     el.innerHTML = qrMenuHtml();
  else if(QR.view==="profil")   el.innerHTML = qrProfilHtml();
  else if(QR.view==="takip")    el.innerHTML = qrTakipHtml();
  else if(QR.view==="sepet")    el.innerHTML = qrSepetHtml();
  else if(QR.view==="yorumlar")  el.innerHTML = qrYorumlarHtml();
  else if(QR.view==="yorumEkle") el.innerHTML = qrYorumEkleHtml();
  else if(QR.view==="onay")     el.innerHTML = qrOnayHtml();
  el.scrollTop = 0;
  qrSepetBarGuncelle();   // body-seviyesi sabit sepet bar (viewport altında)
}
/* Sabit sepet bar — #qrApp DIŞINDA, body'ye eklenir ki scroll'dan etkilenmesin */
function qrSepetBarGuncelle(){
  const app = document.getElementById("qrApp");
  const acik = app && app.style.display==="block";
  let bar = document.getElementById("qrSepetBarSabit");
  // sepet bar sadece menü ve kategoriler ekranında, sepet doluyken görünür
  const sepetN = (QR.sepet||[]).reduce((s,c)=>s+c.q,0);
  const sepetT = (QR.sepet||[]).reduce((s,c)=>s+c.fiyat*c.q,0);
  const goster = acik && sepetN>0 && (QR.view==="menu" || QR.view==="kategoriler");
  if(!goster){ if(bar) bar.remove(); return; }
  if(!bar){
    bar = document.createElement("button");
    bar.id = "qrSepetBarSabit";
    bar.className = "qr-sepet-bar";
    bar.onclick = ()=>{ QR.view="sepet"; renderQR(); };
    document.body.appendChild(bar);
  }
  bar.innerHTML = '<span class="qr-sb-n">'+sepetN+'</span><span class="qr-sb-t">Sepetim</span>'+
    '<span class="qr-sb-f">'+sepetT+' ₺</span>';
}

/* 0) SPLASH — açılış reklamı (WebP/GIF/MP4) */
function qrSplashHtml(){
  const sube = QR.sube || AKTIF_SUBE;
  // ARKA PLAN: video (webp/mp4) > görsel > placeholder
  let arkaplan;
  if(SPLASH.video){
    const isVid = /\.(mp4|webm)$/i.test(SPLASH.video) || SPLASH.video.startsWith("data:video");
    arkaplan = isVid
      ? '<video class="qr-splash-video" autoplay loop muted playsinline><source src="'+SPLASH.video+'"></video>'
      : '<div class="qr-splash-img qr-splash-anim" style="background-image:url('+SPLASH.video+')"></div>';
  } else if(SPLASH.gorsel){
    arkaplan = '<div class="qr-splash-img qr-splash-anim" style="background-image:url('+SPLASH.gorsel+')"></div>';
  } else {
    arkaplan = '<div class="qr-splash-img qr-splash-ph qr-splash-anim"><span style="font-size:120px">🍫</span></div>';
  }

  // ÜST: kampanyalı ürünler
  const aktifKmp = KAMPANYALAR.filter(k=>
    k.aktif && (k.subeler==="hepsi" || (Array.isArray(k.subeler)&&k.subeler.includes(sube)))
  );
  let kmpHtml = "";
  if(aktifKmp.length>0){
    kmpHtml = '<div class="qr-splash-kampanyalar">';
    aktifKmp.slice(0,6).forEach(k=>{
      const masaK = fiyatKayit(sube, k.urun, "masa");
      const masaGenel = (masaK.genel!=null&&masaK.genel>0)?masaK.genel:urunVarsayilanFiyat(k.urun);
      const genelK = fiyatKayit(sube, k.urun, k.kanal);
      const genel = (k.kanal==="eve") ? ((genelK.genel!=null&&genelK.genel>0)?genelK.genel:masaGenel) : masaGenel;
      let yeni = k.tip==="oran" ? Math.round(genel*(1-k.deger/100)) : k.deger;
      if(yeni<0) yeni=0;
      const indEtiket = k.tip==="oran" ? "%"+k.deger : "";
      const aktifSimdi = kampanyaAktifMi(k);
      kmpHtml += '<div class="qr-splash-kmp glow">'+
        '<div class="qsk-ust"><span class="qsk-ad">🔥 '+k.ad+'</span>'+
        (indEtiket?'<span class="qsk-oran">'+indEtiket+'</span>':'')+'</div>'+
        '<span class="qsk-urun">'+k.urun+(k.kanal==="eve"?' · 🛵 Eve':'')+'</span>'+
        '<span class="qsk-fiyat"><span class="qsk-eski">'+genel+' ₺</span> <span class="qsk-yeni">'+yeni+' ₺</span></span>'+
        '<span class="qsk-zaman">📅 '+kampanyaZamanMetni(k)+
        (aktifSimdi?' <span class="qsk-simdi">şimdi geçerli</span>':'')+'</span>'+
      '</div>';
    });
    kmpHtml += '</div>';
  }

  // DUYURULAR
  let duyuruHtml='';
  if(SPLASH.duyurular && SPLASH.duyurular.length){
    duyuruHtml = '<div class="qr-splash-duyurular"><div class="qr-splash-duyuru-bas">📢 Duyurular</div>';
    SPLASH.duyurular.forEach(d=>{
      duyuruHtml += '<div class="qr-splash-duyuru"><div class="qsd-bas">'+(d.baslik||'')+'</div><div class="qsd-metin">'+(d.metin||'')+'</div></div>';
    });
    duyuruHtml += '</div>';
  }

  return '<div class="qr-screen qr-splash2">'+
    '<div class="qr-splash2-bg">'+arkaplan+'<div class="qr-splash-veil"></div></div>'+
    '<div class="qr-splash2-scroll">'+
      '<div class="qr-splash2-hero">'+
        '<div class="qr-splash-rozet glow-soft">'+SPLASH.rozet+'</div>'+
        '<div class="qr-splash-baslik">'+SPLASH.baslik+'</div>'+
        '<div class="qr-splash-altyazi">'+SPLASH.altyazi+'</div>'+
      '</div>'+
      duyuruHtml+
      (kmpHtml ? '<div class="qr-splash2-bolum"><div class="qr-splash2-bolum-bas">🔥 Kampanyalı Ürünler</div>'+kmpHtml+'</div>' : '')+
      '<div class="qr-splash2-bosluk"></div>'+
    '</div>'+
    // sabit alt bar: Devam et + çekmece tetik
    '<div class="qr-splash2-altbar">'+
      '<button class="qr-splash2-devam" onclick="splashGec()">Devam et →</button>'+
      '<button class="qr-splash2-cekmece-tetik" onclick="splashCekmeceAc()"><span class="qr-cekmece-cizgi"></span></button>'+
      '<div class="qr-cekmece-ipucu">⌃ Bilgi için yukarı çek</div>'+
    '</div>'+
    // yukarı açılır çekmece (WiFi + Çerez)
    qrSplashCekmeceHtml()+
  '</div>';
}

function bildirimGec(){
  clearTimeout(QR._bildirimTimer);
  // cihaz hafızası varsa → tanı, yoksa → karşılama
  if(DEVICE_MEMORY && musteriBul(DEVICE_MEMORY)){
    QR.musteri = musteriBul(DEVICE_MEMORY);
    QR.kisi = QR.musteri.ad; QR.tel = QR.musteri.tel;
    QR.view = "kategoriler";
  } else {
    QR.view = "karsilama";
  }
  renderQR();
}

function qrKaydol(){
  const ad = (document.getElementById("qrKayitAd").value||"").trim();
  const mail = (document.getElementById("qrKayitMail").value||"").toLowerCase().trim();
  const tel = (document.getElementById("qrKayitTel").value||"").replace(/\D/g,"");
  if(!ad){ note("Lütfen adını yaz"); return; }
  if(!mail || !mail.includes("@") || !mail.includes(".")){ note("Geçerli bir e-posta gir"); return; }
  // mail kayıtlı mı? → o hesaba gir, yoksa → oluştur
  let m = musteriBulMail(mail);
  if(!m){
    let kanal = QR._kayitKanal||"mail";
    if(!OTP_KANALLAR[kanal] || !OTP_KANALLAR[kanal].aktif) kanal="mail";  // disabled ise mail
    m = {mail:mail, ad:ad, tel:tel, mag:0, toplamKazanim:0, adresler:[], islemler:[], otpKanal:kanal};
    CUSTOMERS[mail] = m;   // gerçekte customers/{mail} — mail asıl kimlik
  }
  QR.musteri = m; QR.kisi = m.ad; QR.tel = m.tel||"";
  DEVICE_MEMORY = mail;    // cihaz hafızası artık mail ile
  note("Hoş geldin "+m.ad+"! "+(m.mag>0?m.mag+" "+SADAKAT.ad+" puanın var":"İlk siparişinle kazanmaya başla"));
  QR.view = "kategoriler"; renderQR();
}

/* Adres ekle/düzenle (basit prompt — gerçekte form modalı) */
function qrAdresEkle(){
  const m=QR.musteri;
  if(m.adresler.length>=ADRES_LIMIT){ note("En fazla "+ADRES_LIMIT+" adres"); return; }
  // kullanılmamış etiketi öner
  const kullanilan=m.adresler.map(a=>a.ad);
  const etiket=ADRES_ETIKETLER.find(e=>!kullanilan.includes(e))||"Diğer";
  const ad=prompt("Adres adı (Ev/İş/Diğer):", etiket);
  if(!ad) return;
  const adres=prompt("Açık adres:");
  if(!adres||!adres.trim()) return;
  m.adresler.push({ad:ad.trim(), adres:adres.trim()});
  // gerçekte: customers/{tel}/adresler güncellenir
  renderQR();
}
function qrAdresDuzenle(i){
  const m=QR.musteri, a=m.adresler[i];
  const ad=prompt("Adres adı:", a.ad);
  if(!ad) return;
  const adres=prompt("Açık adres:", a.adres);
  if(!adres||!adres.trim()) return;
  m.adresler[i]={ad:ad.trim(), adres:adres.trim()};
  renderQR();
}
function qrAdresSil(i){
  const m=QR.musteri;
  if(confirm(m.adresler[i].ad+" adresini sil?")){
    m.adresler.splice(i,1);
    renderQR();
  }
}
function qrUyelikCikis(){
  DEVICE_MEMORY=null; QR.musteri=null; QR.kisi=""; QR.tel="";

function takipDurumGuncelle(takipId, durum){
  const s = TAKIP_SIPARISLER.find(x=>x.takipId===takipId);

    qrBildirimGoster(durum);

function qrBildirimGoster(durum){
  const dm = TAKIP_DURUM[durum]; if(!dm) return;
  let b = document.getElementById("qrBildirim");
  if(!b){ b=document.createElement("div"); b.id="qrBildirim"; b.className="qr-bildirim"; document.body.appendChild(b); }
  b.innerHTML = '<span class="qb-ic">'+dm.ic+'</span><span class="qb-metin"><strong>'+dm.ad+'</strong>'+dm.mesaj+'</span>';

function qrSiparisGonder(){
  const t = QR.sepet.reduce((s,c)=>s+c.fiyat*c.q,0);
  consumeRecipe(QR.sepet);
  const kalemlerKopya = QR.sepet.map(c=>({ad:c.ad, secimler:c.secimler, secimGruplu:c.secimGruplu, fiyat:c.fiyat*c.q, paket:!!c.paket}));
  let takipId = "S"+(_takipId++);
  let fisMasaRef = QR.masa;   // mutfak fişini doğru kayda bağlamak için (varsayılan: masa siparişi)
  // EVE TESLİMAT → adresli paket kaydı
  if(QR.siparisTipi==="eve" && QR.musteri){
    const adres = QR.musteri.adresler[QR.secilenAdres||0];
    const yeniId=_paketId++;
    PAKET_ORDERS.push({
      id:yeniId, takipId:takipId, tip:"eve", sube:(QR.sube||AKTIF_SUBE), musteri:QR.musteri.ad, tel:QR.musteri.tel,
      adres:adres, kalemler:kalemlerKopya,
      tutar:t, odeme:QR.odemeTipi||"online", durum:"hazirlaniyor", zaman:Date.now()
    });
    fisMasaRef = "eve#"+yeniId;
    QR.sonPaket = true;
  } else if(QR.siparisTipi==="paket"){
    // PAKET (gel-al) → mutfak paket ekranına düşer
    const masaNo = QR.icerideMi ? qrMasaId() : null;   // içerideyse masaya da bağlı (doğru format)
    const yeniId=_paketId++;
    PAKET_ORDERS.push({
      id:yeniId, takipId:takipId, tip:"paket", sube:(QR.sube||AKTIF_SUBE), musteri:QR.kisi||"Müşteri", tel:QR.musteri?QR.musteri.tel:null,
      adres:null, masa:masaNo, kalemler:kalemlerKopya,
      tutar:t, odeme:QR.odemeTipi||"kasada", durum:"hazirlaniyor", zaman:Date.now()
    });
    fisMasaRef = "paket#"+yeniId;
    // içerideyse masaya da "paket" işaretli kalem olarak bağla (masada paket işareti çıksın)
    if(masaNo){
      let s=SESSIONS[masaNo];
      if(!s){ s=SESSIONS[masaNo]={masa:masaNo, acik:true, zaman:Date.now(), kisiler:[]}; }
      s.acik=true;
      let k=s.kisiler.find(x=>x.ad===(QR.kisi||"Müşteri"));
      if(!k){ k={ad:(QR.kisi||"Müşteri"), kalemler:[]}; s.kisiler.push(k); }
      if(QR.musteri && QR.musteri.mail) k.uyeMail = QR.musteri.mail;  // sadakat üyesi → kişiye bağla
      kalemlerKopya.forEach(it=>{
        k.kalemler.push({id:_kalemId++, ad:it.ad, fiyat:it.fiyat, secimler:it.secimler, ekstraRecete:[], durum:"hazirlaniyor", paket:true});
      });
    }
    QR.sonPaket = true;
  } else {
    // MASADA sipariş → SESSIONS'a kişi kalemleri olarak (kalem bazında paket işareti)
    const masaId = qrMasaId();   // şube::kat|ad formatı — kasa bu formatta arar
    let s=SESSIONS[masaId];
    if(!s){ s=SESSIONS[masaId]={masa:masaId, acik:true, zaman:Date.now(), kisiler:[]}; }
    s.acik=true;
    let k=s.kisiler.find(x=>x.ad===(QR.kisi||"Müşteri"));
    if(!k){ k={ad:(QR.kisi||"Müşteri"), kalemler:[]}; s.kisiler.push(k); }
    if(QR.musteri && QR.musteri.mail) k.uyeMail = QR.musteri.mail;  // sadakat üyesi → kişiye bağla
    QR.sepet.forEach(c=>{
      for(let n=0;n<c.q;n++){
        k.kalemler.push({id:_kalemId++, ad:c.ad, fiyat:c.fiyat, secimler:c.secimler||[], secimGruplu:c.secimGruplu||[], secimEk:c.secimEk||[], secimKcal:c.secimKcal||[], kcal:c.kcal||0, ekstraRecete:[], durum:"bekliyor", paket:!!c.paket});
      }
    });
    // masadan paketli ürün masaya bağlı kalır (kalemde paket:true) — ayrı PAKET_ORDERS oluşturulmaz
    QR.sonPaket = false;
  }
  // MÜŞTERİ TAKİP KAYDI (masa + paket ortak) → "Siparişlerim" ekranında canlı
  TAKIP_SIPARISLER.push({
    takipId:takipId, tip:QR.siparisTipi||"masa", kisi:QR.kisi, tel:QR.musteri?QR.musteri.tel:null,
    masa:QR.masa, kalemler:kalemlerKopya, tutar:t, durum:"hazirlaniyor", zaman:Date.now(),
    bildirimler:[{durum:"hazirlaniyor", zaman:Date.now()}]
  });
  QR.sonTakipId = takipId;
  // OTOMATİK MUTFAK FİŞİ (onaysız, anında)
  mutfakFisiBas({
    tip: QR.siparisTipi||"masa",
    baslik: QR.siparisTipi==="eve"?"EVE TESLİMAT":QR.siparisTipi==="paket"?"PAKET (GEL-AL)":"MASA "+QR.masa,
    alt: QR.kisi,
    kisi: QR.kisi, masa: fisMasaRef,
    kalemler: kalemlerKopya
  });
  QR.sonTutar = t; QR.sonAdet = QR.sepet.reduce((s,c)=>s+c.q,0);
  // SADAKAT ÖNİZLEMESİ (kayıtlıysa) — PUAN HENÜZ EKLENMEZ!
  // Puan, kasada ödeme alındığında eklenir (iptal durumunda puan eklenmiş olmaz).
  QR.kazanim = null;
  if(QR.musteri){
    const mus = QR.musteri;
    // ürün bazlı ham kazanım (sadece gösterim için)
    let hamKazanc = 0;
    QR.sonSepetKopya = kalemlerKopya;
    kalemlerKopya.forEach(c=>{
      const p = DEMO_PRODUCTS.find(x=>x.ad===c.ad);
      hamKazanc += urunMagPuan(p) * (c.q||c.adet||1);
    });
    hamKazanc = Math.round(hamKazanc);
    const kademe = uyeKademe(mus);
    const puanKazanc = Math.round(hamKazanc * (kademe.carpan||1));
    // NOT: mus.mag ve toplamKazanim DEĞİŞTİRİLMEZ — ödeme alınınca eklenecek
    QR.kazanim = {puan:puanKazanc, carpan:kademe.carpan, kademeAd:kademe.ad, beklemede:true};
  }
  QR.sepet = []; QR.view = "onay"; renderQR();
}

/* QR çağrıları → masaya işlenir (kasa/garson/mutfak rengini değiştirir) */
function qrMasaId(){
  // QR müşterisinin masası (şube::kat|ad formatında olmalı)
  return (QR.sube||AKTIF_SUBE)+"::"+(QR.masaKat||"İç Salon")+"|"+QR.masa;

function qrGarsonCagir(){

  note("🔔 Garson çağrıldı");
  garsonCagriSesBaslat();   // personel ekranlarında sesli bildirim

/* Personel ekranlarında (kasa/garson/müdür) bekleyen garson çağrısı sesi */
let GARSON_SES_TIMER=null;
let GARSON_SES_CTX=null;
function garsonCagriVarMi(){
  const onek = AKTIF_SUBE+"::";
  return Object.keys(SESSIONS).filter(id=>id.startsWith(onek)).some(id=>{
    const s=SESSIONS[id];
    return s && s.garsonCagri && s.garsonCagriBilgi && (s.garsonCagriBilgi.durum||"bekliyor")==="bekliyor";
  });
}
function garsonCagriBip(){
  try{
    if(!GARSON_SES_CTX) GARSON_SES_CTX = new (window.AudioContext||window.webkitAudioContext)();
    const ctx=GARSON_SES_CTX;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type="sine"; o.frequency.value=880;
    g.gain.setValueAtTime(0.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    o.start(); o.stop(ctx.currentTime+0.42);
    // çift bip
    const o2=ctx.createOscillator(), g2=ctx.createGain();
    o2.connect(g2); g2.connect(ctx.destination);
    o2.type="sine"; o2.frequency.value=1100;
    g2.gain.setValueAtTime(0.001, ctx.currentTime+0.5);
    g2.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime+0.55);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.9);
    o2.start(ctx.currentTime+0.5); o2.stop(ctx.currentTime+0.92);
  }catch(e){}
}
function garsonCagriSesBaslat(){
  if(GARSON_SES_TIMER) return;
  garsonCagriBip();
  GARSON_SES_TIMER=setInterval(()=>{
    if(garsonCagriVarMi()) garsonCagriBip();
    else garsonCagriSesDurdur();
  }, 4000);
}
function garsonCagriSesDurdur(){ if(GARSON_SES_TIMER){ clearInterval(GARSON_SES_TIMER); GARSON_SES_TIMER=null; } }

/* Müşteri tarafı: gönderilen mesajlara mutfak yanıtını periyodik kontrol et */
let QR_YANIT_TIMER=null;
let QR_BILDIRILEN={};  // {msjId:true} — bir kez bildirilmiş yanıtlar
function qrYanitTakipBaslat(){
  if(QR_YANIT_TIMER) return;
  QR_YANIT_TIMER=setInterval(qrYanitKontrol, 2000);
}
function qrYanitTakipDurdur(){ if(QR_YANIT_TIMER){ clearInterval(QR_YANIT_TIMER); QR_YANIT_TIMER=null; } }
function qrYanitKontrol(){
  const id=qrMasaId();
  const s=SESSIONS[id];
  if(!s || !s.mutfakMesajlari) return;
  const benim=s.mutfakMesajlari.filter(m=>(m.kisi||"Müşteri")===(QR.kisi||"Müşteri"));
  // yeni yanıtlanmış (onay/red) ve henüz bildirilmemiş mesaj
  const yeniYanit=benim.find(m=>{
    const d=m.durum||"bekliyor";
    return (d==="onaylandi"||d==="reddedildi") && !QR_BILDIRILEN[m.id];
  });
  if(yeniYanit){
    QR_BILDIRILEN[yeniYanit.id]=true;
    qrYanitPop(yeniYanit);
    if(typeof renderQR==="function" && (QR.view==="onay"||QR.view==="takip")) renderQR();
  }
  // hiç bekleyen kalmadıysa polling durdur
  if(!benim.some(m=>(m.durum||"bekliyor")==="bekliyor")) qrYanitTakipDurdur();
}
function qrYanitPop(msj){

function qrMesajGonder(){
  const mesaj=(QR._mesajTaslak||"").trim();
  if(!mesaj){ note("Mesaj boş olamaz"); return; }
  const id=qrMasaId();
  if(!SESSIONS[id]) SESSIONS[id]={masa:id, acik:false, zaman:Date.now(), kisiler:[]};
  if(!SESSIONS[id].mutfakMesajlari) SESSIONS[id].mutfakMesajlari=[];
  const msjId = "msj_"+Date.now()+"_"+Math.floor(Math.random()*1000);
  SESSIONS[id].mutfakMesajlari.push({id:msjId, mesaj:mesaj, kisi:QR.kisi||"Müşteri", zaman:Date.now(), durum:"bekliyor"});
  SESSIONS[id].mesajVar=true;
  // mutfağa anlık fiş olarak ekrana bas
  mutfakFisiBas({tip:"masa", baslik:masaEtiket(id)+" · 💬 MESAJ", alt:QR.kisi, kisi:QR.kisi||"Müşteri", masa:id,
    kalemler:[{ad:"💬 "+mesaj, secimler:[], kisi:QR.kisi||"Müşteri"}]});
  // gerçek mutfak yazıcısına mesaj bildirim fişi gönder
  mesajFisiYazdir(id, mesaj, QR.kisi||"Müşteri");
  qrMesajKapat();
  note("💬 Mesaj mutfağa iletildi");
  qrYanitTakipBaslat();
  if(typeof renderQR==="function") renderQR();
}
/* Müşteri mesajını mutfak yazıcısına bildirim fişi olarak yazdır */
function mesajFisiYazdir(masaId, mesaj, kisi){
  const sube = (QR && QR.sube) ? QR.sube : AKTIF_SUBE;
  // mutfak rolündeki aktif yazıcıları bul (kategori ataması olmayanlar dahil)
  let yazicilar = subeYazicilari(sube).filter(y=>y.aktif && y.rol==="mutfak");
  if(!yazicilar.length){
    // mutfak yazıcısı yoksa herhangi bir aktif yazıcıya düş
    yazicilar = subeYazicilari(sube).filter(y=>y.aktif);
  }
  if(!yazicilar.length) return;  // tanımlı yazıcı yok
  const metin = mesajFisiMetni(masaId, mesaj, kisi, sube);
  yazicilar.forEach(y=>{
    yaziciyaGonder(sube, y, metin).then(r=>{
      if(r.ok){ const kdsAcik=document.getElementById("kdsApp")&&document.getElementById("kdsApp").style.display==="block"; if(kdsAcik) note("🖨️ Mesaj fişi yazdırıldı"); }
    });
  });
}
/* Mesaj bildirim fişi metni (ESC/POS düz metin) */
function mesajFisiMetni(masaId, mesaj, kisi, sube){
  const cizgi = "--------------------------------";
  return "\n"+
    "    *** MUSTERI MESAJI ***\n"+
    "        MINIPAN\n"+
    cizgi+"\n"+
    "Sube : "+(sube||AKTIF_SUBE)+"\n"+
    "Masa : "+masaEtiket(masaId)+"\n"+
    "Kisi : "+(kisi||"Musteri")+"\n"+
    "Saat : "+new Date().toLocaleString('tr')+"\n"+
    cizgi+"\n"+
    "MESAJ:\n"+
    mesaj+"\n"+
    cizgi+"\n"+
    ">> Mutfak onayi bekleniyor <<\n"+
    "\n\n\n";
}

      '<button class="kds-sekme'+(KDS.sekme==="fisler"?' on':'')+'" onclick="kdsSekme(\'fisler\')">🖨️ Fişler</button>'+
    '</div>';
  html += (KDS.sekme==="masalar") ? kdsMasalarHtml() : (KDS.sekme==="akis") ? kdsAkisHtml() : (KDS.sekme==="fisler") ? kdsFislerHtml() : kdsPaketHtml();
  html += '</div>';
  el.innerHTML=html;
  // bekleyen müşteri mesajı varsa otomatik pop-up (zaten açık değilse)
  const popAcik=document.getElementById("kdsMesajPop")&&document.getElementById("kdsMesajPop").classList.contains("on");
  if(!popAcik) kdsBekleyenMesajGoster();
}

/* SEKME: Basılan fişler — mutfak tekrar yazdırabilir */
function kdsFislerHtml(){
  const fisler = MUTFAK_FISLER.filter(f=>(f.sube||AKTIF_SUBE)===AKTIF_SUBE);
  if(fisler.length===0) return '<div class="kds-bos">Henüz fiş basılmadı 🖨️</div>';
  let html='<div class="kds-fis-list">';
  fisler.forEach((f,i)=>{
    const paketN=f.kalemler.filter(it=>it.paket).length;
    const dk=Math.floor((Date.now()-f.zaman)/60000);
    html+='<div class="kds-fis-kart" onclick="fisGoster(MUTFAK_FISLER['+MUTFAK_FISLER.indexOf(f)+'],false)">'+
      '<div class="kfk-ust"><span class="kfk-no">🖨️ Fiş #'+f.no+' · '+f.baslik+'</span>'+
        '<span class="kfk-dk">'+dk+' dk önce</span></div>'+
      '<div class="kfk-urunler">'+f.kalemler.map(k=>k.ad).join(', ')+'</div>'+
      '<div class="kfk-alt">'+f.kalemler.length+' ürün'+(paketN?' · 📦 '+paketN+' paket':'')+' · dokun → tekrar yazdır</div>'+
    '</div>';

/* SEKME 3: Paket siparişler (eve teslimat) */
function kdsPaketHtml(){
  const aktif=PAKET_ORDERS.filter(p=>p.durum!=="teslim"&&p.durum!=="iptal"&&(p.sube||AKTIF_SUBE)===AKTIF_SUBE);

    const tipAd = gelAl ? "PAKET (Gel-al)" : "Eve teslimat";

        '<span class="kak-durum" style="color:'+dm.renk+'">'+dm.ic+' '+dm.ad+'</span></div>'+
      '<div class="kp-paketrozet">'+ikon+' Bu sipariş paketlenecek</div>'+
      (gelAl
        ? '<div class="kp-tel">'+(p.tel?'📞 '+p.tel+' · ':'')+dk+' dk önce · '+(p.odeme==="kasada"?'💵 Kasada ödenecek':'✓ Ödendi')+'</div>'
        : '<div class="kp-adres">📍 '+p.adres.ad+' · '+p.adres.adres+'</div>'+
          '<div class="kp-tel">📞 '+p.tel+' · '+dk+' dk önce · '+(p.odeme==="online"?'✓ Online ödendi':'💵 Kapıda ödeme')+'</div>')+
      '<div class="kp-kalemler">'+p.kalemler.map(k=>'• '+k.ad+(k.secimler.length?' <small>('+k.secimler.join(', ')+')</small>':'')).join('<br>')+'</div>'+
      '<div class="kp-tutar">'+p.tutar+' ₺</div>'+
      '<div class="kak-aksiyon">'+
        (gelAl
          ? (p.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsPaketDurum('+p.id+',\'teslim\')">🥡 Paketlendi · hazır</button>':'')
          : (p.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsPaketDurum('+p.id+',\'yolda\')">🛵 Yola çıktı</button>':'')+
            (p.durum==="yolda"?'<button class="kak-btn gonder" onclick="kdsPaketDurum('+p.id+',\'teslim\')">✓ Teslim edildi</button>':''))+
        '<button class="kak-btn iptal" onclick="kdsPaketDurum('+p.id+',\'iptal\')">İptal</button>'+
      '</div></div>';
  });

}
function kdsPaketDurum(id, durum){
  const p=PAKET_ORDERS.find(x=>x.id===id);
  if(p){
    p.durum=durum; note("Paket #"+id+" · "+TESLIMAT_DURUM[durum].ad);
    if(p.takipId) takipDurumGuncelle(p.takipId, durum);   // müşteriye bildirim
    if(durum==="teslim") paketGecmiseArsivle(p);          // teslim edildi → geçmişe işle
  }
  renderKDS();
}

/* SEKME 1: Masa kartları */
function kdsMasalarHtml(){
  const onek = AKTIF_SUBE+"::";
  const masalar=Object.keys(SESSIONS).filter(m=>m.startsWith(onek) && SESSIONS[m].acik);
  if(masalar.length===0) return '<div class="kds-bos">Açık masa yok</div>';
  let html='<div class="kds-masa-grid">';
  masalar.forEach(m=>{
    const mq="'"+String(m).replace(/'/g,"\\'")+"'";
    const kalemler=masaKalemleri(m).filter(it=>it.durum!=="iptal");
    const bekleyen=kalemler.filter(it=>it.durum==="bekliyor").length;
    const hazir=kalemler.filter(it=>it.durum==="hazirlaniyor").length;
    const paketVar=kalemler.some(it=>it.paket);
    const dk=Math.floor((Date.now()-SESSIONS[m].zaman)/60000);
    const mesajVar=SESSIONS[m].mesajVar;
    html+='<button class="kds-masa-kart'+(bekleyen>0?' acil':'')+(mesajVar?' kds-mesajli':'')+'" onclick="kdsMasaAc('+mq+')">'+
      '<div class="kmk-ust"><span class="kmk-no">'+masaEtiket(m)+(paketVar?' <span class="kmk-paket">🥡</span>':'')+'</span><span class="kmk-dk">'+dk+' dk</span></div>'+
      '<div class="kmk-kisi">'+SESSIONS[m].kisiler.length+' kişi · '+kalemler.length+' ürün</div>'+
      '<div class="kmk-durum">'+
        (mesajVar?'<span class="kmk-rozet mesaj">💬 mesaj var</span>':'')+
        (paketVar?'<span class="kmk-rozet paket">🥡 paket var</span>':'')+
        (bekleyen>0?'<span class="kmk-rozet bek">'+bekleyen+' bekliyor</span>':'')+
        (hazir>0?'<span class="kmk-rozet haz">'+hazir+' hazırlanıyor</span>':'')+
        (bekleyen===0&&hazir===0&&!paketVar?'<span class="kmk-rozet tamam">✓ hazır</span>':'')+
      '</div></button>';
  });
  html+='</div>';
  return html;
}

/* SEKME 2: Sipariş akışı (tüm bekleyen/hazırlanan kalemler, gelen sırayla) */
function kdsAkisHtml(){
  const tum=[];
  const onek = AKTIF_SUBE+"::";
  Object.keys(SESSIONS).filter(m=>m.startsWith(onek)).forEach(m=>{
    masaKalemleri(m).forEach(it=>{ if(it.durum==="bekliyor"||it.durum==="hazirlaniyor") tum.push({...it, masa:m}); });
  });
  if(tum.length===0) return '<div class="kds-bos">Hazırlanacak sipariş yok 🎉</div>';
  let html='<div class="kds-akis-list">';
  tum.forEach(it=>{
    const mq="'"+String(it.masa).replace(/'/g,"\\'")+"'";
    const dm=DURUM_META[it.durum];
    html+='<div class="kds-akis-kart" style="border-left:4px solid '+dm.renk+'">'+
      '<div class="kak-ust"><span class="kak-masa">'+masaEtiket(it.masa)+' · '+it.kisi+(it.paket?' <span class="kak-paket">🥡 PAKET</span>':'')+'</span>'+
        '<span class="kak-durum" style="background:'+dm.bg+';color:'+dm.renk+'">'+dm.ad+'</span></div>'+
      '<div class="kak-ad">'+it.ad+'</div>'+
      (it.secimler.length?'<div class="kak-secim">'+it.secimler.join(' · ')+'</div>':'')+
      '<div class="kak-aksiyon">'+
        (it.durum==="bekliyor"?'<button class="kak-btn haz" onclick="kdsDurum('+mq+','+it.id+',\'hazirlaniyor\')">Hazırlamaya başla</button>':'')+
        (it.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsDurum('+mq+','+it.id+',\'gonderildi\')">✓ Gönderildi</button>':'')+
        '<button class="kak-btn iptal" onclick="kdsIptal('+mq+','+it.id+')">İptal</button>'+
      '</div></div>';
  });
  html+='</div>';
  return html;
}

/* Masa detayı — kim ne istemiş, iptal, opsiyon kaldır, gönder */
function kdsMasaDetayHtml(m){
  const s=SESSIONS[m];
  const mq="'"+String(m).replace(/'/g,"\\'")+"'";
  let html='<div class="kds-screen"><div class="kds-top">'+
    '<button class="qr-close" style="position:static" onclick="kdsGeri()">←</button>'+
    '<div class="kds-title">'+masaEtiket(m)+' detayı</div>'+
    '<button class="kds-fis-btn" onclick="kdsFisYazdir('+mq+')">🖨️ Mutfak fişi</button></div>'+
    '<div class="kds-detay">';
  // müşteri mesajları (varsa)
  if(s.mutfakMesajlari && s.mutfakMesajlari.length){
    html+='<div class="kds-mesaj-blok"><div class="kds-mesaj-baslik">💬 Müşteri mesajları</div>';
    s.mutfakMesajlari.forEach(msj=>{
      const dur = msj.durum||"bekliyor";
      html+='<div class="kds-mesaj kds-mesaj-'+dur+'">'+
        '<div class="kds-mesaj-ust"><span class="kds-mesaj-kisi">👤 '+(msj.kisi||'Müşteri')+'</span>'+
          (dur==="onaylandi"?'<span class="kds-mesaj-rozet ok">✓ Onaylandı</span>':
           dur==="reddedildi"?'<span class="kds-mesaj-rozet red">✕ Reddedildi</span>':
           '<span class="kds-mesaj-rozet bekle">Bekliyor</span>')+'</div>'+
        '<div class="kds-mesaj-metin">'+msj.mesaj+'</div>';
      if(dur==="bekliyor"){
        html+='<div class="kds-mesaj-aksiyon">'+
          '<button class="kds-mesaj-red" onclick="kdsMesajYanit('+mq+',\''+msj.id+'\',\'reddedildi\')">✕ Reddet</button>'+
          '<button class="kds-mesaj-onay" onclick="kdsMesajYanit('+mq+',\''+msj.id+'\',\'onaylandi\')">✓ Onayla</button>'+
        '</div>';
      }
      html+='</div>';
    });
    html+='<button class="kds-mesaj-okundu" onclick="kdsMesajTemizle('+mq+')">Mesajları temizle</button></div>';
  }
  s.kisiler.forEach(k=>{
    html+='<div class="kds-kisi-blok"><div class="kds-kisi-ad">👤 '+k.ad+'</div>';
    k.kalemler.forEach((it,idx)=>{
      const dm=DURUM_META[it.durum];
      const iptalli=it.durum==="iptal";
      html+='<div class="kds-kalem'+(iptalli?' iptalli':'')+(it.paket?' kds-paket-kalem':'')+'">'+
        '<div class="kk-ust"><span class="kk-ad">'+(it.paket?'🥡 ':'')+it.ad+'</span>'+
          '<span class="kk-fiyat">'+it.fiyat+' ₺</span></div>'+
        '<div class="kk-durum" style="color:'+dm.renk+'">'+(it.paket?'PAKET · ':'')+dm.ad+'</div>';
      // opsiyonlar — her biri onaylı silinebilir
      if(it.secimler.length && !iptalli){
        html+='<div class="kk-opsiyonlar">';
        it.secimler.forEach((op,oi)=>{
          html+='<span class="kk-ops">'+op+
            '<button class="kk-ops-x" onclick="kdsOpsKaldir('+mq+','+it.id+','+oi+')" title="Seçeneği sil">✕</button></span>';
        });
        html+='</div>';
      }
      if(!iptalli){
        const opsVarKds = (PRODUCT_OPTIONS[it.ad]||[]).length>0;
        html+='<div class="kk-aksiyon">'+
          (it.durum==="bekliyor"?'<button class="kak-btn haz" onclick="kdsDurum('+mq+','+it.id+',\'hazirlaniyor\')">Hazırla</button>':'')+
          (it.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsDurum('+mq+','+it.id+',\'gonderildi\')">Gönderildi</button>':'')+
          (it.durum==="gonderildi"?'<span class="kk-tamam">✓ Teslim edildi</span>':'')+
          '<button class="kak-btn iptal" onclick="kdsIptal('+mq+','+it.id+')">İptal</button>'+
          (opsVarKds?'<button class="kak-btn sec-ekle" onclick="kalemSecenekEkle('+mq+','+it.id+',\'kds\')">+ Seçenek</button>':'')+
        '</div>';
      }
      html+='</div>';
    });
    html+='</div>';
  });
  html+='</div></div>';
  return html;
}

function kdsDurum(m,id,d){ kalemDurum(m,id,d); note(DURUM_META[d].ad); renderKDS(); }
function kdsMesajOkundu(m){ const s=SESSIONS[m]; if(s){ s.mesajVar=false; s.mutfakMesajlari=[]; } note("Mesaj okundu"); renderKDS(); }
/* Mutfak müşteri mesajını onayla/reddet → müşteriye bildirilir */
function kdsMesajYanit(m, msjId, durum){
  const s=SESSIONS[m]; if(!s||!s.mutfakMesajlari) return;
  const msj=s.mutfakMesajlari.find(x=>x.id===msjId);
  if(!msj) return;
  msj.durum=durum;
  msj.yanitZaman=Date.now();
  // bekleyen başka mesaj yoksa masa mesaj bayrağını indir
  s.mesajVar = s.mutfakMesajlari.some(x=>(x.durum||"bekliyor")==="bekliyor");
  note(durum==="onaylandi"?"✓ İstek onaylandı, müşteriye bildirildi":"✕ İstek reddedildi, müşteriye bildirildi");
  // açık mesaj pop-up'ı varsa kapat / güncelle
  kdsMesajPopKapat();
  renderKDS();
  // sıradaki bekleyen mesaj varsa onu göster
  kdsBekleyenMesajGoster();
}
function kdsMesajTemizle(m){
  const s=SESSIONS[m]; if(!s) return;
  s.mutfakMesajlari=[]; s.mesajVar=false;
  note("Mesajlar temizlendi"); renderKDS();
}
/* Mutfakta bekleyen müşteri mesajı varsa otomatik pop-up göster */
function kdsBekleyenMesajGoster(){
  // bu şubenin masalarında en eski bekleyen mesajı bul
  let hedef=null;
  const onek = AKTIF_SUBE+"::";
  Object.keys(SESSIONS).filter(id=>id.startsWith(onek)).forEach(id=>{
    const s=SESSIONS[id];
    if(s && s.mutfakMesajlari){
      s.mutfakMesajlari.forEach(msj=>{
        if((msj.durum||"bekliyor")==="bekliyor"){
          if(!hedef || msj.zaman<hedef.msj.zaman) hedef={masa:id, msj};
        }
      });
    }
  });
  if(!hedef){ kdsMesajPopKapat(); return; }
  const masaAd = masaEtiket(hedef.masa);
  let mdl=document.getElementById("kdsMesajPop");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="kdsMesajPop"; mdl.className="modal-bg"; mdl.style.zIndex="210"; document.body.appendChild(mdl); }
  const mq="'"+String(hedef.masa).replace(/'/g,"\\'")+"'";
  mdl.innerHTML=`<div class="kmp-ic">
    <div class="kmp-ikon">💬</div>
    <div class="kmp-bas">Müşteri Mesajı</div>
    <div class="kmp-masa">${masaAd} · 👤 ${hedef.msj.kisi||'Müşteri'}</div>
    <div class="kmp-mesaj">"${hedef.msj.mesaj}"</div>
    <div class="kmp-butonlar">
      <button class="kmp-red" onclick="kdsMesajYanit(${mq},'${hedef.msj.id}','reddedildi')">✕ Reddet</button>
      <button class="kmp-onay" onclick="kdsMesajYanit(${mq},'${hedef.msj.id}','onaylandi')">✓ Onayla</button>
    </div>
    <button class="kmp-sonra" onclick="kdsMesajPopKapat()">Sonra bakarım</button>
  </div>`;
  mdl.classList.add("on");
}
function kdsMesajPopKapat(){ const m=document.getElementById("kdsMesajPop"); if(m) m.classList.remove("on"); }

/* Mutfak fişi (KOT) — paketlenecekler AYRI gruplanır */
function kdsFisYazdir(m){
  // masanın anlık fişini üret ve göster (yeni fiş kaydı oluşturmadan, anlık)
  const kalemler=masaKalemleri(m).filter(it=>it.durum!=="iptal");
  const fis={no:"—", zaman:Date.now(), tip:"masa", baslik:"MASA "+m, alt:AKTIF_SUBE,
    kalemler:kalemler.map(it=>({ad:it.ad, secimler:it.secimler, kisi:it.kisi, paket:it.paket}))};
  fisGoster(fis, false);
}
/* Kısmi ödeme fişi (POS gönderim için) */
function fisIcerikYazdir(veri){
  let mdl=document.getElementById("fisModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="fisModal"; mdl.className="modal-bg"; document.body.appendChild(mdl); }
  let ic=`<div class="fis-modal-ic"><div class="fis-onizleme-rozet">👁️ Fiş Önizleme</div><div class="fis-kagit">
    <div class="fis-logo">MİNİPAN</div>
    <div class="fis-fis-baslik">${veri.baslik}</div>
    <div class="fis-meta">${veri.masa} · ${new Date().toLocaleString('tr')}</div>
    <div class="fis-cizgi"></div>`;
  veri.kalemler.forEach(k=>{
    ic+=`<div class="fis-satir"><span>${k.ad}</span><span>${tl(k.tutar)} ₺</span></div>`;
  });
  ic+=`<div class="fis-cizgi"></div>`;
  if(veri.indirim>0) ic+=`<div class="fis-satir"><span>İndirim</span><span>−${tl(veri.indirim)} ₺</span></div>`;
  ic+=`<div class="fis-satir fis-toplam"><span>ÖDENEN</span><span>${tl(veri.toplam)} ₺</span></div>`;
  // ödeme yöntemi dağılımı
  if(veri.yontemler && veri.yontemler.length){
    ic+=`<div class="fis-cizgi"></div><div class="fis-not-bas">Ödeme:</div>`;
    veri.yontemler.forEach(y=>{ ic+=`<div class="fis-satir"><span>${y.ad}</span><span>${tl(y.tutar)} ₺</span></div>`; });
  }
  ic+=`<div class="fis-kismi-rozet">⚠️ KISMİ ÖDEME</div>`;
  if(veri.notlar && veri.notlar.length){
    ic+=`<div class="fis-cizgi"></div><div class="fis-not-bas">Notlar:</div>`;
    veri.notlar.forEach(n=>{ ic+=`<div class="fis-not-satir">• ${n}</div>`; });
  }
  ic+=`</div><div class="fis-aksiyon">
    <button class="kak-btn gonder" onclick="window.print&&window.print()">🖨️ Yazdır / POS'a gönder</button>
    <button class="kak-btn iptal" onclick="document.getElementById('fisModal').classList.remove('on')">Kapat</button>
  </div></div>`;
  mdl.innerHTML=ic;
  mdl.classList.add("on");
}
/* Fişi modal olarak göster (tekrar yazdırma) */
function fisGoster(fis, otomatik){
  let mdl=document.getElementById("fisModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="fisModal"; mdl.className="modal-bg"; document.body.appendChild(mdl); }
  mdl.innerHTML='<div class="fis-modal-ic">'+
    (otomatik?'<div class="fis-oto-rozet">🖨️ Otomatik yazdırıldı</div>':'')+
    fisIcerikHtml(fis)+
    '<div class="fis-aksiyon"><button class="kak-btn gonder" onclick="window.print&&window.print()">🖨️ Tekrar yazdır</button>'+
    '<button class="kak-btn iptal" onclick="document.getElementById(\'fisModal\').classList.remove(\'on\')">Kapat</button></div></div>';
  mdl.classList.add("on");
}
function kdsIptal(m,id){ kalemIptalOnay(m,id,"kds"); }
function kdsOpsKaldir(m,id,oi){ secenekSilOnay(m,id,oi,"kds"); }

/* ============================================================
   GARSON EKRANI (tablet/mobil) — masaları gör, kişiye ürün ekle
   Mutfakla aynı SESSIONS çekirdeği. Garson ekleyince mutfak görür.
   ============================================================ */
let GARSON = { view:"masalar", masa:null, kisi:null, aktifKat:"Tatlılar" };

function openGarson(){
  document.getElementById("login").style.display="none";
  if(Object.keys(SESSIONS).length===0) seedSessions();
  GARSON = { view:"masalar", masa:null, kisi:null, aktifKat:"Tatlılar" };
  renderGarson();
  document.getElementById("garsonApp").style.display="block";
}
function closeGarson(){ document.getElementById("garsonApp").style.display="none"; document.getElementById("login").style.display="flex"; }

function renderGarson(){
  sessionsKaydet();
  const el=document.getElementById("garsonApp");
  if(GARSON.view==="masalar")    el.innerHTML=garsonMasalarHtml();
  else if(GARSON.view==="masa")  el.innerHTML=garsonMasaHtml();
  else if(GARSON.view==="menu")  el.innerHTML=garsonMenuHtml();
  el.scrollTop=0;
}

/* 1) Masa listesi */

function garsonUrunSec(pi){
  const p=DEMO_PRODUCTS[pi];
  if(!urunSatilabilir(p)) return;
  const opts=PRODUCT_OPTIONS[p.ad];
  if(opts&&opts.length){
    OPT_STATE={idx:pi, p:p, secim:{}, not:"", kapatMod:false, garson:true};
    PRODUCT_OPTIONS[p.ad].forEach((grup,gi)=>{ OPT_STATE.secim[gi]= grup.tip==="zorunlu_tekli"?[0]:[]; });
    renderOptionModal();
    document.getElementById("optModal").classList.add("on");
  } else if(GARSON.paketModu){
    // paket sepetine ekle
    if(!GARSON.paketSepet) GARSON.paketSepet=[];
    GARSON.paketSepet.push({ad:p.ad, fiyat:urunGecerliFiyat(p.ad), secimler:[], kcal:urunTemelKcal(p.ad)});
    note(p.ad+" → Paket sepeti");
    renderGarson();
  } else {
    // MASA sepeti — geçici, "Siparişi gönder" ile masaya+mutfağa gider (tek fiş)
    if(!GARSON.masaSepet) GARSON.masaSepet=[];
    GARSON.masaSepet.push({ad:p.ad, fiyat:urunGecerliFiyat(p.ad), secimler:[], paket:false, kcal:urunTemelKcal(p.ad)});
    note(p.ad+" → sepet");
    renderGarson();
  }
}
/* Garson masa siparişini gönder — sadece YENİ sepet mutfağa + tek fiş */
function garsonMasaGonder(){
  if(!GARSON.masaSepet || GARSON.masaSepet.length===0){ note("Sepet boş"); return; }
  const m=GARSON.masa, kisi=GARSON.kisi;
  let s=SESSIONS[m]; if(!s){ s=SESSIONS[m]={masa:m, acik:true, zaman:Date.now(), kisiler:[]}; }
  s.acik=true;   // sipariş geldi → masa açıldı
  let k=s.kisiler.find(x=>x.ad===kisi);
  if(!k){ k={ad:kisi, kalemler:[]}; s.kisiler.push(k); }
  // sadece bu sepet kalemleri masaya eklenir
  GARSON.masaSepet.forEach(c=>{
    k.kalemler.push({id:_kalemId++, ad:c.ad, fiyat:c.fiyat, secimler:c.secimler||[], secimGruplu:c.secimGruplu||[], ekstraRecete:[], durum:"bekliyor", paket:!!c.paket});
  });
  consumeRecipe(GARSON.masaSepet.map(c=>({...c, q:1, ekstraRecete:[]})));
  // TEK FİŞ — sadece bu sepet (eski ürünler hariç)
  mutfakFisiBas({
    tip:"masa", baslik:"MASA "+m, alt:kisi, kisi:kisi, masa:m,
    kalemler:GARSON.masaSepet.map(c=>({ad:c.ad, secimler:c.secimler, secimGruplu:c.secimGruplu, kisi:kisi, paket:!!c.paket}))
  });
  // paketli kalemler ayrıca paket ekranına
  // masadan paketli ürün masaya bağlı kalır (kalemde paket:true) — ayrı PAKET_ORDERS yok
  note("✓ Sipariş gönderildi · fiş çıktı ("+kisi+")");
  GARSON.masaSepet=[]; GARSON.view="masa"; renderGarson();
}
/* Garson paket siparişini mutfağa gönder */
function garsonPaketGonder(){
  if(!GARSON.paketSepet || GARSON.paketSepet.length===0){ note("Paket sepeti boş"); return; }
  const t=GARSON.paketSepet.reduce((s,c)=>s+c.fiyat,0);
  const takipId="S"+(_takipId++);
  const yeniId=_paketId++;
  PAKET_ORDERS.push({
    id:yeniId, takipId:takipId, tip:"paket", sube:AKTIF_SUBE, musteri:GARSON.paketMusteri||"Paket müşteri", tel:null,
    adres:null, kalemler:GARSON.paketSepet.map(c=>({ad:c.ad, secimler:c.secimler, secimGruplu:c.secimGruplu, fiyat:c.fiyat})),
    tutar:t, odeme:"kasada", durum:"hazirlaniyor", zaman:Date.now()
  });
  consumeRecipe(GARSON.paketSepet.map(c=>({...c, q:1, ekstraRecete:[]})));
  // OTOMATİK MUTFAK FİŞİ (masa:"paket#N" ile siparişe bağlanır — geçmişte eşleştirme için)
  mutfakFisiBas({
    tip:"paket", baslik:"PAKET (GEL-AL)", alt:GARSON.paketMusteri||"Paket müşteri", masa:"paket#"+yeniId,
    kisi:GARSON.paketMusteri, kalemler:GARSON.paketSepet.map(c=>({ad:c.ad, secimler:c.secimler, secimGruplu:c.secimGruplu, paket:true}))
  });
  note("🥡 Paket sipariş mutfağa gönderildi");
  GARSON.paketSepet=[]; GARSON.paketModu=false; GARSON.paketMusteri=null;
  GARSON.sekme="paket"; GARSON.view="masalar"; renderGarson();
}

function note(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast";
    t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s,transform .2s";
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity="1"; t.style.transform="translateX(-50%) translateY(0)";
  clearTimeout(t._h);
  t._h=setTimeout(function(){t.style.opacity="0"; t.style.transform="translateX(-50%) translateY(8px)";},2200);
}

/* ============================================================
   9) FIREBASE BAĞLANTI KATMANI (opsiyonel)
   ------------------------------------------------------------
   FIREBASE_CONFIG doldurulursa buluta bağlanır, onSnapshot ile
   canlı veri akar. Boşsa sistem offline kuyrukla çalışır —
   satış hiç durmaz, bağlantı gelince senkron olur.
   ============================================================ */
const FIREBASE_CONFIG = {
  // Buraya Firebase konsol config'i yapıştırılır:
  // apiKey:"...", authDomain:"...", projectId:"...", ...
};

window.__db = null;
window.__sube = "kadikoy";

async function initFirebase(){
  const dolu = FIREBASE_CONFIG && FIREBASE_CONFIG.projectId;
  if(!dolu){
    setConnState(false, "Offline mod · yerel kayıt aktif");
    return;
  }
  try{
    // Firebase SDK dinamik yüklenir (offline'da hata vermez)
    const app = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const fs  = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const a = app.initializeApp(FIREBASE_CONFIG);
    const db = fs.getFirestore(a);
    // Offline persistence — terminal yerel cache tutar
    try{ await fs.enableIndexedDbPersistence(db); }catch(e){}
    window.__db = db; window.__fs = fs;
    setConnState(true, "Buluta bağlı · canlı senkron");
    flushQueue();
  }catch(e){
    setConnState(false, "Bağlantı yok · offline kuyruk");
  }
}

function setConnState(online, msg){
  let el = document.getElementById("connState");
  if(!el){
    el = document.createElement("div");
    el.id = "connState";
    el.style.cssText = "position:fixed;bottom:14px;left:14px;font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:99px;z-index:80;display:flex;align-items:center;gap:6px";
    document.body.appendChild(el);
  }
  el.style.background = online ? "var(--ok-soft)" : "var(--warn-soft)";
  el.style.color = online ? "var(--ok)" : "var(--warn)";
  el.innerHTML = `<span style="width:7px;height:7px;border-radius:99px;background:currentColor"></span>${msg}`;
}

/* Bağlantı gelince offline kuyruğu boşalt */
function flushQueue(){
  if(!window.__db || !OFFLINE_QUEUE.length) return;
  const kuyruk = [...OFFLINE_QUEUE]; OFFLINE_QUEUE = [];
  kuyruk.forEach(o=>{
    try{ window.__fs.addDoc(window.__fs.collection(window.__db,`branches/${window.__sube}/orders`), o); }
    catch(e){ OFFLINE_QUEUE.push(o); }
  });
  if(kuyruk.length) note(`${kuyruk.length} bekleyen satış senkronlandı`);
}

// Tarayıcı online/offline olaylarını dinle
window.addEventListener("online",  ()=>{ setConnState(!!window.__db, window.__db?"Bağlantı geri geldi · senkron":"Çevrimiçi"); flushQueue(); });
window.addEventListener("offline", ()=> setConnState(false, "Bağlantı kesildi · offline kuyruk"));

// Uygulama açılışında başlat
sessionsYukle();   // masa/oturum/sipariş verilerini geri yükle (artık kalıcı)
masaGecmisYukle(); // kapanmış masa hesaplarının arşivini geri yükle
subeYukle();     // şube verilerini (yeni eklenenler dahil) geri yükle
b2bYukle();      // bayi kanalı verilerini (varsa) geri yükle
kampanyaYukle(); // kampanya + genel fiyat verilerini geri yükle
menuYukle();     // menü (kategori/ürün/seçenek/görsel) verilerini geri yükle
yorumYukle();    // ürün yorum/puanlama verilerini geri yükle
posAyarYukle();  // yazarkasa entegrasyon ayarlarını geri yükle
yaziciYukle();   // fiş yazıcı ayarlarını geri yükle
musteriReklamYukle(); // müşteri ekranı reklam görsellerini geri yükle
personelAdYukle();    // bu cihazdaki personel adını geri yükle
sadakatYukle();       // Mag puan kuru/oran ayarlarını geri yükle
splashYukle();        // QR intro ayarlarını geri yükle
if(Object.keys(OPTION_GROUPS).length===0) secenekGruplariniTopla();  // ürünlerden hazır gruplar çıkar
optionGroupsNormalize();  // eski format grupları yeni yapıya yükselt
if(OPTION_POOL.length===0) secenekleriTopla();  // tekil seçenek havuzunu doldur
initFirebase();

// Güvenlik ağı: render hook'larının kaçırdığı ara durumlar için 4 sn'de bir otomatik kayıt
setInterval(sessionsKaydet, 4000);
// Sekme/uygulama kapanırken son hali kesin kaydet
window.addEventListener("beforeunload", sessionsKaydet);
window.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") sessionsKaydet(); });

</script>
