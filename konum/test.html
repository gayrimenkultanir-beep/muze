<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pusula Navigasyon</title>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

/* Kamera */
#cam {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Üst bilgi */
#topBox {
  position:fixed;
  top:18%;
  width:100%;
  text-align:center;
  color:white;
  z-index:10;
}

#arrow { font-size:70px; }
#text { font-size:20px; margin-top:5px; }
#distance { font-size:16px; opacity:0.8; }

/* Yarım daire pusula */
#compassWrap {
  position:fixed;
  bottom:0;
  width:100%;
  height:200px;
  overflow:hidden;
  z-index:10;
}

#compass {
  position:absolute;
  bottom:-120px;
  left:50%;
  width:600px;
  height:600px;
  margin-left:-300px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
}

.tick {
  position:absolute;
  width:2px;
  height:20px;
  background:white;
  top:0;
  left:50%;
  transform-origin:bottom center;
  opacity:0.4;
}

.targetLine {
  position:absolute;
  width:4px;
  height:120px;
  background:#00e5ff;
  top:0;
  left:50%;
  transform-origin:bottom center;
}

.centerLine {
  position:absolute;
  width:4px;
  height:140px;
  background:red;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
}

/* Bildirim */
#notify {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:black;
  color:white;
  padding:20px;
  border-radius:10px;
  display:none;
  z-index:20;
}
</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>

<div id="topBox">
  <div id="arrow"></div>
  <div id="text"></div>
  <div id="distance"></div>
</div>

<div id="compassWrap">
  <div id="compass"></div>
  <div class="centerLine"></div>
</div>

<div id="notify">Şu an sunum odasındasınız</div>

<script>
// 📍 HEDEF
const TARGET = { lat: 37.8596296, lng: 27.2728122 };

// 📍 BAŞLANGIÇ
let userLat = 37.8595412;
let userLng = 27.2725581;

let heading = 0;
let arrived = false;

// 📷 Kamera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  document.getElementById("cam").srcObject = stream;
});

// 📍 Konum
navigator.geolocation.watchPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
});

// 🧭 Pusula
window.addEventListener("deviceorientationabsolute", e => {
  if (e.alpha !== null) heading = e.alpha;
});

// 📐 Bearing
function getBearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  const dLon = toRad(lon2 - lon1);

  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x =
    Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// 📏 Mesafe
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const toRad = d => d * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 🔄 fark
function getDiff(target, current) {
  let diff = target - current;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return diff;
}

// 🧭 pusula çiz
const compass = document.getElementById("compass");
for (let i = -90; i <= 90; i += 5) {
  const tick = document.createElement("div");
  tick.className = "tick";
  tick.style.transform = `rotate(${i}deg) translateY(-260px)`;
  compass.appendChild(tick);
}

// 🎯 hedef çizgi
const targetLine = document.createElement("div");
targetLine.className = "targetLine";
compass.appendChild(targetLine);

// 🔄 ana loop
setInterval(() => {

  if (arrived) return;

  const bearing = getBearing(userLat, userLng, TARGET.lat, TARGET.lng);
  const diff = getDiff(bearing, heading);
  const dist = getDistance(userLat, userLng, TARGET.lat, TARGET.lng);

  // hedef çizgi
  targetLine.style.transform = `rotate(${diff}deg)`;

  let text = "";
  let arrow = "";

  // 🎯 ±10 derece tolerans
  if (Math.abs(diff) < 10) {
    text = "Doğru ilerleyin";
    arrow = "⬆️";
  } else {
    text = "Yönü hizalayın";
    arrow = "";
  }

  document.getElementById("arrow").innerHTML = arrow;
  document.getElementById("text").innerHTML = text;
  document.getElementById("distance").innerHTML = Math.round(dist) + " metre";

  // 📍 varış
  if (dist < 6) {
    arrived = true;
    document.getElementById("notify").style.display = "block";
  }

}, 300);

</script>

</body>
</html>
