<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akıllı Kamera Navigasyon</title>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

/* Kamera */
#cam {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Ok */
#arrow {
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:80px;
  z-index:10;
}

/* Yön skalası */
#compassBar {
  position:fixed;
  top:10%;
  width:200%;
  height:40px;
  left:-50%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  z-index:10;
}

.line {
  width:4px;
  height:30px;
  background:white;
  margin:0 20px;
  opacity:0.5;
}

.centerLine {
  position:fixed;
  top:10%;
  left:50%;
  width:4px;
  height:40px;
  background:red;
  z-index:11;
}

/* Bilgi */
#info {
  position:fixed;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:10px;
  border-radius:10px;
  font-size:14px;
  z-index:10;
}

/* Bildirim */
#notify {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:black;
  color:white;
  padding:20px;
  border-radius:10px;
  display:none;
  z-index:20;
}
</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>

<div id="compassBar"></div>
<div class="centerLine"></div>

<div id="arrow">⬆️</div>
<div id="info">Başlatılıyor...</div>
<div id="notify">Şimdi sunum odasındasınız</div>

<script>
// 📍 SENİN VERDİĞİN KOORDİNATLAR
const TARGET = { lat: 37.8596296, lng: 27.2728122 };

let userLat = 37.8595412;
let userLng = 27.2725581;

let heading = 0;
let arrived = false;

// 📷 Kamera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  document.getElementById("cam").srcObject = stream;
});

// 📍 Konum
navigator.geolocation.watchPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
});

// 🧭 Pusula
window.addEventListener("deviceorientationabsolute", e => {
  if (e.alpha !== null) heading = e.alpha;
});

// 📐 Bearing
function getBearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  const dLon = toRad(lon2 - lon1);

  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x =
    Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// 📏 Mesafe
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const toRad = d => d * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)*Math.sin(dLon/2);

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 🔄 fark
function getDiff(target, current) {
  let diff = target - current;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return diff;
}

// 🧭 Skala oluştur
const compass = document.getElementById("compassBar");
for (let i = 0; i < 50; i++) {
  const div = document.createElement("div");
  div.className = "line";
  compass.appendChild(div);
}

// 🔄 ana loop
setInterval(() => {

  if (arrived) return;

  const bearing = getBearing(userLat, userLng, TARGET.lat, TARGET.lng);
  const diff = getDiff(bearing, heading);
  const dist = getDistance(userLat, userLng, TARGET.lat, TARGET.lng);

  // 🧭 skala hareket
  compass.style.transform = `translateX(${diff * 3}px)`;

  // ➡️ ok
  let arrow = "⬆️";
  let text = "";

  if (Math.abs(diff) < 10) {
    arrow = "⬆️";
    text = "Düz ilerleyin";
  } else if (diff > 10) {
    arrow = "➡️";
    text = "Sağa dön";
  } else {
    arrow = "⬅️";
    text = "Sola dön";
  }

  document.getElementById("arrow").innerHTML = arrow;

  // 👣 adım hesabı (~0.75m/adım)
  const steps = Math.round(dist / 0.75);

  document.getElementById("info").innerHTML =
    text + "<br>" +
    steps + " adım";

  // 📍 varış
  if (dist < 5) {
    arrived = true;
    document.getElementById("notify").style.display = "block";
  }

}, 300);

</script>

</body>
</html>
