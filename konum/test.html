<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Akıllı Rehber Pusula</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:black;
}

/* Kamera arka plan */
#camera{
position:fixed;
top:0;left:0;
width:100%;height:100%;
object-fit:cover;
z-index:1;
filter:brightness(0.6);
}

/* Overlay */
#ui{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:2;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* Dış pusula */
.outer{
width:320px;
height:320px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.4);
position:absolute;
display:flex;
align-items:center;
justify-content:center;
}

/* Sabit N E S W */
.cardinals{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:white;
opacity:0.8;
}

/* Dönen iç halka */
.inner{
width:240px;
height:240px;
border-radius:50%;
border:2px solid rgba(0,255,200,0.4);
position:absolute;
display:flex;
align-items:center;
justify-content:center;
transition:transform 0.1s linear;
}

/* Ok */
.arrow{
width:0;
height:0;
border-left:15px solid transparent;
border-right:15px solid transparent;
border-bottom:40px solid red;
position:absolute;
top:20px;
}

/* Merkez nokta */
.centerDot{
width:12px;
height:12px;
background:white;
border-radius:50%;
position:absolute;
}

/* Yazı */
#status{
position:absolute;
bottom:80px;
color:white;
font-size:22px;
font-weight:bold;
text-shadow:0 0 10px black;
}

#hint{
position:absolute;
bottom:40px;
color:rgba(255,255,255,0.7);
font-size:14px;
}
</style>
</head>

<body>

<!-- Kamera -->
<video id="camera" autoplay playsinline></video>

<div id="ui">

    <!-- dış pusula -->
    <div class="outer">
        <div class="cardinals">N &nbsp;&nbsp;&nbsp; E &nbsp;&nbsp;&nbsp; S &nbsp;&nbsp;&nbsp; W</div>
    </div>

    <!-- iç dönen halka -->
    <div class="inner" id="innerRing">
        <div class="arrow"></div>
        <div class="centerDot"></div>
    </div>

    <div id="status">Hizalanıyor...</div>
    <div id="hint">Telefonu çevirerek oku hizala</div>

</div>

<script>
// Kamera aç
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream=>{
document.getElementById("camera").srcObject = stream;
});

// hedef açı (örnek: 0 = kuzey)
let target = 0;

function normalize(angle){
angle = angle % 360;
if(angle < 0) angle += 360;
return angle;
}

// cihaz yönü
window.addEventListener("deviceorientation", (e)=>{
let heading = e.alpha; // 0-360

if(heading === null) return;

heading = normalize(heading);

// iç halka döner
document.getElementById("innerRing").style.transform =
`rotate(${ -heading }deg)`;

// fark hesapla
let diff = Math.abs(target - heading);
if(diff > 180) diff = 360 - diff;

let status = document.getElementById("status");

if(diff <= 10){
status.innerText = "👉 İLERLEYİNİZ";
status.style.color = "lime";
} else if(diff <= 30){
status.innerText = "Yaklaştınız";
status.style.color = "orange";
} else {
status.innerText = "Hizalanıyor...";
status.style.color = "white";
}
});

</script>

</body>
</html>
