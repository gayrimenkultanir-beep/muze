<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Külliye Dijital Arşiv</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --altin: #B39359;
            --ana: #2C2420;
            --mermer: #FDFCF9;
            --kenar: rgba(179, 147, 89, 0.3);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            background: var(--mermer);
            font-family: 'Montserrat', sans-serif;
            color: var(--ana);
            overflow-x: hidden;
            display: flex;
        }

        /* --- INTERAKTİF ARKA PLAN DESENİ --- */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
        }
        
        /* Hover Efektli Geometrik SVG */
        .pattern-svg {
            width: 100%; height: 100%;
            fill: none;
            stroke: var(--altin);
            stroke-width: 0.5;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 350px;
            background: white;
            border-right: 1px solid var(--kenar);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 40px 30px;
            background: var(--ana);
            color: var(--altin);
            text-align: center;
        }

        .nav-list { overflow-y: auto; flex: 1; }
        .nav-item {
            padding: 20px 30px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition);
            display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--mermer);
            color: var(--altin);
            padding-left: 40px;
        }

        /* --- ANA İÇERİK KARTI --- */
        .main-stage {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .museum-card {
            background: white;
            width: 100%;
            max-width: 900px;
            min-height: 80vh;
            position: relative;
            padding: 60px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            border: 1px solid var(--kenar);
            animation: fadeIn 0.8s ease;
        }

        /* Sağ Üst Hoparlör Animasyonu */
        .audio-speaker {
            position: absolute;
            top: 30px; right: 30px;
            width: 50px; height: 50px;
            cursor: pointer;
            fill: var(--altin);
            transition: var(--transition);
        }
        .audio-speaker:hover { transform: scale(1.1); }
        .audio-speaker.playing { animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Görsel Alanı */
        .image-frame {
            width: 100%;
            height: 350px;
            background: #eee;
            margin-bottom: 40px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--kenar);
        }
        .image-frame img { width: 100%; height: 100%; object-fit: cover; }

        .title-group h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            margin: 0;
            color: var(--ana);
        }

        .text-body {
            font-size: 17px;
            line-height: 2;
            margin: 30px 0;
            color: #444;
        }

        /* --- ALT BUTONLAR --- */
        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            border-top: 1px solid var(--kenar);
            padding-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            font-family: 'Montserrat';
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-next { background: var(--ana); color: white; }
        .btn-next:hover { background: var(--altin); letter-spacing: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobil */
        @media (max-width: 992px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .main-stage { padding: 20px; }
            .museum-card { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="bg-pattern">
        <svg class="pattern-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
                <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="currentColor" stroke-width="0.1"/>
                    <circle cx="10" cy="10" r="1" fill="currentColor" fill-opacity="0.2"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
        </svg>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>DİJİTAL REHBER</h3>
        </div>
        <div class="nav-list" id="navList"></div>
    </aside>

    <main class="main-stage">
        <article class="museum-card" id="card">
            <svg class="audio-speaker" id="speaker" viewBox="0 0 24 24" onclick="toggleAudio()">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>

            <div id="content-wrap">
                <div class="image-frame">
                    <img src="https://images.unsplash.com/photo-1565037667171-11d6204b3b24?auto=format&fit=crop&q=80&w=1000" alt="Külliye">
                </div>
                <div class="title-group">
                    <span id="subtitle" style="color:var(--altin); font-weight:600;">HOŞ GELDİNİZ</span>
                    <h1 id="title">Eşiğe Davet</h1>
                </div>
                <div class="text-body" id="text">
                    Lütfen sol taraftan keşfetmek istediğiniz durağı seçin.
                </div>
                <div class="button-group" id="btnGroup">
                    <button class="btn btn-next" onclick="renderStep(0)">KEŞFE BAŞLA</button>
                </div>
            </div>
        </article>
    </main>

    <script>
        const tourData = [
            { t: "🏛️ Giriş ve Hoşgeldiniz", s: "ŞİFA YOLCULUĞU", m: "500 yıllık köklü bir geçmişe adım atıyorsunuz. Burada suyun ritmini ve geçmişin bilgeliğini keşfedeceksiniz.", i: "https://images.unsplash.com/photo-1548013146-72479768b921?w=800", q: "Başlamaya hazır mısınız?", b: "1. Durağa Git", a: "intro.mp3" },
            { t: "⚖️ 1. Durak: Adalet Kapısı", s: "İHTİŞAMLI GİRİŞ", m: "Bu kapı, Osmanlı'nın insanı merkeze alan hizmet anlayışının başlangıcıdır. Buradan itibaren külliye iki ana aksa ayrılır.", i: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800", q: "Taç kapıya doğru ilerleyelim.", b: "İlerleyin ➡", a: "01.mp3" },
            { t: "🚪 2. Durak: Darüşşifa Girişi", s: "ESTETİK VE NİZAM", m: "Şifanın kapısına ulaştınız. Sağdaki panolarda külliyenin muazzam yerleşim planını görebilirsiniz.", i: "https://images.unsplash.com/photo-1503174971373-b1f69850bded?w=800", q: "Eşikten geçmeye hazır mısınız?", b: "İçeri Gir ➡", a: "02.mp3" },
            { t: "🌿 3. Durak: 1. Avlu", s: "ŞİFANIN İLK DURAĞI", m: "Eşiği geçtiğiniz an dış dünyanın gürültüsü kaybolur. Sağ tarafta poliklinik odaları sizi karşılar.", i: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800", q: "Sembolleri inceleyelim mi?", b: "Devam Et ➡", a: "03.mp3" },
            { t: "💧 4. Durak: Süt Kuyusu", s: "SEMBOLLERİN DİLİ", m: "Bu kuyu, asırlık bir inanışın merkezidir. Suyun kutsiyetini ve şifayı simgeler.", i: "https://images.unsplash.com/photo-1523217582562-09d0def993a6?w=800", q: "Sunum odasına geçiyoruz.", b: "Sunuma Git", a: "04.mp3" },
            { t: "📚 5. Durak: Bilgi Eşiği", s: "DENEYİMİN BAŞLANGICI", m: "Artık taşların dile geldiği noktadayız. Tarihsel perspektif burada derinleşiyor.", i: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=800", q: "Lojistik birimleri görelim mi?", b: "Lojistik Bölüm ➡", a: "05.mp3" },
            { t: "🧼 6. Durak: Çamaşırhane", s: "HİJYEN EKOLÜ", m: "Osmanlı tıp geleneğinde hijyen, tedavinin temelidir. Sterilizasyon burada sağlanırdı.", i: "https://images.unsplash.com/photo-1545173153-1579486a4225?w=800", q: "Mutfak bölümüne geçiyoruz.", b: "Mutfağa İlerle", a: "06.mp3" },
            { t: "🍲 7. Durak: Mutfak (Matbah)", s: "GIDALARLA TEDAVİ", m: "Beslenmenin bir tedavi aracı olduğu bu alanda, her hastaya özel diyetler hazırlanırdı.", i: "https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=800", q: "Polikliniklere dönelim.", b: "Poliklinikler ➡", a: "07.mp3" },
            { t: "🩺 8. Durak: Teşhis Odası", s: "KLİNİK YÖNETİM", m: "Modern tıptaki triyaj sisteminin 500 yıl önceki karşılığı tam olarak burasıdır.", i: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=800", q: "Uzmanlık alanlarını görelim.", b: "İhtisas Odaları", a: "08.mp3" },
            { t: "🧠 9. Durak: İhtisas Odaları", s: "İLK BRANŞLAŞMA", m: "Asabiye, Dahiliye ve Göz hekimlerinin branşlaştığı ilk merkezlerden birindesiniz.", i: "https://images.unsplash.com/photo-1516549655169-df83a0774514?w=800", q: "İkinci avluya geçmeye hazır mısınız?", b: "2. Avluya Git ➡", a: "09.mp3" }
        ];

        const navList = document.getElementById('navList');

        tourData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'nav-item';
            div.innerHTML = `<span>${index + 1}.</span> <strong>${item.t}</strong>`;
            div.onclick = () => renderStep(index);
            navList.appendChild(div);
        });

        function renderStep(index) {
            const step = tourData[index];
            const isLast = index === tourData.length - 1;

            // Nav aktif güncelleme
            document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === index));

            document.getElementById('card').style.opacity = 0;
            
            setTimeout(() => {
                document.getElementById('title').innerText = step.t;
                document.getElementById('subtitle').innerText = step.s;
                document.getElementById('text').innerHTML = `${step.m.replace(/\n/g, '<br>')} <br><br> <i style="color:var(--altin)">${step.q}</i>`;
                document.querySelector('.image-frame img').src = step.i;
                
                document.getElementById('btnGroup').innerHTML = `
                    <button class="btn btn-next" onclick="renderStep(${isLast ? 0 : index + 1})">
                        ${isLast ? "BAŞA DÖN" : step.b}
                    </button>
                `;
                document.getElementById('card').style.opacity = 1;
            }, 300);
        }

        let isPlaying = false;
        function toggleAudio() {
            isPlaying = !isPlaying;
            document.getElementById('speaker').classList.toggle('playing', isPlaying);
            if(isPlaying) alert("Sesli rehber başlatıldı...");
            else alert("Sesli rehber durduruldu.");
        }

        function toggleMenu() {
            document.querySelector('.sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
