<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Külliye | Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0f1a24; --box-bg: #1b2b3a; }
        body { background: var(--dark); color: #f4e7c8; font-family: 'Montserrat', sans-serif; margin: 0; padding: 40px; }
        .admin-wrapper { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 400px 1fr; gap: 30px; }
        
        .panel-box { background: var(--box-bg); border: 2px solid var(--gold); border-radius: 12px; padding: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); position: sticky; top: 40px; height: fit-content; }
        h2 { font-family: 'Cinzel'; color: var(--gold); margin-top: 0; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px; font-size: 1.2rem; }
        
        /* Form Stil */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 5px; }
        input[type="text"], input[type="date"], input[type="file"] { width: 100%; padding: 10px; background: #0a1219; border: 1px solid var(--gold); color: white; border-radius: 4px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-save { background: var(--gold); color: var(--dark); }
        .btn-save:hover { background: #fff; }
        .btn-cancel { background: transparent; color: #888; border: 1px solid #444; }

        /* Liste Stil (Tüm Duyurular) */
        .list-container { background: var(--box-bg); border: 2px solid var(--gold); border-radius: 12px; padding: 25px; }
        .announcement-card { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s; }
        .announcement-card:hover { border-color: var(--gold); background: rgba(212,175,55,0.05); }
        
        .info-group { display: flex; align-items: center; gap: 15px; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 4px; border: 1px solid var(--gold); }
        .meta h4 { margin: 0; font-size: 14px; }
        .meta span { font-size: 12px; color: var(--gold); opacity: 0.8; }

        .actions { display: flex; gap: 10px; }
        .action-btn { background: none; border: 1px solid; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 10px; text-transform: uppercase; }
        .edit-btn { color: var(--gold); border-color: var(--gold); }
        .delete-btn { color: #ff4d4d; border-color: #ff4d4d; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <div class="panel-box">
        <h2 id="titleHeader">DUYURU YÖNETİMİ</h2>
        <form id="announcementForm" action="upload.php" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="action" id="formAction" value="new">
            <input type="hidden" name="index" id="editIndex" value="">

            <div class="form-group">
                <label>Duyuru Başlığı</label>
                <input type="text" name="title" id="titleInput" required placeholder="Başlık giriniz...">
            </div>

            <div class="form-group">
                <label>Tarih</label>
                <input type="date" name="date" id="dateInput" required>
            </div>

            <div class="form-group">
                <label>Görsel Seç (Afiş/Fotoğraf)</label>
                <input type="file" name="image" id="fileInput" accept="image/*">
                <small style="font-size: 9px; color: #888;">*Yeni görsel yüklemek için dosya seçin.</small>
            </div>

            <button type="submit" class="btn btn-save">VERİYİ KAYDET / GÜNCELLE</button>
            <button type="button" class="btn btn-cancel" onclick="resetForm()">TEMİZLE</button>
        </form>
    </div>

    <div class="list-container">
        <h2>TÜM DUYURULAR ARŞİVİ</h2>
        <div id="announcementList">
            </div>
    </div>
</div>

<script>
    let allData = [];

    async function loadAnnouncements() {
        const res = await fetch('duyurular/duyurular.json');
        allData = await res.json();
        renderList();
    }

    function renderList() {
        const listDiv = document.getElementById('announcementList');
        listDiv.innerHTML = '';
        
        // Tarihe göre yeniden eskiye sırala
        allData.sort((a,b) => new Date(b.tarih) - new Date(a.tarih));

        allData.forEach((item, index) => {
            listDiv.innerHTML += `
                <div class="announcement-card">
                    <div class="info-group">
                        <img src="${item.gorsel || 'assets/default.jpg'}" class="thumb">
                        <div class="meta">
                            <h4>${item.baslik}</h4>
                            <span>${new Date(item.tarih).toLocaleDateString('tr-TR')}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="action-btn edit-btn" onclick="prepareEdit(${index})">DÜZENLE</button>
                        <button class="action-btn delete-btn" onclick="deleteItem(${index})">SİL</button>
                    </div>
                </div>`;
        });
    }

    function prepareEdit(index) {
        const item = allData[index];
        document.getElementById('titleInput').value = item.baslik;
        document.getElementById('dateInput').value = item.tarih;
        document.getElementById('editIndex').value = index;
        document.getElementById('formAction').value = "update";
        document.getElementById('titleHeader').innerText = "DÜZENLEME MODU";
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('announcementForm').reset();
        document.getElementById('formAction').value = "new";
        document.getElementById('titleHeader').innerText = "DUYURU YÖNETİMİ";
    }

    function deleteItem(index) {
        if(confirm("Bu duyuru tamamen silinecek. Emin misiniz?")) {
            // Silme işlemi için de PHP'ye istek atılması gerekir
            alert("Silme işlemi için PHP dosyası tetiklenmeli.");
        }
    }

    window.onload = loadAnnouncements;
</script>

</body>
</html>
