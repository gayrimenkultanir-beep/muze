/* Ödeme alındı → sadakat işle (kullanım + kazanım), kişi ödendi */
function odemeTamamla(yontem, yontemAd){
  const ob = BOL.odemeBekleyen;
  const ki = ob.ki;
  const m = ob.musteri;
  const indirim = ob.kullanilanMag * SADAKAT.magTl;
  const tahsil = Math.max(0, ob.tutar - indirim);

  let sadakatNot = "";
  if(m){
    // KULLANIM: bozdurulan Mag düşülür
    if(ob.kullanilanMag>0){
      m.mag -= ob.kullanilanMag;
      magIslemEkle(m, "harcama", -ob.kullanilanMag, "Puanla ödeme indirimi");
    }
    // KAZANIM: ürün bazlı + kademe çarpanı
    const hamKazanc = odKazanilacakMag(ob.tutar, ki);
    const kademe = uyeKademe(m);
    const kazanc = Math.round(hamKazanc * (kademe.carpan||1));
    m.mag += kazanc;
    m.toplamKazanim = (m.toplamKazanim||0) + kazanc;  // ömür-boyu (kademe için)
    if(kazanc>0){
      const carpanNot = (kademe.carpan && kademe.carpan!==1) ? " ×"+kademe.carpan+" ("+kademe.ad+")" : "";
      magIslemEkle(m, "kazanim", kazanc, "Alışveriş ("+tl(ob.tutar)+" ₺)"+carpanNot);
    }
    // kademe atladı mı kontrol
    const yeniKademe = uyeKademe(m);
    let kademeNot="";
    if(yeniKademe.ad!==kademe.ad){ kademeNot=" · "+yeniKademe.ic+" "+yeniKademe.ad+" oldunuz!"; }
    sadakatNot = " · +"+kazanc+" "+SADAKAT.ad+kademeNot;
  }

  BOL.odenenler[ki] = {tutar:ob.tutar, tahsil:tahsil, yontem:yontemAd, mag:m?m.ad:null, zaman:Date.now()};
  odemeKapat();
  // TEK ÖDEME (bölmesiz) → adisyonu direkt kapat
  if(BOL.tekOdeme){
    note(BOL.kisiler[ki]+" · "+tahsil.toFixed(2)+" ₺ · "+yontemAd+sadakatNot);
    tekOdemeTamamla();
    return;
  }
  // BÖLME → payı işaretle, adisyon açık kalır
  state.odenen = (state.odenen||0) + ob.tutar;
  BOL.tekKisiKalan = undefined;   // override sıfırla (kalan normal moda döner)
  note(BOL.kisiler[ki]+" ödedi · "+tahsil.toFixed(2)+" ₺ · "+yontemAd+sadakatNot);
  renderBol();
  if(document.querySelector(".cart")) refreshCart();
}

  const {uyari} = consumeRecipe(state.cart);

  const odemeGecmisi = Object.entries(BOL.odenenler||{}).map(([ki,o])=>({...o, kisi:(BOL.kisiler&&BOL.kisiler[ki])||("Kişi "+(parseInt(ki)+1))}));
  state.cart=[]; state.odenen=0; state.bolDurum=null;

  }
  let msg = "Hesap bölündü, adisyon kapandı ✓";
  if(uyari.length) msg = "Adisyon kapandı · ⚠️ "+uyari.join(", ")+" kritik";
  note(msg);
  go("satis");
}

/* ============================================================
   REÇETE-TÜKETİM MOTORU
   Satış → reçete → gram düşüm → stok azalt → tüketim logla.
   Ödeme/indirim/sadakat bu motora DOKUNMAZ — adet üzerinden sayar.
   ============================================================ */
function consumeRecipe(cart){
  const dusenler = [];
  const uyari = [];
  cart.forEach(item=>{
    const recipe = RECIPES[item.ad];
    // 1) ana ürün reçetesi
    const tumKalemler = recipe ? recipe.slice() : [];
    // 2) opsiyon ekstra reçeteleri (ekstra muz, sos vb.)
    if(item.ekstraRecete) item.ekstraRecete.forEach(r=>tumKalemler.push(r));
    tumKalemler.forEach(r=>{
      const toplam = r.g * item.q;              // gram × satılan adet
      if(STOCK[r.ing]){
        STOCK[r.ing].mevcut -= toplam;          // stok düş
        CONSUMED[r.ing] = (CONSUMED[r.ing]||0) + toplam; // denetim logu
        dusenler.push(STOCK[r.ing].ad+" −"+toplam+"g");
        if(STOCK[r.ing].mevcut <= STOCK[r.ing].kritik)
          uyari.push(STOCK[r.ing].ad);
      }
    });
  });
  return {dusenler, uyari};
}

const HIZLI_SATIS_ID = "__hizlisatis";
function checkout(total){
  if(total===0){ note("Adisyon boş"); return; }
  // Satış sepetini geçici "Hızlı Satış" oturumuna aktar → masalardaki ile AYNI ödeme ekranı
  const kalemler = state.cart.map(c=>{
    const out=[];
    for(let n=0;n<(c.q||1);n++){
      out.push({id:_kalemId++, ad:c.ad, fiyat:c.fiyat, secimler:(c.secimler||[]).slice(),
                secimEk:(c.secimEk||[]).slice(), ekstraRecete:(c.ekstraRecete||[]).slice(),
                durum:"hazirlaniyor"});
    }
    return out;
  }).flat();
  SESSIONS[HIZLI_SATIS_ID] = {
    masa: HIZLI_SATIS_ID, acik:true, zaman:Date.now(), hizliSatis:true,
    kisiler: [{ad:"Hızlı Satış", kalemler:kalemler}]
  };
  // bu oturumdan dönülecek ekran + reçete tüketimi için sepet referansı sakla
  state._hizliSatisCart = state.cart.slice();
  odemeEkraniAc(HIZLI_SATIS_ID);
}

/* Direkt adisyon ödemesi tamamlandı → adisyonu kapat */
function tekOdemeTamamla(){
  const {uyari} = consumeRecipe(state.cart);
  saveOrder(state.cart, BOL.total);
  // Masada kişi ödemesi ise → o kişiyi ödendi işaretle, masaya dön
  const kasaKisi = BOL.kasaKisi;
  const kasaMasaKapat = BOL.kasaMasaKapat;
  const odemeGecmisi = Object.entries(BOL.odenenler||{}).map(([ki,o])=>({...o, kisi:(BOL.kisiler&&BOL.kisiler[ki])||("Kişi "+(parseInt(ki)+1))}));
  state.cart=[]; state.odenen=0; state.bolDurum=null;
  BOL=null;
  if(kasaKisi){
    const k = SESSIONS[kasaKisi.masa].kisiler[kasaKisi.ki];
    if(k) k.odendi = true;
    // masadaki herkes ödedi mi → masa kapanır
    const s = SESSIONS[kasaKisi.masa];
    const hepOdendi = s.kisiler.every(p=> p.odendi || p.kalemler.filter(it=>it.durum!=="iptal").length===0);
    if(hepOdendi){
      masaGecmiseArsivle(kasaKisi.masa, odemeGecmisi);
      note((k?k.ad:"Kişi")+" ödedi · masa kapandı ✓"); state.kasaMasa=null;
    }
    else note((k?k.ad:"Kişi")+" ödemesi alındı ✓");
    go("masalar");
    return;
  }
  if(kasaMasaKapat!=null){
    // tüm masa ödendi → masayı kapat
    const s = SESSIONS[kasaMasaKapat];
    if(s) s.kisiler.forEach(p=>p.odendi=true);
    masaGecmiseArsivle(kasaMasaKapat, odemeGecmisi);
    state.kasaMasa=null;
    note("Ödeme alındı · Masa "+kasaMasaKapat+" kapandı ✓");
    go("masalar");
    return;
  }
  let msg = "Ödeme alındı, adisyon kapandı ✓";
  if(uyari.length) msg = "Ödeme alındı · ⚠️ "+uyari.join(", ")+" kritik";
  note(msg);
  go("satis");
}

/* ============================================================
   VERİ KATMANI — Firebase varsa bulut, yoksa offline kuyruk
   ============================================================ */
/* ============================================================
   OTURUM / MASA ÇEKİRDEĞİ — KDS + Kasa + Garson ortak kaynağı
   Her masa → oturum → kişiler → kalemler (durum: bekliyor/
   hazirlaniyor/gonderildi/iptal). Tüm ekranlar buna bakar.
   Gerçekte: branches/{sube}/sessions/{masaNo}
   ============================================================ */
let SESSIONS = {};   // masaNo → {masa, acik, kisiler:[{ad, kalemler:[...]}], zaman}
let _kalemId = 1;

/* ============================================================
   SESSIONS KALICILIK — masa/sipariş verisi artık tarayıcı
   kapansa/yenilense de kaybolmuyor. Gerçek ortamda bu katmanın
   yerini Firestore/Supabase realtime senkron alacak; bu yama
   o ana kadar tek terminalde veri kaybını önler.
   ============================================================ */
const SESSIONS_KEY = "minipan_sessions_v1";
const KALEM_ID_KEY = "minipan_kalemid_v1";
function sessionsKaydet(){
  MPStore.set(SESSIONS_KEY, SESSIONS, 1);
  MPStore.setRaw(KALEM_ID_KEY, String(_kalemId));
}
function sessionsYukle(){
  SESSIONS = MPStore.get(SESSIONS_KEY, {}, {version:1});
  const ki = MPStore.getRaw(KALEM_ID_KEY, null);
  if(ki) _kalemId = Math.max(_kalemId, parseInt(ki)||1);
}

/* ============================================================
   MASA GEÇMİŞİ ARŞİVİ
   ------------------------------------------------------------
   Bir masa hesabı tamamen kapandığında o oturumun TÜM kaydı
   (kişiler, sipariş kalemleri, ödeme dağılımı, basılan mutfak
   fişleri) buraya değişmez bir kayıt olarak düşer.

   ÖNEMLİ — bununla birlikte düzeltilen bir hata: eskiden masa
   kapandığında SESSIONS[masaNo] objesi SİLİNMİYORDU, sadece
   acik:false yapılıyordu. Masa yeniden açıldığında (yeni
   müşteri oturduğunda) "if(!s) ... yeni oturum" kontrolleri
   var olan objeyi bulduğu için ESKİ kapanmış müşterinin
   kalemleri/kişileri YENİ müşterinin hesabına karışıyordu.
   Artık arşivlendikten sonra oturum sıfırdan temiz açılıyor.
   ============================================================ */
let MASA_GECMISI = [];
let _gecmisId = 1;
const MASA_GECMISI_KEY = "minipan_masa_gecmisi_v1";
function masaGecmisKaydet(){ MPStore.set(MASA_GECMISI_KEY, {kayitlar:MASA_GECMISI, _gecmisId}, 1); }
function masaGecmisYukle(){
  const v = MPStore.get(MASA_GECMISI_KEY, {}, {version:1});
  if(v.kayitlar) MASA_GECMISI = v.kayitlar;
  if(v._gecmisId) _gecmisId = Math.max(_gecmisId, v._gecmisId);
}
/* Ödeme kayıtlarını (hangi kaynaktan gelirse gelsin) okunur {ad,tutar} listesine indirger */
const YONTEM_AD_MAP = {nakit:"Nakit", kredi:"Kredi Kartı", diger:"Diğer/QR", qr:"QR Ödeme"};
function odemeOzetiCikar(s, ekOdemeler){
  const toplamlar = {};
  const ekle = (ad, tutar)=>{ if(!tutar) return; toplamlar[ad]=Math.round(((toplamlar[ad]||0)+tutar)*100)/100; };
  if(s && s.odemeler) s.odemeler.forEach(o=>(o.yontemler||[]).forEach(y=>ekle(YONTEM_AD_MAP[y.yontem]||y.yontem, y.tutar)));
  if(ekOdemeler && ekOdemeler.length) ekOdemeler.forEach(o=>ekle(o.yontem||"Diğer", o.tahsil!=null?o.tahsil:o.tutar));
  return Object.entries(toplamlar).map(([ad,tutar])=>({ad, tutar}));
}
/* Her tahsilatı (her "fiş"i) AYRI bir kayıt olarak çıkarır — kim, neyi, hangi
   yöntemle ödedi bilgisi burada birleştirilmeden korunur. masaGecmisDetay()
   bu listeyi fiş fiş gösterir. */
function odemeIslemleriCikar(s, ekOdemeler){
  const out = [];
  if(s && s.odemeler) s.odemeler.forEach(o=>{
    out.push({
      zaman:o.zaman, tip:'kalem',
      kalemler:(o.kalemler||[]).map(k=>({ad:k.ad||"Ürün", kisi:k.kisi||"", tutar:k.tutar||0})),
      yontemler:(o.yontemler||[]).map(y=>({ad:YONTEM_AD_MAP[y.yontem]||y.yontem, tutar:y.tutar||0})),
      indirim:o.indirim||0
    });
  });
  (ekOdemeler||[]).forEach(o=>{
    const tahsil = (o.tahsil!=null?o.tahsil:o.tutar)||0;
    out.push({
      zaman:o.zaman||Date.now(), tip:'kisi',
      kisi:o.kisi||"Müşteri", tutar:tahsil, yontem:o.yontem||"Diğer",
      indirim:(o.tutar!=null && o.tahsil!=null) ? Math.max(0, Math.round((o.tutar-o.tahsil)*100)/100) : 0,
      magAd:o.mag||null
    });
  });
  return out.sort((a,b)=>(a.zaman||0)-(b.zaman||0));
}
/* Masa hesabı tamamen kapanırken çağrılır: arşivle + oturumu temizle */
function masaGecmiseArsivle(masaNo, ekOdemeler){
  const s = SESSIONS[masaNo];
  if(!s) return;
  const onekIdx = String(masaNo).indexOf("::");
  const sube = onekIdx>=0 ? String(masaNo).slice(0,onekIdx) : AKTIF_SUBE;
  const kalemler = [];
  (s.kisiler||[]).forEach(k=>{
    (k.kalemler||[]).forEach(it=>{
      kalemler.push({ad:it.ad, fiyat:it.fiyat||0, kisi:k.ad, durum:it.durum||"bekliyor",
        secimler:it.secimler||[], paket:!!it.paket, odenenTutar:it.odenenTutar||0});
    });
  });
  const gecerli = kalemler.filter(it=>it.durum!=="iptal");
  const toplam = Math.round(gecerli.reduce((t,it)=>t+(it.fiyat||0),0)*100)/100;
  const odemeOzet = odemeOzetiCikar(s, ekOdemeler);
  const odemeIslemleri = odemeIslemleriCikar(s, ekOdemeler);
  const fisNolari = MUTFAK_FISLER.filter(f=>f.masa===masaNo).map(f=>f.no);
  MASA_GECMISI.push({
    id:_gecmisId++, tip:"masa", sube, masaId:masaNo, masaEtiket:masaEtiket(masaNo),
    acilis:s.zaman||Date.now(), kapanis:Date.now(),
    kisiler:(s.kisiler||[]).map(k=>k.ad),
    kalemler, urunSayisi:gecerli.length, toplam,
    odemeler:odemeOzet, odemeIslemleri, fisNo:fisNolari
  });
  masaGecmisKaydet();
  // oturumu sıfırla — bir sonraki müşteri eski kalemlerle karışmasın
  SESSIONS[masaNo] = {masa:masaNo, acik:false, zaman:Date.now(), kisiler:[]};
  sessionsKaydet();
}

/* Paket (gel-al) / Eve teslimat siparişi TESLİM edildiğinde geçmişe arşivlenir.
   Masa oturumlarından farkı: tek alıcı var (kişi bölme yok), ödeme tek kalem
   (p.odeme), mutfak fişi bağlantısı "paket#N"/"eve#N" anahtarıyla kurulur. */
const ODEME_TIPI_AD = {kasada:"Kasada (nakit/kart)", online:"Online ödeme", kapida:"Kapıda (nakit/kart)"};
function paketGecmiseArsivle(p){
  const musteri = p.musteri||"Müşteri";
  const kalemler = (p.kalemler||[]).map(it=>({ad:it.ad, fiyat:it.fiyat||0, kisi:musteri, durum:"teslim", secimler:it.secimler||[]}));
  const toplam = Math.round(kalemler.reduce((t,it)=>t+(it.fiyat||0),0)*100)/100;
  const odemeAdi = ODEME_TIPI_AD[p.odeme]||p.odeme||"Belirtilmemiş";

/* Masanın tüm kalemleri (kişi bilgisiyle düz liste) */
function masaKalemleri(masaNo){
  const s = SESSIONS[masaNo]; if(!s) return [];
  const out = [];
  s.kisiler.forEach(k=> k.kalemler.forEach(it=> out.push({...it, kisi:k.ad})));
  return out;
}
/* Masa toplamı (iptal hariç) */
/* Masa durumu → renk + etiket (kasa/garson/mutfak kartlarında kullanılır)
   Öncelik: garson çağrı > mutfağa mesaj > yeni sipariş (bekliyor) > dolu > boş */
function masaDurum(masaNo){
  const s=SESSIONS[masaNo];
  if(!s || !s.acik) return {kod:"bos", ad:"Boş", renk:"var(--line-2)", bg:"transparent"};
  if(s.garsonCagri) return {kod:"garson", ad:"🔔 Garson çağırdı", renk:"#e74c3c", bg:"#fdeceb"};
  if(s.mesajVar)    return {kod:"mesaj", ad:"💬 Mutfağa mesaj", renk:"#8e44ad", bg:"#f5ecfa"};
  const kalemler=masaKalemleri(masaNo).filter(it=>it.durum!=="iptal");
  const yeni=kalemler.some(it=>it.durum==="bekliyor");
  if(yeni) return {kod:"yeni", ad:"🆕 Yeni sipariş", renk:"#2f7ed8", bg:"#e8f1fc"};
  return {kod:"dolu", ad:"Dolu", renk:"var(--ok)", bg:"var(--ok-soft)"};
}
/* Masa çağrılarını temizle (kasa/garson ilgilendi) */
function masaCagriTemizle(masaNo){
  const s=SESSIONS[masaNo]; if(!s) return;
  s.garsonCagri=false; s.mesajVar=false;
}

function masaToplam(masaNo){
  return masaKalemleri(masaNo).filter(it=>it.durum!=="iptal").reduce((s,it)=>s+it.fiyat,0);
}
/* Masada şimdiye kadar ödenmiş toplam (kalem bazlı parçalı) */
function masaOdenen(masaNo){
  const s=SESSIONS[masaNo]; if(!s) return 0;
  let t=0;
  s.kisiler.forEach(k=>k.kalemler.forEach(it=>{ if(it.durum!=="iptal") t+=(it.odenenTutar||0); }));
  return Math.round(t*100)/100;
}
/* Masada ödenmemiş kalan tutar (kalem bazlı parçalı) */
function masaKalan(masaNo){
  return Math.round((masaToplam(masaNo) - masaOdenen(masaNo))*100)/100;
}
/* Bir kalemin kalan (ödenmemiş) tutarı */
function kalemKalan(it){
  if(it.durum==="iptal") return 0;
  return Math.round((it.fiyat - (it.odenenTutar||0))*100)/100;
}
/* Masaya ödeme kaydı ekle (parçalı). dagitim: kalemlere ne kadar ödendi */
function masaOdemeKaydet(masaNo, odemeler, dagitim, indirim){
  const s=SESSIONS[masaNo]; if(!s) return;
  if(!s.odemeler) s.odemeler=[];
  // kalemlere ödenen tutarı işle
  (dagitim||[]).forEach(d=>{
    s.kisiler.forEach(k=>k.kalemler.forEach(it=>{
      if(it.id===d.kalemId){ it.odenenTutar = Math.round(((it.odenenTutar||0)+d.tutar)*100)/100; }
    }));
  });
  // ödeme kaydı (yöntem dağılımı) — kalem adı/kişi bilgisi de eklenir, geçmiş ekranında
  // "kim neyi nasıl ödedi" tahsilat bazlı gösterilebilsin
  s.odemeler.push({
    zaman: Date.now(),
    yontemler: odemeler,       // [{yontem:"nakit",tutar:50},...]
    indirim: indirim||0,
    kalemler: (dagitim||[]).map(d=>{
      let ad="Ürün", kisi="";
      s.kisiler.forEach(k=>k.kalemler.forEach(it=>{ if(it.id===d.kalemId){ ad=it.ad; kisi=k.ad; } }));
      return {kalemId:d.kalemId, ad, kisi, tutar:d.tutar};
    })
  });
  // hepsi ödendiyse masayı kapat
  if(masaKalan(masaNo)<=0.01){
    masaGecmiseArsivle(masaNo);
  }
}
/* Masa notu ekle/oku */
function masaNotEkle(masaNo, metin){
  const s=SESSIONS[masaNo]; if(!s||!metin.trim()) return;
  if(!s.notlar) s.notlar=[];
  s.notlar.push({metin:metin.trim(), zaman:Date.now()});
}
function masaNotSil(masaNo, i){
  const s=SESSIONS[masaNo]; if(!s||!s.notlar) return;
  s.notlar.splice(i,1);
}
/* Kalem durumunu değiştir */
function kalemDurum(masaNo, kalemId, durum){
  const s=SESSIONS[masaNo]; if(!s) return;
  s.kisiler.forEach(k=>k.kalemler.forEach(it=>{ if(it.id===kalemId) it.durum=durum; }));
}
/* Kalemi iptal et (fiyat düşer çünkü toplam iptal hariç hesaplanır) */
function kalemIptal(masaNo, kalemId){ kalemDurum(masaNo, kalemId, "iptal"); }
/* Bir kalemden opsiyon kaldır (stok bitti) → fiyatı düşür */
function kalemOpsiyonKaldir(masaNo, kalemId, opsIdx, opsFiyat){
  const s=SESSIONS[masaNo]; if(!s) return;
  s.kisiler.forEach(k=>k.kalemler.forEach(it=>{
    if(it.id===kalemId){
      // bu seçimin ek fiyatı: önce kaydedilmiş secimEk, yoksa parametre
      const dusulecek = (it.secimEk && it.secimEk[opsIdx]!=null) ? it.secimEk[opsIdx] : (opsFiyat||0);
      const dusulecekKcal = (it.secimKcal && it.secimKcal[opsIdx]!=null) ? it.secimKcal[opsIdx] : 0;
      it.secimler.splice(opsIdx,1);
      if(it.secimEk) it.secimEk.splice(opsIdx,1);
      if(it.secimKcal) it.secimKcal.splice(opsIdx,1);
      it.fiyat = Math.max(0, Math.round((it.fiyat - dusulecek)*100)/100);
      it.kcal = Math.max(0, (it.kcal||0) - dusulecekKcal);
    }
  }));
}
/* Masaya/kişiye ürün ekle (kasa + garson) */
function masayaUrunEkle(masaNo, kisiAd, urun){
  let s=SESSIONS[masaNo];
  if(!s){ s=SESSIONS[masaNo]={masa:masaNo, acik:true, zaman:Date.now(), kisiler:[]}; }
  let k=s.kisiler.find(x=>x.ad===kisiAd);
  if(!k){ k={ad:kisiAd, kalemler:[]}; s.kisiler.push(k); }
  k.kalemler.push({id:_kalemId++, ad:urun.ad, fiyat:urun.fiyat, secimler:urun.secimler||[], ekstraRecete:urun.ekstraRecete||[], durum:"bekliyor", paket:!!urun.paket});
}

/* ============================================================
   MASA QR KODLARI — müşteri okutunca o masa açılır
   QR içeriği: müşteri menü linki + masa kimliği parametresi
   ============================================================ */
const QR_BASE_URL = "https://minipan.app/m";   // canlıda gerçek domain
function masaQrIcerik(masaId){
  // masaId = "şube::kat|ad" → URL parametresi olarak kodla
  return QR_BASE_URL + "?t=" + encodeURIComponent(masaId);
}
/* Bir masa için QR SVG üret (string döner) */
function masaQrSvg(masaId, cellSize){
  const qr = window.qrcode(0, "M");
  qr.addData(masaQrIcerik(masaId));
  qr.make();
  return qr.createSvgTag({cellSize:cellSize||5, margin:2});
}
/* SVG'yi PNG'ye çevirip indir */
function svgIndirPng(svgString, dosyaAdi, etiket){
  const olcek=3;
  const img=new Image();
  const svg64="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(svgString)));
  img.onload=function(){
    const pad=40, altYazi=etiket?60:20;
    const canvas=document.createElement("canvas");
    canvas.width=img.width*olcek+pad*2;
    canvas.height=img.height*olcek+pad*2+altYazi;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(img, pad, pad, img.width*olcek, img.height*olcek);
    if(etiket){
      ctx.fillStyle="#1a1a1a"; ctx.textAlign="center";
      ctx.font="bold 34px system-ui,sans-serif";
      ctx.fillText(etiket, canvas.width/2, img.height*olcek+pad+44);
    }
    canvas.toBlob(function(blob){
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download=dosyaAdi+".png";
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
    });
  };
  img.src=svg64;
}
/* Tek masa QR indir */
function masaQrIndir(masaId, etiket){
  const svg=masaQrSvg(masaId, 6);
  const safe=(etiket||masaId).replace(/[^\wğüşıöçĞÜŞİÖÇ -]/gi,"_");
  svgIndirPng(svg, "MINIPAN_QR_"+safe, etiket);
  note("📥 QR indiriliyor: "+etiket);
}
/* Şubenin tüm masaları için yazdırılabilir QR sayfası aç */
function subeQrTopluIndir(sube){
  const masalar=subeMasalari(sube);
  if(masalar.length===0){ note("Bu şubede masa yok"); return; }
  let kartlar="";

      '<div class="qpk-sube">'+sube+'</div>'+
      '<div class="qpk-masa">'+mm.etiket+'</div>'+
      '<div class="qpk-not">Okutarak sipariş verin</div></div>';
  });
  const w=window.open("","_blank");
  if(!w){ note("Açılır pencere engellendi — izin verin"); return; }
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>MİNİPAN QR · '+sube+'</title>'+
    '<style>'+
    'body{font-family:system-ui,sans-serif;margin:0;padding:20px;background:#fff}'+
    'h1{font-size:18px;text-align:center;margin:0 0 18px}'+
    '.qr-print-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}'+
    '.qr-print-kart{border:2px dashed #ccc;border-radius:14px;padding:18px 12px;text-align:center;page-break-inside:avoid;break-inside:avoid}'+
    '.qr-print-kart svg{width:150px;height:150px}'+
    '.qpk-sube{font-size:11px;color:#888;margin-top:8px}'+
    '.qpk-masa{font-size:20px;font-weight:800;color:#1a1a1a;margin-top:2px}'+
    '.qpk-not{font-size:11px;color:#e08a1e;margin-top:6px;font-weight:700}'+
    '@media print{.yazdir-btn{display:none}.qr-print-kart{border-color:#ddd}}'+
    '.yazdir-btn{display:block;margin:0 auto 20px;padding:12px 28px;background:#f0a728;color:#3a2410;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer}'+
    '</style></head><body>'+
    '<h1>🧇 MİNİPAN · '+sube+' — Masa QR Kodları</h1>'+
    '<button class="yazdir-btn" onclick="window.print()">🖨️ Yazdır / PDF kaydet</button>'+
    '<div class="qr-print-grid">'+kartlar+'</div></body></html>');
  w.document.close();
  note("🖨️ "+masalar.length+" masa QR sayfası açıldı");

function myKatEkle(){
  myPopupAc('kategori', null, "");
}
function myKatEkleOnayla(ad){
  if(!ad||!ad.trim()) return;
  const sube=state.myHedefSube;
  if(!BRANCH_TABLES[sube]) BRANCH_TABLES[sube]=[];
  if(BRANCH_TABLES[sube].find(k=>k.kat===ad.trim())){ note("Bu kategori zaten var"); return; }
  BRANCH_TABLES[sube].push({kat:ad.trim(), masalar:[]});
  note("Kategori eklendi: "+ad.trim());
  subeKaydet(); go("masayonetim", true);
}
function myKatYenidenAdlandir(ki){
  const sube=state.myHedefSube; const k=BRANCH_TABLES[sube][ki];
  myPopupDuzenleAc('katad', ki, k.kat);
}
function myKatYenidenAdlandirOnayla(ki, yeniAd){
  if(!yeniAd||!yeniAd.trim()) return;
  const sube=state.myHedefSube;
  const k=BRANCH_TABLES[sube][ki];
  if(yeniAd.trim()===k.kat){ myPopupKapat(); return; }
  if(BRANCH_TABLES[sube].find((x,i)=>i!==ki && x.kat===yeniAd.trim())){ note("Bu isimde kategori zaten var"); return; }
  k.kat=yeniAd.trim();
  subeKaydet(); myPopupKapat(); go("masayonetim", true);
}
function myKatSil(ki){
  const sube=state.myHedefSube; const k=BRANCH_TABLES[sube][ki];
  // kategoride dolu masa var mı
  const dolu = k.masalar.some(ad=>{ const id=sube+"::"+k.kat+"|"+ad; return SESSIONS[id]&&SESSIONS[id].acik; });
  if(dolu){ note("Bu kategoride dolu masa var — önce hesapları kapatın"); return; }
  if(!confirm(k.kat+" kategorisi ve içindeki "+k.masalar.length+" masa silinecek. Emin misiniz?")) return;
  BRANCH_TABLES[sube].splice(ki,1);
  note("Kategori silindi");
  subeKaydet(); go("masayonetim", true);
}
function myMasaEkle(ki){
  const sube=state.myHedefSube; const k=BRANCH_TABLES[sube][ki];
  // sonraki numarayı öner
  const sayilar=k.masalar.map(x=>parseInt(x)).filter(n=>!isNaN(n));
  const oneri=sayilar.length?Math.max(...sayilar)+1:1;
  myPopupAc('masa', ki, String(oneri));
}
function myMasaEkleOnayla(ki, ad){
  const sube=state.myHedefSube; const k=BRANCH_TABLES[sube][ki];
  if(!ad||!ad.trim()) return;
  if(k.masalar.includes(ad.trim())){ note("Bu masa zaten var"); return; }
  k.masalar.push(ad.trim());
  note(k.kat+"-"+ad.trim()+" eklendi");
  subeKaydet(); go("masayonetim", true);
}

function myPopupOnayla(){

  const deger = inp ? inp.value : "";
  if(!deger || !deger.trim()) { note("Bir değer girin"); return; }
  if(p.tip==='kategori') myKatEkleOnayla(deger);
  else if(p.tip==='katad') myKatYenidenAdlandirOnayla(p.ki, deger);
  else myMasaEkleOnayla(p.ki, deger);
  myPopupKapat();
}
function myPopupCiz(){
  const p = state._myPopup;
  let mdl=document.getElementById("myPopup");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="myPopup"; mdl.className="modal-bg"; mdl.style.zIndex="200"; document.body.appendChild(mdl); }
  if(!p){ mdl.classList.remove("on"); return; }
  const sube=state.myHedefSube;
  let baslik, placeholder;
  if(p.tip==='kategori'){
    baslik = "🗂️ Yeni Kategori";
    placeholder = "örn. Balkon, Teras, Bahçe";
  } else if(p.tip==='katad'){
    baslik = "✏️ Kategori Adını Değiştir";
    placeholder = "Yeni kategori adı";
  } else {
    const k = BRANCH_TABLES[sube] ? BRANCH_TABLES[sube][p.ki] : null;
    baslik = "🪑 "+(k?k.kat:"")+" için Masa Ekle";
    placeholder = "Masa adı/numarası";
  }
  const butonAdi = p.duzenle ? "Kaydet" : "Ekle";
  mdl.innerHTML = `<div class="myp-ic">
    <div class="myp-baslik">${baslik}</div>
    <input class="myp-input" id="mypInput" type="text" value="${(p.deger||'').replace(/"/g,'&quot;')}" placeholder="${placeholder}" onkeydown="if(event.key==='Enter') myPopupOnayla()">
    <div class="myp-btn-row">
      <button class="myp-iptal" onclick="myPopupKapat()">İptal</button>
      <button class="myp-onayla" onclick="myPopupOnayla()">${butonAdi}</button>
    </div>
  </div>`;
  mdl.classList.add("on");
  setTimeout(()=>{ const i=document.getElementById("mypInput"); if(i){ i.focus(); i.select(); } }, 60);
}
function myKatSil(ki){
  const sube=state.myHedefSube; const k=BRANCH_TABLES[sube][ki];
  const dolu = k.masalar.some(ad=>{ const id=sube+"::"+k.kat+"|"+ad; return SESSIONS[id]&&SESSIONS[id].acik; });
  if(dolu){ note("Bu kategoride dolu masa var — önce hesapları kapatın"); return; }
  const mesaj = k.masalar.length>0
    ? `"${k.kat}" kategorisi ve içindeki ${k.masalar.length} masa kalıcı olarak silinecek.`
    : `"${k.kat}" kategorisi silinecek.`;
  mySilOnayAc('kat', ki, null, mesaj);
}
function myMasaSil(ki,mi){
  const sube=state.myHedefSube; const k=BRANCH_TABLES[sube][ki]; const ad=k.masalar[mi];
  const id=sube+"::"+k.kat+"|"+ad;
  if(SESSIONS[id]&&SESSIONS[id].acik){ note("Dolu masa silinemez — önce hesabı kapatın"); return; }
  mySilOnayAc('masa', ki, mi, `"${k.kat}-${ad}" masası kalıcı olarak silinecek.`);
}
function mySilOnayAc(tip, ki, mi, mesaj){
  state._mySilOnay = {tip, ki, mi, mesaj};
  mySilOnayPopupCiz();
}
function mySilOnayKapat(){
  state._mySilOnay = null;
  const mdl=document.getElementById("mySilPopup");
  if(mdl) mdl.classList.remove("on");
}
function mySilOnayUygula(){
  const p = state._mySilOnay; if(!p) return;
  const sube=state.myHedefSube;
  if(p.tip==='kat'){
    BRANCH_TABLES[sube].splice(p.ki,1);
    note("Kategori silindi");
  } else {
    const k=BRANCH_TABLES[sube][p.ki];
    k.masalar.splice(p.mi,1);
    note("Masa silindi");
  }
  mySilOnayKapat();
  subeKaydet(); go("masayonetim", true);
}
function mySilOnayPopupCiz(){
  const p = state._mySilOnay;
  let mdl=document.getElementById("mySilPopup");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="mySilPopup"; mdl.className="modal-bg"; mdl.style.zIndex="200"; document.body.appendChild(mdl); }
  if(!p){ mdl.classList.remove("on"); return; }
  mdl.innerHTML = `<div class="myp-ic">
    <div class="myp-baslik">🗑️ ${p.tip==='kat'?'Kategoriyi Sil':'Masayı Sil'}</div>
    <div style="font-size:13.5px;color:var(--ink-2);text-align:center;margin-bottom:18px;line-height:1.5">${p.mesaj}<br><strong style="color:var(--err)">Bu işlem geri alınamaz.</strong></div>
    <div class="myp-btn-row">
      <button class="myp-iptal" onclick="mySilOnayKapat()">İptal</button>
      <button class="myp-onayla" style="background:var(--err)" onclick="mySilOnayUygula()">Evet, Sil</button>
    </div>
  </div>`;
  mdl.classList.add("on");
}

function viewMasalar(main){
  if(Object.keys(SESSIONS).length===0) seedSessions();
  const sekme = state.kasaSekme||"masa";
  const aktifPaket=PAKET_ORDERS.filter(p=>p.durum!=="teslim"&&p.durum!=="iptal"&&(p.sube||AKTIF_SUBE)===AKTIF_SUBE);
  // SOL kolon: sekmeler + masa ızgarası / paket listesi
  let sol=`<div class="sec-head"><div><h2>Masalar & Paket</h2><div class="sh-sub">${AKTIF_SUBE}</div></div></div>
    <div class="kasa-sekme-row">
      <button class="kasa-sekme${sekme==="masa"?" on":""}" onclick="state.kasaSekme='masa';go('masalar')">🍽️ Masalar</button>
      <button class="kasa-sekme${sekme==="paket"?" on":""}" onclick="state.kasaSekme='paket';go('masalar')">🥡 Paket${aktifPaket.length?" ("+aktifPaket.length+")":""}</button>
    </div>`;
  if(sekme==="paket"){
    sol+=`<button class="kasa-yeni-paket" onclick="kasaPaketBasla()">+ Yeni paket sipariş</button><div class="kasa-paket-list">`;
    if(aktifPaket.length===0){ sol+=`<div class="kmd-bos">Bekleyen paket sipariş yok.</div>`; }
    else aktifPaket.forEach(p=>{
      const dm=TESLIMAT_DURUM[p.durum]; const gelAl=p.tip==="paket";
      sol+=`<div class="kasa-paket-kart">
        <div class="kpk-ust"><span class="kpk-no">${gelAl?"🥡 Gel-Al":"🛵 Eve"} #${p.id} · ${p.musteri}</span>
          <span class="kpk-durum" style="color:${dm.renk}">${dm.ic} ${dm.ad}</span></div>
        <div class="kpk-urunler">${p.kalemler.map(k=>k.ad).join(", ")}</div>
        <div class="kpk-alt"><span class="kpk-tutar">${p.tutar} ₺ · ${p.odeme==="kasada"?"💵 Kasada ödenecek":p.odeme==="online"?"✓ Online ödendi":"Kapıda"}</span>
        ${p.odeme==="kasada"?`<button class="kpk-ode" onclick="kasaPaketOde(${p.id})">Öde · ${p.tutar} ₺</button>`:""}</div>
      </div>`;
    });
    sol+=`</div>`;
  } else {
    const masalar = subeMasalari(AKTIF_SUBE);
    const katlar = [...new Set(masalar.map(m=>m.kat))];
    if(masalar.length===0){
      sol+=`<div class="kmd-bos">Bu şubede masa tanımlı değil. Müdür "Masa Yönetimi"nden ekleyebilir.</div>`;
    }
    katlar.forEach(kat=>{
      const katMasalari = masalar.filter(m=>m.kat===kat);
      sol+=`<div class="kasa-kat-baslik">📁 ${kat}</div><div class="kasa-masa-grid">`;
      katMasalari.forEach(mm=>{
        const id = AKTIF_SUBE+"::"+mm.id;   // şubeye özel global anahtar
        const s=SESSIONS[id]; const acik=s&&s.acik;
        const kalemler=acik?masaKalemleri(id).filter(it=>it.durum!=="iptal"):[];
        const paketVar=kalemler.some(it=>it.paket);
        const secili=state.kasaMasa===id;
        const dur=masaDurum(id);
        sol+=`
        <button class="prod kasa-masa-btn${secili?' secili':''}" style="text-align:center;position:relative;background:${dur.bg};border-color:${dur.renk}" onclick="kasaMasaAc('${id.replace(/'/g,"\\'")}')">
          ${paketVar?'<span class="kasa-masa-paket">🥡</span>':''}
          <div style="font-size:12px;font-weight:800;color:${dur.renk};margin-bottom:6px">● ${dur.ad}</div>
          <div style="font-size:22px;font-weight:800;letter-spacing:-.5px">${mm.ad}</div>
          ${acik?`<div style="font-size:12px;color:var(--ink-2);margin-top:6px">${s.kisiler.length} kişi · ${masaToplam(id)} ₺</div>`:''}
        </button>`;
      });
      sol+=`</div>`;
    });
  }
  // SAĞ kolon: seçili masa detayı/ödeme (yoksa boş durum)
  let sag;
  if(state.kasaMasa!=null && SESSIONS[state.kasaMasa]){
    sag = kasaMasaDetayHtml(state.kasaMasa);
  } else {
    sag = `<div class="kasa-sag-bos"><div class="ksb-ic"><div class="ksb-emoji">🪑</div>
      <div class="ksb-baslik">Masa seç</div>
      <div class="ksb-alt">Soldan bir masaya dokun · siparişi ve ödemesi burada açılır</div></div></div>`;
  }
  main.innerHTML = `<div class="pos-grid kasa-masa-grid-layout"><div class="kasa-sol-kol">${sol}</div><div class="kasa-sag-panel">${sag}</div></div>`;

/* Kasa yeni paket sipariş — isim zorunlu (fiş için) */
function kasaPaketBasla(){
  const ad=prompt("Paket sipariş için müşteri adı (fişte görünecek):");
  if(!ad || !ad.trim()){ note("İsim zorunlu (fiş için)"); return; }
  state.kasaPaket={musteri:ad.trim(), sepet:[]}; state.cat="Tatlılar";
  go("satis");
  note("Ürün seç → 🥡 Paket: "+ad.trim());
}
function kasaPaketOde(id){
  const p=PAKET_ORDERS.find(x=>x.id===id);
  if(!p) return;
  BOL={total:p.tutar, mod:"tek", kisiler:[p.musteri], atama:[{}], odenenler:{}, tekOdeme:true, paketId:id};
  state.cart=p.kalemler.map(k=>({ad:k.ad, fiyat:k.fiyat, q:1, secimler:k.secimler||[], ekstraRecete:[]}));
  bolPayAl(0, p.tutar);
}
/* Kasa paket siparişini mutfağa gönder */
function kasaPaketGonder(){
  const kp=state.kasaPaket;
  if(!kp || kp.sepet.length===0){ note("Paket sepeti boş"); return; }
  const t=kp.sepet.reduce((s,c)=>s+c.fiyat,0);
  const takipId="S"+(_takipId++);
  const yeniId=_paketId++;
  PAKET_ORDERS.push({
    id:yeniId, takipId:takipId, tip:"paket", sube:AKTIF_SUBE, musteri:kp.musteri, tel:null,
    adres:null, masa:null, kalemler:kp.sepet.map(c=>({ad:c.ad, secimler:c.secimler, secimGruplu:c.secimGruplu, fiyat:c.fiyat})),
    tutar:t, odeme:"kasada", durum:"hazirlaniyor", zaman:Date.now()
  });
  consumeRecipe(kp.sepet.map(c=>({...c, q:1, ekstraRecete:[]})));
  // OTOMATİK MUTFAK FİŞİ (masa:"paket#N" ile siparişe bağlanır — geçmişte eşleştirme için)
  mutfakFisiBas({
    tip:"paket", baslik:"PAKET (GEL-AL)", alt:kp.musteri, masa:"paket#"+yeniId,
    kisi:kp.musteri, kalemler:kp.sepet.map(c=>({ad:c.ad, secimler:c.secimler, secimGruplu:c.secimGruplu, paket:true}))
  });
  note("🥡 Paket sipariş mutfağa gönderildi · "+kp.musteri);
  state.kasaPaket=null; state.kasaSekme="paket"; go("masalar");
}
function kasaPaketIptal(){ state.kasaPaket=null; go("masalar"); }

/* ============================================================
   MASA GEÇMİŞİ — kapanmış masa hesaplarının filtrelenebilir listesi
   (kim oturdu/kalktı, ne sipariş etti, nasıl ödedi, hangi mutfak
   fişleri kesildi). Veri kaynağı: masaGecmiseArsivle() tarafından
   doldurulan MASA_GECMISI.
   ============================================================ */
function viewMasaGecmisi(main){
  const genelMu = state.role==="genel";
  const f = state.mgFiltre || (state.mgFiltre={sube:"hepsi", bas:"", bit:"", yontem:"hepsi", ara:"", tip:"hepsi"});
  if(f.tip===undefined) f.tip="hepsi";
  let liste = MASA_GECMISI.slice().reverse();   // en yeni en üstte
  if(!genelMu) liste = liste.filter(k=>k.sube===AKTIF_SUBE);
  else if(f.sube && f.sube!=="hepsi") liste = liste.filter(k=>k.sube===f.sube);
  if(f.tip && f.tip!=="hepsi") liste = liste.filter(k=>(k.tip||"masa")===f.tip);
  if(f.bas){ const t=new Date(f.bas+"T00:00:00").getTime(); liste=liste.filter(k=>k.kapanis>=t); }
  if(f.bit){ const t=new Date(f.bit+"T23:59:59").getTime(); liste=liste.filter(k=>k.kapanis<=t); }
  if(f.yontem && f.yontem!=="hepsi") liste = liste.filter(k=>(k.odemeler||[]).some(o=>o.ad===f.yontem));
  if(f.ara && f.ara.trim()){
    const q=f.ara.trim().toLocaleLowerCase('tr');
    liste = liste.filter(k=>
      k.masaEtiket.toLocaleLowerCase('tr').includes(q) ||
      k.kisiler.some(ad=>ad.toLocaleLowerCase('tr').includes(q)) ||
      k.kalemler.some(it=>it.ad.toLocaleLowerCase('tr').includes(q))
    );
  }
  const toplamCiro = Math.round(liste.reduce((t,k)=>t+(k.toplam||0),0)*100)/100;
  const tumYontemler = [...new Set(MASA_GECMISI.flatMap(k=>(k.odemeler||[]).map(o=>o.ad)))];
  const tipler = [["hepsi","Hepsi"],["masa","🪑 Masa"],["paket","🛵 Paket"],["eve","🏠 Eve"]];

  let html = `<div class="sec-head"><div><h2>Satış Geçmişi</h2><div class="sh-sub">${genelMu?'Tüm şubeler':AKTIF_SUBE} · masa, paket ve eve teslimat hesapları</div></div></div>`;
  html += `<div class="gf-tip-row">${tipler.map(([v,ad])=>
    `<button class="gf-tip-chip${f.tip===v?' on':''}" onclick="masaGecmisTipSec('${v}')">${ad}</button>`).join("")}</div>`;
  html += `<div class="gecmis-filtre">`;
  if(genelMu){
    html += `<div class="gf-alan"><label>Şube</label><select class="gf-select" id="mgSube">
      <option value="hepsi"${f.sube==="hepsi"?' selected':''}>Tüm şubeler</option>
      ${DEMO_BRANCHES.map(b=>`<option value="${b.ad}"${f.sube===b.ad?' selected':''}>${b.ad}</option>`).join("")}
    </select></div>`;
  }
  html += `<div class="gf-alan"><label>Başlangıç</label><input type="date" class="gf-date" id="mgBas" value="${f.bas||''}"></div>
    <div class="gf-alan"><label>Bitiş</label><input type="date" class="gf-date" id="mgBit" value="${f.bit||''}"></div>
    <div class="gf-alan"><label>Ödeme yöntemi</label><select class="gf-select" id="mgYontem">
      <option value="hepsi"${f.yontem==="hepsi"?' selected':''}>Hepsi</option>
      ${tumYontemler.map(y=>`<option value="${y}"${f.yontem===y?' selected':''}>${y}</option>`).join("")}
    </select></div>
    <div class="gf-alan" style="flex:1;min-width:180px"><label>Ara (masa / kişi / ürün)</label><input class="gf-input" id="mgAra" placeholder="örn. baklava, Ayşe, Masa 3" value="${(f.ara||'').replace(/"/g,'&quot;')}"></div>
    <button class="gf-filtrele" onclick="masaGecmisFiltreUygula(${genelMu})">🔍 Filtrele</button>
    <button class="gf-temizle" onclick="masaGecmisFiltreTemizle()">↺ Temizle</button>
  </div>`;

  html += `<div class="gecmis-ozet-bar"><span class="go-bilgi"><span class="go-sayi">${liste.length}</span>kapanmış hesap</span><span class="go-bilgi"><strong>${tl(toplamCiro)} ₺</strong> toplam ciro</span></div>`;

  if(liste.length===0){
    html += `<div class="kmd-bos">Bu filtreyle eşleşen kapanmış hesap yok.</div>`;
  } else {
    html += `<div class="mg-liste">`;
    liste.forEach(k=>{
      const tip = k.tip||"masa";
      const ikonOnek = tip==="masa" ? "🪑 " : "";
      const dk = Math.max(0, Math.round((k.kapanis-k.acilis)/60000));
      const yontemOzet = (k.odemeler||[]).map(o=>o.ad+" "+tl(o.tutar)+" ₺").join(" + ") || "Ödeme kaydı yok";
      const zamanStr = new Date(k.kapanis).toLocaleString('tr',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      const ortaOzet = tip==="masa"
        ? `${zamanStr} · ${dk} dk · ${k.kisiler.length} kişi · ${k.urunSayisi} ürün`
        : `${zamanStr}${k.tel?' · 📞 '+k.tel:''} · ${k.urunSayisi} ürün`;
      html += `<button class="mg-kart" onclick="masaGecmisDetay(${k.id})">
        <div class="mg-ust"><span class="mg-masa">${ikonOnek}${k.masaEtiket}${genelMu?' · '+k.sube:''}</span><span class="mg-tutar">${tl(k.toplam)} ₺</span></div>
        <div class="mg-orta">${ortaOzet}</div>
        <div class="mg-alt">${yontemOzet}</div>
      </button>`;
    });
    html += `</div>`;
  }
  main.innerHTML = html;
}
function masaGecmisTipSec(tip){
  state.mgFiltre = state.mgFiltre || {sube:"hepsi", bas:"", bit:"", yontem:"hepsi", ara:"", tip:"hepsi"};
  state.mgFiltre.tip = tip;

  f.yontem = document.getElementById("mgYontem").value;
  f.ara = document.getElementById("mgAra").value;

function masaGecmisFiltreTemizle(){
  state.mgFiltre = {sube:"hepsi", bas:"", bit:"", yontem:"hepsi", ara:"", tip:"hepsi"};
  go("masagecmis");
}
/* Detay modalı: kişi bazlı kalemler, ödeme dağılımı, basılan mutfak fişleri */
function masaGecmisDetay(id){
  const k = MASA_GECMISI.find(x=>x.id===id); if(!k) return;
  let mdl=document.getElementById("mgDetayModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="mgDetayModal"; mdl.className="modal-bg"; mdl.style.zIndex="190"; document.body.appendChild(mdl); }
  const dk = Math.max(0, Math.round((k.kapanis-k.acilis)/60000));
  let kisiHtml = "";
  (k.kisiler||[]).forEach(ad=>{
    const kalemler = k.kalemler.filter(it=>it.kisi===ad);
    if(kalemler.length===0) return;
    kisiHtml += `<div class="mgd-kisi-bas">👤 ${ad}</div>`;
    kalemler.forEach(it=>{
      const iptalRozet = it.durum==="iptal" ? ' <span style="color:#c0392b">(iptal)</span>' : '';
      const secimNot = (it.secimler&&it.secimler.length) ? ' <small style="color:var(--ink-3)">('+it.secimler.join(', ')+')</small>' : '';
      kisiHtml += `<div class="fis-satir"><span>${it.ad}${secimNot}${iptalRozet}</span><span>${tl(it.fiyat)} ₺</span></div>`;
    });
  });
  const odemeHtml = (k.odemeler||[]).length
    ? k.odemeler.map(o=>`<div class="fis-satir"><span>${o.ad}</span><span>${tl(o.tutar)} ₺</span></div>`).join("")
    : '<div style="color:var(--ink-2);font-size:13px;padding:6px 0">Ödeme kaydı bulunamadı</div>';
  // FİŞ BAZLI TAHSİLAT DETAYI — her tahsilat (her "fiş") ayrı kart: kim, ne, hangi yöntemle
  const islemler = k.odemeIslemleri||[];
  const tahsilatHtml = islemler.length
    ? islemler.map((isl,i)=>{
        const saat = new Date(isl.zaman||k.kapanis).toLocaleTimeString('tr',{hour:'2-digit',minute:'2-digit'});
        let icerik = "";
        if(isl.tip==='kalem'){
          icerik = (isl.kalemler||[]).map(kl=>
            `<div class="fis-satir"><span>${kl.ad}${kl.kisi?' <small style="color:var(--ink-3)">('+kl.kisi+')</small>':''}</span><span>${tl(kl.tutar)} ₺</span></div>`
          ).join("");
          icerik += (isl.yontemler||[]).map(y=>`<span class="mgd-yontem-rozet">${y.ad} · ${tl(y.tutar)} ₺</span>`).join("");
        } else {
          icerik = `<div class="fis-satir"><span>👤 ${isl.kisi}</span><span>${tl(isl.tutar)} ₺</span></div>`+
            `<span class="mgd-yontem-rozet">${isl.yontem} · ${tl(isl.tutar)} ₺</span>`+
            (isl.magAd?`<span class="mgd-yontem-rozet">${isl.magAd}</span>`:'');
        }
        const indirimNot = isl.indirim>0 ? `<div class="mgd-indirim-not">🏷️ İndirim: ${tl(isl.indirim)} ₺</div>` : '';
        return `<div class="mgd-tahsilat"><div class="mgd-tahsilat-bas"><span>🧾 Fiş #${i+1}</span><span>${saat}</span></div>${icerik}${indirimNot}</div>`;
      }).join("")
    : '<div style="color:var(--ink-2);font-size:13px;padding:6px 0">Tahsilat detayı kaydı yok (eski kayıt)</div>';

/* Masa id'sinden görünen etiket: "sube::Balkon|1" → "Balkon-1" (eski sayısal → "Masa 7") */
function masaEtiket(id){
  const s = String(id);
  if(s===HIZLI_SATIS_ID) return "Hızlı Satış";
  if(s.includes("|")){
    const son = s.split("::").pop();      // "Balkon|1"
    return son.replace("|","-");          // "Balkon-1"
  }
  return "Masa "+s;
}

/* Para formatı: her zaman 2 ondalık, TR virgül (333,00 / 195,50) */
function tl(n){
  return (Math.round((n||0)*100)/100).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function odemeEkraniAc(m){
  // masada QR'dan sipariş vermiş sadakat üyesi var mı? (otomatik tanı)
  const bagliUye = masadakiUyeyiBul(m);
  state.odeme = {
    masa: m,
    secili: [],     // [{kalemId, tutar}] — bu ödemeye dahil edilen kısımlar
    indirim: 0,     // ₺ indirim
    yontem: { nakit:0, kredi:0, diger:0 },  // her yöntemden girilen tutar
    musteri: bagliUye,    // QR'dan bağlanmış üye (yoksa null — kasiyer manuel sorgular)
    kullanilanMag: 0,     // bu ödemede harcanan Mag puanı
    magOtpGonderildi: false,
    magOtpOnayli: false,
  };
  odeKlavyeBagla();
  go("odemeEkran");
  if(bagliUye) note("🎁 "+bagliUye.ad+" QR'dan sipariş verdi · sadakat üyesi otomatik tanındı");
  musteriEkranGuncelle();  // müşteri ekranı açıksa ödeme moduna geç
}
/* Masada QR'dan sipariş vermiş sadakat üyesini bul (kisilerden ilk uyeMail) */
function masadakiUyeyiBul(m){
  const s = SESSIONS[m];
  if(!s || !s.kisiler) return null;
  for(const k of s.kisiler){
    if(k.uyeMail && CUSTOMERS[k.uyeMail]) return CUSTOMERS[k.uyeMail];
  }
  return null;
}
/* Fiziksel klavye desteği — aktif kutuya yaz */
function odeKlavyeBagla(){
  if(window._odeKlavye) return;  // bir kez bağla
  window._odeKlavye = function(e){
    if(!state.odeme) return;
    // input/textarea içindeyken (not alanı) numpad'e müdahale etme
    const tag=(e.target&&e.target.tagName||'').toLowerCase();
    if(tag==='input' || tag==='textarea') return;
    const k=e.key;
    if(/^[0-9]$/.test(k)){ odeNumpad(k); e.preventDefault(); }
    else if(k===',' || k==='.'){ odeNumpad(','); e.preventDefault(); }
    else if(k==='Backspace'){ odeNumpad('⌫'); e.preventDefault(); }
    else if(k==='Delete' || k==='Escape'){ odeNumpad('C'); e.preventDefault(); }
    else if(k==='Enter'){ const mq=state.odeme.masa; odemeOnayla(mq); e.preventDefault(); }
  };
  document.addEventListener('keydown', window._odeKlavye);
}

function odeMagBolumHtml(o, hamToplam, elleInd){
  const m=o.musteri;
  if(!m){
    // üye henüz tanınmadı — sorgulama
    return `<div class="ode-mag-bolum">

  }
  // üye tanındı
  const kademe = (typeof uyeKademe==="function") ? uyeKademe(m) : {ad:"",ic:""};
  const tlKarsilik = magToTl(m.mag);
  let ic = `<div class="ode-mag-bolum tanindi">
    <div class="ode-mag-uye">
      <div class="ode-mag-uye-sol">
        <div class="ode-mag-uye-ad">🎁 ${m.ad} ${kademeRozetHtml(m)}</div>
        <div class="ode-mag-uye-bakiye">${m.mag} ${SADAKAT.ad} <span class="ode-mag-tl">≈ ${tl(tlKarsilik)} ₺</span></div>
      </div>
      <button class="ode-mag-cikar" onclick="odeMagCikar()" title="Üyeyi kaldır">✕</button>
    </div>
    <div class="ode-mag-kademe">${kademeIlerlemeHtml(m, "kucuk")}</div>`;

  if(m.mag>0){
    const kalanOdenecek = Math.max(0, hamToplam - elleInd);
    const maxBoz = Math.min(m.mag, Math.floor(kalanOdenecek/SADAKAT.magTl));
    if(maxBoz<=0){
      ic += `<div class="ode-mag-bilgi-kucuk">Bu tutar için kullanılabilir ${SADAKAT.ad} yok.</div>`;
    } else if(!o.magOtpOnayli){
      // kod doğrulaması gerekiyor
      if(!o.magOtpGonderildi){
        ic += `<div class="ode-mag-kilit">
          <div class="ode-mag-kilit-bilgi">🔒 ${SADAKAT.ad} kullanmak için müşteri doğrulaması gerekir.</div>
          <button class="ode-mag-kod-gonder" onclick="odeMagKodGonder()">📧 Müşteriye kod gönder</button>
        </div>`;
      } else {
        ic += `<div class="ode-mag-kilit">
          <div class="ode-mag-kilit-bilgi">📧 ${m.ad} adına kod gönderildi. Müşteriden 6 haneli kodu isteyin:</div>
          <div class="ode-mag-kod-row">
            <input class="ode-mag-kod-input" id="odeMagKodInput" inputmode="numeric" maxlength="6" placeholder="• • • • • •" onkeydown="if(event.key==='Enter')odeMagKodDogrula()">
            <button class="ode-mag-kod-dogrula" onclick="odeMagKodDogrula()">Doğrula</button>
          </div>
          <button class="ode-mag-kod-tekrar" onclick="odeMagKodGonder()">↻ Kodu tekrar gönder</button>
        </div>`;
      }
    } else {
      // doğrulandı — Mag kullanım kontrolü
      const indDeger = o.kullanilanMag * SADAKAT.magTl;
      ic += `<div class="ode-mag-kullan">
        <div class="ode-mag-kullan-bas">✓ Doğrulandı · ${SADAKAT.ad} kullan (${o.kullanilanMag}/${maxBoz})</div>
        <div class="ode-mag-kullan-kontrol">
          <button class="ode-mag-adim" onclick="odeMagAyarla(-10)">−10</button>
          <button class="ode-mag-adim" onclick="odeMagAyarla(-1)">−1</button>
          <span class="ode-mag-deger">${o.kullanilanMag}</span>
          <button class="ode-mag-adim" onclick="odeMagAyarla(1)">+1</button>
          <button class="ode-mag-adim" onclick="odeMagAyarla(10)">+10</button>
          <button class="ode-mag-max" onclick="odeMagMax()">Max</button>
        </div>
        ${indDeger>0?`<div class="ode-mag-kullan-ind">−${tl(indDeger)} ₺ ${SADAKAT.ad} indirimi uygulanıyor</div>`:`<div class="ode-mag-kullan-ipuc">+/− ile kullanılacak ${SADAKAT.ad} miktarını ayarlayın</div>`}
      </div>`;
    }
  } else {
    ic += `<div class="ode-mag-bilgi-kucuk">Henüz harcanabilir ${SADAKAT.ad} puanı yok. Bu alışverişle kazanmaya başlayacak.</div>`;
  }
  ic += `</div>`;
  return ic;
}

/* Kullanılacak Mag miktarını ayarla */
function odeMagAyarla(d){
  const o=state.odeme, m=o.musteri;
  if(!m) return;
  const hamToplam=Math.round(o.secili.reduce((t,x)=>t+x.tutar,0)*100)/100;
  const elleInd=Math.min(o.indirim,hamToplam);
  const kalanOdenecek=Math.max(0, hamToplam-elleInd);
  const maxBoz=Math.min(m.mag, Math.floor(kalanOdenecek/SADAKAT.magTl));
  o.kullanilanMag=Math.max(0, Math.min(maxBoz, o.kullanilanMag+d));
  odemeEkranYenile();
}
function odeMagMax(){
  const o=state.odeme, m=o.musteri;
  if(!m) return;
  const hamToplam=Math.round(o.secili.reduce((t,x)=>t+x.tutar,0)*100)/100;
  const elleInd=Math.min(o.indirim,hamToplam);
  const kalanOdenecek=Math.max(0, hamToplam-elleInd);
  o.kullanilanMag=Math.min(m.mag, Math.floor(kalanOdenecek/SADAKAT.magTl));

/* Bu ödemeyle kazanılacak Mag (seçili kalemler bazında + kademe çarpanı) */
function odeSeciliKazanilacakMag(o){
  let ham=0;
  o.secili.forEach(x=>{
    const it=masaKalemBul(o.masa, x.kalemId);
    if(!it) return;
    const p=DEMO_PRODUCTS.find(pp=>pp.ad===it.ad);
    const birim=urunMagPuan(p);
    // kısmi ödemede oransal kazanım
    const tamKalan=kalemKalan(it);
    const oran = tamKalan>0 ? Math.min(1, x.tutar/tamKalan) : 1;
    ham += birim * oran;
  });
  ham=Math.round(ham);
  let carpan=1, kademeAd="";
  if(o.musteri && typeof uyeKademe==="function"){
    const k=uyeKademe(o.musteri); carpan=k.carpan||1; kademeAd=k.ad||"";
  }
  return { ham, kazanc:Math.round(ham*carpan), carpan, kademeAd };
}
function odeKazanilacakMagHtml(o, hamToplam){
  if(!o.musteri || o.secili.length===0) return '';
  const k=odeSeciliKazanilacakMag(o);
  if(k.kazanc<=0) return '';
  const carpanNot=(k.carpan&&k.carpan!==1)?` <span class="ode-kazanc-carpan">×${k.carpan} ${k.kademeAd}</span>`:'';
  return `<div class="ode-kazanc-not">🎁 Bu ödemeyle <strong>+${k.kazanc} ${SADAKAT.ad}</strong> kazanacak${carpanNot}</div>`;
}
function viewOdemeEkran(main){
  const o=state.odeme;
  if(!o || !SESSIONS[o.masa]){ go("masalar"); return; }
  const m=o.masa, s=SESSIONS[m];

  const magIndirimHam = (o.musteri && o.kullanilanMag>0) ? o.kullanilanMag * SADAKAT.magTl : 0;
  const elleInd = Math.min(o.indirim, hamToplam);
  const magIndirim = Math.min(magIndirimHam, Math.max(0, hamToplam - elleInd));
  const indirim = Math.round((elleInd + magIndirim)*100)/100;
  const odenecek = Math.round((hamToplam - indirim)*100)/100;
  const girilen = Math.round((o.yontem.nakit + o.yontem.kredi + o.yontem.diger)*100)/100;

  let html=`<div class="ode-ekran">
    <div class="ode-head">
      <button class="ode-geri" onclick="odemeEkraniKapat()">← ${m===HIZLI_SATIS_ID?'Satışa dön':'Masaya dön'}</button>

function masaKalemBul(m, kalemId){ return masaKalemBulId(m,kalemId); }
function masaKalemBulId(m, kalemId){
  const s=SESSIONS[m]; if(!s) return null;
  for(const k of s.kisiler){ for(const it of k.kalemler){ if(it.id===kalemId) return it; } }
  return null;
}
/* Sağdan ürün seç/çıkar — seçilince fişe kalan tutarıyla gelir */
function odeUrunSec(kalemId){
  const o=state.odeme;
  o.topluBol=null; o.topluBolN=null; o.topluElle=null;
  const idx=o.secili.findIndex(x=>x.kalemId===kalemId);
  if(idx>=0){ o.secili.splice(idx,1); }
  else {
    const it=masaKalemBul(o.masa,kalemId);
    if(it) o.secili.push({kalemId, tutar:kalemKalan(it), bol:null});
  }
  odemeEkranYenile();
}
function odeKalemCikar(xi){ state.odeme.secili.splice(xi,1); odeYontemDengele(); odemeEkranYenile(); }
/* Toplu bölme: tüm seçili kalemlerin TAM kalanını baz al, 1/n uygula, oransal dağıt */
function odeTopluUygula(hedefToplam, etiket){
  const o=state.odeme;
  // her kalemin tam kalanı (referans)
  const tamlar=o.secili.map(x=>{ const it=masaKalemBul(o.masa,x.kalemId); return it?kalemKalan(it):0; });
  const tamToplam=tamlar.reduce((a,b)=>a+b,0);
  if(tamToplam<=0) return;
  if(hedefToplam>tamToplam) hedefToplam=tamToplam;
  const oran=hedefToplam/tamToplam;
  o.secili.forEach((x,i)=>{ x.tutar=Math.round(tamlar[i]*oran*100)/100; x.bol=null; x.bolN=null; });
  o.topluBol = etiket.n||null;
  o.topluBolN = etiket.bolN||null;
  o.topluElle = etiket.elle||null;
  odemeEkranYenile();
}
function odeTopluBol(n){
  const o=state.odeme;
  // toggle: aynı bölmeye tekrar basınca tam tutara dön
  if(o.topluBol===n){ odeTopluSifirla(); return; }
  const tamToplam=o.secili.reduce((t,x)=>{ const it=masaKalemBul(o.masa,x.kalemId); return t+(it?kalemKalan(it):0); },0);
  odeTopluUygula(tamToplam/n, {n});
}
function odeTopluBolN(val){
  const n=parseInt(val);
  if(!n||n<1){ odeTopluSifirla(); return; }
  const o=state.odeme;
  const tamToplam=o.secili.reduce((t,x)=>{ const it=masaKalemBul(o.masa,x.kalemId); return t+(it?kalemKalan(it):0); },0);
  odeTopluUygula(tamToplam/n, {n:'N', bolN:n});
}
function odeTopluElle(val){
  const t=parseFloat(val);
  if(!t||t<=0){ odeTopluSifirla(); return; }
  odeTopluUygula(t, {elle:t});
}
function odeTopluSifirla(){
  const o=state.odeme;
  o.secili.forEach(x=>{ const it=masaKalemBul(o.masa,x.kalemId); if(it){ x.tutar=kalemKalan(it); x.bol=null; x.bolN=null; } });
  o.topluBol=null; o.topluBolN=null; o.topluElle=null;
  odemeEkranYenile();
}
/* Kişinin tüm ödenmemiş kalemlerini fişe ekle (toggle: hepsi seçiliyse çıkar) */
function odeKisiSec(ki){
  const o=state.odeme, s=SESSIONS[o.masa];
  o.topluBol=null; o.topluBolN=null; o.topluElle=null;
  const k=s.kisiler[ki]; if(!k) return;
  const acik=k.kalemler.filter(it=>it.durum!=="iptal" && kalemKalan(it)>0.01);
  const hepsiSecili = acik.length>0 && acik.every(it=>o.secili.some(x=>x.kalemId===it.id));
  if(hepsiSecili){
    // hepsini çıkar
    acik.forEach(it=>{ const idx=o.secili.findIndex(x=>x.kalemId===it.id); if(idx>=0) o.secili.splice(idx,1); });
  } else {
    // eksik olanları ekle
    acik.forEach(it=>{
      if(!o.secili.some(x=>x.kalemId===it.id)) o.secili.push({kalemId:it.id, tutar:kalemKalan(it), bol:null});
    });
  }
  odemeEkranYenile();
}
/* Bölme: kalan tutarın 1/n'i bu ödemeye */
function odeKalemBol(xi, n){
  const o=state.odeme, x=o.secili[xi];
  o.topluBol=null; o.topluBolN=null; o.topluElle=null;
  const it=masaKalemBul(o.masa,x.kalemId); if(!it) return;
  // toggle: aynı bölmeye tekrar basınca tam tutara dön
  if(x.bol===n){ x.tutar=kalemKalan(it); x.bol=null; x.bolN=null; odemeEkranYenile(); return; }
  x.tutar = Math.round((kalemKalan(it)/n)*100)/100;
  x.bol = n;
  odemeEkranYenile();
}
/* "1/" etiketine veya kutusuna basınca dokunmatik klavyeli pop-up açılır (bkz. odeBolNPopupAc) */
function odeKalemBolNVal(xi, val){
  const n=parseInt(val);
  const o=state.odeme, x=o.secili[xi];
  const it=masaKalemBul(o.masa,x.kalemId); if(!it) return;
  if(!n||n<1){ x.bol=null; x.bolN=null; odemeEkranYenile(); return; }
  x.tutar = Math.round((kalemKalan(it)/n)*100)/100;
  x.bol='N'; x.bolN=n;
  odemeEkranYenile();
}

/* ============================================================
   1/N BÖLME POP-UP — dokunmatik sayı klavyesi
   "1/N" etiketine dokununca açılır; kullanıcı sayıyı klavyeden
   girer (anında popup içinde görünür), "Böl" basınca o sayı
   kalemin/fişin 1/N alanına işlenir. Mevcut odeKalemBolNVal /
   odeTopluBolN mantığını DEĞİŞTİRMEDEN tekrar kullanır — sadece
   girişi küçük bir metin kutusu yerine bu pop-up'tan alır.
   ============================================================ */
function odeBolNPopupAc(tip, xi){
  const o=state.odeme;
  const mevcut = tip==='kalem' ? (o.secili[xi].bolN||"") : (o.topluBolN||"");
  o._bolNPop = {tip, xi, deger:String(mevcut||"")};
  odeBolNPopupCiz();
}
function odeBolNPopupKapat(){
  state.odeme._bolNPop = null;
  const mdl=document.getElementById("obnPopup");
  if(mdl) mdl.classList.remove("on");
}
function odeBolNPopupTus(t){
  const p = state.odeme._bolNPop; if(!p) return;
  if(t==="C") p.deger="";
  else if(t==="⌫") p.deger = p.deger.slice(0,-1);
  else if(/^[0-9]$/.test(t)){ if(p.deger.length<3) p.deger += t; }   // 3 hane yeter (max 999 kişi)
  odeBolNPopupCiz();
}
function odeBolNPopupUygula(){
  const p = state.odeme._bolNPop; if(!p) return;
  const n = parseInt(p.deger);
  if(!n || n<2){ note("En az 2 girin"); return; }
  if(p.tip==='kalem') odeKalemBolNVal(p.xi, n);
  else odeTopluBolN(n);
  odeBolNPopupKapat();
}
function odeBolNPopupCiz(){
  const p = state.odeme._bolNPop;
  let mdl=document.getElementById("obnPopup");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="obnPopup"; mdl.className="modal-bg"; mdl.style.zIndex="220"; document.body.appendChild(mdl); }
  if(!p){ mdl.classList.remove("on"); return; }
  const baslik = p.tip==='kalem' ? "Bu ürünü kaça bölüyorsun?" : "Tüm fişi kaça bölüyorsun?";
  mdl.innerHTML = `<div class="obn-ic">
    <div class="obn-baslik">${baslik}</div>
    <div class="obn-alt">Kişi sayısını gir, ardından Böl'e bas</div>
    <div class="obn-deger-kutu"><span class="obn-deger-1">1 /</span><span class="obn-deger-n">${p.deger||"–"}</span></div>
    <div class="obn-numpad">
      ${['7','8','9','4','5','6','1','2','3','⌫','0','C'].map(t=>
        `<button class="obn-tus${t==='C'?' temizle':''}" onclick="odeBolNPopupTus('${t}')">${t}</button>`).join("")}
    </div>
    <div class="obn-btn-row">
      <button class="obn-iptal" onclick="odeBolNPopupKapat()">İptal</button>
      <button class="obn-bol" ${(!p.deger||parseInt(p.deger)<2)?'disabled':''} onclick="odeBolNPopupUygula()">Böl</button>
    </div>
  </div>`;
  mdl.classList.add("on");
}
/* numpad hedef kutusu seç — dokununca "yeni giriş" modu (ilk rakam eskiyi siler) */
function odeKutuSec(kutu){
  state.odeme.aktifKutu=kutu;
  state.odeme._yeniGiris=true;   // ilk tuşa basınca mevcut değer silinir
  state.odeme._npBuf=null;       // tampon sıfırla
  state.odeme._npKutu=kutu;
  odemeEkranYenile();
}
/* numpad tuşu — aktif kutuya yaz (virgülle kuruş girilebilir) */
function odeNumpad(t){
  const o=state.odeme;
  const kutu=o.aktifKutu||"kredi";
  const mevcutDeger=()=>{
    if(kutu==="indirim") return o.indirim||0;
    if(kutu==="toplu") return o.topluElle||0;
    if(kutu && kutu.indexOf("kalem")===0){ const xi=parseInt(kutu.slice(5)); return o.secili[xi]?o.secili[xi].tutar:0; }
    return o.yontem[kutu]||0;
  };
  // metinsel giriş tamponu (virgül için)
  if(o._npBuf==null || o._npKutu!==kutu) { o._npBuf=null; o._npKutu=kutu; }
  let str;
  if(t==="C"){ o._npBuf=""; o._yeniGiris=false; }
  else {
    if(o._yeniGiris){ str=""; o._yeniGiris=false; }
    else str = (o._npBuf!=null) ? o._npBuf : numToStr(mevcutDeger());
    if(str==="0") str="";
    if(t==="⌫"){ str=str.slice(0,-1); }
    else if(t===","){ if(str.indexOf(",")<0) str=(str||"0")+","; }
    else {
      // virgülden sonra max 2 hane
      const vi=str.indexOf(",");
      if(vi>=0 && str.length-vi>2){ /* zaten 2 kuruş hanesi var, yok say */ }
      else str=str+t;
    }
    o._npBuf=str;
  }
  const buf=o._npBuf||"";
  let say=parseFloat(buf.replace(",","."))||0;
  say=Math.round(say*100)/100;
  odeKutuYaz(kutu, say);
}
function numToStr(n){
  n=Math.round((n||0)*100)/100;
  if(n===0) return "";
  return (n%1===0) ? String(n) : String(n).replace(".",",");
}
/* aktif kutuya değer yaz (sınır kontrollü) */
function odeKutuYaz(kutu, say){
  const o=state.odeme;
  if(kutu==="indirim"){
    const ham=o.secili.reduce((tt,x)=>tt+x.tutar,0);
    if(say>ham) say=ham;
    o.indirim=say;
    odeYontemDengele();   // indirim değişince denge yöntemi güncellensin
  } else if(kutu==="toplu"){
    odeTopluElle(say);
    return;
  } else if(kutu && kutu.indexOf("kalem")===0){
    const xi=parseInt(kutu.slice(5));
    odeKalemTutar(xi, say);
    return;
  } else {
    o.yontem[kutu]=say;
    // bu yöntem denge değilse, denge yöntemi farkı tutsun
    if(o.dengeYontem && o.dengeYontem!==kutu){ odeYontemDengele(); }
    else if(o.dengeYontem===kutu){ /* denge yöntemine elle girdi, denge sabitlensin */ o.dengeYontem=null; }
  }
  odemeEkranYenile();
}
function odeIndirimGirVal(val){
  const o=state.odeme;
  const hamToplam=o.secili.reduce((t,x)=>t+x.tutar,0);
  let t=parseFloat(val)||0; if(t<0)t=0; if(t>hamToplam)t=hamToplam;
  o.indirim=Math.round(t*100)/100;
  odemeEkranYenile();
}
function odeKalemTutar(xi, val){
  const o=state.odeme, x=o.secili[xi];
  o.topluBol=null; o.topluBolN=null; o.topluElle=null;
  const it=masaKalemBul(o.masa,x.kalemId); if(!it) return;
  let t=parseFloat(val)||0;
  const max=kalemKalan(it);
  if(t>max) t=max; if(t<0) t=0;
  x.tutar=Math.round(t*100)/100; x.bol=null;
  odemeEkranYenile();
}
/* Yöntem: butona basınca TÜM ödenecek o yönteme yazılır, o yöntem "denge" olur */
function odeYontemTumu(y){
  const o=state.odeme;
  o.yontem={nakit:0, kredi:0, diger:0};
  o.dengeYontem=y;           // bu yöntem kalanı otomatik tutar
  o.aktifKutu=y; o._yeniGiris=true;
  odeYontemDengele();
  odemeEkranYenile();
}
/* Denge yöntemi = ödenecek − diğer yöntemlerin elle girdiği */
function odeYontemDengele(){ odeYontemDengeleSessiz(); }
function odeYontemGir(y, val){
  state.odeme.yontem[y]=Math.max(0, parseFloat(val)||0);
  odemeEkranYenile();
}
function odeNotEkle(m){
  const inp=document.getElementById("odeNotInput");
  if(inp && inp.value.trim()){ masaNotEkle(m,inp.value); odemeEkranYenile(); }
}
function odemeEkranYenile(){
  // her render öncesi denge yöntemini güncel tut (ürün/indirim/bölme değişmiş olabilir)
  if(state.odeme && state.odeme.dengeYontem) odeYontemDengeleSessiz();
  viewOdemeEkran(document.querySelector(".main"));
  musteriEkranGuncelle();  // müşteri ekranı (varsa) anlık güncellensin
}
/* dengele ama render tetikleme (sonsuz döngü olmasın) */
function odeYontemDengeleSessiz(){
  const o=state.odeme;
  if(!o.dengeYontem) return;
  const hamToplam=o.secili.reduce((t,x)=>t+x.tutar,0);
  const odenecek=Math.round((hamToplam-Math.min(o.indirim,hamToplam))*100)/100;
  let digerToplam=0;
  ["nakit","kredi","diger"].forEach(k=>{ if(k!==o.dengeYontem) digerToplam+=o.yontem[k]; });
  o.yontem[o.dengeYontem]=Math.max(0, Math.round((odenecek-digerToplam)*100)/100);
}
function odemeEkraniKapat(){
  const hizli = state.odeme && state.odeme.masa===HIZLI_SATIS_ID;
  state.odeme=null; odeKlavyeKaldir(); musteriEkranBosa();
  if(hizli){ delete SESSIONS[HIZLI_SATIS_ID]; go("satis"); return; }  // cart korunur, ödeme iptal
  go("masalar");
}

/* ============================================================
   MÜŞTERİ EKRANI (çift ekranlı POS — arka/müşteri tarafı)
   - Boş zamanda reklam/kampanya görselleri döner
   - "Ödeme Al" ekranında ödeme özetini gösterir
   - İletişim: BroadcastChannel (ana ekran → müşteri penceresi)
   - Açılış: getScreenDetails() ile otomatik 2. ekran, yoksa ayrı pencere
   ============================================================ */
let MUSTERI_KANAL = null;
let MUSTERI_PENCERE = null;
const MUSTERI_REKLAM_KEY = "minipan_musteri_reklam_v1";
let MUSTERI_REKLAMLAR = {};   // {sube:[dataURL,...]} şube bazlı reklam görselleri
function musteriReklamYukle(){ MUSTERI_REKLAMLAR = MPStore.get(MUSTERI_REKLAM_KEY, {}, {version:1}); }
function musteriReklamKaydet(){ MPStore.set(MUSTERI_REKLAM_KEY, MUSTERI_REKLAMLAR, 1); }
function musteriKanalAc(){
  if(MUSTERI_KANAL) return MUSTERI_KANAL;
  try{ MUSTERI_KANAL = new BroadcastChannel("minipan_musteri"); }catch(e){ MUSTERI_KANAL=null; }
  return MUSTERI_KANAL;
}
/* Ödeme verisinden müşteri ekranı için snapshot üret */
function musteriSnapshot(){
  const o=state.odeme;
  if(!o || !SESSIONS[o.masa]) return null;
  const m=o.masa, s=SESSIONS[m];
  // seçili kalemlerin ad+tutarı
  const kalemler = o.secili.map(x=>{
    const it=masaKalemBul(m,x.kalemId);
    return { ad: it?it.ad:"", adet: it?(it.adet||1):1, tutar: x.tutar };
  });
  const hamToplam=o.secili.reduce((t,x)=>t+x.tutar,0);
  const indirim=Math.min(o.indirim||0,hamToplam);
  const odenecek=Math.round((hamToplam-indirim)*100)/100;
  const girilen=(o.yontem.nakit||0)+(o.yontem.kredi||0)+(o.yontem.diger||0);
  return {
    tip:"odeme",
    sube: AKTIF_SUBE,
    masaAd: s.ad || m,
    tamHTML: window.__odemeHTML || "",   // 3 sütun canlı ayna
    kalemler,
    araToplam: hamToplam,
    indirim,
    odenecek,
    yontemler: { nakit:o.yontem.nakit||0, kredi:o.yontem.kredi||0, diger:o.yontem.diger||0 },
    girilen,
    paraUstu: Math.max(0, Math.round((girilen-odenecek)*100)/100),
    kalan: Math.max(0, Math.round((odenecek-girilen)*100)/100),
  };
}
/* Müşteri ekranına ödeme durumunu yayınla */
function musteriEkranGuncelle(){
  const kanal=musteriKanalAc(); if(!kanal) return;
  const snap=musteriSnapshot();
  if(snap) kanal.postMessage(snap);
}
/* Müşteri ekranını boş/reklam moduna al */
function musteriEkranBosa(){
  const kanal=musteriKanalAc(); if(!kanal) return;
  kanal.postMessage({ tip:"bos", sube:AKTIF_SUBE, reklamlar: MUSTERI_REKLAMLAR[AKTIF_SUBE]||[] });
}
/* Müşteri penceresini aç (otomatik 2. ekran veya ayrı pencere) */
async function musteriEkranAc(){
  // zaten açıksa öne getir
  if(MUSTERI_PENCERE && !MUSTERI_PENCERE.closed){ MUSTERI_PENCERE.focus(); musteriEkranBosa(); return {ok:true}; }
  const html = musteriEkranHTML();
  let placed=false;
  // 1) Modern çoklu ekran API
  try{
    if(window.getScreenDetails && (await navigator.permissions.query({name:"window-management"}).catch(()=>({state:"prompt"}))).state!=="denied"){
      const sd = await window.getScreenDetails();
      const ikinci = sd.screens.find(s=>!s.isPrimary) || sd.screens[1];
      if(ikinci){
        MUSTERI_PENCERE = window.open("", "minipanMusteri",
          `left=${ikinci.availLeft},top=${ikinci.availTop},width=${ikinci.availWidth},height=${ikinci.availHeight}`);
        if(MUSTERI_PENCERE){
          MUSTERI_PENCERE.document.write(html);
          MUSTERI_PENCERE.document.close();
          // tam ekran dene
          try{ setTimeout(()=>{ MUSTERI_PENCERE.document.documentElement.requestFullscreen&&MUSTERI_PENCERE.document.documentElement.requestFullscreen(); },300); }catch(e){}
          placed=true;
        }
      }
    }
  }catch(e){ /* izin yok / desteklenmiyor → yedek yönteme düş */ }
  // 2) Yedek: normal pencere (kasiyer 2. ekrana taşır)
  if(!placed){
    MUSTERI_PENCERE = window.open("", "minipanMusteri", "width=900,height=600");
    if(MUSTERI_PENCERE){ MUSTERI_PENCERE.document.write(html); MUSTERI_PENCERE.document.close(); }
    else return {ok:false, mesaj:"Pop-up engellendi — tarayıcıda izin verin"};
  }
  // pencere hazır olunca: ana CSS'i aktar + mevcut durumu yolla
  setTimeout(()=>{
    musteriCssAktar();
    if(state.odeme) musteriEkranGuncelle(); else musteriEkranBosa();
  }, 500);
  return {ok:true};
}
/* Ana sayfanın tüm <style> içeriğini müşteri penceresine aktar (3 sütun ayna için) */
function musteriCssAktar(){
  if(!MUSTERI_PENCERE || MUSTERI_PENCERE.closed) return;
  try{
    let css="";
    document.querySelectorAll("style").forEach(s=>{ css += s.textContent + "\n"; });
    const hedef = MUSTERI_PENCERE.document.getElementById("meAnaStil");
    if(hedef) hedef.textContent = css;
  }catch(e){}
}
function musteriEkranKapat(){
  if(MUSTERI_PENCERE && !MUSTERI_PENCERE.closed) MUSTERI_PENCERE.close();
  MUSTERI_PENCERE=null;
}
/* Ödeme ekranındaki "Müşteri Ekranı" butonu — açma/yönetim */
async function musteriEkranButon(){
  const acik = MUSTERI_PENCERE && !MUSTERI_PENCERE.closed;
  if(!acik){
    note("🖥️ Müşteri ekranı açılıyor...");
    const r=await musteriEkranAc();
    if(!r.ok){ note("⚠️ "+(r.mesaj||"Açılamadı")); return; }
    if(state.odeme) musteriEkranGuncelle();
  }
  // her durumda yönetim modalını göster
  musteriReklamModal();
}
function musteriReklamModal(){
  let mdl=document.getElementById("musteriModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="musteriModal"; mdl.className="modal-bg"; mdl.style.zIndex="190"; document.body.appendChild(mdl); }
  const acik = MUSTERI_PENCERE && !MUSTERI_PENCERE.closed;
  const reklamlar = MUSTERI_REKLAMLAR[AKTIF_SUBE] || [];
  let ic=`<div class="mte-modal-ic">
    <div class="mte-modal-bas">
      <span>🖥️ Müşteri Ekranı</span>
      <button class="bom-kapat" onclick="musteriModalKapat()">✕</button>
    </div>
    <div class="mte-modal-govde">
      <div class="mte-durum ${acik?'acik':''}">
        <span class="mte-durum-nokta"></span>
        ${acik?'Müşteri ekranı açık':'Müşteri ekranı kapalı'}
      </div>
      <div class="mte-buton-row">
        ${acik
          ? `<button class="mte-kapat-btn" onclick="musteriEkranKapat();musteriModalKapat()">Ekranı kapat</button>`
          : `<button class="mte-ac-btn" onclick="musteriEkranAcModal()">🖥️ Ekranı aç</button>`}
      </div>
      <div class="mte-not">Çift ekranlı POS'ta müşteri tarafındaki ekranda görünür. Ödeme ekranındayken ödeme özetini, boş zamanda aşağıdaki reklam görsellerini gösterir.</div>

      <div class="mte-reklam-bas">📢 Reklam Görselleri <span class="yzc-lbl-not">(${AKTIF_SUBE})</span></div>
      <div class="mte-reklam-grid">`;
  reklamlar.forEach((src,i)=>{
    ic+=`<div class="mte-reklam-kart">
      <img src="${src}" alt="">
      <button class="mte-reklam-sil" onclick="musteriReklamSil(${i})">✕</button>
    </div>`;
  });
  ic+=`<label class="mte-reklam-ekle">
        <input type="file" accept="image/*" multiple style="display:none" onchange="musteriReklamEkle(this.files)">
        <span>＋</span><span class="mte-ekle-lbl">Görsel ekle</span>
      </label>`;
  ic+=`</div>
      <div class="mte-not">Görseller 5 saniyede bir döner. Yatay (16:9) görseller önerilir.</div>
    </div>
  </div>`;
  mdl.innerHTML=ic;
  mdl.classList.add("on");
}
function musteriModalKapat(){ const m=document.getElementById("musteriModal"); if(m) m.classList.remove("on"); }
async function musteriEkranAcModal(){
  const r=await musteriEkranAc();
  if(!r.ok){ note("⚠️ "+(r.mesaj||"Açılamadı")); return; }
  if(state.odeme) musteriEkranGuncelle(); else musteriEkranBosa();
  musteriReklamModal();
}
function musteriReklamEkle(files){
  if(!files||!files.length) return;
  if(!MUSTERI_REKLAMLAR[AKTIF_SUBE]) MUSTERI_REKLAMLAR[AKTIF_SUBE]=[];
  let kalan=files.length;
  Array.from(files).forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      MUSTERI_REKLAMLAR[AKTIF_SUBE].push(e.target.result);
      kalan--;
      if(kalan===0){
        musteriReklamKaydet();
        if(!state.odeme) musteriEkranBosa();
        musteriReklamModal();
        note("📢 Reklam görseli eklendi");
      }
    };
    reader.readAsDataURL(f);
  });
}
function musteriReklamSil(i){
  if(MUSTERI_REKLAMLAR[AKTIF_SUBE]) MUSTERI_REKLAMLAR[AKTIF_SUBE].splice(i,1);
  musteriReklamKaydet();
  if(!state.odeme) musteriEkranBosa();
  musteriReklamModal();
}

/* Ödemeyi onayla — para üstü, eksik onayı, ekran açık kalır */
function odemeOnayla(m){
  const o=state.odeme;
  const hamToplam=o.secili.reduce((t,x)=>t+x.tutar,0);
  if(hamToplam<=0){ note("Önce ürün/tutar seçin"); return; }
  const elleInd=Math.min(o.indirim,hamToplam);
  // Mag indirimi (kullanılan Mag × kur), elle indirimden sonra kalan tutarı geçemez
  const magIndirimHam=(o.musteri && o.kullanilanMag>0) ? o.kullanilanMag*SADAKAT.magTl : 0;
  const magIndirim=Math.round(Math.min(magIndirimHam, Math.max(0, hamToplam-elleInd))*100)/100;
  const indirim=Math.round((elleInd+magIndirim)*100)/100;
  const odenecek=Math.round((hamToplam-indirim)*100)/100;
  const girilen=Math.round((o.yontem.nakit+o.yontem.kredi+o.yontem.diger)*100)/100;
  if(girilen<=0){ note("Ödeme yöntemine tutar girin"); return; }

  const paraUstu=Math.round((girilen-odenecek)*100)/100;
  // girilen yöntemler (POS'a ayrı ayrı gönderilecek)
  const aktifYontemler=[];
  if(o.yontem.nakit>0) aktifYontemler.push({yontem:"nakit", ad:"Nakit", tutar:o.yontem.nakit});
  if(o.yontem.kredi>0) aktifYontemler.push({yontem:"kredi", ad:"Kredi Kartı", tutar:o.yontem.kredi});
  if(o.yontem.diger>0) aktifYontemler.push({yontem:"diger", ad:"Diğer / QR", tutar:o.yontem.diger});

  // ONAY POP-UP — her tahsilat ayrı işlem, POS'a yöntem yöntem gönderilir
  odemeOnayModal({
    masa:m, odenecek, girilen, paraUstu,
    eksik: girilen < odenecek-0.01 ? Math.round((odenecek-girilen)*100)/100 : 0,
    yontemler: aktifYontemler,
    hamToplam, indirim, magIndirim, kullanilanMag:(o.musteri?o.kullanilanMag:0)
  });
}
/* Tahsilatı gerçekten işle (pop-up onayından sonra) */
function odemeTahsilEt(veri){
  const m=veri.masa, o=state.odeme;
  const tahsil=Math.min(veri.girilen, veri.odenecek);  // fazlası para üstü
  // ÖNEMLİ: kalemlere dağıtılan oran sadece NAKİT TAHSİLATI değil,
  // tahsilat + indirim toplamını kapsamalı — yoksa indirim kadarlık
  // tutar kalemde "ödenmemiş" (kalan) olarak sonsuza dek asılı kalır.
  const tahsilOran = veri.hamToplam>0 ? Math.min(1, (tahsil+(veri.indirim||0))/veri.hamToplam) : 0;
  const dagitim=o.secili.map(x=>({ kalemId:x.kalemId, tutar:Math.round((x.tutar*tahsilOran)*100)/100 }));
  // yöntem dağılımı (para üstü nakitten düşülür) — her yöntem ayrı kayıt (POS ayrı gönderim)
  let kalanTahsil=tahsil;
  const yontemler=[];
  const puPozitif=Math.max(0, veri.paraUstu);
  ["kredi","diger","nakit"].forEach(y=>{
    if(o.yontem[y]>0){
      let t=o.yontem[y];
      if(y==="nakit") t=Math.max(0, Math.round((t-puPozitif)*100)/100);
      t=Math.min(t, Math.round(kalanTahsil*100)/100);
      if(t>0){ yontemler.push({yontem:y, tutar:Math.round(t*100)/100}); kalanTahsil=Math.round((kalanTahsil-t)*100)/100; }
    }
  });
  masaOdemeKaydet(m, yontemler, dagitim, veri.indirim);
  // === MAG PUAN İŞLE (üye tanındıysa) ===
  let magBildirim="";
  if(o.musteri){
    const mus=o.musteri;
    // 1) HARCAMA: kullanılan Mag düşülür
    const kullanilan=Math.min(veri.kullanilanMag||0, mus.mag);
    if(kullanilan>0){
      mus.mag-=kullanilan;
      if(typeof magIslemEkle==="function") magIslemEkle(mus,"harcama",-kullanilan,"Kasada puanla ödeme indirimi ("+tl(kullanilan*SADAKAT.magTl)+" ₺)");
      magBildirim+=" · −"+kullanilan+" "+SADAKAT.ad+" kullanıldı";
    }
    // 2) KAZANIM: bu tahsilatın kalemlerinden (kademe çarpanı dahil)
    const k=odeSeciliKazanilacakMag(o);
    if(k.kazanc>0){
      const eskiKademe=(typeof uyeKademe==="function")?uyeKademe(mus):{ad:""};
      mus.mag+=k.kazanc;
      mus.toplamKazanim=(mus.toplamKazanim||0)+k.kazanc;
      if(typeof magIslemEkle==="function"){
        const carpanNot=(k.carpan&&k.carpan!==1)?" ×"+k.carpan+" ("+k.kademeAd+")":"";
        magIslemEkle(mus,"kazanim",k.kazanc,"Kasada alışveriş ("+tl(veri.odenecek)+" ₺)"+carpanNot);
      }
      magBildirim+=" · +"+k.kazanc+" "+SADAKAT.ad+" kazandı";
      // kademe atladı mı
      if(typeof uyeKademe==="function"){
        const yeniKademe=uyeKademe(mus);
        if(yeniKademe.ad!==eskiKademe.ad) magBildirim+=" · "+(yeniKademe.ic||"")+" "+yeniKademe.ad+" oldu!";
      }
    }
    if(typeof sadakatKaydet==="function") sadakatKaydet();
  }
  // YAZARKASA-POS'a gönder (her yöntem ayrı mali fiş — GMP-3)
  const sube = AKTIF_SUBE;
  const posAy = posAyarAl(sube);
  if(posAy.aktif){
    yontemler.forEach(y=>{
      yazarkasayaGonder(sube, {
        tutar: y.tutar,
        kdv: Math.round((y.tutar - y.tutar/1.10)*100)/100,  // %10 KDV varsayım (tatlı/gıda)
        yontem: y.yontem,
        kalemler: dagitim.map(dd=>{ const it=masaKalemBul(m,dd.kalemId); return {ad:it?it.ad:"", tutar:dd.tutar}; })
      }).then(r=>{
        if(r.ok && !r.simulasyon) note("🧾 "+ykYontemAd(y.yontem)+" "+tl(y.tutar)+"₺ → mali fiş üretildi");
        else if(!r.ok) note("⚠️ Yazarkasa: "+r.mesaj);
      });
    });
  }
  const kalan=masaKalan(m);
  if(kalan<=0.01){
    // HIZLI SATIŞ → reçete tüket, geçici oturumu temizle, satış ekranına dön
    if(m===HIZLI_SATIS_ID){
      if(state._hizliSatisCart){ try{ consumeRecipe(state._hizliSatisCart); saveOrder(state._hizliSatisCart, veri.hamToplam); }catch(e){} }
      delete SESSIONS[HIZLI_SATIS_ID];
      state._hizliSatisCart=null; state.cart=[]; state.odenen=0; state.bolDurum=null;
      state.odeme=null; state.kasaMasa=null; odeKlavyeKaldir();
      note("✓ Satış tamamlandı"+magBildirim);
      go("satis");
      return;
    }
    note("✓ Tüm ödeme tamamlandı · masa kapandı"+magBildirim);
    state.odeme=null; state.kasaMasa=null; odeKlavyeKaldir(); go("masalar");
  } else {
    note("✓ Tahsil edildi · kalan "+tl(kalan)+" ₺"+magBildirim);
    // EKRAN AÇIK KALIR — kalan tahsilatlar için yeni tur (müşteri tanımı korunur)
    state.odeme={masa:m, secili:[], indirim:0, yontem:{nakit:0,kredi:0,diger:0}, aktifKutu:"kredi",
      musteri:o.musteri||null, kullanilanMag:0, magOtpGonderildi:false, magOtpOnayli:!!(o.musteri&&o.magOtpOnayli)};
    go("odemeEkran");
  }
}

    return null;

  const opAd = it.secimler[opsIdx] || "seçenek";
  const opFiyat = (it.secimEk && it.secimEk[opsIdx]) ? it.secimEk[opsIdx] : 0;
  const opKcal = (it.secimKcal && it.secimKcal[opsIdx]) ? it.secimKcal[opsIdx] : 0;
  // "Ad ×N" formatından adet ayrıştır
  const adetMatch = String(opAd).match(/\s×(\d+)\s*$/);

  const birimFiyat = toplamAdet>0 ? Math.round((opFiyat/toplamAdet)*100)/100 : opFiyat;

  </div>`;
