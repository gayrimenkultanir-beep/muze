<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bütün Duyurular | Arşiv</title>
    <style>
        body { background: #fffdf5; font-family: 'Georgia', serif; color: #333; margin: 0; padding: 20px; }
        .konteyner { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #8b4513; color: #8b4513; padding-bottom: 10px; }
        .duyuru-item { 
            display: flex; gap: 20px; margin-bottom: 40px; padding: 20px;
            background: #fff; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .duyuru-gorsel img { width: 200px; height: 130px; object-fit: cover; border-radius: 4px; }
        .duyuru-detay { flex: 1; }
        .tarih { color: #8b4513; font-weight: bold; font-size: 0.85rem; }
        .duyuru-detay h2 { margin: 5px 0; font-size: 1.3rem; }
        .duyuru-detay p { line-height: 1.5; font-size: 0.95rem; color: #555; }
        @media (max-width: 600px) { .duyuru-item { flex-direction: column; } .duyuru-gorsel img { width: 100%; } }
    </style>
</head>
<body>

    <div class="konteyner">
        <h1>Duyuru Arşivi</h1>
        <div id="arsiv-liste">Duyurular yükleniyor...</div>
        <p><a href="index.html" style="color:#8b4513;">← Ana Sayfaya Dön</a></p>
    </div>

    <script>
        fetch('./duyurular.json')
            .then(res => res.json())
            .then(data => {
                const liste = document.getElementById('arsiv-liste');
                liste.innerHTML = '';
                
                // En yeni en üstte olacak şekilde tümünü listele
                data.sort((a, b) => new Date(b.tarih) - new Date(a.tarih)).forEach(d => {
                    const tarihStr = new Date(d.tarih).toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
                    
                    liste.innerHTML += `
                        <div class="duyuru-item">
                            <div class="duyuru-gorsel"><img src="${d.gorsel}" alt="${d.baslik}"></div>
                            <div class="duyuru-detay">
                                <span class="tarih">${tarihStr}</span>
                                <h2>${d.baslik}</h2>
                                <p>${d.metin}</p>
                            </div>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
