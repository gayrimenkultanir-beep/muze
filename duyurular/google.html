<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Her Bir Duyuru Bloğu (Ayrı bir tablo gibi) */
        .announcement-block {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* Görsel Alanı (600x400 Sabit) */
        .image-container {
            width: 100%;
            height: 400px;
            overflow: hidden;
            cursor: zoom-in;
            background-color: #eee;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Resmi 600x400 alanına sığdırır ve keser */
            transition: transform 0.3s ease;
        }

        .image-container:hover img {
            transform: scale(1.05);
        }

        /* İçerik Gruplandırma */
        .content-group {
            padding: 25px;
        }

        .meta-info {
            display: flex;
            justify-content:间;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .date-label {
            background: #e1e7ff;
            color: #4a6cf7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .announcement-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #222;
            margin: 10px 0;
            line-height: 1.3;
        }

        .details-text {
            color: #666;
            line-height: 1.7;
            font-size: 1rem;
            white-space: pre-line; /* Sheet'teki alt satırları korur */
        }

        /* Modal (Büyük Görsel) */
        #imgModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #imgModal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 5px;
        }

        /* Yükleniyor ve Hata */
        #loading { text-align: center; font-weight: bold; padding: 20px; }
        
        @media (max-width: 600px) {
            .image-container { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" style="text-decoration: none; color: #4a6cf7; font-weight: 600;">← Geri Dön</a>
        <h1 style="margin-top: 15px;">Duyuru Arşivi</h1>
    </header>

    <div id="loading">Veriler hazırlanıyor...</div>
    <div id="feed"></div>
</div>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    function getDriveThumb(url) {
        if (!url) return 'https://via.placeholder.com/600x400?text=Görsel+Bulunamadı';
        if (url.includes('drive.google.com')) {
            let id = "";
            try {
                if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
                else id = url.split('/d/')[1].split('/')[0];
                return `https://thumbnail.googleusercontent.com/doc/${id}`;
            } catch (e) { return url; }
        }
        return url;
    }

    function showBigImage(src) {
        document.getElementById('imgModal').style.display = 'flex';
        document.getElementById('modalImg').src = src;
    }

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            document.getElementById('loading').style.display = 'none';
            const data = results.data;
            const feed = document.getElementById('feed');

            data.forEach(row => {
                const imgUrl = getDriveThumb(row['görsel']);
                
                const block = `
                    <div class="announcement-block">
                        <div class="image-container" onclick="showBigImage('${imgUrl}')">
                            <img src="${imgUrl}" alt="Duyuru Görseli">
                        </div>
                        <div class="content-group">
                            <div class="meta-info">
                                <span class="date-label">${row['tarih'] || 'Tarih Belirtilmedi'}</span>
                            </div>
                            <h2 class="announcement-title">${row['duyuru metni'] || ''}</h2>
                            <div class="details-text">${row['detaylar'] || ''}</div>
                        </div>
                    </div>
                `;
                feed.innerHTML += block;
            });
        }
    });
</script>

</body>
</html>
