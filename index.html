.qr-splash-kampanyalar{display:flex; flex-direction:column; gap:10px}
.qr-splash-kmp{background:rgba(20,12,8,.55); backdrop-filter:blur(10px); border:1.5px solid rgba(240,167,40,.6); border-radius:14px; padding:12px 16px; display:flex; flex-direction:column; gap:3px}
.qsk-ad{font-size:14px; font-weight:800; color:#ffd98a}
.qsk-ust{display:flex; justify-content:space-between; align-items:center; gap:8px}
.qsk-oran{font-size:12px; font-weight:800; background:#ff8a5c; color:#3a1505; padding:2px 9px; border-radius:99px}
.qsk-simdi{font-size:10px; font-weight:800; background:rgba(47,158,68,.9); color:#fff; padding:2px 8px; border-radius:99px; margin-left:6px}
.qsk-saat{font-size:10px; font-weight:700; color:rgba(255,255,255,.6); margin-left:6px}
.qsk-zaman{display:block; font-size:11.5px; font-weight:700; color:rgba(255,255,255,.75); margin-top:5px}
.qsk-urun{font-size:13px; color:#fff; opacity:.9}
.qsk-fiyat{font-size:15px; font-weight:800; margin-top:2px}
.qsk-eski{text-decoration:line-through; color:rgba(255,255,255,.55); font-size:13px}
.qsk-yeni{color:#ff8a5c}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(240,167,40,.3), 0 0 0 rgba(240,167,40,0)}50%{box-shadow:0 0 22px rgba(240,167,40,.7), 0 0 30px rgba(255,138,92,.4)}}
.glow{animation:glowPulse 1.8s ease-in-out infinite}

.glow-soft{animation:glowText 2s ease-in-out infinite}
.qr-splash-ph{display:grid; place-items:center; background:linear-gradient(160deg,#3a2418,#6b3f23 60%,#a8693a)}
.qr-splash-atla{position:absolute; top:16px; right:16px; z-index:3; padding:8px 16px; border-radius:99px; background:rgba(0,0,0,.5); backdrop-filter:blur(8px); color:#fff; font-size:13px; font-weight:700}
.qr-splash-alt{position:relative; z-index:2; padding:28px 24px 40px; background:linear-gradient(transparent,rgba(0,0,0,.85) 40%); color:#fff}
.qr-splash-rozet{display:inline-block; padding:5px 12px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:11px; font-weight:800; margin-bottom:12px}
.qr-splash-baslik{font-size:30px; font-weight:800; letter-spacing:-.5px; line-height:1.1; margin-bottom:8px}
.qr-splash-altyazi{font-size:15px; opacity:.85; margin-bottom:20px}
.qr-splash-bar{height:4px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden}
.qr-splash-bar-fill{height:100%; width:100%; background:var(--brand); border-radius:99px; transform-origin:left; animation:splashBar 3s linear forwards}
@keyframes splashBar{from{transform:scaleX(0)} to{transform:scaleX(1)}}

/* Sadakat karşılama/kayıt */
.qr-sadakat-ikon{font-size:48px; text-align:center; margin-bottom:8px}

.qr-tb-sadakat{width:auto; min-width:34px; height:34px; padding:0 11px; border-radius:99px; background:var(--cocoa-soft); color:var(--cocoa); font-size:15px; font-weight:800; display:flex; align-items:center; gap:4px}

/* Damga şeridi */
.qr-damga-serit{padding:12px 16px; background:linear-gradient(135deg,var(--cocoa-soft),#f7ede4); border-bottom:1px solid var(--line)}
.qr-damga-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12.5px}
.qr-damga-ust span:first-child{font-weight:800; color:var(--cocoa)}
.qr-damga-kalan{font-weight:700; color:var(--brand-d); font-size:11.5px}
.qr-damga-dots{display:flex; gap:5px}
.qr-damga{flex:1; aspect-ratio:1; max-width:30px; border-radius:8px; background:#fff; border:1.5px dashed var(--line-2); display:grid; place-items:center; font-size:14px}

/* Onay sadakat bloğu */
.qr-onay-sadakat{background:var(--cocoa-soft); border-radius:var(--radius); padding:16px; margin-bottom:18px}
.qr-os-puan{font-weight:800; font-size:16px; color:var(--cocoa); margin-bottom:4px}
.qr-os-bedava{font-size:13px; font-weight:700; color:var(--brand-d); line-height:1.4}
.qr-os-kalan{font-size:13px; color:var(--ink-2); font-weight:600}

/* ---------- Üye profili + adres defteri ---------- */
.qr-profil{padding:18px}
.qpr-ozet{display:flex; gap:12px; margin-bottom:12px}
.qpr-mag, .qpr-damga{flex:1; background:var(--brand-soft); border-radius:var(--radius); padding:18px; text-align:center}
.qpr-damga{background:var(--cocoa-soft)}
.qpr-mag-deger{font-size:30px; font-weight:800; color:var(--brand-d); line-height:1}

.qpr-kalan{text-align:center; padding:12px; background:var(--surface-2); border-radius:var(--radius-sm); font-size:13.5px; font-weight:700; color:var(--brand-ink); margin-bottom:22px}

.qpr-baslik{font-size:16px; font-weight:800; margin-bottom:3px}

.qpr-a-metin{display:block; font-size:13px; color:var(--ink); line-height:1.4}
.qpr-a-aksiyon{display:flex; flex-direction:column; gap:6px; flex:none}

.qpr-a-btn.sil{color:var(--danger); border-color:#f0c0bc}
.qpr-adres-ekle{width:100%; padding:14px; border-radius:var(--radius-sm); background:var(--brand-soft); color:var(--brand-d); font-size:14px; font-weight:800; border:1.5px dashed var(--brand)}

.qr-as-baslik{font-size:13.5px; font-weight:800; margin-bottom:10px}
.qr-as-opt{display:flex; flex-direction:column; align-items:flex-start; gap:4px; width:100%; padding:13px; border-radius:var(--radius); background:var(--surface-2); border:2px solid transparent; text-align:left; margin-bottom:8px; position:relative}
.qr-as-opt.on{background:var(--brand-soft); border-color:var(--brand)}
.qr-as-etiket{display:inline-block; background:var(--cocoa); color:#fff; font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:99px}
.qr-as-metin{font-size:12.5px; color:var(--ink); line-height:1.4}
.qr-as-tik{position:absolute; right:13px; top:13px; color:var(--brand-d); font-weight:800; font-size:16px}
.qr-ot-opt{display:block; width:100%; padding:13px; border-radius:var(--radius-sm); background:var(--surface-2); border:2px solid transparent; font-size:13.5px; font-weight:700; text-align:left; margin-bottom:8px}
.qr-ot-opt.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}

/* Teslimat takip (onay ekranı) */

const FIRESTORE_RULES = String.raw`
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    function user()    { return get(/databases/$(database)/documents/users/$(request.auth.uid)).data; }
    function rol()     { return user().rol; }
    function subem()   { return user().sube_id; }
    function genel()   { return rol() == 'genel_mudur'; }
    function mudur()   { return rol() == 'sube_muduru'; }
    function kasa()    { return rol() == 'kasa'; }
    function kendiSube(bId) { return subem() == bId; }
    function girisli() { return request.auth != null && user().aktif == true; }

    // --- MERKEZ TANIMLAR: sadece genel müdür yazar, herkes okur ---
    match /products/{p}    { allow read: if girisli(); allow write: if girisli() && genel(); }
    match /recipes/{r}     { allow read: if girisli(); allow write: if girisli() && genel(); } // REÇETE KİLİTLİ
    match /ingredients/{i} { allow read: if girisli(); allow write: if girisli() && genel(); }

    // --- KAMPANYA: genel müdür her şeyi; şube müdürü sadece kendi kapsamlı ---
    match /campaigns/{c} {
      allow read:  if girisli();
      allow write: if girisli() && (genel() ||
                     (mudur() && request.resource.data.kapsam == [subem()]));
    }

    // --- ŞUBE ALTI ---
    match /branches/{bId} {
      // Şube dokümanı: genel müdür yazar (yeni şube ekleme dahil), herkes okur
      allow read:  if girisli();
      allow write: if girisli() && genel();

      // Fiyat override: genel müdür veya o şubenin müdürü
      match /pricing/{pId} {
        allow read:  if girisli();
        allow write: if girisli() && (genel() || (mudur() && kendiSube(bId)));
      }
      // Satış/oturum: kasa + müdür kendi şubesinde yazar; genel müdür okur
      match /sessions/{sId} {
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId) && (kasa() || mudur());
      }
      match /orders/{oId} {
        allow read:   if girisli() && (genel() || kendiSube(bId));
        allow create: if girisli() && kendiSube(bId);          // kasa + QR
        allow update: if girisli() && kendiSube(bId);
        // SİLME yalnızca müdür — kayıt dışı satış kapısını kapatır, loglanır
        allow delete: if girisli() && kendiSube(bId) && (mudur() || genel());
      }
      match /stock/{ingId} {
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId);
      }
      match /customers/{cId} {  // şube bazlı sadakat
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId);
      }
      match /cashclose/{d} {
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId) && (mudur() || genel());
      }
    }

    // --- ORTAK DEFTER: şube kendi siparişini yazar, genel müdür hepsini görür ---
    match /supply_orders/{oId} {
      allow read:  if girisli();
      allow write: if girisli() && (genel() || (mudur() && request.resource.data.bId == subem()));
    }
    match /supply_ledger/{bId} {
      allow read:  if girisli() && (genel() || kendiSube(bId));
      allow write: if girisli() && genel();
    }

    // --- KULLANICILAR: sadece genel müdür yönetir ---
    match /users/{uid} {
      allow read:  if girisli() && (genel() || request.auth.uid == uid);
      allow write: if girisli() && genel();
    }
  }
}`;

/* Bir şubenin masalarını {id, kat, ad, etiket} olarak döndür (id oturum anahtarı) */
function subeMasalari(sube){
  const kats = BRANCH_TABLES[sube] || [];
  const out = [];
  kats.forEach(k=>{
    k.masalar.forEach(ad=>{
      out.push({ id:k.kat+"|"+ad, kat:k.kat, ad:ad, etiket:k.kat+"-"+ad });
    });
  });
  return out;
}

/* ============================================================
   BAYİ KANALI (B2B) — genel müdür ↔ bayi (şube) tedarik sistemi
   - Stok kartları = STOCK (mevcut hammadde, aynı sistem)
   - MERKEZ_STOK: genel müdürün elindeki toplam stok (= STOCK.mevcut kullanılır)
   - BAYI_STOK[şube][stokKodu] = miktar (her bayinin kendi deposu)
   - BAYI_FIYAT[stokKodu] = genel müdürün bayiye satış fiyatı (₺/birim)
   - IRSALIYELER: genel müdüre gelen mal girişleri
   - SIParisLER: bayilerin genel müdüre talep listeleri (durum akışlı)
   ============================================================ */
let BAYI_STOK = {};          // {"Edirne Atatürk": {hamur:5000, cikolata:2000}}
let BAYI_FIYAT = {};         // {hamur:120, cikolata:340} — ₺/birim (gr için ₺/kg mantıklı ama basit tutuyoruz)
let IRSALIYELER = [];        // {id,tarih,tedarikci,aciklama,kalemler:[{kod,miktar}]}
let BAYI_SIPARISLER = [];    // {id,sube,tarih,kalemler:[{kod,miktar}],durum,odeme,aktarildi}
let _irsaliyeId = 1, _siparisId = 1;
const SIPARIS_DURUM = {

  onayda:    {ad:"Onay bekliyor", renk:"#e08a1e",  bg:"#fdf0dc"},

  red:       {ad:"Reddedildi",    renk:"#e74c3c",  bg:"#fdeceb"},
};
/* Bir bayinin bir stoktaki bakiyesi */
function bayiStok(sube, kod){ return (BAYI_STOK[sube] && BAYI_STOK[sube][kod]) || 0; }
function bayiStokYaz(sube, kod, miktar){
  if(!BAYI_STOK[sube]) BAYI_STOK[sube]={};
  BAYI_STOK[sube][kod]=miktar;
}
/* Bayi satış fiyatı */
function bayiFiyat(kod){ return BAYI_FIYAT[kod]||0; }
/* Şubeye özel iskonto (genel müdür tanımlar) — yüzde */
let BAYI_ISKONTO = {};   // {"Edirne Atatürk": 10}
function bayiIskonto(sube){ return BAYI_ISKONTO[sube]||0; }
/* İskontolu birim fiyat */
function bayiNetFiyat(kod, sube){
  const f = bayiFiyat(kod);
  const isk = bayiIskonto(sube);
  return isk>0 ? f*(1-isk/100) : f;
}
/* Bir siparişin brüt ve net (iskontolu) tutarı */
function siparisTutar(sp){
  const brut = sp.kalemler.filter(k=>!k.silindi && k.miktar>0).reduce((a,k)=>a+k.miktar*bayiFiyat(k.kod),0);
  const isk = bayiIskonto(sp.sube);
  const indirim = brut*isk/100;
  return { brut, isk, indirim, net:brut-indirim };
}

/* === B2B KALICILIK — roller arası geçişte (sayfa yenilenince) veri korunur === */
const B2B_KEY = "minipan_b2b_v1";
function b2bKaydet(){
  try{
    const veri = {
      BAYI_STOK, BAYI_FIYAT, BAYI_ISKONTO, IRSALIYELER, BAYI_SIPARISLER,
      _irsaliyeId, _siparisId,
      // merkez stok mevcut miktarları da kalıcı (irsaliye/sayım/aktarım değiştiriyor)
      STOCK_MEVCUT: Object.fromEntries(Object.entries(STOCK).map(([k,v])=>[k,v.mevcut]))
    };
    localStorage.setItem(B2B_KEY, JSON.stringify(veri));
  }catch(e){ /* localStorage yoksa sessiz geç */ }
}
function b2bYukle(){
  try{
    const raw = localStorage.getItem(B2B_KEY);
    if(!raw) return;
    const v = JSON.parse(raw);
    if(v.BAYI_STOK) BAYI_STOK = v.BAYI_STOK;
    if(v.BAYI_FIYAT) BAYI_FIYAT = v.BAYI_FIYAT;
    if(v.BAYI_ISKONTO) BAYI_ISKONTO = v.BAYI_ISKONTO;
    if(v.IRSALIYELER) IRSALIYELER = v.IRSALIYELER;
    if(v.BAYI_SIPARISLER) BAYI_SIPARISLER = v.BAYI_SIPARISLER;
    if(v._irsaliyeId) _irsaliyeId = v._irsaliyeId;
    if(v._siparisId) _siparisId = v._siparisId;
    if(v.STOCK_MEVCUT){ Object.entries(v.STOCK_MEVCUT).forEach(([k,m])=>{ if(STOCK[k]) STOCK[k].mevcut=m; }); }
  }catch(e){ /* bozuk veri → yoksay */ }
}

/* ============================================================
   OPSİYON SEÇENEĞİ KAPATMA (otomatik stok + manuel)
   - Manuel: kasa/müdür "ürün:grup:seçenek" anahtarıyla kapatır
   - Otomatik: seçeneğin reçetesindeki hammadde stoğu yetmiyorsa
   Kapalı seçenek seçilemez; gruptaki diğerleriyle devam edilir.
   Gerçekte branches/{b}/option_overrides koleksiyonunda tutulur.
   ============================================================ */
/* ============================================================
   FİYAT YÖNETİMİ — genel fiyat + şube fiyatı + indirim + satış aç/kapa
   PRICE_OVERRIDE[şube][ürünAdı] = {fiyat, indirim, kapali}
   - fiyat: şubeye özel fiyat (yoksa genel fiyat geçerli, genel fiyatın üstüne çıkamaz)
   - indirim: % indirim (0-100)
   - kapali: bu şubede satışa kapalı
   GENEL_KAPALI[ürünAdı] = true → tüm şubelerde kapalı (genel müdür)
   ============================================================ */
/* ============================================================
   FİYAT YÖNETİMİ v3 — sadece genel fiyat (indirim KAMPANYA'dan gelir)
   SUBE_FIYAT[şube][ürün] = {
     masa: {genel, kapali},
     eve:  {genel, kapali}
   }
   İndirim/oran/açıklama artık burada DEĞİL → KAMPANYALAR'da
   ============================================================ */
let SUBE_FIYAT = {};

function urunVarsayilanFiyat(ad){
  const p = DEMO_PRODUCTS.find(x=>x.ad===ad);
  return p ? p.fiyat : 0;
}
/* Şube+ürün+kanal kaydını getir (yoksa boş nesne) */
function fiyatKayit(sube, ad, kanal){
  return (SUBE_FIYAT[sube] && SUBE_FIYAT[sube][ad] && SUBE_FIYAT[sube][ad][kanal]) || {};
}
function fiyatKayitYaz(sube, ad, kanal){
  if(!SUBE_FIYAT[sube]) SUBE_FIYAT[sube]={};
  if(!SUBE_FIYAT[sube][ad]) SUBE_FIYAT[sube][ad]={};
  if(!SUBE_FIYAT[sube][ad][kanal]) SUBE_FIYAT[sube][ad][kanal]={};
  return SUBE_FIYAT[sube][ad][kanal];
}
/* ============================================================
   KAMPANYA SİSTEMİ
   KAMPANYALAR = [{
     id, ad, urun, tip:"oran"|"fiyat", deger,
     kanal:"masa"|"eve", subeler:"hepsi"|[şube...],
     gunler:[0-6], saatBas:"HH:MM", saatBit:"HH:MM",
     tekrar:bool, aktif:bool, olusturan
   }]
   ============================================================ */
let KAMPANYALAR = [];
let _kampanyaId = 1;
const GUN_ADLARI = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];  // 0=Pzt
/* Kampanyanın gün+saat metnini akıllı üret: "Her gün", "Hafta içi", "Hafta sonu", "Sal, Per" + saat */
function kampanyaZamanMetni(k){
  let gun;
  const g = (k.gunler||[]).slice().sort((a,b)=>a-b);
  if(g.length===0 || g.length===7) gun = "Her gün";
  else if(g.length===5 && [0,1,2,3,4].every(x=>g.includes(x))) gun = "Hafta içi";
  else if(g.length===2 && g.includes(5) && g.includes(6)) gun = "Hafta sonu";
  else gun = g.map(i=>GUN_ADLARI[i]).join(", ");
  const saat = (k.saatBas && k.saatBit) ? k.saatBas+"–"+k.saatBit : "tüm gün";
  return gun + " · " + saat;
}
/* JS getDay: 0=Paz..6=Cmt → bizim 0=Pzt indeksine çevir */
function bugunIndeks(){ const d=new Date().getDay(); return d===0?6:d-1; }
function suankiDakika(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function saatDakika(hhmm){ if(!hhmm) return null; const p=hhmm.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
/* Kampanya şu an aktif mi? (gün+saat) */
function kampanyaAktifMi(k){
  if(!k.aktif) return false;
  // gün kontrolü
  if(k.gunler && k.gunler.length>0 && !k.gunler.includes(bugunIndeks())) return false;
  // saat kontrolü
  const bas=saatDakika(k.saatBas), bit=saatDakika(k.saatBit), simdi=suankiDakika();
  if(bas!=null && bit!=null){
    if(bas<=bit){ if(simdi<bas||simdi>bit) return false; }
    else { if(simdi<bas && simdi>bit) return false; }  // gece aşan aralık
  }
  return true;
}
/* Bir ürün+şube+kanal için geçerli aktif kampanya (varsa en iyisini döner) */
function urunKampanya(ad, sube, kanal){
  const adaylar = KAMPANYALAR.filter(k=>
    k.urun===ad && k.kanal===kanal && kampanyaAktifMi(k) &&
    (k.subeler==="hepsi" || (Array.isArray(k.subeler)&&k.subeler.includes(sube)))
  );
  if(adaylar.length===0) return null;
  // birden fazla varsa en düşük fiyatı veren kazansın
  return adaylar[0];
}
/* Bir ürünün bir şubedeki, bir kanaldaki NİHAİ fiyat bilgisi (kampanya dahil) */
function urunFiyatBilgi(ad, sube, kanal){
  sube = sube || AKTIF_SUBE;
  kanal = kanal || "masa";
  const masaK = fiyatKayit(sube, ad, "masa");
  const masaGenel = (masaK.genel!=null && masaK.genel>0) ? masaK.genel : urunVarsayilanFiyat(ad);
  let k, genel;
  if(kanal==="eve"){
    k = fiyatKayit(sube, ad, "eve");
    genel = (k.genel!=null && k.genel>0) ? k.genel : masaGenel;
  } else {
    k = masaK; genel = masaGenel;
  }
  // KAMPANYA uygula
  const kmp = urunKampanya(ad, sube, kanal);
  let gecerli = genel, indOran = 0, aciklama = "", kampanyaAd = "";
  if(kmp){
    if(kmp.tip==="oran"){ indOran = kmp.deger; gecerli = Math.round(genel*(1-indOran/100)); }
    else { gecerli = kmp.deger; indOran = genel>0?Math.round((1-kmp.deger/genel)*100):0; }
    if(gecerli<0) gecerli=0;
    aciklama = kmp.ad; kampanyaAd = kmp.ad;
  }
  const indirimli = !!kmp && gecerli<genel;
  const kapali = !!k.kapali;
  return { genel, eski:genel, gecerli, indirimli, indOran, aciklama, kampanyaAd, kapali };
}
/* Satışta gösterilecek nihai fiyat */
function urunGecerliFiyat(ad, sube, kanal){ return urunFiyatBilgi(ad, sube, kanal).gecerli; }
/* QR servis tipine göre kanal belirle */
function aktifKanal(){ return (QR && QR.servis==="eve") ? "eve" : "masa"; }


let OPTION_CLOSED = {};   // { "Minipan (14 Adet)|3|5": true }
let FORCE_OPEN = {};      // müdür stok 0 iken zorla açtı → stok eksiye düşebilir
let FORCE_LOG = [];       // { urun, secenek, kim, zaman } denetim kaydı

function optKey(urun, gi, si){ return urun+"|"+gi+"|"+si; }

/* Seçenek stok açısından yapılabilir mi? (reçetedeki her hammadde yeterli mi) */
function secenekStokYeterli(sec){
  if(!sec.recete || !sec.recete.length) return true;
  return sec.recete.every(r=> !STOCK[r.ing] || STOCK[r.ing].mevcut >= r.g);
}

/* Seçenek kapalı mı? (manuel VEYA otomatik stok)
   Müdür force-open yaptıysa stok kapatması geçersiz olur. */
function secenekKapali(urun, gi, si, sec){
  const k = optKey(urun,gi,si);
  if(OPTION_CLOSED[k]) return "manuel";
  if(FORCE_OPEN[k]) return false;              // müdür zorla açtı
  if(!secenekStokYeterli(sec)) return "stok";
  return false;
}

/* Manuel aç/kapa — kasa + müdür yetkili */
function toggleSecenekKapat(urun, gi, si){
  const k = optKey(urun,gi,si);
  if(OPTION_CLOSED[k]) delete OPTION_CLOSED[k];
  else OPTION_CLOSED[k]=true;
  renderOptionModal();
}

/* Stok 0 seçeneği zorla aç — SADECE MÜDÜR/GENEL · stok eksiye düşebilir · loglanır */
function forceOpenSecenek(urun, gi, si){
  if(state.role!=="mudur" && state.role!=="genel") return;  // yetki kontrolü
  const k = optKey(urun,gi,si);
  if(FORCE_OPEN[k]){
    delete FORCE_OPEN[k];                       // geri al
  } else {
    FORCE_OPEN[k]=true;
    const sec = PRODUCT_OPTIONS[urun][gi].secenekler[si];
    FORCE_LOG.push({urun, secenek:sec.ad, kim:ROLES[state.role].ad, zaman:new Date().toLocaleTimeString('tr')});
    note("⚠ "+sec.ad+" zorla açıldı — stok eksiye düşebilir (loglandı)");
  }
  renderOptionModal();
}

/* Stok kapatma modu aç/kapa (kasa + müdür) */
function toggleKapatMod(){
  OPT_STATE.kapatMod = !OPT_STATE.kapatMod;
  renderOptionModal();
}

let state = { role:null, cat:"Hepsi", cart:[] };

let AKTIF_SUBE = "Edirne Atatürk";   // kasa/müdürün çalıştığı şube

function login(role){
  const r = ROLES[role];
  // Kasa/müdür → önce şube seç (genel müdür tüm şubeleri görür)
  if(r.subeSec && !state._subeSecildi){
    subeSecimGoster(role);
    return;
  }
  state.role = role;
  document.getElementById("login").style.display="none";
  document.getElementById("app").classList.add("on");
  document.getElementById("branchLabel").textContent = r.sube || AKTIF_SUBE;
  document.getElementById("roleLabel").textContent = r.ad;
  const dot = document.getElementById("roleDot");
  dot.textContent = r.ic; dot.style.background = r.renk;
  buildNav();
  // Masalar ekranı olan roller (kasa, müdür) girişte doğrudan Masalar'la başlasın
  const acilis = r.nav.includes("masalar") ? "masalar" : r.nav[0];
  go(acilis);
}

/* Şube seçim ekranı (kasa/müdür) */
function subeSecimGoster(role){
  const r = ROLES[role];
  const html = '<div class="login-card">'+
    '<div class="logo"><span class="mark">'+r.ic+'</span> '+r.ad+'</div>'+
    '<div class="login-sub">Hangi şubede çalışıyorsun?</div>'+
    '<div class="role-pick" style="max-height:340px;overflow-y:auto">'+
    DEMO_BRANCHES.map(b=>
      b.kapali
      ? '<button class="role-btn" disabled style="opacity:.45;cursor:not-allowed">'+
          '<span class="role-dot" style="background:var(--ink-3);font-size:15px">⛔</span>'+
          '<span><span class="rb-name">'+b.ad+'</span><br><span class="rb-desc">geçici kapalı</span></span>'+
        '</button>'
      : '<button class="role-btn" onclick="subeSec(\''+role+'\',\''+b.ad.replace(/'/g,"\\'")+'\')">'+
          '<span class="role-dot" style="background:var(--cocoa);font-size:15px">🏬</span>'+
          '<span><span class="rb-name">'+b.ad+'</span><br><span class="rb-desc">'+(BRANCH_INFO[b.ad]?BRANCH_INFO[b.ad].sehir:'')+'</span></span>'+
        '</button>'
    ).join("")+
    '</div>'+
    '<button class="role-btn" style="margin-top:10px;justify-content:center" onclick="location.reload()">← Geri</button>'+
    '</div>';
  document.querySelector("#login .login-card").outerHTML = html;
}
function subeSec(role, sube){
  AKTIF_SUBE = sube;
  window.__sube = sube;       // veri katmanı için
  state._subeSecildi = true;
  login(role);
}
function logout(){
  state = { role:null, cat:"Hepsi", cart:[] };
  location.reload();          // giriş ekranını temiz yükle (şube seçimi sıfırlanır)
}

function buildNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = ROLES[state.role].nav.map(k=>{
    const m = NAV_META[k];
    return `<button class="nav-item" data-k="${k}" onclick="go('${k}')">
      <span class="ni-ic">${m.ic}</span>${m.ad}</button>`;
  }).join("");
}

function go(key, scrollKoru){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active", n.dataset.k===key));
  const main = document.getElementById("main");
  const eskiScroll = main.scrollTop;
  if(!scrollKoru) main.scrollTop = 0;
  ({
    satis:viewSatis, masalar:viewMasalar, masayonetim:viewMasaYonetim, canli:viewCanli, recete:viewRecete,
    fiyat:viewFiyat, kampanya:viewKampanya, personel:viewPersonel, bayi:viewBayi,
    subeler:viewSubeler, rapor:viewRapor, denetim:viewDenetim, stok:viewStok
  }[key] || viewSatis)(main);
  if(scrollKoru) main.scrollTop = eskiScroll;
}

// --- SATIŞ (kasa + müdür + genel) ---
function viewSatis(main){
  const cats = ["Hepsi", ...new Set(DEMO_PRODUCTS.map(p=>p.kat))];
  const prods = DEMO_PRODUCTS.filter(p=> state.cat==="Hepsi" || p.kat===state.cat);
  main.innerHTML = `
    <div class="pos-grid">
      <div class="pos-sol">
        <div class="sec-head">
          <div><h2>Satış</h2><div class="sh-sub">Ürüne dokun → adisyona ekle</div></div>
        </div>
        <div class="cat-row">
          ${cats.map(c=>`<button class="cat-pill ${c===state.cat?'on':''}" onclick="setCat('${c}')">${c}</button>`).join("")}
        </div>
        <div class="prod-grid">
          ${prods.slice().sort((a,b)=>{
            const ia=urunFiyatBilgi(a.ad,AKTIF_SUBE,"masa").indirimli?0:1;
            const ib=urunFiyatBilgi(b.ad,AKTIF_SUBE,"masa").indirimli?0:1;
            return ia-ib;
          }).map((p,i)=>{
            const satilir = urunSatilabilir(p);
            const fb = urunFiyatBilgi(p.ad, AKTIF_SUBE, "masa");
            const fiyatHtml = fb.indirimli
              ? `<span class="p-price indirimli"><span class="p-eski">${fb.eski} ₺</span><span class="p-yeni blink">${fb.gecerli} ₺</span>${fb.indOran>0?`<span class="p-ind-rozet">%${fb.indOran}</span>`:''}</span>`
              : `<span class="p-price">${fb.gecerli} ₺</span>`;
            const aciklamaHtml = (fb.indirimli && fb.aciklama) ? `<span class="p-kampanya blink">🔥 ${fb.aciklama}</span>` : '';
            return `<button class="prod ${satilir?'':'out'} ${fb.indirimli?'prod-indirimli blink-soft':''}" onclick="addToCart(${DEMO_PRODUCTS.indexOf(p)})">
              ${satilir?'':'<span class="p-out">Tükendi</span>'}
              <span class="p-emoji">${p.emoji}</span>
              <span class="p-name">${p.ad}</span>
              ${aciklamaHtml}
              ${fiyatHtml}
            </button>`;}).join("")}
        </div>
      </div>
      ${cartHtml()}
    </div>`;
}
function setCat(c){ state.cat=c; go("satis"); }

/* Ürün satılabilir mi? Kanal bazlı satışa kapalı DEĞİL + manuel pasif DEĞİL + stok yeterli */
function urunSatilabilir(p, kanal){
  if(!p.aktif) return false;
  // fiyat yönetiminden bu kanalda satışa kapatıldı mı
  const fb = urunFiyatBilgi(p.ad, AKTIF_SUBE, kanal||"masa");
  if(fb.kapali) return false;
  const recipe = RECIPES[p.ad];
  if(!recipe) return true;
  return recipe.every(r=> !STOCK[r.ing] || STOCK[r.ing].mevcut >= r.g);
}
function addToCart(idx){
  const p = DEMO_PRODUCTS[idx];
  const fiyat = urunGecerliFiyat(p.ad);   // indirim/şube fiyatı uygulanmış
  const opts = PRODUCT_OPTIONS[p.ad];
  if(opts && opts.length){
    openOptionModal(idx);          // opsiyonlu ürün → modal aç
  } else if(state.kasaPaket){
    // kasa paket sepetine ekle
    state.kasaPaket.sepet.push({ad:p.ad, fiyat:fiyat, secimler:[]});
    note(p.ad+" → 🥡 Paket sepeti");
    go("satis");
  } else if(state.kasaEkle){
    // kasa masa sepetine ekle (geçici, gönderince tek fiş)
    if(!state.kasaEkle.sepet) state.kasaEkle.sepet=[];
    state.kasaEkle.sepet.push({ad:p.ad, fiyat:fiyat, secimler:[], paket:false});
    note(p.ad+" → sepet ("+state.kasaEkle.kisi+")");
    go("satis");
  } else {
    // opsiyonsuz ürün → direkt adisyona
    state.cart.push({ad:p.ad, fiyat:fiyat, q:1, secimler:[], ekstraRecete:[]});
    go("satis");
  }
}

/* ============================================================
   OPSİYON SEÇİM MODALI (POS + QR ortak mantık)
   Zorunlu alanlar seçilmeden "Ekle" pasif.
   Fiyat toplanır + seçimlerin reçeteleri ürüne iliştirilir.
   ============================================================ */
let OPT_STATE = null;
function openOptionModal(idx){
  const p = DEMO_PRODUCTS[idx];
  // secim[gi] = { si: adet }  (zorunluda adet hep 1, isteğe bağlıda artırılabilir)
  OPT_STATE = { idx:idx, p:p, secim:{}, not:"" };
  PRODUCT_OPTIONS[p.ad].forEach((grup,gi)=>{
    OPT_STATE.secim[gi] = {};
    // zorunlu + min=1 + max=1 + istemiyorum YOKsa → ilk seçeneği varsayılan seç
    if(grup.tip==="zorunlu" && grup.min>=1 && grup.max===1){
      const istIdx = grup.secenekler.findIndex(s=>secIstemiyorum(s));
      const ilk = istIdx===0 ? (grup.secenekler.length>1?1:0) : 0;
      OPT_STATE.secim[gi][ilk] = 1;
    }
  });
  renderOptionModal();
  document.getElementById("optModal").classList.add("on");
}
function closeOpt(){ document.getElementById("optModal").classList.remove("on"); OPT_STATE=null; }
/* "İstemiyorum" tipi seçenek mi? */
function secIstemiyorum(sec){ return /istemiyorum/i.test(sec.ad); }
/* Bir grupta toplam seçili adet */
function grupSecimSayisi(gi){
  const m = OPT_STATE.secim[gi]||{};
  return Object.values(m).reduce((a,b)=>a+b,0);
}

/* Zorunlu grupta seçenek seç (radio veya çoklu min/max) */
function toggleOpt(gi, si){
  const grup = PRODUCT_OPTIONS[OPT_STATE.p.ad][gi];
  const sec = grup.secenekler[si];
  if(!secIstemiyorum(sec) && secenekKapali(OPT_STATE.p.ad, gi, si, sec)) return;
  const m = OPT_STATE.secim[gi];

  if(grup.max===1){
    // tek seçim (radio) — istemiyorum dahil
    OPT_STATE.secim[gi] = { [si]:1 };
    renderOptionModal(); return;
  }
  // çoklu zorunlu (min-max)
  if(secIstemiyorum(sec)){ OPT_STATE.secim[gi] = { [si]:1 }; renderOptionModal(); return; }
  // istemiyorum seçiliyse kaldır
  const istIdx = grup.secenekler.findIndex(s=>secIstemiyorum(s));
  if(istIdx>=0 && m[istIdx]) delete m[istIdx];
  if(m[si]) delete m[si];
  else { if(grupSecimSayisi(gi) < (grup.max||99)) m[si]=1; }
  renderOptionModal();
}
/* İsteğe bağlı grupta adet değiştir (+/-) */
function optAdet(gi, si, delta){
  const grup = PRODUCT_OPTIONS[OPT_STATE.p.ad][gi];
  const sec = grup.secenekler[si];
  if(delta>0 && !secIstemiyorum(sec) && secenekKapali(OPT_STATE.p.ad, gi, si, sec)) return;
  const m = OPT_STATE.secim[gi];
  const yeni = (m[si]||0)+delta;
  if(yeni<=0) delete m[si];
  else m[si]=yeni;
  renderOptionModal();
}

/* Zorunlu kurallar sağlandı mı? */
function optGecerli(){
  const gruplar = PRODUCT_OPTIONS[OPT_STATE.p.ad];
  const urun = OPT_STATE.p.ad;
  return gruplar.every((grup,gi)=>{
    if(grup.tip!=="zorunlu") return true;   // isteğe bağlı her zaman geçerli
    const m = OPT_STATE.secim[gi]||{};
    // kapalı seçili varsa geçersiz
    const kapaliSecili = Object.keys(m).some(si=>{
      const sec=grup.secenekler[si];
      return !secIstemiyorum(sec) && secenekKapali(urun,gi,+si,sec);
    });
    if(kapaliSecili) return false;
    const n = grupSecimSayisi(gi);
    return n>=(grup.min||0) && n<=(grup.max||99);
  });
}
/* Seçili opsiyonların toplam ek fiyatı (adet × ek) */
function optEkFiyat(){
  let ek=0;
  PRODUCT_OPTIONS[OPT_STATE.p.ad].forEach((grup,gi)=>{
    const m = OPT_STATE.secim[gi]||{};
    Object.entries(m).forEach(([si,adet])=>{ ek += (grup.secenekler[si].ek||0)*adet; });
  });
  return ek;
}

function renderOptionModal(){
  const p = OPT_STATE.p;
  const gruplar = PRODUCT_OPTIONS[p.ad];
  let html = '<div class="opt-head"><span class="opt-emoji">'+p.emoji+'</span>'+
    '<div><div class="opt-name">'+p.ad+'</div><div class="opt-base">'+urunGecerliFiyat(p.ad, (OPT_STATE.qr?(QR.sube||AKTIF_SUBE):AKTIF_SUBE), (OPT_STATE.qr?aktifKanal():"masa"))+' ₺ taban</div></div>'+
    '<button class="opt-kapat-mod'+(OPT_STATE.kapatMod?' on':'')+'" onclick="toggleKapatMod()" title="Seçenek kapat/aç">'+
    (OPT_STATE.kapatMod?'✓ Düzenleniyor':'⚙ Stok')+'</button>'+
    '<button class="opt-x" onclick="closeOpt()">✕</button></div>'+
    (OPT_STATE.kapatMod?'<div class="kapat-bilgi">Tükenen malzemeyi kapat — müşteri kalan seçeneklerle devam eder. Tekrar dokun: aç.</div>':'')+
    '<div class="opt-body">';
  gruplar.forEach((grup,gi)=>{
    const m = OPT_STATE.secim[gi]||{};
    const n = grupSecimSayisi(gi);
    const istege = grup.tip==="istege";
    let etiket, sayac="";
    if(istege){
      etiket='<span class="og-tip og-coklu">İsteğe bağlı</span>';
    } else if(grup.max===1){
      etiket='<span class="og-tip og-zor">Zorunlu</span>';
    } else {
      etiket='<span class="og-tip og-zor">Zorunlu · '+(grup.min>0?grup.min+'-':'en fazla ')+grup.max+'</span>';
      sayac='<span class="og-sayac">'+n+'/'+grup.max+'</span>';
    }
    html += '<div class="opt-grup"><div class="opt-grup-h"><span class="og-ad">'+grup.ad+'</span>'+
            '<span class="og-meta">'+sayac+etiket+'</span></div><div class="opt-secenekler">';
    grup.secenekler.forEach((sec,si)=>{
      const adet = m[si]||0;
      const secili = adet>0;
      const fiyatTxt = sec.ek ? '+'+sec.ek+' ₺' : '';
      const ist = secIstemiyorum(sec) ? ' opt-ist' : '';
      const kapali = secIstemiyorum(sec) ? false : secenekKapali(p.ad, gi, si, sec);

      if(OPT_STATE.kapatMod && !secIstemiyorum(sec)){
        const manuelKapali = OPTION_CLOSED[optKey(p.ad,gi,si)];
        const stokKapali = !secenekStokYeterli(sec);
        const forceAcik = FORCE_OPEN[optKey(p.ad,gi,si)];
        const mudurMu = state.role==="mudur" || state.role==="genel";
        let forceBtn = '';
        if(stokKapali && mudurMu && !manuelKapali){
          forceBtn = '<span class="force-btn'+(forceAcik?' on':'')+'" onclick="event.stopPropagation();forceOpenSecenek(\''+p.ad.replace(/'/g,"\\'")+'\','+gi+','+si+')">'+
                     (forceAcik?'✓ açık (eksiye düşer)':'yine de aç')+'</span>';
        }
        html += '<button class="opt-sec opt-kapat-row'+(manuelKapali?' kapali':'')+'" onclick="toggleSecenekKapat(\''+p.ad.replace(/'/g,"\\'")+'\','+gi+','+si+')">'+
                '<span class="kapat-tgl">'+(manuelKapali?'✕':'●')+'</span>'+
                '<span class="os-ad">'+sec.ad+'</span>'+
                (stokKapali&&!forceAcik?'<span class="kapat-etiket stok">stok 0</span>':'')+
                (forceAcik?'<span class="kapat-etiket force">zorla açık</span>':'')+
                (manuelKapali?'<span class="kapat-etiket">kapalı</span>':'')+
                forceBtn+'</button>';
      } else if(istege){
        // İSTEĞE BAĞLI: adet kontrollü (+/-)
        const kapaliCls = kapali ? ' opt-kapali' : '';
        const kapaliEt = kapali==='stok' ? '<span class="kapat-etiket stok">tükendi</span>'
                       : kapali==='manuel' ? '<span class="kapat-etiket">bugün yok</span>' : '';
        html += '<div class="opt-sec opt-adetli'+(secili?' on':'')+kapaliCls+'">'+
                '<span class="os-ad">'+sec.ad+'</span>'+kapaliEt+
                (fiyatTxt?'<span class="os-fiyat">'+fiyatTxt+'</span>':'')+
                '<span class="os-adet-kontrol">'+
                  (secili?'<button class="osa-btn" onclick="optAdet('+gi+','+si+',-1)">−</button><span class="osa-n">'+adet+'</span>':'')+
                  '<button class="osa-btn osa-art'+(kapali?' opt-disabled':'')+'" onclick="optAdet('+gi+','+si+',1)">+</button>'+
                '</span></div>';
      } else {
        // ZORUNLU: tek/çoklu seçim
        const tekli = grup.max===1;
        const dolu = !tekli && !secili && !secIstemiyorum(sec) && n>=grup.max;
        const kapaliCls = kapali ? ' opt-kapali' : '';
        const kapaliEt = kapali==='stok' ? '<span class="kapat-etiket stok">tükendi</span>'
                       : kapali==='manuel' ? '<span class="kapat-etiket">bugün yok</span>' : '';
        html += '<button class="opt-sec'+(secili?' on':'')+ist+(dolu?' opt-disabled':'')+kapaliCls+'" onclick="toggleOpt('+gi+','+si+')">'+
                '<span class="os-mark '+(tekli?'radio':'check')+'">'+(secili?(tekli?'●':'✓'):'')+'</span>'+
                '<span class="os-ad">'+sec.ad+'</span>'+
                kapaliEt+
                (fiyatTxt?'<span class="os-fiyat">'+fiyatTxt+'</span>':'')+'</button>';
      }
    });
    html += '</div></div>';
  });
  html += '<div class="opt-grup"><div class="opt-grup-h"><span class="og-ad">Not</span></div>'+
          '<textarea class="opt-not" placeholder="Bu ürünle ilgili notunu buradan iletebilirsin." '+
          'oninput="OPT_STATE.not=this.value">'+(OPT_STATE.not||'')+'</textarea></div>';
  html += '</div>';
  const gecerli = optGecerli();
  const optKanal = OPT_STATE.qr ? aktifKanal() : "masa";
  const optSube = OPT_STATE.qr ? (QR.sube||AKTIF_SUBE) : AKTIF_SUBE;
  const toplam = urunGecerliFiyat(p.ad, optSube, optKanal) + optEkFiyat();
  html += '<div class="opt-foot">'+
    '<div class="opt-toplam"><div class="ot-l">Toplam</div><div class="ot-v">'+toplam+' ₺</div></div>'+
    '<button class="btn btn-primary" '+(gecerli?'':'disabled style="opacity:.4;pointer-events:none"')+' onclick="confirmOpt()">'+
    (gecerli?'Sepete ekle':'Zorunlu alanı seç')+'</button></div>';
  const inner = document.getElementById("optModalInner");
  const body = inner.querySelector(".opt-body");
  const scrollY = body ? body.scrollTop : 0;
  inner.innerHTML = html;
  const yeniBody = inner.querySelector(".opt-body");
  if(yeniBody && scrollY) yeniBody.scrollTop = scrollY;
}

/* Seçim onaylandı: fiyat + reçete ile sepete ekle */
function confirmOpt(){
  if(!optGecerli()) return;
  const p = OPT_STATE.p;
  const gruplar = PRODUCT_OPTIONS[p.ad];
  const secimler=[]; const ekstraRecete=[]; let ekFiyat=0;
  gruplar.forEach((grup,gi)=>{
    const m = OPT_STATE.secim[gi]||{};
    Object.entries(m).forEach(([si,adet])=>{
      const sec=grup.secenekler[si];
      if(!secIstemiyorum(sec)){
        secimler.push(adet>1 ? sec.ad+" ×"+adet : sec.ad);
      }
      ekFiyat += (sec.ek||0)*adet;
      if(sec.recete) sec.recete.forEach(r=>{ if(r.g>0) for(let q=0;q<adet;q++) ekstraRecete.push(r); });
    });
  });
  const cKanal = OPT_STATE.qr ? aktifKanal() : "masa";
  const cSube = OPT_STATE.qr ? (QR.sube||AKTIF_SUBE) : AKTIF_SUBE;
  const yeniKalem = {
    ad:p.ad, fiyat:urunGecerliFiyat(p.ad, cSube, cKanal)+ekFiyat, q:1,
    secimler:secimler, ekstraRecete:ekstraRecete, not:OPT_STATE.not||""
  };
  if(OPT_STATE.qr){

/* ============================================================
   HESAP BÖLME — öğrenci senaryosu
   4 mod: eşit · kişiye göre · ürüne göre · kesir (yarı-yarı)
   Ödeme bölünür ama reçete/tüketim ETKİLENMEZ (adet sabit).
   ============================================================ */
let BOL = null;

function hesapBolAc(total){
  if(total===0){ note("Adisyon boş"); return; }
  // Daha önce bölme başlatıldıysa kaldığı yerden devam et
  if(state.bolDurum && state.bolDurum.total===total){
    BOL = state.bolDurum;
  } else {
    BOL = {
      total: total,
      mod: "esit",
      kisiler: ["Ayşe","Mehmet","Can"],   // gerçekte oturum siparişlerinden
      atama: state.cart.map(()=>({})),
      odenenler: {},
    };
    state.bolDurum = BOL;   // adisyona bağlı kalıcı durum
  }
  renderBol();
  document.getElementById("bolModal").classList.add("on");
}
function bolKapat(){ document.getElementById("bolModal").classList.remove("on"); }
function bolMod(m){ BOL.mod=m; renderBol(); }

/* Ödememiş kişi sayısı */
function odenmemisSayisi(){
  return BOL.kisiler.filter((_,ki)=>!BOL.odenenler[ki]).length;
}

/* Tek kişi kalanın tümünü ödesin (toggle) */
function bolTumunuAl(ki){
  if(BOL.tekKisiKalan===ki) BOL.tekKisiKalan=undefined;  // geri al → moda dön
  else BOL.tekKisiKalan=ki;
  renderBol();
}

/* Kişi ekle/çıkar/adlandır */
function bolKisiEkle(){
  if(Object.keys(BOL.odenenler).length>0){ note("Ödeme başladı — kişi değiştirilemez"); return; }
  if(BOL.kisiler.length>=10){ note("En fazla 10 kişi"); return; }
  BOL.kisiler.push("Kişi "+(BOL.kisiler.length+1));
  renderBol();
}
function bolKisiCikar(ki){
  if(Object.keys(BOL.odenenler).length>0){ note("Ödeme başladı — kişi değiştirilemez"); return; }
  if(BOL.kisiler.length<=1){ note("En az 1 kişi olmalı"); return; }
  BOL.kisiler.splice(ki,1);
  // o kişinin ödemesi ve ürün atamalarını temizle
  delete BOL.odenenler[ki];
  BOL.odenenler = Object.fromEntries(Object.entries(BOL.odenenler).map(([k,v])=>[+k>ki?+k-1:+k,v]).filter(([k])=>k!==ki));
  BOL.atama.forEach(at=>{ delete at[ki]; });
  renderBol();
}
function bolKisiAdla(ki, ad){
  BOL.kisiler[ki] = ad || ("Kişi "+(ki+1));
}

/* Kişi başına düşen tutarları hesapla (moda göre)
   ÖNEMLİ: Ödenmiş kişilerin payı SABİT (ödediği tutar).
   Kalan tutar yalnızca ÖDEMEMİŞ kişiler arasında bölünür. */
function bolHesapla(){
  const n = BOL.kisiler.length;
  const paylar = BOL.kisiler.map(()=>0);

  // Ödenmiş kişiler → ödedikleri tutarı sabitle
  let odenenToplam = 0;
  const odemeyenler = [];
  BOL.kisiler.forEach((_,ki)=>{
    if(BOL.odenenler[ki]){
      paylar[ki] = BOL.odenenler[ki].tutar;
      odenenToplam += BOL.odenenler[ki].tutar;
    } else {
      odemeyenler.push(ki);
    }
  });
  const kalan = +(BOL.total - odenenToplam).toFixed(2);
  const m = odemeyenler.length;   // ödememiş kişi sayısı
  if(m===0) return paylar;        // herkes ödedi

  // "Tek kişi tüm kalanı" override
  if(BOL.tekKisiKalan!==undefined && odemeyenler.includes(BOL.tekKisiKalan)){
    odemeyenler.forEach(ki=>{ paylar[ki] = (ki===BOL.tekKisiKalan) ? kalan : 0; });
    return paylar;
  }

  if(BOL.mod==="esit" || BOL.mod==="kisi"){
    // kalanı ödememiş kişilere eşit böl (kişi modu da kalan-bazlıda eşit gibi davranır)
    const pay = Math.floor(kalan/m*100)/100;
    odemeyenler.forEach(ki=>paylar[ki]=pay);
    const fark = +(kalan - pay*m).toFixed(2);
    if(fark>0) paylar[odemeyenler[m-1]] = +(paylar[odemeyenler[m-1]]+fark).toFixed(2);
    return paylar;
  }
  if(BOL.mod==="urun" || BOL.mod==="kesir"){
    // ürün ataması olan kalan kişilere oranla; atanmamış kalan eşit
    let atanmamis = kalan;
    state.cart.forEach((c,ci)=>{
      const at = BOL.atama[ci];
      const tutar = c.fiyat*c.q;
      const kisiler = Object.keys(at).map(Number).filter(k=>odemeyenler.includes(k));
      if(kisiler.length>0){
        const toplamOran = kisiler.reduce((s,k)=>s+at[k],0);
        kisiler.forEach(k=>{ paylar[k] += tutar*(at[k]/toplamOran); });
        atanmamis -= tutar;
      }
    });
    // atanmamış kalanı ödememiş kişilere eşit dağıt
    if(atanmamis>0.01){
      const pay = atanmamis/m;
      odemeyenler.forEach(ki=>paylar[ki]+=pay);
    }
    return paylar;
  }
  return paylar;
}

/* Ürünü bir kişiye ata (ürün modu: tek kişi · kesir modu: birden çok, oranlı) */
function bolAta(ci, ki){
  const at = BOL.atama[ci];
  if(BOL.mod==="urun"){
    BOL.atama[ci] = (at[ki]!==undefined) ? {} : {[ki]:1};   // tek kişi, toggle
  } else { // kesir
    if(at[ki]!==undefined) delete at[ki];
    else at[ki]=1;                                          // eşit pay (yarı-yarı)
  }
  renderBol();
}

function renderBol(){
  const paylar = bolHesapla();
  const modlar = [
    {k:"esit", ad:"Eşit böl", ic:"➗"},
    {k:"kisi", ad:"Kişiye göre", ic:"👤"},
    {k:"urun", ad:"Ürüne göre", ic:"🍽️"},
    {k:"kesir", ad:"Paylaşımlı", ic:"½"},
  ];
  let html = '<div class="opt-head"><span class="opt-emoji">🧾</span>'+
    '<div><div class="opt-name">Hesabı böl</div><div class="opt-base">Toplam '+BOL.total+' ₺ · '+BOL.kisiler.length+' kişi</div></div>'+
    '<button class="opt-x" onclick="bolKapat()">✕</button></div>';
  // mod seçici
  html += '<div class="bol-modlar">';
  modlar.forEach(m=>{
    html += '<button class="bol-mod'+(BOL.mod===m.k?' on':'')+'" onclick="bolMod(\''+m.k+'\')">'+
            '<span class="bm-ic">'+m.ic+'</span>'+m.ad+'</button>';
  });
  html += '</div><div class="opt-body">';

  // Kişi yönetimi şeridi
  html += '<div class="bol-kisi-yonet"><div class="bky-baslik">Masadaki kişiler ('+BOL.kisiler.length+')</div>'+
          '<div class="bky-liste">';
  BOL.kisiler.forEach((kisi,ki)=>{
    html += '<div class="bky-kisi">'+
      '<input class="bky-ad" value="'+kisi.replace(/"/g,'&quot;')+'" onchange="bolKisiAdla('+ki+',this.value)">'+
      (BOL.kisiler.length>1?'<button class="bky-sil" onclick="bolKisiCikar('+ki+')">✕</button>':'')+
      '</div>';
  });
  html += '<button class="bky-ekle" onclick="bolKisiEkle()">+ Kişi ekle</button>';
  html += '</div></div>';

  // Ürün-bazlı modlarda: ürünleri kişilere atama arayüzü
  if(BOL.mod==="urun" || BOL.mod==="kesir"){
    html += '<div class="bol-aciklama">'+
      (BOL.mod==="urun" ? 'Her ürünü kime aitse ona ata.' : 'Paylaşılan ürüne birden çok kişi seç — eşit bölünür.')+
      '</div>';
    state.cart.forEach((c,ci)=>{
      html += '<div class="bol-urun"><div class="bol-urun-ad">'+c.ad+' <span>'+(c.fiyat*c.q)+' ₺</span></div>'+
              '<div class="bol-urun-kisiler">';
      BOL.kisiler.forEach((kisi,ki)=>{
        const secili = BOL.atama[ci][ki]!==undefined;
        html += '<button class="bol-kisi-btn'+(secili?' on':'')+'" onclick="bolAta('+ci+','+ki+')">'+kisi+'</button>';
      });
      html += '</div></div>';
    });
  }

  // Kişi payları (her modda görünür)
  html += '<div class="bol-paylar">';
  BOL.kisiler.forEach((kisi,ki)=>{
    const odendi = BOL.odenenler[ki];
    const yontemTxt = (odendi && odendi.yontem) ? ' · '+odendi.yontem : '';
    const tekKisiAktif = BOL.tekKisiKalan===ki;
    html += '<div class="bol-pay'+(odendi?' odendi':'')+'">'+
      '<div class="bol-pay-ad">'+(odendi?'✓ ':'')+kisi+
        (!odendi && odenmemisSayisi()>1 ? '<button class="bol-tumu'+(tekKisiAktif?' on':'')+'" onclick="bolTumunuAl('+ki+')">'+(tekKisiAktif?'✓ tümü':'tümünü al')+'</button>':'')+
      '</div>'+
      '<div class="bol-pay-sag">'+
        '<span class="bol-pay-tutar">'+paylar[ki].toFixed(2)+' ₺</span>'+
        (odendi?'<span class="bol-pay-durum">ödendi'+yontemTxt+'</span>'
               :'<button class="bol-pay-al" onclick="bolPayAl('+ki+','+paylar[ki].toFixed(2)+')">Al</button>')+
      '</div></div>';
  });
  html += '</div></div>';

  // Footer: tüm paylar ödendi mi
  const hepOdendi = BOL.kisiler.every((_,ki)=>BOL.odenenler[ki]);
  const odenenSayi = Object.keys(BOL.odenenler).length;
  html += '<div class="opt-foot">'+
    '<div class="opt-toplam"><div class="ot-l">'+odenenSayi+'/'+BOL.kisiler.length+' kişi ödedi</div>'+
    '<div class="ot-v">'+BOL.total+' ₺</div></div>'+
    '<button class="btn btn-primary" '+(hepOdendi?'':'disabled style="opacity:.4;pointer-events:none"')+
    ' onclick="bolTamamla()">'+(hepOdendi?'Adisyonu kapat':'Bekleyen ödeme var')+'</button></div>';
  document.getElementById("bolModalInner").innerHTML = html;
}

/* Bir kişinin payını tahsil et → ödeme ekranı (sadakat dahil) */

  renderOdemeYontem();

/* Mag bozdurma ayarla */
function odMagAyarla(d){
  const ob = BOL.odemeBekleyen;
  const maxBoz = Math.min(ob.musteri.mag, Math.floor(ob.tutar/SADAKAT.bozdurmaKuru));
  ob.kullanilanMag = Math.max(0, Math.min(maxBoz, ob.kullanilanMag + d));
  renderOdemeYontem();
}
function odMagMax(){

}

/* Ödeme alındı → sadakat işle (kullanım + kazanım), kişi ödendi */
function odemeTamamla(yontem, yontemAd){
  const ob = BOL.odemeBekleyen;
  const ki = ob.ki;
  const m = ob.musteri;
  const indirim = ob.kullanilanMag * SADAKAT.bozdurmaKuru;
  const tahsil = Math.max(0, ob.tutar - indirim);

  let sadakatNot = "";
  if(m){
    // KULLANIM: bozdurulan Mag düşülür
    if(ob.kullanilanMag>0){ m.mag -= ob.kullanilanMag; }
    // KAZANIM: ödenen tutara göre yeni Mag (bir sonraki birikime dahil)
    const kazanc = odKazanilacakMag(ob.tutar, ki);
    m.mag += kazanc;
    m.damga += 1;
    let bedava=false;
    if(m.damga>=DAMGA_HEDEF){ m.damga-=DAMGA_HEDEF; bedava=true; }
    sadakatNot = " · +"+kazanc+" "+SADAKAT.ad+(bedava?" · 🎉 bedava hak!":"");
    // gerçekte: customers/{tel} güncellenir (zincir geneli)
  }

  BOL.odenenler[ki] = {tutar:ob.tutar, tahsil:tahsil, yontem:yontemAd, mag:m?m.ad:null};
  odemeKapat();
  // TEK ÖDEME (bölmesiz) → adisyonu direkt kapat
  if(BOL.tekOdeme){
    note(BOL.kisiler[ki]+" · "+tahsil.toFixed(2)+" ₺ · "+yontemAd+sadakatNot);
    tekOdemeTamamla();
    return;
  }
  // BÖLME → payı işaretle, adisyon açık kalır
  state.odenen = (state.odenen||0) + ob.tutar;
  BOL.tekKisiKalan = undefined;   // override sıfırla (kalan normal moda döner)
  note(BOL.kisiler[ki]+" ödedi · "+tahsil.toFixed(2)+" ₺ · "+yontemAd+sadakatNot);
  renderBol();
  if(document.querySelector(".cart")) refreshCart();
}

/* ============================================================
   REÇETE-TÜKETİM MOTORU
   Satış → reçete → gram düşüm → stok azalt → tüketim logla.
   Ödeme/indirim/sadakat bu motora DOKUNMAZ — adet üzerinden sayar.
   ============================================================ */
function consumeRecipe(cart){
  const dusenler = [];
  const uyari = [];
  cart.forEach(item=>{
    const recipe = RECIPES[item.ad];
    // 1) ana ürün reçetesi
    const tumKalemler = recipe ? recipe.slice() : [];
    // 2) opsiyon ekstra reçeteleri (ekstra muz, sos vb.)
    if(item.ekstraRecete) item.ekstraRecete.forEach(r=>tumKalemler.push(r));
    tumKalemler.forEach(r=>{
      const toplam = r.g * item.q;              // gram × satılan adet
      if(STOCK[r.ing]){
        STOCK[r.ing].mevcut -= toplam;          // stok düş
        CONSUMED[r.ing] = (CONSUMED[r.ing]||0) + toplam; // denetim logu
        dusenler.push(STOCK[r.ing].ad+" −"+toplam+"g");
        if(STOCK[r.ing].mevcut <= STOCK[r.ing].kritik)
          uyari.push(STOCK[r.ing].ad);
      }
    });
  });
  return {dusenler, uyari};
}

function checkout(total){
  if(total===0){ note("Adisyon boş"); return; }
  // Bölmesiz tek ödeme — aynı zengin ödeme ekranını kullan (tek "kişi")
  BOL = {
    total: total, mod:"tek", kisiler:["Adisyon"], atama:[{}], odenenler:{},
    tekOdeme: true,   // bölme değil, direkt adisyon ödemesi
  };
  bolPayAl(0, total);
}

/* Direkt adisyon ödemesi tamamlandı → adisyonu kapat */
function tekOdemeTamamla(){
  const {uyari} = consumeRecipe(state.cart);
  saveOrder(state.cart, BOL.total);
  // Masada kişi ödemesi ise → o kişiyi ödendi işaretle, masaya dön
  const kasaKisi = BOL.kasaKisi;
  const kasaMasaKapat = BOL.kasaMasaKapat;
  state.cart=[]; state.odenen=0; state.bolDurum=null;
  BOL=null;
  if(kasaKisi){
    const k = SESSIONS[kasaKisi.masa].kisiler[kasaKisi.ki];
    if(k) k.odendi = true;
    // masadaki herkes ödedi mi → masa kapanır
    const s = SESSIONS[kasaKisi.masa];
    const hepOdendi = s.kisiler.every(p=> p.odendi || p.kalemler.filter(it=>it.durum!=="iptal").length===0);
    if(hepOdendi){ s.acik=false; note((k?k.ad:"Kişi")+" ödedi · masa kapandı ✓"); state.kasaMasa=null; }
    else note((k?k.ad:"Kişi")+" ödemesi alındı ✓");
    go("masalar");
    return;
  }
  if(kasaMasaKapat!=null){
    // tüm masa ödendi → masayı kapat
    const s = SESSIONS[kasaMasaKapat];
    if(s){ s.kisiler.forEach(p=>p.odendi=true); s.acik=false; }
    state.kasaMasa=null;
    note("Ödeme alındı · Masa "+kasaMasaKapat+" kapandı ✓");
    go("masalar");
    return;
  }
  let msg = "Ödeme alındı, adisyon kapandı ✓";
  if(uyari.length) msg = "Ödeme alındı · ⚠️ "+uyari.join(", ")+" kritik";
  note(msg);
  go("satis");
}

/* ============================================================
   OTURUM / MASA ÇEKİRDEĞİ — KDS + Kasa + Garson ortak kaynağı
   Her masa → oturum → kişiler → kalemler (durum: bekliyor/
   hazirlaniyor/gonderildi/iptal). Tüm ekranlar buna bakar.
   Gerçekte: branches/{sube}/sessions/{masaNo}
   ============================================================ */
let SESSIONS = {};   // masaNo → {masa, acik, kisiler:[{ad, kalemler:[...]}], zaman}
let _kalemId = 1;

/* Demo oturumları kur (gerçekte Firestore'dan canlı gelir) */
function seedSessions(){

/* Masanın tüm kalemleri (kişi bilgisiyle düz liste) */
function masaKalemleri(masaNo){
  const s = SESSIONS[masaNo]; if(!s) return [];
  const out = [];
  s.kisiler.forEach(k=> k.kalemler.forEach(it=> out.push({...it, kisi:k.ad})));
  return out;
}
/* Masa toplamı (iptal hariç) */
/* Masa durumu → renk + etiket (kasa/garson/mutfak kartlarında kullanılır)
   Öncelik: garson çağrı > mutfağa mesaj > yeni sipariş (bekliyor) > dolu > boş */
function masaDurum(masaNo){
  const s=SESSIONS[masaNo];
  if(!s || !s.acik) return {kod:"bos", ad:"Boş", renk:"var(--line-2)", bg:"transparent"};
  if(s.garsonCagri) return {kod:"garson", ad:"🔔 Garson çağırdı", renk:"#e74c3c", bg:"#fdeceb"};
  if(s.mesajVar)    return {kod:"mesaj", ad:"💬 Mutfağa mesaj", renk:"#8e44ad", bg:"#f5ecfa"};
  const kalemler=masaKalemleri(masaNo).filter(it=>it.durum!=="iptal");
  const yeni=kalemler.some(it=>it.durum==="bekliyor");
  if(yeni) return {kod:"yeni", ad:"🆕 Yeni sipariş", renk:"#2f7ed8", bg:"#e8f1fc"};
  return {kod:"dolu", ad:"Dolu", renk:"var(--ok)", bg:"var(--ok-soft)"};
}
/* Masa çağrılarını temizle (kasa/garson ilgilendi) */
function masaCagriTemizle(masaNo){
  const s=SESSIONS[masaNo]; if(!s) return;
  s.garsonCagri=false; s.mesajVar=false;
}

function masaToplam(masaNo){
  return masaKalemleri(masaNo).filter(it=>it.durum!=="iptal").reduce((s,it)=>s+it.fiyat,0);
}
/* Masada ödenmemiş kalan tutar (ödenen kişiler hariç) */
function masaKalan(masaNo){
  const s=SESSIONS[masaNo]; if(!s) return 0;
  let kalan=0;
  s.kisiler.forEach(k=>{
    if(k.odendi) return;   // ödeyen kişi düşülür
    k.kalemler.forEach(it=>{ if(it.durum!=="iptal") kalan+=it.fiyat; });
  });
  return kalan;
}
/* Kalem durumunu değiştir */
function kalemDurum(masaNo, kalemId, durum){
  const s=SESSIONS[masaNo]; if(!s) return;
  s.kisiler.forEach(k=>k.kalemler.forEach(it=>{ if(it.id===kalemId) it.durum=durum; }));
}
/* Kalemi iptal et (fiyat düşer çünkü toplam iptal hariç hesaplanır) */
function kalemIptal(masaNo, kalemId){ kalemDurum(masaNo, kalemId, "iptal"); }
/* Bir kalemden opsiyon kaldır (stok bitti) → fiyatı düşür */
function kalemOpsiyonKaldir(masaNo, kalemId, opsIdx, opsFiyat){
  const s=SESSIONS[masaNo]; if(!s) return;
  s.kisiler.forEach(k=>k.kalemler.forEach(it=>{
    if(it.id===kalemId){
      it.secimler.splice(opsIdx,1);
      it.fiyat = Math.max(0, it.fiyat - (opsFiyat||0));
    }
  }));
}
/* Masaya/kişiye ürün ekle (kasa + garson) */
function masayaUrunEkle(masaNo, kisiAd, urun){
  let s=SESSIONS[masaNo];
  if(!s){ s=SESSIONS[masaNo]={masa:masaNo, acik:true, zaman:Date.now(), kisiler:[]}; }
  let k=s.kisiler.find(x=>x.ad===kisiAd);
  if(!k){ k={ad:kisiAd, kalemler:[]}; s.kisiler.push(k); }
  k.kalemler.push({id:_kalemId++, ad:urun.ad, fiyat:urun.fiyat, secimler:urun.secimler||[], ekstraRecete:urun.ekstraRecete||[], durum:"bekliyor", paket:!!urun.paket});
}

let OFFLINE_QUEUE = [];
function saveOrder(cart, total){
  const order = {
    sessionId:"masa7-oturum1", kisi_adi:"Ayşe",
    kalemler: cart.map(c=>({ad:c.ad, adet:c.q, tutar:c.fiyat*c.q})),
    kanal:"pos", durum:"mutfak", tutar:total, zaman:new Date().toISOString()
  };
  if(window.__db){
    // Firebase bağlıysa: branches/{sube}/orders koleksiyonuna yaz
    try { window.__db.collection(`branches/${window.__sube}/orders`).add(order); }
    catch(e){ OFFLINE_QUEUE.push(order); }
  } else {
    // Offline: yerel kuyruğa al, bağlantı gelince senkron
    OFFLINE_QUEUE.push(order);
  }
}

/* ============================================================
   MASA QR KODLARI — müşteri okutunca o masa açılır
   QR içeriği: müşteri menü linki + masa kimliği parametresi
   ============================================================ */
const QR_BASE_URL = "https://minipan.app/m";   // canlıda gerçek domain
function masaQrIcerik(masaId){
  // masaId = "şube::kat|ad" → URL parametresi olarak kodla
  return QR_BASE_URL + "?t=" + encodeURIComponent(masaId);
}
/* Bir masa için QR SVG üret (string döner) */
function masaQrSvg(masaId, cellSize){
  const qr = window.qrcode(0, "M");
  qr.addData(masaQrIcerik(masaId));
  qr.make();
  return qr.createSvgTag({cellSize:cellSize||5, margin:2});
}
/* SVG'yi PNG'ye çevirip indir */
function svgIndirPng(svgString, dosyaAdi, etiket){
  const olcek=3;
  const img=new Image();
  const svg64="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(svgString)));
  img.onload=function(){
    const pad=40, altYazi=etiket?60:20;
    const canvas=document.createElement("canvas");
    canvas.width=img.width*olcek+pad*2;
    canvas.height=img.height*olcek+pad*2+altYazi;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(img, pad, pad, img.width*olcek, img.height*olcek);
    if(etiket){
      ctx.fillStyle="#1a1a1a"; ctx.textAlign="center";
      ctx.font="bold 34px system-ui,sans-serif";
      ctx.fillText(etiket, canvas.width/2, img.height*olcek+pad+44);
    }
    canvas.toBlob(function(blob){
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download=dosyaAdi+".png";
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
    });
  };
  img.src=svg64;
}
/* Tek masa QR indir */
function masaQrIndir(masaId, etiket){
  const svg=masaQrSvg(masaId, 6);
  const safe=(etiket||masaId).replace(/[^\wğüşıöçĞÜŞİÖÇ -]/gi,"_");
  svgIndirPng(svg, "MINIPAN_QR_"+safe, etiket);
  note("📥 QR indiriliyor: "+etiket);
}

/* Masa id'sinden görünen etiket: "sube::Balkon|1" → "Balkon-1" (eski sayısal → "Masa 7") */
function masaEtiket(id){
  const s = String(id);
  if(s.includes("|")){

  return "Masa "+s;
}

function kasaMasaGonder(){
  const ke=state.kasaEkle;
  if(!ke || !ke.sepet || ke.sepet.length===0){ note("Sepet boş"); return; }
  const m=ke.masa, kisi=ke.kisi;
  let s=SESSIONS[m]; if(!s){ s=SESSIONS[m]={masa:m, acik:true, zaman:Date.now(), kisiler:[]}; }
  s.acik=true;   // sipariş geldi → masa açıldı
  let k=s.kisiler.find(x=>x.ad===kisi);
  if(!k){ k={ad:kisi, kalemler:[]}; s.kisiler.push(k); }
  ke.sepet.forEach(c=>{
    k.kalemler.push({id:_kalemId++, ad:c.ad, fiyat:c.fiyat, secimler:c.secimler||[], ekstraRecete:[], durum:"bekliyor", paket:!!c.paket});
  });
  consumeRecipe(ke.sepet.map(c=>({...c, q:1, ekstraRecete:[]})));
  // TEK FİŞ — sadece bu sepet
  mutfakFisiBas({
    tip:"masa", baslik:"MASA "+m, alt:kisi, kisi:kisi, masa:m,
    kalemler:ke.sepet.map(c=>({ad:c.ad, secimler:c.secimler, kisi:kisi, paket:!!c.paket}))
  });
  // NOT: masadan paketli ürün masaya bağlı kalır (kalemde paket:true) —
  // ayrı PAKET_ORDERS oluşturulmaz, ödemesi masayla birlikte alınır.
  note("✓ Sipariş gönderildi · fiş çıktı ("+kisi+")");
  state.kasaEkle=null; state.kasaMasa=m; go("masalar");
}
function kasaKalemIptal(m,id){ kalemIptal(m,id); note("Kalem iptal · tutar düştü"); go("masalar"); }
function kasaOpsKaldir(m,id,oi){ kalemOpsiyonKaldir(m,id,oi,0); note("Opsiyon kaldırıldı (stok bitti)"); go("masalar"); }

/* Tek kişinin siparişinin ödemesini al (masada kişi seçimi) */
function kasaKisiOde(m, ki){
  const k=SESSIONS[m].kisiler[ki];
  const aktif=k.kalemler.filter(it=>it.durum!=="iptal");
  const tutar=aktif.reduce((s,it)=>s+it.fiyat,0);
  if(tutar===0){ note("Bu kişinin ödenecek siparişi yok"); return; }
  // bu kişiyi tek kişilik ödeme akışına ver (sadakat + yöntem dahil)
  BOL = {
    total:tutar, mod:"tek", kisiler:[k.ad], atama:[{}], odenenler:{},
    tekOdeme:true, kasaKisi:{masa:m, ki:ki}   // ödeme bitince bu kişiyi ödendi işaretle
  };
  state.cart = aktif.map(it=>({ad:it.ad, fiyat:it.fiyat, q:1, secimler:it.secimler, ekstraRecete:it.ekstraRecete||[]}));
  bolPayAl(0, tutar);
}

/* Masada ödenmemiş kalemler (ödeyen kişiler hariç) */
function masaOdenmemisKalemler(m){
  const s=SESSIONS[m]; if(!s) return [];
  const out=[];
  s.kisiler.forEach(k=>{
    if(k.odendi) return;
    k.kalemler.forEach(it=>{ if(it.durum!=="iptal") out.push(it); });
  });
  return out;
}
/* Masa sipariş kalemlerini state.cart'a yükleyip hesap böl/öde */
function kasaMasaBol(m){
  const kalemler=masaOdenmemisKalemler(m);
  if(kalemler.length===0){ note("Ödenecek kalem yok"); return; }
  state.cart=kalemler.map(it=>({ad:it.ad, fiyat:it.fiyat, q:1, secimler:it.secimler, ekstraRecete:it.ekstraRecete||[]}));
  state.kasaMasa=null;
  hesapBolAc(masaKalan(m));
  if(BOL) BOL.kasaMasaKapat=m;   // bölme bitince bu masayı kapat
}
function kasaMasaOde(m){
  const kalemler=masaOdenmemisKalemler(m);
  if(kalemler.length===0){ note("Bu masada ödenecek tutar yok"); return; }
  const odenecek=masaKalan(m);
  state.cart=kalemler.map(it=>({ad:it.ad, fiyat:it.fiyat, q:1, secimler:it.secimler, ekstraRecete:it.ekstraRecete||[]}));
  // tüm masa ödemesi — bitince masayı kapat
  BOL = {
    total:odenecek, mod:"tek", kisiler:["Masa "+m], atama:[{}], odenenler:{},
    tekOdeme:true, kasaMasaKapat:m
  };
  bolPayAl(0, odenecek);
}

/* Kampanya ekleme formu (modal) */
function kampanyaFormAc(){
  const isGenel = state.role==="genel";
  state.kmpForm = {
    ad:"", urun:DEMO_PRODUCTS[0].ad, tip:"oran", deger:"",
    kanal:"masa", subeKapsam:isGenel?"hepsi":"secili",
    subeler:isGenel?[]:[AKTIF_SUBE],
    gunler:[], saatBas:"", saatBit:"", tekrar:false
  };
  renderKampanyaForm();
  document.getElementById("kmpModal").classList.add("on");
}
function kampanyaFormKapat(){
  document.getElementById("kmpModal").classList.remove("on");
  state.kmpForm=null;
}
function kmpFormSet(alan, deger){
  if(!state.kmpForm) return;
  state.kmpForm[alan]=deger;
  renderKampanyaForm();
}
function kmpFormGun(g){
  const f=state.kmpForm; if(!f) return;
  if(f.gunler.includes(g)) f.gunler=f.gunler.filter(x=>x!==g);
  else f.gunler.push(g);
  renderKampanyaForm();
}
function kmpFormSube(sube){
  const f=state.kmpForm; if(!f) return;
  if(f.subeler.includes(sube)) f.subeler=f.subeler.filter(x=>x!==sube);
  else f.subeler.push(sube);
  renderKampanyaForm();
}

    </div></div>`;
  html+=`<div class="kmpf-alan"><label>${f.tip==="oran"?"İndirim oranı (%)":"Yeni satış fiyatı (₺)"}</label>
    <input class="kmpf-input" inputmode="numeric" placeholder="${f.tip==="oran"?"örn. 20":"örn. 75"}" value="${f.deger}" oninput="state.kmpForm.deger=this.value"></div>`;

  // kanal
  html+=`<div class="kmpf-alan"><label>Uygulanacak kanal</label>
    <div class="kmpf-secim-row">
      <button class="kmpf-secim${f.kanal==="masa"?' on':''}" onclick="kmpFormSet('kanal','masa')">🍽️ Masada / Gel-Al</button>
      <button class="kmpf-secim${f.kanal==="eve"?' on':''}" onclick="kmpFormSet('kanal','eve')">🛵 Eve teslim</button>
    </div></div>`;

  // şube kapsamı (sadece genel müdür seçebilir; müdür kendi şubesi sabit)
  if(isGenel){
    html+=`<div class="kmpf-alan"><label>Şube kapsamı</label>
      <div class="kmpf-secim-row">
        <button class="kmpf-secim${f.subeKapsam==="hepsi"?' on':''}" onclick="kmpFormSet('subeKapsam','hepsi')">Tüm şubeler</button>

      </div></div>`;
    if(f.subeKapsam==="secili"){

  html+=`</div>

function kampanyaKaydet(){
  const f=state.kmpForm; if(!f) return;
  const isGenel=state.role==="genel";
  if(!f.ad.trim()){ note("Kampanya adı girin"); return; }
  const deger=parseFloat(f.deger);
  if(isNaN(deger)||deger<=0){ note("Geçerli bir indirim değeri girin"); return; }
  if(f.tip==="oran" && deger>100){ note("İndirim oranı %100'den fazla olamaz"); return; }
  // şube kapsamı
  let subeler;
  if(isGenel){
    if(f.subeKapsam==="hepsi") subeler="hepsi";

/* === GEÇMİŞ SİPARİŞLER (tamamlananlar: ödendi + aktarıldı) === */
/* tr-TR tarih "GG.AA.YYYY" → karşılaştırılabilir YYYYMMDD sayısı */
function tarihSayi(trTarih){
  if(!trTarih) return 0;
  const p = trTarih.split(".");
  if(p.length!==3) return 0;
  return parseInt(p[2]+p[1].padStart(2,"0")+p[0].padStart(2,"0"))||0;
}
/* YYYY-MM-DD (input[type=date]) → YYYYMMDD sayısı */
function isoTarihSayi(iso){ return iso ? parseInt(iso.replace(/-/g,""))||0 : 0; }

function bayiGecmisFiltrele(isGenel){
  // GEÇMİŞ = stok aktarımı tamamlanmış siparişler
  let liste = BAYI_SIPARISLER.filter(s=>s.durum==="aktarildi");
  if(!isGenel) liste = liste.filter(s=>s.sube===AKTIF_SUBE);
  else if(state.gecmisSube && state.gecmisSube!=="hepsi") liste = liste.filter(s=>s.sube===state.gecmisSube);
  // tarih aralığı (uygulanmış filtreden)
  const bas = isoTarihSayi(state.gecmisBasUyg);
  const bit = isoTarihSayi(state.gecmisBitUyg);
  if(bas) liste = liste.filter(s=>tarihSayi(s.tarih)>=bas);
  if(bit) liste = liste.filter(s=>tarihSayi(s.tarih)<=bit);
  return liste;
}
function bayiGecmisHtml(isGenel){
  const liste = bayiGecmisFiltrele(isGenel);
  const genelToplam = liste.reduce((a,sp)=>a+siparisTutar(sp).net,0);
  let html = `<div class="bayi-aciklama">📊 Stok aktarımı tamamlanan siparişler. Tarih aralığı seçip <strong>Filtrele</strong>'ye basın, Excel'e aktarabilirsiniz.</div>`;
  // filtre paneli
  html += `<div class="gecmis-filtre">`;
  if(isGenel){
    html += `<div class="gf-alan"><label>Şube</label>
      <select class="gf-select" id="gfSube">
        <option value="hepsi"${(!state.gecmisSube||state.gecmisSube==="hepsi")?' selected':''}>Tüm şubeler</option>
        ${DEMO_BRANCHES.map(b=>`<option value="${b.ad}"${state.gecmisSube===b.ad?' selected':''}>${b.ad}</option>`).join("")}
      </select></div>`;
  }
  html += `<div class="gf-alan"><label>Başlangıç</label><input type="date" class="gf-date" id="gfBas" value="${state.gecmisBas||''}"></div>
    <div class="gf-alan"><label>Bitiş</label><input type="date" class="gf-date" id="gfBit" value="${state.gecmisBit||''}"></div>
    <button class="gf-filtrele" onclick="gecmisFiltreUygula(${isGenel})">🔍 Filtrele</button>
    <button class="gf-temizle" onclick="gecmisFiltreTemizle()">↺ Temizle</button>
  </div>`;
  // aktif filtre bilgisi
  if(state.gecmisBasUyg||state.gecmisBitUyg||(isGenel&&state.gecmisSube&&state.gecmisSube!=="hepsi")){
    const aralik = (state.gecmisBasUyg||state.gecmisBitUyg) ? `${state.gecmisBasUyg||'…'} → ${state.gecmisBitUyg||'…'}` : 'tüm tarihler';
    const subeF = (isGenel&&state.gecmisSube&&state.gecmisSube!=="hepsi") ? state.gecmisSube+' · ' : '';
    html += `<div class="gecmis-aktif-filtre">🔍 ${subeF}${aralik}</div>`;
  }
  // özet bar
  html += `<div class="gecmis-ozet-bar">
    <div class="go-bilgi"><span class="go-sayi">${liste.length}</span> sipariş · Aralık toplamı: <strong>${genelToplam.toFixed(0)} ₺</strong></div>
    <button class="go-xls" onclick="bayiGecmisXls(${isGenel})" ${liste.length===0?'disabled':''}>📥 Excel indir</button>
  </div>`;
  if(liste.length===0){ return html+`<div class="bayi-bos">Seçilen aralıkta tamamlanmış sipariş yok.</div>`; }
  // liste
  liste.slice().reverse().forEach(sp=>{
    const dm = SIPARIS_DURUM[sp.durum];
    const t = siparisTutar(sp);
    const aktifKalem = sp.kalemler.filter(k=>!k.silindi && k.miktar>0);
    html += `<div class="bayi-sip-kart">
      <div class="bayi-sip-ust"><span class="bayi-sip-no">#${sp.id}${isGenel?' · '+sp.sube:''}</span>
        <span class="bayi-sip-durum" style="background:${dm.bg};color:${dm.renk}">${dm.ad}</span></div>
      <div class="bayi-sip-tarih">${sp.tarih}${sp.odeme?' · '+sp.odeme:''}</div>
      <div class="bayi-sip-kalemler">`;
    aktifKalem.forEach(k=>{
      const s = STOCK[k.kod]; const bf = bayiFiyat(k.kod);
      html += `<div class="bayi-sip-kalem"><span>${s?s.ad:k.kod}</span>
        <span>${k.miktar} ${s?(s.birim||"gr"):""} × ${bf} ₺ = ${(k.miktar*bf).toFixed(0)} ₺</span></div>`;
    });
    html += `</div>
      <div class="bayi-ozet-tablo">
        <div class="bayi-ozet-satir"><span>Toplam (iskontosuz)</span><span>${t.brut.toFixed(0)} ₺</span></div>
        ${t.isk>0?`<div class="bayi-ozet-satir bayi-ozet-ind"><span>İskonto (%${t.isk})</span><span>− ${t.indirim.toFixed(0)} ₺</span></div>`:''}
        <div class="bayi-ozet-satir bayi-ozet-net"><span>Net tutar</span><span>${t.net.toFixed(0)} ₺</span></div>
      </div></div>`;

}

/* Excel (HTML-tablo .xls) — her kalem bir satır, Türkçe uyumlu */
function bayiGecmisXls(isGenel){
  const liste = bayiGecmisFiltrele(isGenel);
  if(liste.length===0){ note("İndirilecek kayıt yok"); return; }
  let satirlar = "";
  let genelNet = 0;
  liste.forEach(sp=>{
    const isk = bayiIskonto(sp.sube);
    sp.kalemler.filter(k=>!k.silindi && k.miktar>0).forEach(k=>{
      const s = STOCK[k.kod]; const bf = bayiFiyat(k.kod);
      const brut = k.miktar*bf;
      const net = brut*(1-isk/100);
      genelNet += net;
      satirlar += `<tr>
        <td>${sp.tarih}</td><td>#${sp.id}</td><td>${sp.sube}</td>
        <td>${s?s.ad:k.kod}</td><td>${k.miktar}</td><td>${s?(s.birim||"gr"):""}</td>
        <td>${bf}</td><td>${brut.toFixed(0)}</td><td>%${isk}</td><td>${net.toFixed(0)}</td>
        <td>${SIPARIS_DURUM[sp.durum].ad}</td><td>${sp.odeme||''}</td></tr>`;
    });
  });
  const baslik = `MİNİPAN Bayi Kanalı — Geçmiş Siparişler`;
  const aralik = (state.gecmisBasUyg||state.gecmisBitUyg) ? `${state.gecmisBasUyg||'…'} → ${state.gecmisBitUyg||'…'}` : 'Tüm tarihler';
  const subeBilgi = isGenel ? (state.gecmisSube&&state.gecmisSube!=="hepsi"?state.gecmisSube:'Tüm şubeler') : AKTIF_SUBE;
  const tablo = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">
    <head><meta charset="utf-8"></head><body>
    <table border="1">
      <tr><td colspan="12" style="font-weight:bold;font-size:14px">${baslik}</td></tr>
      <tr><td colspan="12">${subeBilgi} · ${aralik}</td></tr>
      <tr></tr>
      <tr style="background:#f0a728;font-weight:bold">
        <td>Tarih</td><td>Sipariş No</td><td>Şube</td><td>Ürün</td><td>Miktar</td><td>Birim</td>
        <td>Birim Fiyat</td><td>Tutar (iskontosuz)</td><td>İskonto</td><td>Net Tutar</td><td>Durum</td><td>Ödeme</td></tr>
      ${satirlar}
      <tr style="font-weight:bold;background:#e8f6ec">
        <td colspan="9">GENEL TOPLAM (Net)</td><td>${genelNet.toFixed(0)} ₺</td><td colspan="2"></td></tr>
    </table></body></html>`;
  const blob = new Blob(["\ufeff"+tablo], {type:"application/vnd.ms-excel;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const dosyaTarih = new Date().toLocaleDateString("tr-TR").replace(/\./g,"-");
  a.download = `MINIPAN_bayi_gecmis_${dosyaTarih}.xls`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  note("📥 Excel indiriliyor · "+liste.length+" sipariş");
}

function bayiStokKartHtml(){
  // toplam stok değeri (miktar × birim fiyat)
  let toplamDeger = 0;

  let html = `<div class="bayi-bar"><div class="bayi-bar-bilgi">${Object.keys(STOCK).length} stok kartı · toplam değer: <strong>${toplamDeger.toFixed(0)} ₺</strong></div>
    <button class="bayi-ekle-btn" onclick="stokKartEkle()">+ Yeni stok kartı</button></div>`;
  html += `<div class="bayi-tablo">`;
  Object.entries(STOCK).forEach(([kod,s])=>{
    const bf = bayiFiyat(kod);
    const satirDeger = s.mevcut * bf;
    html += `<div class="bayi-satir">
      <div class="bayi-s-ad"><strong>${s.ad}</strong> <span class="bayi-s-kod">${kod}</span>
        <div class="bayi-s-not">${s.mevcut} ${s.birim||"gr"} × ${bf>0?bf+' ₺':'fiyat yok'} <small>· kritik ${s.kritik}</small></div></div>
      <div class="bayi-s-deger">${bf>0?satirDeger.toFixed(0)+' ₺':'—'}</div>
      <div class="bayi-s-aksiyon">
        <button class="bayi-mini" onclick="stokKartDuzenle('${kod}')">✏️</button>
        <button class="bayi-mini sil" onclick="stokKartSil('${kod}')">🗑️</button>

function stokKartEkle(){
  const ad = prompt("Stok kartı adı (örn. Antep fıstığı):");
  if(!ad||!ad.trim()) return;
  const birim = prompt("Birim (gr / adet):", "gr");
  if(birim==null) return;
  const kritikV = prompt("Kritik seviye:", "500");
  if(kritikV==null) return;
  // kod üret
  let kod = ad.trim().toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,12) || ("stok"+Date.now());
  if(STOCK[kod]) kod = kod+Date.now();
  STOCK[kod] = {ad:ad.trim(), mevcut:0, kritik:parseInt(kritikV)||0, birim:(birim.trim()||"gr")};
  note("Stok kartı eklendi: "+ad.trim());
  b2bKaydet();
  go("bayi", true);
}
function stokKartDuzenle(kod){
  const s = STOCK[kod]; if(!s) return;
  const ad = prompt("Stok adı:", s.ad);
  if(ad==null) return;
  s.ad = ad.trim()||s.ad;
  const birim = prompt("Birim (gr/adet):", s.birim||"gr");
  if(birim!=null) s.birim = birim.trim()||"gr";
  const kritik = prompt("Kritik seviye:", String(s.kritik));
  if(kritik!=null) s.kritik = parseInt(kritik)||0;
  note(kod+" güncellendi");
  b2bKaydet();
  go("bayi", true);
}
function stokKartSil(kod){
  if(!confirm(STOCK[kod].ad+" stok kartı silinsin mi? Reçetelerde kullanılıyorsa dikkat.")) return;
  delete STOCK[kod];
  note("Stok kartı silindi");
  b2bKaydet();
  go("bayi", true);
}

function sayimGir(hedef, kod){

  note(s.ad+" sayımı işlendi: "+m+" "+(s.birim||"gr"));

function irsaliyeBasla(){
  const bugun = new Date().toLocaleDateString("tr-TR");
  state.irsaliyeTaslak = {tarih:bugun, tedarikci:"", aciklama:"", kalemler:[]};
  go("bayi", true);
}
function irsaliyeAlan(alan){
  const t = state.irsaliyeTaslak; if(!t) return;
  const v = prompt(alan==="tedarikci"?"Tedarikçi adı:":"Açıklama:", t[alan]||"");
  if(v==null) return;
  t[alan] = v.trim();
  go("bayi", true);
}
function irsaliyeKalemEkle(){
  const t = state.irsaliyeTaslak; if(!t) return;
  const kodlar = Object.keys(STOCK);
  const liste = kodlar.map((k,i)=>(i+1)+". "+STOCK[k].ad).join("\n");
  const sec = prompt("Ürün seç (numara gir):\n\n"+liste);
  if(sec==null) return;
  const idx = parseInt(sec)-1;
  if(isNaN(idx)||idx<0||idx>=kodlar.length){ note("Geçersiz seçim"); return; }
  const kod = kodlar[idx];
  const miktarV = prompt(STOCK[kod].ad+" miktarı ("+(STOCK[kod].birim||"gr")+"):");
  if(miktarV==null) return;
  const m = parseInt(miktarV);
  if(isNaN(m)||m<=0){ note("Geçersiz miktar"); return; }
  t.kalemler.push({kod:kod, miktar:m});
  go("bayi", true);
}
function irsaliyeKalemSil(i){
  state.irsaliyeTaslak.kalemler.splice(i,1);
  go("bayi", true);
}
function irsaliyeIptal(){ state.irsaliyeTaslak=null; go("bayi", true); }
function irsaliyeKaydet(){
  const t = state.irsaliyeTaslak;
  if(!t || t.kalemler.length===0){ note("En az bir ürün ekleyin"); return; }
  // stoğa işle (genel müdür merkez stoğu = STOCK.mevcut)
  t.kalemler.forEach(k=>{ if(STOCK[k.kod]) STOCK[k.kod].mevcut += k.miktar; });
  IRSALIYELER.push({id:_irsaliyeId++, tarih:t.tarih, tedarikci:t.tedarikci, aciklama:t.aciklama, kalemler:t.kalemler});
  state.irsaliyeTaslak = null;
  note("✓ İrsaliye kaydedildi · "+t.kalemler.length+" ürün stoğa işlendi");
  b2bKaydet();
  go("bayi", true);
}

/* === BAYİ FİYATLARI (genel müdür belirler) === */
function bayiFiyatHtml(){
  let html = `<div class="bayi-aciklama">🏷️ Bayilere satış fiyatları (₺/birim). Bayiler bu fiyatlardan sipariş verir.</div>`;
  // ŞUBE İSKONTO bölümü
  html += `<div class="bayi-iskonto-blok">
    <div class="bayi-iskonto-baslik">💸 Şube İskontoları</div>
    <div class="bayi-iskonto-aciklama">Bayilere özel indirim oranı. Talep toplamına uygulanır.</div>
    <div class="bayi-iskonto-grid">`;
  DEMO_BRANCHES.forEach(b=>{
    const isk = bayiIskonto(b.ad);
    html += `<button class="bayi-iskonto-kart${isk>0?' dolu':''}" onclick="bayiIskontoGir('${b.ad.replace(/'/g,"\\'")}')">
      <span class="bik-sube">${b.ad}</span>
      <span class="bik-oran">${isk>0?'%'+isk:'iskonto yok'} ✏️</span>
    </button>`;
  });
  html += `</div></div>`;
  // ürün fiyatları
  html += `<div class="bayi-gecmis-baslik">Ürün satış fiyatları</div><div class="bayi-tablo">`;
  Object.entries(STOCK).forEach(([kod,s])=>{
    const f = bayiFiyat(kod);
    html += `<div class="bayi-satir">
      <div class="bayi-s-ad"><strong>${s.ad}</strong> <span class="bayi-s-kod">₺/${s.birim||"gr"}</span></div>
      <div class="bayi-s-deger">${f>0?f+' ₺':'<span style="color:var(--ink-3)">fiyat girilmedi</span>'}</div>
      <div class="bayi-s-aksiyon"><button class="bayi-mini" onclick="bayiFiyatGir('${kod}')">✏️ Fiyat</button></div>
    </div>`;
  });
  html += `</div>`;
  return html;
}
function bayiIskontoGir(sube){
  const v = prompt(sube+" için iskonto oranı (% 0-100, boş=kaldır):", String(bayiIskonto(sube)||""));
  if(v==null) return;
  if(v.trim()===""){ BAYI_ISKONTO[sube]=null; note(sube+" iskontosu kaldırıldı"); b2bKaydet(); go("bayi", true); return; }
  const o = parseFloat(v);
  if(isNaN(o)||o<0||o>100){ note("Geçersiz oran (0-100)"); return; }
  BAYI_ISKONTO[sube] = o||null;
  note(sube+" iskontosu: %"+o);
  b2bKaydet();
  go("bayi", true);
}
function bayiFiyatGir(kod){
  const v = prompt(STOCK[kod].ad+" bayi satış fiyatı (₺/"+(STOCK[kod].birim||"gr")+"):", String(bayiFiyat(kod)||""));
  if(v==null) return;
  const f = parseFloat(v);
  if(isNaN(f)||f<0){ note("Geçersiz fiyat"); return; }
  BAYI_FIYAT[kod] = f||null;
  note(STOCK[kod].ad+" bayi fiyatı: "+f+" ₺");
  b2bKaydet();
  go("bayi", true);
}

/* === BAYİ STOKLARI (genel müdür görüntüler) === */
