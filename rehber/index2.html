<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan II. Bayezid Külliyesi - Akademik Rehber</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --sidebar-width: 320px;
            --ana-renk: #2C2420;
            --altin: #B39359;
            --mermer: #FDFCF9;
            --kenarlik: rgba(179, 147, 89, 0.2);
        }

        body {
            margin: 0;
            background: var(--mermer);
            font-family: 'Montserrat', sans-serif;
            color: var(--ana-renk);
            display: flex;
            min-height: 100vh;
        }

        /* --- SVG ARKA PLAN DOKUSU --- */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 30L15 0H45L30 30ZM0 30L30 15V45L0 30ZM60 30L30 45V15L60 30ZM30 60L45 30H15L30 60Z' fill='%23B39359' fill-opacity='1' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        /* --- SOL NAVİGASYON (FİHRİST) --- */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--kenarlik);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 30px;
            border-bottom: 1px solid var(--kenarlik);
            background: var(--mermer);
        }

        .sidebar-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin: 0;
            letter-spacing: 1px;
        }

        .nav-scroll {
            overflow-y: auto;
            flex: 1;
            padding: 10px 0;
        }

        .nav-item {
            padding: 15px 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(0,0,0,0.6);
        }

        .nav-item:hover, .nav-item.active {
            background: var(--altin);
            color: white;
        }

        .nav-item .num {
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            opacity: 0.5;
        }

        /* --- ANA İÇERİK --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 60px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* --- AKADEMİK KART (SVG FRAME) --- */
        .academic-frame {
            background: white;
            width: 100%;
            max-width: 800px;
            padding: 60px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            border: 1px solid var(--kenarlik);
        }

        /* Köşe SVG Süslemeleri */
        .frame-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--altin);
        }
        .top-left { top: 15px; left: 15px; border-right: 0; border-bottom: 0; }
        .top-right { top: 15px; right: 15px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 15px; left: 15px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 15px; right: 15px; border-left: 0; border-top: 0; }

        .content-body h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin: 0 0 10px 0;
            color: var(--ana-renk);
        }

        .content-body .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--altin);
            font-size: 18px;
            margin-bottom: 30px;
            display: block;
        }

        .content-body p {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            white-space: pre-line; /* Satır boşluklarını korur */
        }

        .media-placeholder {
            width: 100%;
            height: 300px;
            background: var(--mermer);
            margin-top: 30px;
            border: 1px dashed var(--altin);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- MOBİL AYARLAR --- */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            background: var(--ana-renk);
            color: white;
            padding: 15px;
            border-radius: 50%;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 40px 20px; }
            .academic-frame { padding: 30px; }
            .mobile-menu-btn { display: block; }
            .content-body h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <button class="mobile-menu-btn" onclick="toggleMenu()">
        <i data-lucide="menu"></i>
    </button>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>FİHRİST</h2>
        </div>
        <div class="nav-scroll" id="nav-list">
            </div>
    </nav>

    <main class="main-content">
        <article class="academic-frame">
            <div class="frame-corner top-left"></div>
            <div class="frame-corner top-right"></div>
            <div class="frame-corner bottom-left"></div>
            <div class="frame-corner bottom-right"></div>

            <div class="content-body" id="display-area">
                <h1>Yolculuğa Hazır Mısınız?</h1>
                <span class="subtitle">Sultan II. Bayezid Külliyesi Dijital Arşivi</span>
                <p>Sol menüden bir durak seçerek akademik keşfinize başlayabilirsiniz.</p>
            </div>
        </article>
    </main>

    <script>
        // Senin tourData dizin (Kısaltılmış örnek, tümünü buraya ekleyebilirsin)
        const tourData = [
            { t: "🏛️ GİRİŞ VE KARŞILAMA", s: "YOL AYRIMI", m: "🎟️ Şu an biletlerimizi aldık ve o ana kapıdan içeri süzülüyoruz.\n\n✨ Burası sadece binalar topluluğu değil; insanın ruhu, bedeni ve yaşamına hitap eden dev bir organizasyondur." },
            { t: "🏛️ DARÜŞŞİFA GİRİŞİ", s: "VAKUR GİRİŞ", m: "🚪 Giriş kapımıza geldiğimizde sağ tarafta duvarda asılı panolar bizi karşılayacak.\n\n📌 Bu panolarda Külliyenin genel görünümü yer alır." },
            { t: "🕌 CAMİ AVLUSU", s: "SÜKÛNETİN BULUŞMASI", m: "⛲ Avlunun kalbinde yer alan zarif şadırvan… Suyun sesi, taşın sessizliğine karışır." }
            // ... Tüm 29 durağı buraya ekle
        ];

        // Navigasyonu Oluşturma
        const navList = document.getElementById('nav-list');
        const displayArea = document.getElementById('display-area');

        tourData.forEach((step, index) => {
            const div = document.createElement('div');
            div.className = 'nav-item';
            div.innerHTML = `<span class="num">${index + 1}.</span> <span>${step.t}</span>`;
            div.onclick = () => {
                showStep(index);
                if(window.innerWidth < 992) toggleMenu();
            };
            navList.appendChild(div);
        });

        function showStep(index) {
            const step = tourData[index];
            
            // Aktif sınıfını güncelle
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            // İçeriği güncelle
            displayArea.innerHTML = `
                <h1>${step.t}</h1>
                <span class="subtitle">${step.s}</span>
                <p>${step.m}</p>
                <div class="media-placeholder">
                    <i data-lucide="image" style="color:var(--altin)"></i>
                    <span style="margin-left:10px; color:var(--altin)">Görsel Arşivi: ${index + 1}.jpg</span>
                </div>
            `;
            lucide.createIcons();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        lucide.createIcons();
    </script>
</body>
</html>
