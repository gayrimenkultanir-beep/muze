<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .announcement-block {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        /* Kaydırmalı Görsel Alanı */
        .slider-container {
            width: 100%;
            height: 400px;
            position: relative;
            overflow: hidden;
            background-color: #eee;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }

        .slider-wrapper img {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: zoom-in;
        }

        /* Kaydırma Noktaları */
        .slider-dots {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .dot.active { background: white; box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        .content-group { padding: 25px; }
        .date-label {
            background: #e1e7ff;
            color: #4a6cf7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .announcement-title { font-size: 1.5rem; font-weight: 600; margin: 15px 0 10px; }
        .details-text { color: #666; line-height: 1.7; white-space: pre-line; }

        /* Modal */
        #imgModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }
        #imgModal img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; margin-bottom:30px;">
        <h1>Duyurular</h1>
    </header>
    <div id="feed"></div>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    function getDriveThumb(url) {
        if (!url || url === "") return null;
        if (url.includes('drive.google.com')) {
            let id = "";
            try {
                if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
                else id = url.split('/d/')[1].split('/')[0];
                return `https://thumbnail.googleusercontent.com/doc/${id}`;
            } catch (e) { return url; }
        }
        return url;
    }

    // Slider'ı kaydıran fonksiyon
    function slideTo(blockId, index) {
        const wrapper = document.querySelector(`#block-${blockId} .slider-wrapper`);
        const dots = document.querySelectorAll(`#block-${blockId} .dot`);
        wrapper.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach(d => d.classList.remove('active'));
        dots[index].classList.add('active');
    }

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const feed = document.getElementById('feed');
            results.data.forEach((row, index) => {
                // Görselleri diziye topla
                const images = [
                    getDriveThumb(row['görsel1']),
                    getDriveThumb(row['görsel2']),
                    getDriveThumb(row['görsel3'])
                ].filter(url => url !== null);

                let sliderHTML = '';
                let dotsHTML = '';

                if (images.length > 0) {
                    sliderHTML = `<div class="slider-wrapper">`;
                    images.forEach(img => {
                        sliderHTML += `<img src="${img}" onclick="document.getElementById('imgModal').style.display='flex'; document.getElementById('modalImg').src='${img}'">`;
                    });
                    sliderHTML += `</div>`;

                    if (images.length > 1) {
                        dotsHTML = `<div class="slider-dots">`;
                        images.forEach((_, i) => {
                            dotsHTML += `<div class="dot ${i===0?'active':''}" onclick="slideTo(${index}, ${i})"></div>`;
                        });
                        dotsHTML += `</div>`;
                    }
                }

                const block = `
                    <div class="announcement-block" id="block-${index}">
                        <div class="slider-container">
                            ${sliderHTML}
                            ${dotsHTML}
                        </div>
                        <div class="content-group">
                            <span class="date-label">${row['tarih'] || ''}</span>
                            <h2 class="announcement-title">${row['duyuru metni'] || ''}</h2>
                            <p class="details-text">${row['detaylar'] || ''}</p>
                        </div>
                    </div>
                `;
                feed.innerHTML += block;
            });
        }
    });
</script>

</body>
</html>
