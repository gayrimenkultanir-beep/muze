<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Compass</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:black;}
#camera{position:fixed;width:100%;height:100%;object-fit:cover;filter:brightness(.5);}

#ui{position:fixed;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

.outer{
width:340px;height:340px;border-radius:50%;
border:2px solid rgba(255,255,255,.2);
position:absolute;
display:flex;align-items:center;justify-content:center;
}

.target{
position:absolute;
width:2px;height:160px;
background:lime;
top:10px;
}

.inner{
width:250px;height:250px;border-radius:50%;
border:2px solid rgba(0,255,200,.3);
position:absolute;
transform-origin:center;
}

.arrow{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:0;height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-bottom:40px solid red;
}

#status{
position:absolute;
bottom:80px;
color:white;
font-size:22px;
}

</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<div id="ui">

<div class="outer">
<div class="target"></div>
</div>

<div class="inner" id="ring">
<div class="arrow" id="arrow"></div>
</div>

<div id="status">Bekleniyor...</div>

</div>

<script>

// =====================
// CAMERA
// =====================
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>document.getElementById("camera").srcObject=s);

// =====================
// TARGET
// =====================
const targetLat=37.8596227;
const targetLng=27.2728099;

// =====================
// GPS → BEARING
// =====================
function toRad(d){return d*Math.PI/180;}
function toDeg(r){return r*180/Math.PI;}

function bearing(lat1,lng1,lat2,lng2){
let dLng=toRad(lng2-lng1);
let y=Math.sin(dLng)*Math.cos(toRad(lat2));
let x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-
Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLng);
return (toDeg(Math.atan2(y,x))+360)%360;
}

// =====================
// SHORT ANGLE FIX (CRITICAL)
// =====================
function shortest(a,b){
let diff=((b-a+540)%360)-180;
return a+diff;
}

// =====================
// STATE
// =====================
let deviceHeading=0;
let targetBearing=0;

// =====================
// GPS
// =====================
navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

targetBearing=bearing(lat,lng,targetLat,targetLng);

},()=>{},{enableHighAccuracy:true});

// =====================
// SENSOR
// =====================
window.addEventListener("deviceorientation",e=>{

let h=e.alpha;
if(e.webkitCompassHeading) h=e.webkitCompassHeading;
if(h==null) return;

// 🔥 FIX 1: smooth + wrap safe
deviceHeading=shortest(deviceHeading,h);

// 🔥 FIX 2: RELATIVE ALIGNMENT
let relative = shortest(deviceHeading,targetBearing);

// rotate inner system
document.getElementById("ring").style.transform=
`rotate(${-relative}deg)`;

// 🔥 FIX 3: EXACT ALIGNMENT CHECK (VISUAL)
let status=document.getElementById("status");

if(Math.abs(relative) < 10){
status.innerText="👉 İLERLEYİNİZ";
status.style.color="lime";
}else if(Math.abs(relative) < 25){
status.innerText="Yaklaştınız";
status.style.color="orange";
}else{
status.innerText="Hizalanıyor...";
status.style.color="white";
}

});

</script>

</body>
</html>
