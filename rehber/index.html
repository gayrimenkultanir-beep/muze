<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müze Deneyimi</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Playfair Display',serif;background:#f4efe7;color:#3a2f2a}
.header{position:fixed;top:0;right:0;padding:15px;z-index:10}
.audio-btn{font-size:22px;cursor:pointer;background:#fff;border-radius:50%;padding:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.container{max-width:900px;margin:100px auto 40px;padding:20px}

/* Timeline */
.timeline{position:fixed;left:20px;top:100px;font-size:12px}
.timeline div{margin:10px 0;opacity:0.5}
.timeline .active{font-weight:bold;opacity:1;color:#a67c52}

/* Slider */
.image-slider{position:relative}
.image-slider img{width:100%;border-radius:16px;transition:0.5s}
.nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:#000;color:#fff;padding:10px;border-radius:50%;cursor:pointer;opacity:0.7}
.prev{left:10px}
.next{right:10px}

/* Card */
.card{background:#fff;border-radius:20px;padding:25px;margin-top:20px;box-shadow:0 8px 20px rgba(0,0,0,0.08)}
h2{font-family:'Cinzel',serif}

/* Progress */
.progress{height:12px;background:#ddd;border-radius:20px;margin:20px 0}
.progress-bar{height:12px;background:#a67c52;width:0;border-radius:20px;transition:0.5s}

/* Buttons */
.buttons{display:flex;justify-content:space-between;margin-top:20px}
.btn{padding:12px 25px;border-radius:12px;background:#a67c52;color:#fff;cursor:pointer;transition:0.3s}
.btn:hover{background:#8d6843}

/* Form */
.form{display:none;margin-top:40px}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc}
.messages p{background:#fff;padding:10px;border-radius:10px;margin:5px 0}
.pagination{margin-top:10px}

</style>
</head>

<body>

<div class="header">
  <div class="audio-btn" onclick="toggleAudio()">🔊</div>
</div>

<div class="timeline" id="timeline"></div>

<div class="container">

<div class="progress"><div class="progress-bar" id="progress"></div></div>

<div class="image-slider">
  <img id="sliderImg">
  <div class="nav-btn prev" onclick="prevImage()">◀</div>
  <div class="nav-btn next" onclick="nextImage()">▶</div>
</div>

<div class="card">
  <h2 id="title"></h2>
  <p id="text"></p>
</div>

<div class="buttons">
  <div class="btn" onclick="prevStop()">← Geri</div>
  <div class="btn" onclick="nextStop()">İleri →</div>
</div>

<div class="form" id="form">
  <h2>Ziyaretçi Formu</h2>
  <input id="name" placeholder="Ad Soyad (isteğe bağlı)">
  <input id="city" placeholder="Şehir (isteğe bağlı)">
  <textarea id="note" placeholder="Ziyaretçi notu"></textarea>
  <div class="btn" onclick="submitForm()">Gönder</div>

  <div class="messages" id="messages"></div>
  <div class="pagination" id="pagination"></div>
</div>

</div>
