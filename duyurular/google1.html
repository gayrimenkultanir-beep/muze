<div class="container">
    <div class="full-card">
        <img src="../assets/cornerleftup.png" class="corner-frame t-l" alt="Frame">
        <img src="../assets/cornerrightup.png" class="corner-frame t-r" alt="Frame">
        <img src="../assets/cornerleft.png" class="corner-frame b-l" alt="Frame">
        <img src="../assets/cornerright.png" class="corner-frame b-r" alt="Frame">

        <h2 class="main-title">GÜNCEL DUYURULAR</h2>

        <div class="content-area" style="padding: 20px;">
            <div id="feed-container">
                <p style="text-align:center; font-family: 'Cinzel'; color: var(--v-red);">Duyurular ve görseller yükleniyor...</p>
            </div>
        </div>
    </div>
</div>

<style>
    .announcement-block {
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid var(--gold);
        border-radius: 8px;
        margin-bottom: 30px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .slider-container {
        width: 100%;
        height: 400px;
        position: relative;
        overflow: hidden;
        background-color: var(--dark);
        border-bottom: 1px solid var(--gold);
    }

    .slider-wrapper {
        display: flex;
        width: 100%;
        height: 100%;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slider-wrapper img {
        min-width: 100%;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(15, 26, 36, 0.7);
        color: var(--gold);
        border: 1px solid var(--gold);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        z-index: 15;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .nav-btn:hover { background: var(--gold); color: var(--dark); }
    .prev-btn { left: 10px; }
    .next-btn { right: 10px; }

    .slider-dots {
        position: absolute;
        bottom: 15px;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 8px;
        z-index: 10;
    }

    .dot {
        width: 8px;
        height: 8px;
        background: rgba(212, 175, 55, 0.4);
        border-radius: 50%;
        cursor: pointer;
        border: 1px solid var(--gold);
    }

    .dot.active { background: var(--gold); transform: scale(1.3); }

    .announcement-text { padding: 20px; }
    .ann-date { font-family: 'Cinzel'; color: var(--v-red); font-size: 0.8rem; font-weight: bold; }
    .ann-title { font-family: 'Cinzel'; color: var(--dark); font-size: 1.3rem; margin: 10px 0; font-weight: 700; }
    .ann-details { font-family: 'Playfair Display'; color: #444; font-size: 1rem; line-height: 1.6; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script>
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';
    const sliderStates = {};

    function getThumbId(url) {
        if (!url || !url.includes('drive.google.com')) return null;
        let id = "";
        try {
            if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
            else id = url.split('/d/')[1].split('/')[0];
            return `https://lh3.googleusercontent.com/u/0/d/$${id}=w1000-h800`;
        } catch (e) { return null; }
    }

    window.moveSlider = function(blockId, index, total) {
        if (index >= total) index = 0;
        if (index < 0) index = total - 1;
        sliderStates[blockId] = index;
        const block = document.getElementById(`block-${blockId}`);
        const wrapper = block.querySelector('.slider-wrapper');
        const dots = block.querySelectorAll('.dot');
        wrapper.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
    }

    Papa.parse(sheetCsvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            results.data.forEach((row, bId) => {
                let imgUrls = [];
                for (let i = 1; i <= 10; i++) {
                    let val = getThumbId(row['görsel' + i] || row['GÖRSEL' + i]);
                    if (val) imgUrls.push(val);
                }
                sliderStates[bId] = 0;
                let sliderHtml = '';
                if (imgUrls.length > 0) {
                    let images = '';
                    let dots = '';
                    let navButtons = '';
                    imgUrls.forEach((src, i) => {
                        images += `<img src="${src}" loading="lazy">`;
                        if (imgUrls.length > 1) dots += `<div class="dot ${i===0?'active':''}" onclick="moveSlider(${bId}, ${i}, ${imgUrls.length})"></div>`;
                    });
                    if (imgUrls.length > 1) {
                        navButtons = `
                            <button class="nav-btn prev-btn" onclick="moveSlider(${bId}, sliderStates[${bId}] - 1, ${imgUrls.length})">❮</button>
                            <button class="nav-btn next-btn" onclick="moveSlider(${bId}, sliderStates[${bId}] + 1, ${imgUrls.length})">❯</button>
                        `;
                    }
                    sliderHtml = `<div class="slider-container">${navButtons}<div class="slider-wrapper">${images}</div><div class="slider-dots">${dots}</div></div>`;
                }

                container.innerHTML += `
                    <div class="announcement-block" id="block-${bId}">
                        ${sliderHtml}
                        <div class="announcement-text">
                            <div class="ann-date">${row['tarih'] || ''}</div>
                            <div class="ann-title">${row['duyuru metni'] || ''}</div>
                            <p class="ann-details">${row['detaylar'] || ''}</p>
                        </div>
                    </div>`;
            });
        }
    });
</script>
