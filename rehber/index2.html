            margin-left: 10px;

            width: 20px; height: 20px;
            background: var(--gold);
            border-radius: 50%;

let currentStep = 0;
let audio = new Audio();

function renderStep(index) {
    const data = tourData[index];
    
    // Metinleri ve başlıkları güncelle
    document.getElementById('main-title').innerText = data.t;
    document.getElementById('step-subtitle').innerText = data.s;
    
    // Markdown (**kalın**) ve (\n satır başı) işlemesi
    let formattedDesc = data.m
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    
    document.getElementById('step-desc').innerHTML = formattedDesc;
    document.getElementById('step-question').innerText = data.q;
    document.getElementById('nextBtn').innerText = data.btnNext;
    document.getElementById('step-img').src = data.g[0];
    document.getElementById('progress').innerText = `${index + 1} / ${tourData.length}`;

    // Sesi hazırla (çalmıyoruz, kullanıcı butona basınca çalacak)
    audio.pause();
    audio.src = data.a;
    document.getElementById('audioBtn').classList.remove('playing');

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextStep() {
    if (currentStep < tourData.length - 1) {
        currentStep++;
        renderStep(currentStep);
    } else {
        alert("Şifa yolculuğumuz burada sona erdi. Teşekkürler.");
        currentStep = 0;
        renderStep(0);
    }
}

function toggleAudio() {
    const btn = document.getElementById('audioBtn');
    if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
    } else {
        audio.pause();
        btn.classList.remove('playing');
    }
}

// Başlangıç
renderStep(0);
</script>
