<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu - Slider</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }
        .container { max-width: 800px; margin: auto; }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #1a73e8; font-weight: 600; }

        /* Kart Yapısı */
        .announcement-block {
            background: white;
            border-radius: 16px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #e1e4e8;
        }

        /* Slider Alanı */
        .slider-container {
            width: 100%;
            height: 450px;
            position: relative;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slider-wrapper img {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Kaydırma Noktaları */
        .slider-dots {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 5;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .dot.active {
            background: #1a73e8;
            transform: scale(1.2);
        }

        /* İçerik */
        .text-container { padding: 30px; }
        .date-text { color: #1a73e8; font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        .title-text { font-size: 1.7rem; font-weight: 600; margin-bottom: 15px; color: #1a1a1a; }
        .details-text { color: #555; line-height: 1.8; white-space: pre-line; }

        @media (max-width: 600px) { .slider-container { height: 300px; } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← Geri Dön</a>
    <div id="feed-container">
        <p style="text-align:center;">Duyurular hazırlanıyor...</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    // Çalışan Thumbnail Mantığı
    function getThumb(url) {
        if (!url || !url.includes('drive.google.com')) return null;
        let id = "";
        try {
            if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
            else id = url.split('/d/')[1].split('/')[0];
            return `https://lh3.googleusercontent.com/u/0/d/$${id}`;
        } catch (e) { return null; }
    }

    // Kaydırma İşlemi
    function moveSlider(blockId, index) {
        const block = document.getElementById(`block-${blockId}`);
        const wrapper = block.querySelector('.slider-wrapper');
        const dots = block.querySelectorAll('.dot');
        
        wrapper.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach(d => d.classList.remove('active'));
        dots[index].classList.add('active');
    }

    Papa.parse(sheetCsvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            results.data.forEach((row, bId) => {
                const images = [
                    getThumb(row['görsel1']),
                    getThumb(row['görsel2']),
                    getThumb(row['görsel3'])
                ].filter(img => img !== null);

                let sliderHtml = '';
                if (images.length > 0) {
                    let imgTags = '';
                    let dotsTags = '';
                    
                    images.forEach((src, i) => {
                        imgTags += `<img src="${src}" onerror="this.style.display='none'">`;
                        if (images.length > 1) {
                            dotsTags += `<div class="dot ${i===0?'active':''}" onclick="moveSlider(${bId}, ${i})"></div>`;
                        }
                    });

                    sliderHtml = `
                        <div class="slider-container">
                            <div class="slider-wrapper">${imgTags}</div>
                            <div class="slider-dots">${dotsTags}</div>
                        </div>`;
                }

                container.innerHTML += `
                    <div class="announcement-block" id="block-${bId}">
                        ${sliderHtml}
                        <div class="text-container">
                            <span class="date-text">${row['tarih'] || ''}</span>
                            <div class="title-text">${row['duyuru metni'] || ''}</div>
                            <div class="details-text">${row['detaylar'] || ''}</div>
                        </div>
                    </div>`;
            });
        }
    });
</script>

</body>
</html>
