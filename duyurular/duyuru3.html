                <li class="loading">Veriler güncelleniyor...</li>

            <div class="more-link-box">
                <a href="haberler/haberler.html">TÜM HABERLER İÇİN TIKLAYINIZ →</a>

            </ul> 
            <div class="more-link-box">

</div>

<style>
    /* Dinamik Liste Tasarımı */
    .dynamic-feed {
        list-style: none;
        padding: 0;
        margin: 0;
        min-height: 120px;
    }
    .dynamic-feed li {
        padding: 8px 0;
        border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        display: grid;
        grid-template-columns: 85px 1fr; /* Tarih alanı sabit, metin esnek */
        align-items: baseline;
        gap: 12px;
    }
    .dynamic-feed li:last-child { border-bottom: none; }
    
    /* Font ve Renk Ayarları */
    .ann-date-small {
        font-family: 'Cinzel', serif;
        font-size: 10.5px;
        color: var(--v-red); /* CSS değişkeninizden alır */
        font-weight: 400;
        white-space: nowrap;
    }
    .ann-text-small {
        font-family: 'Playfair Display', serif;
        font-size: 12.5px;
        color: #555;
        font-weight: 400;
        line-height: 1.4;
    }
    
    /* Yükleniyor Yazısı */
    .loading {
        font-size: 11px;
        opacity: 0.6;
        display: block !important;
        border: none !important;
        text-align: center;
    }

    /* Alt Link Alanı */
    .more-link-box {
        margin-top: 15px;
        border-top: 1px dashed rgba(212, 175, 55, 0.3);
        padding-top: 10px;
    }
    .more-link-box a {
        color: var(--gold);
        text-decoration: none;
        font-family: 'Cinzel';
        font-size: 11px;
        font-weight: bold;
        display: block;
        text-align: center;
        letter-spacing: 1px;
        transition: 0.3s;
    }
    .more-link-box a:hover { opacity: 0.8; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script>
    const config = [
        {
            name: 'DUYURULAR',
            url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?gid=0&single=true&output=csv',
            target: 'list-duyurular'
        },
        {
            name: 'HABERLER',
            url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?gid=995325209&single=true&output=csv',
            target: 'list-haberler'
        },
        {
            name: 'BASINDA BİZ',
            url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?gid=1712536451&single=true&output=csv',
            target: 'list-basinda'
        }
    ];

    function updateHomePage() {
        config.forEach(item => {
            Papa.parse(item.url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const container = document.getElementById(item.target);
                    if (!container) return;
                    
                    container.innerHTML = ''; // Yükleniyor'u temizle
                    
                    // En yeni 3 kaydı al (Ters çevirerek)
                    const data = results.data.reverse().slice(0, 3);

                    if (data.length === 0) {
                        container.innerHTML = '<li class="loading">Henüz kayıt bulunmuyor.</li>';
                        return;
                    }

                    data.forEach(row => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <span class="ann-date-small">${row['TARİH'] || '-'}</span>
                            <span class="ann-text-small">${row['DUYURU METNİ'] || ''}</span>
                        `;
                        container.appendChild(li);
                    });
                },
                error: function() {
                    document.getElementById(item.target).innerHTML = '<li class="loading">Veri alınamadı.</li>';
                }
            });
        });
    }

    // Sayfa yüklendiğinde otomatik başlat
    document.addEventListener('DOMContentLoaded', updateHomePage);
</script>
