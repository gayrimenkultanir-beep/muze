<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>II. Bayezid Külliyesi — Gezi Rehberi</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8b6914;
    --cream: #f5ead8;
    --cream-dark: #e8d5b0;
    --ink: #1a1208;
    --ink-mid: #3d2b0e;
    --stone: #7a6645;
    --panel-bg: rgba(26, 18, 8, 0.92);
    --border: rgba(201, 168, 76, 0.4);
    --header-h: 64px;
    --panel-h: 200px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0;
  }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--ink);
    color: var(--cream);
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }

  /* ── HEADER ── */
  #header {
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(26,18,8,0.98), rgba(61,43,14,0.95));
    border-bottom: 1px solid var(--border);
    padding: 10px 16px 8px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  #header-text { flex: 1; min-width: 0; }

  #header-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(10px, 3vw, 14px);
    letter-spacing: 0.1em;
    color: var(--gold-light);
    text-shadow: 0 0 16px rgba(201,168,76,0.5);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #header-sub {
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  #legend-btn {
    flex-shrink: 0;
    width: 38px; height: 38px;
    border-radius: 8px;
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  #legend {
    position: absolute;
    top: calc(var(--header-h) + 4px);
    right: 12px;
    z-index: 200;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: none;
    min-width: 175px;
    max-height: 60vh;
    overflow-y: auto;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  #legend.open { display: block; }

  .legend-title {
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    font-size: 11px;
    color: var(--cream-dark);
    cursor: pointer;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }

  .legend-item:last-child { border-bottom: none; }
  .legend-item:active { opacity: 0.7; }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── MAP AREA ── */
  #map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1a1208;
    min-height: 0;
  }

  #map-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── USER PIN ── */
  #user-pin {
    position: absolute;
    z-index: 50;
    transform: translate(-50%, -100%);
    display: none;
    pointer-events: none;
    transition: left 0.5s ease, top 0.5s ease;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,0.7));
  }

  #user-pin.visible { display: block; }

  .pin-bubble {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border-radius: 8px 8px 8px 2px;
    padding: 5px 9px;
    font-family: 'Lora', serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink);
    white-space: normal;
    max-width: 120px;
    text-align: center;
    line-height: 1.3;
    box-shadow: 0 2px 10px rgba(201,168,76,0.5);
    animation: pinPulse 2s infinite;
  }

  @keyframes pinPulse {
    0%, 100% { box-shadow: 0 2px 10px rgba(201,168,76,0.5); }
    50% { box-shadow: 0 2px 22px rgba(201,168,76,0.95); }
  }

  .pin-dot {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    margin: 0 auto;
    margin-top: -2px;
  }

  /* ── BOTTOM PANEL ── */
  #bottom-panel {
    flex-shrink: 0;
    background: linear-gradient(to top, rgba(26,18,8,0.99) 0%, rgba(26,18,8,0.95) 100%);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 100;
  }

  #location-card {
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 13px;
    margin-bottom: 10px;
    min-height: 64px;
  }

  #location-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--stone);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  #location-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(12px, 4vw, 16px);
    color: var(--gold-light);
    line-height: 1.3;
    transition: all 0.4s ease;
  }

  #location-name.outside {
    color: var(--stone);
    font-size: 13px;
    font-family: 'Lora', serif;
    font-style: italic;
  }

  #location-desc {
    font-size: 10px;
    color: var(--cream-dark);
    margin-top: 3px;
    opacity: 0.8;
    font-style: italic;
    line-height: 1.4;
  }

  /* ── CONTROLS ── */
  #controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #locate-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 10px;
    padding: 13px 12px;
    font-family: 'Lora', serif;
    font-size: clamp(12px, 3.5vw, 14px);
    color: var(--ink);
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    box-shadow: 0 4px 18px rgba(201,168,76,0.3);
    -webkit-appearance: none;
  }

  #locate-btn:active { transform: scale(0.97); opacity: 0.9; }
  #locate-btn.tracking {
    background: linear-gradient(135deg, #1a4a2a, #2d7a4a);
    color: var(--cream);
    box-shadow: 0 4px 18px rgba(45,122,74,0.4);
  }

  #sound-btn {
    flex-shrink: 0;
    width: 48px; height: 48px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    -webkit-appearance: none;
  }

  #sound-btn:active { transform: scale(0.95); }
  #sound-btn.muted { color: var(--stone); background: rgba(122,102,69,0.1); }

  /* ── GPS STATUS ── */
  #gps-status {
    font-size: 9px;
    color: var(--stone);
    text-align: center;
    margin-top: 7px;
    letter-spacing: 0.06em;
    min-height: 13px;
  }

  /* ── SVG STYLES ── */
  .area-poly {
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .area-poly.active {
    stroke-width: 3 !important;
  }

  .area-label {
    font-family: 'Lora', serif;
    font-size: 9px;
    fill: rgba(255,240,200,0.9);
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
    paint-order: stroke;
    stroke: rgba(0,0,0,0.7);
    stroke-width: 2px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,18,8,0.96);
    border: 1px solid var(--gold-dark);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 12px;
    color: var(--gold-light);
    z-index: 500;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }

  #toast.show { opacity: 1; }
</style>
</head>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="header-text">
      <div id="header-title">II. Bayezid Külliyesi</div>
      <div id="header-sub">Edirne · Gezi Rehberi · 1484</div>
    </div>
    <button id="legend-btn" onclick="toggleLegend()">⊞</button>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <svg id="map-svg" viewBox="0 0 800 860" preserveAspectRatio="xMidYMid meet">

          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <pattern id="bg-pattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
          <rect width="30" height="30" fill="#1a1208"/>
          <circle cx="15" cy="15" r="0.4" fill="rgba(201,168,76,0.12)"/>
        </pattern>
        <filter id="shadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
        </filter>
      </defs>
      <rect width="800" height="860" fill="url(#bg-pattern)"/>

      <!-- Polygons injected by JS -->
      <g id="polygons-layer"></g>
      <g id="labels-layer"></g>

      <!-- Compass — top-right -->
      <g id="compass" transform="translate(760,50)">
        <circle r="22" fill="rgba(26,18,8,0.9)" stroke="rgba(201,168,76,0.45)" stroke-width="1"/>
        <text y="-10" text-anchor="middle" font-size="9" fill="#c9a84c" font-family="serif">K</text>
        <text y="16" text-anchor="middle" font-size="9" fill="#7a6645" font-family="serif">G</text>
        <text x="-12" y="4" text-anchor="middle" font-size="9" fill="#7a6645" font-family="serif">B</text>
        <text x="12" y="4" text-anchor="middle" font-size="9" fill="#7a6645" font-family="serif">D</text>
        <line x1="0" y1="-16" x2="0" y2="16" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
        <line x1="-16" y1="0" x2="16" y2="0" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
        <polygon points="0,-14 3,-4 0,-8 -3,-4" fill="#c9a84c"/>
      </g>

      <!-- Scale bar -->
      <g transform="translate(30,820)">
        <line x1="0" y1="0" x2="80" y2="0" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
        <line x1="0" y1="-4" x2="0" y2="4" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
        <line x1="80" y1="-4" x2="80" y2="4" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
        <text x="40" y="-8" text-anchor="middle" font-size="9" fill="rgba(201,168,76,0.6)" font-family="serif">~50m</text>
      </g>
    </svg>

    <!-- User pin (absolute inside map-wrap) -->
    <div id="user-pin">
      <div class="pin-bubble" id="pin-text">Konumunuz</div>
      <div class="pin-dot"></div>
    </div>

    <!-- Legend dropdown -->
    <div id="legend"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom-panel">
    <div id="location-card">
      <div id="location-label">📍 Bulunduğunuz Alan</div>
      <div id="location-name" class="outside">Haritaya dokunarak keşfedin</div>
      <div id="location-desc"></div>
    </div>
    <div id="controls">
      <button id="locate-btn" onclick="startTracking()">
        <span>◎</span> Konumumu Göster
      </button>
      <button id="sound-btn" onclick="toggleSound()">🔊</button>
    </div>
    <div id="gps-status"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

// ══════════════════════════════════════
// PROJEKSIYON — Kuzeyi yukarı (cami üstte)
// Külliye kuzeye baktığı için: yüksek lat = kuzey = SVG üstü
// Doğu (yüksek lon) = sağ
// ══════════════════════════════════════
let allLats = [], allLons = [];
RAW_ZONES.forEach(z => z.coords.forEach(([lat, lon]) => {
  allLats.push(lat); allLons.push(lon);
}));

const minLat = Math.min(...allLats), maxLat = Math.max(...allLats);
const minLon = Math.min(...allLons), maxLon = Math.max(...allLons);

const SVG_W = 800, SVG_H = 860;
const PAD_X = 55, PAD_TOP = 80, PAD_BOT = 55;

// Lon → X: doğu sağda (normal)
// Lat → Y: kuzey (yüksek lat) üstte — yani lat büyüdükçe Y küçülür
// ÖNEMLİ: orijinal kodda "lat ters çevir" yapılıyordu (kuzey yukarı)
// Bu doğruydu ama bounding box hesabı yanlış yöndeydi — düzelttik.

function geoToSVG(lat, lon) {
  const x = PAD_X + (lon - minLon) / (maxLon - minLon) * (SVG_W - 2 * PAD_X);
  // Yüksek lat = kuzey = SVG üstü (düşük Y)
  const y = PAD_TOP + (1 - (lat - minLat) / (maxLat - minLat)) * (SVG_H - PAD_TOP - PAD_BOT);
  return [x, y];
}

// ══════════════════════════════════════
// CONVEX HULL
// ══════════════════════════════════════
function convexHull(pts) {
  const p = [...pts].sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  const cross = (O,A,B) => (A[0]-O[0])*(B[1]-O[1]) - (A[1]-O[1])*(B[0]-O[0]);
  const lo = [], hi = [];
  for (const q of p) {
    while (lo.length >= 2 && cross(lo[lo.length-2], lo[lo.length-1], q) <= 0) lo.pop();
    lo.push(q);
  }
  for (let i = p.length-1; i >= 0; i--) {
    const q = p[i];
    while (hi.length >= 2 && cross(hi[hi.length-2], hi[hi.length-1], q) <= 0) hi.pop();
    hi.push(q);
  }
  hi.pop(); lo.pop();
  return lo.concat(hi);
}

function shrink(pts, f=0.02) {
  const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const cy = pts.reduce((s,p)=>s+p[1],0)/pts.length;
  return pts.map(([x,y]) => [cx+(x-cx)*(1-f), cy+(y-cy)*(1-f)]);
}

// ══════════════════════════════════════
// BUILD ZONES
// ══════════════════════════════════════
const ZONES = RAW_ZONES.map(zone => {
  const raw = zone.coords.map(([lat,lon]) => geoToSVG(lat, lon));
  const hull = convexHull(raw);
  const svgPts = shrink(hull, 0.02);
  const cx = svgPts.reduce((s,p)=>s+p[0],0)/svgPts.length;
  const cy = svgPts.reduce((s,p)=>s+p[1],0)/svgPts.length;
  return { ...zone, svgPts, cx, cy };
});

// ══════════════════════════════════════
// RENDER SVG
// ══════════════════════════════════════
const polyLayer = document.getElementById('polygons-layer');
const labelLayer = document.getElementById('labels-layer');

ZONES.forEach(zone => {
  const pts = zone.svgPts.map(p => p.join(',')).join(' ');

  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', zone.fill);
  poly.setAttribute('stroke', zone.color);
  poly.setAttribute('stroke-width', '1.8');
  poly.setAttribute('stroke-linejoin', 'round');
  poly.setAttribute('class', 'area-poly');
  poly.setAttribute('id', 'poly-' + zone.id);
  poly.addEventListener('click', () => showZoneInfo(zone));
  polyLayer.appendChild(poly);

  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x', zone.cx);
  lbl.setAttribute('y', zone.cy);
  lbl.setAttribute('class', 'area-label');
  lbl.textContent = zone.name;
  labelLayer.appendChild(lbl);
});

// ══════════════════════════════════════
// LEGEND
// ══════════════════════════════════════
const legendEl = document.getElementById('legend');
legendEl.innerHTML = `<div class="legend-title">Bölümler</div>` +
  ZONES.map(z => `<div class="legend-item" onclick="focusZone('${z.id}')">
    <div class="legend-dot" style="background:${z.fill};border:1px solid ${z.color}"></div>
    <span>${z.name}</span>
  </div>`).join('');

function toggleLegend() {
  legendEl.classList.toggle('open');
}

function focusZone(id) {
  const zone = ZONES.find(z => z.id === id);
  if (zone) showZoneInfo(zone);
  legendEl.classList.remove('open');
}

// Close legend on outside tap
document.getElementById('map-wrap').addEventListener('click', (e) => {
  if (!e.target.closest('#legend') && !e.target.closest('#legend-btn')) {
    legendEl.classList.remove('open');
  }
});

// ══════════════════════════════════════
// POINT-IN-POLYGON (ray casting)
// ══════════════════════════════════════
function pointInPolygon(lat, lon, zone) {
  const [px, py] = geoToSVG(lat, lon);
  const poly = zone.svgPts;
  let inside = false;
  for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
    const [xi,yi] = poly[i], [xj,yj] = poly[j];
    if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}

function findZone(lat, lon) {
  return ZONES.find(z => pointInPolygon(lat, lon, z)) || null;
}

// ══════════════════════════════════════
// SPEECH
// ══════════════════════════════════════
let soundEnabled = true;
let lastSpoken = '';

function speak(text) {
  if (!soundEnabled || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'tr-TR'; utt.rate = 0.9; utt.pitch = 1.0; utt.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const trVoice = voices.find(v => v.lang.startsWith('tr'));
  if (trVoice) utt.voice = trVoice;
  window.speechSynthesis.speak(utt);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
  showToast(soundEnabled ? 'Sesli rehber açık' : 'Sesli rehber kapalı');
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
}

// ══════════════════════════════════════
// UI
// ══════════════════════════════════════
function showZoneInfo(zone) {
  setActiveZone(zone);
}

function setActiveZone(zone) {
  document.querySelectorAll('.area-poly').forEach(p => {
    p.setAttribute('stroke-width','1.8');
    p.style.filter = '';
    p.classList.remove('active');
  });

  if (zone) {
    document.getElementById('location-name').className = '';
    document.getElementById('location-name').textContent = zone.name;
    document.getElementById('location-desc').textContent = zone.desc;

    const poly = document.getElementById('poly-' + zone.id);
    if (poly) {
      poly.setAttribute('stroke-width','3');
      poly.style.filter = 'url(#glow)';
      poly.classList.add('active');
    }
  } else {
    document.getElementById('location-name').className = 'outside';
    document.getElementById('location-name').textContent = 'Külliye alanı dışındasınız';
    document.getElementById('location-desc').textContent = 'Lütfen külliye sınırları içine giriniz.';
  }
}

function updateLocationDisplay(zone) {
  setActiveZone(zone);
  if (zone && lastSpoken !== zone.id) {
    lastSpoken = zone.id;
    setTimeout(() => speak(`Şu an ${zone.announce}`), 300);
  } else if (!zone && lastSpoken !== 'outside') {
    lastSpoken = 'outside';
  }
}

// ══════════════════════════════════════
// GPS
// ══════════════════════════════════════
let watchId = null;
let isTracking = false;

function startTracking() {
  if (isTracking) { stopTracking(); return; }
  if (!navigator.geolocation) { showToast('Tarayıcınız konum desteklemiyor'); return; }

  document.getElementById('gps-status').textContent = 'GPS sinyali aranıyor…';
  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true, timeout: 15000, maximumAge: 2000
  });
  isTracking = true;

  const btn = document.getElementById('locate-btn');
  btn.classList.add('tracking');
  btn.innerHTML = '<span>◉</span> Takip Aktif';

  speak('Konum takibi başladı. Külliye içinde ilerlediğinizde size rehberlik edeceğim.');
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  isTracking = false;
  const btn = document.getElementById('locate-btn');
  btn.classList.remove('tracking');
  btn.innerHTML = '<span>◎</span> Konumumu Göster';
  document.getElementById('user-pin').classList.remove('visible');
  document.getElementById('gps-status').textContent = 'Takip durduruldu';
}

function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  const [svgX, svgY] = geoToSVG(lat, lon);
  const svgEl = document.getElementById('map-svg');
  const bbox = svgEl.getBoundingClientRect();
  const scaleX = bbox.width / SVG_W;
  const scaleY = bbox.height / SVG_H;

  // Pin pozisyonu relative to map-wrap
  const mapWrap = document.getElementById('map-wrap');
  const wrapRect = mapWrap.getBoundingClientRect();
  const pinX = bbox.left - wrapRect.left + svgX * scaleX;
  const pinY = bbox.top - wrapRect.top + svgY * scaleY;

  const pin = document.getElementById('user-pin');
  pin.style.left = pinX + 'px';
  pin.style.top = pinY + 'px';
  pin.classList.add('visible');

  const zone = findZone(lat, lon);
  document.getElementById('pin-text').textContent = zone ? zone.name : 'Külliye dışı';
  updateLocationDisplay(zone);

  const accText = acc < 10 ? '✦ Mükemmel GPS' : acc < 20 ? '✦ İyi GPS' : acc < 50 ? '◇ Orta GPS' : '○ Zayıf GPS';
  document.getElementById('gps-status').textContent = `${accText} · ±${Math.round(acc)}m`;
}

function onError(err) {
  let msg = 'Konum alınamadı';
  if (err.code === 1) msg = 'Konum izni verilmedi';
  else if (err.code === 2) msg = 'GPS sinyali alınamıyor';
  else if (err.code === 3) msg = 'Zaman aşımı — tekrar deneyin';
  document.getElementById('gps-status').textContent = msg;
  showToast(msg);
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════
// SİMÜLASYON — haritaya tıkla
// ══════════════════════════════════════
document.getElementById('map-svg').addEventListener('click', (e) => {
  if (isTracking) return;
  const svg = e.currentTarget;
  const rect = svg.getBoundingClientRect();
  const svgX = (e.clientX - rect.left) / rect.width * SVG_W;
  const svgY = (e.clientY - rect.top) / rect.height * SVG_H;

  // SVG → Geo (ters)
  const lon = minLon + (svgX - PAD_X) / (SVG_W - 2*PAD_X) * (maxLon - minLon);
  const lat = minLat + (1 - (svgY - PAD_TOP) / (SVG_H - PAD_TOP - PAD_BOT)) * (maxLat - minLat);

  const mapWrap = document.getElementById('map-wrap');
  const wrapRect = mapWrap.getBoundingClientRect();
  const pin = document.getElementById('user-pin');
  pin.style.left = (e.clientX - wrapRect.left) + 'px';
  pin.style.top = (e.clientY - wrapRect.top) + 'px';
  pin.classList.add('visible');

  const zone = findZone(lat, lon);
  document.getElementById('pin-text').textContent = zone ? zone.name : 'Külliye dışı';
  updateLocationDisplay(zone);
  document.getElementById('gps-status').textContent = `Simülasyon · ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
});
</script>
</body>
</html>
