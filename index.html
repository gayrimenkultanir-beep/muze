.fy-duz-tus.sil{background:var(--err-soft); color:var(--err)}
.fy-duz-tus.virgul{font-size:24px}
.fy-duz-butonlar{display:flex; gap:10px}
.fy-duz-temizle{flex:1; padding:14px; border-radius:12px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:13px; font-weight:800; cursor:pointer}
.fy-duz-kaydet{flex:1.4; padding:14px; border-radius:12px; background:var(--ok); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
.fy-satir-sade{display:flex; justify-content:space-between; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 15px; margin-bottom:8px}
.fy-satir-sade.fy-kapali{opacity:.55}
.fy-kampanya-not{display:block; font-size:11.5px; color:var(--err); font-weight:700; margin-top:3px}
.fy-sag-blok{display:flex; gap:8px; align-items:center}
.fy-genel-btn{padding:9px 14px; border-radius:10px; background:var(--surface-2); border:1.5px solid var(--line); font-size:14px; font-weight:800; color:var(--ink); white-space:nowrap}
/* Kampanya listesi */
.kmp-bos{padding:40px 20px; text-align:center; color:var(--ink-3); font-size:14px}
.kmp-liste{display:flex; flex-direction:column; gap:10px}
.kmp-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:14px 16px}
.kmp-kart.kmp-aktif{border-color:var(--err); box-shadow:0 0 0 1px var(--err) inset}
.kmp-kart-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.kmp-ad{font-size:16px; font-weight:800}
.kmp-durum{font-size:11px; font-weight:800; padding:3px 10px; border-radius:99px}
.kmp-durum.on{background:var(--ok-soft); color:var(--ok)}
.kmp-durum.off{background:var(--surface-2); color:var(--ink-3)}
.kmp-urun-satir{font-size:13px; color:var(--ink-2); margin-bottom:8px}
.kmp-detay{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
.kmp-rozet{font-size:11px; font-weight:700; background:var(--surface-2); color:var(--ink-2); padding:3px 9px; border-radius:99px}
.kmp-aksiyon{display:flex; gap:8px}
.kmp-toggle{padding:8px 14px; border-radius:9px; background:var(--brand-soft); color:var(--brand-d); font-size:12.5px; font-weight:800; border:1px solid var(--brand)}
.kmp-toggle.pasif{background:var(--surface-2); color:var(--ink-2); border-color:var(--line)}
.kmp-sil{padding:8px 14px; border-radius:9px; background:var(--err-soft); color:var(--err); font-size:12.5px; font-weight:800; border:1px solid #e8a59e; margin-left:auto}
/* Kampanya formu */
.kmpf-head{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line)}
.kmpf-baslik{font-size:17px; font-weight:800}
.kmpf-govde{padding:16px 20px; max-height:60vh; overflow-y:auto; display:flex; flex-direction:column; gap:14px}
.kmpf-alan{display:flex; flex-direction:column; gap:6px}
.kmpf-alan label{font-size:12px; font-weight:700; color:var(--ink-3)}
.kmpf-input{padding:11px 13px; border-radius:10px; border:1.5px solid var(--line); font-size:14px; font-weight:600; background:var(--surface); color:var(--ink); width:100%; box-sizing:border-box}
.kmpf-input:focus{border-color:var(--brand); outline:none}
.kmpf-secim-row{display:flex; gap:8px}
.kmpf-secim{flex:1; padding:10px; border-radius:10px; background:var(--surface); border:1.5px solid var(--line); font-size:12.5px; font-weight:700; color:var(--ink-2)}
.kmpf-secim.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.kmpf-sube-grid{display:flex; flex-wrap:wrap; gap:6px}
.kmpf-sube-chip{padding:7px 12px; border-radius:99px; background:var(--surface); border:1.5px solid var(--line); font-size:12px; font-weight:700; color:var(--ink-2)}
.kmpf-sube-chip.on{background:var(--ok-soft); border-color:var(--ok); color:var(--ok)}
.kmpf-sabit{padding:10px 13px; border-radius:10px; background:var(--surface-2); font-size:13px; font-weight:700; color:var(--ink-2)}
.kmpf-gun-row{display:flex; gap:5px}
.kmpf-gun{flex:1; padding:9px 0; border-radius:8px; background:var(--surface); border:1.5px solid var(--line); font-size:12px; font-weight:800; color:var(--ink-2)}
.kmpf-gun.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}
.kmpf-saat-row{display:flex; gap:10px; align-items:center}
.kmpf-tire{font-weight:800; color:var(--ink-3)}
.kmpf-tekrar{flex-direction:row; align-items:center; gap:10px; cursor:pointer; background:var(--surface-2); padding:12px 14px; border-radius:10px}
.kmpf-check{width:24px; height:24px; min-width:24px; border-radius:7px; border:2px solid var(--line); background:var(--surface); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--brand-d)}
.kmpf-check.on{background:var(--brand); border-color:var(--brand); color:var(--brand-ink)}
.kmpf-tekrar span{font-size:12.5px; color:var(--ink-2); font-weight:600}
.kmpf-kaydet{margin:8px 20px 20px; padding:15px; border-radius:12px; background:var(--brand); color:var(--brand-ink); font-size:15px; font-weight:800; border:none; width:calc(100% - 40px)}
/* Garson paket sekmesi */
.grs-sekme-row{display:flex; gap:8px; padding:12px 16px 0}
.grs-sekme{flex:1; padding:11px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:13.5px; font-weight:800; border:1.5px solid transparent}
.grs-sekme.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.grs-paket-bolum{padding:16px}
.grs-yeni-paket{width:100%; padding:14px; border-radius:var(--radius-sm); background:#8e44ad; color:#fff; font-size:14px; font-weight:800; margin-bottom:14px}
.grs-paket-list{display:flex; flex-direction:column; gap:10px}
.grs-paket-kart{background:var(--surface-2); border-radius:var(--radius); padding:13px 15px}
.grs-pk-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.grs-pk-no{font-size:13.5px; font-weight:800}
.grs-pk-durum{font-size:12px; font-weight:800}
.grs-pk-urunler{font-size:13px; color:var(--ink-2); margin-bottom:4px}
.grs-pk-tutar{font-size:14px; font-weight:800; color:var(--brand-d)}
.grs-paket-bar{position:sticky; bottom:0; display:flex; gap:12px; align-items:center; padding:14px 16px; background:var(--surface); border-top:1px solid var(--line)}
.grs-pb-bilgi{flex:1; font-size:14px; font-weight:800}
.grs-pb-gonder{padding:13px 20px; border-radius:var(--radius-sm); background:#8e44ad; color:#fff; font-size:14px; font-weight:800}
.qr-kat-baslik-row{display:flex; justify-content:space-between; align-items:center; padding-right:16px}
.qr-siparislerim{padding:8px 14px; border-radius:99px; background:var(--cocoa-soft); color:var(--cocoa); font-size:12.5px; font-weight:800}

/* Müşteri bildirim banner'ı */
.qr-bildirim{position:fixed; top:-100px; left:50%; transform:translateX(-50%); z-index:200; display:flex; align-items:center; gap:12px; background:var(--ink); color:#fff; padding:14px 20px; border-radius:14px; box-shadow:var(--shadow-lg); max-width:90vw; transition:top .35s cubic-bezier(.2,.8,.2,1)}
.qr-bildirim.show{top:16px}
.qb-ic{font-size:26px}
.qb-metin{display:flex; flex-direction:column; font-size:13px; line-height:1.3}
.qb-metin strong{font-size:14.5px; margin-bottom:1px}

/* Takip ekranı */
.qr-takip-list{padding:16px; display:flex; flex-direction:column; gap:14px}
.qr-takip-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow)}
.qtk-ust{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
.qtk-no{font-size:13px; font-weight:800; color:var(--ink-2)}
.qtk-tutar{font-size:15px; font-weight:800; color:var(--brand-d)}
.qtk-urunler{font-size:13px; color:var(--ink-2); margin-bottom:16px; line-height:1.4}
.qtk-iptal{text-align:center; padding:12px; background:var(--danger-soft); color:var(--danger); border-radius:var(--radius-sm); font-weight:800; font-size:13.5px}

/* OTP doğrulama */
.od-otp{padding:8px 0}
.od-otp-bilgi{background:var(--cocoa-soft); color:var(--cocoa); padding:14px; border-radius:var(--radius); font-size:13px; line-height:1.5; font-weight:600}
.od-otp-not{font-size:12px; color:var(--ink-3); text-align:center; margin-top:10px}

/* OTP kanal seçimi (kayıt) */
.qr-kanal-baslik{font-size:13px; font-weight:700; color:var(--ink-2); margin:6px 0 10px; text-align:left}
.qr-kanal-row{display:flex; gap:10px; margin-bottom:16px}
.qr-kanal{flex:1; position:relative; display:flex; flex-direction:column; align-items:center; gap:5px; padding:14px 8px; border-radius:var(--radius); background:var(--surface-2); border:1.5px solid transparent}
.qr-kanal.on{background:var(--brand-soft); border-color:var(--brand)}
.qr-kanal.disabled{opacity:.5; cursor:not-allowed}
.qk-ic{font-size:26px}
.qk-ad{font-size:13px; font-weight:800}
.qk-yakinda{position:absolute; top:5px; right:5px; font-size:9px; font-weight:800; background:var(--ink-3); color:#fff; padding:2px 6px; border-radius:99px}

/* Ürün kartları (dikey · tam genişlik görsel üstte) */
.qr-menu-list{flex:1; padding:14px; display:flex; flex-direction:column; gap:18px}
.qr-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column}
.qr-card.qr-out{opacity:.55}
.qr-img{width:100%; aspect-ratio:16/10; flex:0 0 auto; background-size:cover; background-position:center; display:block}
.qr-img-ph{display:grid; place-items:center}
.qr-card-body{flex:1 1 auto; display:flex; align-items:center; gap:12px; padding:14px 16px}
.qr-card-info{flex:1; min-width:0}
.qr-card-ad{font-weight:800; font-size:17px; line-height:1.25}
.qr-card-ad-row{display:flex; align-items:flex-start; gap:8px; margin-bottom:3px}
.qr-card-ad-row .qr-card-ad{flex:1 1 auto; min-width:0; margin-bottom:0}
.qr-card-ad-row .qr-mag-rozet{flex:0 0 auto; margin-top:0; margin-left:auto; align-self:flex-start}
.qr-card-desc{font-size:12.5px; color:var(--ink-2); line-height:1.4; margin-bottom:7px}
.qr-card-fiyat{font-weight:800; font-size:18px; color:var(--brand-d)}
.qr-card-add{flex:none; width:46px; height:46px; border-radius:99px; background:var(--brand); color:var(--brand-ink); display:grid; place-items:center; font-size:28px; font-weight:700; box-shadow:var(--shadow)}
.qr-card-add:active{transform:scale(.92); background:var(--brand-d); color:#fff}
.qr-card-tukendi{flex:none; font-size:11.5px; font-weight:800; color:var(--danger); background:var(--danger-soft); padding:8px 13px; border-radius:9px}

/* Sepet bar (yüzen) */
.qr-sepet-bar{position:fixed; bottom:14px; left:0; right:0; margin:0 auto; z-index:100; display:flex; align-items:center; gap:12px; padding:15px 18px; border-radius:var(--radius); background:var(--brand); color:var(--brand-ink); box-shadow:var(--shadow-lg); width:calc(min(480px,100vw) - 28px); box-sizing:border-box; cursor:pointer; border:none}
.qr-sepet-bar > *{pointer-events:none}
.qr-menu-list.has-sepet, .qr-kat-grid.has-sepet{padding-bottom:90px}
/* Modal açıkken sabit sepet bar gizlenir (modalın altında kalmasın) */
body:has(.modal-bg.on) #qrSepetBarSabit{display:none}
.qr-sb-n{width:26px; height:26px; border-radius:99px; background:var(--brand-ink); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:800}
.qr-sb-t{flex:1; font-weight:800; font-size:15px}
.qr-sb-f{font-weight:800; font-size:16px}

/* Sepet ekranı */
.qr-sepet-list{flex:1; padding:14px}
.qr-bos{text-align:center; padding:60px 20px; color:var(--ink-3); font-size:14px}
.qr-si{display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--line)}
.qr-si-info{flex:1}
.qr-si-ad{font-weight:700; font-size:15px}
.qr-si-secim{font-size:11.5px; color:var(--ink-2); margin-top:3px; line-height:1.4}
.qr-si-not{font-size:11.5px; color:var(--cocoa); margin-top:4px; font-style:italic}
.qr-si-sag{text-align:right}
.qr-si-fiyat{font-weight:800; font-size:15px; margin-bottom:8px}
.qr-si-adet{display:flex; align-items:center; gap:10px; background:var(--surface-2); border-radius:99px; padding:4px}
.qr-si-adet button{width:28px; height:28px; border-radius:99px; background:var(--surface); font-size:16px; font-weight:800; color:var(--ink)}
.qr-si-adet span{font-weight:800; min-width:18px; text-align:center}
.qr-sepet-foot{position:sticky; bottom:0; padding:16px 18px; background:var(--surface); border-top:1px solid var(--line)}
.qr-sf-toplam{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; font-size:15px}
.qr-sf-toplam strong{font-size:24px; font-weight:800}
.qr-sf-not{text-align:center; font-size:11.5px; color:var(--ink-3); margin-top:8px}

/* Onay ekranı */
.qr-onay{justify-content:center; align-items:center; padding:40px 24px}
.qr-onay-ic{text-align:center; width:100%}
.qr-onay-tik{width:80px; height:80px; margin:0 auto 18px; border-radius:99px; background:var(--ok); color:#fff; display:grid; place-items:center; font-size:42px; font-weight:800}
.qr-onay-baslik{font-size:23px; font-weight:800; margin-bottom:8px}
.qr-onay-alt{font-size:14.5px; color:var(--ink-2); line-height:1.6; margin-bottom:14px}
.qr-onay-masa{display:inline-block; padding:7px 15px; border-radius:99px; background:var(--surface-2); font-size:13px; font-weight:700; margin-bottom:24px}

/* Splash (açılış reklamı) */
.qr-splash{justify-content:flex-end; background:#111; position:relative; overflow:hidden}
.qr-splash-img{position:absolute; inset:0; background-size:cover; background-position:center}
.qr-splash-anim{animation:splashZoom 12s ease-in-out infinite alternate}
@keyframes splashZoom{0%{transform:scale(1.05)}100%{transform:scale(1.18)}}
.qr-splash-veil{position:absolute; inset:0; z-index:1; background:radial-gradient(circle at 50% 30%, transparent, rgba(0,0,0,.4) 70%, rgba(0,0,0,.75))}
.qr-splash-kmp-wrap{position:absolute; top:0; left:0; right:0; z-index:2; padding:60px 18px 0; max-height:55%; overflow:hidden}
.qr-splash-kampanyalar{display:flex; flex-direction:column; gap:10px}
.qr-splash-kmp{background:rgba(20,12,8,.55); backdrop-filter:blur(10px); border:1.5px solid rgba(240,167,40,.6); border-radius:14px; padding:12px 16px; display:flex; flex-direction:column; gap:3px}
.qsk-ad{font-size:14px; font-weight:800; color:#ffd98a}
.qsk-ust{display:flex; justify-content:space-between; align-items:center; gap:8px}
.qsk-oran{font-size:12px; font-weight:800; background:#ff8a5c; color:#3a1505; padding:2px 9px; border-radius:99px}
.qsk-simdi{font-size:10px; font-weight:800; background:rgba(47,158,68,.9); color:#fff; padding:2px 8px; border-radius:99px; margin-left:6px}
.qsk-saat{font-size:10px; font-weight:700; color:rgba(255,255,255,.6); margin-left:6px}
.qsk-zaman{display:block; font-size:11.5px; font-weight:700; color:rgba(255,255,255,.75); margin-top:5px}
.qsk-urun{font-size:13px; color:#fff; opacity:.9}
.qsk-fiyat{font-size:15px; font-weight:800; margin-top:2px}
.qsk-eski{text-decoration:line-through; color:rgba(255,255,255,.55); font-size:13px}
.qsk-yeni{color:#ff8a5c}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(240,167,40,.3), 0 0 0 rgba(240,167,40,0)}50%{box-shadow:0 0 22px rgba(240,167,40,.7), 0 0 30px rgba(255,138,92,.4)}}
.glow{animation:glowPulse 1.8s ease-in-out infinite}
@keyframes glowText{0%,100%{opacity:.85; text-shadow:0 0 6px rgba(240,167,40,.4)}50%{opacity:1; text-shadow:0 0 16px rgba(240,167,40,.9)}}
.glow-soft{animation:glowText 2s ease-in-out infinite}
.qr-splash-ph{display:grid; place-items:center; background:linear-gradient(160deg,#3a2418,#6b3f23 60%,#a8693a)}
.qr-splash-atla{position:absolute; top:16px; right:16px; z-index:3; padding:8px 16px; border-radius:99px; background:rgba(0,0,0,.5); backdrop-filter:blur(8px); color:#fff; font-size:13px; font-weight:700}
.qr-splash-alt{position:relative; z-index:2; padding:28px 24px 40px; background:linear-gradient(transparent,rgba(0,0,0,.85) 40%); color:#fff}
.qr-splash-rozet{display:inline-block; padding:5px 12px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:11px; font-weight:800; margin-bottom:12px}
.qr-splash-baslik{font-size:30px; font-weight:800; letter-spacing:-.5px; line-height:1.1; margin-bottom:8px}
.qr-splash-altyazi{font-size:15px; opacity:.85; margin-bottom:20px}
.qr-splash-bar{height:4px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden}
.qr-splash-bar-fill{height:100%; width:100%; background:var(--brand); border-radius:99px; transform-origin:left; animation:splashBar 3s linear forwards}
@keyframes splashBar{from{transform:scaleX(0)} to{transform:scaleX(1)}}

/* Sadakat karşılama/kayıt */
.qr-sadakat-ikon{font-size:48px; text-align:center; margin-bottom:8px}

/* Menü barı sadakat butonu */
.qr-tb-sadakat{width:auto; min-width:34px; height:34px; padding:0 11px; border-radius:99px; background:var(--cocoa-soft); color:var(--cocoa); font-size:15px; font-weight:800; display:flex; align-items:center; gap:4px}
.qr-tb-sadakat span{font-size:13px}

/* Damga şeridi */
.qr-damga-serit{padding:12px 16px; background:linear-gradient(135deg,var(--cocoa-soft),#f7ede4); border-bottom:1px solid var(--line)}
.qr-damga-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12.5px}
.qr-damga-ust span:first-child{font-weight:800; color:var(--cocoa)}
.qr-damga-kalan{font-weight:700; color:var(--brand-d); font-size:11.5px}
.qr-damga-dots{display:flex; gap:5px}
.qr-damga{flex:1; aspect-ratio:1; max-width:30px; border-radius:8px; background:#fff; border:1.5px dashed var(--line-2); display:grid; place-items:center; font-size:14px}
.qr-damga.dolu{background:var(--brand-soft); border-style:solid; border-color:var(--brand)}

/* ============================================================
   KADEME İLERLEME ÇUBUĞU (Bronz → Gümüş → Altın)
   ============================================================ */
.kademe-ilerleme{--kad-bar-h:8px}
.kad-bar-row{margin-bottom:0}
.kad-bar{position:relative; height:var(--kad-bar-h); background:rgba(0,0,0,.08); border-radius:99px; overflow:hidden}
.kad-bar-dolu{position:absolute; left:0; top:0; height:100%; border-radius:99px; transition:width .5s cubic-bezier(.2,.8,.2,1)}
.kad-noktalar{display:flex; justify-content:space-between; margin-top:9px}
.kad-nokta{display:flex; flex-direction:column; align-items:center; gap:3px; opacity:.4; transition:opacity .3s, transform .3s; flex:1}
.kad-nokta.ulasildi{opacity:1}
.kad-nokta.aktif{transform:scale(1.12)}
.kad-nokta-ic{width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-size:15px; background:#fff; border:2px solid rgba(0,0,0,.1)}
.kad-nokta.ulasildi .kad-nokta-ic{border-color:var(--kad-renk); box-shadow:0 2px 8px color-mix(in srgb,var(--kad-renk) 35%,transparent)}
.kad-nokta.aktif .kad-nokta-ic{border-width:2.5px; background:color-mix(in srgb,var(--kad-renk) 14%,#fff)}
.kad-nokta-ad{font-size:10px; font-weight:800; color:var(--ink-2)}
.kad-nokta.ulasildi .kad-nokta-ad{color:var(--kad-renk)}
.kad-kalan{text-align:center; font-size:12.5px; color:var(--ink-2); font-weight:600; margin-top:8px; line-height:1.4}
.kad-kalan strong{color:var(--ink)}
/* boyut: büyük (profil) */
.kad-buyuk{--kad-bar-h:11px}
.kad-buyuk .kad-nokta-ic{width:38px; height:38px; font-size:19px}
.kad-buyuk .kad-nokta-ad{font-size:11.5px}
.kad-buyuk .kad-kalan{font-size:13.5px}
/* boyut: küçük (QR şerit / dar alan) */
.kad-kucuk{--kad-bar-h:6px}
.kad-kucuk .kad-nokta-ic{width:24px; height:24px; font-size:12px; border-width:1.5px}
.kad-kucuk .kad-nokta-ad{font-size:9px}

var qrcode = function() {

  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }

      bitOut.write(table.indexOf(s), bitLength);

      // end code
      bitOut.write(endCode, bitLength);

      bitOut.flush();

      return byteOut.toByteArray();
    };

    var lzwTable = function() {

      var _this = {};

      _this.add = function(key) {
        if (_this.contains(key) ) {

        }
        _map[key] = _size;
        _size += 1;
      };

      _this.size = function() {
        return _size;
      };

      _this.indexOf = function(key) {
        return _map[key];
      };

      _this.contains = function(key) {
        return typeof _map[key] != 'undefined';
      };

      return _this;
    };

    return _this;
  };

  var createDataURL = function(width, height, getPixel) {
    var gif = gifImage(width, height);
    for (var y = 0; y < height; y += 1) {
      for (var x = 0; x < width; x += 1) {
        gif.setPixel(x, y, getPixel(x, y) );
      }
    }

    var b = byteArrayOutputStream();
    gif.write(b);

    var base64 = base64EncodeOutputStream();
    var bytes = b.toByteArray();
    for (var i = 0; i < bytes.length; i += 1) {

    function toUTF8Array(str) {
      var utf8 = [];
      for (var i=0; i < str.length; i++) {
        var charcode = str.charCodeAt(i);
        if (charcode < 0x80) utf8.push(charcode);
        else if (charcode < 0x800) {
          utf8.push(0xc0 | (charcode >> 6),
              0x80 | (charcode & 0x3f));
        }
        else if (charcode < 0xd800 || charcode >= 0xe000) {
          utf8.push(0xe0 | (charcode >> 12),
              0x80 | ((charcode>>6) & 0x3f),
              0x80 | (charcode & 0x3f));
        }
        // surrogate pair
        else {
          i++;
          // UTF-16 encodes 0x10000-0x10FFFF by
          // subtracting 0x10000 and splitting the
          // 20 bits of 0x0-0xFFFFF into two halves
          charcode = 0x10000 + (((charcode & 0x3ff)<<10)
            | (str.charCodeAt(i) & 0x3ff));
          utf8.push(0xf0 | (charcode >>18),
              0x80 | ((charcode>>12) & 0x3f),
              0x80 | ((charcode>>6) & 0x3f),
              0x80 | (charcode & 0x3f));
        }
      }
      return utf8;
    }
    return toUTF8Array(s);
  };

rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    // --- MERKEZ TANIMLAR: sadece genel müdür yazar, herkes okur ---
    match /products/{p}    { allow read: if girisli(); allow write: if girisli() && genel(); }

        allow read:  if girisli() && (genel() || kendiSube(bId));

    }

    // --- ORTAK DEFTER: şube kendi siparişini yazar, genel müdür hepsini görür ---
    match /supply_orders/{oId} {

    // --- KULLANICILAR: sadece genel müdür yönetir ---
    match /users/{uid} {

/* ============================================================
   MERKEZİ DEPOLAMA KATMANI — MPStore
   ------------------------------------------------------------
   Aşağıdaki tüm "xxxYukle / xxxKaydet" çiftleri artık bu tek
   noktadan geçiyor. Amaç: try/catch tekrarını kaldırmak ve her
   kayda bir ŞEMA SÜRÜMÜ eklemek, böylece yarın bir alan eklenip
   eski cihazların verisi okunduğunda sessizce bozulmasın.

   Kayıt formatı:  {"__v": <sürüm>, "data": {...}}
   Eski (sürümsüz) kayıtlar otomatik olarak v0 kabul edilip
   verilen migrations zinciriyle hedef sürüme yükseltilir.

   Yeni alan eklerken yapılacaklar:
     1) İlgili modülün version sayısını +1 yap
     2) migrations dizisine [v0→v1, v1→v2, ...] sırayla bir
        dönüştürücü fonksiyon ekle (data alıp yeni data döner)
   Eski sürüm kayıtlar geldiğinde zincir otomatik uygulanır.
   ============================================================ */
const MPStore = {
  get(key, fallback, opts){
    opts = opts || {};
    try{
      const raw = localStorage.getItem(key);
      if(!raw) return fallback;
      const parsed = JSON.parse(raw);
      const sarmali = parsed && typeof parsed==="object" && Object.prototype.hasOwnProperty.call(parsed,"__v");
      let v = sarmali ? (parsed.__v||0) : 0;
      let data = sarmali ? parsed.data : parsed;   // eski (sürümsüz) kayıtlar ham veri olarak gelir
      const migs = opts.migrations || [];
      const hedef = opts.version || 0;
      while(v < hedef && typeof migs[v]==="function"){ data = migs[v](data); v++; }
      return (data==null) ? fallback : data;
    }catch(e){ return fallback; }
  },
  set(key, data, version){
    try{ localStorage.setItem(key, JSON.stringify({__v: version||0, data})); }
    catch(e){ /* kota dolu / localStorage yok — satış durmasın, sessiz geç */ }
  },
  /* Düz metin (JSON olmayan) tekil değerler için — örn. personel adı */
  getRaw(key, fallback){
    try{ const v = localStorage.getItem(key); return (v==null) ? fallback : v; }catch(e){ return fallback; }
  },
  setRaw(key, value){
    try{ localStorage.setItem(key, value); }catch(e){}
  }
};

/* ============================================================
   BAYİ KANALI (B2B) — genel müdür ↔ bayi (şube) tedarik sistemi
   - Stok kartları = STOCK (mevcut hammadde, aynı sistem)
   - MERKEZ_STOK: genel müdürün elindeki toplam stok (= STOCK.mevcut kullanılır)
   - BAYI_STOK[şube][stokKodu] = miktar (her bayinin kendi deposu)
   - BAYI_FIYAT[stokKodu] = genel müdürün bayiye satış fiyatı (₺/birim)
   - IRSALIYELER: genel müdüre gelen mal girişleri
   - SIParisLER: bayilerin genel müdüre talep listeleri (durum akışlı)
   ============================================================ */
let BAYI_STOK = {};          // {"Edirne Atatürk": {hamur:5000, cikolata:2000}}
let BAYI_FIYAT = {};         // {hamur:120, cikolata:340} — ₺/birim (gr için ₺/kg mantıklı ama basit tutuyoruz)
let IRSALIYELER = [];        // {id,tarih,tedarikci,aciklama,kalemler:[{kod,miktar}]}
let BAYI_SIPARISLER = [];    // {id,sube,tarih,kalemler:[{kod,miktar}],durum,odeme,aktarildi}
let _irsaliyeId = 1, _siparisId = 1;
const SIPARIS_DURUM = {
  taslak:    {ad:"Taslak",        renk:"#888",     bg:"#f0f0f0"},
  onayda:    {ad:"Onay bekliyor", renk:"#e08a1e",  bg:"#fdf0dc"},
  onaylandi: {ad:"Onaylandı",     renk:"#2f9e44",  bg:"#e8f6ec"},
  odendi:    {ad:"Ödendi",        renk:"#2f7ed8",  bg:"#e8f1fc"},
  aktarildi: {ad:"Stok aktarıldı",renk:"#7048c4",  bg:"#f0eafb"},
  red:       {ad:"Reddedildi",    renk:"#e74c3c",  bg:"#fdeceb"},
};
/* Bir bayinin bir stoktaki bakiyesi */
function bayiStok(sube, kod){ return (BAYI_STOK[sube] && BAYI_STOK[sube][kod]) || 0; }
function bayiStokYaz(sube, kod, miktar){
  if(!BAYI_STOK[sube]) BAYI_STOK[sube]={};
  BAYI_STOK[sube][kod]=miktar;
}
/* Bayi satış fiyatı */
function bayiFiyat(kod){ return BAYI_FIYAT[kod]||0; }
/* Şubeye özel iskonto (genel müdür tanımlar) — yüzde */
let BAYI_ISKONTO = {};   // {"Edirne Atatürk": 10}
function bayiIskonto(sube){ return BAYI_ISKONTO[sube]||0; }
/* İskontolu birim fiyat */
function bayiNetFiyat(kod, sube){
  const f = bayiFiyat(kod);
  const isk = bayiIskonto(sube);
  return isk>0 ? f*(1-isk/100) : f;
}
/* Bir siparişin brüt ve net (iskontolu) tutarı */
function siparisTutar(sp){
  const brut = sp.kalemler.filter(k=>!k.silindi && k.miktar>0).reduce((a,k)=>a+k.miktar*bayiFiyat(k.kod),0);
  const isk = bayiIskonto(sp.sube);
  const indirim = brut*isk/100;
  return { brut, isk, indirim, net:brut-indirim };
}

/* === B2B KALICILIK — roller arası geçişte (sayfa yenilenince) veri korunur === */
const B2B_KEY = "minipan_b2b_v1";
function b2bKaydet(){
  MPStore.set(B2B_KEY, {
    BAYI_STOK, BAYI_FIYAT, BAYI_ISKONTO, IRSALIYELER, BAYI_SIPARISLER,
    _irsaliyeId, _siparisId,
    // merkez stok mevcut miktarları da kalıcı (irsaliye/sayım/aktarım değiştiriyor)
    STOCK_MEVCUT: Object.fromEntries(Object.entries(STOCK).map(([k,v])=>[k,v.mevcut]))
  }, 1);
}
function b2bYukle(){
  const v = MPStore.get(B2B_KEY, {}, {version:1});
  if(v.BAYI_STOK) BAYI_STOK = v.BAYI_STOK;
  if(v.BAYI_FIYAT) BAYI_FIYAT = v.BAYI_FIYAT;
  if(v.BAYI_ISKONTO) BAYI_ISKONTO = v.BAYI_ISKONTO;
  if(v.IRSALIYELER) IRSALIYELER = v.IRSALIYELER;
  if(v.BAYI_SIPARISLER) BAYI_SIPARISLER = v.BAYI_SIPARISLER;
  if(v._irsaliyeId) _irsaliyeId = v._irsaliyeId;
  if(v._siparisId) _siparisId = v._siparisId;
  if(v.STOCK_MEVCUT){ Object.entries(v.STOCK_MEVCUT).forEach(([k,m])=>{ if(STOCK[k]) STOCK[k].mevcut=m; }); }
}

/* === KAMPANYA + GENEL FİYAT KALICILIĞI ===
   NOT: SUBE_FIYAT burada YÜKLENMİYOR artık — eskiden buradaki
   kampanyaYukle() v.SUBE_FIYAT diye bir alan okuyordu ama
   kampanyaKaydet_persist() o alanı hiç yazmıyordu (ölü kod, hep
   undefined dönüyordu). SUBE_FIYAT'ın gerçek kaynağı MENU_KEY —
   fiyatDuzKaydet()/subeFiyatGir() değişiklik sonrası menuKaydet()
   çağırıyor. Tek kaynak burada netleştirildi. */
const KMP_KEY = "minipan_kmp_v1";
function kampanyaKaydet_persist(){
  MPStore.set(KMP_KEY, { KAMPANYALAR, _kampanyaId }, 1);
}
function kampanyaYukle(){
  const v = MPStore.get(KMP_KEY, {}, {version:1});
  if(v.KAMPANYALAR) KAMPANYALAR = v.KAMPANYALAR;
  if(v._kampanyaId) _kampanyaId = v._kampanyaId;
}

/* ============================================================
   FİYAT YÖNETİMİ — genel fiyat + şube fiyatı + indirim + satış aç/kapa
   PRICE_OVERRIDE[şube][ürünAdı] = {fiyat, indirim, kapali}
   - fiyat: şubeye özel fiyat (yoksa genel fiyat geçerli, genel fiyatın üstüne çıkamaz)

   ============================================================ */
/* ============================================================
   FİYAT YÖNETİMİ v3 — sadece genel fiyat (indirim KAMPANYA'dan gelir)
   SUBE_FIYAT[şube][ürün] = {
     masa: {genel, kapali},
     eve:  {genel, kapali}
   }
   İndirim/oran/açıklama artık burada DEĞİL → KAMPANYALAR'da
   ============================================================ */
let SUBE_FIYAT = {};

function urunVarsayilanFiyat(ad){
  const p = DEMO_PRODUCTS.find(x=>x.ad===ad);
  return p ? p.fiyat : 0;
}
/* Şube+ürün+kanal kaydını getir (yoksa boş nesne) */
function fiyatKayit(sube, ad, kanal){
  return (SUBE_FIYAT[sube] && SUBE_FIYAT[sube][ad] && SUBE_FIYAT[sube][ad][kanal]) || {};
}
function fiyatKayitYaz(sube, ad, kanal){
  if(!SUBE_FIYAT[sube]) SUBE_FIYAT[sube]={};
  if(!SUBE_FIYAT[sube][ad]) SUBE_FIYAT[sube][ad]={};
  if(!SUBE_FIYAT[sube][ad][kanal]) SUBE_FIYAT[sube][ad][kanal]={};
  return SUBE_FIYAT[sube][ad][kanal];
}
/* ============================================================
   KAMPANYA SİSTEMİ
   KAMPANYALAR = [{
     id, ad, urun, tip:"oran"|"fiyat", deger,
     kanal:"masa"|"eve", subeler:"hepsi"|[şube...],
     gunler:[0-6], saatBas:"HH:MM", saatBit:"HH:MM",
     tekrar:bool, aktif:bool, olusturan
   }]
   ============================================================ */
let KAMPANYALAR = [];
let _kampanyaId = 1;
const GUN_ADLARI = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];  // 0=Pzt
/* Kampanyanın gün+saat metnini akıllı üret: "Her gün", "Hafta içi", "Hafta sonu", "Sal, Per" + saat */
function kampanyaZamanMetni(k){
  let gun;
  const g = (k.gunler||[]).slice().sort((a,b)=>a-b);
  if(g.length===0 || g.length===7) gun = "Her gün";
  else if(g.length===5 && [0,1,2,3,4].every(x=>g.includes(x))) gun = "Hafta içi";
  else if(g.length===2 && g.includes(5) && g.includes(6)) gun = "Hafta sonu";
  else gun = g.map(i=>GUN_ADLARI[i]).join(", ");
  const saat = (k.saatBas && k.saatBit) ? k.saatBas+"–"+k.saatBit : "tüm gün";
  return gun + " · " + saat;
}
/* JS getDay: 0=Paz..6=Cmt → bizim 0=Pzt indeksine çevir */
function bugunIndeks(){ const d=new Date().getDay(); return d===0?6:d-1; }
function suankiDakika(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function saatDakika(hhmm){ if(!hhmm) return null; const p=hhmm.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
/* Kampanya şu an aktif mi? (gün+saat) */
function kampanyaAktifMi(k){
  if(!k.aktif) return false;
  // gün kontrolü
  if(k.gunler && k.gunler.length>0 && !k.gunler.includes(bugunIndeks())) return false;
  // saat kontrolü
  const bas=saatDakika(k.saatBas), bit=saatDakika(k.saatBit), simdi=suankiDakika();
  if(bas!=null && bit!=null){
    if(bas<=bit){ if(simdi<bas||simdi>bit) return false; }
    else { if(simdi<bas && simdi>bit) return false; }  // gece aşan aralık
  }
  return true;
}
/* Bir ürün+şube+kanal için geçerli aktif kampanya (varsa en iyisini döner) */
function urunKampanya(ad, sube, kanal){
  const adaylar = KAMPANYALAR.filter(k=>
    k.urun===ad && k.kanal===kanal && kampanyaAktifMi(k) &&
    (k.subeler==="hepsi" || (Array.isArray(k.subeler)&&k.subeler.includes(sube)))
  );
  if(adaylar.length===0) return null;
  // birden fazla varsa en düşük fiyatı veren kazansın
  return adaylar[0];
}
/* Bir ürünün bir şubedeki, bir kanaldaki NİHAİ fiyat bilgisi (kampanya dahil) */
function urunFiyatBilgi(ad, sube, kanal){
  sube = sube || AKTIF_SUBE;
  kanal = kanal || "masa";
  const p = DEMO_PRODUCTS.find(x=>x.ad===ad);
  const tavMasa = p ? (p.fiyat||0) : 0;
  const tavEve = (p && p.fiyatEve!=null && p.fiyatEve>0) ? p.fiyatEve : tavMasa;  // eve tavsiye yoksa masa tavsiye
  const masaK = fiyatKayit(sube, ad, "masa");
  const masaGenel = (masaK.genel!=null && masaK.genel>0) ? masaK.genel : tavMasa;
  let k, genel;
  if(kanal==="eve"){
    k = fiyatKayit(sube, ad, "eve");
    // şube eve fiyatı > şube masa fiyatı girilmişse o > tavsiye eve
    genel = (k.genel!=null && k.genel>0) ? k.genel : ((masaK.genel!=null && masaK.genel>0) ? masaGenel : tavEve);
  } else {
    k = masaK; genel = masaGenel;
  }
  // KAMPANYA uygula
  const kmp = urunKampanya(ad, sube, kanal);
  let gecerli = genel, indOran = 0, aciklama = "", kampanyaAd = "";
  if(kmp){
    if(kmp.tip==="oran"){ indOran = kmp.deger; gecerli = Math.round(genel*(1-indOran/100)); }
    else { gecerli = kmp.deger; indOran = genel>0?Math.round((1-kmp.deger/genel)*100):0; }
    if(gecerli<0) gecerli=0;
    aciklama = kmp.ad; kampanyaAd = kmp.ad;
  }
  const indirimli = !!kmp && gecerli<genel;
  const kapali = fiyatKapaliMi(k.kapali);
  return { genel, eski:genel, gecerli, indirimli, indOran, aciklama, kampanyaAd, kapali };
}
/* Ürün-kanal kapatma kaydı aktif mi? (true=sürekli ya da {tip,...} süreli) */
function fiyatKapaliMi(kayit){
  if(!kayit) return false;
  if(kayit===true) return true;                 // eski format: sürekli
  if(kayit.tip==="surekli") return true;
  if(kayit.tip==="sure") return Date.now() < kayit.bitis;
  if(kayit.tip==="tarih"){
    const bugun=new Date(); bugun.setHours(0,0,0,0);
    return bugun <= new Date(kayit.deger+"T23:59:59");
  }
  if(kayit.tip==="saat") return suankiDakika() < saatDakika(kayit.deger);
  return false;
}
/* Kapatma durum metni (fiyat) */
function fiyatKapaliMetin(kayit){
  if(!kayit) return "";
  if(kayit===true || kayit.tip==="surekli") return "sürekli kapalı";
  if(kayit.tip==="sure") return new Date(kayit.bitis).toLocaleString('tr',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+"'e kadar";
  if(kayit.tip==="tarih") return kayit.deger+" tarihine kadar";
  if(kayit.tip==="saat") return "bugün "+kayit.deger+"'e kadar";
  return "";
}
/* Satışta gösterilecek nihai fiyat */
function urunGecerliFiyat(ad, sube, kanal){ return urunFiyatBilgi(ad, sube, kanal).gecerli; }
/* QR servis tipine göre kanal belirle */
function aktifKanal(){ return (QR && QR.servis==="eve") ? "eve" : "masa"; }


let OPTION_CLOSED = {};   // { "Minipan (14 Adet)|3|5": true }  — tek üründe manuel kapatma
let SEC_KAPALI = {};      // { "Çilek": {tip:"surekli"|"tarih"|"saat", deger:"2026-07-01"|"18:30"} } — ada göre merkezi kapatma
let FORCE_OPEN = {};      // müdür stok 0 iken zorla açtı → stok eksiye düşebilir
let FORCE_LOG = [];       // { urun, secenek, kim, zaman } denetim kaydı

function optKey(urun, gi, si){ return urun+"|"+gi+"|"+si; }

/* Bir sonraki 09:00'un zaman damgası (şu an 09:00'dan önceyse bugün, sonraysa yarın) */
function sonraki0900(){
  const simdi = new Date();
  const hedef = new Date();
  hedef.setHours(9,0,0,0);
  if(simdi >= hedef) hedef.setDate(hedef.getDate()+1);  // 09:00 geçtiyse ertesi gün
  return hedef.getTime();
}
/* Bir seçenek ADI, belirli bir ŞUBEDE merkezi olarak kapalı mı?
   SEC_KAPALI[şube][ad] = {tip, ...}  ("hepsi" şubesi = tüm şubeler) */
function secAdiKapaliMi(ad, sube){
  sube = sube || AKTIF_SUBE;
  // "hepsi" (tüm şubeler) kapatması veya bu şubeye özel kapatma
  const kayit = (SEC_KAPALI["hepsi"] && SEC_KAPALI["hepsi"][ad]) || (SEC_KAPALI[sube] && SEC_KAPALI[sube][ad]);
  if(!kayit) return false;
  return kapatmaAktifMi(kayit, SEC_KAPALI["hepsi"]&&SEC_KAPALI["hepsi"][ad]?"hepsi":sube, ad);
}
function kapatmaAktifMi(k, sube, ad){
  if(k.tip==="surekli") return true;
  if(k.tip==="sure"){
    if(Date.now() >= k.bitis){ if(SEC_KAPALI[sube]) delete SEC_KAPALI[sube][ad]; return false; }
    return true;
  }
  if(k.tip==="tarih"){
    const bugun = new Date(); bugun.setHours(0,0,0,0);
    return bugun <= new Date(k.deger+"T23:59:59");
  }
  if(k.tip==="saat"){ return suankiDakika() < saatDakika(k.deger); }
  return false;
}
/* Kapatma durumunun okunur metni (şube bazlı) */
function secKapaliMetin(ad, sube){
  sube = sube || AKTIF_SUBE;
  const hepsiVar = SEC_KAPALI["hepsi"] && SEC_KAPALI["hepsi"][ad];
  const k = hepsiVar || (SEC_KAPALI[sube] && SEC_KAPALI[sube][ad]);
  if(!k) return "";
  const kapsamEk = hepsiVar ? " (tüm şubeler)" : "";
  if(k.tip==="surekli") return "sürekli kapalı"+kapsamEk;
  if(k.tip==="sure"){
    const bitisStr = new Date(k.bitis).toLocaleString('tr',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    return bitisStr+"'e kadar kapalı"+kapsamEk;
  }
  if(k.tip==="tarih") return k.deger+" tarihine kadar kapalı"+kapsamEk;
  if(k.tip==="saat") return "bugün "+k.deger+"'e kadar kapalı"+kapsamEk;
  return "";
}

/* Seçenek stok açısından yapılabilir mi? (reçetedeki her hammadde yeterli mi) */
function secenekStokYeterli(sec){
  if(!sec.recete || !sec.recete.length) return true;
  return sec.recete.every(r=> !STOCK[r.ing] || STOCK[r.ing].mevcut >= r.g);
}

/* Seçenek kapalı mı? (manuel VEYA otomatik stok)
   Müdür force-open yaptıysa stok kapatması geçersiz olur. */
function secenekKapali(urun, gi, si, sec, sube){
  const k = optKey(urun,gi,si);
  if(OPTION_CLOSED[k]) return "manuel";
  // merkezi seçenek-adı kapatması (ada göre, şube bazlı)
  if(sec && secAdiKapaliMi(sec.ad, sube)) return "merkez";
  if(FORCE_OPEN[k]) return false;              // müdür zorla açtı
  if(!secenekStokYeterli(sec)) return "stok";
  return false;
}

/* Manuel aç/kapa — kasa + müdür yetkili */
function toggleSecenekKapat(urun, gi, si){
  const sec = PRODUCT_OPTIONS[urun][gi].secenekler[si];
  const ad = sec.ad;
  const sube = AKTIF_SUBE;  // kasanın çalıştığı şube
  if(secAdiKapaliMi(ad, sube)){
    // açık duruma getir — bu şubenin kaydını sil (hepsi kaydı varsa ona dokunma)
    if(SEC_KAPALI[sube]) delete SEC_KAPALI[sube][ad];
    note("✓ "+ad+" açıldı ("+sube+")");
  } else {
    // ertesi gün 09:00'a kadar, SADECE bu şubede
    if(!SEC_KAPALI[sube]) SEC_KAPALI[sube]={};
    SEC_KAPALI[sube][ad] = { tip:"sure", bitis: sonraki0900() };
    const saat = new Date(sonraki0900()).toLocaleString('tr',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    note("⛔ "+ad+" kapatıldı ("+sube+") — "+saat+"'e kadar");
  }
  menuKaydet();
  renderOptionModal();
}

/* Stok 0 seçeneği zorla aç — SADECE MÜDÜR/GENEL · stok eksiye düşebilir · loglanır */
function forceOpenSecenek(urun, gi, si){
  if(state.role!=="mudur" && state.role!=="genel") return;  // yetki kontrolü
  const k = optKey(urun,gi,si);
  if(FORCE_OPEN[k]){
    delete FORCE_OPEN[k];                       // geri al
  } else {
    FORCE_OPEN[k]=true;
    const sec = PRODUCT_OPTIONS[urun][gi].secenekler[si];
    FORCE_LOG.push({urun, secenek:sec.ad, kim:ROLES[state.role].ad, zaman:new Date().toLocaleTimeString('tr')});
    note("⚠ "+sec.ad+" zorla açıldı — stok eksiye düşebilir (loglandı)");
  }
  renderOptionModal();
}

/* Stok kapatma modu aç/kapa (kasa + müdür) */
function toggleKapatMod(){
  OPT_STATE.kapatMod = !OPT_STATE.kapatMod;
  renderOptionModal();
}

/* Ürün satılabilir mi? Kanal bazlı satışa kapalı DEĞİL + manuel pasif DEĞİL + stok yeterli */
function urunSatilabilir(p, kanal, sube){
  if(!p.aktif) return false;
  sube = sube || (typeof QR!=="undefined" && QR && QR.sube ? QR.sube : AKTIF_SUBE);
  // fiyat yönetiminden bu kanalda satışa kapatıldı mı
  const fb = urunFiyatBilgi(p.ad, sube, kanal||"masa");
  if(fb.kapali) return false;
  const recipe = RECIPES[p.ad];
  if(!recipe) return true;
  return recipe.every(r=> !STOCK[r.ing] || STOCK[r.ing].mevcut >= r.g);
}
function addToCart(idx){
  const p = DEMO_PRODUCTS[idx];
  const fiyat = urunGecerliFiyat(p.ad);   // indirim/şube fiyatı uygulanmış
  const opts = PRODUCT_OPTIONS[p.ad];
  if(opts && opts.length){
    openOptionModal(idx);          // opsiyonlu ürün → modal aç
  } else if(state.kasaPaket){
    // kasa paket sepetine ekle
    state.kasaPaket.sepet.push({ad:p.ad, fiyat:fiyat, secimler:[], kcal:urunTemelKcal(p.ad)});
    note(p.ad+" → 🥡 Paket sepeti");
    go("satis");
  } else if(state.kasaEkle){
    // kasa masa sepetine ekle (geçici, gönderince tek fiş)
    if(!state.kasaEkle.sepet) state.kasaEkle.sepet=[];
    state.kasaEkle.sepet.push({ad:p.ad, fiyat:fiyat, secimler:[], paket:false, kcal:urunTemelKcal(p.ad)});
    note(p.ad+" → sepet ("+state.kasaEkle.kisi+")");
    go("satis");
  } else {
    // opsiyonsuz ürün → direkt adisyona
    state.cart.push({ad:p.ad, fiyat:fiyat, q:1, secimler:[], ekstraRecete:[], kcal:urunTemelKcal(p.ad)});
    go("satis");
  }
}

let OPT_STATE = null;
function openOptionModal(idx){
  const p = DEMO_PRODUCTS[idx];
  // secim[gi] = { si: adet }  (zorunluda adet hep 1, isteğe bağlıda artırılabilir)
  OPT_STATE = { idx:idx, p:p, secim:{}, not:"" };
  PRODUCT_OPTIONS[p.ad].forEach((grup,gi)=>{
    OPT_STATE.secim[gi] = {};
    // zorunlu + min=1 + max=1 + istemiyorum YOKsa → ilk seçeneği varsayılan seç
    if(grup.tip==="zorunlu" && grup.min>=1 && grup.max===1){
      const istIdx = grup.secenekler.findIndex(s=>secIstemiyorum(s));
      const ilk = istIdx===0 ? (grup.secenekler.length>1?1:0) : 0;
      OPT_STATE.secim[gi][ilk] = 1;
    }
  });
  renderOptionModal();
  document.getElementById("optModal").classList.add("on");
  qrSepetBarGizle(true);
}
function closeOpt(){ document.getElementById("optModal").classList.remove("on"); OPT_STATE=null; qrSepetBarGizle(false); }
/* Sabit sepet bar'ı geçici gizle/göster (modal açılınca örtmesin) */
function qrSepetBarGizle(gizle){
  const bar=document.getElementById("qrSepetBarSabit");
  if(bar) bar.style.display = gizle ? "none" : "flex";
}
/* Mevcut bir kaleme seçenek ekle (kasa/mutfak/müdür) — opsiyon modalını ekleme modunda aç */
function kalemSecenekEkle(masaNo, kalemId, kaynak){
  const it = (function(){
    const s=SESSIONS[masaNo]; if(!s) return null;
    for(const k of s.kisiler) for(const x of k.kalemler) if(x.id===kalemId) return x;
    return null;
  })();
  if(!it){ note("Kalem bulunamadı"); return; }
  const idx = DEMO_PRODUCTS.findIndex(p=>p.ad===it.ad);
  if(idx<0 || !(PRODUCT_OPTIONS[it.ad]||[]).length){ note("Bu ürünün seçeneği yok"); return; }
  const p = DEMO_PRODUCTS[idx];
  OPT_STATE = { idx:idx, p:p, secim:{}, not:"", ekleHedef:{masaNo, kalemId, kaynak} };
  // ekleme modunda hiçbir şey önseçili gelmesin (sadece eklenmek istenenler)
  PRODUCT_OPTIONS[p.ad].forEach((grup,gi)=>{ OPT_STATE.secim[gi]={}; });
  renderOptionModal();
  document.getElementById("optModal").classList.add("on");
}
/* "İstemiyorum" tipi seçenek mi? (Türkçe İ/I duyarlı) */
function secIstemiyorum(sec){
  const t = (sec.ad||"").toLocaleLowerCase("tr-TR");
  return t.includes("istemiyorum");
}
/* Bir grupta toplam seçili adet */
function grupSecimSayisi(gi){
  const m = OPT_STATE.secim[gi]||{};
  return Object.values(m).reduce((a,b)=>a+b,0);
}

/* Zorunlu grupta seçenek seç (radio veya çoklu min/max) */
function toggleOpt(gi, si){
  const grup = PRODUCT_OPTIONS[OPT_STATE.p.ad][gi];
  const sec = grup.secenekler[si];
  if(!secIstemiyorum(sec) && secenekKapali(OPT_STATE.p.ad, gi, si, sec)) return;
  const m = OPT_STATE.secim[gi];

  if(grup.max===1){
    // tek seçim (radio) — istemiyorum dahil
    OPT_STATE.secim[gi] = { [si]:1 };
    renderOptionModal(); return;
  }
  // çoklu zorunlu (min-max)
  if(secIstemiyorum(sec)){ OPT_STATE.secim[gi] = { [si]:1 }; renderOptionModal(); return; }
  // istemiyorum seçiliyse kaldır
  const istIdx = grup.secenekler.findIndex(s=>secIstemiyorum(s));
  if(istIdx>=0 && m[istIdx]) delete m[istIdx];
  if(m[si]) delete m[si];
  else { if(grupSecimSayisi(gi) < (grup.max||99)) m[si]=1; }
  renderOptionModal();
}
/* İsteğe bağlı grupta adet değiştir (+/-) */
function optAdet(gi, si, delta){
  const grup = PRODUCT_OPTIONS[OPT_STATE.p.ad][gi];
  const sec = grup.secenekler[si];
  if(delta>0 && !secIstemiyorum(sec) && secenekKapali(OPT_STATE.p.ad, gi, si, sec)) return;
  // max limit (isteğe bağlıda da geçerli; 99 = sınırsız)
  if(delta>0 && grup.max && grup.max<99 && grupSecimSayisi(gi)>=grup.max){
    note("En fazla "+grup.max+" adet seçebilirsiniz"); return;
  }
  const m = OPT_STATE.secim[gi];
  const yeni = (m[si]||0)+delta;
  if(yeni<=0) delete m[si];
  else m[si]=yeni;
  renderOptionModal();
}

/* Zorunlu kurallar sağlandı mı? */
function optGecerli(){
  const gruplar = PRODUCT_OPTIONS[OPT_STATE.p.ad];
  const urun = OPT_STATE.p.ad;
  const optSube = OPT_STATE.qr ? (QR.sube||AKTIF_SUBE) : AKTIF_SUBE;
  return gruplar.every((grup,gi)=>{
    if(grup.tip!=="zorunlu") return true;   // isteğe bağlı her zaman geçerli
    const m = OPT_STATE.secim[gi]||{};
    // kapalı seçili varsa geçersiz
    const kapaliSecili = Object.keys(m).some(si=>{
      const sec=grup.secenekler[si];
      return !secIstemiyorum(sec) && secenekKapali(urun,gi,+si,sec,optSube);
    });
    if(kapaliSecili) return false;
    const n = grupSecimSayisi(gi);
    return n>=(grup.min||0) && n<=(grup.max||99);
  });
}
/* Bir grubun bir seçeneğinin geçerli ek fiyatı — grup ücretsizse 0 */
function grupEk(grup, si){
  if(!grup || grup.ucretsiz) return 0;
  const s = (grup.secenekler||[])[si];
  return s ? (s.ek||0) : 0;
}
/* Ürünün temel kalorisi (seçeneksiz, kendi kalorisi) */
function urunTemelKcal(urunAd){
  const p = DEMO_PRODUCTS.find(x=>x.ad===urunAd);
  return p && p.kcal ? (parseInt(p.kcal)||0) : 0;
}
/* Seçili opsiyonların toplam ek fiyatı (adet × ek) */
function optEkFiyat(){
  let ek=0;
  PRODUCT_OPTIONS[OPT_STATE.p.ad].forEach((grup,gi)=>{
    const m = OPT_STATE.secim[gi]||{};
    Object.entries(m).forEach(([si,adet])=>{ ek += grupEk(grup, si)*adet; });
  });
  return ek;
}
/* Seçili opsiyonların toplam kcal'i (adet × kcal) */
function optToplamKcal(){
  let kc=0;
  PRODUCT_OPTIONS[OPT_STATE.p.ad].forEach((grup,gi)=>{
    const m = OPT_STATE.secim[gi]||{};
    Object.entries(m).forEach(([si,adet])=>{
      const sec=grup.secenekler[si];
      if(sec && !secIstemiyorum(sec)) kc += (sec.kcal||0)*adet;
    });
  });
  return kc;
}

function renderOptionModal(){
  const p = OPT_STATE.p;
  const gruplar = PRODUCT_OPTIONS[p.ad];
  // accordion açık-kapalı state (ilk açılışta: ilk zorunlu grup açık)
  if(!OPT_STATE.acik){
    OPT_STATE.acik = {};
    const ilkZorunlu = gruplar.findIndex(g=>g.tip!=="istege");
    if(ilkZorunlu>=0) OPT_STATE.acik[ilkZorunlu]=true;
  }
  const optKanal = OPT_STATE.qr ? aktifKanal() : "masa";
  const optSube = OPT_STATE.qr ? (QR.sube||AKTIF_SUBE) : AKTIF_SUBE;
  let html = '<div class="opt-head"><span class="opt-emoji">'+p.emoji+'</span>'+
    '<div><div class="opt-name">'+p.ad+'</div><div class="opt-base">'+urunGecerliFiyat(p.ad, optSube, optKanal)+' ₺ taban</div></div>'+
    (OPT_STATE.qr || OPT_STATE.garson ? '' : '<button class="opt-kapat-mod'+(OPT_STATE.kapatMod?' on':'')+'" onclick="toggleKapatMod()" title="Seçenek kapat/aç">'+
    (OPT_STATE.kapatMod?'✓ Düzenleniyor':'⚙ Stok')+'</button>')+
    '<button class="opt-x" onclick="closeOpt()">✕</button></div>'+
    (OPT_STATE.kapatMod?'<div class="kapat-bilgi">Tükenen malzemeyi kapat — müşteri kalan seçeneklerle devam eder. Tekrar dokun: aç.</div>':'')+
    '<div class="opt-body">';

  // grupları tip'e göre ayır (orijinal index korunarak)
  const zorunluGruplar = [];
  const istegeGruplar = [];
  gruplar.forEach((grup,gi)=>{
    if(grup.tip==="istege") istegeGruplar.push({grup,gi});
    else zorunluGruplar.push({grup,gi});
  });

  const ekModu = !!(OPT_STATE.ekleHedef);
  // ZORUNLU SEÇİMLER bölümü
  if(zorunluGruplar.length>0){
    html += '<div class="opt-bolum-baslik">'+(ekModu?'Seçenekler':'Zorunlu Seçimler')+'</div>';
    zorunluGruplar.forEach(({grup,gi})=> html += optGrupAccordionHtml(p, grup, gi));
  }
  // İSTEĞE BAĞLI SEÇİMLER bölümü
  if(istegeGruplar.length>0){
    html += '<div class="opt-bolum-baslik">'+(ekModu?'Ek Seçenekler':'İsteğe Bağlı Seçimler')+'</div>';
    istegeGruplar.forEach(({grup,gi})=> html += optGrupAccordionHtml(p, grup, gi));
  }

  // not alanı
  html += '<div class="opt-not-alan"><div class="opt-not-h">Not</div>'+
          '<textarea class="opt-not" placeholder="Bu ürünle ilgili notunu buradan iletebilirsin." '+
          'oninput="OPT_STATE.not=this.value">'+(OPT_STATE.not||'')+'</textarea></div>';
  html += '</div>';
  const ekleModu = !!(OPT_STATE.ekleHedef);
  // ekleme modunda zorunlu zorlaması yok — en az 1 seçim yeterli
  let secimSayisi=0;
  gruplar.forEach((grup,gi)=>{ secimSayisi += grupSecimSayisi(gi); });
  const gecerli = ekleModu ? (secimSayisi>0) : optGecerli();
  const toplam = urunGecerliFiyat(p.ad, optSube, optKanal) + optEkFiyat();
  const toplamKcal = (ekleModu ? 0 : urunTemelKcal(p.ad)) + optToplamKcal();
  html += '<div class="opt-foot">'+
    '<div class="opt-toplam"><div class="ot-l">'+(ekleModu?'Eklenecek':'Toplam')+(toplamKcal>0?' <span class="opt-kcal">🔥 '+toplamKcal+' kcal</span>':'')+'</div><div class="ot-v">'+(ekleModu?'+'+optEkFiyat():toplam)+' ₺</div></div>'+
    '<button class="btn btn-primary" '+(gecerli?'':'disabled style="opacity:.4;pointer-events:none"')+' onclick="confirmOpt()">'+
    (ekleModu ? (gecerli?'+ Seçeneği ekle':'Seçenek seçin') : (gecerli?'Sepete ekle':'Zorunlu alanı seç'))+'</button></div>';
  const inner = document.getElementById("optModalInner");
  const body = inner.querySelector(".opt-body");
  const scrollY = body ? body.scrollTop : 0;
  inner.innerHTML = html;
  const yeniBody = inner.querySelector(".opt-body");
  if(yeniBody && scrollY) yeniBody.scrollTop = scrollY;
}

/* Tek bir grubun accordion (dropdown) HTML'i */
function optGrupAccordionHtml(p, grup, gi){
  const m = OPT_STATE.secim[gi]||{};
  const n = grupSecimSayisi(gi);
  const istege = grup.tip==="istege";
  const acik = OPT_STATE.kapatMod ? true : !!OPT_STATE.acik[gi];
  // özet (kapalıyken başlıkta seçili olanları göster)
  const secililer = [];
  Object.entries(m).forEach(([si,adet])=>{
    const sec=grup.secenekler[si];
    if(sec) secililer.push(adet>1 ? sec.ad+" ×"+adet : sec.ad);
  });
  // zorunlu eksikse uyarı işareti
  const eksik = !istege && n<(grup.min||0);
  let durumRozet="";
  if(istege){
    if(grup.max && grup.max<99) durumRozet='<span class="oga-rozet">en fazla '+grup.max+'</span>';
  } else if(grup.max===1){
    durumRozet='<span class="oga-rozet zor">zorunlu</span>';
  } else {
    durumRozet='<span class="oga-rozet zor">'+(grup.min>0?grup.min+'-':'')+grup.max+' seç</span>';
  }

  let html = '<div class="opt-acc'+(acik?' acik':'')+(eksik?' eksik':'')+'">';
  // başlık (tıklanınca aç/kapa)
  html += '<button class="opt-acc-bas" '+(OPT_STATE.kapatMod?'':'onclick="optAccTogle('+gi+')"')+'>'+
    '<span class="oga-ad">'+grup.ad+'</span>'+
    '<span class="oga-sag">'+
      (secililer.length>0 && !acik ? '<span class="oga-secili">'+secililer.join(", ")+'</span>' : durumRozet)+
      (OPT_STATE.kapatMod?'':'<span class="oga-ok">⌄</span>')+
    '</span></button>';
  // içerik (açıkken)
  if(acik){
    html += '<div class="opt-acc-ic">';
    grup.secenekler.forEach((sec,si)=>{
      html += optSecenekHtml(p, grup, gi, sec, si, m, n, istege);
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}
function optAccTogle(gi){
  OPT_STATE.acik[gi] = !OPT_STATE.acik[gi];
  renderOptionModal();
}

/* Tek bir seçeneğin HTML'i (zorunlu/isteğe bağlı/kapatma moduna göre) */
function optSecenekHtml(p, grup, gi, sec, si, m, n, istege){
  const adet = m[si]||0;
  const secili = adet>0;
  const ekDeger = grup.ucretsiz ? 0 : (sec.ek||0);
  const fiyatTxt = ekDeger ? '+'+ekDeger+' ₺' : '';
  const kcalTxt = (sec.kcal && !secIstemiyorum(sec)) ? '🔥 '+sec.kcal : '';
  const ist = secIstemiyorum(sec) ? ' opt-ist' : '';
  const optSube = OPT_STATE.qr ? (QR.sube||AKTIF_SUBE) : AKTIF_SUBE;
  const kapali = secIstemiyorum(sec) ? false : secenekKapali(p.ad, gi, si, sec, optSube);

  if(OPT_STATE.kapatMod && !secIstemiyorum(sec)){
    const manuelKapali = secAdiKapaliMi(sec.ad, optSube);
    const kapaliMetin = manuelKapali ? secKapaliMetin(sec.ad, optSube) : "";
    const stokKapali = !secenekStokYeterli(sec);
    const forceAcik = FORCE_OPEN[optKey(p.ad,gi,si)];
    const mudurMu = state.role==="mudur" || state.role==="genel";
    let forceBtn = '';
    if(stokKapali && mudurMu && !manuelKapali){
      forceBtn = '<span class="force-btn'+(forceAcik?' on':'')+'" onclick="event.stopPropagation();forceOpenSecenek(\''+p.ad.replace(/'/g,"\\'")+'\','+gi+','+si+')">'+
                 (forceAcik?'✓ açık (eksiye düşer)':'yine de aç')+'</span>';
    }
    return '<button class="opt-sec opt-kapat-row'+(manuelKapali?' kapali':'')+'" onclick="toggleSecenekKapat(\''+p.ad.replace(/'/g,"\\'")+'\','+gi+','+si+')">'+
            '<span class="kapat-tgl">'+(manuelKapali?'✕':'●')+'</span>'+
            '<span class="os-ad">'+sec.ad+'</span>'+
            (stokKapali&&!forceAcik?'<span class="kapat-etiket stok">stok 0</span>':'')+
            (forceAcik?'<span class="kapat-etiket force">zorla açık</span>':'')+
            (manuelKapali?'<span class="kapat-etiket">'+(kapaliMetin||'kapalı')+'</span>':'')+
            forceBtn+'</button>';
  } else if(istege){
    const kapaliCls = kapali ? ' opt-kapali' : '';
    const kapaliEt = kapali==='stok' ? '<span class="kapat-etiket stok">tükendi</span>'
                   : kapali==='merkez' ? '<span class="kapat-etiket stok">bugün yok</span>'
                   : kapali==='manuel' ? '<span class="kapat-etiket">bugün yok</span>' : '';
    return '<div class="opt-sec opt-adetli'+(secili?' on':'')+kapaliCls+'">'+
            '<span class="os-ad">'+sec.ad+'</span>'+kapaliEt+
            (kcalTxt?'<span class="os-kcal">'+kcalTxt+'</span>':'')+
            (fiyatTxt?'<span class="os-fiyat">'+fiyatTxt+'</span>':'')+
            '<span class="os-adet-kontrol">'+
              (secili?'<button class="osa-btn" onclick="optAdet('+gi+','+si+',-1)">−</button><span class="osa-n">'+adet+'</span>':'')+
              '<button class="osa-btn osa-art'+(kapali?' opt-disabled':'')+'" onclick="optAdet('+gi+','+si+',1)">+</button>'+
            '</span></div>';
  } else {
    const tekli = grup.max===1;
    const dolu = !tekli && !secili && !secIstemiyorum(sec) && n>=grup.max;
    const kapaliCls = kapali ? ' opt-kapali' : '';
    const kapaliEt = kapali==='stok' ? '<span class="kapat-etiket stok">tükendi</span>'
                   : kapali==='merkez' ? '<span class="kapat-etiket stok">bugün yok</span>'
                   : kapali==='manuel' ? '<span class="kapat-etiket">bugün yok</span>' : '';
    return '<button class="opt-sec'+(secili?' on':'')+ist+(dolu?' opt-disabled':'')+kapaliCls+'" onclick="toggleOpt('+gi+','+si+')">'+
            '<span class="os-mark '+(tekli?'radio':'check')+'">'+(secili?(tekli?'●':'✓'):'')+'</span>'+
            '<span class="os-ad">'+sec.ad+'</span>'+
            kapaliEt+
            (kcalTxt?'<span class="os-kcal">'+kcalTxt+'</span>':'')+
            (fiyatTxt?'<span class="os-fiyat">'+fiyatTxt+'</span>':'')+'</button>';
  }
}

/* Seçim onaylandı: fiyat + reçete ile sepete ekle */
function confirmOpt(){
  if(!(OPT_STATE&&OPT_STATE.ekleHedef) && !optGecerli()) return;
  const p = OPT_STATE.p;
  const gruplar = PRODUCT_OPTIONS[p.ad];
  const secimler=[]; const secimGruplu=[]; const ekstraRecete=[]; let ekFiyat=0;
  const secimEk=[];  // her secimler[] etiketinin ek fiyatı (silince düşmek için)
  const secimKcal=[]; let toplamKcal=0;  // her secimler[] etiketinin kcal'i (silince düşmek için)
  gruplar.forEach((grup,gi)=>{
    const m = OPT_STATE.secim[gi]||{};
    const grupSecimleri=[];
    Object.entries(m).forEach(([si,adet])=>{
      const sec=grup.secenekler[si];
      const birimEk = grupEk(grup, si);  // ücretsiz grupta 0
      const birimKcal = sec.kcal||0;
      if(!secIstemiyorum(sec)){
        const etiket = adet>1 ? sec.ad+" ×"+adet : sec.ad;
        secimler.push(etiket);
        secimEk.push(birimEk*adet);  // bu seçimin toplam ek fiyatı
        secimKcal.push(birimKcal*adet);  // bu seçimin toplam kcal'i
        grupSecimleri.push(etiket);
      }
      ekFiyat += birimEk*adet;
      toplamKcal += birimKcal*adet;
      if(sec.recete) sec.recete.forEach(r=>{ if(r.g>0) for(let q=0;q<adet;q++) ekstraRecete.push(r); });
    });
    if(grupSecimleri.length>0) secimGruplu.push({grup:grup.ad, secenekler:grupSecimleri});
  });
  const cKanal = OPT_STATE.qr ? aktifKanal() : "masa";
  const cSube = OPT_STATE.qr ? (QR.sube||AKTIF_SUBE) : AKTIF_SUBE;
  const yeniKalem = {
    ad:p.ad, fiyat:urunGecerliFiyat(p.ad, cSube, cKanal)+ekFiyat, q:1,
    secimler:secimler, secimEk:secimEk, secimKcal:secimKcal, kcal:urunTemelKcal(p.ad)+toplamKcal,
    secimGruplu:secimGruplu, ekstraRecete:ekstraRecete, not:OPT_STATE.not||""
  };
  // === MEVCUT KALEME SEÇENEK EKLEME (kasa/mutfak/müdür) ===
  if(OPT_STATE.ekleHedef){
    const {masaNo, kalemId, kaynak} = OPT_STATE.ekleHedef;
    if(secimler.length===0){ note("Seçenek seçilmedi"); closeOpt(); return; }
    const s=SESSIONS[masaNo];
    let hedef=null;
    if(s) for(const k of s.kisiler) for(const x of k.kalemler) if(x.id===kalemId) hedef=x;
    if(hedef){
      if(!hedef.secimler) hedef.secimler=[];
      if(!hedef.secimEk) hedef.secimEk=hedef.secimler.map(()=>0); // eski kalemlerde yoksa doldur
      if(!hedef.secimKcal) hedef.secimKcal=hedef.secimler.map(()=>0);
      secimler.forEach((et,i)=>{ hedef.secimler.push(et); hedef.secimEk.push(secimEk[i]||0); hedef.secimKcal.push(secimKcal[i]||0); });
      if(secimGruplu.length){ if(!hedef.secimGruplu) hedef.secimGruplu=[]; secimGruplu.forEach(g=>hedef.secimGruplu.push(g)); }
      if(ekstraRecete.length){ if(!hedef.ekstraRecete) hedef.ekstraRecete=[]; ekstraRecete.forEach(r=>hedef.ekstraRecete.push(r)); }
      hedef.fiyat = Math.round((hedef.fiyat + ekFiyat)*100)/100;
      hedef.kcal = (hedef.kcal||0) + toplamKcal;
    }
    // mutfağa bildirilecek değişiklik kaydı (eklenen seçenekler)
    if(hedef){
      const kisiAd=kalemKisiAd(masaNo, kalemId);
      degisiklikKaydet(masaNo, kisiAd, "secenekEkle", hedef.ad, secimler.join(", "));
    }
    closeOpt();
    note("Seçenek eklendi"+(ekFiyat>0?" · +"+tl(ekFiyat)+" ₺":""));
    ekranlariYenile(kaynak, masaNo);
    return;
  }
  if(OPT_STATE.qr){
    // QR menüden eklendi → müşteri sepetine
    QR.sepet.push(yeniKalem);
    closeOpt();
    const magP = urunMagPuan(p);
    if(magP>0) magKutlamaPop(magP); else note(p.ad+" eklendi");
    renderQR();
  } else if(OPT_STATE.garson){
    if(GARSON.paketModu){
      // garson paket sepetine ekle
      if(!GARSON.paketSepet) GARSON.paketSepet=[];
      GARSON.paketSepet.push({ad:yeniKalem.ad, fiyat:yeniKalem.fiyat, secimler:yeniKalem.secimler, secimGruplu:yeniKalem.secimGruplu});
      closeOpt();
      note(p.ad+" → Paket sepeti");
      renderGarson();
    } else {
      // Garson masa sepetine ekle (geçici, gönderince fiş)
      if(!GARSON.masaSepet) GARSON.masaSepet=[];

/* ============================================================
   HESAP BÖLME — öğrenci senaryosu
   4 mod: eşit · kişiye göre · ürüne göre · kesir (yarı-yarı)
   Ödeme bölünür ama reçete/tüketim ETKİLENMEZ (adet sabit).
   ============================================================ */
let BOL = null;

function hesapBolAc(total){
  if(total===0){ note("Adisyon boş"); return; }
  // Daha önce bölme başlatıldıysa kaldığı yerden devam et
  if(state.bolDurum && state.bolDurum.total===total){
    BOL = state.bolDurum;
  } else {
    BOL = {
      total: total,
      mod: "esit",
      kisiler: ["Ayşe","Mehmet","Can"],   // gerçekte oturum siparişlerinden
      atama: state.cart.map(()=>({})),
      odenenler: {},
    };
    state.bolDurum = BOL;   // adisyona bağlı kalıcı durum
  }
  renderBol();
  document.getElementById("bolModal").classList.add("on");
}
function bolKapat(){ document.getElementById("bolModal").classList.remove("on"); }
function bolMod(m){ BOL.mod=m; renderBol(); }

/* Ödememiş kişi sayısı */
function odenmemisSayisi(){
  return BOL.kisiler.filter((_,ki)=>!BOL.odenenler[ki]).length;
}

/* Tek kişi kalanın tümünü ödesin (toggle) */
function bolTumunuAl(ki){
  if(BOL.tekKisiKalan===ki) BOL.tekKisiKalan=undefined;  // geri al → moda dön
  else BOL.tekKisiKalan=ki;
  renderBol();
}

/* Kişi ekle/çıkar/adlandır */
function bolKisiEkle(){
  if(Object.keys(BOL.odenenler).length>0){ note("Ödeme başladı — kişi değiştirilemez"); return; }
  if(BOL.kisiler.length>=10){ note("En fazla 10 kişi"); return; }
  BOL.kisiler.push("Kişi "+(BOL.kisiler.length+1));
  renderBol();
}
function bolKisiCikar(ki){
  if(Object.keys(BOL.odenenler).length>0){ note("Ödeme başladı — kişi değiştirilemez"); return; }
  if(BOL.kisiler.length<=1){ note("En az 1 kişi olmalı"); return; }
  BOL.kisiler.splice(ki,1);
  // o kişinin ödemesi ve ürün atamalarını temizle
  delete BOL.odenenler[ki];
  BOL.odenenler = Object.fromEntries(Object.entries(BOL.odenenler).map(([k,v])=>[+k>ki?+k-1:+k,v]).filter(([k])=>k!==ki));
  BOL.atama.forEach(at=>{ delete at[ki]; });
  renderBol();
}
function bolKisiAdla(ki, ad){
  BOL.kisiler[ki] = ad || ("Kişi "+(ki+1));
}

/* Kişi başına düşen tutarları hesapla (moda göre)
   ÖNEMLİ: Ödenmiş kişilerin payı SABİT (ödediği tutar).
   Kalan tutar yalnızca ÖDEMEMİŞ kişiler arasında bölünür. */
function bolHesapla(){
  const n = BOL.kisiler.length;
  const paylar = BOL.kisiler.map(()=>0);

  // Ödenmiş kişiler → ödedikleri tutarı sabitle
  let odenenToplam = 0;
  const odemeyenler = [];
  BOL.kisiler.forEach((_,ki)=>{
    if(BOL.odenenler[ki]){
      paylar[ki] = BOL.odenenler[ki].tutar;
      odenenToplam += BOL.odenenler[ki].tutar;
    } else {
      odemeyenler.push(ki);
    }
  });
  const kalan = +(BOL.total - odenenToplam).toFixed(2);
  const m = odemeyenler.length;   // ödememiş kişi sayısı
  if(m===0) return paylar;        // herkes ödedi

  // "Tek kişi tüm kalanı" override
  if(BOL.tekKisiKalan!==undefined && odemeyenler.includes(BOL.tekKisiKalan)){
    odemeyenler.forEach(ki=>{ paylar[ki] = (ki===BOL.tekKisiKalan) ? kalan : 0; });
    return paylar;
  }

  if(BOL.mod==="esit" || BOL.mod==="kisi"){
    // kalanı ödememiş kişilere eşit böl (kişi modu da kalan-bazlıda eşit gibi davranır)
    const pay = Math.floor(kalan/m*100)/100;
    odemeyenler.forEach(ki=>paylar[ki]=pay);
    const fark = +(kalan - pay*m).toFixed(2);
    if(fark>0) paylar[odemeyenler[m-1]] = +(paylar[odemeyenler[m-1]]+fark).toFixed(2);
    return paylar;
  }
  if(BOL.mod==="urun" || BOL.mod==="kesir"){
    // ürün ataması olan kalan kişilere oranla; atanmamış kalan eşit
    let atanmamis = kalan;
    state.cart.forEach((c,ci)=>{
      const at = BOL.atama[ci];
      const tutar = c.fiyat*c.q;
      const kisiler = Object.keys(at).map(Number).filter(k=>odemeyenler.includes(k));
      if(kisiler.length>0){
        const toplamOran = kisiler.reduce((s,k)=>s+at[k],0);
        kisiler.forEach(k=>{ paylar[k] += tutar*(at[k]/toplamOran); });
        atanmamis -= tutar;
      }
    });
    // atanmamış kalanı ödememiş kişilere eşit dağıt
    if(atanmamis>0.01){
      const pay = atanmamis/m;
      odemeyenler.forEach(ki=>paylar[ki]+=pay);
    }
    return paylar;
  }
  return paylar;
}

/* Ürünü bir kişiye ata (ürün modu: tek kişi · kesir modu: birden çok, oranlı) */
function bolAta(ci, ki){
  const at = BOL.atama[ci];
  if(BOL.mod==="urun"){
    BOL.atama[ci] = (at[ki]!==undefined) ? {} : {[ki]:1};   // tek kişi, toggle
  } else { // kesir
    if(at[ki]!==undefined) delete at[ki];
    else at[ki]=1;                                          // eşit pay (yarı-yarı)
  }
  renderBol();
}

function renderBol(){
  const paylar = bolHesapla();
  const modlar = [
    {k:"esit", ad:"Eşit böl", ic:"➗"},
    {k:"kisi", ad:"Kişiye göre", ic:"👤"},
    {k:"urun", ad:"Ürüne göre", ic:"🍽️"},
    {k:"kesir", ad:"Paylaşımlı", ic:"½"},

  let html = '<div class="opt-head"><span class="opt-emoji">🧾</span>'+
    '<div><div class="opt-name">Hesabı böl</div><div class="opt-base">Toplam '+BOL.total+' ₺ · '+BOL.kisiler.length+' kişi</div></div>'+
    '<button class="opt-x" onclick="bolKapat()">✕</button></div>';
  // mod seçici
  html += '<div class="bol-modlar">';
  modlar.forEach(m=>{
    html += '<button class="bol-mod'+(BOL.mod===m.k?' on':'')+'" onclick="bolMod(\''+m.k+'\')">'+
            '<span class="bm-ic">'+m.ic+'</span>'+m.ad+'</button>';
  });
  html += '</div><div class="opt-body">';

  // Kişi yönetimi şeridi
  html += '<div class="bol-kisi-yonet"><div class="bky-baslik">Masadaki kişiler ('+BOL.kisiler.length+')</div>'+
          '<div class="bky-liste">';
  BOL.kisiler.forEach((kisi,ki)=>{
    html += '<div class="bky-kisi">'+
      '<input class="bky-ad" value="'+kisi.replace(/"/g,'&quot;')+'" onchange="bolKisiAdla('+ki+',this.value)">'+
      (BOL.kisiler.length>1?'<button class="bky-sil" onclick="bolKisiCikar('+ki+')">✕</button>':'')+
      '</div>';
  });
  html += '<button class="bky-ekle" onclick="bolKisiEkle()">+ Kişi ekle</button>';
  html += '</div></div>';

  // Ürün-bazlı modlarda: ürünleri kişilere atama arayüzü
  if(BOL.mod==="urun" || BOL.mod==="kesir"){
    html += '<div class="bol-aciklama">'+
      (BOL.mod==="urun" ? 'Her ürünü kime aitse ona ata.' : 'Paylaşılan ürüne birden çok kişi seç — eşit bölünür.')+
      '</div>';
    state.cart.forEach((c,ci)=>{
      html += '<div class="bol-urun"><div class="bol-urun-ad">'+c.ad+' <span>'+(c.fiyat*c.q)+' ₺</span></div>'+
              '<div class="bol-urun-kisiler">';
      BOL.kisiler.forEach((kisi,ki)=>{
        const secili = BOL.atama[ci][ki]!==undefined;
        html += '<button class="bol-kisi-btn'+(secili?' on':'')+'" onclick="bolAta('+ci+','+ki+')">'+kisi+'</button>';
      });
      html += '</div></div>';
    });
  }

  // Kişi payları (her modda görünür)
  html += '<div class="bol-paylar">';
  BOL.kisiler.forEach((kisi,ki)=>{
    const odendi = BOL.odenenler[ki];
    const yontemTxt = (odendi && odendi.yontem) ? ' · '+odendi.yontem : '';
    const tekKisiAktif = BOL.tekKisiKalan===ki;
    html += '<div class="bol-pay'+(odendi?' odendi':'')+'">'+
      '<div class="bol-pay-ad">'+(odendi?'✓ ':'')+kisi+
        (!odendi && odenmemisSayisi()>1 ? '<button class="bol-tumu'+(tekKisiAktif?' on':'')+'" onclick="bolTumunuAl('+ki+')">'+(tekKisiAktif?'✓ tümü':'tümünü al')+'</button>':'')+
      '</div>'+
      '<div class="bol-pay-sag">'+
        '<span class="bol-pay-tutar">'+paylar[ki].toFixed(2)+' ₺</span>'+
        (odendi?'<span class="bol-pay-durum">ödendi'+yontemTxt+'</span>'
               :'<button class="bol-pay-al" onclick="bolPayAl('+ki+','+paylar[ki].toFixed(2)+')">Al</button>')+
      '</div></div>';
  });
  html += '</div></div>';

  // Footer: tüm paylar ödendi mi
  const hepOdendi = BOL.kisiler.every((_,ki)=>BOL.odenenler[ki]);
  const odenenSayi = Object.keys(BOL.odenenler).length;
  html += '<div class="opt-foot">'+
    '<div class="opt-toplam"><div class="ot-l">'+odenenSayi+'/'+BOL.kisiler.length+' kişi ödedi</div>'+
    '<div class="ot-v">'+BOL.total+' ₺</div></div>'+
    '<button class="btn btn-primary" '+(hepOdendi?'':'disabled style="opacity:.4;pointer-events:none"')+
    ' onclick="bolTamamla()">'+(hepOdendi?'Adisyonu kapat':'Bekleyen ödeme var')+'</button></div>';
  document.getElementById("bolModalInner").innerHTML = html;
}

      } else {
        // Kod doğrulandı → Mag kullanım kontrolü açık
        const maxBoz = Math.min(m.mag, Math.floor(ob.tutar/SADAKAT.magTl));
        html += '<div class="od-bozdurma od-bz-acik">'+
          '<div class="od-bz-baslik">✓ Doğrulandı · '+SADAKAT.ad+' kullan ('+ob.kullanilanMag+'/'+maxBoz+')</div>'+
          '<div class="od-bz-kontrol">'+
            '<button class="od-bz-btn" onclick="odMagAyarla(-10)">−10</button>'+
            '<button class="od-bz-btn" onclick="odMagAyarla(-1)">−1</button>'+
            '<span class="od-bz-deger">'+ob.kullanilanMag+' '+SADAKAT.ad+'</span>'+
            '<button class="od-bz-btn" onclick="odMagAyarla(1)">+1</button>'+
            '<button class="od-bz-btn" onclick="odMagAyarla(10)">+10</button>'+
            '<button class="od-bz-max" onclick="odMagMax()">Max</button>'+
          '</div>'+
          (indirim>0?'<div class="od-bz-indirim">−'+indirim.toFixed(2)+' ₺ '+SADAKAT.ad+' indirimi</div>':'')+
        '</div>';
      }
    }
    html += '<div class="od-kazanc">Bu ödemeyle <strong>+'+kazanacak+' '+SADAKAT.ad+'</strong> kazanacak</div>';
    html += '</div>';
  }

  // TAHSİLAT
  html += '<div class="od-tahsil-baslik">Tahsil edilecek: <strong>'+tahsil.toFixed(2)+' ₺</strong>'+
          (indirim>0?' <s>'+ob.tutar.toFixed(2)+'</s>':'')+'</div>';
  const yontemler = [
    {k:"nakit", ad:"Nakit", ic:"💵"},{k:"kredi", ad:"Kredi Kartı", ic:"💳"},
    {k:"qr", ad:"QR Ödeme", ic:"📱"},
    {k:"diger", ad:"Diğer", ic:"⋯"},
  ];
  html += '<div class="oy-grid">';
  yontemler.forEach(y=>{
    html += '<button class="oy-btn" onclick="odemeTamamla(\''+y.k+'\',\''+y.ad+'\')">'+
            '<span class="oy-ic">'+y.ic+'</span><span class="oy-ad">'+y.ad+'</span></button>';
  });
  // tam puanla ödendiyse (tahsil 0) ayrı buton
  if(tahsil===0 && indirim>0){
    html += '<button class="oy-btn oy-tam" style="grid-column:1/-1" onclick="odemeTamamla(\'mag\',\''+SADAKAT.ad+' ile\')">'+
            '<span class="oy-ic">🎁</span><span class="oy-ad">Tamamı '+SADAKAT.ad+' ile</span></button>';
  }
  html += '</div></div>';
  document.getElementById("odemeModalInner").innerHTML = html;
}

/* Ödenecek tutara göre kazanılacak Mag (oran + ürün bonusu) */
function odKazanilacakMag(tutar, ki){
  // ürün bazlı: ödenen kişinin/sepetin ürünlerinin mag puanlarını topla
  let mag = 0;
  const kalemler = (ki && ki.kalemler) ? ki.kalemler : (state.cart||[]);
  kalemler.forEach(c=>{
    const p = DEMO_PRODUCTS.find(x=>x.ad===c.ad);
    const adet = c.adet || c.q || 1;
    mag += urunMagPuan(p) * adet;
  });
  // hiç ürün yoksa (veri eksik) orana düş
  if(mag===0 && tutar>0) mag = Math.round(tutar * SADAKAT.kazancOrani);
  return Math.round(mag);
}
/* Bir masa/kişi listesi için kazanılacak toplam Mag (ödeme ekranı) */
function magKazanimHesapla(kalemler){
  let mag=0;
  (kalemler||[]).forEach(c=>{
    const p=DEMO_PRODUCTS.find(x=>x.ad===c.ad);
    const adet=c.adet||c.q||1;
    mag += urunMagPuan(p)*adet;
  });
  return Math.round(mag);
}

  ob.kullanilanMag = Math.max(0, Math.min(maxBoz, ob.kullanilanMag + d));

}
