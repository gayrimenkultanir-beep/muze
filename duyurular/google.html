<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu</title>
    <style>
        /* Genel Stil */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            color: #1c1e21;
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
        }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 30px; }

        /* Duyuru Blok (Kart) Yapısı */
        .announcement-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* Görsel Alanı (600x400 Sabit Oran) */
        .img-wrapper {
            width: 100%;
            height: 400px; /* Görsel yüksekliği */
            background-color: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Resmi kutuya sığdırır ve keser */
            display: block;
        }

        /* İçerik Alanı */
        .content-wrapper {
            padding: 20px;
        }
        .date {
            color: #65676b;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #050505;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }
        .details {
            font-size: 1.05rem;
            color: #4b4b4b;
            line-height: 1.6;
            white-space: pre-line; /* Alt satırları korur */
        }

        /* Navigasyon */
        .btn-back { 
            display: inline-block; 
            margin-bottom: 20px; 
            text-decoration: none; 
            color: #1a73e8; 
            font-weight: bold; 
        }

        /* Mobil Ayar */
        @media (max-width: 600px) {
            .img-wrapper { height: 250px; }
            .title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← Geri Dön</a>
    <h2>Güncel Duyurular</h2>
    
    <div id="announcement-feed">
        <p style="text-align:center;">Veriler yükleniyor...</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    // Drive ID'sini temizleme fonksiyonu
    function getCleanId(url) {
        if (!url.includes('drive.google.com')) return url;
        let id = "";
        if (url.includes('id=')) {
            id = url.split('id=')[1].split('&')[0];
        } else {
            id = url.split('/d/')[1].split('/')[0];
        }
        return `https://drive.google.com/uc?export=view&id=${id}`;
    }

    Papa.parse(sheetCsvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            const feed = document.getElementById('announcement-feed');
            feed.innerHTML = ''; // Yükleniyor yazısını temizle

            if (data.length > 0) {
                data.forEach(row => {
                    // Sütun isimlerini Sheets dosyanıza göre kontrol edin (tarih, duyuru metni, detaylar, görsel1)
                    const tarih = row['tarih'] || '';
                    const baslik = row['duyuru metni'] || '';
                    const detay = row['detaylar'] || '';
                    const g1 = (row['görsel1'] || "").trim();

                    // Kart HTML yapısı
                    let cardHTML = `<div class="announcement-card">`;
                    
                    // Görsel varsa ekle
                    if (g1.startsWith('http')) {
                        const imgSrc = getCleanId(g1);
                        cardHTML += `
                            <div class="img-wrapper">
                                <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/600x400?text=Görsel+Yüklenemedi'">
                            </div>`;
                    }

                    cardHTML += `
                        <div class="content-wrapper">
                            <span class="date">${tarih}</span>
                            <div class="title">${baslik}</div>
                            <div class="details">${detay}</div>
                        </div>
                    </div>`;
                    
                    feed.innerHTML += cardHTML;
                });
            } else {
                feed.innerHTML = '<p style="text-align:center;">Henüz duyuru bulunmuyor.</p>';
            }
        }
    });
</script>

</body>
</html>
