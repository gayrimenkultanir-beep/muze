<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sultan II. Bayezid Külliyesi – Dijital Rehber</title>

  <!-- SENİN MEVCUT CSS DOSYAN -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- OVERLAY -->
<div id="ol"></div>

<!-- ================= INTRO ================= -->
<section id="intro" class="screen active">
  <div class="center">
    <h1>EŞİĞE DAVET</h1>
    <p>Sultan II. Bayezid Külliyesi’nin 500 yıllık şifa yolculuğuna hoş geldiniz.</p>

    <button data-action="startTour">🚶‍♂️ Yolculuğa Başla</button>
  </div>
</section>

<!-- ================= TOUR ================= -->
<section id="tour" class="screen">

  <!-- HEADER -->
  <header class="hdr">
    <button data-action="goToIntro">←</button>
    <h3 id="hTit">DURAK</h3>
    <button id="abtn" data-action="togAudio">🔊</button>
  </header>

  <!-- PROGRESS -->
  <div class="prog">
    <div id="pf"></div>
  </div>
  <div class="progtext">
    <span id="ppct">%0</span>
  </div>

  <!-- CONTENT -->
  <div id="tb"></div>

  <!-- NAV -->
  <div class="nav">
    <button data-action="prevStop">← Geri</button>
    <button id="bnxt" data-action="nextStop">İleri →</button>
  </div>

</section>

<!-- ================= ZİYARETÇİ DEFTERİ ================= -->
<section id="book" class="screen">

  <h2>🖋 Gönül Köprüsü</h2>

  <input id="bkn" placeholder="Ad Soyad">
  <input id="bkc" placeholder="Şehir">
  <textarea id="bkno" placeholder="Notunuz"></textarea>

  <button data-action="saveNote">Gönder</button>

  <div id="nl"></div>

  <div class="nav">
    <button data-action="goToIntro">Ana Sayfa</button>
  </div>

</section>

<!-- ================= ADMIN ================= -->
<section id="admin" class="screen">

  <div id="alg">
    <input id="ap" type="password" placeholder="Şifre">
    <button data-action="doLog">Giriş</button>
  </div>

  <div id="acon">
    <h2>Admin Panel</h2>
    <p>İstatistikler burada görünecek</p>
    <button data-action="doOut">Çıkış</button>
  </div>

</section>

<!-- ================= JS ================= -->

<script type="module" src="js/app.js"></script>

</body>
</html>
