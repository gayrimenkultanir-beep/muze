<!DOCTYPE html>

<title>Harita — Sultan II. Bayezid Külliyesi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg:      #f7f0e3;
  --surface: #ffffff;
  --border:  rgba(160,120,60,0.22);
  --gold:    #b8860b;
  --gold-br: #d4a017;
  --gold-lt: #e8c068;
  --ink:     #1c1408;
  --ink-mid: #4a3a1e;
  --ink-soft:#7a6040;
  --crimson: #8b1a1a;
  --teal:    #1e5f5f;
  --shadow:  0 4px 20px rgba(30,20,5,0.12);
  --font-d:  'Cormorant Garamond', Georgia, serif;
  --font-b:  'DM Sans', system-ui, sans-serif;
  --r:       10px;
}

*, *::before, *::after {
  box-sizing: border-box; margin:0; padding:0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width:100%; height:100%; overflow:hidden; position:fixed;
  top:0; left:0;
  font-family: var(--font-b);
  background: var(--bg); color: var(--ink);
}

#app {
  display:flex; flex-direction:column;
  width:100%; height:100%; height:100dvh;
}

/* ── Header ─ */
#header {
  flex-shrink:0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display:flex; align-items:center; gap:10px;
  box-shadow: var(--shadow);
  z-index:1000;
}

#back-btn {
  width:36px; height:36px; border-radius:50%;
  background:transparent; border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1rem; color:var(--ink-mid);
  flex-shrink:0; transition: all .18s;
  text-decoration:none;
}
#back-btn:hover { background:rgba(184,134,11,0.08); border-color:var(--gold); color:var(--gold); }

#header-text { flex:1; min-width:0; }

#header-title {
  font-family: var(--font-d);
  font-size: clamp(12px,3.5vw,16px);
  font-weight:700; color:var(--gold);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

#header-sub {
  font-size:9px; color:var(--ink-soft);
  letter-spacing:.14em; text-transform:uppercase; margin-top:1px;
}

/* Compass */
#compass-ring {
  width:38px; height:38px; border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; position:relative; overflow:hidden;
  box-shadow: var(--shadow);
}
#needle-wrap {
  position:absolute; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  transition: transform .3s ease;
}
#needle-wrap svg { width:24px; height:24px; }
#compass-deg {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  font-size:7px; color:var(--ink-soft); font-family:monospace;
  background: rgba(247,240,227,0.8); padding:0 2px; border-radius:2px;
}

/* ── Map ─ */
#map { flex:1; min-height:0; position:relative; z-index:1; }
.leaflet-tile { filter: sepia(.25) brightness(.95) saturate(.8); }
body.satellite .leaflet-tile { filter: brightness(.92) saturate(.9); }

/* User marker */
.u-wrap { display:flex; flex-direction:column; align-items:center; pointer-events:none; filter:drop-shadow(0 3px 10px rgba(0,0,0,.3)); }
.u-arrow { width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-bottom:24px solid var(--gold); animation:aPulse 2s infinite; }
.u-dot   { width:10px; height:10px; border-radius:50%; background:var(--gold-lt); border:2px solid #fff; margin-top:2px; box-shadow:0 0 8px rgba(184,134,11,.8); }
@keyframes aPulse { 0%,100%{filter:drop-shadow(0 0 4px rgba(184,134,11,.5))} 50%{filter:drop-shadow(0 0 14px rgba(184,134,11,1))} }

/* Overlays */
#tile-sw { position:absolute; top:10px; right:10px; z-index:500; display:flex; gap:5px; }
.tile-btn {
  padding:5px 10px; border-radius:var(--r); border:1.5px solid var(--border);
  background:rgba(247,240,227,.92); color:var(--ink-soft);
  font-size:10px; letter-spacing:.06em; cursor:pointer;
  backdrop-filter:blur(6px); transition:all .18s; font-family:var(--font-b);
}
.tile-btn.active { color:var(--gold); background:rgba(247,240,227,.98); border-color:var(--gold); }

#map-ctrl { position:absolute; top:48px; right:10px; z-index:500; display:flex; flex-direction:column; gap:5px; margin-top:5px; }
.mctrl {
  width:34px; height:34px; border-radius:var(--r);
  border:1.5px solid var(--border); background:rgba(247,240,227,.92);
  color:var(--gold); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(6px); transition:all .18s;
}
.mctrl:active { transform:scale(.94); }
.mctrl.active { background:rgba(184,134,11,.12); border-color:var(--gold); }

#hdg-label {
  position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
  z-index:500; background:rgba(247,240,227,.88); border:1.5px solid var(--border);
  border-radius:20px; padding:3px 12px;
  font-size:9px; color:var(--ink-soft); letter-spacing:.1em; text-transform:uppercase;
  white-space:nowrap; backdrop-filter:blur(6px);
}

/* ── Bottom panel ─ */
#bottom-panel {
  flex-shrink:0; background:var(--surface);
  border-top:1px solid var(--border);
  padding:10px 14px max(10px,env(safe-area-inset-bottom));
  z-index:1000; box-shadow:0 -4px 16px rgba(30,20,5,.08);
}

#loc-card {
  background: rgba(184,134,11,.06);
  border:1.5px solid var(--border);
  border-radius:var(--r); padding:8px 12px; margin-bottom:8px;
  min-height:54px; position:relative; overflow:hidden;
  transition:border-color .35s;
}
#loc-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--zone-color,transparent); border-radius:var(--r) 0 0 var(--r);
  transition:background .35s;
}

#loc-label { font-size:9px; letter-spacing:.18em; color:var(--ink-soft); text-transform:uppercase; margin-bottom:3px; }
#loc-name  { font-family:var(--font-d); font-size:clamp(12px,3.5vw,15px); color:var(--gold); line-height:1.3; transition:all .35s; }
#loc-name.outside { color:var(--ink-soft); font-size:11px; font-family:var(--font-b); font-style:italic; }
#loc-desc  { font-size:10px; color:var(--ink-mid); margin-top:2px; opacity:.8; font-style:italic; line-height:1.4; }

#controls { display:flex; gap:8px; align-items:center; }
#locate-btn {
  flex:1; background:linear-gradient(135deg,var(--gold),var(--gold-br));
  border:none; border-radius:var(--r); padding:11px 10px;
  font-family:var(--font-b); font-size:clamp(12px,3.5vw,14px);
  color:#fff; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  box-shadow:0 4px 16px rgba(184,134,11,.3);
  -webkit-appearance:none; transition:all .18s;
}
#locate-btn:active { transform:scale(.97); }
#locate-btn.tracking { background:linear-gradient(135deg,var(--teal),#2d8a8a); box-shadow:0 4px 16px rgba(30,95,95,.3); }

#sound-btn-map {
  width:42px; height:42px; border-radius:50%;
  background:var(--surface); border:1.5px solid var(--border);
  font-size:1.2rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow); transition:all .18s; flex-shrink:0;
  -webkit-appearance:none;
}
#sound-btn-map.muted { color:var(--ink-soft); }
#sound-btn-map:hover { border-color:var(--gold); }

#gps-status { font-size:9px; color:var(--ink-soft); margin-top:4px; letter-spacing:.06em; text-align:center; }

/* ── Legend ─ */
#legend-panel {
  position:absolute; bottom:0; left:0; right:0; z-index:800;
  background:var(--surface); border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:1rem 1rem 2rem;
  transform:translateY(100%); transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:60dvh; overflow-y:auto; box-shadow:0 -8px 28px rgba(30,20,5,.12);
}
#legend-panel.open { transform:translateY(0); }

.legend-title { font-family:var(--font-d); font-size:1rem; font-weight:700; color:var(--gold); margin-bottom:.75rem; }
.legend-item { display:flex; align-items:center; gap:.6rem; padding:.45rem 0; border-bottom:1px solid var(--border); font-size:.82rem; color:var(--ink-mid); }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.legend-toggle { position:absolute; top:10px; left:10px; z-index:500; }
.ltoggle-btn {
  padding:5px 10px; border-radius:var(--r); border:1.5px solid var(--border);
  background:rgba(247,240,227,.92); color:var(--ink-mid);
  font-size:10px; cursor:pointer; backdrop-filter:blur(6px); transition:all .18s;
}

/* ── Toast ─ */
#toast {
  position:fixed; bottom:calc(env(safe-area-inset-bottom,16px)+80px); left:50%;
  transform:translateX(-50%) translateY(60px); opacity:0;
  background:var(--ink); color:var(--bg); padding:.55rem 1.2rem;
  border-radius:20px; font-size:.78rem; z-index:3000;
  transition:transform .3s,opacity .3s; pointer-events:none;
  white-space:nowrap; max-width:88vw; text-align:center;
}
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>

 <!-- MAP -->
  <div id="map-wrap">

      <!-- Polygons injected by JS -->

      </g>
    </svg>

    <!-- User pin (absolute inside map-wrap) -->
    <div id="user-pin">
      <div class="pin-bubble" id="pin-text">Konumunuz</div>
      <div class="pin-dot"></div>
    </div>

    <!-- Legend dropdown -->
    <div id="legend"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom-panel">
    <div id="location-card">
      <div id="location-label">📍 Bulunduğunuz Alan</div>
      <div id="location-name" class="outside">Haritaya dokunarak keşfedin</div>
      <div id="location-desc"></div>
    </div>
    <div id="controls">
      <button id="locate-btn" onclick="startTracking()">
        <span>◎</span> Konumumu Göster
      </button>
      <button id="sound-btn" onclick="toggleSound()">🔊</button>
    </div>
    <div id="gps-status"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

// ══════════════════════════════════════
// PROJEKSIYON — Kuzeyi yukarı (cami üstte)
// Külliye kuzeye baktığı için: yüksek lat = kuzey = SVG üstü
// Doğu (yüksek lon) = sağ
// ══════════════════════════════════════
let allLats = [], allLons = [];
RAW_ZONES.forEach(z => z.coords.forEach(([lat, lon]) => {
  allLats.push(lat); allLons.push(lon);
}));

const minLat = Math.min(...allLats), maxLat = Math.max(...allLats);
const minLon = Math.min(...allLons), maxLon = Math.max(...allLons);

const SVG_W = 800, SVG_H = 860;
const PAD_X = 55, PAD_TOP = 80, PAD_BOT = 55;

// Lon → X: doğu sağda (normal)
// Lat → Y: kuzey (yüksek lat) üstte — yani lat büyüdükçe Y küçülür
// ÖNEMLİ: orijinal kodda "lat ters çevir" yapılıyordu (kuzey yukarı)
// Bu doğruydu ama bounding box hesabı yanlış yöndeydi — düzelttik.

function geoToSVG(lat, lon) {
  const x = PAD_X + (lon - minLon) / (maxLon - minLon) * (SVG_W - 2 * PAD_X);
  // Yüksek lat = kuzey = SVG üstü (düşük Y)
  const y = PAD_TOP + (1 - (lat - minLat) / (maxLat - minLat)) * (SVG_H - PAD_TOP - PAD_BOT);
  return [x, y];
}

// ══════════════════════════════════════
// CONVEX HULL
// ══════════════════════════════════════
function convexHull(pts) {
  const p = [...pts].sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  const cross = (O,A,B) => (A[0]-O[0])*(B[1]-O[1]) - (A[1]-O[1])*(B[0]-O[0]);
  const lo = [], hi = [];
  for (const q of p) {
    while (lo.length >= 2 && cross(lo[lo.length-2], lo[lo.length-1], q) <= 0) lo.pop();
    lo.push(q);
  }
  for (let i = p.length-1; i >= 0; i--) {
    const q = p[i];
    while (hi.length >= 2 && cross(hi[hi.length-2], hi[hi.length-1], q) <= 0) hi.pop();
    hi.push(q);
  }
  hi.pop(); lo.pop();
  return lo.concat(hi);
}

function shrink(pts, f=0.02) {
  const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const cy = pts.reduce((s,p)=>s+p[1],0)/pts.length;
  return pts.map(([x,y]) => [cx+(x-cx)*(1-f), cy+(y-cy)*(1-f)]);
}

// ══════════════════════════════════════
// BUILD ZONES
// ══════════════════════════════════════
const ZONES = RAW_ZONES.map(zone => {
  const raw = zone.coords.map(([lat,lon]) => geoToSVG(lat, lon));
  const hull = convexHull(raw);
  const svgPts = shrink(hull, 0.02);
  const cx = svgPts.reduce((s,p)=>s+p[0],0)/svgPts.length;
  const cy = svgPts.reduce((s,p)=>s+p[1],0)/svgPts.length;
  return { ...zone, svgPts, cx, cy };
});

// ══════════════════════════════════════
// RENDER SVG
// ══════════════════════════════════════
const polyLayer = document.getElementById('polygons-layer');
const labelLayer = document.getElementById('labels-layer');

ZONES.forEach(zone => {
  const pts = zone.svgPts.map(p => p.join(',')).join(' ');

  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', zone.fill);
  poly.setAttribute('stroke', zone.color);
  poly.setAttribute('stroke-width', '1.8');
  poly.setAttribute('stroke-linejoin', 'round');
  poly.setAttribute('class', 'area-poly');
  poly.setAttribute('id', 'poly-' + zone.id);
  poly.addEventListener('click', () => showZoneInfo(zone));
  polyLayer.appendChild(poly);

  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x', zone.cx);
  lbl.setAttribute('y', zone.cy);
  lbl.setAttribute('class', 'area-label');
  lbl.textContent = zone.name;
  labelLayer.appendChild(lbl);
});

// ══════════════════════════════════════
// LEGEND
// ══════════════════════════════════════
const legendEl = document.getElementById('legend');
legendEl.innerHTML = `<div class="legend-title">Bölümler</div>` +
  ZONES.map(z => `<div class="legend-item" onclick="focusZone('${z.id}')">
    <div class="legend-dot" style="background:${z.fill};border:1px solid ${z.color}"></div>
    <span>${z.name}</span>
  </div>`).join('');

function toggleLegend() {
  legendEl.classList.toggle('open');
}

function focusZone(id) {
  const zone = ZONES.find(z => z.id === id);
  if (zone) showZoneInfo(zone);
  legendEl.classList.remove('open');
}

// Close legend on outside tap
document.getElementById('map-wrap').addEventListener('click', (e) => {
  if (!e.target.closest('#legend') && !e.target.closest('#legend-btn')) {
    legendEl.classList.remove('open');
  }
});

// ══════════════════════════════════════
// POINT-IN-POLYGON (ray casting)
// ══════════════════════════════════════
function pointInPolygon(lat, lon, zone) {
  const [px, py] = geoToSVG(lat, lon);
  const poly = zone.svgPts;
  let inside = false;
  for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
    const [xi,yi] = poly[i], [xj,yj] = poly[j];
    if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}

function findZone(lat, lon) {
  return ZONES.find(z => pointInPolygon(lat, lon, z)) || null;
}

// ══════════════════════════════════════
// SPEECH
// ══════════════════════════════════════
let soundEnabled = true;
let lastSpoken = '';

function speak(text) {
  if (!soundEnabled || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'tr-TR'; utt.rate = 0.9; utt.pitch = 1.0; utt.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const trVoice = voices.find(v => v.lang.startsWith('tr'));
  if (trVoice) utt.voice = trVoice;
  window.speechSynthesis.speak(utt);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
  showToast(soundEnabled ? 'Sesli rehber açık' : 'Sesli rehber kapalı');
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
}

// ══════════════════════════════════════
// UI
// ══════════════════════════════════════
function showZoneInfo(zone) {
  setActiveZone(zone);
}

function setActiveZone(zone) {
  document.querySelectorAll('.area-poly').forEach(p => {
    p.setAttribute('stroke-width','1.8');
    p.style.filter = '';
    p.classList.remove('active');
  });

  if (zone) {
    document.getElementById('location-name').className = '';
    document.getElementById('location-name').textContent = zone.name;
    document.getElementById('location-desc').textContent = zone.desc;

    const poly = document.getElementById('poly-' + zone.id);
    if (poly) {
      poly.setAttribute('stroke-width','3');
      poly.style.filter = 'url(#glow)';
      poly.classList.add('active');
    }
  } else {
    document.getElementById('location-name').className = 'outside';
    document.getElementById('location-name').textContent = 'Külliye alanı dışındasınız';
    document.getElementById('location-desc').textContent = 'Lütfen külliye sınırları içine giriniz.';
  }
}

function updateLocationDisplay(zone) {
  setActiveZone(zone);
  if (zone && lastSpoken !== zone.id) {
    lastSpoken = zone.id;
    setTimeout(() => speak(`Şu an ${zone.announce}`), 300);
  } else if (!zone && lastSpoken !== 'outside') {
    lastSpoken = 'outside';
  }
}

// ══════════════════════════════════════
// GPS
// ══════════════════════════════════════
let watchId = null;
let isTracking = false;

function startTracking() {
  if (isTracking) { stopTracking(); return; }
  if (!navigator.geolocation) { showToast('Tarayıcınız konum desteklemiyor'); return; }

  document.getElementById('gps-status').textContent = 'GPS sinyali aranıyor…';
  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true, timeout: 15000, maximumAge: 2000
  });
  isTracking = true;

  const btn = document.getElementById('locate-btn');
  btn.classList.add('tracking');
  btn.innerHTML = '<span>◉</span> Takip Aktif';

  speak('Konum takibi başladı. Külliye içinde ilerlediğinizde size rehberlik edeceğim.');
}

function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  isTracking = false;
  const btn = document.getElementById('locate-btn');
  btn.classList.remove('tracking');
  btn.innerHTML = '<span>◎</span> Konumumu Göster';
  document.getElementById('user-pin').classList.remove('visible');
  document.getElementById('gps-status').textContent = 'Takip durduruldu';
}

function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  const [svgX, svgY] = geoToSVG(lat, lon);
  const svgEl = document.getElementById('map-svg');
  const bbox = svgEl.getBoundingClientRect();
  const scaleX = bbox.width / SVG_W;
  const scaleY = bbox.height / SVG_H;

  // Pin pozisyonu relative to map-wrap
  const mapWrap = document.getElementById('map-wrap');
  const wrapRect = mapWrap.getBoundingClientRect();
  const pinX = bbox.left - wrapRect.left + svgX * scaleX;
  const pinY = bbox.top - wrapRect.top + svgY * scaleY;

  const pin = document.getElementById('user-pin');
  pin.style.left = pinX + 'px';
  pin.style.top = pinY + 'px';
  pin.classList.add('visible');

  const zone = findZone(lat, lon);
  document.getElementById('pin-text').textContent = zone ? zone.name : 'Külliye dışı';
  updateLocationDisplay(zone);

  const accText = acc < 10 ? '✦ Mükemmel GPS' : acc < 20 ? '✦ İyi GPS' : acc < 50 ? '◇ Orta GPS' : '○ Zayıf GPS';
  document.getElementById('gps-status').textContent = `${accText} · ±${Math.round(acc)}m`;
}

function onError(err) {
  let msg = 'Konum alınamadı';
  if (err.code === 1) msg = 'Konum izni verilmedi';
  else if (err.code === 2) msg = 'GPS sinyali alınamıyor';
  else if (err.code === 3) msg = 'Zaman aşımı — tekrar deneyin';
  document.getElementById('gps-status').textContent = msg;
  showToast(msg);
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════
// SİMÜLASYON — haritaya tıkla
// ══════════════════════════════════════
document.getElementById('map-svg').addEventListener('click', (e) => {
  if (isTracking) return;
  const svg = e.currentTarget;
  const rect = svg.getBoundingClientRect();
  const svgX = (e.clientX - rect.left) / rect.width * SVG_W;
  const svgY = (e.clientY - rect.top) / rect.height * SVG_H;

  // SVG → Geo (ters)
  const lon = minLon + (svgX - PAD_X) / (SVG_W - 2*PAD_X) * (maxLon - minLon);
  const lat = minLat + (1 - (svgY - PAD_TOP) / (SVG_H - PAD_TOP - PAD_BOT)) * (maxLat - minLat);

  const mapWrap = document.getElementById('map-wrap');
  const wrapRect = mapWrap.getBoundingClientRect();
  const pin = document.getElementById('user-pin');
  pin.style.left = (e.clientX - wrapRect.left) + 'px';
  pin.style.top = (e.clientY - wrapRect.top) + 'px';
  pin.classList.add('visible');

  const zone = findZone(lat, lon);
  document.getElementById('pin-text').textContent = zone ? zone.name : 'Külliye dışı';
  updateLocationDisplay(zone);
  document.getElementById('gps-status').textContent = `Simülasyon · ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
});
</script>
</body>
</html>
