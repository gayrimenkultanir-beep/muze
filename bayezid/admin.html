<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Müze Yönetim Paneli - Personel Yönetimi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f1a24;
            --navy-deep: #1b2b3a;
            --danger: #c0392b;
            --success: #27ae60;
        }

        body { font-family: 'Playfair Display', serif; background: #f4f4f4; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; height: 100vh; background: var(--dark); color: white; padding: 20px; position: fixed; }
        .sidebar h2 { font-family: 'Cinzel'; color: var(--gold); font-size: 18px; margin-bottom: 30px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        .sidebar a { display: block; color: #fff; text-decoration: none; padding: 10px 0; border-bottom: 1px solid #2c3e50; transition: 0.3s; }
        .sidebar a:hover { color: var(--gold); padding-left: 10px; }

        /* Main Content */
        .main-content { margin-left: 250px; padding: 40px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Form & Modal */
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; }
        .btn-add { background: var(--gold); color: var(--dark); }
        .btn-delete { background: var(--danger); color: white; font-size: 12px; }
        .btn-edit { background: var(--navy-deep); color: white; font-size: 12px; margin-right: 5px; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--navy-deep); color: var(--gold); padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .thumb { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Müze Admin</h2>
    <a href="#">Dashboard</a>
    <a href="#" style="color: var(--gold);">Personel Yönetimi</a>
    <a href="#">Sergiler</a>
    <a href="#">Duyurular</a>
    <a href="/" target="_blank">Siteyi Görüntüle</a>
</div>

<div class="main-content">
    <div class="header">
        <h1>Personel Yönetimi</h1>
        <button class="btn btn-add" onclick="toggleForm()">+ Yeni Personel Ekle</button>
    </div>

    <div id="addForm" class="card" style="display:none;">
        <h3>Yeni Personel Bilgileri</h3>
        <form action="process.php" method="POST" enctype="multipart/form-data">
            <input type="text" name="fullname" placeholder="Adı Soyadı" required>
            <input type="text" name="title" placeholder="Ünvan / Görev" required>
            <input type="email" name="email" placeholder="E-posta Adresi">
            <input type="text" name="phone" placeholder="Telefon (0284...)">
            <label>Fotoğraf Seç:</label>
            <input type="file" name="photo">
            <button type="submit" class="btn btn-add">Kaydet</button>
            <button type="button" class="btn" onclick="toggleForm()">Vazgeç</button>
        </form>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Ad Soyad</th>
                    <th>Görev</th>
                    <th>İletişim</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><img src="assets/staff1.jpg" class="thumb"></td>
                    <td><strong>Enver Şengül</strong></td>
                    <td>Rektör Danışmanı</td>
                    <td>enversengul@trakya.edu.tr</td>
                    <td>
                        <button class="btn btn-edit">Düzenle</button>
                        <button class="btn btn-delete">Sil</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function toggleForm() {
        var x = document.getElementById("addForm");
        x.style.display = (x.style.display === "none") ? "block" : "none";
    }
</script>

</body>
</html>
