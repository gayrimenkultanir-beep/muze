<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan II. Bayezid Külliyesi - Dijital Rehber</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 360px;
            --ana-renk: #2C2420;
            --altin: #B39359;
            --mermer: #FDFCF9;
            --kenarlik: rgba(179, 147, 89, 0.2);
            --beyaz: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--mermer);
            font-family: 'Montserrat', sans-serif;
            color: var(--ana-renk);
            display: flex;
            min-height: 100vh;
        }

        /* Saf SVG Arka Plan */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 30-30 30L0 30z' fill='%23B39359' fill-opacity='1'/%3E%3C/svg%3E");
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--beyaz);
            border-right: 1px solid var(--kenarlik);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: 0.4s;
        }

        .sidebar-header {
            padding: 40px 30px;
            border-bottom: 3px solid var(--altin);
        }

        .nav-scroll { overflow-y: auto; flex: 1; }

        .nav-item {
            padding: 20px 30px;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-item.active {
            background: rgba(179, 147, 89, 0.1);
            color: var(--altin);
            border-right: 5px solid var(--altin);
        }

        /* --- ANA İÇERİK --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 60px 40px;
            display: flex;
            justify-content: center;
        }

        .academic-frame {
            background: var(--beyaz);
            width: 100%;
            max-width: 800px;
            padding: 80px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.05);
            border: 1px solid var(--kenarlik);
        }

        /* Köşe SVG'ler */
        .corner { position: absolute; width: 45px; height: 45px; stroke: var(--altin); stroke-width: 2; fill: none; }
        .tl { top: 20px; left: 20px; }
        .tr { top: 20px; right: 20px; transform: rotate(90deg); }
        .bl { bottom: 20px; left: 20px; transform: rotate(-90deg); }
        .br { bottom: 20px; right: 20px; transform: rotate(180deg); }

        .subtitle { font-family: 'Playfair Display', serif; font-style: italic; color: var(--altin); font-size: 18px; margin-bottom: 30px; display: block; }
        .text-box { font-size: 16px; line-height: 1.8; text-align: justify; }

        /* --- BUTONLAR --- */
        .action-area {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border-top: 1px solid var(--kenarlik);
            padding-top: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 15px 30px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 2px;
        }

        .btn-next {
            background: var(--ana-renk);
            color: white;
            border: none;
            flex: 1;
            justify-content: center;
        }

        .btn-next:hover { background: #453a35; transform: translateY(-2px); }

        .btn-audio {
            background: white;
            color: var(--altin);
            border: 1px solid var(--altin);
            gap: 10px;
        }

        .btn-audio:hover { background: var(--altin); color: white; }

        /* SVG İkonlar için basit boyutlandırma */
        .btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* --- MOBİL --- */
        .menu-btn { display: none; position: fixed; bottom: 20px; left: 20px; background: var(--ana-renk); color: white; border: none; padding: 15px; z-index: 2000; border-radius: 50%; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); width: 100%; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 40px 15px; }
            .academic-frame { padding: 40px 20px; }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>DİJİTAL FİHRİST</h2></div>
        <div class="nav-scroll" id="nav-list"></div>
    </nav>

    <main class="main-content">
        <article class="academic-frame">
            <svg class="corner tl" viewBox="0 0 100 100"><path d="M100 0 H0 V100"/></svg>
            <svg class="corner tr" viewBox="0 0 100 100"><path d="M100 0 H0 V100"/></svg>
            <svg class="corner bl" viewBox="0 0 100 100"><path d="M100 0 H0 V100"/></svg>
            <svg class="corner br" viewBox="0 0 100 100"><path d="M100 0 H0 V100"/></svg>

            <div id="content-display">
                <h1 style="font-family:'Playfair Display'">Şifa Yolculuğu</h1>
                <span class="subtitle">Hoş Geldiniz</span>
                <p>Başlamak için sol menüden bir nokta seçin veya ilk durağa ilerleyin.</p>
                <div class="action-area">
                    <button class="btn btn-next" onclick="showContent(0)">YOLCULUĞA BAŞLA</button>
                </div>
            </div>
        </article>
    </main>

    <script>
        // TourData buraya (Senin verilerin)
        const tourData = [
            {
                t: "🏛️ EŞİĞE DAVET | SULTAN II. BAYEZİD KÜLLİYESİ",
                s: "✨ ŞİFA YOLCULUĞU",
                m: "🏰 **MİRAS:** 500 yıllık köklü bir geçmişe hoş geldiniz.\n\n🌿 **ARINIŞ:** Ruhunuzu dinlendirmeye ve geçmişin bilgeliğiyle buluşmaya hazır mısınız?",
                q: "🔑 **EŞİK:** Hazır mısınız?",
                btnNext: "ZAMANDA YOLCULUĞA BAŞLA",
                a: "audio/intro.mp3"
            },
            {
                t: "🏛️ 1. DURAK: ADALET VE ŞİFA KAPISI",
                s: "⚖️ MİMARİ BÜTÜNLÜK",
                m: "🎟️ İhtişamlı ana kapıdan adımınızı attınız...",
                q: "🗣️ “Darüşşifa’nın ana girişine doğru ilerleyelim.”",
                btnNext: "Darüşşifa Girişine İlerle ➡",
                a: "audio/01.mp3"
            }
            // ... Diğer verileri buraya ekleyebilirsin
        ];

        const navList = document.getElementById('nav-list');
        const displayArea = document.getElementById('content-display');

        tourData.forEach((step, index) => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.innerHTML = step.t;
            item.onclick = () => { showContent(index); if(window.innerWidth < 992) toggleMenu(); };
            navList.appendChild(item);
        });

        function showContent(index) {
            const data = tourData[index];
            const isLast = index === tourData.length - 1;
            
            document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === index));

            const formattedMsg = data.m.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');

            displayArea.innerHTML = `
                <h1 style="font-family:'Playfair Display'; font-size: 30px; margin-bottom:10px;">${data.t}</h1>
                <span class="subtitle">${data.s}</span>
                <div class="text-box">${formattedMsg}</div>
                <div style="background:var(--mermer); padding:20px; margin-top:30px; border-left:3px solid var(--altin); font-style:italic;">
                    ${data.q}
                </div>
                
                <div class="action-area">
                    <button class="btn btn-audio" onclick="playAudio('${data.a}')">
                        <svg viewBox="0 0 24 24"><path d="M14 5v14l-7-5H4V10h3l7-5zM16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                        SESLİ REHBERİ DİNLE
                    </button>
                    
                    ${!isLast ? `
                    <button class="btn btn-next" onclick="showContent(${index + 1})">
                        ${data.btnNext}
                    </button>` : ''}
                </div>
            `;
        }

        function playAudio(file) {
            alert("Ses dosyası oynatılıyor: " + file);
            // Gerçek kullanım için: 
            // let audio = new Audio(file); audio.play();
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    </script>
</body>
</html>
