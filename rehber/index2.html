<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan II. Bayezid Külliyesi - Akademik Arşiv</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 340px;
            --ana-renk: #2C2420;
            --altin: #B39359;
            --mermer: #FDFCF9;
            --kenarlik: rgba(179, 147, 89, 0.2);
            --beyaz: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--mermer);
            font-family: 'Montserrat', sans-serif;
            color: var(--ana-renk);
            display: flex;
            min-height: 100vh;
        }

        /* --- ARKA PLAN GEOMETRİSİ --- */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l40 40-40 40L0 40z' fill='%23B39359' fill-opacity='1'/%3E%3C/svg%3E");
        }

        /* --- SIDEBAR (FİHRİST) --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--beyaz);
            border-right: 1px solid var(--kenarlik);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 40px 30px;
            border-bottom: 2px solid var(--altin);
            background: var(--beyaz);
        }

        .sidebar-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-scroll {
            overflow-y: auto;
            flex: 1;
            padding: 10px 0;
        }

        .nav-item {
            padding: 20px 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid rgba(179, 147, 89, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--ana-renk);
            opacity: 0.7;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--vurgu-soft, rgba(179, 147, 89, 0.1));
            opacity: 1;
            color: var(--altin);
        }

        .nav-item.active {
            border-right: 4px solid var(--altin);
            font-weight: 600;
        }

        /* --- İÇERİK ALANI --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 80px 40px;
            display: flex;
            justify-content: center;
        }

        .academic-card {
            background: var(--beyaz);
            width: 100%;
            max-width: 850px;
            padding: 70px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.04);
            border: 1px solid var(--kenarlik);
        }

        /* Gömülü SVG Köşe Süsleri */
        .corner-svg {
            position: absolute;
            width: 60px;
            height: 60px;
            fill: var(--altin);
            opacity: 0.6;
        }
        .top-l { top: 20px; left: 20px; }
        .top-r { top: 20px; right: 20px; transform: rotate(90deg); }
        .bot-l { bottom: 20px; left: 20px; transform: rotate(-90deg); }
        .bot-r { bottom: 20px; right: 20px; transform: rotate(180deg); }

        .content-body h1 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--altin);
            font-size: 20px;
            margin-bottom: 40px;
            display: block;
            border-bottom: 1px solid var(--kenarlik);
            padding-bottom: 10px;
        }

        .text-content {
            font-size: 17px;
            line-height: 1.9;
            color: #333;
            text-align: justify;
        }

        /* --- MOBİL --- */
        .m-toggle {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--ana-renk);
            color: white;
            padding: 12px;
            border: none;
            z-index: 2000;
            border-radius: 4px;
        }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); width: 100%; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 60px 20px; }
            .academic-card { padding: 40px 25px; }
            .m-toggle { display: block; }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    
    <button class="m-toggle" onclick="toggleMenu()">MENÜ</button>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>DİJİTAL FİHRİST</h2>
        </div>
        <div class="nav-scroll" id="nav-list"></div>
    </nav>

    <main class="main-content">
        <article class="academic-card">
            <svg class="corner-svg top-l" viewBox="0 0 100 100"><path d="M0 0 v100 h5 v-95 h95 v-5 z"/></svg>
            <svg class="corner-svg top-r" viewBox="0 0 100 100"><path d="M0 0 v100 h5 v-95 h95 v-5 z"/></svg>
            <svg class="corner-svg bot-l" viewBox="0 0 100 100"><path d="M0 0 v100 h5 v-95 h95 v-5 z"/></svg>
            <svg class="corner-svg bot-r" viewBox="0 0 100 100"><path d="M0 0 v100 h5 v-95 h95 v-5 z"/></svg>

            <div id="display-area" class="content-body">
                <h1>Külliye Kayıtları</h1>
                <span class="subtitle">Arşivi Görüntülemek İçin Bir Durak Seçin</span>
                <p class="text-content">Sol paneldeki fihrist, Sultan II. Bayezid Külliyesi'nin 29 farklı noktasındaki akademik ve ruhani kayıtları içermektedir.</p>
            </div>
        </article>
    </main>

    <script>
        const tourData = [
            { t: "🏛️ 1. DURAK: GİRİŞ VE KARŞILAMA", s: "YOL AYRIMI", m: "🎟️ Şu an biletlerimizi aldık ve o ana kapıdan içeri süzülüyoruz.\n\n✨ Burası sadece binalar topluluğu değil; insanın ruhu, bedeni ve yaşamına hitap eden dev bir organizasyondur.\n\n🚶‍♂️ Şimdi ağır adımlarla yürürken, 500 yıl öncesinin havasını ciğerlerimize çekelim." },
            { t: "🚪 2. DURAK: DARÜŞŞİFA GİRİŞİ", s: "VAKUR GİRİŞ", m: "Giriş kapımıza geldiğimizde sağ tarafta duvarda asılı panolar bizi karşılayacak.\n\n📌 Bu panolarda Külliyenin genel görünümü yer alır. Darüşşifa’nın o eşsiz mimarisi, yukarıdan bakıldığında bile insana bir düzen duygusu verir." },
            // ... (3-22 arasındaki durakları buraya kendi verilerinle ekleyebilirsin)
            { t: "🕌 23. DURAK: CAMİNİN GÖRKEMİNE DOĞRU", s: "RUHANİ DİNGİNLİĞE ADIM", m: "Külliyenin tüm yapılarını bir tespih tanesi gibi etrafında dizen o en heybetli yapıyı, Sultan II. Bayezid Camii’nin taç kapısını görebilirsiniz." },
            { t: "🏛️ 24. DURAK: CAMİ AVLUSU", s: "SÜKÛNETİN VE IŞIĞIN BULUŞMASI", m: "Caminin devasa taç kapısından içeri süzüldüğünüzde, mermer işçiliğinin zarafeti sizi karşılar. Suyun sesi, taşın sessizliğine karışır." },
            { t: "📜 25. DURAK: İBADET ALANINA DOĞRU", s: "RUHANİ ATMOSFERE HAZIRLIK", m: "Şimdi avlunun mermer zemininde ağır adımlarla yürüyerek asıl ibadet alanının girişine doğru yöneliyoruz. Devasa tek bir kubbenin altında bulacaksınız kendinizi." },
            { t: "🕌 26. DURAK: CAMİNİN İÇ MEKANI", s: "TEK KUBBE, SONSUZ HUZUR", m: "Bu cami, Osmanlı mimarisinde 'Tek Kubbe' geleneğinin en saf örneklerinden biridir. Hünkâr Mahfili, mermer sütunlar üzerinde yükselerek zarafeti tamamlar." },
            { t: "🌊 27. DURAK: VEDAYA DOĞRU", s: "ŞİFA ŞEHRİNE BAKIŞ", m: "Artık heybemizde hem şifalı tatlar hem de kıymetli hatıralar var. Tunca Nehri kıyısına doğru süzülüyoruz." },
            { t: "🌊 28. DURAK: TUNCA NEHRİ KIYISI", s: "VEDANIN VE HUZURUN ADRESİ", m: "Nehrin akışı, Darüşşifa’da duyduğunuz su sesinin doğadaki yankısıdır. Köprü yalnızca iki kıyıyı değil; şifa ile hayatı birbirine bağlar." },
            { t: "✍️ 29. DURAK: GÖNÜL KÖPRÜSÜ", s: "EBEDİ İZ", m: "Kalbinizden süzülenleri bizimle paylaşın, bu Gönül Köprüsü’nde sizin de bir ebedi iziniz kalsın…" }
        ];

        const navList = document.getElementById('nav-list');
        const displayArea = document.getElementById('display-area');

        // Navigasyon oluşturucu
        tourData.forEach((step, index) => {
            const div = document.createElement('div');
            div.className = 'nav-item';
            div.innerHTML = `<span>${step.t}</span>`;
            div.onclick = () => {
                showStep(index);
                if(window.innerWidth < 992) toggleMenu();
            };
            navList.appendChild(div);
        });

        function showStep(index) {
            const step = tourData[index];
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            displayArea.style.opacity = 0;
            setTimeout(() => {
                displayArea.innerHTML = `
                    <h1>${step.t}</h1>
                    <span class="subtitle">${step.s}</span>
                    <div class="text-content">${step.m.replace(/\n/g, '<br>')}</div>
                `;
                displayArea.style.opacity = 1;
            }, 200);
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
