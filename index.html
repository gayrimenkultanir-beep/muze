/* === SİPARİŞLER (genel müdür: gelen talepleri yönet) === */
function bayiSiparisGenelHtml(){
  const bekleyen = BAYI_SIPARISLER.filter(s=>s.durum==="onayda");
  // aktif süreçtekiler (aktarıldı/red GEÇMİŞE gider, burada görünmez)
  const diger = BAYI_SIPARISLER.filter(s=>s.durum==="onaylandi"||s.durum==="odendi");
  let html = `<div class="bayi-aciklama">📥 Bayilerden gelen sipariş talepleri. İnceleyip düzenleyebilir, onaylayabilirsiniz. Stok aktarımı tamamlanan siparişler <strong>Geçmiş</strong> sekmesine taşınır.</div>`;
  if(bekleyen.length===0 && diger.length===0){ return html+`<div class="bayi-bos">Bekleyen veya işlemdeki sipariş yok.</div>`; }
  if(bekleyen.length){
    html += `<div class="bayi-gecmis-baslik">⏳ Onay bekleyenler (${bekleyen.length})</div>`;
    bekleyen.forEach(sp=> html += bayiSiparisKartGenel(sp));
  }
  if(diger.length){
    html += `<div class="bayi-gecmis-baslik">İşlemdekiler (onaylandı / ödeme bekliyor)</div>`;
    diger.slice().reverse().forEach(sp=> html += bayiSiparisKartGenel(sp));
  }
  return html;
}
function bayiSiparisKartGenel(sp){
  const dm = SIPARIS_DURUM[sp.durum];
  let html = `<div class="bayi-sip-kart">
    <div class="bayi-sip-ust"><span class="bayi-sip-no">#${sp.id} · ${sp.sube}</span>
      <span class="bayi-sip-durum" style="background:${dm.bg};color:${dm.renk}">${dm.ad}</span></div>
    <div class="bayi-sip-tarih">${sp.tarih}</div>
    <div class="bayi-sip-kalemler">`;
  sp.kalemler.forEach((k,i)=>{
    const s = STOCK[k.kod];
    const talep = k.talepMiktar!=null ? k.talepMiktar : k.miktar;
    const degisti = talep!==k.miktar || k.silindi;
    let miktarHtml;
    if(k.silindi){
      miktarHtml = `<span style="text-decoration:line-through;color:var(--ink-3)">${talep} ${s?(s.birim||"gr"):""}</span> <span style="color:var(--err)">çıkarıldı</span>`;
    } else if(degisti){
      miktarHtml = `<span style="text-decoration:line-through;color:var(--ink-3)">${talep}</span> → <strong>${k.miktar}</strong> ${s?(s.birim||"gr"):""}${bayiFiyat(k.kod)>0?' · '+(k.miktar*bayiFiyat(k.kod)).toFixed(0)+' ₺':''}`;
    } else {
      miktarHtml = `${k.miktar} ${s?(s.birim||"gr"):""}${bayiFiyat(k.kod)>0?' · '+(k.miktar*bayiFiyat(k.kod)).toFixed(0)+' ₺':''}`;
    }
    html += `<div class="bayi-sip-kalem${k.silindi?' bayi-kalem-silinmis':''}"><span>${s?s.ad:k.kod}</span>
      <span>${miktarHtml}</span>
      ${sp.durum==="onayda"?`<button class="bayi-kalem-sil" onclick="sipKalemDuzenle(${sp.id},${i})">✏️</button>`:''}</div>`;
  });
  html += `</div>`;
  const t = siparisTutar(sp);
  html += `<div class="bayi-ozet-tablo">
    <div class="bayi-ozet-satir"><span>Toplam (iskontosuz)</span><span>${t.brut.toFixed(0)} ₺</span></div>
    ${t.isk>0?`<div class="bayi-ozet-satir bayi-ozet-ind"><span>Şube iskontosu (%${t.isk})</span><span>− ${t.indirim.toFixed(0)} ₺</span></div>`:''}
    <div class="bayi-ozet-satir bayi-ozet-net"><span>Net tutar</span><span>${t.net.toFixed(0)} ₺</span></div>
  </div>`;
  if(sp.durum==="onayda"){
    html += `<div class="bayi-sip-aksiyon">
      <button class="btn btn-ghost" onclick="sipReddet(${sp.id})">Reddet</button>
      <button class="btn btn-primary" onclick="sipOnayla(${sp.id})">✓ Onayla</button>
    </div>`;
  }
  html += `</div>`;
  return html;
}
function sipKalemDuzenle(id, i){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  const k = sp.kalemler[i];
  const v = prompt(STOCK[k.kod].ad+" miktarı (talep: "+(k.talepMiktar||k.miktar)+", 0=kaldır):", String(k.miktar));
  if(v==null) return;
  const m = parseInt(v);
  if(isNaN(m)||m<0){ note("Geçersiz"); return; }
  if(m===0){ k.miktar=0; k.silindi=true; }   // silindi işareti (iz kalır, müdür görür)
  else { k.miktar = m; k.silindi=false; }
  if((k.talepMiktar||k.miktar)!==k.miktar || k.silindi) sp.duzenlendi=true;
  note("Sipariş güncellendi");
  b2bKaydet();
  go("bayi", true);
}
function sipOnayla(id){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  const aktif = sp.kalemler.filter(k=>!k.silindi && k.miktar>0);
  if(aktif.length===0){ note("Tüm kalemler kaldırılmış — onaylanamaz, reddedin"); return; }
  sp.durum = "onaylandi";
  note("✓ #"+id+" onaylandı · bayiye iletildi");
  b2bKaydet();
  go("bayi", true);
}
function sipReddet(id){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  if(!confirm("#"+id+" siparişi reddedilsin mi?")) return;
  sp.durum = "red";
  note("Sipariş reddedildi");
  b2bKaydet();
  go("bayi", true);
}

/* === MÜDÜR: SİPARİŞ VER (genel müdür stoğunu gör, talep oluştur) === */
function bayiSiparisVerHtml(){
  if(!state.bayiSepet) state.bayiSepet = [];
  let html = `<div class="bayi-aciklama">🛒 Merkez (genel müdür) stok durumuna göre sipariş oluşturun. Bakiyesi olmayan ürünler için de talep açabilirsiniz.</div>`;

    html += `<div class="bayi-satir">

      <div class="bayi-s-aksiyon">
        ${sepette
          ? `<span class="bayi-sepet-miktar">${sepette.miktar} ${s.birim||"gr"}</span><button class="bayi-mini sil" onclick="bayiSepetCikar('${kod}')">✕</button>`
          : `<button class="bayi-mini" onclick="bayiSepetEkle('${kod}')">+ Ekle</button>`}
      </div>
    </div>`;
  });
  html += `</div>`;
  if(state.bayiSepet.length>0){
    const toplam = state.bayiSepet.reduce((a,k)=>a+k.miktar*bayiFiyat(k.kod),0);
    const isk = bayiIskonto(AKTIF_SUBE);

    const odenecek = toplam-indirim;
    html += `<div class="bayi-sepet-ozet">
      <div class="bayi-sepet-baslik">📝 Talep listesi · ${state.bayiSepet.length} kalem</div>
      <div class="bayi-ozet-tablo">
        <div class="bayi-ozet-satir"><span>Toplam tutar (iskontosuz)</span><span>${toplam.toFixed(0)} ₺</span></div>
        ${isk>0?`<div class="bayi-ozet-satir bayi-ozet-ind"><span>İskonto (%${isk})</span><span>− ${indirim.toFixed(0)} ₺</span></div>`:''}
        <div class="bayi-ozet-satir bayi-ozet-net"><span>Ödenecek tutar</span><span>${odenecek.toFixed(0)} ₺</span></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="bayiSiparisGonder()">Onaya gönder</button>
    </div>`;
  }
  return html;
}
function bayiSepetEkle(kod){
  if(!state.bayiSepet) state.bayiSepet=[];
  const v = prompt(STOCK[kod].ad+" talep miktarı ("+(STOCK[kod].birim||"gr")+"):");
  if(v==null) return;
  const m = parseInt(v);
  if(isNaN(m)||m<=0){ note("Geçersiz miktar"); return; }
  state.bayiSepet.push({kod:kod, miktar:m});

function bayiSepetCikar(kod){

}
function bayiSiparisGonder(){

function bayiOdemeTamamla(){
  const o = state.bayiOdeme; if(!o) return;
  const sp = BAYI_SIPARISLER.find(s=>s.id===o.id); if(!sp) return;
  const yontem = o.yontem==="eft" ? "EFT/Havale" : "Kredi kartı";
  sp.durum = "odendi"; sp.odeme = yontem;
  bayiOdemeKapat();
  note("✓ Ödeme alındı ("+yontem+") · stok aktarımına hazır");
  b2bKaydet();
  go("bayi", true);
}
function bayiStokAktar(id){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  // genel müdür stoğundan düş, bayiye ekle
  let uyari = [];
  sp.kalemler.forEach(k=>{
    if(k.silindi || k.miktar<=0) return;   // genel müdürün çıkardığı kalem aktarılmaz
    const s = STOCK[k.kod]; if(!s) return;
    const aktar = Math.min(k.miktar, s.mevcut);   // bakiye kadar
    s.mevcut -= aktar;
    bayiStokYaz(sp.sube, k.kod, bayiStok(sp.sube,k.kod)+aktar);
    if(aktar < k.miktar) uyari.push(s.ad+" ("+aktar+"/"+k.miktar+")");
  });
  sp.durum = "aktarildi"; sp.aktarildi = true;
  if(uyari.length) note("📦 Aktarıldı · ⚠️ kısmi: "+uyari.join(", "));
  else note("📦 Tüm stoklar bayinize aktarıldı");
  b2bKaydet();
  go("bayi", true);
}

/* Yeni şube — ad + adres, mevcut şubeyi kopyala */
function subeYeniAc(){
  const ad=prompt("Yeni şube adı (örn. Keşan Merkez):");
  if(!ad||!ad.trim()) return;
  if(DEMO_BRANCHES.find(b=>b.ad===ad.trim())){ note("Bu isimde şube zaten var"); return; }
  const adres=prompt("Şube adresi:");
  if(adres==null) return;
  // hangi şubeden kopyalansın
  const kaynaklar=DEMO_BRANCHES.map(b=>b.ad);
  const kaynak=prompt("Masa düzeni ve fiyatlar hangi şubeden kopyalansın?\n\nMevcut şubeler:\n"+kaynaklar.join("\n")+"\n\n(boş bırakırsanız ilk şube kopyalanır)", kaynaklar[0]);
  const kopyaSube = (kaynak && DEMO_BRANCHES.find(b=>b.ad===kaynak.trim())) ? kaynak.trim() : kaynaklar[0];
  const yeniAd=ad.trim();
  // şube kaydı
  DEMO_BRANCHES.push({ad:yeniAd, ciro:0, masa:0, bekleyen:0, durum:"green", fire:"normal"});
  BRANCH_INFO[yeniAd]={sehir:"", adres:adres.trim(), tel:""};
  // masa düzenini kopyala (derin kopya)
  BRANCH_TABLES[yeniAd]=JSON.parse(JSON.stringify(BRANCH_TABLES[kopyaSube]||[]));
  DEMO_BRANCHES.find(b=>b.ad===yeniAd).masa=subeMasalari(yeniAd).length;
  // fiyatları kopyala
  if(SUBE_FIYAT[kopyaSube]) SUBE_FIYAT[yeniAd]=JSON.parse(JSON.stringify(SUBE_FIYAT[kopyaSube]));
  note("🏬 "+yeniAd+" açıldı · "+kopyaSube+" düzeni kopyalandı");
  go("subeler");
}
function subeDuzenle(ad){
  const info=BRANCH_INFO[ad]||{};
  const yeniAdres=prompt(ad+" adresi:", info.adres||"");
  if(yeniAdres==null) return;
  if(!BRANCH_INFO[ad]) BRANCH_INFO[ad]={};
  BRANCH_INFO[ad].adres=yeniAdres.trim();
  const yeniTel=prompt(ad+" telefon:", info.tel||"");
  if(yeniTel!=null) BRANCH_INFO[ad].tel=yeniTel.trim();
  note(ad+" bilgileri güncellendi");
  go("subeler");
}
function subeKapatAc(i){
  const b=DEMO_BRANCHES[i];
  if(!b.kapali){
    // açık masa var mı kontrolü
    const acikMasa=subeMasalari(b.ad).some(mm=>{ const id=b.ad+"::"+mm.id; return SESSIONS[id]&&SESSIONS[id].acik; });
    if(acikMasa){ note("⛔ "+b.ad+" şubesinde açık masa var — önce hesapları kapatın"); return; }
    if(!confirm(b.ad+" şubesi geçici kapatılsın mı? Satış durur, veriler korunur, istediğinizde tekrar açabilirsiniz.")) return;
    b.kapali=true; note("⛔ "+b.ad+" kapatıldı (geçici)");
  } else {
    b.kapali=false; note("✓ "+b.ad+" yeniden açıldı");
  }
  go("subeler");
}
function subeSil(i){
  const b=DEMO_BRANCHES[i];
  if(DEMO_BRANCHES.length<=1){ note("Son şube silinemez"); return; }
  const acikMasa=subeMasalari(b.ad).some(mm=>{ const id=b.ad+"::"+mm.id; return SESSIONS[id]&&SESSIONS[id].acik; });
  if(acikMasa){ note("⛔ Açık masa var — önce hesapları kapatın"); return; }
  if(!confirm("⚠️ "+b.ad+" KALICI olarak silinecek!\n\nMasa düzeni, fiyatlar ve tüm ayarları gidecek. Bu işlem geri alınamaz.\n\nEmin misiniz?")) return;
  // tüm verileri temizle
  delete BRANCH_TABLES[b.ad];
  delete BRANCH_INFO[b.ad];
  delete SUBE_FIYAT[b.ad];
  DEMO_BRANCHES.splice(i,1);
  note("🗑️ "+b.ad+" kalıcı olarak silindi");
  go("subeler");
}

/* Mail ile bul (asıl kimlik) */
function musteriBulMail(mail){ return CUSTOMERS[(mail||"").toLowerCase().trim()] || null; }
/* Telefon ile bul (ikincil — kasada hızlı erişim) */
function musteriBulTel(tel){
  const t=(tel||"").replace(/\D/g,"");
  return Object.values(CUSTOMERS).find(m=>m.tel===t) || null;
}
/* Genel arama — mail veya telefon */
function musteriBul(anahtar){
  if(!anahtar) return null;
  if(String(anahtar).includes("@")) return musteriBulMail(anahtar);
  return musteriBulTel(anahtar) || CUSTOMERS[anahtar] || null;
}

/* 0) SPLASH — açılış reklamı (WebP/GIF/MP4) */
function qrSplashHtml(){
  const gorsel = SPLASH.gorsel
    ? '<div class="qr-splash-img qr-splash-anim" style="background-image:url('+SPLASH.gorsel+')"></div>'
    : '<div class="qr-splash-img qr-splash-ph qr-splash-anim"><span style="font-size:120px">🍫</span></div>';
  // bu şubeye ait DURAKLATILMAMIŞ kampanyalar (gün/saat kısıtı introda uygulanmaz — tanıtım amaçlı)
  const sube = QR.sube || AKTIF_SUBE;
  const aktifKmp = KAMPANYALAR.filter(k=>
    k.aktif &&
    (k.subeler==="hepsi" || (Array.isArray(k.subeler)&&k.subeler.includes(sube)))
  );
  let kmpHtml = "";
  if(aktifKmp.length>0){
    kmpHtml = '<div class="qr-splash-kampanyalar">';
    aktifKmp.slice(0,4).forEach(k=>{
      // genel fiyat (kampanyasız taban)
      const genelK = fiyatKayit(sube, k.urun, k.kanal);
      const masaK = fiyatKayit(sube, k.urun, "masa");
      const masaGenel = (masaK.genel!=null&&masaK.genel>0)?masaK.genel:urunVarsayilanFiyat(k.urun);
      const genel = (k.kanal==="eve") ? ((genelK.genel!=null&&genelK.genel>0)?genelK.genel:masaGenel) : masaGenel;
      // kampanya fiyatını doğrudan kampanyadan hesapla
      let yeni = genel;
      if(k.tip==="oran") yeni = Math.round(genel*(1-k.deger/100));
      else yeni = k.deger;
      if(yeni<0) yeni=0;
      const indEtiket = k.tip==="oran" ? "%"+k.deger : "";
      const aktifSimdi = kampanyaAktifMi(k);  // şu an saat/gün uygun mu → rozet
      kmpHtml += '<div class="qr-splash-kmp glow">'+
        '<div class="qsk-ust"><span class="qsk-ad">🔥 '+k.ad+'</span>'+
        (indEtiket?'<span class="qsk-oran">'+indEtiket+'</span>':'')+'</div>'+
        '<span class="qsk-urun">'+k.urun+(k.kanal==="eve"?' · 🛵 Eve':'')+'</span>'+
        '<span class="qsk-fiyat"><span class="qsk-eski">'+genel+' ₺</span> <span class="qsk-yeni">'+yeni+' ₺</span></span>'+
        '<span class="qsk-zaman">📅 '+kampanyaZamanMetni(k)+
        (aktifSimdi?' <span class="qsk-simdi">şimdi geçerli</span>':'')+'</span>'+
      '</div>';
    });
    kmpHtml += '</div>';
  }
  return '<div class="qr-screen qr-splash">'+
    gorsel+
    '<div class="qr-splash-veil"></div>'+
    '<button class="qr-splash-atla" onclick="splashGec()">Atla ✕</button>'+
    (kmpHtml ? '<div class="qr-splash-kmp-wrap">'+kmpHtml+'</div>' : '')+
    '<div class="qr-splash-alt">'+
      '<div class="qr-splash-rozet glow-soft">'+SPLASH.rozet+'</div>'+
      '<div class="qr-splash-baslik">'+SPLASH.baslik+'</div>'+
      '<div class="qr-splash-altyazi">'+SPLASH.altyazi+'</div>'+
      '<div class="qr-splash-bar"><div class="qr-splash-bar-fill"></div></div>'+
    '</div></div>';
}
function splashGec(){
  clearTimeout(QR._splashTimer);
  // cihaz hafızası varsa → tanı, yoksa → karşılama (kayıt/atla)

    QR.musteri = musteriBul(DEVICE_MEMORY);

function qrKaydol(){
  const ad = (document.getElementById("qrKayitAd").value||"").trim();

  const tel = (document.getElementById("qrKayitTel").value||"").replace(/\D/g,"");

  if(!mail || !mail.includes("@") || !mail.includes(".")){ note("Geçerli bir e-posta gir"); return; }
  // mail kayıtlı mı? → o hesaba gir, yoksa → oluştur
  let m = musteriBulMail(mail);
  if(!m){
    let kanal = QR._kayitKanal||"mail";
    if(!OTP_KANALLAR[kanal] || !OTP_KANALLAR[kanal].aktif) kanal="mail";  // disabled ise mail
    m = {mail:mail, ad:ad, tel:tel, mag:0, damga:0, adresler:[], otpKanal:kanal};
    CUSTOMERS[mail] = m;   // gerçekte customers/{mail} — mail asıl kimlik
  }
  QR.musteri = m; QR.kisi = m.ad; QR.tel = m.tel||"";
  DEVICE_MEMORY = mail;    // cihaz hafızası artık mail ile
  note("Hoş geldin "+m.ad+"! "+(m.damga>0?m.damga+" damgan var":"İlk siparişinle kazanmaya başla"));

function qrAdresEkle(){
  const m=QR.musteri;
  if(m.adresler.length>=ADRES_LIMIT){ note("En fazla "+ADRES_LIMIT+" adres"); return; }
  // kullanılmamış etiketi öner
  const kullanilan=m.adresler.map(a=>a.ad);
  const etiket=ADRES_ETIKETLER.find(e=>!kullanilan.includes(e))||"Diğer";
  const ad=prompt("Adres adı (Ev/İş/Diğer):", etiket);
  if(!ad) return;
  const adres=prompt("Açık adres:");
  if(!adres||!adres.trim()) return;
  m.adresler.push({ad:ad.trim(), adres:adres.trim()});

const TAKIP_DURUM = {
  hazirlaniyor:{ad:"Hazırlanıyor", ic:"👨‍🍳", mesaj:"Siparişin hazırlanıyor"},
  gonderildi:  {ad:"Gönderildi",   ic:"🍽️", mesaj:"Siparişin masana getiriliyor"},
  yolda:       {ad:"Yolda",        ic:"🛵", mesaj:"Siparişin yola çıktı"},
  teslim:      {ad:"Teslim edildi",ic:"✓",  mesaj:"Siparişin teslim edildi · afiyet olsun!"},
  iptal:       {ad:"İptal edildi", ic:"✕",  mesaj:"Siparişin iptal edildi"},

function takipDurumGuncelle(takipId, durum){
  const s = TAKIP_SIPARISLER.find(x=>x.takipId===takipId);
  if(!s) return;
  s.durum = durum;
  s.bildirimler.push({durum:durum, zaman:Date.now()});
  QR_BILDIRIM = {takipId:takipId, durum:durum};
  const app=document.getElementById("qrApp");
  if(app && app.style.display==="block"){
    qrBildirimGoster(durum);
    if(QR.view==="takip"||QR.view==="onay") renderQR();
  }
}
function qrBildirimGoster(durum){
  const dm = TAKIP_DURUM[durum]; if(!dm) return;
  let b = document.getElementById("qrBildirim");
  if(!b){ b=document.createElement("div"); b.id="qrBildirim"; b.className="qr-bildirim"; document.body.appendChild(b); }
  b.innerHTML = '<span class="qb-ic">'+dm.ic+'</span><span class="qb-metin"><strong>'+dm.ad+'</strong>'+dm.mesaj+'</span>';
  b.classList.add("show");
  clearTimeout(b._t);
  b._t = setTimeout(()=>b.classList.remove("show"), 4000);
}

/* Masada siparişte bir ürünü paketle / orada ye (toggle) */
function qrKalemPaket(i){
  QR.sepet[i].paket = !QR.sepet[i].paket;
  renderQR();
}
function qrSiparisGonder(){
  const t = QR.sepet.reduce((s,c)=>s+c.fiyat*c.q,0);
  consumeRecipe(QR.sepet);
  const kalemlerKopya = QR.sepet.map(c=>({ad:c.ad, secimler:c.secimler, fiyat:c.fiyat*c.q, paket:!!c.paket}));
  let takipId = "S"+(_takipId++);
  // EVE TESLİMAT → adresli paket kaydı
  if(QR.siparisTipi==="eve" && QR.musteri){
    const adres = QR.musteri.adresler[QR.secilenAdres||0];
    PAKET_ORDERS.push({
      id:_paketId++, takipId:takipId, tip:"eve", musteri:QR.musteri.ad, tel:QR.musteri.tel,
      adres:adres, kalemler:kalemlerKopya,
      tutar:t, odeme:QR.odemeTipi||"online", durum:"hazirlaniyor", zaman:Date.now()
    });
    QR.sonPaket = true;
  } else if(QR.siparisTipi==="paket"){
    // PAKET (gel-al) → mutfak paket ekranına düşer
    const masaNo = QR.icerideMi ? QR.masa : null;   // içerideyse masaya da bağlı
    PAKET_ORDERS.push({
      id:_paketId++, takipId:takipId, tip:"paket", musteri:QR.kisi||"Müşteri", tel:QR.musteri?QR.musteri.tel:null,
      adres:null, masa:masaNo, kalemler:kalemlerKopya,
      tutar:t, odeme:QR.odemeTipi||"kasada", durum:"hazirlaniyor", zaman:Date.now()
    });
    // içerideyse masaya da "paket" işaretli kalem olarak bağla (masada paket işareti çıksın)
    if(masaNo){
      let s=SESSIONS[masaNo];
      if(!s){ s=SESSIONS[masaNo]={masa:masaNo, acik:true, zaman:Date.now(), kisiler:[]}; }
      let k=s.kisiler.find(x=>x.ad===(QR.kisi||"Müşteri"));
      if(!k){ k={ad:(QR.kisi||"Müşteri"), kalemler:[]}; s.kisiler.push(k); }
      kalemlerKopya.forEach(it=>{
        k.kalemler.push({id:_kalemId++, ad:it.ad, fiyat:it.fiyat, secimler:it.secimler, ekstraRecete:[], durum:"hazirlaniyor", paket:true});
      });
    }
    QR.sonPaket = true;
  } else {
    // MASADA sipariş → SESSIONS'a kişi kalemleri olarak (kalem bazında paket işareti)
    let s=SESSIONS[QR.masa];
    if(!s){ s=SESSIONS[QR.masa]={masa:QR.masa, acik:true, zaman:Date.now(), kisiler:[]}; }
    let k=s.kisiler.find(x=>x.ad===(QR.kisi||"Müşteri"));
    if(!k){ k={ad:(QR.kisi||"Müşteri"), kalemler:[]}; s.kisiler.push(k); }
    QR.sepet.forEach(c=>{
      for(let n=0;n<c.q;n++){
        k.kalemler.push({id:_kalemId++, ad:c.ad, fiyat:c.fiyat, secimler:c.secimler||[], ekstraRecete:[], durum:"bekliyor", paket:!!c.paket});
      }
    });
    // masadan paketli ürün masaya bağlı kalır (kalemde paket:true) — ayrı PAKET_ORDERS oluşturulmaz
    QR.sonPaket = false;
  }
  // MÜŞTERİ TAKİP KAYDI (masa + paket ortak) → "Siparişlerim" ekranında canlı
  TAKIP_SIPARISLER.push({
    takipId:takipId, tip:QR.siparisTipi||"masa", kisi:QR.kisi, tel:QR.musteri?QR.musteri.tel:null,
    masa:QR.masa, kalemler:kalemlerKopya, tutar:t, durum:"hazirlaniyor", zaman:Date.now(),
    bildirimler:[{durum:"hazirlaniyor", zaman:Date.now()}]
  });
  QR.sonTakipId = takipId;
  // OTOMATİK MUTFAK FİŞİ (onaysız, anında)
  mutfakFisiBas({
    tip: QR.siparisTipi||"masa",
    baslik: QR.siparisTipi==="eve"?"EVE TESLİMAT":QR.siparisTipi==="paket"?"PAKET (GEL-AL)":"MASA "+QR.masa,
    alt: QR.kisi,
    kisi: QR.kisi, masa: QR.masa,
    kalemler: kalemlerKopya
  });
  QR.sonTutar = t; QR.sonAdet = QR.sepet.reduce((s,c)=>s+c.q,0);
  // SADAKAT KAZANIMI (kayıtlıysa)
  QR.kazanim = null;
  if(QR.musteri){
    const puanKazanc = Math.round(t * PUAN_ORANI);
    QR.musteri.mag += puanKazanc;
    QR.musteri.damga += 1;
    let bedava = false;
    if(QR.musteri.damga >= DAMGA_HEDEF){ QR.musteri.damga -= DAMGA_HEDEF; bedava = true; }
    QR.kazanim = {puan:puanKazanc, bedava:bedava, damga:QR.musteri.damga};
  }
  QR.sepet = []; QR.view = "onay"; renderQR();
}
function qrOnayHtml(){
  let sadakatBlok = '';
  if(QR.kazanim){
    sadakatBlok = '<div class="qr-onay-sadakat">'+
      '<div class="qr-os-puan">+'+QR.kazanim.puan+' '+SADAKAT.ad+' · +1 damga 🧇</div>'+
      (QR.kazanim.bedava
        ? '<div class="qr-os-bedava">🎉 Tebrikler! '+DAMGA_HEDEF+' damga doldu — sıradaki siparişte 1 ürün bedava!</div>'
        : '<div class="qr-os-kalan">'+(DAMGA_HEDEF-QR.kazanim.damga)+' damga sonra bedava ürün</div>')+
      '</div>';
  }
  // PAKET TESLİMAT onayı (takipli)
  if(QR.sonPaket){
    const son = PAKET_ORDERS[PAKET_ORDERS.length-1];
    const adimlar = son.tip==="paket"
      ? [["hazirlaniyor","Hazırlanıyor","👨‍🍳"],["teslim","Hazır","🥡"]]
      : [["hazirlaniyor","Hazırlanıyor","👨‍🍳"],["yolda","Yolda","🛵"],["teslim","Teslim","✓"]];
    const aktifIdx = adimlar.findIndex(a=>a[0]===son.durum);
    let takip='<div class="qr-teslimat-takip">';
    adimlar.forEach((a,i)=>{
      takip+='<div class="qtt-adim'+(i<=aktifIdx?' aktif':'')+'">'+
        '<div class="qtt-ic">'+a[2]+'</div><div class="qtt-ad">'+a[1]+'</div></div>'+
        (i<adimlar.length-1?'<div class="qtt-cizgi'+(i<aktifIdx?' aktif':'')+'"></div>':'');
    });
    takip+='</div>';
    const gelAl = son.tip==="paket";
    return '<div class="qr-screen qr-onay"><div class="qr-onay-ic">'+
      '<div class="qr-onay-tik" style="background:'+(gelAl?'#8e44ad':'#e67e22')+'">'+(gelAl?'🥡':'🛵')+'</div>'+
      '<div class="qr-onay-baslik">'+(gelAl?'Paket siparişin alındı!':'Eve teslimat siparişin alındı!')+'</div>'+
      '<div class="qr-onay-alt">'+QR.sonAdet+' ürün · '+QR.sonTutar+' ₺<br>'+
        (gelAl
          ? (son.odeme==="kasada"?'Kasada ödenecek':'Ödendi')+' · gel-al'
          : (son.odeme==="online"?'Online ödendi':'Kapıda ödeme')+' · '+son.adres.ad+' adresine')+'</div>'+
      takip+
      sadakatBlok+
      (gelAl
        ? '<div class="qr-onay-masa">🥡 Hazır olunca bildirim alacaksın</div>'
        : '<div class="qr-onay-masa">📍 '+son.adres.adres+'</div>')+
      '<button class="qr-btn-primary" onclick="QR.view=\'takip\';renderQR()">📍 Siparişi takip et</button>'+'<button class="qr-btn-ghost" onclick="QR.view=\'kategoriler\';renderQR()">Yeni sipariş</button>'+
      '<button class="qr-btn-ghost" onclick="note(\'Sipariş No: #'+son.id+'\')">Sipariş durumu: '+TESLIMAT_DURUM[son.durum].ad+'</button>'+
      '</div></div>';
  }
  return '<div class="qr-screen qr-onay"><div class="qr-onay-ic">'+
    '<div class="qr-onay-tik">✓</div>'+
    '<div class="qr-onay-baslik">Siparişin alındı!</div>'+
    '<div class="qr-onay-alt">'+QR.sonAdet+' ürün · '+QR.sonTutar+' ₺<br>Mutfağa iletildi, hazırlanıyor.</div>'+
    sadakatBlok+
    '<div class="qr-onay-masa">Masa '+QR.masa+' · '+QR.kisi+'</div>'+
    '<button class="qr-btn-primary" onclick="QR.view=\'takip\';renderQR()">📍 Siparişi takip et</button>'+'<button class="qr-btn-ghost" onclick="QR.view=\'kategoriler\';renderQR()">Yeni sipariş ekle</button>'+
    '<button class="qr-btn-ghost" onclick="qrGarsonCagir()">🔔 Garson çağır</button>'+
    '<button class="qr-btn-ghost" onclick="qrMutfagaMesaj()">💬 Mutfağa mesaj</button>'+
    '</div></div>';
}
/* QR çağrıları → masaya işlenir (kasa/garson/mutfak rengini değiştirir) */
function qrMasaId(){
  // QR müşterisinin masası (şube::kat|ad formatında olmalı)
  return (QR.sube||AKTIF_SUBE)+"::"+(QR.masaKat||"İç Salon")+"|"+QR.masa;
}
function qrGarsonCagir(){
  const id=qrMasaId();
  if(!SESSIONS[id]) SESSIONS[id]={masa:id, acik:false, zaman:Date.now(), kisiler:[]};
  SESSIONS[id].garsonCagri=true;
  note("🔔 Garson çağrıldı");
}
function qrMutfagaMesaj(){
  const mesaj=prompt("Mutfağa mesajınız (örn. az şekerli olsun, acele):");
  if(!mesaj||!mesaj.trim()) return;
  const id=qrMasaId();
  if(!SESSIONS[id]) SESSIONS[id]={masa:id, acik:false, zaman:Date.now(), kisiler:[]};
  if(!SESSIONS[id].mutfakMesajlari) SESSIONS[id].mutfakMesajlari=[];
  SESSIONS[id].mutfakMesajlari.push({mesaj:mesaj.trim(), kisi:QR.kisi||"Müşteri", zaman:Date.now()});
  SESSIONS[id].mesajVar=true;
  // mutfağa anlık fiş olarak da bas
  mutfakFisiBas({tip:"masa", baslik:masaEtiket(id)+" · 💬 MESAJ", alt:QR.kisi, kisi:QR.kisi||"Müşteri", masa:id,
    kalemler:[{ad:"💬 "+mesaj.trim(), secimler:[], kisi:QR.kisi||"Müşteri"}]});
  note("💬 Mesaj mutfağa iletildi");
}

/* ============================================================
   MUTFAK EKRANI (KDS) — sekmeli: masa kartları + sipariş akışı
   Masaya dokun → kim ne istemiş → iptal, opsiyon kaldır, gönder
   ============================================================ */
let KDS = { sekme:"masalar", acikMasa:null };
const DURUM_META = {
  bekliyor:    {ad:"Bekliyor",     renk:"#e67e22", bg:"#fdf0e3"},
  hazirlaniyor:{ad:"Hazırlanıyor", renk:"#2980b9", bg:"#e8f1f8"},
  gonderildi:  {ad:"Gönderildi",   renk:"#27ae60", bg:"#e6f5ec"},
  iptal:       {ad:"İptal",        renk:"#95a5a6", bg:"#f0f0f0"},
};

function openKDS(){
  document.getElementById("login").style.display="none";
  if(Object.keys(SESSIONS).length===0) seedSessions();
  KDS = { sekme:"masalar", acikMasa:null };
  renderKDS();
  document.getElementById("kdsApp").style.display="block";
}
function closeKDS(){ document.getElementById("kdsApp").style.display="none"; document.getElementById("login").style.display="flex"; }
function kdsSekme(s){ KDS.sekme=s; KDS.acikMasa=null; renderKDS(); }
function kdsMasaAc(m){ KDS.acikMasa=m; renderKDS(); }
function kdsGeri(){ KDS.acikMasa=null; renderKDS(); }

function renderKDS(){
  const el=document.getElementById("kdsApp");
  if(KDS.acikMasa!=null){ el.innerHTML=kdsMasaDetayHtml(KDS.acikMasa); return; }
  let html='<div class="kds-screen"><div class="kds-top">'+
    '<button class="qr-close" style="position:static" onclick="closeKDS()">✕</button>'+
    '<div class="kds-title">👨‍🍳 Mutfak · '+AKTIF_SUBE+'</div>'+
    '<div class="kds-saat" id="kdsSaat">'+new Date().toLocaleTimeString('tr',{hour:'2-digit',minute:'2-digit'})+'</div></div>'+
    '<div class="kds-sekme-row">'+
      '<button class="kds-sekme'+(KDS.sekme==="masalar"?' on':'')+'" onclick="kdsSekme(\'masalar\')">🍽️ Masalar</button>'+
      '<button class="kds-sekme'+(KDS.sekme==="akis"?' on':'')+'" onclick="kdsSekme(\'akis\')">📋 Akış</button>'+
      '<button class="kds-sekme'+(KDS.sekme==="paket"?' on':'')+'" onclick="kdsSekme(\'paket\')">🛵 Paket'+
        (PAKET_ORDERS.filter(p=>p.durum==="hazirlaniyor").length>0?' <span class="kds-rozet-n">'+PAKET_ORDERS.filter(p=>p.durum==="hazirlaniyor").length+'</span>':'')+'</button>'+
      '<button class="kds-sekme'+(KDS.sekme==="fisler"?' on':'')+'" onclick="kdsSekme(\'fisler\')">🖨️ Fişler</button>'+
    '</div>';
  html += (KDS.sekme==="masalar") ? kdsMasalarHtml() : (KDS.sekme==="akis") ? kdsAkisHtml() : (KDS.sekme==="fisler") ? kdsFislerHtml() : kdsPaketHtml();
  html += '</div>';
  el.innerHTML=html;
}

/* SEKME: Basılan fişler — mutfak tekrar yazdırabilir */
function kdsFislerHtml(){
  if(MUTFAK_FISLER.length===0) return '<div class="kds-bos">Henüz fiş basılmadı 🖨️</div>';
  let html='<div class="kds-fis-list">';
  MUTFAK_FISLER.forEach((f,i)=>{
    const paketN=f.kalemler.filter(it=>it.paket).length;
    const dk=Math.floor((Date.now()-f.zaman)/60000);
    html+='<div class="kds-fis-kart" onclick="fisGoster(MUTFAK_FISLER['+i+'],false)">'+
      '<div class="kfk-ust"><span class="kfk-no">🖨️ Fiş #'+f.no+' · '+f.baslik+'</span>'+
        '<span class="kfk-dk">'+dk+' dk önce</span></div>'+
      '<div class="kfk-urunler">'+f.kalemler.map(k=>k.ad).join(', ')+'</div>'+
      '<div class="kfk-alt">'+f.kalemler.length+' ürün'+(paketN?' · 📦 '+paketN+' paket':'')+' · dokun → tekrar yazdır</div>'+
    '</div>';
  });
  html+='</div>';
  return html;
}

/* SEKME 3: Paket siparişler (eve teslimat) */
function kdsPaketHtml(){
  const aktif=PAKET_ORDERS.filter(p=>p.durum!=="teslim"&&p.durum!=="iptal");
  if(aktif.length===0) return '<div class="kds-bos">Bekleyen paket sipariş yok 🛵</div>';
  let html='<div class="kds-akis-list">';
  aktif.forEach(p=>{
    const dm=TESLIMAT_DURUM[p.durum];
    const dk=Math.floor((Date.now()-p.zaman)/60000);
    const gelAl = p.tip==="paket";   // gel-al paketi
    const ikon = gelAl ? "🥡" : "🛵";
    const tipAd = gelAl ? "PAKET (Gel-al)" : "Eve teslimat";
    html+='<div class="kds-paket-kart'+(gelAl?' kp-gelal':'')+'" style="border-left:4px solid '+(gelAl?'#8e44ad':dm.renk)+'">'+
      '<div class="kak-ust"><span class="kak-masa">'+ikon+' '+tipAd+' #'+p.id+' · '+p.musteri+'</span>'+
        '<span class="kak-durum" style="color:'+dm.renk+'">'+dm.ic+' '+dm.ad+'</span></div>'+
      '<div class="kp-paketrozet">'+ikon+' Bu sipariş paketlenecek</div>'+
      (gelAl
        ? '<div class="kp-tel">'+(p.tel?'📞 '+p.tel+' · ':'')+dk+' dk önce · '+(p.odeme==="kasada"?'💵 Kasada ödenecek':'✓ Ödendi')+'</div>'
        : '<div class="kp-adres">📍 '+p.adres.ad+' · '+p.adres.adres+'</div>'+
          '<div class="kp-tel">📞 '+p.tel+' · '+dk+' dk önce · '+(p.odeme==="online"?'✓ Online ödendi':'💵 Kapıda ödeme')+'</div>')+
      '<div class="kp-kalemler">'+p.kalemler.map(k=>'• '+k.ad+(k.secimler.length?' <small>('+k.secimler.join(', ')+')</small>':'')).join('<br>')+'</div>'+
      '<div class="kp-tutar">'+p.tutar+' ₺</div>'+
      '<div class="kak-aksiyon">'+
        (gelAl
          ? (p.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsPaketDurum('+p.id+',\'teslim\')">🥡 Paketlendi · hazır</button>':'')
          : (p.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsPaketDurum('+p.id+',\'yolda\')">🛵 Yola çıktı</button>':'')+
            (p.durum==="yolda"?'<button class="kak-btn gonder" onclick="kdsPaketDurum('+p.id+',\'teslim\')">✓ Teslim edildi</button>':''))+
        '<button class="kak-btn iptal" onclick="kdsPaketDurum('+p.id+',\'iptal\')">İptal</button>'+
      '</div></div>';
  });
  html+='</div>';
  return html;
}
function kdsPaketDurum(id, durum){
  const p=PAKET_ORDERS.find(x=>x.id===id);
  if(p){
    p.durum=durum; note("Paket #"+id+" · "+TESLIMAT_DURUM[durum].ad);
    if(p.takipId) takipDurumGuncelle(p.takipId, durum);   // müşteriye bildirim
  }
  renderKDS();
}

/* SEKME 1: Masa kartları */
function kdsMasalarHtml(){
  const masalar=Object.keys(SESSIONS).filter(m=>SESSIONS[m].acik);
  if(masalar.length===0) return '<div class="kds-bos">Açık masa yok</div>';
  let html='<div class="kds-masa-grid">';
  masalar.forEach(m=>{
    const mq="'"+String(m).replace(/'/g,"\\'")+"'";
    const kalemler=masaKalemleri(m).filter(it=>it.durum!=="iptal");
    const bekleyen=kalemler.filter(it=>it.durum==="bekliyor").length;
    const hazir=kalemler.filter(it=>it.durum==="hazirlaniyor").length;
    const paketVar=kalemler.some(it=>it.paket);
    const dk=Math.floor((Date.now()-SESSIONS[m].zaman)/60000);
    const mesajVar=SESSIONS[m].mesajVar;
    html+='<button class="kds-masa-kart'+(bekleyen>0?' acil':'')+(mesajVar?' kds-mesajli':'')+'" onclick="kdsMasaAc('+mq+')">'+
      '<div class="kmk-ust"><span class="kmk-no">'+masaEtiket(m)+(paketVar?' <span class="kmk-paket">🥡</span>':'')+'</span><span class="kmk-dk">'+dk+' dk</span></div>'+
      '<div class="kmk-kisi">'+SESSIONS[m].kisiler.length+' kişi · '+kalemler.length+' ürün</div>'+
      '<div class="kmk-durum">'+
        (mesajVar?'<span class="kmk-rozet mesaj">💬 mesaj var</span>':'')+
        (paketVar?'<span class="kmk-rozet paket">🥡 paket var</span>':'')+
        (bekleyen>0?'<span class="kmk-rozet bek">'+bekleyen+' bekliyor</span>':'')+
        (hazir>0?'<span class="kmk-rozet haz">'+hazir+' hazırlanıyor</span>':'')+
        (bekleyen===0&&hazir===0&&!paketVar?'<span class="kmk-rozet tamam">✓ hazır</span>':'')+
      '</div></button>';
  });
  html+='</div>';
  return html;
}

/* SEKME 2: Sipariş akışı (tüm bekleyen/hazırlanan kalemler, gelen sırayla) */
function kdsAkisHtml(){
  const tum=[];
  Object.keys(SESSIONS).forEach(m=>{
    masaKalemleri(m).forEach(it=>{ if(it.durum==="bekliyor"||it.durum==="hazirlaniyor") tum.push({...it, masa:m}); });
  });
  if(tum.length===0) return '<div class="kds-bos">Hazırlanacak sipariş yok 🎉</div>';
  let html='<div class="kds-akis-list">';
  tum.forEach(it=>{
    const mq="'"+String(it.masa).replace(/'/g,"\\'")+"'";
    const dm=DURUM_META[it.durum];
    html+='<div class="kds-akis-kart" style="border-left:4px solid '+dm.renk+'">'+
      '<div class="kak-ust"><span class="kak-masa">'+masaEtiket(it.masa)+' · '+it.kisi+(it.paket?' <span class="kak-paket">🥡 PAKET</span>':'')+'</span>'+
        '<span class="kak-durum" style="background:'+dm.bg+';color:'+dm.renk+'">'+dm.ad+'</span></div>'+
      '<div class="kak-ad">'+it.ad+'</div>'+
      (it.secimler.length?'<div class="kak-secim">'+it.secimler.join(' · ')+'</div>':'')+
      '<div class="kak-aksiyon">'+
        (it.durum==="bekliyor"?'<button class="kak-btn haz" onclick="kdsDurum('+mq+','+it.id+',\'hazirlaniyor\')">Hazırlamaya başla</button>':'')+
        (it.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsDurum('+mq+','+it.id+',\'gonderildi\')">✓ Gönderildi</button>':'')+
        '<button class="kak-btn iptal" onclick="kdsIptal('+mq+','+it.id+')">İptal</button>'+
      '</div></div>';
  });
  html+='</div>';
  return html;
}

/* Masa detayı — kim ne istemiş, iptal, opsiyon kaldır, gönder */
function kdsMasaDetayHtml(m){
  const s=SESSIONS[m];
  const mq="'"+String(m).replace(/'/g,"\\'")+"'";
  let html='<div class="kds-screen"><div class="kds-top">'+
    '<button class="qr-close" style="position:static" onclick="kdsGeri()">←</button>'+
    '<div class="kds-title">'+masaEtiket(m)+' detayı</div>'+
    '<button class="kds-fis-btn" onclick="kdsFisYazdir('+mq+')">🖨️ Mutfak fişi</button></div>'+
    '<div class="kds-detay">';
  // müşteri mesajları (varsa)
  if(s.mutfakMesajlari && s.mutfakMesajlari.length){
    html+='<div class="kds-mesaj-blok"><div class="kds-mesaj-baslik">💬 Müşteri mesajları</div>';
    s.mutfakMesajlari.forEach(msj=>{
      html+='<div class="kds-mesaj">'+msj.mesaj+' <small>· '+(msj.kisi||'')+'</small></div>';
    });
    html+='<button class="kds-mesaj-okundu" onclick="kdsMesajOkundu('+mq+')">✓ Okundu</button></div>';
  }
  s.kisiler.forEach(k=>{
    html+='<div class="kds-kisi-blok"><div class="kds-kisi-ad">👤 '+k.ad+'</div>';
    k.kalemler.forEach((it,idx)=>{
      const dm=DURUM_META[it.durum];
      const iptalli=it.durum==="iptal";
      html+='<div class="kds-kalem'+(iptalli?' iptalli':'')+(it.paket?' kds-paket-kalem':'')+'">'+
        '<div class="kk-ust"><span class="kk-ad">'+(it.paket?'🥡 ':'')+it.ad+'</span>'+
          '<span class="kk-fiyat">'+it.fiyat+' ₺</span></div>'+
        '<div class="kk-durum" style="color:'+dm.renk+'">'+(it.paket?'PAKET · ':'')+dm.ad+'</div>';
      // opsiyonlar — her biri kaldırılabilir (stok bitti)
      if(it.secimler.length && !iptalli){
        html+='<div class="kk-opsiyonlar">';
        it.secimler.forEach((op,oi)=>{
          html+='<span class="kk-ops">'+op+
            '<button class="kk-ops-x" onclick="kdsOpsKaldir('+mq+','+it.id+','+oi+')" title="Stok bitti, kaldır">✕</button></span>';
        });
        html+='</div>';
      }
      if(!iptalli){
        html+='<div class="kk-aksiyon">'+
          (it.durum==="bekliyor"?'<button class="kak-btn haz" onclick="kdsDurum('+mq+','+it.id+',\'hazirlaniyor\')">Hazırla</button>':'')+
          (it.durum==="hazirlaniyor"?'<button class="kak-btn gonder" onclick="kdsDurum('+mq+','+it.id+',\'gonderildi\')">Gönderildi</button>':'')+
          (it.durum==="gonderildi"?'<span class="kk-tamam">✓ Teslim edildi</span>':'')+
          '<button class="kak-btn iptal" onclick="kdsIptal('+mq+','+it.id+')">İptal</button>'+
        '</div>';
      }
      html+='</div>';
    });
    html+='</div>';
  });
  html+='</div></div>';
  return html;
}

function kdsDurum(m,id,d){ kalemDurum(m,id,d); note(DURUM_META[d].ad); renderKDS(); }
function kdsMesajOkundu(m){ const s=SESSIONS[m]; if(s){ s.mesajVar=false; s.mutfakMesajlari=[]; } note("Mesaj okundu"); renderKDS(); }

/* Mutfak fişi (KOT) — paketlenecekler AYRI gruplanır */
function kdsFisYazdir(m){
  // masanın anlık fişini üret ve göster (yeni fiş kaydı oluşturmadan, anlık)
  const kalemler=masaKalemleri(m).filter(it=>it.durum!=="iptal");
  const fis={no:"—", zaman:Date.now(), tip:"masa", baslik:"MASA "+m, alt:AKTIF_SUBE,
    kalemler:kalemler.map(it=>({ad:it.ad, secimler:it.secimler, kisi:it.kisi, paket:it.paket}))};
  fisGoster(fis, false);
}
/* Fişi modal olarak göster (tekrar yazdırma) */
function fisGoster(fis, otomatik){
  let mdl=document.getElementById("fisModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="fisModal"; mdl.className="modal-bg"; document.body.appendChild(mdl); }
  mdl.innerHTML='<div class="fis-modal-ic">'+
    (otomatik?'<div class="fis-oto-rozet">🖨️ Otomatik yazdırıldı</div>':'')+
    fisIcerikHtml(fis)+
    '<div class="fis-aksiyon"><button class="kak-btn gonder" onclick="window.print&&window.print()">🖨️ Tekrar yazdır</button>'+
    '<button class="kak-btn iptal" onclick="document.getElementById(\'fisModal\').classList.remove(\'on\')">Kapat</button></div></div>';
  mdl.classList.add("on");
}
function kdsIptal(m,id){ kalemIptal(m,id); note("Kalem iptal edildi · tutar düştü"); renderKDS(); }
function kdsOpsKaldir(m,id,oi){
  kalemOpsiyonKaldir(m,id,oi,0);
  note("Opsiyon kaldırıldı (stok bitti)");
  renderKDS();
}

/* ============================================================
   GARSON EKRANI (tablet/mobil) — masaları gör, kişiye ürün ekle
   Mutfakla aynı SESSIONS çekirdeği. Garson ekleyince mutfak görür.
   ============================================================ */
let GARSON = { view:"masalar", masa:null, kisi:null, aktifKat:"Tatlılar" };

function openGarson(){
  document.getElementById("login").style.display="none";
  if(Object.keys(SESSIONS).length===0) seedSessions();
  GARSON = { view:"masalar", masa:null, kisi:null, aktifKat:"Tatlılar" };
  renderGarson();
  document.getElementById("garsonApp").style.display="block";
}
function closeGarson(){ document.getElementById("garsonApp").style.display="none"; document.getElementById("login").style.display="flex"; }

function renderGarson(){
  const el=document.getElementById("garsonApp");
  if(GARSON.view==="masalar")    el.innerHTML=garsonMasalarHtml();
  else if(GARSON.view==="masa")  el.innerHTML=garsonMasaHtml();
  else if(GARSON.view==="menu")  el.innerHTML=garsonMenuHtml();
  el.scrollTop=0;
}

/* 1) Masa listesi */
function garsonMasalarHtml(){
  const aktifPaket=PAKET_ORDERS.filter(p=>p.durum!=="teslim"&&p.durum!=="iptal");
  let html='<div class="grs-screen"><div class="grs-top">'+
    '<button class="qr-close" style="position:static" onclick="closeGarson()">✕</button>'+
    '<div class="grs-title">🧑‍💼 Garson · '+AKTIF_SUBE+'</div>'+
    '<div style="width:36px"></div></div>'+
    // Masa / Paket sekmeleri
    '<div class="grs-sekme-row">'+
      '<button class="grs-sekme'+((GARSON.sekme||"masa")==="masa"?' on':'')+'" onclick="garsonSekme(\'masa\')">🍽️ Masalar</button>'+
      '<button class="grs-sekme'+(GARSON.sekme==="paket"?' on':'')+'" onclick="garsonSekme(\'paket\')">🥡 Paket'+(aktifPaket.length?' ('+aktifPaket.length+')':'')+'</button>'+
    '</div>';
  if(GARSON.sekme==="paket"){
    html+='<div class="grs-paket-bolum">'+
      '<button class="grs-yeni-paket" onclick="garsonPaketBasla()">+ Yeni paket sipariş</button>'+
      '<div class="grs-paket-list">';
    if(aktifPaket.length===0){
      html+='<div class="grs-bos-detay">Bekleyen paket sipariş yok.</div>';
    } else {
      aktifPaket.forEach(p=>{
        const dm=TESLIMAT_DURUM[p.durum];
        const gelAl=p.tip==="paket";
        html+='<div class="grs-paket-kart"><div class="grs-pk-ust">'+
          '<span class="grs-pk-no">'+(gelAl?'🥡 Gel-al':'🛵 Eve')+' #'+p.id+' · '+p.musteri+'</span>'+
          '<span class="grs-pk-durum" style="color:'+dm.renk+'">'+dm.ic+' '+dm.ad+'</span></div>'+
          '<div class="grs-pk-urunler">'+p.kalemler.map(k=>k.ad).join(', ')+'</div>'+
          '<div class="grs-pk-tutar">'+p.tutar+' ₺</div></div>';
      });
    }
    html+='</div></div></div>';
    return html;
  }
  const masalar = subeMasalari(AKTIF_SUBE);
  const katlar = [...new Set(masalar.map(m=>m.kat))];
  if(masalar.length===0){
    html+='<div class="grs-bos-detay">Bu şubede masa tanımlı değil.</div></div>';
    return html;
  }
  katlar.forEach(kat=>{
    html+='<div class="grs-kat-baslik">📁 '+kat+'</div><div class="grs-masa-grid">';
    masalar.filter(mm=>mm.kat===kat).forEach(mm=>{
      const id=AKTIF_SUBE+"::"+mm.id;
      const s=SESSIONS[id]; const acik=s&&s.acik;
      const kalemler=acik?masaKalemleri(id).filter(it=>it.durum!=="iptal"):[];
      const dur=masaDurum(id);
      html+='<button class="grs-masa'+(acik?' dolu':'')+'" style="background:'+dur.bg+';border-color:'+dur.renk+'" onclick="garsonMasaAc(\''+id.replace(/'/g,"\\'")+'\')">'+
        '<div class="grs-m-no">'+mm.ad+'</div>'+
        '<div class="grs-m-durum" style="color:'+dur.renk+';font-size:11px;font-weight:800">'+dur.ad+'</div>'+
        (acik
          ? '<div class="grs-m-bilgi">'+s.kisiler.length+' kişi · '+kalemler.length+' ürün</div><div class="grs-m-tutar">'+masaToplam(id)+' ₺</div>'
          : '')+
      '</button>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}
function garsonSekme(s){ GARSON.sekme=s; renderGarson(); }
/* Garson yeni paket sipariş başlat — menüden seçer, paket olarak kaydolur */
function garsonPaketBasla(){
  const ad=prompt("Paket sipariş için müşteri adı (fişte görünecek):");
  if(!ad || !ad.trim()){ note("İsim zorunlu (fiş için)"); return; }
  GARSON.paketModu=true; GARSON.masa="paket"; GARSON.kisi=ad.trim(); GARSON.paketMusteri=ad.trim(); GARSON.paketSepet=[];
  GARSON.view="menu"; renderGarson();
}
function garsonMasaAc(m){
  GARSON.masa=m; GARSON.view="masa";
  if(!SESSIONS[m]) SESSIONS[m]={masa:m, acik:false, zaman:Date.now(), kisiler:[]};
  masaCagriTemizle(m);   // garson ilgilendi
  renderGarson();
}

/* 2) Masa detayı — kişiler, siparişler, ürün ekle */
function garsonMasaHtml(){
  const m=GARSON.masa, s=SESSIONS[m];
  let html='<div class="grs-screen"><div class="grs-top">'+
    '<button class="qr-close" style="position:static" onclick="GARSON.view=\'masalar\';renderGarson()">←</button>'+
    '<div class="grs-title">'+masaEtiket(m)+'</div>'+
    '<div class="grs-tutar-rozet">'+masaToplam(m)+' ₺</div></div>'+
    '<div class="grs-detay">';
  if(s.kisiler.length===0){
    html+='<div class="grs-bos-detay">Bu masada henüz sipariş yok.<br>Aşağıdan kişi ekleyip ürün girebilirsin.</div>';
  }
  s.kisiler.forEach(k=>{
    const kt=k.kalemler.filter(it=>it.durum!=="iptal").reduce((a,it)=>a+it.fiyat,0);
    html+='<div class="grs-kisi-blok"><div class="grs-kisi-ust"><span class="grs-kisi-ad">👤 '+k.ad+' <small>'+kt+' ₺</small></span></div>';
    k.kalemler.forEach(it=>{
      const dm=DURUM_META[it.durum];
      html+='<div class="grs-kalem'+(it.durum==="iptal"?' iptal':'')+(it.paket?' grs-kalem-paket':'')+'">'+
        '<div class="grs-k-bilgi"><span class="grs-k-ad">'+(it.paket?'📦 ':'')+it.ad+(it.paket?' <span class="grs-paket-rozet">PAKET</span>':'')+'</span>'+
        (it.secimler.length?'<span class="grs-k-secim">'+it.secimler.join(' · ')+'</span>':'')+'</div>'+
        '<div class="grs-k-sag"><span class="grs-k-durum" style="color:'+dm.renk+'">'+dm.ad+'</span>'+
        '<span class="grs-k-fiyat">'+it.fiyat+' ₺</span></div></div>';
    });
    html+='</div>';
  });
  html+='</div>'+

/* Yeni sipariş başlat — kişi sepette seçilecek */
function garsonYeniSiparis(m){
  GARSON.masa=m; GARSON.kisi=null; GARSON.masaSepet=[]; GARSON.view="menu"; renderGarson();
}
function garsonYeniKisi(m){
  const ad=prompt("Kişi adı:");
  if(ad&&ad.trim()){
    if(!SESSIONS[m].kisiler.find(k=>k.ad===ad.trim())){
      SESSIONS[m].kisiler.push({ad:ad.trim(), kalemler:[]});
    }
    renderGarson();
  }
}
function garsonUrunEkleBasla(m, kisi){
  GARSON.masa=m; GARSON.kisi=kisi; GARSON.view="menu"; renderGarson();
}

/* 3) Menü — ürün seç (garson kişiye ekliyor) */
function garsonMenuHtml(){
  const kats=[...new Set(DEMO_PRODUCTS.map(p=>p.kat))];
  const prods=DEMO_PRODUCTS.filter(p=>p.kat===GARSON.aktifKat);
  const paketModu=GARSON.paketModu;
  const baslik = paketModu ? '🥡 Paket sipariş' : masaEtiket(GARSON.masa)+(GARSON.kisi?' · '+GARSON.kisi:' · yeni sipariş');
  let html='<div class="grs-screen"><div class="grs-top">'+
    '<button class="qr-close" style="position:static" onclick="'+(paketModu?'GARSON.paketModu=false;GARSON.view=\'masalar\'':'GARSON.view=\'masa\'')+';renderGarson()">←</button>'+
    '<div class="grs-title">'+baslik+'</div>'+
    '<div style="width:36px"></div></div>'+
    '<div class="grs-kat-row">';
  kats.forEach(k=>{ html+='<button class="qr-kat'+(k===GARSON.aktifKat?' on':'')+'" onclick="garsonKat(\''+k+'\')">'+k+'</button>'; });
  html+='</div><div class="grs-menu-list">';
  const grsSirali=prods.slice().sort((a,b)=>{
    const ia=urunFiyatBilgi(a.ad,AKTIF_SUBE,"masa").indirimli?0:1;
    const ib=urunFiyatBilgi(b.ad,AKTIF_SUBE,"masa").indirimli?0:1;
    return ia-ib;
  });
  grsSirali.forEach(p=>{
    const pi=DEMO_PRODUCTS.indexOf(p);
    const satilir=urunSatilabilir(p);
    const fb=urunFiyatBilgi(p.ad, AKTIF_SUBE, "masa");
    const fiyatHtml = fb.indirimli
      ? '<span class="grs-u-fiyat indirimli"><span class="grs-u-eski">'+fb.eski+'₺</span><span class="grs-u-yeni blink">'+fb.gecerli+'₺</span></span>'
      : '<span class="grs-u-fiyat">'+fb.gecerli+' ₺</span>';
    html+='<button class="grs-urun'+(satilir?'':' tukendi')+(fb.indirimli?' grs-indirimli blink-soft':'')+'" onclick="garsonUrunSec('+pi+')">'+
      '<div class="grs-u-info"><div class="grs-u-ad">'+p.ad+'</div>'+
      (p.aciklama?'<div class="grs-u-desc">'+p.aciklama+'</div>':'')+
      ((fb.indirimli&&fb.aciklama)?'<div class="grs-u-kampanya blink">🔥 '+fb.aciklama+'</div>':'')+'</div>'+
      '<div class="grs-u-sag">'+(satilir?fiyatHtml+'<span class="grs-u-add">+</span>':'<span class="grs-u-tukendi">Tükendi</span>')+'</div>'+
    '</button>';
  });
  html+='</div>';
  // paket sepeti barı (paket modunda)
  if(paketModu && GARSON.paketSepet && GARSON.paketSepet.length>0){
    const pt=GARSON.paketSepet.reduce((s,c)=>s+c.fiyat,0);
    html+='<div class="grs-paket-bar">'+
      '<div class="grs-pb-bilgi">'+GARSON.paketSepet.length+' ürün · '+pt+' ₺</div>'+
      '<button class="grs-pb-gonder" onclick="garsonPaketGonder()">🥡 Paketi gönder →</button>'+
    '</div>';
  }
  // masa sepeti barı (masa modunda) — sadece bu sepet gönderilecek
  if(!paketModu && GARSON.masaSepet && GARSON.masaSepet.length>0){
    const mt=GARSON.masaSepet.reduce((s,c)=>s+c.fiyat,0);
    const s=SESSIONS[GARSON.masa];
    html+='<div class="grs-sepet-panel">';
    // kişi seçimi (sepetin içinde)
    html+='<div class="grs-sp-kisi"><div class="grs-sp-kbaslik">Kim için? *</div><div class="grs-sp-kisiler">';
    if(s&&s.kisiler.length){
      s.kisiler.forEach(k=>{
        html+='<button class="grs-sp-kbtn'+(GARSON.kisi===k.ad?' on':'')+'" onclick="GARSON.kisi=\''+k.ad.replace(/'/g,"\\'")+'\';renderGarson()">'+k.ad+'</button>';
      });
    }
    html+='<button class="grs-sp-kbtn yeni" onclick="garsonSepetYeniKisi()">+ Yeni kişi</button>';
    html+='</div></div>';
    html+='<div class="grs-sp-baslik">🧾 Sepet ('+GARSON.masaSepet.length+')</div>';
    GARSON.masaSepet.forEach((c,i)=>{
      html+='<div class="grs-sp-kalem'+(c.paket?' grs-sp-paketli':'')+'"><span>'+(c.paket?'📦 ':'')+c.ad+(c.secimler&&c.secimler.length?' <small>'+c.secimler.join(', ')+'</small>':'')+
        ' <button class="grs-sp-paketle'+(c.paket?' on':'')+'" onclick="garsonSepetPaket('+i+')">'+(c.paket?'📦 Paket':'📦 Paketle')+'</button></span>'+
        '<span class="grs-sp-sag">'+c.fiyat+' ₺ <button class="grs-sp-sil" onclick="garsonSepetSil('+i+')">✕</button></span></div>';
    });
    const gonderAktif=!!GARSON.kisi;
    html+='<div class="grs-sepet-bar"><div class="grs-pb-bilgi">'+mt+' ₺'+(GARSON.kisi?' · '+GARSON.kisi:'')+'</div>'+
      (gonderAktif
        ? '<button class="grs-pb-gonder" onclick="garsonMasaGonder()">✓ Siparişi gönder →</button>'
        : '<button class="grs-pb-gonder" disabled style="opacity:.4">Kişi seç</button>')+'</div>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}
function garsonSepetSil(i){ GARSON.masaSepet.splice(i,1); renderGarson(); }
function garsonSepetPaket(i){ GARSON.masaSepet[i].paket = !GARSON.masaSepet[i].paket; renderGarson(); }
function garsonSepetYeniKisi(){
  const ad=prompt("Yeni kişi adı:");
  if(ad&&ad.trim()){ GARSON.kisi=ad.trim(); renderGarson(); }
}
function garsonKat(k){ GARSON.aktifKat=k; renderGarson(); }

function garsonUrunSec(pi){
  const p=DEMO_PRODUCTS[pi];
  if(!urunSatilabilir(p)) return;
  const opts=PRODUCT_OPTIONS[p.ad];
  if(opts&&opts.length){
    OPT_STATE={idx:pi, p:p, secim:{}, not:"", kapatMod:false, garson:true};
    PRODUCT_OPTIONS[p.ad].forEach((grup,gi)=>{ OPT_STATE.secim[gi]= grup.tip==="zorunlu_tekli"?[0]:[]; });
    renderOptionModal();
    document.getElementById("optModal").classList.add("on");
  } else if(GARSON.paketModu){
    // paket sepetine ekle
    if(!GARSON.paketSepet) GARSON.paketSepet=[];
    GARSON.paketSepet.push({ad:p.ad, fiyat:urunGecerliFiyat(p.ad), secimler:[]});
    note(p.ad+" → Paket sepeti");
    renderGarson();
  } else {
    // MASA sepeti — geçici, "Siparişi gönder" ile masaya+mutfağa gider (tek fiş)
    if(!GARSON.masaSepet) GARSON.masaSepet=[];
    GARSON.masaSepet.push({ad:p.ad, fiyat:urunGecerliFiyat(p.ad), secimler:[], paket:false});
    note(p.ad+" → sepet");
    renderGarson();
  }
}
/* Garson masa siparişini gönder — sadece YENİ sepet mutfağa + tek fiş */
function garsonMasaGonder(){
  if(!GARSON.masaSepet || GARSON.masaSepet.length===0){ note("Sepet boş"); return; }
  const m=GARSON.masa, kisi=GARSON.kisi;
  let s=SESSIONS[m]; if(!s){ s=SESSIONS[m]={masa:m, acik:true, zaman:Date.now(), kisiler:[]}; }
  s.acik=true;   // sipariş geldi → masa açıldı
  let k=s.kisiler.find(x=>x.ad===kisi);
  if(!k){ k={ad:kisi, kalemler:[]}; s.kisiler.push(k); }
  // sadece bu sepet kalemleri masaya eklenir
  GARSON.masaSepet.forEach(c=>{
    k.kalemler.push({id:_kalemId++, ad:c.ad, fiyat:c.fiyat, secimler:c.secimler||[], ekstraRecete:[], durum:"bekliyor", paket:!!c.paket});
  });
  consumeRecipe(GARSON.masaSepet.map(c=>({...c, q:1, ekstraRecete:[]})));
  // TEK FİŞ — sadece bu sepet (eski ürünler hariç)
  mutfakFisiBas({
    tip:"masa", baslik:"MASA "+m, alt:kisi, kisi:kisi, masa:m,
    kalemler:GARSON.masaSepet.map(c=>({ad:c.ad, secimler:c.secimler, kisi:kisi, paket:!!c.paket}))
  });
  // paketli kalemler ayrıca paket ekranına
  // masadan paketli ürün masaya bağlı kalır (kalemde paket:true) — ayrı PAKET_ORDERS yok
  note("✓ Sipariş gönderildi · fiş çıktı ("+kisi+")");
  GARSON.masaSepet=[]; GARSON.view="masa"; renderGarson();
}
/* Garson paket siparişini mutfağa gönder */
function garsonPaketGonder(){
  if(!GARSON.paketSepet || GARSON.paketSepet.length===0){ note("Paket sepeti boş"); return; }
  const t=GARSON.paketSepet.reduce((s,c)=>s+c.fiyat,0);
  const takipId="S"+(_takipId++);
  PAKET_ORDERS.push({
    id:_paketId++, takipId:takipId, tip:"paket", musteri:GARSON.paketMusteri||"Paket müşteri", tel:null,
    adres:null, kalemler:GARSON.paketSepet.map(c=>({ad:c.ad, secimler:c.secimler, fiyat:c.fiyat})),
    tutar:t, odeme:"kasada", durum:"hazirlaniyor", zaman:Date.now()
  });
  consumeRecipe(GARSON.paketSepet.map(c=>({...c, q:1, ekstraRecete:[]})));
  // OTOMATİK MUTFAK FİŞİ
  mutfakFisiBas({
    tip:"paket", baslik:"PAKET (GEL-AL)", alt:GARSON.paketMusteri||"Paket müşteri",
    kisi:GARSON.paketMusteri, kalemler:GARSON.paketSepet.map(c=>({ad:c.ad, secimler:c.secimler, paket:true}))
  });
  note("🥡 Paket sipariş mutfağa gönderildi");
  GARSON.paketSepet=[]; GARSON.paketModu=false; GARSON.paketMusteri=null;
  GARSON.sekme="paket"; GARSON.view="masalar"; renderGarson();
}

function note(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast";
    t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s,transform .2s";
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity="1"; t.style.transform="translateX(-50%) translateY(0)";
  clearTimeout(t._h);
  t._h=setTimeout(function(){t.style.opacity="0"; t.style.transform="translateX(-50%) translateY(8px)";},2200);
}

/* ============================================================
   9) FIREBASE BAĞLANTI KATMANI (opsiyonel)
   ------------------------------------------------------------
   FIREBASE_CONFIG doldurulursa buluta bağlanır, onSnapshot ile
   canlı veri akar. Boşsa sistem offline kuyrukla çalışır —
   satış hiç durmaz, bağlantı gelince senkron olur.
   ============================================================ */
const FIREBASE_CONFIG = {
  // Buraya Firebase konsol config'i yapıştırılır:
  // apiKey:"...", authDomain:"...", projectId:"...", ...
};

window.__db = null;
window.__sube = "kadikoy";

async function initFirebase(){
  const dolu = FIREBASE_CONFIG && FIREBASE_CONFIG.projectId;
  if(!dolu){
    setConnState(false, "Offline mod · yerel kayıt aktif");
    return;
  }
  try{
    // Firebase SDK dinamik yüklenir (offline'da hata vermez)
    const app = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const fs  = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const a = app.initializeApp(FIREBASE_CONFIG);
    const db = fs.getFirestore(a);
    // Offline persistence — terminal yerel cache tutar
    try{ await fs.enableIndexedDbPersistence(db); }catch(e){}
    window.__db = db; window.__fs = fs;
    setConnState(true, "Buluta bağlı · canlı senkron");
    flushQueue();
  }catch(e){
    setConnState(false, "Bağlantı yok · offline kuyruk");
  }
}

function setConnState(online, msg){
  let el = document.getElementById("connState");
  if(!el){
    el = document.createElement("div");
    el.id = "connState";
    el.style.cssText = "position:fixed;bottom:14px;left:14px;font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:99px;z-index:80;display:flex;align-items:center;gap:6px";
    document.body.appendChild(el);
  }
  el.style.background = online ? "var(--ok-soft)" : "var(--warn-soft)";
  el.style.color = online ? "var(--ok)" : "var(--warn)";
  el.innerHTML = `<span style="width:7px;height:7px;border-radius:99px;background:currentColor"></span>${msg}`;
}

/* Bağlantı gelince offline kuyruğu boşalt */
function flushQueue(){
  if(!window.__db || !OFFLINE_QUEUE.length) return;
  const kuyruk = [...OFFLINE_QUEUE]; OFFLINE_QUEUE = [];
  kuyruk.forEach(o=>{
    try{ window.__fs.addDoc(window.__fs.collection(window.__db,`branches/${window.__sube}/orders`), o); }
    catch(e){ OFFLINE_QUEUE.push(o); }
  });
  if(kuyruk.length) note(`${kuyruk.length} bekleyen satış senkronlandı`);
}

// Tarayıcı online/offline olaylarını dinle
window.addEventListener("online",  ()=>{ setConnState(!!window.__db, window.__db?"Bağlantı geri geldi · senkron":"Çevrimiçi"); flushQueue(); });
window.addEventListener("offline", ()=> setConnState(false, "Bağlantı kesildi · offline kuyruk"));

// Uygulama açılışında başlat
b2bYukle();      // bayi kanalı verilerini (varsa) geri yükle
kampanyaYukle(); // kampanya + genel fiyat verilerini geri yükle
initFirebase();

</script>
