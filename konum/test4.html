<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sunum Odası Navigasyonu</title>
    <style>
        :root {
            --far: #ff4d4d;     /* Uzak - Kırmızı */
            --near: #ffae00;    /* Yaklaşıldı - Turuncu */
            --aligned: #00ffc8; /* Hizalandı - Turkuaz */
            --bg: #000;
        }
        html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        
        #camera { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }

        #ui { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }

        /* HEDEF İKONU (KAPI) */
        #target-icon {
            position: absolute; top: 15%; width: 100px; height: 100px;
            background: rgba(0, 255, 200, 0.1); border: 3px solid var(--aligned);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 50px; opacity: 0; transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.28);
            box-shadow: 0 0 30px var(--aligned); backdrop-filter: blur(5px);
        }
        #target-icon.active { opacity: 1; transform: scale(1); }

        /* MERKEZİ PUSULA SİSTEMİ */
        .compass-container { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; }
        
        /* Dinamik Renk Halkası */
        .status-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.1);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .inner-compass {
            width: 100%; height: 100%; position: absolute;
            transition: transform 0.8s cubic-bezier(0.1, 0.3, 0.2, 1);
        }

        /* Navigasyon Oku */
        #nav-arrow {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-bottom: 50px solid #555;
            transition: border-bottom-color 0.4s ease, filter 0.4s ease;
        }

        /* ALT HUD PANEL */
        #hud { position: absolute; bottom: 50px; width: 90%; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #status-text { font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #dist-text { font-size: 18px; color: var(--aligned); margin-top: 5px; opacity: 0.9; }

        /* BAŞLATMA EKRANI */
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-start { padding: 18px 50px; font-size: 22px; background: var(--aligned); border: none; border-radius: 50px; font-weight: bold; color: black; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>SUNUM ODASI</h1>
    <p style="opacity: 0.6; margin-bottom: 30px;">Navigasyonu Başlatmak İçin Tıklayın</p>
    <button class="btn-start" onclick="startApp()">KEŞFET</button>
</div>

<video id="camera" autoplay playsinline></video>

<div id="ui">
    <div id="target-icon">🚪</div>

    <div class="compass-container">
        <div id="ring" class="status-ring"></div>
        <div id="compass-rotate" class="inner-compass">
            <div id="nav-arrow"></div>
        </div>
    </div>

    <div id="hud">
        <div id="status-text">YÖN ARANIYOR</div>
        <div id="dist-text">--- metre</div>
    </div>
</div>

<script>
const TARGET = { lat: 37.8596227, lng: 27.2728099, name: "Sunum Odası" };
let state = { heading: 0, bearing: 0, dist: 999 };

async function startApp() {
    document.getElementById("overlay").style.display = "none";

    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    document.getElementById("camera").srcObject = stream;

    navigator.geolocation.watchPosition(pos => {
        state.dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, TARGET.lat, TARGET.lng);
        state.bearing = calculateBearing(pos.coords.latitude, pos.coords.longitude, TARGET.lat, TARGET.lng);
        updateUI();
    }, null, { enableHighAccuracy: true });

    if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') window.addEventListener("deviceorientation", handleMotion);
        } else {
            window.addEventListener("deviceorientation", handleMotion);
        }
    }
}

function handleMotion(e) {
    let rawHeading = e.webkitCompassHeading || (360 - e.alpha);
    if (!rawHeading) return;
    
    // Smooth damping (Hareketi yumuşatma)
    state.heading = state.heading + (rawHeading - state.heading) * 0.05;
    updateUI();
}

function updateUI() {
    const diff = (state.bearing - state.heading + 540) % 360 - 180;
    const absDiff = Math.abs(diff);

    const ring = document.getElementById("ring");
    const arrow = document.getElementById("nav-arrow");
    const status = document.getElementById("status-text");
    const targetIcon = document.getElementById("target-icon");
    const compass = document.getElementById("compass-rotate");

    // Pusula dönüşü
    compass.style.transform = `rotate(${diff}deg)`;

    // DİNAMİK RENK VE İKON MANTIĞI
    if (absDiff < 10) {
        // TAM HİZALANDI
        updateStyles("var(--aligned)", "DOĞRU YÖNDESİNİZ", true);
    } else if (absDiff < 40) {
        // YAKLAŞTI
        updateStyles("var(--near)", "YAKLAŞTINIZ", false);
    } else {
        // UZAK
        updateStyles("var(--far)", "YÖNÜNÜZÜ DÖNÜN", false);
    }

    function updateStyles(color, text, isAligned) {
        ring.style.borderColor = color;
        ring.style.boxShadow = `0 0 20px ${color}`;
        arrow.style.borderBottomColor = color;
        arrow.style.filter = `drop-shadow(0 0 10px ${color})`;
        status.innerText = text;
        status.style.color = color;
        
        if (isAligned) {
            targetIcon.classList.add("active");
        } else {
            targetIcon.classList.remove("active");
        }
    }

    document.getElementById("dist-text").innerText = `${state.dist.toFixed(1)} Metre Kaldı`;
}

/* YARDIMCI FONKSİYONLAR */
function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function calculateBearing(lat1, lon1, lat2, lon2) {
    const y = Math.sin((lon2 - lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
    const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2 - lon1) * Math.PI / 180);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
</script>
</body>
</html>
