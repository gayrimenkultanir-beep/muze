<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #2c3e50; font-size: 2.5rem; margin: 0; }

        /* Duyuru Kart Yapısı */
        .announcement-card { 
            background: #fff; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-bottom: 40px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid #e1e4e8;
        }

        /* Görsel Galerisi */
        .image-gallery { 
            display: flex; 
            flex-wrap: wrap; 
            background: #f8f9fa; 
            gap: 4px;
            padding: 4px;
        }
        
        .image-gallery img { 
            flex: 1 1 250px; 
            height: 400px; 
            object-fit: cover; 
            border-radius: 8px;
            pointer-events: none; /* Tıklama kapalı */
        }

        /* İçerik Alanı */
        .content-area { padding: 30px; }
        
        .date-tag { 
            background: #4a6cf7; 
            color: #fff; 
            padding: 5px 15px; 
            border-radius: 50px; 
            font-size: 0.85rem; 
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .announcement-title { 
            font-size: 1.8rem; 
            font-weight: 600; 
            margin: 0 0 15px 0; 
            color: #1a1a1a; 
            line-height: 1.2;
        }
        
        .announcement-details { 
            color: #555; 
            line-height: 1.8; 
            white-space: pre-line; 
            font-size: 1.05rem;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        #loading { text-align: center; font-size: 1.2rem; color: #666; margin-top: 50px; }
        
        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            .image-gallery img { height: 250px; flex: 1 1 100%; }
            .announcement-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Duyurular</h1>
    </header>
    
    <div id="loading">Veriler güncelleniyor, lütfen bekleyin...</div>
    <div id="news-feed"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // Senin paylaştığın linkin CSV formatı
    const googleSheetLink = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    // Google Drive Linklerini Resme Çeviren Fonksiyon
    function formatDriveUrl(url) {
        if (!url || url.trim() === "" || !url.startsWith('http')) return null;
        let fileId = "";
        try {
            if (url.includes('id=')) {
                fileId = url.split('id=')[1].split('&')[0];
            } else if (url.includes('/d/')) {
                fileId = url.split('/d/')[1].split('/')[0];
            }
            return fileId ? `https://drive.google.com/uc?export=view&id=${fileId}` : url;
        } catch (e) {
            return url;
        }
    }

    Papa.parse(googleSheetLink, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const feed = document.getElementById('news-feed');
            const loader = document.getElementById('loading');
            loader.style.display = 'none';

            results.data.forEach(row => {
                // Görsel sütunlarını kontrol et (Link varsa al)
                const g1 = formatDriveUrl(row['görsel1']);
                const g2 = formatDriveUrl(row['görsel2']);
                const g3 = formatDriveUrl(row['görsel3']);

                let imagesHtml = '';
                if (g1) imagesHtml += `<img src="${g1}" alt="Görsel 1">`;
                if (g2) imagesHtml += `<img src="${g2}" alt="Görsel 2">`;
                if (g3) imagesHtml += `<img src="${g3}" alt="Görsel 3">`;

                const cardHtml = `
                    <div class="announcement-card">
                        ${imagesHtml ? `<div class="image-gallery">${imagesHtml}</div>` : ''}
                        <div class="content-area">
                            <span class="date-tag">${row['tarih'] || ''}</span>
                            <h2 class="announcement-title">${row['duyuru metni'] || ''}</h2>
                            <div class="announcement-details">${row['detaylar'] || ''}</div>
                        </div>
                    </div>
                `;
                feed.innerHTML += cardHtml;
            });
        }
    });
</script>

</body>
</html>
