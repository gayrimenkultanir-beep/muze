<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyurular | Güncel Haberler</title>
    <style>
        /* Genel Stil ve Fontlar */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 0; 
            color: #1e293b;
        }

        .container { 
            max-width: 900px; 
            margin: 50px auto; 
            padding: 0 20px; 
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-weight: 600;
            color: #0f172a;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        /* Duyuru Kartları Tasarımı */
        .announcement-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 25px;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            transition: transform 0.2s ease;
            border: 1px solid #e2e8f0;
        }

        .announcement-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Görsel Alanı */
        .announcement-image {
            width: 300px;
            min-width: 300px;
            background-color: #f1f5f9;
            overflow: hidden;
        }

        .announcement-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* İçerik Alanı */
        .announcement-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .date-badge {
            font-size: 0.85rem;
            color: #3b82f6;
            font-weight: 600;
            margin-bottom: 10px;
            display: inline-block;
        }

        .announcement-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 12px 0;
            line-height: 1.3;
        }

        .announcement-text {
            color: #475569;
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .details-link {
            font-size: 0.9rem;
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .details-link:hover {
            color: #3b82f6;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .announcement-card {
                flex-direction: column;
            }
            .announcement-image {
                width: 100%;
                height: 200px;
                min-width: unset;
            }
        }

        /* Yükleniyor Yazısı */
        #loading { text-align: center; padding: 50px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" style="text-decoration: none; color: #64748b; font-weight: 500;">← Ana Sayfaya Dön</a>
        <h1>Duyurular</h1>
        <p>En güncel duyuru ve etkinliklerimizi buradan takip edebilirsiniz.</p>
    </header>

    <div id="loading">Duyurular yükleniyor...</div>
    <div id="announcements-list"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    function getDriveImage(url) {
        if (!url) return 'https://via.placeholder.com/400x300?text=Görsel+Yok';
        if (url.includes('drive.google.com')) {
            let id = "";
            try {
                if (url.includes('id=')) {
                    id = url.split('id=')[1].split('&')[0];
                } else {
                    id = url.split('/d/')[1].split('/')[0];
                }
                return `https://thumbnail.googleusercontent.com/doc/${id}`;
            } catch (e) { return url; }
        }
        return url;
    }

    Papa.parse(sheetCsvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            document.getElementById('loading').style.display = 'none';
            const data = results.data;
            const container = document.getElementById('announcements-list');

            data.forEach(item => {
                // Görsel URL'sini hazırla
                const imageUrl = getDriveImage(item['görsel']);
                
                const cardHTML = `
                    <div class="announcement-card">
                        <div class="announcement-image">
                            <img src="${imageUrl}" alt="Duyuru Görseli" onerror="this.src='https://via.placeholder.com/400x300?text=Görsel+Bulunamadı'">
                        </div>
                        <div class="announcement-content">
                            <span class="date-badge">${item['tarih'] || ''}</span>
                            <h2 class="announcement-title">${item['duyuru metni'] || 'Başlıksız Duyuru'}</h2>
                            <p class="announcement-text">${item['detaylar'] || ''}</p>
                            <a href="#" class="details-link">Detayları Gör →</a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }
    });
</script>

</body>
</html>
