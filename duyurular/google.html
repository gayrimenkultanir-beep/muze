<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Panosu</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f0f2f5; 
            color: #333; 
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: auto; }
        
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007bff; font-weight: bold; }
        h2 { text-align: center; color: #2c3e50; }

        /* Duyuru Blok Tasarımı */
        .announcement-block {
            background: white;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* Görsel Alanı (Büyük Tasarım) */
        .img-container {
            width: 100%;
            height: 400px; /* 600x400 oranına uygun yükseklik */
            background-color: #eee;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Resmi kutuya tam sığdırır ve şık gösterir */
            display: block;
        }

        /* Metin Alanı */
        .text-container {
            padding: 25px;
        }

        .date-text {
            font-size: 0.9rem;
            color: #007bff;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .title-text {
            font-size: 1.6rem;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .details-text {
            font-size: 1.1rem;
            color: #444;
            white-space: pre-line; /* Sheets'teki alt satırları korur */
        }

        @media (max-width: 600px) {
            .img-container { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">← Geri Dön</a>
    <h2>Güncel Duyurular</h2>
    
    <div id="feed-container">
        <p style="text-align:center;">Veriler yükleniyor...</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQERf8SWNyArJj-5FUlJgcfaMWqNkiQpa0Zuzgx3gTxUb1afXeA9Lw45RUB1yN5uOfUdkMK44C12HM/pub?output=csv';

    // Senin çalışan kodundaki görsel çekme mantığı
    function getDriveThumbnail(url) {
        if (!url || !url.includes('drive.google.com')) return url;
        let id = "";
        try {
            if (url.includes('id=')) {
                id = url.split('id=')[1].split('&')[0];
            } else {
                id = url.split('/d/')[1].split('/')[0];
            }
            // En garantili görsel sunucusu
            return `https://lh3.googleusercontent.com/u/0/d/${id}`;
        } catch (e) {
            return url;
        }
    }

    Papa.parse(sheetCsvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            data.forEach(row => {
                // Sütun başlıklarının Sheets ile tam eşleşmesi gerekir
                const tarih = row['tarih'] || '';
                const baslik = row['duyuru metni'] || '';
                const detay = row['detaylar'] || '';
                const g1 = (row['görsel1'] || "").trim();

                let imgHtml = '';
                if (g1.startsWith('http')) {
                    const finalImg = getDriveThumbnail(g1);
                    imgHtml = `
                        <div class="img-container">
                            <img src="${finalImg}" onerror="this.parentElement.style.display='none'">
                        </div>`;
                }

                const blockHtml = `
                    <div class="announcement-block">
                        ${imgHtml}
                        <div class="text-container">
                            <span class="date-text">${tarih}</span>
                            <div class="title-text">${baslik}</div>
                            <div class="details-text">${detay}</div>
                        </div>
                    </div>`;
                
                container.innerHTML += blockHtml;
            });
        }
    });
</script>

</body>
</html>
