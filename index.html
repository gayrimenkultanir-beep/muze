<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sultan II. Bayezid Külliyesi</title>

<style>
/* GENEL RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Playfair Display', serif;
}

body {
    background: url('assets/texture.jpg') repeat;
    color: #333;
    line-height: 1.6;
}

/* HERO */
.hero {
    position: relative;
    height: 400px;
    background: url('assets/header.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero-overlay {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.4);
}

.hero-content {
    position: relative;
    text-align: center;
    color: #fff;
}

.hero-content h1 {
    font-family: 'Cinzel', serif;
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 10px;
}

.hero-content h2 {
    font-size: 24px;
    font-weight: 400;
}

/* LAYOUT */
.frame {
    max-width: 1200px;
    margin: -80px auto 50px auto;
    padding: 0 20px;
}

.layout {
    display: flex;
    gap: 20px;
}

.left, .center, .right {
    flex: 1;
}

.center {
    flex: 2;
}

/* KARTLAR */
.card {
    background-color: #F5DEB3; /* Parşömen rengi */
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

/* GOLD BORDER */
.gold-border {
    border: 2px solid gold;
}

/* DARK KART */
.dark {
    background: #333;
    color: #fff;
}

/* KART BAŞLIKLARI - ALTIN RENK VE KALIN */
.card h2, .card h3 {
    display: inline-block;
    padding: 5px 15px;
    border-radius: 8px;
    margin-bottom: 15px;
    border: 2px solid #FFD700;  /* Altın border */
    background-color: #FFF8DC;   /* Hafif altın arka plan */
    color: #FFD700;              /* Altın yazı */
    font-weight: 700;            /* Kalın yazı */
    transition: all 0.3s ease;
    cursor: pointer;
}

/* HOVER EFEKTI (Masaüstü) */
.card h2:hover, .card h3:hover {
    background-color: #FFD700;
    color: #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transform: translateY(-2px);
}

/* MOBİL DOKUNMA İÇİN "active" sınıfı */
.card h2.active, .card h3.active {
    background-color: #FFD700;
    color: #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transform: translateY(-2px);
}

/* LISTE STYLING */
.card ul {
    list-style: none;
    padding-left: 0;
}

.card ul li {
    padding: 5px 0;
    position: relative;
    padding-left: 20px;
}

.card ul li::before {
    content: "•";
    position: absolute;
    left: 0;
    color: gold;
}

/* VIDEO */
.video-wrapper {
    position: relative;
    cursor: pointer;
}

.video-wrapper img {
    width: 100%;
    border-radius: 10px;
}

.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: gold;
    background: rgba(0,0,0,0.4);
    border-radius: 50%;
    padding: 20px 25px;
    transition: background 0.2s;
}

.play-btn:hover {
    background: rgba(0,0,0,0.6);
}

@media (max-width: 1024px) {
    .layout {
        flex-direction: column;
    }
    .center {
        order: 0;
    }
    .left,
