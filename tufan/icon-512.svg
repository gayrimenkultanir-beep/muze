<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Arka plan -->
  <rect width="512" height="512" rx="90" fill="#0a0a0f"/>
  <!-- Dalga çubukları — soldan sağa, yükselen/alçalan efekti -->
  <rect x="42"  y="210" width="18" height="200" rx="9" fill="#00e5ff" opacity="0.7"/>
  <rect x="70"  y="170" width="18" height="240" rx="9" fill="#00e5ff" opacity="0.85"/>
  <rect x="98"  y="200" width="18" height="210" rx="9" fill="#00e5ff"/>
  <rect x="126" y="155" width="18" height="255" rx="9" fill="#a259ff" opacity="0.8"/>
  <rect x="154" y="130" width="18" height="280" rx="9" fill="#a259ff"/>
  <rect x="182" y="160" width="18" height="250" rx="9" fill="#a259ff" opacity="0.9"/>
  <!-- Merkez vurgu — pembe/kırmızı -->
  <rect x="216" y="90"  width="22" height="330" rx="11" fill="#ff2d78"/>
  <rect x="248" y="55"  width="22" height="365" rx="11" fill="#ff2d78"/>
  <rect x="280" y="90"  width="22" height="330" rx="11" fill="#ff2d78"/>
  <!-- Sağ taraf -->
  <rect x="318" y="155" width="18" height="260" rx="9" fill="#a259ff" opacity="0.9"/>
  <rect x="346" y="180" width="18" height="235" rx="9" fill="#a259ff" opacity="0.8"/>
  <rect x="374" y="210" width="18" height="205" rx="9" fill="#00e5ff"/>
  <rect x="402" y="185" width="18" height="230" rx="9" fill="#00e5ff" opacity="0.85"/>
  <rect x="430" y="220" width="18" height="195" rx="9" fill="#00e5ff" opacity="0.7"/>
  <!-- Playhead çizgisi -->
  <rect x="249" y="440" width="14" height="50"  rx="7" fill="#ffd60a"/>
  <circle cx="256" cy="432" r="18" fill="none" stroke="#ffd60a" stroke-width="6"/>
  <!-- Alt yansıma efekti -->
  <rect x="0" y="460" width="512" height="52" rx="0" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </linearGradient>
  </defs>
</svg>
