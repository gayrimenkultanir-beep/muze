.ode-yontem-btn:active{background:var(--brand-soft); border-color:var(--brand)}
.ode-yontem-deger{display:flex; align-items:center; justify-content:flex-end; gap:4px; background:var(--surface); border:1.5px solid var(--brand); border-radius:11px; padding:0 13px; min-width:116px; max-width:130px; cursor:pointer; overflow:hidden}
.ode-yontem-deger.aktif{box-shadow:0 0 0 3px var(--brand-soft); border-width:2px}
.ode-yontem-val{font-size:18px; font-weight:800; text-align:right; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.ode-bk{font-size:13px; font-weight:700; color:var(--ink-3); flex-shrink:0}
/* numpad */
.ode-numpad{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:12px}
.ode-np-tus{padding:18px 0; border-radius:11px; background:var(--surface-2); border:1px solid var(--line); font-size:20px; font-weight:800; color:var(--ink); cursor:pointer}
.ode-np-tus:active{background:var(--brand-soft); border-color:var(--brand)}
.ode-np-tus.sil{background:var(--err-soft); color:var(--err)}
.ode-np-tus.temizle{background:var(--surface-2); color:var(--ink); font-weight:900}
/* indirim satırı */
.ode-ind-row{display:flex; align-items:center; gap:8px; margin-bottom:14px; background:#fff4e6; border:1px solid #f0d9a8; border-radius:11px; padding:10px 13px; min-height:50px}
.ode-ind-lbl{font-size:14px; font-weight:800; color:#8a6212; flex:1}
.ode-ind-deger{display:flex; align-items:center; justify-content:flex-end; gap:4px; background:var(--surface); border:1.5px solid #e0c890; border-radius:9px; padding:0 12px; min-width:100px; cursor:pointer}
.ode-ind-deger.aktif{border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-soft)}
.ode-ind-val{font-size:18px; font-weight:800; color:#8a6212}
/* === MAG PUAN ÖDEME BÖLÜMÜ === */
.ode-mag-bolum{border:1.5px solid #e8d9b8; border-radius:13px; padding:13px 14px; margin-bottom:14px; background:linear-gradient(180deg,#fffaf0,#fff6e6)}
.ode-mag-bolum.tanindi{border-color:#d4a93a; background:linear-gradient(180deg,#fff8e8,#fdf0d2)}
.ode-mag-bas{font-size:14px; font-weight:900; color:#8a6212; display:flex; align-items:center; gap:6px}
.ode-mag-alt{font-size:11.5px; color:#a98a4e; margin:3px 0 10px; line-height:1.35}
.ode-mag-sorgu{display:flex; gap:7px}
.ode-mag-input{flex:1; min-width:0; border:1.5px solid #e0c890; border-radius:9px; padding:10px 12px; font-size:13.5px; background:#fff; color:var(--ink); outline:none}
.ode-mag-input:focus{border-color:#d4a93a; box-shadow:0 0 0 3px rgba(212,169,58,.18)}
.ode-mag-sorgu-btn{flex:none; border:none; border-radius:9px; padding:0 16px; font-size:13px; font-weight:800; background:#d4a93a; color:#fff; cursor:pointer; white-space:nowrap}
.ode-mag-sorgu-btn:active{transform:scale(.96)}
.ode-mag-uye{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:9px}
.ode-mag-uye-ad{font-size:14.5px; font-weight:900; color:#7a5610}
.ode-mag-uye-bakiye{font-size:13px; font-weight:800; color:#b8860b; margin-top:2px}
.ode-mag-kademe{margin:4px 0 11px; padding:10px 11px 9px; background:#fff; border:1px solid #efe2c6; border-radius:10px}
.ode-mag-tl{font-size:11.5px; font-weight:700; color:#a98a4e; margin-left:4px}
.ode-mag-cikar{flex:none; width:28px; height:28px; border:none; border-radius:8px; background:#f0e2c4; color:#8a6212; font-size:13px; font-weight:800; cursor:pointer}
.ode-mag-cikar:active{transform:scale(.92)}
.ode-mag-bilgi-kucuk{font-size:11.5px; color:#a98a4e; line-height:1.4; padding:2px 0}
.ode-mag-kilit{background:#fff; border:1px dashed #e0c890; border-radius:10px; padding:11px}
.ode-mag-kilit-bilgi{font-size:12px; color:#8a6212; line-height:1.4; margin-bottom:9px}
.ode-mag-kod-gonder{width:100%; border:none; border-radius:9px; padding:11px; font-size:13px; font-weight:800; background:#8a6212; color:#fff; cursor:pointer}
.ode-mag-kod-gonder:active{transform:scale(.97)}
.ode-mag-kod-row{display:flex; gap:7px; margin-bottom:8px}
.ode-mag-kod-input{flex:1; min-width:0; border:1.5px solid #e0c890; border-radius:9px; padding:11px 12px; font-size:17px; font-weight:800; letter-spacing:3px; text-align:center; background:#fff; color:var(--ink); outline:none}
.ode-mag-kod-input:focus{border-color:#d4a93a; box-shadow:0 0 0 3px rgba(212,169,58,.18)}
.ode-mag-kod-dogrula{flex:none; border:none; border-radius:9px; padding:0 18px; font-size:13px; font-weight:800; background:#2e9e5b; color:#fff; cursor:pointer}
.ode-mag-kod-dogrula:active{transform:scale(.96)}
.ode-mag-kod-tekrar{width:100%; border:none; background:none; color:#a98a4e; font-size:11.5px; font-weight:700; cursor:pointer; padding:3px}
.ode-mag-kullan{background:#fff; border:1.5px solid #d4a93a; border-radius:10px; padding:11px 12px}
.ode-mag-kullan-bas{font-size:12.5px; font-weight:900; color:#2e9e5b; margin-bottom:9px}
.ode-mag-kullan-kontrol{display:flex; align-items:center; gap:5px; justify-content:center; flex-wrap:wrap}
.ode-mag-adim{flex:none; min-width:40px; border:1.5px solid #e0c890; border-radius:8px; padding:8px 4px; font-size:13px; font-weight:800; background:#fffaf0; color:#8a6212; cursor:pointer}
.ode-mag-adim:active{transform:scale(.94)}
.ode-mag-deger{flex:none; min-width:44px; text-align:center; font-size:18px; font-weight:900; color:#7a5610}
.ode-mag-max{flex:none; border:none; border-radius:8px; padding:8px 13px; font-size:12.5px; font-weight:800; background:#d4a93a; color:#fff; cursor:pointer}
.ode-mag-max:active{transform:scale(.94)}
.ode-mag-kullan-ind{margin-top:9px; text-align:center; font-size:13px; font-weight:800; color:#2e9e5b; background:#eafaf0; border-radius:8px; padding:7px}
.ode-mag-kullan-ipuc{margin-top:8px; text-align:center; font-size:11px; color:#a98a4e}
.ode-ozet-satir.mag{color:#b8860b; font-weight:700}
/* kazanılacak mag notu (Ödemeyi Al üstü) */
.ode-kazanc-not{text-align:center; font-size:12.5px; font-weight:700; color:#8a6212; background:linear-gradient(180deg,#fff8e8,#fdf0d2); border:1px solid #e8d9b8; border-radius:9px; padding:8px 10px; margin-bottom:10px}
.ode-kazanc-carpan{display:inline-block; background:#d4a93a; color:#fff; font-size:10.5px; font-weight:800; padding:1px 6px; border-radius:6px; margin-left:3px}
.ode-onay-mag{text-align:center; font-size:13px; font-weight:800; color:#b8860b; background:#fdf0d2; border-radius:9px; padding:9px; margin-bottom:12px}
/* girilen özet */
.ode-girilen-ozet{text-align:center; font-size:14px; font-weight:700; padding:9px 11px; border-radius:9px; margin-bottom:12px; background:var(--surface-2); color:var(--ink-2)}
.ode-go-satir1{font-size:14px}
.ode-go-not{font-size:12.5px; margin-top:3px; min-height:16px}
.ode-girilen-ozet.tam{background:var(--ok-soft); color:var(--ok)}
.ode-girilen-ozet.eksik{background:#fff4e6; color:#b06d10}
.ode-girilen-ozet.fazla{background:var(--err-soft); color:var(--err)}
/* fiş elle kutu (span tabanlı) — büyük */
.ode-bol-elle{display:flex; align-items:center; gap:3px; background:var(--surface); border:1.5px solid var(--line); border-radius:9px; padding:9px 13px; margin-left:auto; cursor:pointer; min-width:84px; justify-content:flex-end}
.ode-bol-elle.aktif{border-color:var(--brand); background:var(--brand-soft); box-shadow:0 0 0 3px var(--brand-soft)}
.ode-bol-elle-val{font-size:15px; font-weight:800; color:var(--ink)}
/* numpad virgül + geniş C */
.ode-np-tus.virgul{background:var(--surface); font-size:24px}
.ode-np-c{grid-column:1 / -1; padding:16px; border-radius:11px; background:var(--surface-2); border:1px solid var(--line); color:var(--ink); font-size:17px; font-weight:900; cursor:pointer; margin-top:1px}
.ode-np-c:active{background:var(--brand-soft); border-color:var(--brand)}
/* aktif yöntem kutusu daha belirgin */
.ode-yontem-deger.aktif,.ode-ind-deger.aktif{background:var(--brand-soft); border-color:var(--brand); border-width:2px; box-shadow:0 0 0 3px rgba(240,167,40,.25)}
/* para üstü modal */
.pust-ic{background:#fff; border-radius:18px; padding:30px 36px; text-align:center; max-width:300px; margin:auto}
.pust-emoji{font-size:48px}
.pust-lbl{font-size:15px; font-weight:700; color:var(--ink-3); margin-top:6px}
.pust-tutar{font-size:38px; font-weight:900; color:var(--ok); margin:8px 0 20px}
.pust-btn{width:100%; padding:14px; border-radius:11px; background:var(--brand); color:#fff; border:none; font-size:16px; font-weight:800; cursor:pointer}
/* tahsilat onay modal */
.ode-onay-ic{background:#fff; border-radius:18px; padding:26px 28px; text-align:center; max-width:340px; margin:auto}
.ode-onay-ikon{font-size:44px}
.ode-onay-ikon.eksik{font-size:44px}
.ode-onay-baslik{font-size:19px; font-weight:800; margin-top:6px}
.ode-onay-aciklama{font-size:14px; color:var(--ink-2); margin-top:8px; line-height:1.5}
.ode-onay-yontemler{background:var(--surface-2); border-radius:11px; padding:13px; margin:16px 0; text-align:left}
.ode-onay-yt-bas{font-size:11.5px; font-weight:800; color:var(--ink-3); margin-bottom:8px; text-transform:uppercase; letter-spacing:.3px}
.ode-onay-yt-satir{display:flex; justify-content:space-between; font-size:15px; font-weight:700; padding:4px 0}
.ode-onay-butonlar{display:flex; gap:10px}
.ode-onay-iptal{flex:1; padding:14px; border-radius:11px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:15px; font-weight:800; cursor:pointer}
.ode-onay-tamam{flex:2; padding:14px; border-radius:11px; background:var(--ok); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
.ode-onayla{margin-top:auto; padding:16px; border-radius:12px; background:var(--ok); color:#fff; border:none; font-size:16px; font-weight:800; cursor:pointer}
.ode-onayla:disabled{opacity:.4; cursor:default}
/* 1/N birleşik */
.ode-bol-n{display:flex; align-items:center; background:var(--surface); border:1px solid var(--line); border-radius:7px; overflow:hidden}
.ode-bol-n.on{background:var(--brand); border-color:var(--brand)}
.ode-bol-n.on .ode-bol-n-lbl{color:#fff}
.ode-bol-n.on .ode-bol-n-input{color:#fff}
.ode-bol-n-lbl{font-size:12px; font-weight:700; padding:6px 0 6px 8px; color:var(--ink-2); cursor:pointer}
.ode-bol-n-input{width:28px; border:none; background:none; font-size:12px; font-weight:700; padding:6px 6px 6px 1px; outline:none; color:var(--ink-2)}
/* fiş toplam bar */
.ode-fis-toplam-bar{padding-top:10px; margin-top:10px; border-top:2px solid var(--surface-2)}
.ode-ftb-satir{display:flex; justify-content:space-between; font-size:15px; font-weight:800; padding:2px 0}
.ode-ftb-satir.kalan{font-size:13px; font-weight:700; color:var(--err)}
/* ödeme dağılımı (fiş altı) */
.ode-fis-dagilim{margin-top:10px; padding:11px 13px; background:var(--surface-2); border-radius:11px}
.ode-fd-bas{font-size:12px; font-weight:800; color:var(--ink-3); margin-bottom:7px}
.ode-fd-satir{display:flex; justify-content:space-between; font-size:14px; font-weight:700; padding:3px 0; color:var(--ink)}
/* toplu bölme */
.ode-toplu-bol{margin-top:10px; padding:11px 12px; background:var(--brand-soft); border:1px solid var(--brand); border-radius:11px}
.ode-tb-lbl{font-size:12px; font-weight:800; color:var(--brand-d); margin-bottom:8px}
.ode-tb-row{display:flex; gap:6px; align-items:center; flex-wrap:wrap}
.ode-tb-sifirla{margin-top:8px; width:100%; padding:7px; border-radius:8px; background:var(--surface); border:1px solid var(--line); font-size:12px; font-weight:700; color:var(--ink-2); cursor:pointer}
/* 1/N bölme pop-up (kasa ekranı, dokunmatik klavye) */
.obn-ic{max-width:340px; width:92%; background:var(--surface); border-radius:16px; padding:22px; text-align:center; margin:auto}
.obn-baslik{font-size:15px; font-weight:800; color:var(--ink); margin-bottom:4px}
.obn-alt{font-size:12.5px; color:var(--ink-2); margin-bottom:16px}
.obn-deger-kutu{display:flex; align-items:baseline; justify-content:center; gap:6px; background:var(--surface-2); border-radius:12px; padding:16px 0; margin-bottom:16px}
.obn-deger-1{font-size:32px; font-weight:800; color:var(--ink-2)}
.obn-deger-n{font-size:32px; font-weight:800; color:var(--brand-d); min-width:34px}
.obn-numpad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px}
.obn-tus{padding:16px 0; border-radius:11px; background:var(--surface-2); border:1px solid var(--line); font-size:19px; font-weight:800; color:var(--ink); cursor:pointer}
.obn-tus:active{background:var(--brand-soft); border-color:var(--brand)}
.obn-tus.temizle{font-weight:900}
.obn-btn-row{display:flex; gap:10px}
.obn-iptal{flex:1; padding:14px; border-radius:11px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:15px; font-weight:800; cursor:pointer}
.obn-bol{flex:2; padding:14px; border-radius:11px; background:var(--brand); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
.obn-bol:disabled{opacity:.4; cursor:default}
/* Masa Yönetimi — kategori/masa ekleme pop-up'ı (prompt() yerine) */
.myp-ic{max-width:340px; width:92%; background:var(--surface); border-radius:16px; padding:22px; margin:auto}
.myp-baslik{font-size:15px; font-weight:800; color:var(--ink); margin-bottom:14px; text-align:center}
.myp-input{width:100%; padding:14px 16px; border-radius:11px; border:1.5px solid var(--line); font-size:16px; font-weight:700; background:var(--surface-2); color:var(--ink); margin-bottom:16px; box-sizing:border-box}
.myp-input:focus{outline:none; border-color:var(--brand)}
.myp-btn-row{display:flex; gap:10px}
.myp-iptal{flex:1; padding:14px; border-radius:11px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:15px; font-weight:800; cursor:pointer}
.myp-onayla{flex:2; padding:14px; border-radius:11px; background:var(--brand); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
/* Fiyat/Ürün kategorisi popup */
.fkp-ic{max-width:380px; width:94%; background:var(--surface); border-radius:16px; padding:22px; margin:auto}
.fkp-baslik{font-size:15px; font-weight:800; color:var(--ink); margin-bottom:16px; text-align:center}
.fkp-gorsel-onizleme{width:72px; height:72px; border-radius:12px; object-fit:cover; margin:0 auto 12px; display:block; border:2px solid var(--line)}
.fkp-gorsel-emoji{font-size:48px; text-align:center; margin-bottom:12px}
.fkp-etiket{font-size:12px; font-weight:700; color:var(--ink-2); margin-bottom:5px}
.fkp-input{width:100%; padding:13px 14px; border-radius:10px; border:1.5px solid var(--line); font-size:15px; font-weight:700; background:var(--surface-2); color:var(--ink); box-sizing:border-box; margin-bottom:10px}
.fkp-input:focus{outline:none; border-color:var(--brand)}
.fkp-gorsel-row{display:flex; gap:8px; margin-bottom:16px}
.fkp-gorsel-sec{flex:1; padding:11px; border-radius:10px; border:1.5px dashed var(--line); background:var(--surface-2); color:var(--ink-2); font-size:13px; font-weight:700; cursor:pointer; text-align:center}
.fkp-gorsel-sec:hover{border-color:var(--brand); color:var(--brand)}
.fkp-gorsel-kaldir{padding:11px 14px; border-radius:10px; border:1.5px solid var(--err-soft); background:var(--err-soft); color:var(--err); font-size:13px; font-weight:700; cursor:pointer}
.fkp-btn-row{display:flex; gap:10px; margin-top:4px}
.fkp-iptal{flex:1; padding:13px; border-radius:10px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:14px; font-weight:800; cursor:pointer}
.fkp-onayla{flex:2; padding:13px; border-radius:10px; background:var(--brand); color:#fff; border:none; font-size:14px; font-weight:800; cursor:pointer}
.fkp-sil{flex:2; padding:13px; border-radius:10px; background:var(--err); color:#fff; border:none; font-size:14px; font-weight:800; cursor:pointer}
/* Seçenek grubu popup */
.sgp-ic{max-width:360px; width:94%; background:var(--surface); border-radius:16px; padding:22px; margin:auto}
.sgp-baslik{font-size:15px; font-weight:800; color:var(--ink); margin-bottom:16px; text-align:center}
.sgp-etiket{font-size:12px; font-weight:700; color:var(--ink-2); margin-bottom:5px; margin-top:10px}
.sgp-input{width:100%; padding:13px 14px; border-radius:10px; border:1.5px solid var(--line); font-size:15px; font-weight:700; background:var(--surface-2); color:var(--ink); box-sizing:border-box}
.sgp-input:focus{outline:none; border-color:var(--brand)}
.sgp-tip-row{display:flex; gap:8px; margin-top:6px; margin-bottom:4px}
.sgp-tip-btn{flex:1; padding:10px; border-radius:9px; border:1.5px solid var(--line); background:var(--surface-2); color:var(--ink-2); font-size:13px; font-weight:700; cursor:pointer}
.sgp-tip-btn.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.sgp-btn-row{display:flex; gap:10px; margin-top:16px}
.sgp-iptal{flex:1; padding:13px; border-radius:10px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:14px; font-weight:800; cursor:pointer}
.sgp-onayla{flex:2; padding:13px; border-radius:10px; background:var(--brand); color:#fff; border:none; font-size:14px; font-weight:800; cursor:pointer}

.ode-fis-ad{font-weight:800; font-size:13.5px}
.ode-fis-x{background:none; border:none; color:var(--err); font-size:14px; font-weight:800; cursor:pointer}

.ode-bol-row{display:flex; gap:5px; align-items:center; flex-wrap:wrap}

/* SAĞ: ürünler */
.ode-urun-liste{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; min-height:80px}
/* not alanı (sağ sütun altı) */
.ode-not-alan{margin-top:12px; padding-top:12px; border-top:2px solid var(--surface-2)}
.ode-not-bas{font-size:12.5px; font-weight:800; color:var(--cocoa); margin-bottom:8px}
.ode-not-liste{display:flex; flex-direction:column; gap:6px; margin-bottom:9px; max-height:120px; overflow-y:auto}
.ode-not-cip{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; background:var(--surface-2); border-radius:8px; padding:7px 11px; font-size:13px; line-height:1.4}
.ode-not-cip button{background:none; border:none; color:var(--err); cursor:pointer; font-weight:800; flex-shrink:0}
.ode-not-giris{display:flex; gap:8px; align-items:stretch}
.ode-not-ta{flex:1; padding:9px 11px; border-radius:9px; border:1.5px solid var(--line); font-size:13.5px; font-family:inherit; resize:none}
.ode-not-btn{padding:0 16px; border-radius:9px; background:var(--brand); color:#fff; border:none; font-weight:800; font-size:14px; cursor:pointer}
.ode-urun-kart{background:var(--surface-2); border:1.5px solid var(--line); border-radius:10px; padding:11px 13px; cursor:pointer; display:flex; flex-direction:column; gap:0; transition:.12s}
.ode-urun-kart:active{transform:scale(.98)}
.ode-urun-kart.secili{background:var(--brand-soft); border-color:var(--brand)}
.ode-urun-kart.odendi{opacity:.5; cursor:default; background:var(--ok-soft)}
.ode-urun-bas{display:flex; justify-content:space-between; align-items:center; gap:8px; width:100%}
.ode-urun-secimler{display:flex; flex-wrap:wrap; gap:5px; margin-top:7px}

.ode-sec-x{width:16px; height:16px; border-radius:50%; background:var(--err-soft); color:var(--err); border:none; font-size:9px; font-weight:800; cursor:pointer; display:grid; place-items:center; padding:0; flex:none}
.ode-sec-ekle{margin-top:7px; width:100%; padding:7px; border-radius:8px; background:var(--ok-soft); color:var(--ok); border:1px dashed var(--ok); font-size:12px; font-weight:700; cursor:pointer}
.ode-urun-ad{font-weight:700; font-size:13.5px}
.ode-urun-fiyat{font-weight:800; font-size:14px; color:var(--brand-d); white-space:nowrap}
.ode-urun-fiyat small{font-weight:600; color:var(--ink-3); font-size:10px}
/* kişiye göre gruplu */
.ode-kisi-grup{margin-bottom:12px}

.ode-kisi-bas:not(.tum-odendi):active{background:#7d4a28}
.ode-kisi-ad{font-size:13.5px; font-weight:800}
.ode-kisi-tut{font-size:13px; font-weight:800}
.ode-kisi-tut.odendi{color:var(--ok)}
@media(max-width:860px){
  .ode-govde{grid-template-columns:1fr; gap:10px; flex:none}
  .ode-sag{order:1} .ode-orta{order:2} .ode-sol{order:3}
  .ode-ekran{height:auto}
  .ode-urun-liste,.ode-fis-liste{overflow:visible; min-height:0; flex:none}
}
/* Kısmi ödeme fişi */

.fis-not-bas{font-size:12px; font-weight:800; text-align:left; margin-bottom:4px}
.fis-not-satir{font-size:12px; text-align:left; color:var(--ink-2)}

}
/* Yorum yönetimi (müdür) */

.qr-splash-kmp{flex:none; width:200px; background:rgba(255,255,255,.97); border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:5px; box-shadow:0 6px 20px rgba(0,0,0,.3)}
.qsk-ust{display:flex; justify-content:space-between; align-items:center; gap:6px}
.qsk-ad{font-size:13px; font-weight:800; color:var(--err)}

.qsk-yeni{font-size:17px; font-weight:900; color:var(--brand-d)}

.qsk-simdi{background:var(--ok-soft); color:var(--ok); border-radius:5px; padding:1px 5px; font-weight:700}
.qr-splash-urunler-bas{font-size:15px; font-weight:800; color:#fff; margin-bottom:10px}
.qr-splash-urunler{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
.qr-splash-urun{background:rgba(255,255,255,.95); border-radius:12px; padding:12px; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,.2)}
.qr-splash-urun-emoji{font-size:30px}
.qr-splash-urun-ad{font-size:13px; font-weight:700; color:var(--ink); margin:4px 0}
.qr-splash-urun-fiyat{font-size:15px; font-weight:900; color:var(--brand-d)}
.qr-splash-urun-mag{display:inline-block; margin-top:4px; font-size:11px; font-weight:800; color:#9a6212; background:#ffe8c0; border-radius:99px; padding:2px 8px}

.qsd-bas{font-size:14px; font-weight:800; color:var(--cocoa); margin-bottom:4px}

.qr-splash2-bosluk{height:120px}
/* alt sabit bar */
.qr-splash2-altbar{position:absolute; bottom:0; left:0; right:0; z-index:3; padding:14px 16px calc(14px + env(safe-area-inset-bottom)); background:linear-gradient(180deg,transparent,rgba(26,18,8,.9) 30%); display:flex; flex-direction:column; align-items:center; gap:8px}
.qr-splash2-devam{width:100%; max-width:420px; padding:16px; border-radius:14px; background:var(--brand); color:#fff; border:none; font-size:17px; font-weight:900; cursor:pointer; box-shadow:0 6px 20px rgba(216,133,26,.5)}

.qr-cekmece-ipucu{font-size:11.5px; color:rgba(255,255,255,.7); font-weight:600}
/* yukarı açılır çekmece */
.qr-cekmece-bg{position:absolute; inset:0; z-index:8; background:rgba(0,0,0,0); visibility:hidden; transition:.3s}
.qr-cekmece-bg.acik{background:rgba(0,0,0,.5); visibility:visible}
.qr-cekmece{position:absolute; left:0; right:0; bottom:0; z-index:9; background:#fff; border-radius:22px 22px 0 0; transform:translateY(100%); transition:transform .32s cubic-bezier(.3,.8,.3,1); max-height:70%; display:flex; flex-direction:column; box-shadow:0 -8px 30px rgba(0,0,0,.3)}
.qr-cekmece.acik{transform:translateY(0)}

.qr-wifi-deger{font-size:15px; font-weight:800; color:var(--ink); font-family:monospace}

.qr-wifi-kopya{width:100%; padding:13px; border-radius:11px; background:var(--cocoa); color:#fff; border:none; font-size:14px; font-weight:700; cursor:pointer}
.qr-cek-kabul-btn{width:100%; padding:14px; border-radius:12px; background:var(--ok); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
.qr-cek-kabul-ok{text-align:center; padding:14px; background:var(--ok-soft); color:var(--ok); border-radius:12px; font-size:14px; font-weight:800}

.qr-bildirim{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#3a2410,#1a1208); padding:24px}

.qr-bildirim-logo{font-size:64px; margin-bottom:14px}

.intro-logo-onizle{position:relative; width:96px; height:96px; border-radius:50%; overflow:hidden; margin-bottom:12px; background:#1a1208; border:2px solid var(--line)}

.qr-bildirim-metin{font-size:16px; line-height:1.6; color:#f0e2cc; margin-bottom:22px}
.qr-bildirim-alerjen{font-size:13.5px; line-height:1.5; color:#ffd9a8; background:rgba(216,133,26,.18); border:1px solid rgba(240,167,40,.4); border-radius:12px; padding:14px 16px; margin-bottom:26px}
.qr-bildirim-devam{padding:15px 40px; border-radius:13px; background:var(--brand); color:#fff; border:none; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 6px 20px rgba(216,133,26,.4)}
.qr-bildirim-bar{width:140px; height:4px; border-radius:99px; background:rgba(255,255,255,.2); margin:22px auto 0; overflow:hidden}

.intro-duyuru-sil{align-self:flex-start; padding:7px 13px; border-radius:9px; background:var(--err-soft); color:var(--err); border:none; font-size:12.5px; font-weight:700; cursor:pointer}
.intro-duyuru-ekle{width:100%; padding:12px; border-radius:11px; border:2px dashed var(--line); background:none; color:var(--ink-2); font-size:14px; font-weight:700; cursor:pointer}
.intro-kaydet-btn{width:100%; padding:15px; border-radius:13px; background:var(--ok); color:#fff; border:none; font-size:16px; font-weight:800; cursor:pointer; margin-top:8px; margin-bottom:20px}
.kp-paketrozet{display:inline-block; background:#f3e8fa; color:#8e44ad; font-size:12px; font-weight:800; padding:5px 12px; border-radius:99px; margin-bottom:8px}
.kp-gelal{background:#2a2230}
/* Paket işaretleri (mutfak/kasa) */
.kak-paket{background:#8e44ad; color:#fff; font-size:10px; font-weight:800; padding:2px 7px; border-radius:99px; margin-left:6px}
.kmk-paket{font-size:14px}
.kmk-rozet.paket{background:#3a2845; color:#c89bda}
.kds-paket-kalem{border:1px solid #8e44ad}
/* Kasa sekme + paket */
.kasa-sekme-row{display:flex; gap:10px; margin-bottom:16px}
.kasa-sekme{flex:1; padding:13px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:15px; font-weight:800; border:1.5px solid transparent}
.kasa-sekme.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.kasa-yeni-paket{width:100%; padding:14px; border-radius:var(--radius-sm); background:#8e44ad; color:#fff; font-size:14px; font-weight:800; margin-bottom:16px}
.kasa-paket-list{display:flex; flex-direction:column; gap:12px}
.kasa-paket-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:15px}
.kpk-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.kpk-no{font-size:15px; font-weight:800}
.kpk-durum{font-size:12.5px; font-weight:800}
.kpk-urunler{font-size:13px; color:var(--ink-2); margin-bottom:10px}
.kpk-alt{display:flex; justify-content:space-between; align-items:center; gap:10px}
.kpk-tutar{font-size:13.5px; font-weight:700}
.kpk-ode{padding:9px 16px; border-radius:99px; background:var(--ok); color:#fff; font-size:13px; font-weight:800}
.kasa-masa-paket{position:absolute; top:8px; right:8px; font-size:16px}
/* QR paket sepet bilgi */
.qr-paket-bilgi{background:#f3e8fa; color:#8e44ad; padding:12px 14px; border-radius:var(--radius); font-size:13.5px; font-weight:700; margin:14px 0 10px}
.qr-isim-zorunlu{margin-bottom:12px}
/* QR sepet kalem paketle toggle */
.qr-si-paketle{margin-top:8px; padding:6px 14px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:12px; font-weight:800; border:1.5px solid var(--line-2)}
.qr-si-paketle.on{background:#8e44ad; color:#fff; border-color:#8e44ad}
.qr-si-paketli{background:#faf5fd; border-radius:var(--radius-sm)}
/* Mutfak fiş */
.kds-fis-btn{padding:9px 14px; border-radius:10px; background:var(--brand); color:#1a1d21; font-size:13px; font-weight:800}
#fisModal .fis-modal-ic{background:#fff; border-radius:var(--radius-lg); padding:0; max-width:360px; width:90%; max-height:85vh; overflow-y:auto}
.fis-kagit{padding:24px; font-family:'Courier New',monospace; color:#111}
.fis-baslik{text-align:center; font-size:17px; font-weight:800; letter-spacing:1px}
.fis-alt{text-align:center; font-size:13px; margin-top:4px}
.fis-saat{text-align:center; font-size:11px; color:#666; margin-top:2px}
.fis-cizgi{border-top:2px dashed #999; margin:12px 0}
.fis-grup-baslik{font-size:14px; font-weight:800; margin-bottom:8px; padding:5px 8px; background:#f0f0f0; border-radius:4px}
.fis-grup-baslik.paket{background:#f3e8fa; color:#8e44ad}
.fis-satir{font-size:14px; font-weight:700; margin-bottom:3px; display:flex; justify-content:space-between; align-items:baseline; gap:10px}
.fis-urun{font-weight:800}
.fis-kisi{font-weight:600; color:#555; font-size:13px; white-space:nowrap}
.fis-ops{font-size:12px; color:#555; margin-bottom:7px; padding-left:12px; line-height:1.6}
.fis-grup-ad{font-weight:800; color:#222; margin-top:4px}
.fis-grup-sec{padding-left:10px}
.fis-paket-uyari{margin-top:8px; font-size:12px; font-weight:800; color:#8e44ad; text-align:center; padding:6px; border:1.5px dashed #8e44ad; border-radius:6px}
.fis-toplam{font-size:13px; font-weight:800; text-align:center}
.fis-aksiyon{display:flex; gap:10px; padding:16px}
.fis-aksiyon .kak-btn{flex:1}
/* Mutfak fiş listesi (tekrar yazdır) */
.fis-oto-rozet{background:#27ae60; color:#fff; text-align:center; padding:8px; font-size:13px; font-weight:800; border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.kds-fis-list{display:flex; flex-direction:column; gap:10px; padding:6px 20px}
.kds-fis-kart{background:#22262b; border-radius:12px; padding:14px 16px; cursor:pointer}
.kds-fis-kart:active{transform:scale(.99)}
.kfk-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.kfk-no{font-size:14px; font-weight:800; color:#fff}
.kfk-dk{font-size:12px; color:#9aa0a6}
.kfk-urunler{font-size:13px; color:#c8ccd0; margin-bottom:4px}
.kfk-alt{font-size:11.5px; color:#8a9099}
/* Garson masa sepeti paneli */
.grs-sepet-panel{position:sticky; bottom:0; background:var(--surface); border-top:2px solid var(--brand); padding:14px 16px; box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.grs-sp-kisi{margin-bottom:12px}
.grs-sp-kbaslik{font-size:12.5px; font-weight:800; color:var(--ink-2); margin-bottom:8px}
.grs-sp-kisiler{display:flex; flex-wrap:wrap; gap:8px}
.grs-sp-kbtn{padding:8px 14px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:13px; font-weight:700; border:1.5px solid var(--line-2)}
.grs-sp-kbtn.on{background:var(--brand); color:#1a1d21; border-color:var(--brand)}
.grs-sp-kbtn.yeni{background:none; border-style:dashed; color:var(--cocoa)}
.grs-sp-baslik{font-size:13px; font-weight:800; margin-bottom:8px}
.grs-sp-kalem{display:flex; justify-content:space-between; align-items:center; font-size:13.5px; padding:5px 0; border-bottom:1px solid var(--line)}
.grs-sp-sag{display:flex; align-items:center; gap:8px; font-weight:700}
.grs-sp-sil{width:22px; height:22px; border-radius:50%; background:var(--err-soft); color:var(--err); font-size:11px; font-weight:800}
.grs-sepet-bar{display:flex; gap:12px; align-items:center; margin-top:12px}
.grs-sepet-bar .grs-pb-bilgi{flex:1; font-size:15px; font-weight:800}
/* Kasa sepet kişi seçimi */
.ke-kisi{padding:12px 16px; background:var(--surface-2); border-radius:var(--radius-sm); margin-bottom:12px}
.ke-kisi-baslik{font-size:12.5px; font-weight:800; color:var(--ink-2); margin-bottom:8px}
.ke-kisi-row{display:flex; flex-wrap:wrap; gap:8px}
.ke-kbtn{padding:8px 14px; border-radius:99px; background:var(--surface); color:var(--ink-2); font-size:13px; font-weight:700; border:1.5px solid var(--line-2)}
.ke-kbtn.on{background:var(--brand); color:#1a1d21; border-color:var(--brand)}
.ke-kbtn.yeni{background:none; border-style:dashed; color:var(--cocoa)}
.ci-sil{width:22px; height:22px; border-radius:50%; background:var(--err-soft); color:var(--err); font-size:11px; font-weight:800; margin-left:6px}
/* Kasa masalar — iki kolon (sol masalar, sağ detay/ödeme) */
.kasa-masa-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px}
.kasa-masa-btn.secili{outline:2.5px solid var(--brand); outline-offset:1px}
.kasa-sag-panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); display:flex; flex-direction:column; overflow:hidden; height:100%}
.kasa-sag-bos{display:flex; align-items:center; justify-content:center; height:100%; min-height:340px; text-align:center; color:var(--ink-3)}
.ksb-emoji{font-size:44px; margin-bottom:12px}
.ksb-baslik{font-size:17px; font-weight:800; color:var(--ink-2); margin-bottom:6px}
.ksb-alt{font-size:13px; color:var(--ink-3); max-width:220px; line-height:1.5}
.kasa-detay-head{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line); background:var(--surface-2)}
.kdh-baslik{font-size:17px; font-weight:800}
.kdh-alt{font-size:12.5px; color:var(--ink-2); margin-top:2px}
.kasa-detay-kapat{width:34px; height:34px; border-radius:10px; background:var(--surface); color:var(--ink-2); font-size:15px; font-weight:800; border:1px solid var(--line)}
.kasa-sag-panel .kasa-masa-detay{flex:1; overflow-y:auto; padding:14px 16px}
.kasa-sag-panel .kmd-foot{padding:14px 16px; border-top:1px solid var(--line); background:var(--surface-2)}
.kmd-kalem-odendi{opacity:.6}
.kmd-kalem-odendi .kmd-k-ad{color:var(--ink-2)}
/* Sepet kalem paketle toggle (kasa + garson) */
.ci-paketle{display:inline-block; margin-left:8px; padding:3px 10px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:11px; font-weight:800; border:1px solid var(--line-2)}
.ci-paketle.on{background:#8e44ad; color:#fff; border-color:#8e44ad}
.ci-paketli{background:#faf5fd}
.grs-sp-paketle{margin-left:6px; padding:2px 9px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:11px; font-weight:800; border:1px solid var(--line-2)}
.grs-sp-paketle.on{background:#8e44ad; color:#fff; border-color:#8e44ad}
.grs-sp-paketli{background:#faf5fd; border-radius:6px; padding-left:4px}
/* Masa detayı paket kalem rozeti (kasa + garson) */
.kmd-paket-rozet,.grs-paket-rozet{display:inline-block; background:#8e44ad; color:#fff; font-size:9px; font-weight:800; padding:2px 7px; border-radius:99px; margin-left:6px; vertical-align:middle}
.kmd-kalem-paket{border-left:3px solid #8e44ad}
.grs-kalem-paket{border-left:3px solid #8e44ad}
/* Mutfak mesaj rozeti + bloğu */
.kmk-rozet.mesaj{background:#f5ecfa; color:#8e44ad}
.kds-masa-kart.kds-mesajli{box-shadow:0 0 0 2px #8e44ad inset}
.kds-mesaj-blok{background:#2a2230; border:1px solid #8e44ad; border-radius:12px; padding:14px; margin-bottom:14px}
.kds-mesaj-baslik{font-size:13px; font-weight:800; color:#c89bda; margin-bottom:8px}
.kds-mesaj{font-size:14px; color:#fff; padding:6px 0; border-bottom:1px solid #3a3040}
.kds-mesaj small{color:#9aa0a6}
.kds-mesaj-okundu{margin-top:10px; padding:8px 16px; border-radius:9px; background:#8e44ad; color:#fff; font-size:13px; font-weight:800}
/* Garson masa durum etiketi */
.grs-m-durum{margin:4px 0}
/* Kasa/garson masa kategori başlığı */
.kasa-kat-baslik{font-size:13px; font-weight:800; color:var(--cocoa); margin:14px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--line)}
.kasa-kat-baslik:first-child{margin-top:4px}
.grs-kat-baslik{font-size:13px; font-weight:800; color:var(--cocoa); margin:14px 12px 8px}
/* Masa Yönetimi */
.my-sube-sec{margin-bottom:18px}
.my-ss-lbl{font-size:13px; font-weight:800; color:var(--ink-2); margin-bottom:8px}
.my-ss-row{display:flex; flex-wrap:wrap; gap:8px}
.my-ss-btn{padding:8px 14px; border-radius:99px; background:var(--surface); border:1.5px solid var(--line); color:var(--ink-2); font-size:13px; font-weight:700}
.my-ss-btn.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}
.my-katlar{display:flex; flex-direction:column; gap:14px; margin-bottom:16px}
.my-kat-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:16px}
.my-kat-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px}
.my-kat-ad{font-size:16px; font-weight:800}
.my-kat-aksiyon{display:flex; gap:6px}
.my-mini{width:34px; height:34px; border-radius:9px; background:var(--surface-2); font-size:14px; border:1px solid var(--line)}
.my-mini.sil:hover{background:var(--err-soft)}
.my-masa-grid{display:flex; flex-wrap:wrap; gap:10px}
.my-masa{display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; background:var(--surface-2); font-weight:700; font-size:14px; border:1px solid var(--line)}
.my-masa.dolu{background:var(--ok-soft); border-color:var(--ok)}
.my-masa-sil{width:20px; height:20px; border-radius:50%; background:var(--err-soft); color:var(--err); font-size:11px; font-weight:800}
.my-masa-qr{padding:4px 10px; border-radius:8px; background:var(--cocoa); color:#fff; font-size:11px; font-weight:800; border:none}
.my-toplu-qr{width:100%; padding:13px; border-radius:var(--radius); background:var(--brand); color:var(--brand-ink); font-weight:800; font-size:14px; border:none; margin-bottom:16px}
.my-dolu-rozet{font-size:10px; font-weight:800; color:var(--ok); background:#fff; padding:2px 7px; border-radius:99px}
.my-masa-ekle{padding:10px 16px; border-radius:10px; background:var(--brand-soft); color:var(--brand-d); font-weight:800; font-size:13px; border:1.5px dashed var(--brand)}
.my-kat-ekle{width:100%; padding:14px; border-radius:var(--radius); background:var(--cocoa); color:#fff; font-weight:800; font-size:14px}
.my-bos{padding:30px; text-align:center; color:var(--ink-3); font-size:14px}
/* İndirim yanıp sönen fiyat (satış + QR) */
@keyframes blinkFiyat{0%,100%{opacity:1}50%{opacity:.35}}
.blink{animation:blinkFiyat 1.1s ease-in-out infinite}
.p-price.indirimli{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.p-eski{text-decoration:line-through; color:var(--ink-3); font-size:13px; font-weight:600}
.p-yeni{color:var(--err); font-weight:800; font-size:16px}
.p-ind-rozet{background:var(--err); color:#fff; font-size:10px; font-weight:800; padding:2px 7px; border-radius:99px}
.qr-card-fiyat.indirimli{display:flex; align-items:center; gap:7px}
.qr-eski{text-decoration:line-through; color:var(--ink-3); font-size:13px}
.qr-yeni{color:var(--err); font-weight:800; font-size:17px}
.qr-ind-rozet{background:var(--err); color:#fff; font-size:10px; font-weight:800; padding:2px 8px; border-radius:99px}
/* Fiyat yönetimi ekranı */
.fy-hedef-sec{margin-bottom:16px}
.fy-hs-row{display:flex; flex-wrap:wrap; gap:8px}
.fy-hs-btn{padding:9px 15px; border-radius:99px; background:var(--surface); border:1.5px solid var(--line); color:var(--ink-2); font-size:13px; font-weight:700}
.fy-hs-btn.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}
.fy-uyari{background:var(--info-soft); border:1px solid #bcd9f5; border-radius:var(--radius); padding:12px 16px; font-size:13px; margin-bottom:16px; line-height:1.5}
.fy-liste{display:flex; flex-direction:column; gap:8px; margin-top:14px}
.fy-satir{display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:12px 16px}
.fy-satir.fy-kapali{opacity:.55; background:var(--surface-2)}
.fy-satir.fy-indirimli{border-color:var(--err); border-left-width:3px}
.fy-urun{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.fy-emoji{font-size:20px}
.fy-ad{font-weight:700; font-size:14px}
.fy-genel-not{font-size:11px; color:var(--ink-3)}
.fy-deger{display:flex; align-items:center; gap:6px; min-width:90px; justify-content:flex-end}
.fy-genel-fiyat{font-weight:800; font-size:15px}
.fy-eski{text-decoration:line-through; color:var(--ink-3); font-size:13px}
.fy-yeni{color:var(--err); font-weight:800; font-size:15px}
.fy-ind-rozet{background:var(--err); color:#fff; font-size:10px; font-weight:800; padding:2px 6px; border-radius:99px}
.fy-aksiyon{display:flex; gap:6px; flex-wrap:wrap}
.fy-btn{padding:7px 12px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line); font-size:12px; font-weight:700; color:var(--ink-2)}
.fy-btn.acik{color:var(--ok); border-color:var(--ok)}
.fy-btn.kapali{color:var(--err); border-color:var(--err)}
.fy-btn.sifirla{color:var(--cocoa)}
@media(max-width:680px){.fy-satir{grid-template-columns:1fr; gap:10px}.fy-aksiyon{justify-content:flex-start}}
/* Fiyat yönetimi v2 — kanal sekmeleri + alanlar */
.fy-kanal-row{display:flex; gap:8px; margin:6px 0 14px}
.fy-kanal{flex:1; padding:11px; border-radius:10px; background:var(--surface); border:1.5px solid var(--line); font-size:13.5px; font-weight:800; color:var(--ink-2)}
.fy-kanal.on{background:var(--brand); border-color:var(--brand); color:var(--brand-ink)}
.fy-fiyat-blok{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end}
.fy-alan{display:flex; flex-direction:column; gap:3px}
.fy-alan-lbl{font-size:10px; font-weight:700; color:var(--ink-3); text-transform:uppercase; letter-spacing:.3px}
.fy-alan-val{padding:7px 12px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line); font-size:13px; font-weight:800; color:var(--ink-2); white-space:nowrap}
.fy-alan-val.dolu{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.fy-alan-aciklama{flex:1; min-width:120px}
.fy-alan-aciklama .fy-alan-val{text-align:left; overflow:hidden; text-overflow:ellipsis}
.fy-onizleme{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
.fy-kampanya{background:#fff3e0; color:#e8780a; font-size:11px; font-weight:800; padding:2px 9px; border-radius:99px}
.fy-satir{display:flex; flex-direction:column; gap:8px}
/* İndirimli ürün kartı yanıp sönme (yumuşak) */
@keyframes blinkSoft{0%,100%{box-shadow:0 0 0 2px var(--err) inset, 0 0 14px rgba(231,76,60,.25)}50%{box-shadow:0 0 0 1px rgba(231,76,60,.3) inset, 0 0 4px rgba(231,76,60,.1)}}
.blink-soft{animation:blinkSoft 1.3s ease-in-out infinite}
.prod-indirimli{position:relative}
.qr-card-indirimli{border-radius:16px}
/* Kampanya açıklaması yazısı (satış/qr/garson) */
.p-kampanya{display:block; font-size:11px; font-weight:800; color:var(--err); margin:2px 0}
.qr-card-kampanya{font-size:12px; font-weight:800; color:var(--err); margin:3px 0}
.grs-u-kampanya{font-size:11px; font-weight:800; color:var(--err); margin-top:3px}
.grs-u-fiyat.indirimli{display:flex; flex-direction:column; align-items:flex-end; line-height:1.1}
.grs-u-eski{text-decoration:line-through; color:var(--ink-3); font-size:11px}
.grs-u-yeni{color:var(--err); font-weight:800; font-size:15px}
/* Şube yönetimi */
.sb-liste{display:flex; flex-direction:column; gap:12px}
.sb-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:16px 18px}
.sb-kart.sb-kapali{opacity:.6; background:var(--surface-2)}
.sb-ad{font-size:16px; font-weight:800; margin-bottom:5px}
.sb-rozet-kapali{font-size:10px; font-weight:800; background:var(--err); color:#fff; padding:2px 8px; border-radius:99px; vertical-align:middle}
.sb-adres{font-size:12.5px; color:var(--ink-2); line-height:1.4}
.sb-meta{font-size:12px; color:var(--ink-3); margin-top:3px}
.sb-aksiyon{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap}
.sb-btn{padding:8px 14px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line); font-size:12.5px; font-weight:700; color:var(--ink-2)}
.sb-btn.kapat{color:#e08a1e; border-color:#e8b56a}
.sb-btn.ac{color:var(--ok); border-color:var(--ok)}
.sb-btn.sil{color:var(--err); border-color:#e8a59e; margin-left:auto}
/* === BAYİ KANALI === */
.bayi-sekme-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px}
.bayi-sekme{padding:9px 14px; border-radius:99px; background:var(--surface); border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2)}
.bayi-sekme.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}
.bayi-aciklama{background:var(--info-soft); border:1px solid #bcd9f5; border-radius:var(--radius); padding:12px 15px; font-size:13px; margin-bottom:14px; line-height:1.5}
.bayi-bar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px}
.bayi-bar-bilgi{font-size:13px; color:var(--ink-2); font-weight:700}
.bayi-ekle-btn{padding:10px 16px; border-radius:10px; background:var(--brand); color:var(--brand-ink); font-weight:800; font-size:13px; border:none}
.bayi-tablo{display:flex; flex-direction:column; gap:8px}
.bayi-satir{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 15px}
.bayi-satir-sade{padding:9px 14px; background:var(--surface-2)}
.bayi-s-ad{flex:1; font-size:14px}
.bayi-s-kod{font-size:11px; color:var(--ink-3); background:var(--surface-2); padding:1px 7px; border-radius:6px; margin-left:5px}
.bayi-s-not{font-size:11.5px; color:var(--ink-3); margin-top:3px}
.bayi-s-deger{font-size:13.5px; font-weight:700; color:var(--ink-2); white-space:nowrap}
.bayi-s-deger small{font-weight:500; color:var(--ink-3)}
.bayi-s-aksiyon{display:flex; gap:6px; align-items:center}
.bayi-mini{padding:6px 12px; border-radius:8px; background:var(--surface-2); border:1px solid var(--line); font-size:12px; font-weight:700; color:var(--ink-2)}
.bayi-mini.sil{color:var(--err); border-color:#e8a59e}
.bayi-bos{padding:24px; text-align:center; color:var(--ink-3); font-size:13.5px}
.bayi-gecmis-baslik{font-size:13px; font-weight:800; color:var(--cocoa); margin:18px 0 10px}
/* irsaliye form */
.bayi-form{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:16px; margin-bottom:16px}
.bayi-form-baslik{font-size:15px; font-weight:800; margin-bottom:12px}
.bayi-form-satir{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--line)}
.bayi-form-satir label{font-size:12px; font-weight:700; color:var(--ink-3); width:80px}
.bayi-form-val{padding:6px 12px; border-radius:8px; background:var(--surface-2); border:1px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2)}
.bayi-form-kalemler{margin:12px 0; display:flex; flex-direction:column; gap:6px}
.bayi-kalem-satir{display:flex; align-items:center; gap:10px; background:var(--surface-2); border-radius:8px; padding:8px 12px; font-size:13px}
.bayi-kalem-satir span:first-child{flex:1; font-weight:600}
.bayi-kalem-sil{width:22px; height:22px; border-radius:50%; background:var(--err-soft); color:var(--err); font-size:11px; font-weight:800; border:none}
.bayi-kalem-ekle{width:100%; padding:10px; border-radius:9px; background:var(--brand-soft); color:var(--brand-d); font-weight:800; font-size:13px; border:1.5px dashed var(--brand); margin-bottom:12px}
.bayi-form-foot{display:flex; gap:10px}
.bayi-form-foot .btn{flex:1}
/* sipariş kartları */
.bayi-sip-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:10px}
.bayi-sip-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px}
.bayi-sip-no{font-size:14px; font-weight:800}
.bayi-sip-durum{font-size:11px; font-weight:800; padding:3px 10px; border-radius:99px}
.bayi-sip-tarih{font-size:11.5px; color:var(--ink-3); margin-bottom:10px}
.bayi-sip-kalemler{display:flex; flex-direction:column; gap:5px; margin-bottom:10px}
.bayi-sip-kalem{display:flex; align-items:center; gap:10px; font-size:13px; padding:5px 0; border-bottom:1px solid var(--line)}
.bayi-sip-kalem span:first-child{flex:1; font-weight:600}
.bayi-sip-toplam{font-size:14px; font-weight:800; text-align:right; margin-bottom:10px}
.bayi-sip-aksiyon{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
.bayi-sip-not-bekle{font-size:12.5px; color:#e08a1e; font-weight:700; text-align:center; padding:8px; background:#fdf0dc; border-radius:8px}
.bayi-sip-not-ok{font-size:12.5px; color:var(--ok); font-weight:700; text-align:center; padding:8px; background:var(--ok-soft); border-radius:8px}
.bayi-sip-not-red{font-size:12.5px; color:var(--err); font-weight:700; text-align:center; padding:8px; background:var(--err-soft); border-radius:8px}
.bayi-odendi-rozet{font-size:12px; font-weight:800; color:var(--ok); background:var(--ok-soft); padding:6px 12px; border-radius:99px}
.bayi-sube-blok{margin-bottom:16px}
.bayi-sube-ad{font-size:14px; font-weight:800; margin-bottom:8px}
.bayi-sepet-miktar{font-size:13px; font-weight:800; color:var(--brand-d)}
.bayi-sepet-ozet{position:sticky; bottom:0; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:14px 16px; margin-top:14px; box-shadow:var(--shadow-lg)}
.bayi-sepet-baslik{font-size:14px; font-weight:800; margin-bottom:10px}
/* Bayi ödeme modalı */
.bom-head{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line)}
.bom-baslik{font-size:17px; font-weight:800}
.bom-kapat{width:34px; height:34px; border-radius:10px; background:var(--surface-2); border:1px solid var(--line); font-size:15px; font-weight:800; color:var(--ink-2)}
.bom-ozet{padding:16px 20px; background:var(--surface-2)}
.bom-ozet-satir{display:flex; justify-content:space-between; font-size:13.5px; color:var(--ink-2); padding:3px 0}
.bom-ozet-satir.bom-toplam{font-size:18px; font-weight:800; color:var(--ink); margin-top:6px; padding-top:8px; border-top:1px solid var(--line)}
.bom-yontem-baslik{font-size:12px; font-weight:800; color:var(--ink-3); text-transform:uppercase; letter-spacing:.4px; padding:16px 20px 8px}
.bom-yontem-row{display:flex; gap:10px; padding:0 20px}
.bom-yontem{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px; border-radius:12px; background:var(--surface); border:2px solid var(--line); cursor:pointer}
.bom-yontem.on{border-color:var(--brand); background:var(--brand-soft)}
.bom-y-ic{font-size:24px}
.bom-y-ad{font-size:13px; font-weight:800; color:var(--ink-2)}
.bom-alan-grup{padding:16px 20px; display:flex; flex-direction:column; gap:12px}
.bom-alan{display:flex; flex-direction:column; gap:5px}
.bom-alan label{font-size:11px; font-weight:700; color:var(--ink-3)}
.bom-input{padding:11px 13px; border-radius:10px; border:1.5px solid var(--line); font-size:14px; font-weight:600; background:var(--surface); color:var(--ink); width:100%; box-sizing:border-box}
.bom-input:focus{border-color:var(--brand); outline:none}
.bom-alan-ikili{display:flex; gap:10px}
.bom-alan-ikili .bom-alan{flex:1}
.bom-eft-bilgi{background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:14px}
.bom-eft-baslik{font-size:13px; font-weight:800; margin-bottom:10px; color:var(--cocoa)}
.bom-eft-satir{display:flex; justify-content:space-between; gap:10px; font-size:12.5px; padding:4px 0; color:var(--ink-2)}
.bom-eft-satir strong{color:var(--ink); text-align:right}
.bom-eft-not{font-size:12px; color:var(--ink-3); line-height:1.5; margin-top:4px}
.bom-ode-btn{margin:8px 20px 20px; padding:15px; border-radius:12px; background:var(--brand); color:var(--brand-ink); font-size:15px; font-weight:800; border:none; width:calc(100% - 40px); cursor:pointer}
/* Bayi iskonto + özet tablosu */
.bayi-iskonto-blok{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:16px; margin-bottom:16px}
.bayi-iskonto-baslik{font-size:15px; font-weight:800; margin-bottom:4px}
.bayi-iskonto-aciklama{font-size:12px; color:var(--ink-3); margin-bottom:12px}
.bayi-iskonto-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px}
.bayi-iskonto-kart{display:flex; justify-content:space-between; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; background:var(--surface-2); border:1.5px solid var(--line); font-size:13px}
.bayi-iskonto-kart.dolu{background:var(--ok-soft); border-color:var(--ok)}
.bik-sube{font-weight:700; color:var(--ink-2)}
.bik-oran{font-weight:800; color:var(--ink-3); white-space:nowrap}
.bayi-iskonto-kart.dolu .bik-oran{color:var(--ok)}
.bayi-s-satir-tutar{font-size:12.5px; color:var(--brand-d); font-weight:700; margin-top:3px}
.bayi-ozet-tablo{background:var(--surface-2); border-radius:10px; padding:12px 14px; margin:10px 0}
.bayi-ozet-satir{display:flex; justify-content:space-between; font-size:13px; color:var(--ink-2); padding:3px 0}
.bayi-ozet-satir.bayi-ozet-ind{color:var(--ok); font-weight:700}
.bayi-ozet-satir.bayi-ozet-net{font-size:15px; font-weight:800; color:var(--ink); margin-top:5px; padding-top:7px; border-top:1px solid var(--line)}
.bayi-duzenlendi-rozet{font-size:10px; font-weight:800; background:#fdf0dc; color:#e08a1e; padding:2px 8px; border-radius:99px; margin-left:6px}
.bayi-kalem-silinmis{opacity:.6}
/* Geçmiş siparişler filtre */
.gf-tip-row{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap}
.gf-tip-chip{padding:8px 16px; border-radius:20px; border:1.5px solid var(--line); background:var(--surface); color:var(--ink-2); font-size:13px; font-weight:700; cursor:pointer}
.gf-tip-chip.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}
.gecmis-filtre{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:12px}
.gf-alan{display:flex; flex-direction:column; gap:4px}
.gf-alan label{font-size:11px; font-weight:700; color:var(--ink-3)}
.gf-select,.gf-date{padding:9px 12px; border-radius:9px; border:1.5px solid var(--line); font-size:13px; font-weight:600; background:var(--surface); color:var(--ink)}
.gf-temizle{padding:9px 14px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line); font-size:12.5px; font-weight:700; color:var(--ink-2)}
.gf-filtrele{padding:9px 16px; border-radius:9px; background:var(--cocoa); border:none; font-size:12.5px; font-weight:800; color:#fff}
.gecmis-aktif-filtre{font-size:12px; font-weight:700; color:var(--cocoa); background:var(--surface-2); border-radius:8px; padding:8px 12px; margin-bottom:10px}
.gecmis-ozet-bar{display:flex; justify-content:space-between; align-items:center; gap:12px; background:var(--cocoa); color:#fff; border-radius:var(--radius); padding:14px 18px; margin-bottom:14px; flex-wrap:wrap}
.go-bilgi{font-size:14px}
.go-sayi{font-size:20px; font-weight:800; margin-right:4px}
.go-bilgi strong{font-size:17px}
.go-xls{padding:10px 18px; border-radius:10px; background:#fff; color:var(--cocoa); font-size:13.5px; font-weight:800; border:none}
/* === MASA GEÇMİŞİ === */
.gf-input{padding:9px 12px; border-radius:9px; border:1.5px solid var(--line); font-size:13px; font-weight:600; background:var(--surface); color:var(--ink); width:100%}
.mg-liste{display:flex; flex-direction:column; gap:10px}
.mg-kart{display:block; width:100%; text-align:left; background:var(--surface); border:1.5px solid var(--line); border-radius:var(--radius); padding:14px 16px; cursor:pointer; transition:border-color .15s}
.mg-kart:hover{border-color:var(--cocoa)}
.mg-ust{display:flex; justify-content:space-between; align-items:center; font-weight:800}
.mg-masa{font-size:14.5px; color:var(--ink)}
.mg-tutar{font-size:15px; color:var(--cocoa)}
.mg-orta{font-size:12.5px; color:var(--ink-2); margin-top:4px}
.mg-alt{font-size:12.5px; color:var(--ink-3); margin-top:6px; font-weight:600}
.mgd-kisi-bas{font-size:12.5px; font-weight:800; color:var(--cocoa); margin:10px 0 4px}
.mgd-tahsilat{background:var(--surface-2); border-radius:10px; padding:10px 12px; margin-bottom:8px}
.mgd-tahsilat-bas{display:flex; justify-content:space-between; font-size:12px; font-weight:800; color:var(--ink-2); margin-bottom:6px}
.mgd-yontem-rozet{display:inline-block; background:var(--brand-soft); color:var(--brand-d); font-size:11.5px; font-weight:700; border-radius:20px; padding:3px 10px; margin:3px 4px 0 0}
.mgd-indirim-not{font-size:11.5px; color:#b5651d; font-weight:700; margin-top:4px}
.go-xls:disabled{opacity:.5}
/* Sade fiyat ekranı */
.fy-bilgi-not{background:var(--info-soft); border:1px solid #bcd9f5; border-radius:var(--radius); padding:11px 14px; font-size:12.5px; margin-bottom:12px; line-height:1.5}
/* === FİYAT TABLOSU === */
.fy-ust-bar{display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap}
.fy-arama-kutu{flex:1; min-width:200px; display:flex; align-items:center; gap:8px; background:var(--surface); border:1.5px solid var(--line); border-radius:11px; padding:9px 13px}
.fy-arama-input{flex:1; border:none; background:none; font-size:14px; outline:none; color:var(--ink)}
.fy-excel-btn{padding:10px 16px; border-radius:11px; background:#1d7c4d; color:#fff; border:none; font-size:13.5px; font-weight:800; cursor:pointer; white-space:nowrap}
.fy-excel-btn:active{background:#176140}
.fy-tablo-sar{overflow-x:auto; border:1px solid var(--line); border-radius:14px; background:var(--surface)}
.fy-tablo{border-collapse:collapse; width:100%; font-size:13px}
.fy-tablo th{background:var(--surface-2); padding:11px 12px; text-align:center; font-weight:800; font-size:12px; color:var(--cocoa); position:sticky; top:0; z-index:3; border-bottom:2px solid var(--cocoa); white-space:nowrap}
.fy-th-urun{text-align:left!important; position:sticky; left:0; z-index:4; min-width:190px}
.fy-th-tavsiye{background:#fff4e6!important; color:#8a6212!important}
.fy-th-sube{min-width:118px}
/* her ürün satırı 2 satır yüksekliğinde, kalın alt çizgi */
.fy-tablo tbody tr{border-bottom:2.5px solid var(--cocoa-soft, #e6d3c0)}
.fy-tablo td{padding:0; vertical-align:middle; height:62px}
.fy-td-urun{padding:8px 12px!important; position:sticky; left:0; background:var(--surface); z-index:2; border-right:2px solid var(--line)}
.fy-td-urun-ic{display:flex; align-items:center; gap:9px}
.fy-td-urun .fy-emoji{font-size:17px; flex-shrink:0}
.fy-td-urun .fy-ad{font-weight:700; font-size:13px; line-height:1.25}
.fy-kat-ayrac td{background:var(--cocoa); color:#fff; font-weight:800; font-size:12px; padding:7px 12px!important; position:sticky; left:0; height:auto; letter-spacing:.3px}
.fy-bos{text-align:center; padding:24px!important; color:var(--ink-3); height:auto}
.fy-td-fiyat{border-left:1px solid var(--line); min-width:114px}
.fy-td-fiyat.tavsiye{background:#fffaf0}
.fy-h-satir{display:flex; align-items:center; gap:5px; padding:0 10px; justify-content:space-between; height:31px; box-sizing:border-box}
.fy-h-satir:first-child{border-bottom:1px dashed #d8c4ae}
.fy-td-fiyat.tek-kanal .fy-h-satir{height:62px}
.fy-h-satir.kapali{opacity:.45}
.fy-h-etk{font-size:9px; font-weight:800; color:#fff; background:var(--cocoa); border-radius:4px; padding:1px 5px; flex-shrink:0}
.fy-h-fiyat{font-weight:800; font-size:13px; color:var(--ink); cursor:pointer; flex:1; text-align:right; padding:2px 4px; border-radius:4px}
.fy-h-fiyat:hover{background:var(--brand-soft)}
.fy-h-fiyat.fy-tav{color:var(--ink-3); font-weight:600; font-style:italic}
.fy-h-fiyat.fy-dusuk{color:var(--err)}
.fy-h-fiyat.fy-yuksek{color:#b06d10}
.fy-h-tik{width:21px; height:21px; border-radius:5px; border:none; font-size:11px; font-weight:800; cursor:pointer; flex-shrink:0}
.fy-h-tik.acik{background:var(--ok-soft); color:var(--ok)}
.fy-h-tik.kapali{background:var(--err-soft); color:var(--err)}
/* satır hover — tüm satırı vurgula (sağa kaydırınca kaybolmasın) */
.fy-tablo tbody tr:not(.fy-kat-ayrac):hover td{background:#fdf6ec}
.fy-tablo tbody tr:not(.fy-kat-ayrac):hover .fy-td-urun{background:#faecd6}
/* kanal filtresi */
.fy-kanal-fil{display:flex; gap:0; background:var(--surface-2); border-radius:10px; padding:3px; flex-shrink:0}
.fy-kf-btn{padding:8px 13px; border-radius:8px; background:none; border:none; font-size:12.5px; font-weight:700; color:var(--ink-2); cursor:pointer; white-space:nowrap}
.fy-kf-btn.on{background:var(--brand); color:#fff}
/* === YAZARKASA ENTEGRASYON EKRANI === */
.yk-bilgi{background:var(--info-soft); border:1px solid #bcd9f5; border-radius:12px; padding:13px 16px; font-size:13px; line-height:1.6; margin-bottom:14px}
.yk-bilgi code{background:rgba(0,0,0,.06); padding:1px 6px; border-radius:5px; font-size:12px}
.yk-sube-sec{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
.yk-sube-btn{padding:9px 14px; border-radius:10px; background:var(--surface-2); border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2); cursor:pointer; display:flex; align-items:center; gap:7px}
.yk-sube-btn.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.yk-nokta{width:8px; height:8px; border-radius:50%; background:var(--ink-3); display:inline-block}
.yk-nokta.acik{background:var(--ok)}
.yk-kart{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:var(--shadow)}
.yk-kart-bas{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--line)}
.yk-kart-sube{font-size:16px; font-weight:800; color:var(--cocoa)}
.yk-switch{display:flex; align-items:center; gap:8px; cursor:pointer}
.yk-switch input{display:none}
.yk-switch-yuva{width:44px; height:25px; border-radius:99px; background:var(--line); position:relative; transition:.2s}
.yk-switch-yuva::after{content:''; position:absolute; top:3px; left:3px; width:19px; height:19px; border-radius:50%; background:#fff; transition:.2s}
.yk-switch input:checked + .yk-switch-yuva{background:var(--ok)}
.yk-switch input:checked + .yk-switch-yuva::after{left:22px}
.yk-switch-lbl{font-size:13px; font-weight:700; color:var(--ink-2)}
.yk-alan{margin-bottom:14px}
.yk-alan label{display:block; font-size:12px; font-weight:700; color:var(--ink-2); margin-bottom:6px}
.yk-select,.yk-input{width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--line); font-size:14px; background:var(--surface); color:var(--ink)}
.yk-baglanti-row{display:flex; gap:8px; flex-wrap:wrap}
.yk-bag-btn{flex:1; min-width:140px; padding:11px; border-radius:10px; background:var(--surface-2); border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2); cursor:pointer}
.yk-bag-btn.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.yk-ikili{display:flex; gap:12px}
.yk-ikili .yk-alan{flex:1}
.yk-port{max-width:120px}
.yk-test-row{display:flex; align-items:center; gap:12px; margin-top:4px}
.yk-test-btn{padding:11px 16px; border-radius:10px; background:var(--cocoa); color:#fff; border:none; font-size:13px; font-weight:700; cursor:pointer}
.yk-test-sonuc{font-size:13px; font-weight:700; color:var(--ink-3)}
.yk-test-sonuc.ok{color:var(--ok)}
.yk-test-sonuc.hata{color:var(--err)}
.yk-test-sonuc.pasif{color:#b06d10}
.yk-ozet{background:var(--surface-2); border-radius:12px; padding:14px 16px; margin-bottom:14px}
.yk-ozet-bas{font-size:13px; font-weight:800; color:var(--cocoa); margin-bottom:10px}
.yk-ozet-satir{display:flex; justify-content:space-between; font-size:13px; padding:5px 0; color:var(--ink-2)}
.yk-ozet-satir span:last-child{font-weight:700; color:var(--ink)}

/* === FİŞ YAZICILARI === */

.yzc-liste{display:flex; flex-direction:column; gap:12px}

.yzc-kart-ad{display:flex; gap:12px; align-items:flex-start}
.yzc-rol-ic{font-size:26px; line-height:1}

.yzc-kart-meta{display:flex; gap:7px; flex-wrap:wrap}

/* yazıcı modal */

.yzc-rol-row{display:flex; gap:7px; flex-wrap:wrap}

.yzc-bag-row{display:flex; gap:7px}
.yzc-bag-btn{flex:1; padding:11px; border-radius:9px; background:var(--surface-2); border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2); cursor:pointer}
.yzc-bag-btn.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.yzc-lbl-not{font-weight:400; color:var(--ink-3); font-size:11px}
.yzc-kat-grid{display:flex; gap:7px; flex-wrap:wrap}
.yzc-kat-cip{padding:7px 12px; border-radius:8px; background:var(--surface-2); border:1.5px solid var(--line); font-size:12.5px; font-weight:700; color:var(--ink-2); cursor:pointer}
.yzc-kat-cip.on{background:var(--ok-soft); border-color:var(--ok); color:var(--ok)}
.yzc-modal-foot{display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--line)}
.yzc-test-btn{flex:1; padding:13px; border-radius:11px; background:var(--cocoa); color:#fff; border:none; font-size:14px; font-weight:700; cursor:pointer}
.yzc-kaydet-btn{flex:1.5; padding:13px; border-radius:11px; background:var(--ok); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
/* şube ekle/düzenle modal */
.sube-modal-ic{background:#fff; border-radius:18px; max-width:460px; width:94%; margin:auto; max-height:88vh; display:flex; flex-direction:column}
.sube-modal-bas{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line); font-size:16px; font-weight:800; color:var(--cocoa)}
.sube-modal-govde{padding:18px 20px; overflow-y:auto; flex:1}
.sube-modal-not{font-size:11.5px; color:var(--ink-3); margin-top:6px; line-height:1.4}
.sube-modal-foot{display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--line)}
.sube-iptal-btn{flex:1; padding:13px; border-radius:11px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:14px; font-weight:700; cursor:pointer}
.sube-kaydet-btn{flex:1.6; padding:13px; border-radius:11px; background:var(--ok); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
/* === MÜŞTERİ EKRANI === */
.ode-head-sag{display:flex; gap:8px; align-items:center}
.ode-musteri-btn{padding:9px 14px; border-radius:10px; background:var(--cocoa); color:#fff; border:none; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap}
.mte-modal-ic{background:#fff; border-radius:18px; max-width:540px; width:94%; margin:auto; max-height:88vh; display:flex; flex-direction:column}
.mte-modal-bas{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line); font-size:16px; font-weight:800; color:var(--cocoa)}
.mte-modal-govde{padding:18px 20px; overflow-y:auto}
.mte-durum{display:flex; align-items:center; gap:9px; font-size:14px; font-weight:700; color:var(--ink-2); margin-bottom:12px}
.mte-durum-nokta{width:11px; height:11px; border-radius:50%; background:var(--ink-3)}
.mte-durum.acik{color:var(--ok)}
.mte-durum.acik .mte-durum-nokta{background:var(--ok); box-shadow:0 0 0 4px var(--ok-soft)}
.mte-buton-row{margin-bottom:12px}
.mte-ac-btn{padding:12px 20px; border-radius:11px; background:var(--brand); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
.mte-kapat-btn{padding:12px 20px; border-radius:11px; background:var(--err-soft); color:var(--err); border:none; font-size:14px; font-weight:700; cursor:pointer}
.mte-not{font-size:12px; color:var(--ink-3); line-height:1.5; margin-bottom:16px}
.mte-reklam-bas{font-size:14px; font-weight:800; color:var(--cocoa); margin-bottom:10px; padding-top:8px; border-top:1px solid var(--line)}
.mte-reklam-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:10px}
.mte-reklam-kart{position:relative; aspect-ratio:16/9; border-radius:10px; overflow:hidden; border:1px solid var(--line)}
.mte-reklam-kart img{width:100%; height:100%; object-fit:cover}
.mte-reklam-sil{position:absolute; top:5px; right:5px; width:24px; height:24px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; border:none; font-size:13px; cursor:pointer}
.mte-reklam-ekle{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; aspect-ratio:16/9; border-radius:10px; border:2px dashed var(--line); cursor:pointer; color:var(--ink-3); background:var(--surface-2)}
.mte-reklam-ekle span:first-child{font-size:28px; font-weight:300; line-height:1}
.mte-ekle-lbl{font-size:12px; font-weight:700}
/* === SEÇENEK SİL ONAY MODALI === */
.ssil-ic{background:#fff; border-radius:18px; padding:26px 24px; max-width:340px; width:90%; margin:auto; text-align:center}
.ssil-ikon{font-size:42px; margin-bottom:10px}
.ssil-bas{font-size:18px; font-weight:800; color:var(--ink); margin-bottom:6px}
.ssil-urun{font-size:14px; color:var(--ink-2); font-weight:600}
.ssil-sec{font-size:15px; color:var(--cocoa); font-weight:700; margin-top:8px}
.ssil-fiyat{color:var(--err); font-weight:800}
.ssil-not{font-size:12.5px; color:var(--ink-3); margin-top:12px; line-height:1.5; background:var(--surface-2); border-radius:10px; padding:10px 14px}
.ssil-adet-blok{margin-top:14px; background:var(--surface-2); border-radius:12px; padding:12px}
.ssil-adet-lbl{font-size:12.5px; font-weight:700; color:var(--ink-2); margin-bottom:10px}
.ssil-adet-row{display:flex; align-items:center; justify-content:center; gap:10px}
.ssil-adet-btn{width:38px; height:38px; border-radius:10px; background:#fff; border:1.5px solid var(--line); font-size:20px; font-weight:800; color:var(--cocoa); cursor:pointer}
.ssil-adet-btn:disabled{opacity:.3; cursor:default}
.ssil-adet-deger{font-size:24px; font-weight:900; color:var(--ink); min-width:36px; text-align:center}
.ssil-adet-tum{padding:8px 14px; border-radius:9px; background:#fff; border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink-2); cursor:pointer; margin-left:4px}
.ssil-adet-tum.on{background:var(--err-soft); border-color:var(--err); color:var(--err)}
/* === MUTFAK MÜŞTERİ MESAJI (onay/red) === */
.kds-mesaj{background:#2a2020; border-radius:10px; padding:11px 13px; margin-bottom:8px}
.kds-mesaj-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.kds-mesaj-kisi{font-size:12px; font-weight:700; color:#e0c9a0}
.kds-mesaj-rozet{font-size:10.5px; font-weight:800; border-radius:6px; padding:2px 8px}
.kds-mesaj-rozet.bekle{background:#4a3a20; color:#f0c060}
.kds-mesaj-rozet.ok{background:#1d4030; color:#5fd99a}
.kds-mesaj-rozet.red{background:#4a2020; color:#e88}
.kds-mesaj-metin{font-size:14px; color:#fff; line-height:1.4; margin-bottom:8px}
.kds-mesaj-aksiyon{display:flex; gap:8px}
.kds-mesaj-onay{flex:1.3; padding:9px; border-radius:8px; background:#1d7c4d; color:#fff; border:none; font-size:13px; font-weight:800; cursor:pointer}
.kds-mesaj-red{flex:1; padding:9px; border-radius:8px; background:#5a2a2a; color:#f5b0a8; border:none; font-size:13px; font-weight:700; cursor:pointer}
.kds-mesaj-onaylandi{opacity:.7}
.kds-mesaj-reddedildi{opacity:.6}
/* mutfak mesaj pop-up */
.kmp-ic{background:#fff; border-radius:20px; padding:26px 24px; max-width:380px; width:92%; margin:auto; text-align:center}
.kmp-ikon{font-size:48px; margin-bottom:8px}
.kmp-bas{font-size:20px; font-weight:900; color:var(--ink); margin-bottom:8px}
.kmp-masa{font-size:13px; font-weight:700; color:var(--cocoa); background:var(--surface-2); border-radius:8px; padding:6px 12px; display:inline-block; margin-bottom:14px}
.kmp-mesaj{font-size:18px; color:var(--ink); line-height:1.5; background:#fff8ee; border:1px solid #f0d9b0; border-radius:12px; padding:16px; margin-bottom:18px}
.kmp-butonlar{display:flex; gap:10px; margin-bottom:10px}
.kmp-onay{flex:1.4; padding:15px; border-radius:12px; background:var(--ok); color:#fff; border:none; font-size:16px; font-weight:800; cursor:pointer}
.kmp-red{flex:1; padding:15px; border-radius:12px; background:var(--err-soft); color:var(--err); border:none; font-size:15px; font-weight:700; cursor:pointer}
.kmp-sonra{background:none; border:none; color:var(--ink-3); font-size:13px; font-weight:600; cursor:pointer; padding:6px}
/* QR müşteri mesaj geçmişi */
.qr-mesaj-gecmis{margin-top:14px; text-align:left}
.qr-mg-baslik{font-size:13px; font-weight:800; color:var(--ink-2); margin-bottom:8px}
.qr-mg-satir{border-radius:11px; padding:11px 13px; margin-bottom:8px; border:1.5px solid var(--line)}
.qr-mg-metin{font-size:14px; color:var(--ink); margin-bottom:5px}
.qr-mg-durum{font-size:12.5px; font-weight:700}
.qr-mg-bekliyor{background:#fff8ee; border-color:#f0d9b0}
.qr-mg-bekliyor .qr-mg-durum{color:#b06d10}
.qr-mg-onaylandi{background:var(--ok-soft); border-color:#bfe3cd}
.qr-mg-onaylandi .qr-mg-durum{color:var(--ok)}
.qr-mg-reddedildi{background:var(--err-soft); border-color:#f0c0ba}
.qr-mg-reddedildi .qr-mg-durum{color:var(--err)}
/* QR müşteri yanıt pop-up */
.qyp-ic{background:#fff; border-radius:22px; padding:30px 26px; max-width:360px; width:90%; margin:auto; text-align:center}
.qyp-ikon{width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:900; color:#fff; margin:0 auto 16px}
.qyp-ic.onay .qyp-ikon{background:var(--ok)}
.qyp-ic.red .qyp-ikon{background:var(--err)}
.qyp-bas{font-size:21px; font-weight:900; color:var(--ink); margin-bottom:12px}
.qyp-mesaj{font-size:15px; color:var(--ink-2); font-style:italic; margin-bottom:10px}
.qyp-alt{font-size:14px; color:var(--ink-3); line-height:1.5; margin-bottom:20px}
.qyp-tamam{width:100%; padding:15px; border-radius:13px; background:var(--brand); color:#fff; border:none; font-size:16px; font-weight:800; cursor:pointer}
/* === QR MUTFAĞA MESAJ MODALI === */
.qrm-ic{background:#fff; border-radius:20px; padding:24px 22px; max-width:380px; width:92%; margin:auto}
.qrm-bas{font-size:19px; font-weight:900; color:var(--ink); margin-bottom:6px}
.qrm-alt{font-size:13px; color:var(--ink-3); line-height:1.5; margin-bottom:16px}
.qrm-text{width:100%; min-height:100px; border:1.5px solid var(--line); border-radius:12px; padding:13px; font-size:15px; font-family:inherit; resize:vertical; outline:none; color:var(--ink); background:var(--surface)}
.qrm-text:focus{border-color:var(--brand)}
.qrm-butonlar{display:flex; gap:10px; margin-top:16px}
.qrm-vazgec{flex:1; padding:14px; border-radius:12px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:14px; font-weight:700; cursor:pointer}
.qrm-gonder{flex:1.5; padding:14px; border-radius:12px; background:var(--brand); color:#fff; border:none; font-size:15px; font-weight:800; cursor:pointer}
/* === GARSON ÇAĞRI ONAY POP-UP (personel) === */
.gcp-ic{background:#fff; border-radius:20px; padding:26px 24px; max-width:380px; width:92%; margin:auto; text-align:center}
.gcp-ikon{font-size:48px; margin-bottom:8px; animation:gcpZil .6s ease-in-out infinite}
@keyframes gcpZil{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}
.gcp-bas{font-size:21px; font-weight:900; color:var(--err); margin-bottom:8px}
.gcp-masa{font-size:15px; font-weight:800; color:var(--ink); background:var(--err-soft); border-radius:9px; padding:8px 14px; display:inline-block; margin-bottom:6px}
.gcp-sure{font-size:12.5px; color:var(--ink-3); margin-bottom:16px}
.gcp-ad-alan{text-align:left; margin-bottom:16px}
.gcp-ad-alan label{display:block; font-size:12.5px; font-weight:700; color:var(--ink-2); margin-bottom:6px}
.gcp-ad-input{width:100%; padding:12px 14px; border-radius:11px; border:1.5px solid var(--line); font-size:15px; outline:none; color:var(--ink); background:var(--surface)}
.gcp-ad-input:focus{border-color:var(--brand)}
.gcp-butonlar{display:flex; gap:10px}
.gcp-sonra{flex:1; padding:14px; border-radius:12px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:14px; font-weight:700; cursor:pointer}
.gcp-kabul{flex:2; padding:14px; border-radius:12px; background:var(--ok); color:#fff; border:none; font-size:14px; font-weight:800; cursor:pointer}
/* müşteri çağrı onay pop-up */
.qcp-ic{background:#fff; border-radius:22px; padding:30px 26px; max-width:360px; width:90%; margin:auto; text-align:center}
.qcp-ikon{font-size:56px; margin-bottom:14px}
.qcp-bas{font-size:21px; font-weight:900; color:var(--ok); margin-bottom:12px}
.qcp-mesaj{font-size:16px; color:var(--ink-2); line-height:1.6; margin-bottom:20px}
.qcp-tamam{width:100%; padding:15px; border-radius:13px; background:var(--brand); color:#fff; border:none; font-size:16px; font-weight:800; cursor:pointer}
/* === MÜŞTERİ EKRANI SEKMESİ === */
.me-durum-row{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap}
.me-reklam-bolum{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:var(--shadow)}
.me-reklam-bolum-bas{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.me-reklam-bolum-bas span:first-child{font-size:16px; font-weight:800; color:var(--cocoa)}
.me-reklam-say{font-size:12px; font-weight:700; color:var(--ink-3)}
.me-reklam-aciklama{font-size:12.5px; color:var(--ink-3); line-height:1.5; margin-bottom:14px}
.me-reklam-bos{font-size:13px; color:var(--ink-3); background:var(--surface-2); border-radius:10px; padding:12px 14px; margin-top:12px; line-height:1.5}
.mte-reklam-kart .me-reklam-no{position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,.6); color:#fff; font-size:11px; font-weight:800; border-radius:5px; padding:2px 7px}
.me-onizle-row{margin-bottom:14px}
.me-onizle-btn{padding:12px 18px; border-radius:11px; background:var(--cocoa); color:#fff; border:none; font-size:14px; font-weight:700; cursor:pointer}
/* önizleme modalı */
.meo-ic{background:#fff; border-radius:18px; padding:18px; max-width:560px; width:94%; margin:auto}
.meo-ekran{position:relative; aspect-ratio:16/9; border-radius:12px; overflow:hidden; background:linear-gradient(135deg,#2a1c0c,#1a1208); display:flex; align-items:center; justify-content:center}

.meo-marka{font-size:44px; font-weight:900; letter-spacing:1px; color:#f0a728; text-shadow:0 3px 16px rgba(0,0,0,.5)}
.meo-alt{font-size:16px; color:#e8d5b8; margin-top:6px}
.meo-hos{position:absolute; bottom:24px; left:0; right:0; text-align:center; font-size:18px; color:#fff; opacity:.9; z-index:2}

.ssil-butonlar{display:flex; gap:10px; margin-top:18px}
.ssil-vazgec{flex:1; padding:13px; border-radius:11px; background:var(--surface-2); color:var(--ink-2); border:none; font-size:14px; font-weight:700; cursor:pointer}

.kmd-sec-ekle{padding:7px 13px; border-radius:9px; background:var(--ok-soft); color:var(--ok); border:none; font-size:12.5px; font-weight:700; cursor:pointer}
.kak-btn.sec-ekle{background:var(--ok-soft); color:var(--ok)}
/* === FİYAT DEĞİŞTİRME MODAL === */
.fy-duz-ic{background:#fff; border-radius:20px; padding:22px; max-width:360px; width:92%; margin:auto}

.fy-duz-urun{font-size:16px; font-weight:800; color:var(--ink)}

.fy-duz-deger{font-size:34px; font-weight:900; color:var(--ink)}

.fy-duz-bilgi{font-size:11.5px; color:var(--ink-3); text-align:center; margin-bottom:16px; line-height:1.4}

.fy-duz-tus{padding:16px 0; border-radius:11px; background:var(--surface-2); border:1px solid var(--line); font-size:20px; font-weight:800; color:var(--ink); cursor:pointer}
