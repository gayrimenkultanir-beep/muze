}
function kalemIptalKapat(){ const m=document.getElementById("kalemIptalModal"); if(m) m.classList.remove("on"); state._kalemIptal=null; }
function kalemIptalUygula(){
  const d=state._kalemIptal; if(!d) return;
  const masaNo=d.masaNo, kalemId=d.kalemId, kaynak=d.kaynak, urunAd=d.urunAd;
  const kisiAd=kalemKisiAd(masaNo, kalemId);
  kalemIptalKapat();
  kalemIptal(masaNo, kalemId);
  // mutfağa bildirilecek değişiklik kaydı (kasa/kds/ödeme kaynaklı)
  degisiklikKaydet(masaNo, kisiAd, "iptal", urunAd, "");
  note("Ürün iptal edildi · tutar düştü");
  // kaynağa göre ekran yenile
  if(kaynak==="kds"){ renderKDS(); }
  else if(kaynak==="odeme"){ ekranlariYenile("odeme", masaNo); }
  else { go("masalar"); }
}
function secSilAdetSet(d){ const s=state._secSil; if(!s) return; s.silAdet=Math.max(1,Math.min(s.toplamAdet,s.silAdet+d)); secenekSilModalCiz(); }
function secSilAdetTum(){ const s=state._secSil; if(!s) return; s.silAdet=s.toplamAdet; secenekSilModalCiz(); }
function secenekSilKapat(){ const m=document.getElementById("secSilModal"); if(m) m.classList.remove("on"); state._secSil=null; }
function secenekSilUygula(){
  const d=state._secSil; if(!d) return;
  const it = (function(){
    const s=SESSIONS[d.masaNo]; if(!s) return null;
    for(const k of s.kisiler) for(const x of k.kalemler) if(x.id===d.kalemId) return x;
    return null;
  })();
  if(it){
    const dusecek = Math.round(d.birimFiyat*d.silAdet*100)/100;
    const dusecekKcal = (d.birimKcal||0)*d.silAdet;
    if(d.silAdet>=d.toplamAdet){
      // tümünü sil → seçeneği komple kaldır
      it.secimler.splice(d.opsIdx,1);
      if(it.secimEk) it.secimEk.splice(d.opsIdx,1);
      if(it.secimKcal) it.secimKcal.splice(d.opsIdx,1);
    } else {
      // kısmi sil → adeti azalt, etiketi güncelle
      const kalanAdet = d.toplamAdet - d.silAdet;
      const adAcik = String(d.opAd).replace(/\s×\d+\s*$/,"");
      it.secimler[d.opsIdx] = kalanAdet>1 ? adAcik+" ×"+kalanAdet : adAcik;
      if(it.secimEk) it.secimEk[d.opsIdx] = Math.round(d.birimFiyat*kalanAdet*100)/100;
      if(it.secimKcal) it.secimKcal[d.opsIdx] = (d.birimKcal||0)*kalanAdet;
    }
    it.fiyat = Math.max(0, Math.round((it.fiyat - dusecek)*100)/100);
    it.kcal = Math.max(0, (it.kcal||0) - dusecekKcal);
  }
  const kaynak=d.kaynak, masaNo=d.masaNo, sAd=d.silAdet, bf=d.birimFiyat;
  // mutfağa bildirilecek değişiklik kaydı
  const kisiAd=kalemKisiAd(masaNo, d.kalemId);
  const adAcik = String(d.opAd).replace(/\s×\d+\s*$/,"");
  const detayMetin = (d.toplamAdet>1 && sAd<d.toplamAdet) ? adAcik+" ×"+sAd : adAcik;
  degisiklikKaydet(masaNo, kisiAd, "secenekSil", d.urunAd, detayMetin);
  secenekSilKapat();
  note("Seçenek silindi"+(bf>0?" · "+tl(Math.round(bf*sAd*100)/100)+" ₺ düştü":""));
  ekranlariYenile(kaynak, masaNo);
}
/* Değişiklik sonrası ilgili ekranı yenile + açık ödeme/müşteri ekranını güncelle */
function ekranlariYenile(kaynak, masaNo){
  if(kaynak==="odeme"){
    // ödeme ekranındayız → ödeme ekranını yenile (masalar'a atma)
    if(state.odeme && state.odeme.masa===masaNo){
      state.odeme.secili.forEach(x=>{ const it=masaKalemBul(masaNo,x.kalemId); if(it) x.tutar=Math.min(x.tutar, kalemKalan(it)); });
      if(state.odeme.dengeYontem) odeYontemDengeleSessiz();
      odemeEkranYenile();
    }
    return;
  }
  if(kaynak==="kds"){ if(typeof renderKDS==="function") renderKDS(); }
  else if(kaynak==="kasadetay"){ go("masalar"); }
  else { go("masalar"); }
  // açık ödeme ekranı varsa onu da güncelle (seçili kalem tutarı değişmiş olabilir)
  if(state.odeme && state.odeme.masa===masaNo){
    // seçili kalemlerin tutarını güncel kalanla eşitle
    state.odeme.secili.forEach(x=>{ const it=masaKalemBul(masaNo,x.kalemId); if(it) x.tutar=Math.min(x.tutar, kalemKalan(it)); });
    if(state.odeme.dengeYontem) odeYontemDengeleSessiz();
    musteriEkranGuncelle();
  }
}

/* Tek kişinin siparişinin ödemesini al (masada kişi seçimi) */
function kasaKisiOde(m, ki){
  const k=SESSIONS[m].kisiler[ki];
  const aktif=k.kalemler.filter(it=>it.durum!=="iptal");
  const tutar=aktif.reduce((s,it)=>s+it.fiyat,0);
  if(tutar===0){ note("Bu kişinin ödenecek siparişi yok"); return; }
  // bu kişiyi tek kişilik ödeme akışına ver (sadakat + yöntem dahil)
  BOL = {
    total:tutar, mod:"tek", kisiler:[k.ad], atama:[{}], odenenler:{},
    tekOdeme:true, kasaKisi:{masa:m, ki:ki}   // ödeme bitince bu kişiyi ödendi işaretle
  };
  state.cart = aktif.map(it=>({ad:it.ad, fiyat:it.fiyat, q:1, secimler:it.secimler, ekstraRecete:it.ekstraRecete||[]}));
  bolPayAl(0, tutar);
}

/* Masada ödenmemiş kalemler (ödeyen kişiler hariç) */
function masaOdenmemisKalemler(m){
  const s=SESSIONS[m]; if(!s) return [];
  const out=[];
  s.kisiler.forEach(k=>{
    if(k.odendi) return;
    k.kalemler.forEach(it=>{ if(it.durum!=="iptal") out.push(it); });
  });
  return out;
}
/* Masa sipariş kalemlerini state.cart'a yükleyip hesap böl/öde */
function kasaMasaBol(m){
  const kalemler=masaOdenmemisKalemler(m);
  if(kalemler.length===0){ note("Ödenecek kalem yok"); return; }
  state.cart=kalemler.map(it=>({ad:it.ad, fiyat:it.fiyat, q:1, secimler:it.secimler, ekstraRecete:it.ekstraRecete||[]}));
  state.kasaMasa=null;
  hesapBolAc(masaKalan(m));
  if(BOL) BOL.kasaMasaKapat=m;   // bölme bitince bu masayı kapat
}
function kasaMasaOde(m){
  const kalemler=masaOdenmemisKalemler(m);
  if(kalemler.length===0){ note("Bu masada ödenecek tutar yok"); return; }
  const odenecek=masaKalan(m);
  state.cart=kalemler.map(it=>({ad:it.ad, fiyat:it.fiyat, q:1, secimler:it.secimler, ekstraRecete:it.ekstraRecete||[]}));
  // tüm masa ödemesi — bitince masayı kapat
  BOL = {
    total:odenecek, mod:"tek", kisiler:["Masa "+m], atama:[{}], odenenler:{},
    tekOdeme:true, kasaMasaKapat:m
  };
  bolPayAl(0, odenecek);
}

// ============================================================
// FİYAT & ÜRÜN YÖNETİMİ (sekmeli)
//  - Genel Fiyatlar (şube bazlı, müdür+genel)
//  - Kategoriler / Seçenek Grupları / Ürünler (sadece genel müdür)
// ============================================================
let OPTION_GROUPS = {};   // {"Sos Seçimi": [{ad,ek},...]} — yeniden kullanılabilir seçenek listeleri
let OPTION_POOL = [];     // [{ad,ek}] — tekil seçenek havuzu (Sütlü Pankek, Çilek, Karamel Sos...)

/* Ürünlerdeki/gruplardaki tüm tekil seçenekleri OPTION_POOL'a çıkar (benzersiz) */
function secenekleriTopla(){
  const harita = {};
  // gruplardan (yeni yapı: {secenekler:[...]})
  Object.values(OPTION_GROUPS).forEach(g=>{
    const secs = Array.isArray(g) ? g : (g.secenekler||[]);
    secs.forEach(s=>{ if(!(s.ad in harita) || (s.ek>0 && !harita[s.ad])) harita[s.ad]=s.ek||0; });
  });
  // ürünlerin gömülü gruplarından (sıfır olmayan fiyatı tercih et)
  Object.values(PRODUCT_OPTIONS).forEach(gruplar=>{
    gruplar.forEach(g=>g.secenekler.forEach(s=>{
      if(!(s.ad in harita)) harita[s.ad]=s.ek||0;
      else if(s.ek>0 && !harita[s.ad]) harita[s.ad]=s.ek;  // sıfırı sıfır-olmayanla güncelle
    }));
  });
  OPTION_POOL = Object.entries(harita).map(([ad,ek])=>({ad,ek})).sort((a,b)=>a.ad.localeCompare(b.ad,"tr"));
}

/* Ürünlerdeki gömülü seçenek gruplarını OPTION_GROUPS'a çıkar (hazır liste olsun).
   "1.", "2." gibi önekleri temizler, aynı isimli grupların en zengin halini tutar. */
function secenekGruplariniTopla(){
  Object.values(PRODUCT_OPTIONS).forEach(gruplar=>{
    gruplar.forEach(g=>{
      // "1.Pankek", "2. Meyve Seçimi" → "Pankek", "Meyve Seçimi"
      let ad = g.ad.replace(/^\s*\d+\s*\.?\s*/,"").trim();
      if(!ad) ad = g.ad.trim();
      const mevcut = OPTION_GROUPS[ad];
      // yoksa ekle, varsa daha çok seçenekli olanı tut
      if(!mevcut || g.secenekler.length > (mevcut.secenekler||[]).length){
        OPTION_GROUPS[ad] = {
          tip: g.tip || "zorunlu",
          min: g.min!=null ? g.min : (g.tip==="istege"?0:1),
          max: g.max!=null ? g.max : (g.tip==="istege"?99:1),
          secenekler: g.secenekler.map(s=>({ad:s.ad, ek:s.ek||0}))
        };
      }
    });
  });
}
/* Eski formatı (düz dizi) yeni formata yükselt (geriye uyumluluk) */
function optionGroupsNormalize(){
  Object.keys(OPTION_GROUPS).forEach(ad=>{
    const g = OPTION_GROUPS[ad];
    if(Array.isArray(g)){
      OPTION_GROUPS[ad] = { tip:"zorunlu", min:1, max:1, secenekler:g };
    }
  });
}

  if(arama) prods = prods.filter(p=>p.ad.toLocaleLowerCase("tr").includes(arama));

  const subeler = isGenel ? DEMO_BRANCHES.map(b=>b.ad) : [AKTIF_SUBE];

  let html = `<div class="fy-bilgi-not">💡 <strong>Tavsiye edilen fiyat</strong> tüm şubeler için başlangıç değeridir; şubeye özel fiyat girilmezse o şubede tavsiye fiyat geçerlidir. Her hücrede üstte <strong>masa/gel-al</strong>, altta <strong>eve teslim</strong> fiyatı gösterilir.</div>`;
  if(!isGenel){
    html += `<div class="fy-mudur-not">👁️ Fiyatları görüntüleyebilir, <strong>${AKTIF_SUBE}</strong> şubesi için ürünleri açıp/kapatabilirsiniz. Fiyat değişikliği genel müdür yetkisindedir.</div>`;
  }

  // üst bar: arama + kanal filtresi + excel
  if(!state.fiyatKanal) state.fiyatKanal="tum";
  html += `<div class="fy-ust-bar">
    <div class="fy-arama-kutu">🔎 <input class="fy-arama-input" id="fyArama" placeholder="Ürün ara..." value="${(state.fiyatArama||'').replace(/"/g,'&quot;')}" oninput="fiyatAramaYaz(this.value)"></div>
    <div class="fy-kanal-fil">
      <button class="fy-kf-btn${state.fiyatKanal==='tum'?' on':''}" onclick="fiyatKanalFil('tum')">Tüm Fiyatlar</button>
      <button class="fy-kf-btn${state.fiyatKanal==='masa'?' on':''}" onclick="fiyatKanalFil('masa')">Masa / Gel-Al</button>
      <button class="fy-kf-btn${state.fiyatKanal==='eve'?' on':''}" onclick="fiyatKanalFil('eve')">Eve Teslim</button>
    </div>
    <button class="fy-excel-btn" onclick="fiyatExcelIndir(${isGenel})">⬇️ Excel'e indir</button>
  </div>`;

  // kategori sekmeleri (başta Tümü)
  html += `<div class="cat-row">`;
  html += `<button class="cat-pill${state.fiyatKat==="__tum"?' on':''}" onclick="fiyatKatSec('__tum')">📋 Tümü</button>`;
  kategoriler.forEach(k=>{ html+=`<button class="cat-pill${state.fiyatKat===k?' on':''}" onclick="fiyatKatSec('${k.replace(/'/g,"\\'")}')">${k}</button>`; });
  html += `</div>`;

  // TABLO
  html += `<div class="fy-tablo-sar"><table class="fy-tablo"><thead><tr>`;
  html += `<th class="fy-th-urun">Ürün</th>`;
  html += `<th class="fy-th-tavsiye">📋 Tavsiye</th>`;
  subeler.forEach(sb=>{ html += `<th class="fy-th-sube">${sb}</th>`; });
  html += `</tr></thead><tbody>`;

  if(prods.length===0){
    html += `<tr><td colspan="${2+subeler.length}" class="fy-bos">Eşleşen ürün yok.</td></tr>`;
  }
  let sonKat="";
  prods.forEach(p=>{
    const pi = DEMO_PRODUCTS.indexOf(p);
    // Tümü görünümünde kategori ayırıcı satır
    if(state.fiyatKat==="__tum" && p.kat!==sonKat){
      sonKat=p.kat;
      html += `<tr class="fy-kat-ayrac"><td colspan="${2+subeler.length}">${p.kat}</td></tr>`;
    }
    html += `<tr>`;
    html += `<td class="fy-td-urun"><div class="fy-td-urun-ic"><span class="fy-emoji">${p.emoji||'🍽️'}</span><span class="fy-ad">${p.ad}</span></div></td>`;
    // Tavsiye hücresi
    html += fiyatHucre(p, pi, null, isGenel, state.fiyatKanal);
    // Şube hücreleri
    subeler.forEach(sb=>{ html += fiyatHucre(p, pi, sb, isGenel, state.fiyatKanal); });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}
/* Tek hücre (tavsiye için sube=null) — 2 satır: masa/gel-al üstte, eve altta
   kanalFil: "tum" | "masa" | "eve" */
function fiyatHucre(p, pi, sube, isGenel, kanalFil){
  kanalFil = kanalFil || "tum";
  const tavMasa = p.fiyat||0;
  const tavEve = (p.fiyatEve!=null && p.fiyatEve>0) ? p.fiyatEve : null;
  const duzenle = isGenel; // sadece genel müdür düzenler
  const tavsiyeBlok = (sube===null);
  let mFiyat, eFiyat, mTavsiyeMi, eTavsiyeMi, mKapali, eKapali;
  if(tavsiyeBlok){
    mFiyat = tavMasa; eFiyat = (tavEve!=null?tavEve:tavMasa);
    mTavsiyeMi=false; eTavsiyeMi=(tavEve==null); mKapali=false; eKapali=false;
  } else {
    const sMasaK = fiyatKayit(sube, p.ad, "masa");
    const sEveK = fiyatKayit(sube, p.ad, "eve");
    const sMasa = (sMasaK.genel!=null && sMasaK.genel>0) ? sMasaK.genel : null;
    const sEve = (sEveK.genel!=null && sEveK.genel>0) ? sEveK.genel : null;
    mFiyat = sMasa!=null ? sMasa : tavMasa;
    eFiyat = sEve!=null ? sEve : (tavEve!=null?tavEve:tavMasa);
    mTavsiyeMi = sMasa==null; eTavsiyeMi = sEve==null;
    mKapali = fiyatKapaliMi(sMasaK.kapali); eKapali = fiyatKapaliMi(sEveK.kapali);
  }
  const subeArg = sube ? "'"+sube.replace(/'/g,"\\'")+"'" : "null";
  const farkCls = (kanal,fiyat,tavsiyeMi)=>{
    if(tavsiyeBlok||tavsiyeMi) return '';
    const tavF = kanal==="masa" ? tavMasa : (tavEve!=null?tavEve:tavMasa);
    if(fiyat<tavF) return ' fy-dusuk';
    if(fiyat>tavF) return ' fy-yuksek';
    return '';
  };
  const satir=(kanal,fiyat,tavsiyeMi,kapali)=>{
    const etk = kanal==="masa" ? "M" : "E";
    const fc = farkCls(kanal,fiyat,tavsiyeMi);
    let ic = `<span class="fy-h-etk">${etk}</span>`;
    if(duzenle){
      ic += `<span class="fy-h-fiyat${fc}${tavsiyeMi?' fy-tav':''}" onclick="fiyatHucreDuzenle(${pi},${subeArg},'${kanal}')">${tl(fiyat)}</span>`;
    } else {
      ic += `<span class="fy-h-fiyat${fc}${tavsiyeMi?' fy-tav':''}">${tl(fiyat)}</span>`;
    }
    if(!tavsiyeBlok){
      ic += `<button class="fy-h-tik ${kapali?'kapali':'acik'}" onclick="fiyatKanalKapat(${subeArg},'${p.ad.replace(/'/g,"\\'")}','${kanal}')" title="${kapali?'Kapalı — aç':'Açık — kapat'}">${kapali?'✕':'✓'}</button>`;
    }
    return `<div class="fy-h-satir${kapali?' kapali':''}">${ic}</div>`;
  };
  let hucreIc="";
  if(kanalFil==="masa") hucreIc = satir("masa",mFiyat,mTavsiyeMi,mKapali);
  else if(kanalFil==="eve") hucreIc = satir("eve",eFiyat,eTavsiyeMi,eKapali);
  else hucreIc = satir("masa",mFiyat,mTavsiyeMi,mKapali) + satir("eve",eFiyat,eTavsiyeMi,eKapali);
  return `<td class="fy-td-fiyat${tavsiyeBlok?' tavsiye':''}${kanalFil!=='tum'?' tek-kanal':''}">${hucreIc}</td>`;
}

  if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }

/* Tek bir fiyat bloğu (tavsiye için sube=null, şube için sube=ad)
   duzenle: fiyatı değiştirebilir mi (genel müdür) */
function fiyatBlokHtml(p, pi, sube, duzenle, baslik){
  const tavMasa = p.fiyat||0;
  const tavEve = (p.fiyatEve!=null && p.fiyatEve>0) ? p.fiyatEve : null;
  let mFiyat, eFiyat, mKapali, eKapali, mTavsiyeMi, eTavsiyeMi, acKapatYetki;
  if(sube===null){
    // TAVSİYE bloğu
    mFiyat = tavMasa; eFiyat = (tavEve!=null?tavEve:tavMasa);
    mTavsiyeMi = false; eTavsiyeMi = (tavEve==null);
    mKapali = false; eKapali = false;
    acKapatYetki = false;  // tavsiyede aç/kapa yok
  } else {
    const sMasaK = fiyatKayit(sube, p.ad, "masa");
    const sEveK = fiyatKayit(sube, p.ad, "eve");
    const sMasa = (sMasaK.genel!=null && sMasaK.genel>0) ? sMasaK.genel : null;
    const sEve = (sEveK.genel!=null && sEveK.genel>0) ? sEveK.genel : null;
    mFiyat = sMasa!=null ? sMasa : tavMasa;
    eFiyat = sEve!=null ? sEve : (tavEve!=null?tavEve:tavMasa);
    mTavsiyeMi = sMasa==null; eTavsiyeMi = sEve==null;
    mKapali = fiyatKapaliMi(sMasaK.kapali); eKapali = fiyatKapaliMi(sEveK.kapali);
    acKapatYetki = true;  // şubelerde aç/kapa var (her iki rol)
  }
  const tavsiyeBlok = sube===null;
  const subeArg = sube ? "'"+sube.replace(/'/g,"\\'")+"'" : "null";

  // tek kanal (masa veya eve) için hücre html'i
  const kanalHucre = (kanal, fiyat, tavsiyeMi, kapali, kapaliKayit)=>{
    const etiket = kanal==="masa" ? "MASA/GEL-AL" : "EVE TESLİM";
    // tavsiye fiyatı (karşılaştırma için)
    const tavF = kanal==="masa" ? tavMasa : (tavEve!=null?tavEve:tavMasa);
    // şube bloğunda + şubeye özel fiyat varsa, tavsiyeyle karşılaştır
    const farkli = (!tavsiyeBlok && !tavsiyeMi && fiyat!==tavF);
    const dusuk  = (!tavsiyeBlok && !tavsiyeMi && fiyat < tavF);
    const yuksek = (!tavsiyeBlok && !tavsiyeMi && fiyat > tavF);
    const farkCls = farkli ? (dusuk ? ' fy-dusuk' : ' fy-yuksek') : '';
    // fiyat gösterimi
    let fiyatGoster;
    if(duzenle && tavsiyeBlok){
      fiyatGoster = `<button class="fyb-fiyat-btn" onclick="tavsiyeFiyatGir(${pi},'${kanal}')">${fiyat} ₺ ✏️</button>`;
    } else if(duzenle && !tavsiyeBlok){
      fiyatGoster = `<button class="fyb-fiyat-btn${tavsiyeMi?' tavsiye':''}${farkCls}" onclick="subeFiyatGir(${subeArg},'${p.ad.replace(/'/g,"\\'")}','${kanal}',${kanal==='masa'?tavMasa:(tavEve!=null?tavEve:tavMasa)})">${fiyat} ₺${tavsiyeMi?' ↩':''} ✏️</button>`;
    } else {
      fiyatGoster = `<span class="fyb-fiyat${tavsiyeMi?' tavsiye':''}${farkCls}">${fiyat} ₺</span>`;
    }
    // aç/kapa (tavsiyede yok)
    let durum = "";
    if(!tavsiyeBlok){
      if(acKapatYetki){
        durum = `<button class="fyb-durum ${kapali?'kapali':'acik'}" onclick="fiyatKanalKapat(${subeArg},'${p.ad.replace(/'/g,"\\'")}','${kanal}')">${kapali?'✕':'✓'}</button>`;
      } else {
        durum = `<span class="fyb-durum ${kapali?'kapali':'acik'} salt">${kapali?'✕':'✓'}</span>`;
      }
    }
    const kapaliNot = (kapali && kapaliKayit) ? `<div class="fyb-kapali-not">${fiyatKapaliMetin(kapaliKayit)}</div>` : "";
    // fark ikazı
    let farkNot = "";
    if(dusuk) farkNot = `<div class="fyb-fark-not dusuk">⚠️ Tavsiyeden ${tavF-fiyat} ₺ düşük</div>`;
    else if(yuksek) farkNot = `<div class="fyb-fark-not yuksek">▲ Tavsiyeden ${fiyat-tavF} ₺ yüksek</div>`;
    return `<div class="fyb-hucre">
      <div class="fyb-kanal-ad">${etiket}</div>
      <div class="fyb-alt">${fiyatGoster}${durum}</div>
      ${farkNot}
      ${kapaliNot}
    </div>`;
  };

  // şube bloğunda kapatma kayıtları
  const mKayit = sube ? fiyatKayit(sube, p.ad, "masa").kapali : null;
  const eKayit = sube ? fiyatKayit(sube, p.ad, "eve").kapali : null;

  return `<div class="fy-blok${tavsiyeBlok?' tavsiye-blok':''}">
    <div class="fy-blok-bas">${baslik}</div>
    <div class="fy-blok-govde">
      ${kanalHucre("masa", mFiyat, mTavsiyeMi, mKapali, mKayit)}
      ${kanalHucre("eve", eFiyat, eTavsiyeMi, eKapali, eKayit)}
    </div>
  </div>`;
}

function fiyatDuzTus(t){
  const d=state._fyDuz; if(!d) return;
  let s=d.deger||"";

  else if(t===","){ if(s.indexOf(",")<0) s=(s||"0")+","; }
  else {
    const vi=s.indexOf(",");
    if(vi>=0 && s.length-vi>2){ /* max 2 kuruş */ }
    else s=s+t;
  }
  d.deger=s;
  fiyatDuzenleModalCiz();
}

function fiyatDuzKaydet(){

    } else {

      note(p.ad+" → tavsiye fiyata döndü ("+d.sube+")");
    } else {

      fiyatKayitYaz(d.sube, p.ad, d.kanal).genel=Math.round(f*100)/100;
      note(p.ad+" "+d.sube+" fiyatı güncellendi");

  }
  menuKaydet();
  fiyatDuzModalKapat();
  go("fiyat", true);

/* Fiyat tablosunu Excel (CSV) olarak indir */
function fiyatExcelIndir(isGenel){
  const subeler = isGenel ? DEMO_BRANCHES.map(b=>b.ad) : [AKTIF_SUBE];
  const arama = (state.fiyatArama||"").toLocaleLowerCase("tr");
  let prods = (state.fiyatKat==="__tum") ? DEMO_PRODUCTS.slice() : DEMO_PRODUCTS.filter(p=>p.kat===state.fiyatKat);
  if(arama) prods = prods.filter(p=>p.ad.toLocaleLowerCase("tr").includes(arama));
  const esc=(v)=>{ v=String(v==null?"":v); return /[",;\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const kf=state.fiyatKanal||"tum";
  const masaVar = (kf==="tum"||kf==="masa");
  const eveVar = (kf==="tum"||kf==="eve");
  const bas=["Ürün","Kategori"];
  if(masaVar) bas.push("Tavsiye Masa/Gel-Al"); if(eveVar) bas.push("Tavsiye Eve");
  subeler.forEach(sb=>{ if(masaVar) bas.push(sb+" Masa/Gel-Al"); if(eveVar) bas.push(sb+" Eve"); });
  const satirlar=[bas.map(esc).join(";")];
  prods.forEach(p=>{
    const tavMasa=p.fiyat||0;
    const tavEve=(p.fiyatEve!=null&&p.fiyatEve>0)?p.fiyatEve:tavMasa;
    const row=[p.ad, p.kat];
    if(masaVar) row.push(tavMasa); if(eveVar) row.push(tavEve);
    subeler.forEach(sb=>{
      const mK=fiyatKayit(sb,p.ad,"masa"), eK=fiyatKayit(sb,p.ad,"eve");
      const m=(mK.genel!=null&&mK.genel>0)?mK.genel:tavMasa;
      const e=(eK.genel!=null&&eK.genel>0)?eK.genel:tavEve;
      const mKap=fiyatKapaliMi(mK.kapali)?" (KAPALI)":"";
      const eKap=fiyatKapaliMi(eK.kapali)?" (KAPALI)":"";
      if(masaVar) row.push(m+mKap); if(eveVar) row.push(e+eKap);
    });
    satirlar.push(row.map(esc).join(";"));
  });
  const csv="\uFEFF"+satirlar.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const katAd = state.fiyatKat==="__tum" ? "Tum" : state.fiyatKat.replace(/[^\wğüşıöçĞÜŞİÖÇ]/g,"_");
  a.href=url; a.download="MINIPAN_Fiyatlar_"+katAd+"_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  note("📥 Fiyat listesi indirildi");
}
/* Tavsiye fiyatı düzenle (ürünün temel fiyatı — ürün formuyla senkron) */
function tavsiyeFiyatGir(pi, kanal){
  const p = DEMO_PRODUCTS[pi];
  const mevcut = kanal==="eve" ? (p.fiyatEve!=null?p.fiyatEve:"") : (p.fiyat||0);
  const v = prompt((kanal==="eve"?"Eve teslim ":"")+"tavsiye fiyatı (₺)"+(kanal==="eve"?" — boş bırakırsan masa fiyatı kullanılır":"")+":", String(mevcut));
  if(v==null) return;
  if(kanal==="eve" && v.trim()===""){ delete p.fiyatEve; }
  else {
    const f=parseInt(v);
    if(isNaN(f)||f<0){ note("Geçersiz fiyat"); return; }
    if(kanal==="eve") p.fiyatEve=f; else p.fiyat=f;
  }
  note(p.ad+" tavsiye fiyatı güncellendi");
  menuKaydet();
  go("fiyat", true);
}
/* Şubeye özel fiyat gir */
function subeFiyatGir(sube, ad, kanal, tavsiye){
  const k = fiyatKayit(sube, ad, kanal);
  const mevcut = (k.genel!=null && k.genel>0) ? k.genel : "";
  const v = prompt(sube+" — "+(kanal==="eve"?"eve teslim ":"")+"fiyatı (₺)\nBoş bırakırsan tavsiye fiyat ("+tavsiye+"₺) geçerli olur:", String(mevcut));
  if(v==null) return;
  if(v.trim()===""){
    // şube fiyatını sil → tavsiyeye dön
    if(SUBE_FIYAT[sube] && SUBE_FIYAT[sube][ad] && SUBE_FIYAT[sube][ad][kanal]) SUBE_FIYAT[sube][ad][kanal].genel=null;
    note(ad+" → tavsiye fiyata döndü ("+sube+")");
  } else {
    const f=parseInt(v);
    if(isNaN(f)||f<0){ note("Geçersiz fiyat"); return; }
    fiyatKayitYaz(sube, ad, kanal).genel = f;
    note(ad+" "+sube+" fiyatı: "+f+" ₺");
  }
  menuKaydet();
  go("fiyat", true);
}
function fiyatKanalKapat(sube, ad, kanal){
  const rec = fiyatKayit(sube, ad, kanal);
  if(fiyatKapaliMi(rec.kapali)){
    // açık duruma getir
    fiyatKayitYaz(sube, ad, kanal).kapali = null;
    note(ad+" açıldı ("+sube+")");
    menuKaydet();
    go("fiyat", true);
    return;
  }
  // kapatma modalı aç
  state._fkHedef = {sube, ad, kanal};
  renderFiyatKapatModal();
  document.getElementById("grupSecModal").classList.add("on");
}

  document.getElementById("grupSecInner").innerHTML = `<div class="gsm-head"><div class="gsm-baslik">📅 Tarihe kadar kapat</div>

function fiyatKapatUygula(tip, deger){
  const {sube, ad, kanal} = state._fkHedef;
  if(tip==="saat" && !deger){ note("Saat seçin"); return; }
  if(tip==="tarih" && !deger){ note("Tarih seçin"); return; }
  let kayit;
  if(tip==="yarin0900") kayit = {tip:"sure", bitis:sonraki0900()};
  else if(tip==="surekli") kayit = {tip:"surekli"};
  else kayit = {tip, deger};
  fiyatKayitYaz(sube, ad, kanal).kapali = kayit;
  grupSecModalKapat();
  note(ad+" kapatıldı ("+sube+" · "+fiyatKapaliMetin(kayit)+")");
  menuKaydet();
  go("fiyat", true);
}

      <div class="kys-gorsel-alan">

        <button class="kys-btn" onclick="kategoriSiraTasi(${i},-1)" ${i===0?'disabled':''}>↑</button>

/* Kategori görseli seç (popup içinden hidden input'a yönlendirme) */
function katGorselSec(i){
  // popup açıksa state'e hedefi yaz (yoksa normal i kullan)
  state._katGorselHedef = state._fkpPopup ? (state._fkpPopup.i!=null?state._fkpPopup.i:i) : i;
  const inp = document.getElementById("katGorselInput");
  if(inp){ inp.value=""; inp.click(); }
}
function katGorselYukle(ev){
  const dosya = ev.target.files[0];
  if(!dosya) return;
  if(dosya.size > 2*1024*1024){ note("⛔ Görsel 2 MB'dan küçük olmalı"); return; }
  const i = state._katGorselHedef;
  const okuyucu = new FileReader();
  okuyucu.onload = (e)=>{
    // popup açıksa sadece geçici state'e yaz — kayıt Ekle/Kaydet'te olur
    if(state._fkpPopup){
      state._fkpPopup.gorselOnizleme = e.target.result;
      fkpCiz();
    } else {
      // popup kapalıysa (eski akış uyumluluğu) doğrudan kaydet
      const k = DEMO_KATEGORILER[i];
      KAT_GORSEL[k.ad] = e.target.result;
      note("✓ "+k.ad+" görseli eklendi");
      menuKaydet(); go("fiyat", true);
    }
  };
  okuyucu.readAsDataURL(dosya);
}
function katGorselSil(i){
  // popup açıksa sadece önizlemeyi sıfırla (henüz kaydedilmedi)
  if(state._fkpPopup){ state._fkpPopup.gorselOnizleme=null; state._fkpPopup.gorselSilindi=true; fkpCiz(); return; }
  // popup dışından (liste üzerindeki 🚫 butonu) → görseli sil, kategoriyi dokunma
  const k = DEMO_KATEGORILER[i];
  state._fkpGorselSilOnay = {i, katAd:k.ad};
  let mdl=document.getElementById("fkpGorselSilModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="fkpGorselSilModal"; mdl.className="modal-bg"; mdl.style.zIndex="210"; document.body.appendChild(mdl); }
  mdl.innerHTML=`<div class="fkp-ic">
    <div class="fkp-baslik">🖼️ Görseli Kaldır</div>
    <div style="font-size:13.5px;color:var(--ink-2);text-align:center;margin-bottom:18px;line-height:1.6">
      <strong>"${k.ad}"</strong> kategorisinin görseli kaldırılacak.<br>Emoji ikona geri dönülür.
    </div>
    <div class="fkp-btn-row">
      <button class="fkp-iptal" onclick="fkpGorselSilKapat()">İptal</button>
      <button class="fkp-sil" onclick="fkpGorselSilOnayla()">Evet, Kaldır</button>
    </div>
  </div>`;
  mdl.classList.add("on");
}
function fkpGorselSilKapat(){
  state._fkpGorselSilOnay=null;
  const mdl=document.getElementById("fkpGorselSilModal");
  if(mdl) mdl.classList.remove("on");
}
function fkpGorselSilOnayla(){
  const p=state._fkpGorselSilOnay; if(!p) return;
  delete KAT_GORSEL[p.katAd];
  note("Görsel kaldırıldı");
  fkpGorselSilKapat(); menuKaydet(); go("fiyat", true);
}

function kategoriEkle(){
  state._fkpPopup = {mod:'ekle', i:null, ad:"", emoji:"🍽️", gorselOnizleme:null, gorselSilindi:false};
  fkpCiz();
}
function kategoriDuzenle(i){
  const k = DEMO_KATEGORILER[i];
  state._fkpPopup = {mod:'duzenle', i, ad:k.ad, emoji:k.emoji||"🍽️",
    gorselOnizleme: KAT_GORSEL[k.ad]||null, gorselSilindi:false};
  fkpCiz();
}
function kategoriSil(i){
  const k = DEMO_KATEGORILER[i];
  const urunSay = DEMO_PRODUCTS.filter(p=>p.kat===k.ad).length;
  if(urunSay>0){ note("⛔ Bu kategoride "+urunSay+" ürün var — önce ürünleri taşıyın/silin"); return; }
  fkpSilOnayAc(i);
}

/* ============================================================
   FİYAT/ÜRÜN KATEGORİ POPUP MOTORU
   mod: 'ekle' | 'duzenle'
   ============================================================ */
function fkpKapat(){
  state._fkpPopup = null;
  const mdl=document.getElementById("fkpModal");
  if(mdl) mdl.classList.remove("on");
}
function fkpCiz(){
  const p = state._fkpPopup;
  let mdl=document.getElementById("fkpModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="fkpModal"; mdl.className="modal-bg"; mdl.style.zIndex="200"; document.body.appendChild(mdl); }
  if(!p){ mdl.classList.remove("on"); return; }
  const goster = p.gorselOnizleme;
  const k = p.i!=null ? DEMO_KATEGORILER[p.i] : null;
  const gorselBtnAdi = goster ? "🖼️ Görseli değiştir" : "🖼️ Görsel ekle";
  mdl.innerHTML = `<div class="fkp-ic">
    <div class="fkp-baslik">${p.mod==='ekle'?'✨ Yeni Kategori':'✏️ Kategoriyi Düzenle'}</div>
    ${goster
      ? `<img class="fkp-gorsel-onizleme" src="${goster}" alt="önizleme">`
      : `<div class="fkp-gorsel-emoji">${p.emoji||'🍽️'}</div>`}
    <div class="fkp-gorsel-row">
      <button class="fkp-gorsel-sec" onclick="katGorselSec(${p.i!=null?p.i:9999})">${gorselBtnAdi}</button>
      ${goster?`<button class="fkp-gorsel-kaldir" onclick="fkpGorselKaldir()">🚫 Kaldır</button>`:''}
    </div>
    <div class="fkp-etiket">Kategori adı</div>
    <input class="fkp-input" id="fkpAd" type="text" value="${(p.ad||'').replace(/"/g,'&quot;')}" placeholder="örn. Tatlılar, Soğuk Kahveler" onkeydown="if(event.key==='Enter') fkpOnayla()">
    <div class="fkp-etiket">Emoji ikonu <span style="color:var(--ink-3);font-weight:400">(görsel yoksa gösterilir)</span></div>
    <input class="fkp-input" id="fkpEmoji" type="text" value="${(p.emoji||'🍽️').replace(/"/g,'&quot;')}" placeholder="🍽️" style="font-size:22px;width:80px;text-align:center;display:inline-block">
    <div class="fkp-btn-row">
      <button class="fkp-iptal" onclick="fkpKapat()">İptal</button>
      <button class="fkp-onayla" onclick="fkpOnayla()">${p.mod==='ekle'?'Ekle':'Kaydet'}</button>
    </div>
  </div>`;
  mdl.classList.add("on");
  setTimeout(()=>{ const i=document.getElementById("fkpAd"); if(i){ i.focus(); if(p.mod==='duzenle') i.select(); } }, 60);
}
function fkpGorselKaldir(){
  if(!state._fkpPopup) return;
  state._fkpPopup.gorselOnizleme = null;
  state._fkpPopup.gorselSilindi = true;
  fkpCiz();
}
function fkpOnayla(){
  const p = state._fkpPopup; if(!p) return;
  const adEl = document.getElementById("fkpAd");
  const emojiEl = document.getElementById("fkpEmoji");
  const ad = adEl ? adEl.value.trim() : "";
  const emoji = (emojiEl ? emojiEl.value.trim() : "") || "🍽️";
  if(!ad){ note("Kategori adı boş olamaz"); return; }
  if(p.mod==='ekle'){
    if(DEMO_KATEGORILER.find(k=>k.ad===ad)){ note("Bu kategori zaten var"); return; }
    DEMO_KATEGORILER.push({ad, emoji});
    if(p.gorselOnizleme) KAT_GORSEL[ad] = p.gorselOnizleme;
    note("Kategori eklendi: "+ad);
  } else {
    const k = DEMO_KATEGORILER[p.i];
    const eskiAd = k.ad;
    k.ad = ad; k.emoji = emoji;
    if(eskiAd!==ad){
      DEMO_PRODUCTS.forEach(pr=>{ if(pr.kat===eskiAd) pr.kat=ad; });
      if(KAT_GORSEL[eskiAd]){ KAT_GORSEL[ad]=KAT_GORSEL[eskiAd]; delete KAT_GORSEL[eskiAd]; }
    }
    if(p.gorselOnizleme) KAT_GORSEL[ad] = p.gorselOnizleme;
    else if(p.gorselSilindi) delete KAT_GORSEL[ad];
    note("Kategori güncellendi");
  }
  fkpKapat();
  menuKaydet(); go("fiyat", true);
}

/* Silme onay popup'ı (görsel kaldır dahil) */
function fkpSilOnayAc(i){
  state._fkpSilOnay = {i};
  let mdl=document.getElementById("fkpSilModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="fkpSilModal"; mdl.className="modal-bg"; mdl.style.zIndex="210"; document.body.appendChild(mdl); }
  const k = DEMO_KATEGORILER[i];
  mdl.innerHTML = `<div class="fkp-ic">
    <div class="fkp-baslik">🗑️ Kategoriyi Sil</div>
    <div style="font-size:13.5px;color:var(--ink-2);text-align:center;margin-bottom:18px;line-height:1.6">
      <strong>"${k.ad}"</strong> kategorisi silinecek.<br>
      <span style="color:var(--err);font-weight:700">Bu işlem geri alınamaz.</span>
    </div>
    <div class="fkp-btn-row">
      <button class="fkp-iptal" onclick="fkpSilOnayKapat()">İptal</button>
      <button class="fkp-sil" onclick="fkpSilOnayla()">Evet, Sil</button>
    </div>
  </div>`;
  mdl.classList.add("on");
}
function fkpSilOnayKapat(){
  state._fkpSilOnay = null;
  const mdl=document.getElementById("fkpSilModal");
  if(mdl) mdl.classList.remove("on");
}
function fkpSilOnayla(){
  const p = state._fkpSilOnay; if(!p) return;
  const k = DEMO_KATEGORILER[p.i];
  delete KAT_GORSEL[k.ad];
  DEMO_KATEGORILER.splice(p.i,1);
  note("Kategori silindi");
  fkpSilOnayKapat();
  menuKaydet(); go("fiyat", true);
}
function kategoriSiraTasi(i, yon){
  const j=i+yon;
  if(j<0||j>=DEMO_KATEGORILER.length) return;
  [DEMO_KATEGORILER[i],DEMO_KATEGORILER[j]]=[DEMO_KATEGORILER[j],DEMO_KATEGORILER[i]];
  menuKaydet();
  go("fiyat", true);
}

/* === SEÇENEK GRUPLARI (tip + min/max + seçenek listesi) === */
function secenekGrupHtml(){
  const isGenel = state.role==="genel";
  const adlar = Object.keys(OPTION_GROUPS);
  let html = `<div class="fy-bilgi-not">🧩 Seçenek grupları (örn. "Sos Seçimi"). Her grupta zorunlu/isteğe bağlı, en az–en çok seçim ve seçenekleri belirleyebilirsiniz. Ürün oluştururken bu grubu seçince hepsi ürüne hazır gelir.</div>`;
  if(!isGenel) html += `<div class="fy-mudur-not">👁️ Görüntüleme modu — değişiklik yetkisi genel müdürdedir.</div>`;
  html += `<div class="bayi-bar"><div class="bayi-bar-bilgi">${adlar.length} seçenek grubu</div>
    ${isGenel?`<button class="bayi-ekle-btn" onclick="secGrupEkle()">+ Yeni grup</button>`:''}</div>`;
  if(adlar.length===0){ return html+`<div class="bayi-bos">Henüz seçenek grubu yok.</div>`; }
  html += `<div class="sg-liste">`;
  adlar.forEach(ad=>{
    const g = OPTION_GROUPS[ad];
    const istege = g.tip==="istege";
    const ucretsiz = !!g.ucretsiz;
    const limitMetin = istege
      ? (g.max && g.max<99 ? "İsteğe bağlı · en fazla "+g.max : "İsteğe bağlı · sınırsız")
      : "Zorunlu · "+(g.min===g.max ? g.min+" seçim" : g.min+"–"+g.max+" seçim");
    html += `<div class="sg-kart${ucretsiz?' sg-ucretsiz':''}">
      <div class="sg-ust">
        <span class="sg-ad">${ad}</span>
        ${isGenel?`<div class="sg-aksiyon">
          <button class="kys-btn" onclick="secGrupAyar('${ad.replace(/'/g,"\\'")}')">⚙️</button>
          <button class="kys-btn" onclick="secGrupDuzenle('${ad.replace(/'/g,"\\'")}')">✏️</button>
          <button class="kys-btn sil" onclick="secGrupSil('${ad.replace(/'/g,"\\'")}')">🗑️</button>
        </div>`:''}
      </div>
      <div class="sg-limit"><span class="sg-limit-rozet${istege?'':' zor'}">${limitMetin}</span>
        ${ucretsiz?'<span class="sg-ucretsiz-rozet">🆓 Ücretsiz grup</span>':''}</div>
      <div class="sg-secenek-liste">`;
    (g.secenekler||[]).forEach((s,si)=>{
      const ist = secIstemiyorum(s);
      // ücretsiz grupta fiyat gösterme/düzenleme pasif
      let ekHtml;
      if(ucretsiz){ ekHtml = `<span class="sg-sec-ek bos">ücretsiz</span>`; }
      else { ekHtml = s.ek?`<span class="sg-sec-ek">+${s.ek} ₺</span>`:`<span class="sg-sec-ek bos">—</span>`; }
      html += `<div class="sg-sec-satir${ist?' sg-ist':''}">
        <span class="sg-sec-ad">${ist?'🚫 ':''}${s.ad}</span>
        ${ekHtml}
        ${isGenel?`<button class="sg-sec-sil" onclick="secGrupSecenekSil('${ad.replace(/'/g,"\\'")}',${si})">✕</button>`:''}
      </div>`;
    });
    if((g.secenekler||[]).length===0) html += `<div class="sg-sec-bos">Henüz seçenek yok</div>`;
    if(isGenel) html += `<div class="sg-sec-ekle-row">
        <button class="sg-sec-ekle" onclick="secGrupSecenekEkle('${ad.replace(/'/g,"\\'")}')">+ seçenek ekle</button>
        ${!istege?`<button class="sg-ist-ekle" onclick="secGrupIstemiyorum('${ad.replace(/'/g,"\\'")}')">+ "İstemiyorum" ekle</button>`:''}
      </div>`;
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function sgpKapat(){
  state._sgPopup = null;
  const mdl=document.getElementById("sgpModal");
  if(mdl) mdl.classList.remove("on");
}
function sgpTipSec(tip){
  if(!state._sgPopup) return;
  state._sgPopup.tip = tip;
  // tip değişince min/max makul varsayılanlara sıfırla
  if(tip==='zorunlu'){ state._sgPopup.min=1; state._sgPopup.max=1; }
  else { state._sgPopup.min=0; state._sgPopup.max=0; } // 0=sınırsız
  sgpCiz();
}
function sgpUcretSec(ucretsiz){
  if(state._sgPopup) state._sgPopup.ucretsiz = ucretsiz;
  sgpCiz();
}
function sgpOnayla(){
  const p = state._sgPopup; if(!p) return;
  const adEl = document.getElementById("sgpAd");
  const ad = adEl ? adEl.value.trim() : "";
  if(!ad){ note("Grup adı boş olamaz"); return; }
  // min/max inputlarını oku
  const minEl = document.getElementById("sgpMin");
  const maxEl = document.getElementById("sgpMax");
  const minVal = minEl ? Math.max(0, parseInt(minEl.value)||0) : (p.min||1);
  const maxVal = maxEl ? Math.max(0, parseInt(maxEl.value)||0) : (p.max||1);
  const minSon = p.tip==='zorunlu' ? Math.max(1, minVal) : 0;
  const maxSon = p.tip==='zorunlu' ? Math.max(minSon, maxVal||minSon) : (maxVal||99);
  if(p.mod==='ekle'){
    if(OPTION_GROUPS[ad]){ note("Bu grup zaten var"); return; }
    OPTION_GROUPS[ad] = {tip:p.tip, min:minSon, max:maxSon, ucretsiz:p.ucretsiz, secenekler:[]};
    note("Grup eklendi: "+ad);
  } else {
    if(ad!==p.eskiAd && OPTION_GROUPS[ad]){ note("Bu isimde grup zaten var"); return; }
    const g = OPTION_GROUPS[p.eskiAd];
    g.tip=p.tip; g.ucretsiz=p.ucretsiz; g.min=minSon; g.max=maxSon;
    if(ad!==p.eskiAd){
      OPTION_GROUPS[ad] = g;
      delete OPTION_GROUPS[p.eskiAd];
      Object.values(PRODUCT_OPTIONS||{}).forEach(arr=>{
        if(Array.isArray(arr)) arr.forEach(gr=>{ if(gr===p.eskiAd) arr[arr.indexOf(gr)]=ad; });
      });
    }
    note("Grup güncellendi");
  }
  sgpKapat(); menuKaydet(); go("fiyat", true);
}

function secenekPoolHtml(){
  if(!state.secAra) state.secAra="";

  // hedef şube: genel müdür seçer (varsayılan hepsi), müdür kendi şubesi

    html += `<div class="sec-sube-row"><label>Şube:</label>

    <button class="kys-btn" style="width:auto;padding:0 12px;font-size:12px" onclick="secHavuzTazele()" title="Ürünlerdeki fiyatları havuza çek">🔄 Fiyatları tazele</button>

  if(!isGenel) html += `<div class="fy-mudur-not">🏬 <strong>${hedefSube}</strong> şubesi için seçenek açıp/kapatabilirsiniz (kasa ile koordineli). Seçenek ekleme/silme genel müdür yetkisindedir.</div>`;
  html += `<div class="sec-ara-kutu"><input class="uf-input" placeholder="🔍 Seçenek ara..." value="${(state.secAra||'').replace(/"/g,'&quot;')}" oninput="secPoolAra(this.value)"></div>`;

    const kapali = kapaliKontrol(s.ad);

    html += `<div class="secpool-satir${kapali?' sp-kapali':''}">

/* Havuzdaki fiyatları ürünlerdeki gerçek fiyatlardan tazele */
function secHavuzTazele(){
  if(!confirm("Havuzdaki fiyatlar, ürünlerde kullanılan gerçek fiyatlarla güncellenecek. Devam edilsin mi?")) return;
  const fiyatHarita = {};
  Object.values(PRODUCT_OPTIONS).forEach(gruplar=>{
    gruplar.forEach(g=>g.secenekler.forEach(s=>{
      if(s.ek>0 && !fiyatHarita[s.ad]) fiyatHarita[s.ad]=s.ek;
    }));
  });
  let say=0;
  OPTION_POOL.forEach(s=>{ if(fiyatHarita[s.ad] && s.ek!==fiyatHarita[s.ad]){ s.ek=fiyatHarita[s.ad]; say++; } });
  note(say+" seçeneğin fiyatı güncellendi");
  menuKaydet();
  go("fiyat", true);
}

  if(ekV==null) return;

  if(kcalV==null) return;
  OPTION_POOL.push({ad:ad.trim(), ek:parseInt(ekV)||0, kcal:parseInt(kcalV)||0});

function secPoolDuzenle(i){
  const s = OPTION_POOL[i];
  const ad = prompt("Seçenek adı:", s.ad);
  if(ad==null) return;
  const ekV = prompt("Ek fiyat (₺):", String(s.ek||0));
  if(ekV==null) return;
  const kcalV = prompt("Kalori (kcal):", String(s.kcal||0));
  if(kcalV==null) return;
  const eskiAd = s.ad;
  const yeniAd = ad.trim()||s.ad;
  const yeniEk = parseInt(ekV)||0;
  const yeniKcal = parseInt(kcalV)||0;
  s.ad = yeniAd;
  s.ek = yeniEk;
  s.kcal = yeniKcal;
  // ad değiştiyse tüm şubelerdeki kapatma kayıtlarını taşı
  if(eskiAd!==yeniAd){
    Object.keys(SEC_KAPALI).forEach(sb=>{
      if(SEC_KAPALI[sb] && SEC_KAPALI[sb][eskiAd]){ SEC_KAPALI[sb][yeniAd]=SEC_KAPALI[sb][eskiAd]; delete SEC_KAPALI[sb][eskiAd]; }
    });
  }
  // FİYAT/AD/KCAL DEĞİŞİKLİĞİNİ kullanılan her yere yansıt (gruplar + ürünler)
  secenekFiyatYansit(eskiAd, yeniAd, yeniEk, yeniKcal);
  OPTION_POOL.sort((a,b)=>a.ad.localeCompare(b.ad,"tr"));
  note("Seçenek güncellendi — kullanan tüm ürünlere yansıdı");
  menuKaydet();
  go("fiyat", true);
}
/* Bir havuz seçeneğinin ad/fiyat/kcal değişikliğini gruplara ve ürünlere yansıt */
function secenekFiyatYansit(eskiAd, yeniAd, yeniEk, yeniKcal){
  // seçenek gruplarında
  Object.values(OPTION_GROUPS).forEach(g=>{
    (g.secenekler||[]).forEach(s=>{ if(s.ad===eskiAd){ s.ad=yeniAd; s.ek=yeniEk; if(yeniKcal!=null) s.kcal=yeniKcal; } });
  });
  // ürünlerin gömülü seçeneklerinde
  Object.values(PRODUCT_OPTIONS).forEach(gruplar=>{
    gruplar.forEach(g=>g.secenekler.forEach(s=>{ if(s.ad===eskiAd){ s.ad=yeniAd; s.ek=yeniEk; if(yeniKcal!=null) s.kcal=yeniKcal; } }));
  });
}
function secPoolSil(i){
  const s = OPTION_POOL[i];
  if(!s) return;
  // kullanan grup/ürün sayısını bul (bilgi için)
  let kullananGrup=0, kullananUrun=0;
  Object.values(OPTION_GROUPS).forEach(g=>{ if((g.secenekler||[]).some(x=>x.ad===s.ad)) kullananGrup++; });
  Object.values(PRODUCT_OPTIONS).forEach(gruplar=>{ if(gruplar.some(g=>g.secenekler.some(x=>x.ad===s.ad))) kullananUrun++; });
  state._secPoolSil = {idx:i, ad:s.ad, ek:s.ek||0, kcal:s.kcal||0, kullananGrup, kullananUrun};
  secPoolSilModalCiz();
}
function secPoolSilModalCiz(){
  const d=state._secPoolSil; if(!d) return;
  let mdl=document.getElementById("secPoolSilModal");
  if(!mdl){ mdl=document.createElement("div"); mdl.id="secPoolSilModal"; mdl.className="modal-bg"; mdl.style.zIndex="200"; document.body.appendChild(mdl); }

function secPoolSilKapat(){ const m=document.getElementById("secPoolSilModal"); if(m) m.classList.remove("on"); state._secPoolSil=null; }
function secPoolSilUygula(){
  const d=state._secPoolSil; if(!d) return;
  const s=OPTION_POOL[d.idx];
  if(s && s.ad===d.ad){
    Object.keys(SEC_KAPALI).forEach(sb=>{ if(SEC_KAPALI[sb]) delete SEC_KAPALI[sb][s.ad]; });
    OPTION_POOL.splice(d.idx,1);
    menuKaydet();

  secPoolSilKapat();

  go("fiyat", true);
}

/* Ürünü kategori içinde yukarı/aşağı taşı (DEMO_PRODUCTS dizisinde takas) */
function urunSiraTasi(pi, yon){
  const p = DEMO_PRODUCTS[pi];
  if(!p) return;
  // aynı kategorideki ürünlerin global indexleri
  const katIdx = [];
  DEMO_PRODUCTS.forEach((x,i)=>{ if(x.kat===p.kat) katIdx.push(i); });
  const yer = katIdx.indexOf(pi);
  const hedefYer = yer + yon;  // yon: -1 yukarı, +1 aşağı
  if(hedefYer<0 || hedefYer>=katIdx.length) return;  // sınır
  const a = katIdx[yer], b = katIdx[hedefYer];
  // dizide takas
  const tmp = DEMO_PRODUCTS[a];
  DEMO_PRODUCTS[a] = DEMO_PRODUCTS[b];
  DEMO_PRODUCTS[b] = tmp;
  menuKaydet();
  go("fiyat", true);
}
function urunSil(pi){
  const p = DEMO_PRODUCTS[pi];
  if(!confirm('"'+p.ad+'" ürünü silinsin mi?')) return;
  delete PRODUCT_OPTIONS[p.ad];
  delete URUN_GORSEL[p.ad];
  DEMO_PRODUCTS.splice(pi,1);
  note("Ürün silindi");
  menuKaydet();
  go("fiyat", true);
}

    });
    // seçenek kcal — KOD_SEC_KCAL referansından (ürün opsiyonları + gruplar + havuz)
    const dolKcal = (sec)=>{ if(sec && sec.kcal==null && KOD_SEC_KCAL[sec.ad]!=null){ sec.kcal=KOD_SEC_KCAL[sec.ad]; degisti=true; } };
    Object.values(PRODUCT_OPTIONS).forEach(gruplar=>{ (gruplar||[]).forEach(g=>(g.secenekler||[]).forEach(dolKcal)); });
    Object.values(OPTION_GROUPS).forEach(g=>{ (g.secenekler||[]).forEach(dolKcal); });
    (OPTION_POOL||[]).forEach(dolKcal);
    if(degisti) menuKaydet();   // migrasyonu kalıcı yap
  }catch(e){ console.warn("kcal migrasyon hatası", e); }
}

const SUBE_KEY = "minipan_subeler_v1";

/* === ÜRÜN YORUM / PUANLAMA === */
const YORUM_KEY = "minipan_yorum_v1";
function yorumKaydet(){ MPStore.set(YORUM_KEY, YORUMLAR, 1); }
function yorumYukle(){ YORUMLAR = MPStore.get(YORUM_KEY, {}, {version:1}); }
/* Bir ürünün onaylı yorumları */
function urunOnayliYorumlar(urunAd){ return (YORUMLAR[urunAd]||[]).filter(y=>y.onay); }
/* Ortalama puan ve yorum sayısı (onaylılar) */
function urunPuanOzet(urunAd){
  const ys = urunOnayliYorumlar(urunAd);
  if(ys.length===0) return {ort:0, adet:0};
  const top = ys.reduce((s,y)=>s+y.puan,0);
  return {ort: Math.round((top/ys.length)*10)/10, adet: ys.length};
}
/* Yıldız dağılımı: {5:n,4:n,...} */
function urunPuanDagilim(urunAd){
  const d={5:0,4:0,3:0,2:0,1:0};
  urunOnayliYorumlar(urunAd).forEach(y=>{ if(d[y.puan]!=null) d[y.puan]++; });
  return d;
}
/* Onay bekleyen tüm yorumlar (müdür paneli için) */
function bekleyenYorumlar(){
  const liste=[];
  Object.entries(YORUMLAR).forEach(([urun,ys])=>{
    ys.forEach((y,i)=>{ if(!y.onay) liste.push({urun, idx:i, ...y}); });
  });
  return liste.sort((a,b)=>b.tarih-a.tarih);
}
/* Yıldız HTML (dolu/boş) */
function yildizHtml(puan, boyut){
  let h='';
  for(let i=1;i<=5;i++) h+='<span class="yld'+(i<=puan?' dolu':'')+'"'+(boyut?' style="font-size:'+boyut+'"':'')+'>★</span>';
  return h;
}

  reader.onload = e=>{ state.urunForm.gorsel = e.target.result; renderUrunForm(); };
  reader.readAsDataURL(dosya);
}

function urunKaydet(){
  const f = state.urunForm;
  if(!f.ad.trim()){ note("Ürün adı girin"); return; }
  const fiyat = parseInt(f.fiyat);
  if(isNaN(fiyat)||fiyat<0){ note("Geçerli bir fiyat girin"); return; }
  // ad çakışması (yeni ürün veya ad değiştiyse)
  if(f.ad.trim()!==f.eskiAd && DEMO_PRODUCTS.find(p=>p.ad===f.ad.trim())){
    note("Bu isimde ürün zaten var"); return;
  }
  // grupları temizle (boş seçenekleri at, min/max düzelt)
  const temizGruplar = f.gruplar
    .map(g=>({
      ad:g.ad.trim()||"Seçim",
      tip:g.tip,
      min:g.tip==="istege"?0:Math.max(0,g.min||0),
      max:g.tip==="istege"?99:Math.max(1,g.max||1),
      ucretsiz:!!g.ucretsiz,
      secenekler:g.secenekler.filter(s=>s.ad.trim()).map(s=>({ad:s.ad.trim(),ek:s.ek||0}))
    }))
    .filter(g=>g.secenekler.length>0);

  const yeniAd = f.ad.trim();
  const magDeger = (f.mag===""||f.mag==null) ? null : Math.max(0, parseInt(f.mag)||0);
  const kcalDeger = (f.kcal===""||f.kcal==null) ? null : Math.max(0, parseInt(f.kcal)||0);
  if(f.pi!=null){
    // DÜZENLE
    const p = DEMO_PRODUCTS[f.pi];
    // ad değiştiyse opsiyon/görsel anahtarlarını taşı
    if(f.eskiAd!==yeniAd){
      delete PRODUCT_OPTIONS[f.eskiAd];
      delete URUN_GORSEL[f.eskiAd];
    }
    p.ad=yeniAd; p.aciklama=f.aciklama.trim(); p.emoji=f.emoji;
    p.kat=f.kat; p.fiyat=fiyat; p.aktif=f.aktif;
    if(magDeger!=null) p.mag=magDeger; else delete p.mag;
    if(kcalDeger!=null) p.kcal=kcalDeger; else delete p.kcal;
  } else {
    // YENİ
    const yeni={ad:yeniAd, emoji:f.emoji, kat:f.kat, fiyat:fiyat, aktif:f.aktif, aciklama:f.aciklama.trim()};
    if(magDeger!=null) yeni.mag=magDeger;
    if(kcalDeger!=null) yeni.kcal=kcalDeger;
    DEMO_PRODUCTS.push(yeni);
  }
  // opsiyon grupları
  if(temizGruplar.length>0) PRODUCT_OPTIONS[yeniAd]=temizGruplar;
  else delete PRODUCT_OPTIONS[yeniAd];
  // görsel
  if(f.gorsel) URUN_GORSEL[yeniAd]=f.gorsel;
  else delete URUN_GORSEL[yeniAd];

  urunFormKapat();
  note((f.pi!=null?"Ürün güncellendi: ":"Ürün oluşturuldu: ")+yeniAd);
  menuKaydet();
  go("fiyat", true);
}

  };

function kampanyaFormKapat(){
  document.getElementById("kmpModal").classList.remove("on");

}
function kmpFormSet(alan, deger){
  if(!state.kmpForm) return;
  state.kmpForm[alan]=deger;

}
function kmpFormGun(g){
  const f=state.kmpForm; if(!f) return;
  if(f.gunler.includes(g)) f.gunler=f.gunler.filter(x=>x!==g);
  else f.gunler.push(g);

function kmpFormSube(sube){
  const f=state.kmpForm; if(!f) return;
  if(f.subeler.includes(sube)) f.subeler=f.subeler.filter(x=>x!==sube);
  else f.subeler.push(sube);
  renderKampanyaForm();
}

function kampanyaKaydet(){
  const f=state.kmpForm; if(!f) return;
  const isGenel=state.role==="genel";
  if(!f.ad.trim()){ note("Kampanya adı girin"); return; }
  const deger=parseFloat(f.deger);
  if(isNaN(deger)||deger<=0){ note("Geçerli bir indirim değeri girin"); return; }
  if(f.tip==="oran" && deger>100){ note("İndirim oranı %100'den fazla olamaz"); return; }
  // şube kapsamı
  let subeler;
  if(isGenel){
    if(f.subeKapsam==="hepsi") subeler="hepsi";
    else { if(f.subeler.length===0){ note("En az bir şube seçin"); return; } subeler=f.subeler.slice(); }
  } else {
    subeler=[AKTIF_SUBE];
  }
  KAMPANYALAR.push({
    id:_kampanyaId++, ad:f.ad.trim(), urun:f.urun, tip:f.tip, deger:deger,
    kanal:f.kanal, subeler:subeler,
    gunler:f.gunler.slice(), saatBas:f.saatBas, saatBit:f.saatBit,
    tekrar:f.tekrar, aktif:true, olusturan:isGenel?"__merkez__":AKTIF_SUBE
  });
  kampanyaFormKapat();
  note("🔥 Kampanya oluşturuldu: "+f.ad.trim());
  kampanyaKaydet_persist();
  go("kampanya");
}
function kampanyaAcKapa(id){
  const k=KAMPANYALAR.find(x=>x.id===id); if(!k) return;
  k.aktif=!k.aktif;
  note(k.ad+(k.aktif?" etkinleştirildi":" duraklatıldı"));
  kampanyaKaydet_persist();
  go("kampanya", true);
}
function kampanyaSil(id){
  const k=KAMPANYALAR.find(x=>x.id===id); if(!k) return;
  if(!confirm('"'+k.ad+'" kampanyası silinsin mi?')) return;
  KAMPANYALAR=KAMPANYALAR.filter(x=>x.id!==id);
  note("Kampanya silindi");
  kampanyaKaydet_persist();
  go("kampanya", true);
}

/* === GEÇMİŞ SİPARİŞLER (tamamlananlar: ödendi + aktarıldı) === */
/* tr-TR tarih "GG.AA.YYYY" → karşılaştırılabilir YYYYMMDD sayısı */
function tarihSayi(trTarih){
  if(!trTarih) return 0;
  const p = trTarih.split(".");
  if(p.length!==3) return 0;
  return parseInt(p[2]+p[1].padStart(2,"0")+p[0].padStart(2,"0"))||0;
}
/* YYYY-MM-DD (input[type=date]) → YYYYMMDD sayısı */
function isoTarihSayi(iso){ return iso ? parseInt(iso.replace(/-/g,""))||0 : 0; }

function bayiGecmisFiltrele(isGenel){
  // GEÇMİŞ = stok aktarımı tamamlanmış siparişler
  let liste = BAYI_SIPARISLER.filter(s=>s.durum==="aktarildi");
  if(!isGenel) liste = liste.filter(s=>s.sube===AKTIF_SUBE);
  else if(state.gecmisSube && state.gecmisSube!=="hepsi") liste = liste.filter(s=>s.sube===state.gecmisSube);
  // tarih aralığı (uygulanmış filtreden)
  const bas = isoTarihSayi(state.gecmisBasUyg);
  const bit = isoTarihSayi(state.gecmisBitUyg);
  if(bas) liste = liste.filter(s=>tarihSayi(s.tarih)>=bas);
  if(bit) liste = liste.filter(s=>tarihSayi(s.tarih)<=bit);
  return liste;
}
function bayiGecmisHtml(isGenel){
  const liste = bayiGecmisFiltrele(isGenel);
  const genelToplam = liste.reduce((a,sp)=>a+siparisTutar(sp).net,0);
  let html = `<div class="bayi-aciklama">📊 Stok aktarımı tamamlanan siparişler. Tarih aralığı seçip <strong>Filtrele</strong>'ye basın, Excel'e aktarabilirsiniz.</div>`;
  // filtre paneli
  html += `<div class="gecmis-filtre">`;
  if(isGenel){
    html += `<div class="gf-alan"><label>Şube</label>
      <select class="gf-select" id="gfSube">
        <option value="hepsi"${(!state.gecmisSube||state.gecmisSube==="hepsi")?' selected':''}>Tüm şubeler</option>
        ${DEMO_BRANCHES.map(b=>`<option value="${b.ad}"${state.gecmisSube===b.ad?' selected':''}>${b.ad}</option>`).join("")}
      </select></div>`;
  }
  html += `<div class="gf-alan"><label>Başlangıç</label><input type="date" class="gf-date" id="gfBas" value="${state.gecmisBas||''}"></div>
    <div class="gf-alan"><label>Bitiş</label><input type="date" class="gf-date" id="gfBit" value="${state.gecmisBit||''}"></div>
    <button class="gf-filtrele" onclick="gecmisFiltreUygula(${isGenel})">🔍 Filtrele</button>
    <button class="gf-temizle" onclick="gecmisFiltreTemizle()">↺ Temizle</button>
  </div>`;
  // aktif filtre bilgisi
  if(state.gecmisBasUyg||state.gecmisBitUyg||(isGenel&&state.gecmisSube&&state.gecmisSube!=="hepsi")){
    const aralik = (state.gecmisBasUyg||state.gecmisBitUyg) ? `${state.gecmisBasUyg||'…'} → ${state.gecmisBitUyg||'…'}` : 'tüm tarihler';
    const subeF = (isGenel&&state.gecmisSube&&state.gecmisSube!=="hepsi") ? state.gecmisSube+' · ' : '';
    html += `<div class="gecmis-aktif-filtre">🔍 ${subeF}${aralik}</div>`;
  }
  // özet bar
  html += `<div class="gecmis-ozet-bar">
    <div class="go-bilgi"><span class="go-sayi">${liste.length}</span> sipariş · Aralık toplamı: <strong>${genelToplam.toFixed(0)} ₺</strong></div>
    <button class="go-xls" onclick="bayiGecmisXls(${isGenel})" ${liste.length===0?'disabled':''}>📥 Excel indir</button>
  </div>`;
  if(liste.length===0){ return html+`<div class="bayi-bos">Seçilen aralıkta tamamlanmış sipariş yok.</div>`; }
  // liste
  liste.slice().reverse().forEach(sp=>{
    const dm = SIPARIS_DURUM[sp.durum];
    const t = siparisTutar(sp);
    const aktifKalem = sp.kalemler.filter(k=>!k.silindi && k.miktar>0);
    html += `<div class="bayi-sip-kart">
      <div class="bayi-sip-ust"><span class="bayi-sip-no">#${sp.id}${isGenel?' · '+sp.sube:''}</span>
        <span class="bayi-sip-durum" style="background:${dm.bg};color:${dm.renk}">${dm.ad}</span></div>
      <div class="bayi-sip-tarih">${sp.tarih}${sp.odeme?' · '+sp.odeme:''}</div>
      <div class="bayi-sip-kalemler">`;
    aktifKalem.forEach(k=>{
      const s = STOCK[k.kod]; const bf = bayiFiyat(k.kod);
      html += `<div class="bayi-sip-kalem"><span>${s?s.ad:k.kod}</span>
        <span>${k.miktar} ${s?(s.birim||"gr"):""} × ${bf} ₺ = ${(k.miktar*bf).toFixed(0)} ₺</span></div>`;

/* Excel (HTML-tablo .xls) — her kalem bir satır, Türkçe uyumlu */
function bayiGecmisXls(isGenel){
  const liste = bayiGecmisFiltrele(isGenel);
  if(liste.length===0){ note("İndirilecek kayıt yok"); return; }
  let satirlar = "";
  let genelNet = 0;
  liste.forEach(sp=>{
    const isk = bayiIskonto(sp.sube);
    sp.kalemler.filter(k=>!k.silindi && k.miktar>0).forEach(k=>{
      const s = STOCK[k.kod]; const bf = bayiFiyat(k.kod);
      const brut = k.miktar*bf;
      const net = brut*(1-isk/100);
      genelNet += net;
      satirlar += `<tr>
        <td>${sp.tarih}</td><td>#${sp.id}</td><td>${sp.sube}</td>
        <td>${s?s.ad:k.kod}</td><td>${k.miktar}</td><td>${s?(s.birim||"gr"):""}</td>
        <td>${bf}</td><td>${brut.toFixed(0)}</td><td>%${isk}</td><td>${net.toFixed(0)}</td>
        <td>${SIPARIS_DURUM[sp.durum].ad}</td><td>${sp.odeme||''}</td></tr>`;
    });
  });
  const baslik = `MİNİPAN Bayi Kanalı — Geçmiş Siparişler`;
  const aralik = (state.gecmisBasUyg||state.gecmisBitUyg) ? `${state.gecmisBasUyg||'…'} → ${state.gecmisBitUyg||'…'}` : 'Tüm tarihler';
  const subeBilgi = isGenel ? (state.gecmisSube&&state.gecmisSube!=="hepsi"?state.gecmisSube:'Tüm şubeler') : AKTIF_SUBE;
  const tablo = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">
    <head><meta charset="utf-8"></head><body>
    <table border="1">
      <tr><td colspan="12" style="font-weight:bold;font-size:14px">${baslik}</td></tr>
      <tr><td colspan="12">${subeBilgi} · ${aralik}</td></tr>
      <tr></tr>
      <tr style="background:#f0a728;font-weight:bold">
        <td>Tarih</td><td>Sipariş No</td><td>Şube</td><td>Ürün</td><td>Miktar</td><td>Birim</td>
        <td>Birim Fiyat</td><td>Tutar (iskontosuz)</td><td>İskonto</td><td>Net Tutar</td><td>Durum</td><td>Ödeme</td></tr>
      ${satirlar}
      <tr style="font-weight:bold;background:#e8f6ec">
        <td colspan="9">GENEL TOPLAM (Net)</td><td>${genelNet.toFixed(0)} ₺</td><td colspan="2"></td></tr>
    </table></body></html>`;
  const blob = new Blob(["\ufeff"+tablo], {type:"application/vnd.ms-excel;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const dosyaTarih = new Date().toLocaleDateString("tr-TR").replace(/\./g,"-");
  a.download = `MINIPAN_bayi_gecmis_${dosyaTarih}.xls`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  note("📥 Excel indiriliyor · "+liste.length+" sipariş");
}

/* === GENEL MÜDÜR: STOK KARTLARI === */
function bayiStokKartHtml(){
  // toplam stok değeri (miktar × birim fiyat)
  let toplamDeger = 0;
  Object.entries(STOCK).forEach(([kod,s])=>{ toplamDeger += s.mevcut * bayiFiyat(kod); });
  let html = `<div class="bayi-bar"><div class="bayi-bar-bilgi">${Object.keys(STOCK).length} stok kartı · toplam değer: <strong>${toplamDeger.toFixed(0)} ₺</strong></div>
    <button class="bayi-ekle-btn" onclick="stokKartEkle()">+ Yeni stok kartı</button></div>`;
  html += `<div class="bayi-tablo">`;
  Object.entries(STOCK).forEach(([kod,s])=>{
    const bf = bayiFiyat(kod);
    const satirDeger = s.mevcut * bf;
    html += `<div class="bayi-satir">
      <div class="bayi-s-ad"><strong>${s.ad}</strong> <span class="bayi-s-kod">${kod}</span>
        <div class="bayi-s-not">${s.mevcut} ${s.birim||"gr"} × ${bf>0?bf+' ₺':'fiyat yok'} <small>· kritik ${s.kritik}</small></div></div>
      <div class="bayi-s-deger">${bf>0?satirDeger.toFixed(0)+' ₺':'—'}</div>
      <div class="bayi-s-aksiyon">
        <button class="bayi-mini" onclick="stokKartDuzenle('${kod}')">✏️</button>
        <button class="bayi-mini sil" onclick="stokKartSil('${kod}')">🗑️</button>
      </div>
    </div>`;
  });
  html += `</div>`;

}
function stokKartEkle(){
  const ad = prompt("Stok kartı adı (örn. Antep fıstığı):");
  if(!ad||!ad.trim()) return;
  const birim = prompt("Birim (gr / adet):", "gr");
  if(birim==null) return;
  const kritikV = prompt("Kritik seviye:", "500");
  if(kritikV==null) return;
  // kod üret
  let kod = ad.trim().toLowerCase().replace(/[^a-z0-9]/g,"").slice(0,12) || ("stok"+Date.now());
  if(STOCK[kod]) kod = kod+Date.now();
  STOCK[kod] = {ad:ad.trim(), mevcut:0, kritik:parseInt(kritikV)||0, birim:(birim.trim()||"gr")};
  note("Stok kartı eklendi: "+ad.trim());
  b2bKaydet();
  go("bayi", true);
}
function stokKartDuzenle(kod){
  const s = STOCK[kod]; if(!s) return;
  const ad = prompt("Stok adı:", s.ad);
  if(ad==null) return;
  s.ad = ad.trim()||s.ad;
  const birim = prompt("Birim (gr/adet):", s.birim||"gr");
  if(birim!=null) s.birim = birim.trim()||"gr";
  const kritik = prompt("Kritik seviye:", String(s.kritik));
  if(kritik!=null) s.kritik = parseInt(kritik)||0;
  note(kod+" güncellendi");
  b2bKaydet();
  go("bayi", true);
}
function stokKartSil(kod){
  if(!confirm(STOCK[kod].ad+" stok kartı silinsin mi? Reçetelerde kullanılıyorsa dikkat.")) return;
  delete STOCK[kod];
  note("Stok kartı silindi");
  b2bKaydet();
  go("bayi", true);
}

function irsaliyeBasla(){

function irsaliyeAlan(alan){
  const t = state.irsaliyeTaslak; if(!t) return;
  const v = prompt(alan==="tedarikci"?"Tedarikçi adı:":"Açıklama:", t[alan]||"");
  if(v==null) return;
  t[alan] = v.trim();
  go("bayi", true);
}
function irsaliyeKalemEkle(){
  const t = state.irsaliyeTaslak; if(!t) return;
  const kodlar = Object.keys(STOCK);
  const liste = kodlar.map((k,i)=>(i+1)+". "+STOCK[k].ad).join("\n");
  const sec = prompt("Ürün seç (numara gir):\n\n"+liste);
  if(sec==null) return;
  const idx = parseInt(sec)-1;
  if(isNaN(idx)||idx<0||idx>=kodlar.length){ note("Geçersiz seçim"); return; }
  const kod = kodlar[idx];
  const miktarV = prompt(STOCK[kod].ad+" miktarı ("+(STOCK[kod].birim||"gr")+"):");
  if(miktarV==null) return;
  const m = parseInt(miktarV);

  state.irsaliyeTaslak = null;
  note("✓ İrsaliye kaydedildi · "+t.kalemler.length+" ürün stoğa işlendi");
  b2bKaydet();
  go("bayi", true);
}

  html += `<div class="bayi-ozet-tablo">
    <div class="bayi-ozet-satir"><span>Toplam (iskontosuz)</span><span>${t.brut.toFixed(0)} ₺</span></div>
    ${t.isk>0?`<div class="bayi-ozet-satir bayi-ozet-ind"><span>Şube iskontosu (%${t.isk})</span><span>− ${t.indirim.toFixed(0)} ₺</span></div>`:''}
    <div class="bayi-ozet-satir bayi-ozet-net"><span>Net tutar</span><span>${t.net.toFixed(0)} ₺</span></div>
  </div>`;
  if(sp.durum==="onayda"){
    html += `<div class="bayi-sip-aksiyon">
      <button class="btn btn-ghost" onclick="sipReddet(${sp.id})">Reddet</button>
      <button class="btn btn-primary" onclick="sipOnayla(${sp.id})">✓ Onayla</button>
    </div>`;
  }
  html += `</div>`;
  return html;
}
function sipKalemDuzenle(id, i){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  const k = sp.kalemler[i];
  const v = prompt(STOCK[k.kod].ad+" miktarı (talep: "+(k.talepMiktar||k.miktar)+", 0=kaldır):", String(k.miktar));
  if(v==null) return;
  const m = parseInt(v);
  if(isNaN(m)||m<0){ note("Geçersiz"); return; }
  if(m===0){ k.miktar=0; k.silindi=true; }   // silindi işareti (iz kalır, müdür görür)
  else { k.miktar = m; k.silindi=false; }
  if((k.talepMiktar||k.miktar)!==k.miktar || k.silindi) sp.duzenlendi=true;
  note("Sipariş güncellendi");
  b2bKaydet();
  go("bayi", true);
}
function sipOnayla(id){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  const aktif = sp.kalemler.filter(k=>!k.silindi && k.miktar>0);
  if(aktif.length===0){ note("Tüm kalemler kaldırılmış — onaylanamaz, reddedin"); return; }
  sp.durum = "onaylandi";
  note("✓ #"+id+" onaylandı · bayiye iletildi");
  b2bKaydet();
  go("bayi", true);
}
function sipReddet(id){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  if(!confirm("#"+id+" siparişi reddedilsin mi?")) return;
  sp.durum = "red";
  note("Sipariş reddedildi");
  b2bKaydet();
  go("bayi", true);
}

function bayiSepetEkle(kod){
  if(!state.bayiSepet) state.bayiSepet=[];
  const v = prompt(STOCK[kod].ad+" talep miktarı ("+(STOCK[kod].birim||"gr")+"):");
  if(v==null) return;
  const m = parseInt(v);
  if(isNaN(m)||m<=0){ note("Geçersiz miktar"); return; }
  state.bayiSepet.push({kod:kod, miktar:m});
  go("bayi", true);
}
function bayiSepetCikar(kod){
  state.bayiSepet = state.bayiSepet.filter(x=>x.kod!==kod);
  go("bayi", true);
}
function bayiSiparisGonder(){
  if(!state.bayiSepet || state.bayiSepet.length===0){ note("Liste boş"); return; }
  const bugun = new Date().toLocaleDateString("tr-TR");
  BAYI_SIPARISLER.push({
    id:_siparisId++, sube:AKTIF_SUBE, tarih:bugun,
    kalemler:state.bayiSepet.map(k=>({kod:k.kod, miktar:k.miktar, talepMiktar:k.miktar})),
    durum:"onayda", odeme:null, aktarildi:false, duzenlendi:false
  });
  state.bayiSepet = [];
  note("✓ Sipariş onaya gönderildi");
  state.bayiSekme = "benimsip";
  b2bKaydet();
  go("bayi", true);
}

      <div class="bayi-sip-kalemler">`;
    sp.kalemler.forEach(k=>{
      const s = STOCK[k.kod];
      const bf = bayiFiyat(k.kod);
      const talep = k.talepMiktar!=null ? k.talepMiktar : k.miktar;

        <div class="bayi-ozet-satir bayi-ozet-net"><span>Ödenecek</span><span>${t.net.toFixed(0)} ₺</span></div>

      html += `<div class="bayi-sip-not-bekle">⏳ Genel müdür onayı bekleniyor...</div>`;

      html += `<div class="bayi-sip-aksiyon">
        <button class="btn btn-primary btn-full" onclick="bayiOdemeAc(${sp.id})">💳 Ödeme yap (${t.net.toFixed(0)} ₺)</button></div>`;

      html += `<div class="bayi-sip-not-red">✕ Genel müdür reddetti</div>`;

  });

function kartFormatla(el){
  let v = el.value.replace(/\D/g,"").slice(0,16);
  el.value = v.replace(/(.{4})/g,"$1 ").trim();
}
function bayiOdemeTamamla(){
  const o = state.bayiOdeme; if(!o) return;
  const sp = BAYI_SIPARISLER.find(s=>s.id===o.id); if(!sp) return;
  const yontem = o.yontem==="eft" ? "EFT/Havale" : "Kredi kartı";
  sp.durum = "odendi"; sp.odeme = yontem;
  bayiOdemeKapat();
  note("✓ Ödeme alındı ("+yontem+") · stok aktarımına hazır");
  b2bKaydet();
  go("bayi", true);
}
function bayiStokAktar(id){
  const sp = BAYI_SIPARISLER.find(s=>s.id===id); if(!sp) return;
  // genel müdür stoğundan düş, bayiye ekle
  let uyari = [];
  sp.kalemler.forEach(k=>{
    if(k.silindi || k.miktar<=0) return;   // genel müdürün çıkardığı kalem aktarılmaz
    const s = STOCK[k.kod]; if(!s) return;
    const aktar = Math.min(k.miktar, s.mevcut);   // bakiye kadar
    s.mevcut -= aktar;
    bayiStokYaz(sp.sube, k.kod, bayiStok(sp.sube,k.kod)+aktar);
    if(aktar < k.miktar) uyari.push(s.ad+" ("+aktar+"/"+k.miktar+")");
  });
  sp.durum = "aktarildi"; sp.aktarildi = true;
  if(uyari.length) note("📦 Aktarıldı · ⚠️ kısmi: "+uyari.join(", "));
  else note("📦 Tüm stoklar bayinize aktarıldı");
  b2bKaydet();
  go("bayi", true);
}

  if(!SADAKAT.kademeler[i]) return;

}

/* --- RAPORLAMA --- */
function magRaporHtml(){
  const uyeler = Object.values(CUSTOMERS);
  const toplamUye = uyeler.length;
  let toplamMag=0, toplamKazanim=0, toplamHarcama=0, islemSayi=0;
  uyeler.forEach(u=>{
    toplamMag += u.mag||0;
    (u.islemler||[]).forEach(i=>{
      islemSayi++;
      if(i.tip==="kazanim") toplamKazanim += i.mag;
      else if(i.tip==="harcama") toplamHarcama += Math.abs(i.mag);
    });
  });
  let h = `<div class="mag-rapor-grid">
    <div class="mag-rapor-kart"><div class="mrk-ust">👥 Toplam Üye</div><div class="mrk-deger">${toplamUye}</div></div>
    <div class="mag-rapor-kart"><div class="mrk-ust">🎁 Dolaşımdaki ${SADAKAT.ad}</div><div class="mrk-deger">${toplamMag}</div><div class="mrk-alt">${tl(magToTl(toplamMag))} ₺ değerinde</div></div>
    <div class="mag-rapor-kart yesil"><div class="mrk-ust">⬆️ Toplam Kazandırılan</div><div class="mrk-deger">${toplamKazanim}</div><div class="mrk-alt">${tl(magToTl(toplamKazanim))} ₺</div></div>
    <div class="mag-rapor-kart kirmizi"><div class="mrk-ust">⬇️ Toplam Bozdurulan</div><div class="mrk-deger">${toplamHarcama}</div><div class="mrk-alt">${tl(magToTl(toplamHarcama))} ₺ indirim</div></div>
  </div>`;
  h += `<div class="mag-rapor-not">📌 Dolaşımdaki ${SADAKAT.ad}, üyelerin kullanmayı beklediği toplam puan yükümlülüğüdür (${tl(magToTl(toplamMag))} ₺ karşılık). ${islemSayi} işlem kayıtlı.</div>`;
  // KADEME DAĞILIMI
  const dagilim={};
  SADAKAT.kademeler.forEach(k=>dagilim[k.ad]=0);
  uyeler.forEach(u=>{ const kd=uyeKademe(u); dagilim[kd.ad]=(dagilim[kd.ad]||0)+1; });
  h += `<div class="mag-top-baslik">🏅 Kademe Dağılımı</div><div class="mag-kademe-dagilim">`;
  SADAKAT.kademeler.forEach(k=>{
    const say=dagilim[k.ad]||0;
    const yuzde=toplamUye>0?Math.round(say/toplamUye*100):0;
    h += `<div class="mag-kdg-kart" style="border-color:${k.renk}55">
      <div class="mag-kdg-ust" style="color:${k.renk}">${k.ic} ${k.ad}</div>
      <div class="mag-kdg-say">${say}</div>
      <div class="mag-kdg-alt">üye · %${yuzde} · ${k.carpan}×</div>
    </div>`;
  });
  h += `</div>`;
  // en çok puanı olan üyeler
  const top = uyeler.slice().sort((a,b)=>(b.mag||0)-(a.mag||0)).slice(0,5);
  if(top.length){
    h += `<div class="mag-top-baslik">🏆 En Çok ${SADAKAT.ad} Biriktiren Üyeler</div><div class="mag-top-liste">`;
    top.forEach((u,i)=>{
      h += `<div class="mag-top-satir"><span class="mag-top-no">${i+1}</span><span class="mag-top-ad">${u.ad||u.mail}</span><span class="mag-top-mag">${u.mag||0} ${SADAKAT.ad}<small>${tl(magToTl(u.mag||0))} ₺</small></span></div>`;
    });
    h += `</div>`;
  }
  return h;
}

  } else {
    islemler.forEach(i=>{

      const tarih = new Date(i.zaman).toLocaleString('tr');
      islemHtml += `<div class="mag-islem-satir">
        <div class="mag-islem-sol">

  const sonraki=uyeKademeSonraki(u);
  let kademeBlok=`<div class="mag-kademe-blok" style="background:linear-gradient(135deg,${kad.renk}18,${kad.renk}08);border-color:${kad.renk}44">
    <div class="mag-kademe-ust">
      <span class="mag-kademe-ad" style="color:${kad.renk}">${kad.ic} ${kad.ad} Üye</span>

  } else {

  }
  kademeBlok+=`</div>`;
  mdl.innerHTML=`<div class="mag-uye-modal-ic">
    <div class="mag-uye-modal-bas">
      <span>👤 ${u.ad||u.mail}</span>

    </div>

/* Üye listesini Excel (CSV) indir */
function magUyeExcel(){
  const esc=(v)=>{ v=String(v==null?"":v); return /[",;\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const bas=["Ad Soyad","E-posta","Telefon",SADAKAT.ad+" Puan","TL Karşılığı","Kademe","Toplam Kazanım"];
  const satirlar=[bas.map(esc).join(";")];
  Object.values(CUSTOMERS).forEach(u=>{
    satirlar.push([u.ad||"", u.mail||"", u.tel||"", u.mag||0, magToTl(u.mag||0), uyeKademe(u).ad, uyeKademeDeger(u)].map(esc).join(";"));
  });
  const csv="\uFEFF"+satirlar.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="MINIPAN_"+SADAKAT.ad+"_Uyeler_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  note("📥 Üye listesi indirildi");
}

async function meEkranAc(){

  if(!r.ok){ note("⚠️ "+(r.mesaj||"Açılamadı")); return; }

function meReklamEkle(files){
  if(!files||!files.length) return;
  const sube=state.meSube;
  if(!MUSTERI_REKLAMLAR[sube]) MUSTERI_REKLAMLAR[sube]=[];
  let kalan=files.length;
  Array.from(files).forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{
      MUSTERI_REKLAMLAR[sube].push(e.target.result);
      kalan--;
      if(kalan===0){
        musteriReklamKaydet();
        if(!state.odeme && state.meSube===AKTIF_SUBE) musteriEkranBosa();
        viewMusteriEkran(document.querySelector(".main"));
        note("📢 Reklam görseli eklendi");

    };
    reader.readAsDataURL(f);
  });

function meReklamSil(i){

/* Yazıcıya gönder (köprü/ESC-POS) — gerçek cihaz yoksa simülasyon */
async function yaziciyaGonder(sube, yazici, fisMetni){
  if(!yazici || !yazici.aktif) return {ok:false, mesaj:"Yazıcı kapalı"};
  if(yazici.baglanti==="ag" && yazici.ip){
    const url = "http://"+yazici.ip+":"+(yazici.port||"9100")+"/escpos";
    try{
      const r = await fetch(url, {method:"POST", headers:{"Content-Type":"text/plain"}, body:fisMetni});
      if(!r.ok) throw new Error("HTTP "+r.status);
      return {ok:true, mesaj:"Yazdırıldı"};
    }catch(e){ return {ok:false, mesaj:"Yazıcıya ulaşılamadı ("+url+")"}; }
  }
  // USB/Bluetooth → yerel köprü servisi gerekir
  const kopru = "http://localhost:9000/yazici";
  try{
    const r = await fetch(kopru, {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({yazici, metin:fisMetni})});
    if(!r.ok) throw new Error("HTTP "+r.status);
    return {ok:true, mesaj:"Köprüye gönderildi"};
  }catch(e){ return {ok:false, mesaj:"Yazıcı köprüsüne ulaşılamadı"}; }
}
function yzcTestFisMetni(yazici){
  const rol = YAZICI_ROLLER[yazici.rol]||YAZICI_ROLLER.ozel;
  return "*** MİNİPAN TEST FİŞİ ***\n"+rol.ad+" — "+(yazici.ad||"")+"\n"+
    state.yzcSube+"\n"+new Date().toLocaleString('tr')+"\n"+
    "------------------------\nÖrnek ürün ×1\nÖrnek ürün 2 ×2\n------------------------\nBağlantı: "+yazici.baglanti+"\nTest başarılı ✓\n\n\n";
}
async function yzcTest(sube, id){
  const y = subeYazicilari(sube).find(x=>x.id===id);
  if(!y) return;
  note("🖨️ Test fişi gönderiliyor...");
  const r = await yaziciyaGonder(sube, y, yzcTestFisMetni(y));
  note(r.ok ? "✓ "+r.mesaj : "⚠️ "+r.mesaj);
}
async function yzcTestForm(){

function renderSubeModal(){

        <input class="yk-input" value="${(f.adres||'').replace(/"/g,'&quot;')}" placeholder="Açık adres" oninput="state._subeForm.adres=this.value"></div>`;
  if(f.yeni){

}
function subeModalKapat(){ const m=document.getElementById("subeModal"); if(m) m.classList.remove("on"); state._subeForm=null; }
function subeFormKaydet(){
  const f=state._subeForm; if(!f) return;
  const yeniAd=(f.ad||"").trim();
  if(!yeniAd){ note("Şube adı gerekli"); return; }
  if(f.yeni){
    if(DEMO_BRANCHES.find(b=>b.ad===yeniAd)){ note("Bu isimde şube zaten var"); return; }
    const kopyaSube = (f.kaynak && DEMO_BRANCHES.find(b=>b.ad===f.kaynak)) ? f.kaynak : (DEMO_BRANCHES[0]?DEMO_BRANCHES[0].ad:"");
    DEMO_BRANCHES.push({ad:yeniAd, ciro:0, masa:0, bekleyen:0, durum:"green", fire:"normal"});
    BRANCH_INFO[yeniAd]={sehir:(f.sehir||"").trim(), adres:(f.adres||"").trim(), tel:(f.tel||"").trim()};
    BRANCH_TABLES[yeniAd]=JSON.parse(JSON.stringify(BRANCH_TABLES[kopyaSube]||[]));
    DEMO_BRANCHES.find(b=>b.ad===yeniAd).masa=subeMasalari(yeniAd).length;
    if(SUBE_FIYAT[kopyaSube]) SUBE_FIYAT[yeniAd]=JSON.parse(JSON.stringify(SUBE_FIYAT[kopyaSube]));
    subeKaydet(); menuKaydet();
    // yeni şube açılır açılmaz oraya geç — müdür "Şubeler" listesinde kalıp tekrar seçim yapmasın
    AKTIF_SUBE = yeniAd;
    window.__sube = yeniAd;   // veri katmanı için
    note("🏬 "+yeniAd+" açıldı"+(kopyaSube?" · "+kopyaSube+" düzeni kopyalandı":"")+" · şimdi bu şubedesiniz");
    subeModalKapat();
    go("masalar");
    return;
  } else {
    const eski=f.eskiAd;
    // ad değiştiyse tüm şube-bağlı verileri taşı
    if(eski!==yeniAd){
      if(DEMO_BRANCHES.find(b=>b.ad===yeniAd)){ note("Bu isimde şube zaten var"); return; }
      // açık masa varken ad değiştirilirse SESSIONS anahtarları (eski::...) yetim kalır —
      // bu yüzden kapatma/silmedeki aynı korumayı burada da uyguluyoruz
      const acikMasa=subeMasalari(eski).some(mm=>{ const id=eski+"::"+mm.id; return SESSIONS[id]&&SESSIONS[id].acik; });
      if(acikMasa){ note("⛔ "+eski+" şubesinde açık masa var — ad değiştirmeden önce hesapları kapatın"); return; }
      const b=DEMO_BRANCHES.find(x=>x.ad===eski); if(b) b.ad=yeniAd;
      if(BRANCH_TABLES[eski]){ BRANCH_TABLES[yeniAd]=BRANCH_TABLES[eski]; delete BRANCH_TABLES[eski]; }
      if(SUBE_FIYAT[eski]){ SUBE_FIYAT[yeniAd]=SUBE_FIYAT[eski]; delete SUBE_FIYAT[eski]; }
      if(POS_AYAR[eski]){ POS_AYAR[yeniAd]=POS_AYAR[eski]; delete POS_AYAR[eski]; posAyarKaydet(); }
      if(YAZICILAR[eski]){ YAZICILAR[yeniAd]=YAZICILAR[eski]; delete YAZICILAR[eski]; yaziciKaydet(); }
      delete BRANCH_INFO[eski];
      // SESSIONS anahtarları "eskiAd::kat|masa" biçiminde — şube adı önekini yeniAd'a taşı
      // (yukarıdaki kontrol sayesinde bu noktada açık masa yok, ama kapalı/geçmiş kayıtlar da korunsun)
      const onek = eski+"::";
      Object.keys(SESSIONS).filter(id=>id.startsWith(onek)).forEach(id=>{
        const yeniId = yeniAd+"::"+id.slice(onek.length);
        SESSIONS[yeniId] = SESSIONS[id];
        delete SESSIONS[id];
      });
      // paket sipariş ve mutfak fişi geçmişindeki şube etiketini de taşı
      PAKET_ORDERS.forEach(p=>{ if(p.sube===eski) p.sube=yeniAd; });
      MUTFAK_FISLER.forEach(f2=>{ if(f2.sube===eski) f2.sube=yeniAd; });
      sessionsKaydet();
    }
    BRANCH_INFO[yeniAd]={sehir:(f.sehir||"").trim(), adres:(f.adres||"").trim(), tel:(f.tel||"").trim()};
    subeKaydet(); menuKaydet();
    note(yeniAd+" bilgileri güncellendi");
  }
  subeModalKapat();
  go("subeler");
}
function subeKapatAc(i){
  const b=DEMO_BRANCHES[i];
  if(!b.kapali){
    // açık masa var mı kontrolü
    const acikMasa=subeMasalari(b.ad).some(mm=>{ const id=b.ad+"::"+mm.id; return SESSIONS[id]&&SESSIONS[id].acik; });
    if(acikMasa){ note("⛔ "+b.ad+" şubesinde açık masa var — önce hesapları kapatın"); return; }
    if(!confirm(b.ad+" şubesi geçici kapatılsın mı? Satış durur, veriler korunur, istediğinizde tekrar açabilirsiniz.")) return;
    b.kapali=true; note("⛔ "+b.ad+" kapatıldı (geçici)");
  } else {
    b.kapali=false; note("✓ "+b.ad+" yeniden açıldı");
  }
  subeKaydet();
  go("subeler");
}
function subeSil(i){
  const b=DEMO_BRANCHES[i];
  if(DEMO_BRANCHES.length<=1){ note("Son şube silinemez"); return; }
  const acikMasa=subeMasalari(b.ad).some(mm=>{ const id=b.ad+"::"+mm.id; return SESSIONS[id]&&SESSIONS[id].acik; });
  if(acikMasa){ note("⛔ Açık masa var — önce hesapları kapatın"); return; }
  if(!confirm("⚠️ "+b.ad+" KALICI olarak silinecek!\n\nMasa düzeni, fiyatlar ve tüm ayarları gidecek. Bu işlem geri alınamaz.\n\nEmin misiniz?")) return;
  // tüm verileri temizle
  delete BRANCH_TABLES[b.ad];
  delete BRANCH_INFO[b.ad];
  delete SUBE_FIYAT[b.ad];
  delete POS_AYAR[b.ad];
  delete YAZICILAR[b.ad];
  // kapalı/geçmiş masa kayıtları da silinsin — yoksa localStorage'da sonsuza dek yetim kalır
  const onek = b.ad+"::";
  Object.keys(SESSIONS).filter(id=>id.startsWith(onek)).forEach(id=>delete SESSIONS[id]);
  DEMO_BRANCHES.splice(i,1);
  subeKaydet(); menuKaydet(); posAyarKaydet(); yaziciKaydet(); sessionsKaydet();
  note("🗑️ "+b.ad+" kalıcı olarak silindi");
  go("subeler");
}

function degisiklikKaydet(masaNo, kisiAd, tip, urunAd, detay){
  const s=SESSIONS[masaNo]; if(!s) return;
  if(!s.bekleyenDegisiklikler) s.bekleyenDegisiklikler=[];
  s.bekleyenDegisiklikler.push({
    tip:tip,            // "iptal" | "secenekSil" | "secenekEkle"

    kisi:kisiAd||"",
    detay:detay||"",    // ör. silinen/eklenen seçenek adı
    zaman:Date.now()
  });

/* Masada bekleyen değişiklik var mı */
function bekleyenDegisiklikVar(masaNo){
  const s=SESSIONS[masaNo];
  return !!(s && s.bekleyenDegisiklikler && s.bekleyenDegisiklikler.length);
}
/* Kalemin sahibi kişi adını bul */
function kalemKisiAd(masaNo, kalemId){
  const s=SESSIONS[masaNo]; if(!s) return "";
  for(const k of s.kisiler) for(const it of k.kalemler) if(it.id===kalemId) return k.ad;
  return "";
}
/* "Mutfağa gönder" — bekleyen değişiklikleri mutfağa bildir + fiş bas */
function degisiklikleriMutfagaGonder(masaNo){
  const s=SESSIONS[masaNo]; if(!s) return;
  const degisiklikler = (s.bekleyenDegisiklikler||[]).slice();
  if(!degisiklikler.length){ note("Bildirilecek değişiklik yok"); return; }
  // mutfak bildirimi (pop-up için) — masaya bağlı
  if(!s.degisiklikBildirimleri) s.degisiklikBildirimleri=[];
  const bildirimId = "dg_"+Date.now();
  s.degisiklikBildirimleri.push({
    id:bildirimId, degisiklikler:degisiklikler, zaman:Date.now(), durum:"bekliyor", personel:AKTIF_PERSONEL_AD||""
  });
  s.degisiklikVar = true;
  s.bekleyenDegisiklikler = [];   // gönderildi, temizle
  // DEĞİŞİKLİK FİŞİ otomatik yazdır (mutfak yazıcısı)
  degisiklikFisiYazdir(masaNo, degisiklikler);
  // mutfak ekranı açıksa hemen pop-up + yenile
  const kdsAcik = document.getElementById("kdsApp") && document.getElementById("kdsApp").style.display==="block";

  if(state.kasaMasa===masaNo) go("masalar"); else if(state.odeme && state.odeme.masa===masaNo) ekranlariYenile("odeme", masaNo);

/* Değişiklik fişi — mutfak rolündeki yazıcıya ESC/POS bildirim fişi */
function degisiklikFisiYazdir(masaNo, degisiklikler){
  const tipEtiket = {iptal:"!! IPTAL", secenekSil:"-- CIKARILDI", secenekEkle:"++ EKLENDI"};
  const cizgi = "--------------------------------";
  const satirlar = degisiklikler.map(d=>{
    const t = tipEtiket[d.tip] || "* DEGISIKLIK";
    const det = d.detay ? " ("+d.detay+")" : "";
    return t+": "+d.urunAd+det+(d.kisi?" / "+d.kisi:"");
  });
  const metin = "\n    *** SIPARIS DEGISIKLIGI ***\n        MINIPAN\n"+cizgi+"\n"+
    "Sube : "+AKTIF_SUBE+"\n"+
    "Masa : "+masaEtiket(masaNo)+"\n"+
    "Saat : "+new Date().toLocaleString('tr')+"\n"+
    cizgi+"\n"+
    satirlar.join("\n")+"\n"+
    cizgi+"\n"+
    (AKTIF_PERSONEL_AD?"Personel: "+AKTIF_PERSONEL_AD+"\n":"")+
    ">> Hazirlamayi guncelleyin <<\n\n\n\n";
  // mutfak rolündeki aktif yazıcıya gönder (yoksa herhangi aktif yazıcı)
  const sube = AKTIF_SUBE;
  let yazicilar = subeYazicilari(sube).filter(y=>y.aktif && y.rol==="mutfak");
  if(!yazicilar.length) yazicilar = subeYazicilari(sube).filter(y=>y.aktif);
  if(yazicilar.length){
    yazicilar.forEach(y=>{ try{ yaziciyaGonder(sube, y, metin).then(r=>{
      if(r&&r.ok){ const kdsAcik=document.getElementById("kdsApp")&&document.getElementById("kdsApp").style.display==="block"; if(kdsAcik) note("🖨️ Değişiklik fişi yazdırıldı"); }
    }); }catch(e){} });
  }
  // mutfak fiş listesine de kayıt (Fişler sekmesinde görünür)
  mutfakFisiBas({
    tip:"degisiklik", baslik:masaEtiket(masaNo)+" · 🔄 DEĞİŞİKLİK", alt:sube,
    kisi:"", masa:masaNo,
    kalemler: degisiklikler.map(d=>({ad:(tipEtiket[d.tip]||"*")+" "+d.urunAd+(d.detay?" ("+d.detay+")":""), secimler:[], kisi:d.kisi||""}))
  });
}
