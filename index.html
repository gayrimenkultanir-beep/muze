<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MİNİPAN POS</title>
<style>
/* ============================================================
   MİNİPAN POS — Faz 1 iskeleti
   Modern wafflecı POS · rol bazlı arayüz · tek dosya
   ============================================================ */

:root{
  /* Nötr taban — soğuk değil, hafif sıcak gri */
  --bg:        #f7f6f3;
  --surface:   #ffffff;
  --surface-2: #f0eeea;
  --line:      #e4e1da;
  --line-2:    #d4d0c6;

  /* Metin */
  --ink:       #1c1b18;
  --ink-2:     #6b685f;
  --ink-3:     #9d9a90;

  /* Marka — waffle: sıcak amber + sıcak çikolata vurgu */
  --brand:     #f0a728;   /* amber — birincil aksiyon */
  --brand-d:   #c9851a;
  --brand-ink: #4a3206;
  --brand-soft:#fdf2dd;

  --cocoa:     #6b3f23;   /* çikolata — sıcak vurgu */
  --cocoa-soft:#f3e8e0;

  /* Durum */
  --ok:        #1f9d63;
  --ok-soft:   #e2f4ea;
  --warn:      #e08a1e;
  --warn-soft: #fbeed6;
  --danger:    #d8493f;
  --danger-soft:#fbe7e5;
  --info:      #2f7ed8;
  --info-soft: #e6f0fb;

  /* Rol renkleri */
  --r-kasa:    #2f7ed8;
  --r-mudur:   #7a4ddb;
  --r-genel:   #1f9d63;

  --radius:    14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
  --shadow:    0 1px 2px rgba(28,27,24,.04), 0 4px 16px rgba(28,27,24,.06);
  --shadow-lg: 0 8px 40px rgba(28,27,24,.12);

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", system-ui, sans-serif;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select{font-family:inherit; font-size:15px}

/* ---------- Giriş ekranı ---------- */
#login{
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(120% 120% at 50% 0%, #fff6e6 0%, var(--bg) 55%);
}
.login-card{
  width:min(420px,92vw);
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  padding:36px 32px;
  text-align:center;
}
.logo{
  font-size:30px; font-weight:800; letter-spacing:-.5px;
  display:inline-flex; align-items:center; gap:10px; margin-bottom:4px;
}
.logo .mark{
  width:42px; height:42px; border-radius:12px;
  background:linear-gradient(135deg, var(--brand) 0%, var(--brand-d) 100%);
  display:grid; place-items:center; font-size:24px;
}
.login-sub{color:var(--ink-2); margin:2px 0 26px; font-size:14px}
.role-pick{display:grid; gap:10px}
.role-btn{
  display:flex; align-items:center; gap:14px;
  padding:16px 18px; border-radius:var(--radius);
  background:var(--surface-2); border:1.5px solid transparent;
  text-align:left; transition:all .15s;
}
.role-btn:hover{border-color:var(--line-2); background:#fff}
.role-btn:active{transform:scale(.98)}
.role-dot{width:38px; height:38px; border-radius:10px; flex:none; display:grid; place-items:center; font-size:19px; color:#fff}
.role-btn .rb-name{font-weight:700; font-size:15px}
.role-btn .rb-desc{font-size:12.5px; color:var(--ink-2)}

/* ---------- Uygulama kabuğu ---------- */
#app{display:none; height:100%; flex-direction:column}
#app.on{display:flex}

.topbar{
  height:60px; flex:none;
  background:var(--surface); border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:14px; padding:0 18px;
}
.tb-logo{font-weight:800; font-size:18px; letter-spacing:-.3px; display:flex; align-items:center; gap:8px}
.tb-logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-d));display:grid;place-items:center;font-size:17px}
.tb-branch{
  font-size:13px; color:var(--ink-2); padding:5px 12px;
  background:var(--surface-2); border-radius:99px; font-weight:600;
}
.tb-spacer{flex:1}
.role-chip{
  display:flex; align-items:center; gap:8px;
  padding:6px 14px 6px 8px; border-radius:99px;
  background:var(--surface-2); font-weight:600; font-size:13px;
}
.role-chip .rc-dot{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:14px}
.tb-out{padding:8px 14px; border-radius:10px; font-weight:600; font-size:13px; color:var(--ink-2)}
.tb-out:hover{background:var(--danger-soft); color:var(--danger)}

.body{flex:1; display:flex; min-height:0}

/* Sol gezinme — role göre değişen sekmeler */
.nav{
  width:76px; flex:none; background:var(--surface); border-right:1px solid var(--line);
  display:flex; flex-direction:column; padding:12px 0; gap:4px;
}
.nav-item{
  margin:0 10px; padding:12px 0; border-radius:var(--radius-sm);
  display:flex; flex-direction:column; align-items:center; gap:5px;
  color:var(--ink-3); font-size:10.5px; font-weight:600; transition:all .12s;
}
.nav-item .ni-ic{font-size:21px}
.nav-item:hover{background:var(--surface-2); color:var(--ink-2)}
.nav-item.active{background:var(--brand-soft); color:var(--brand-d)}

.main{flex:1; min-width:0; overflow-y:auto; padding:22px 26px}

/* ---------- POS satış ekranı ---------- */
.pos-grid{display:grid; grid-template-columns:1fr 380px; gap:22px; height:100%}
.kasa-masa-grid-layout{grid-template-columns:1fr 500px}
@media(max-width:980px){.pos-grid{grid-template-columns:1fr}.kasa-masa-grid-layout{grid-template-columns:1fr}}

.sec-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px}
.sec-head h2{font-size:19px; font-weight:800; margin:0; letter-spacing:-.3px}
.sec-head .sh-sub{font-size:13px; color:var(--ink-2)}

.cat-row{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap}
.cat-pill{
  padding:9px 16px; border-radius:99px; font-weight:700; font-size:13.5px;
  background:var(--surface); border:1.5px solid var(--line); color:var(--ink-2);
}
.cat-pill.on{background:var(--cocoa); border-color:var(--cocoa); color:#fff}

.prod-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px}
.prod{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px; text-align:left; transition:all .12s; position:relative; overflow:hidden;
}
.prod:hover{border-color:var(--brand); box-shadow:var(--shadow)}
.prod:active{transform:scale(.97)}
.prod .p-emoji{font-size:30px; margin-bottom:8px; display:block}
.prod .p-name{font-weight:700; font-size:14px; line-height:1.25; margin-bottom:3px}
.prod .p-price{font-weight:800; font-size:15px; color:var(--brand-d)}
.prod.out{opacity:.45; pointer-events:none}
.prod .p-out{position:absolute; top:8px; right:8px; font-size:10px; font-weight:800; background:var(--danger-soft); color:var(--danger); padding:3px 7px; border-radius:6px}

/* Sepet / adisyon */
.cart{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg);
  display:flex; flex-direction:column; overflow:hidden;
}
.cart-top{padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between}
.cart-top .ct-table{font-weight:800; font-size:16px}
.cart-top .ct-session{font-size:12px; color:var(--ink-2)}
.cart-items{flex:1; overflow-y:auto; padding:8px 0; min-height:120px}
.ci{display:flex; align-items:center; gap:10px; padding:10px 18px}
.ci:hover{background:var(--surface-2)}
.ci .ci-q{font-weight:800; color:var(--brand-d); width:26px; font-size:14px}
.ci .ci-name{flex:1; font-size:14px; font-weight:600}
.ci .ci-name small{display:block; color:var(--ink-3); font-weight:500; font-size:11.5px}
.ci .ci-price{font-weight:700; font-size:14px}
.cart-empty{padding:40px 20px; text-align:center; color:var(--ink-3); font-size:13.5px}
.cart-foot{border-top:1px solid var(--line); padding:16px 18px}
.cart-total{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px}
.cart-total .cf-lbl{font-size:14px; color:var(--ink-2); font-weight:600}
.cart-total .cf-amt{font-size:26px; font-weight:800; letter-spacing:-.5px}
.cart-odenen{margin-bottom:10px; padding:10px 12px; background:var(--ok-soft); border-radius:var(--radius-sm)}
.co-satir{display:flex; justify-content:space-between; font-size:13px; font-weight:600; color:var(--ink-2)}
.co-satir.odendi{color:var(--ok); font-weight:800; margin-top:3px}
.cart-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.btn{
  padding:15px; border-radius:var(--radius-sm); font-weight:700; font-size:14.5px;
  display:flex; align-items:center; justify-content:center; gap:7px; transition:all .12s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand); color:var(--brand-ink)}
.btn-primary:hover{background:var(--brand-d); color:#fff}
.btn-ghost{background:var(--surface-2); color:var(--ink-2)}
.btn-ghost:hover{background:var(--line)}
.btn-lock{background:var(--surface-2); color:var(--ink-3)}
.btn-lock:hover{background:var(--warn-soft); color:var(--warn)}
.btn-full{grid-column:1/-1}

/* ---------- Müdür / genel müdür panel kartları ---------- */
.kpi-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:22px}
.kpi{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px}
.kpi .k-lbl{font-size:12.5px; color:var(--ink-2); font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:6px}
.kpi .k-val{font-size:26px; font-weight:800; letter-spacing:-.5px}
.kpi .k-val small{font-size:14px; font-weight:600; color:var(--ink-3)}
.kpi .k-trend{font-size:12px; font-weight:700; margin-top:4px}
.k-trend.up{color:var(--ok)} .k-trend.down{color:var(--danger)}

/* Şube kartları (genel müdür canlı izleme) */
.branch-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px}
.bcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; position:relative}
.bcard .b-status{position:absolute; top:16px; right:16px; width:11px; height:11px; border-radius:99px}
.b-status.green{background:var(--ok)} .b-status.yellow{background:var(--warn)} .b-status.red{background:var(--danger)}
.bcard .b-name{font-weight:800; font-size:16px; margin-bottom:2px}
.bcard .b-meta{font-size:12.5px; color:var(--ink-2); margin-bottom:14px}
.bcard .b-stats{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.bstat .bs-l{font-size:11px; color:var(--ink-3); font-weight:600}
.bstat .bs-v{font-size:17px; font-weight:800}
.bcard .b-flag{margin-top:12px; padding:8px 11px; border-radius:9px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:7px}
.b-flag.ok{background:var(--ok-soft); color:var(--ok)}
.b-flag.warn{background:var(--warn-soft); color:var(--warn)}

/* Yetki rozeti / kilit göstergesi */
.locked-note{
  background:var(--warn-soft); border:1px solid #f0d9a8; border-radius:var(--radius);
  padding:16px 18px; display:flex; gap:13px; align-items:flex-start; margin-bottom:20px;
}
.locked-note .ln-ic{font-size:20px; flex:none}
.locked-note .ln-t{font-weight:700; font-size:14px; margin-bottom:2px}
.locked-note .ln-d{font-size:13px; color:var(--ink-2)}

.table-wrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
table{width:100%; border-collapse:collapse}
th{text-align:left; font-size:12px; color:var(--ink-2); font-weight:700; padding:13px 16px; border-bottom:1px solid var(--line); background:var(--surface-2)}
td{padding:13px 16px; border-bottom:1px solid var(--line); font-size:14px}
tr:last-child td{border-bottom:none}
.tag{display:inline-block; padding:3px 9px; border-radius:7px; font-size:11.5px; font-weight:700}
.tag.locked{background:var(--surface-2); color:var(--ink-3)}
.tag.edit{background:var(--ok-soft); color:var(--ok)}

/* ---------- Modal (şifre yükseltme) ---------- */
.modal-bg{position:fixed; inset:0; z-index:120; background:rgba(28,27,24,.45); display:none; align-items:center; justify-content:center}
.modal-bg.on{display:flex}
.modal{width:min(380px,92vw); background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); padding:28px; text-align:center}
.modal .m-ic{width:54px;height:54px;border-radius:14px;background:var(--warn-soft);color:var(--warn);display:grid;place-items:center;font-size:26px;margin:0 auto 14px}
.modal h3{margin:0 0 6px; font-size:18px; font-weight:800}
.modal p{margin:0 0 20px; color:var(--ink-2); font-size:13.5px}
.modal input{width:100%; padding:14px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); text-align:center; font-size:20px; letter-spacing:6px; margin-bottom:16px}
.modal input:focus{outline:none; border-color:var(--brand)}
.modal-actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}

.empty-state{text-align:center; padding:60px 20px; color:var(--ink-3)}
.empty-state .es-ic{font-size:44px; margin-bottom:12px}
.empty-state .es-t{font-size:16px; font-weight:700; color:var(--ink-2); margin-bottom:4px}

/* ---------- Opsiyon seçim modalı ---------- */
.opt-modal{
  width:min(480px,94vw); max-height:92vh; background:var(--surface);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  display:flex; flex-direction:column; overflow:hidden;
}
@media(max-width:520px){
  .modal-bg{align-items:flex-end}
  .opt-modal{width:100%; max-height:90vh; border-radius:var(--radius-lg) var(--radius-lg) 0 0; animation:sheetUp .25s ease}
}
@keyframes sheetUp{from{transform:translateY(40px); opacity:.6} to{transform:translateY(0); opacity:1}}
.opt-head{display:flex; align-items:center; gap:14px; padding:18px 20px; border-bottom:1px solid var(--line)}
.opt-head .opt-emoji{font-size:32px}
.opt-head .opt-name{font-weight:800; font-size:17px; line-height:1.2}
.opt-head .opt-base{font-size:13px; color:var(--ink-2)}
.opt-head .opt-x{margin-left:auto; width:34px; height:34px; border-radius:10px; background:var(--surface-2); color:var(--ink-2); font-size:15px; font-weight:700}
.opt-body{flex:1; overflow-y:auto; padding:6px 20px}
.opt-grup{padding:14px 0; border-bottom:1px solid var(--surface-2)}
.opt-grup:last-child{border-bottom:none}
.opt-grup-h{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:10px}
.opt-grup-h .og-ad{font-weight:800; font-size:15px}
.og-meta{display:flex; align-items:center; gap:8px; flex:none}
.og-sayac{font-size:12px; font-weight:800; color:var(--ink-3)}
.og-tip{font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:99px}
.og-zor{background:var(--danger-soft); color:var(--danger)}
.og-coklu{background:var(--info-soft); color:var(--info)}
.opt-secenekler{display:grid; gap:7px}
.opt-sec{
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  border-radius:var(--radius-sm); background:var(--surface-2);
  border:1.5px solid transparent; text-align:left; transition:all .12s;
}
.opt-sec:active{transform:scale(.99)}
.opt-sec.on{background:var(--brand-soft); border-color:var(--brand)}
.opt-sec.opt-ist{background:transparent; border:1.5px dashed var(--line-2)}
.opt-sec.opt-ist.on{background:var(--surface-2); border-style:solid; border-color:var(--ink-3)}
.opt-sec.opt-disabled{opacity:.38; pointer-events:none}
.os-mark{width:23px; height:23px; flex:none; border-radius:7px; border:2px solid var(--line-2);
  display:grid; place-items:center; font-size:13px; font-weight:800; color:#fff; background:#fff}
.os-mark.radio{border-radius:99px}
.opt-sec.on .os-mark{background:var(--brand); border-color:var(--brand); color:var(--brand-ink)}
.os-ad{flex:1; font-size:14px; font-weight:600}
.os-fiyat{font-weight:800; font-size:13px; color:var(--brand-d); flex:none}
.opt-not{width:100%; min-height:60px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm);
  padding:11px 13px; font-size:14px; resize:vertical; font-family:inherit}
.opt-not:focus{outline:none; border-color:var(--brand)}
.opt-foot{display:flex; align-items:center; gap:14px; padding:14px 20px; border-top:1px solid var(--line)}
.opt-toplam{flex:1}
.opt-toplam .ot-l{font-size:12px; color:var(--ink-2); font-weight:600}
.opt-toplam .ot-v{font-size:22px; font-weight:800; letter-spacing:-.5px}
.opt-foot .btn{flex:1; max-width:200px}

/* ---------- Hesap bölme ---------- */
.bol-modlar{display:grid; grid-template-columns:repeat(4,1fr); gap:7px; padding:14px 20px; border-bottom:1px solid var(--line)}
.bol-mod{display:flex; flex-direction:column; align-items:center; gap:5px; padding:11px 4px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:11.5px; font-weight:700; border:1.5px solid transparent}
.bol-mod.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.bol-mod .bm-ic{font-size:19px}
.bol-aciklama{font-size:12.5px; color:var(--ink-2); padding:6px 0 12px; font-weight:600}
.bol-urun{padding:12px 0; border-bottom:1px solid var(--surface-2)}
.bol-urun-ad{font-weight:700; font-size:14px; margin-bottom:8px; display:flex; justify-content:space-between}
.bol-urun-ad span{color:var(--brand-d); font-weight:800}
.bol-urun-kisiler{display:flex; gap:7px; flex-wrap:wrap}
.bol-kisi-btn{padding:8px 14px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:13px; font-weight:700; border:1.5px solid transparent}
.bol-kisi-btn.on{background:var(--cocoa); color:#fff; border-color:var(--cocoa)}
.bol-paylar{margin-top:8px; display:flex; flex-direction:column; gap:8px}
.bol-pay{display:flex; align-items:center; justify-content:space-between; padding:13px 15px; border-radius:var(--radius-sm); background:var(--surface-2)}
.bol-pay.odendi{background:var(--ok-soft)}
.bol-pay-ad{font-weight:700; font-size:14.5px}
.bol-pay.odendi .bol-pay-ad{color:var(--ok)}
.bol-pay-sag{display:flex; align-items:center; gap:12px}
.bol-pay-tutar{font-weight:800; font-size:15px}
.bol-pay-al{padding:8px 18px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:13px; font-weight:800}
.bol-pay-al:active{transform:scale(.96)}
.bol-pay-durum{font-size:12px; font-weight:800; color:var(--ok)}
.bol-tumu{margin-left:9px; padding:4px 10px; border-radius:99px; background:var(--cocoa-soft); color:var(--cocoa); font-size:11px; font-weight:800; vertical-align:middle}
.bol-tumu.on{background:var(--cocoa); color:#fff}

/* Kişi yönetimi */
.bol-kisi-yonet{padding:4px 0 14px; border-bottom:1px solid var(--surface-2); margin-bottom:12px}
.bky-baslik{font-size:13px; font-weight:800; color:var(--ink-2); margin-bottom:10px}
.bky-liste{display:flex; flex-direction:column; gap:8px}
.bky-kisi{display:flex; gap:8px; align-items:center}
.bky-ad{flex:1; padding:10px 13px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:14px; font-weight:600}
.bky-ad:focus{outline:none; border-color:var(--brand)}
.bky-sil{width:38px; height:38px; flex:none; border-radius:var(--radius-sm); background:var(--danger-soft); color:var(--danger); font-size:14px; font-weight:700}
.bky-sil:active{transform:scale(.94)}
.bky-ekle{margin-top:4px; padding:11px; border-radius:var(--radius-sm); background:var(--cocoa-soft); color:var(--cocoa); font-size:13.5px; font-weight:800; border:1.5px dashed var(--cocoa)}

/* Ödeme yöntemi seçimi */
.oy-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:8px 0}
.oy-btn{display:flex; flex-direction:column; align-items:center; gap:8px; padding:20px 12px; border-radius:var(--radius); background:var(--surface-2); border:1.5px solid transparent; transition:all .12s}
.oy-btn:hover{border-color:var(--brand); background:var(--brand-soft)}
.oy-btn:active{transform:scale(.97)}
.oy-ic{font-size:30px}
.oy-ad{font-size:14px; font-weight:800}
.oy-btn:last-child:nth-child(odd){grid-column:1/-1}

/* Ödeme ekranı sadakat */
.od-sadakat-sec{background:var(--cocoa-soft); border-radius:var(--radius); padding:14px 16px; margin-bottom:14px}
.od-ss-baslik{font-weight:800; font-size:15px; color:var(--cocoa); margin-bottom:2px}
.od-ss-alt{font-size:12.5px; color:var(--ink-2); margin-bottom:10px}
.od-tel-row{display:flex; gap:8px}
.od-tel-input{flex:1; padding:11px 13px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:14px}
.od-tel-input:focus{outline:none; border-color:var(--brand)}
.od-tel-btn{padding:0 18px; border-radius:var(--radius-sm); background:var(--cocoa); color:#fff; font-weight:800; font-size:14px}
.od-ss-not{font-size:11.5px; color:var(--ink-3); margin-top:8px}
.od-musteri{background:var(--brand-soft); border-radius:var(--radius); padding:14px 16px; margin-bottom:14px}
.od-m-ust{display:flex; justify-content:space-between; align-items:center}
.od-m-ad{font-weight:800; font-size:16px}
.od-m-mag{font-weight:800; font-size:16px; color:var(--brand-d)}
.od-m-damga{font-size:12px; color:var(--ink-2); font-weight:600; margin-top:2px}
.od-bozdurma{margin-top:12px; padding-top:12px; border-top:1px solid #f0d9a8}
.od-bz-baslik{font-size:13px; font-weight:700; margin-bottom:8px}
.od-bz-kontrol{display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.od-bz-btn{width:38px; height:36px; border-radius:9px; background:#fff; border:1.5px solid var(--line-2); font-weight:800; font-size:13px}
.od-bz-btn:active{transform:scale(.94)}
.od-bz-deger{flex:1; text-align:center; font-weight:800; font-size:14px; min-width:80px}
.od-bz-max{padding:0 14px; height:36px; border-radius:9px; background:var(--cocoa); color:#fff; font-weight:800; font-size:12.5px}
.od-bz-indirim{margin-top:8px; font-size:13px; font-weight:800; color:var(--ok)}

/* Mag kullanım kod akışı */
.od-mag-kilit{margin-top:12px; padding-top:12px; border-top:1px solid #f0d9a8}
.od-mk-bilgi{font-size:12.5px; color:var(--ink-2); line-height:1.5; margin-bottom:10px; font-weight:600}
.od-kod-gonder{width:100%; padding:13px; border-radius:var(--radius-sm); background:var(--cocoa); color:#fff; font-size:14px; font-weight:800}
.od-kod-gonder:active{transform:scale(.97)}
.od-kod-row{display:flex; gap:8px}
.od-kod-input{flex:1; padding:12px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:18px; text-align:center; letter-spacing:5px; font-weight:800}
.od-kod-input:focus{outline:none; border-color:var(--brand)}
.od-kod-dogrula{padding:0 18px; border-radius:var(--radius-sm); background:var(--ok); color:#fff; font-weight:800; font-size:14px}
.od-kod-tekrar{width:100%; margin-top:8px; padding:8px; background:none; color:var(--ink-3); font-size:12px; font-weight:700}
.od-bz-acik{background:var(--ok-soft); border-radius:var(--radius-sm); padding:12px; border-top:none}
.od-kazanc{margin-top:12px; font-size:13px; color:var(--ink-2); text-align:center}
.od-kazanc strong{color:var(--brand-d)}
.od-tahsil-baslik{font-size:15px; font-weight:700; margin-bottom:12px; text-align:center}
.od-tahsil-baslik strong{font-size:18px; color:var(--ink)}
.od-tahsil-baslik s{color:var(--ink-3); font-weight:600; font-size:14px}
.oy-tam{background:var(--brand-soft)!important; border-color:var(--brand)!important}

/* ============================================================
   MUTFAK EKRANI (KDS) — tablet/büyük ekran
   ============================================================ */
#kdsApp{display:none; position:fixed; inset:0; z-index:95; background:#1a1d21; overflow-y:auto; color:#e8e8e8}
.kds-screen{max-width:1100px; margin:0 auto; min-height:100%; padding:0 0 30px}
.kds-top{display:flex; align-items:center; gap:14px; padding:16px 20px; background:#22262b; position:sticky; top:0; z-index:5; border-bottom:1px solid #2e3238}
.kds-top .qr-close{background:#2e3238; color:#e8e8e8}
.kds-title{flex:1; font-size:19px; font-weight:800}
.kds-saat{font-size:16px; font-weight:800; color:var(--brand)}
.kds-sekme-row{display:flex; gap:10px; padding:14px 20px; position:sticky; top:65px; z-index:4; background:#1a1d21}
.kds-sekme{flex:1; padding:13px; border-radius:12px; background:#22262b; color:#9aa0a6; font-size:15px; font-weight:800}
.kds-sekme.on{background:var(--brand); color:#1a1d21}
.kds-bos{text-align:center; padding:80px 20px; color:#6a7077; font-size:16px}

/* Masa kartları */
.kds-masa-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; padding:6px 20px}
.kds-masa-kart{text-align:left; background:#22262b; border:2px solid #2e3238; border-radius:16px; padding:16px}
.kds-masa-kart.acil{border-color:#e67e22; animation:kdsPulse 2s infinite}
@keyframes kdsPulse{0%,100%{border-color:#e67e22} 50%{border-color:#4a3520}}
.kds-masa-kart:active{transform:scale(.98)}
.kmk-ust{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
.kmk-no{font-size:19px; font-weight:800; color:#fff}
.kmk-dk{font-size:13px; color:#9aa0a6; font-weight:700}
.kmk-kisi{font-size:13px; color:#9aa0a6; margin-bottom:12px}
.kmk-durum{display:flex; flex-wrap:wrap; gap:6px}
.kmk-rozet{font-size:11.5px; font-weight:800; padding:5px 10px; border-radius:99px}
.kmk-rozet.bek{background:#4a3520; color:#f0a050}
.kmk-rozet.haz{background:#1e3a52; color:#5bacf0}
.kmk-rozet.tamam{background:#1e4030; color:#5bd08a}

/* Sipariş akışı */
.kds-akis-list{display:flex; flex-direction:column; gap:12px; padding:6px 20px}
.kds-akis-kart{background:#22262b; border-radius:14px; padding:14px 16px}
.kak-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
.kak-masa{font-size:13px; font-weight:800; color:#9aa0a6}
.kak-durum{font-size:11.5px; font-weight:800; padding:4px 10px; border-radius:99px}
.kak-ad{font-size:17px; font-weight:800; color:#fff; margin-bottom:4px}
.kak-secim{font-size:13px; color:#9aa0a6; margin-bottom:12px; line-height:1.4}
.kak-aksiyon{display:flex; gap:8px; flex-wrap:wrap}
.kak-btn{padding:11px 16px; border-radius:10px; font-size:13.5px; font-weight:800}
.kak-btn.haz{background:#2980b9; color:#fff}
.kak-btn.gonder{background:#27ae60; color:#fff}
.kak-btn.iptal{background:#3a2e2e; color:#e0928a}
.kak-btn:active{transform:scale(.96)}

/* Masa detayı */
.kds-detay{padding:6px 20px}
.kds-kisi-blok{margin-bottom:20px}
.kds-kisi-ad{font-size:16px; font-weight:800; color:var(--brand); margin-bottom:10px}
.kds-kalem{background:#22262b; border-radius:12px; padding:13px 15px; margin-bottom:10px}
.kds-kalem.iptalli{opacity:.45}
.kds-kalem.iptalli .kk-ad{text-decoration:line-through}
.kk-ust{display:flex; justify-content:space-between; align-items:baseline}
.kk-ad{font-size:15.5px; font-weight:800; color:#fff}
.kk-fiyat{font-size:15px; font-weight:800; color:var(--brand)}
.kk-durum{font-size:12px; font-weight:700; margin-top:2px}
.kk-opsiyonlar{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
.kk-ops{display:inline-flex; align-items:center; gap:6px; background:#2e3238; color:#c8ccd0; font-size:12px; font-weight:600; padding:5px 8px 5px 11px; border-radius:99px}
.kk-ops-x{width:18px; height:18px; border-radius:99px; background:#3a2e2e; color:#e0928a; font-size:10px; font-weight:800; display:grid; place-items:center}
.kk-aksiyon{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}
.kk-tamam{font-size:13px; font-weight:800; color:#5bd08a; align-self:center}

/* ============================================================
   GARSON EKRANI (tablet/mobil)
   ============================================================ */
#garsonApp{display:none; position:fixed; inset:0; z-index:95; background:var(--bg); overflow-y:auto}
.grs-screen{max-width:640px; margin:0 auto; min-height:100%; background:var(--surface)}
.grs-top{display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--surface); position:sticky; top:0; z-index:5; border-bottom:1px solid var(--line)}
.grs-top .qr-close{background:var(--surface-2)}
.grs-title{flex:1; text-align:center; font-size:17px; font-weight:800}
.grs-tutar-rozet{padding:7px 14px; border-radius:99px; background:var(--brand-soft); color:var(--brand-d); font-weight:800; font-size:14px}

/* Masa grid */
.grs-masa-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; padding:16px}
.grs-masa{background:var(--surface-2); border:2px solid transparent; border-radius:16px; padding:18px 14px; text-align:center; min-height:110px; display:flex; flex-direction:column; justify-content:center; gap:6px}
.grs-masa.dolu{background:var(--surface); border-color:var(--brand)}
.grs-masa:active{transform:scale(.97)}
.grs-m-no{font-size:19px; font-weight:800}
.grs-m-bilgi{font-size:12.5px; color:var(--ink-2)}
.grs-m-tutar{font-size:15px; font-weight:800; color:var(--brand-d)}
.grs-m-bos{font-size:13px; color:var(--ink-3); font-weight:600}

/* Masa detayı */
.grs-detay{padding:14px 18px}
.grs-bos-detay{text-align:center; padding:40px 20px; color:var(--ink-3); font-size:14px; line-height:1.6}
.grs-kisi-blok{margin-bottom:16px; background:var(--surface-2); border-radius:var(--radius); padding:14px}
.grs-kisi-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.grs-kisi-ad{font-size:15.5px; font-weight:800}
.grs-ekle-btn{padding:7px 14px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:13px; font-weight:800}
.grs-ekle-btn:active{transform:scale(.95)}
.grs-kalem{display:flex; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--line)}
.grs-kalem:last-child{border-bottom:none}
.grs-kalem.iptal{opacity:.4}
.grs-kalem.iptal .grs-k-ad{text-decoration:line-through}
.grs-k-bilgi{flex:1}
.grs-k-ad{font-weight:700; font-size:14px; display:block}
.grs-k-secim{font-size:11.5px; color:var(--ink-2); margin-top:2px}
.grs-k-sag{text-align:right; white-space:nowrap}
.grs-k-durum{font-size:11px; font-weight:700; display:block}
.grs-k-fiyat{font-size:14px; font-weight:800}
.grs-foot{padding:14px 18px 30px; position:sticky; bottom:0; background:var(--surface); border-top:1px solid var(--line)}
.grs-yeni-kisi{width:100%; padding:14px; border-radius:var(--radius-sm); background:var(--cocoa-soft); color:var(--cocoa); font-size:14px; font-weight:800; border:1.5px dashed var(--cocoa)}

/* Garson menü */
.grs-kat-row{position:sticky; top:57px; z-index:4; display:flex; gap:8px; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--line); overflow-x:auto; scrollbar-width:none}
.grs-kat-row::-webkit-scrollbar{display:none}
.grs-menu-list{padding:14px 16px; display:flex; flex-direction:column; gap:10px}
.grs-urun{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 16px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); text-align:left}
.grs-urun:active{border-color:var(--brand); transform:scale(.99)}
.grs-urun.tukendi{opacity:.5; pointer-events:none}
.grs-u-info{flex:1}
.grs-u-ad{font-weight:700; font-size:15px}
.grs-u-desc{font-size:11.5px; color:var(--ink-2); margin-top:2px}
.grs-u-sag{display:flex; align-items:center; gap:10px}
.grs-u-fiyat{font-weight:800; font-size:15px; color:var(--brand-d)}
.grs-u-add{width:34px; height:34px; border-radius:99px; background:var(--brand); color:var(--brand-ink); display:grid; place-items:center; font-size:22px; font-weight:700}
.grs-u-tukendi{font-size:11px; font-weight:800; color:var(--danger); background:var(--danger-soft); padding:6px 10px; border-radius:8px}

/* ---------- Kasa masa detayı ---------- */
.kasa-masa-detay{display:flex; flex-direction:column; gap:14px; margin-bottom:14px}
.kmd-bos{text-align:center; padding:40px; color:var(--ink-3); font-size:14px}
.kmd-kisi{background:var(--surface-2); border-radius:var(--radius); padding:14px 16px}
.kmd-kisi-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.kmd-kisi-aksiyon{display:flex; gap:8px; align-items:center}
.kmd-kisi-ode{padding:7px 14px; border-radius:99px; background:var(--ok); color:#fff; font-size:12.5px; font-weight:800}
.kmd-kisi-ode:active{transform:scale(.95)}
.kmd-odendi{opacity:.7}
.kmd-odendi .kmd-kisi-ad{color:var(--ok)}
.kmd-odendi-rozet{font-size:12px; font-weight:800; color:var(--ok)}
.kmd-kisi-ad{font-size:15.5px; font-weight:800}
.kmd-kisi-ad small{color:var(--brand-d); font-weight:800; margin-left:6px}
.kmd-ekle{padding:7px 14px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:13px; font-weight:800}
.kmd-kalem{background:var(--surface); border-radius:var(--radius-sm); padding:11px 13px; margin-bottom:8px}
.kmd-kalem:last-child{margin-bottom:0}
.kmd-kalem.iptal{opacity:.45}
.kmd-kalem.iptal .kmd-k-ad{text-decoration:line-through}
.kmd-k-ust{display:flex; justify-content:space-between; align-items:baseline}
.kmd-k-ad{font-weight:700; font-size:14.5px}
.kmd-k-fiyat{font-weight:800; font-size:14.5px}
.kmd-k-durum{font-size:11.5px; font-weight:700; margin-top:2px}
.kmd-ops{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px}
.kmd-op{display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); font-size:12px; font-weight:600; padding:5px 8px 5px 11px; border-radius:99px}
.kmd-op-x{width:18px; height:18px; border-radius:99px; background:var(--danger-soft); color:var(--danger); font-size:10px; font-weight:800; display:grid; place-items:center}
.kmd-k-aksiyon{margin-top:10px}
.kmd-iptal{padding:7px 14px; border-radius:8px; background:var(--danger-soft); color:var(--danger); font-size:12.5px; font-weight:800}
.kmd-foot{display:flex; gap:10px; padding:14px 0 4px; position:sticky; bottom:0; background:var(--bg)}
.kmd-foot .btn{flex:1}
.kmd-foot .btn-primary{flex:2}
.ci .ci-name small{display:block; color:var(--ink-3); font-weight:500; font-size:11px; line-height:1.3; margin-top:1px}

/* ---------- Opsiyon kapatma (stok) ---------- */
.opt-kapat-mod{margin-left:auto; padding:7px 13px; border-radius:99px; background:var(--surface-2);
  color:var(--ink-2); font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px}
.opt-kapat-mod.on{background:var(--warn-soft); color:var(--warn)}
.opt-head .opt-x{margin-left:8px}
.kapat-bilgi{padding:10px 20px; background:var(--warn-soft); color:var(--brand-ink); font-size:12.5px; font-weight:600; line-height:1.4}
.opt-sec.opt-kapali{opacity:.4}
.opt-sec.opt-kapali .os-ad{text-decoration:line-through; text-decoration-color:var(--ink-3)}
.opt-sec.opt-kapali .os-mark{border-style:dashed}
.kapat-etiket{font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:99px; background:var(--surface-2); color:var(--ink-3); flex:none}
.kapat-etiket.stok{background:var(--danger-soft); color:var(--danger)}
/* kapatma modu satırı */
.opt-kapat-row{cursor:pointer}
.opt-kapat-row .kapat-tgl{width:24px; height:24px; flex:none; border-radius:99px; display:grid; place-items:center;
  font-size:13px; font-weight:800; background:var(--ok-soft); color:var(--ok)}
.opt-kapat-row.kapali{background:var(--danger-soft); border-color:#f0c0bc}
.opt-kapat-row.kapali .kapat-tgl{background:var(--danger); color:#fff}
.opt-kapat-row.kapali .os-ad{text-decoration:line-through}
.kapat-etiket.force{background:var(--warn-soft); color:var(--warn)}
.force-btn{margin-left:auto; flex:none; font-size:11px; font-weight:800; padding:5px 11px; border-radius:99px;
  background:var(--ink); color:#fff; white-space:nowrap}
.force-btn.on{background:var(--warn); color:#fff}

/* ============================================================
   QR MENÜ — müşteri telefonu (mobil tam ekran)
   ============================================================ */
#qrApp{display:none; position:fixed; inset:0; z-index:95; background:var(--bg); overflow-y:auto}
.qr-screen{max-width:480px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; background:var(--surface); position:relative}
.qr-close{position:absolute; top:14px; left:14px; z-index:5; width:36px; height:36px; border-radius:99px; background:rgba(255,255,255,.85); backdrop-filter:blur(6px); font-size:16px; font-weight:700; color:var(--ink); box-shadow:var(--shadow)}

/* Karşılama */
.qr-giris{justify-content:center; align-items:center; padding:30px 24px; background:radial-gradient(130% 90% at 50% 0%, #fff2dc 0%, var(--surface) 60%)}
.qr-hero{text-align:center; margin-bottom:30px}
.qr-logo{font-size:64px; margin-bottom:6px}
.qr-brand{font-size:30px; font-weight:800; letter-spacing:-.5px}
.qr-masa-rozet{display:inline-block; margin-top:12px; padding:8px 16px; border-radius:99px; background:var(--cocoa); color:#fff; font-size:13px; font-weight:700}
.qr-giris-kart{width:100%; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow)}
.qr-g-baslik{font-size:20px; font-weight:800; margin-bottom:4px}
.qr-g-alt{font-size:13.5px; color:var(--ink-2); line-height:1.5; margin-bottom:18px}
.qr-ad-input{width:100%; padding:15px; border:1.5px solid var(--line-2); border-radius:var(--radius-sm); font-size:16px; margin-bottom:14px}
.qr-ad-input:focus{outline:none; border-color:var(--brand)}
.qr-geo{margin-top:14px; text-align:center; font-size:12px; color:var(--ok); font-weight:600}

.qr-btn-primary{width:100%; padding:16px; border-radius:var(--radius-sm); background:var(--brand); color:var(--brand-ink); font-size:15.5px; font-weight:800}
.qr-btn-primary:active{transform:scale(.98); background:var(--brand-d); color:#fff}
.qr-btn-ghost{width:100%; padding:14px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:14px; font-weight:700; margin-top:10px}

/* Menü üst bar */
.qr-topbar{position:sticky; top:0; z-index:4; display:flex; align-items:center; padding:12px 14px; background:var(--surface); border-bottom:1px solid var(--line)}
.qr-topbar .qr-close{position:static; box-shadow:none; background:var(--surface-2)}
.qr-tb-mid{flex:1; text-align:center}
.qr-tb-brand{font-size:16px; font-weight:800}
.qr-tb-masa{font-size:11.5px; color:var(--ink-2)}

/* Kategori şeridi */
.qr-kat-row{position:sticky; top:60px; z-index:3; display:flex; gap:8px; padding:12px 14px; background:var(--surface); border-bottom:1px solid var(--line); overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none}
.qr-kat-row::-webkit-scrollbar{display:none}
.qr-kat{flex:none; padding:9px 16px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:13.5px; font-weight:700; white-space:nowrap}
.qr-kat.on{background:var(--cocoa); color:#fff}
.qr-servis-row{display:flex; gap:8px; padding:12px 14px 0}
.qr-servis{flex:1; padding:11px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:13.5px; font-weight:800; border:1.5px solid transparent}
.qr-servis.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}

/* Kategori ızgarası (2'li büyük kartlar) */
.qr-kat-baslik{font-size:20px; font-weight:800; padding:18px 18px 12px}
.qr-kat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 16px}
.qr-kat-kart{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow); text-align:left}
.qr-kat-kart:active{transform:scale(.97)}
.qkk-gorsel{aspect-ratio:4/3; display:grid; place-items:center}
.qkk-gorsel span{font-size:54px; opacity:.9}
.qkk-bilgi{padding:12px 14px}

.kpk-tutar{font-size:13.5px; font-weight:700}
.kpk-ode{padding:9px 16px; border-radius:99px; background:var(--ok); color:#fff; font-size:13px; font-weight:800}
.kasa-masa-paket{position:absolute; top:8px; right:8px; font-size:16px}
/* QR paket sepet bilgi */
.qr-paket-bilgi{background:#f3e8fa; color:#8e44ad; padding:12px 14px; border-radius:var(--radius); font-size:13.5px; font-weight:700; margin:14px 0 10px}

/* QR sepet kalem paketle toggle */
.qr-si-paketle{margin-top:8px; padding:6px 14px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:12px; font-weight:800; border:1.5px solid var(--line-2)}

/* Mutfak fiş */

/* Mutfak fiş listesi (tekrar yazdır) */

.kfk-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}

.kfk-urunler{font-size:13px; color:#c8ccd0; margin-bottom:4px}
.kfk-alt{font-size:11.5px; color:#8a9099}
/* Garson masa sepeti paneli */

.grs-sp-kisi{margin-bottom:12px}
.grs-sp-kbaslik{font-size:12.5px; font-weight:800; color:var(--ink-2); margin-bottom:8px}
.grs-sp-kisiler{display:flex; flex-wrap:wrap; gap:8px}
.grs-sp-kbtn{padding:8px 14px; border-radius:99px; background:var(--surface-2); color:var(--ink-2); font-size:13px; font-weight:700; border:1.5px solid var(--line-2)}
.grs-sp-kbtn.on{background:var(--brand); color:#1a1d21; border-color:var(--brand)}
.grs-sp-kbtn.yeni{background:none; border-style:dashed; color:var(--cocoa)}
.grs-sp-baslik{font-size:13px; font-weight:800; margin-bottom:8px}
.grs-sp-kalem{display:flex; justify-content:space-between; align-items:center; font-size:13.5px; padding:5px 0; border-bottom:1px solid var(--line)}
.grs-sp-sag{display:flex; align-items:center; gap:8px; font-weight:700}
.grs-sp-sil{width:22px; height:22px; border-radius:50%; background:var(--err-soft); color:var(--err); font-size:11px; font-weight:800}
.grs-sepet-bar{display:flex; gap:12px; align-items:center; margin-top:12px}
.grs-sepet-bar .grs-pb-bilgi{flex:1; font-size:15px; font-weight:800}
/* Kasa sepet kişi seçimi */
.ke-kisi{padding:12px 16px; background:var(--surface-2); border-radius:var(--radius-sm); margin-bottom:12px}
.ke-kisi-baslik{font-size:12.5px; font-weight:800; color:var(--ink-2); margin-bottom:8px}
.ke-kisi-row{display:flex; flex-wrap:wrap; gap:8px}
.ke-kbtn{padding:8px 14px; border-radius:99px; background:var(--surface); color:var(--ink-2); font-size:13px; font-weight:700; border:1.5px solid var(--line-2)}
.ke-kbtn.on{background:var(--brand); color:#1a1d21; border-color:var(--brand)}
.ke-kbtn.yeni{background:none; border-style:dashed; color:var(--cocoa)}
.ci-sil{width:22px; height:22px; border-radius:50%; background:var(--err-soft); color:var(--err); font-size:11px; font-weight:800; margin-left:6px}
/* Kasa masalar — iki kolon (sol masalar, sağ detay/ödeme) */
.kasa-masa-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px}
.kasa-masa-btn.secili{outline:2.5px solid var(--brand); outline-offset:1px}
.kasa-sag-panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); display:flex; flex-direction:column; overflow:hidden; height:100%}
.kasa-sag-bos{display:flex; align-items:center; justify-content:center; height:100%; min-height:340px; text-align:center; color:var(--ink-3)}
.ksb-emoji{font-size:44px; margin-bottom:12px}
.ksb-baslik{font-size:17px; font-weight:800; color:var(--ink-2); margin-bottom:6px}
.ksb-alt{font-size:13px; color:var(--ink-3); max-width:220px; line-height:1.5}
.kasa-detay-head{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line); background:var(--surface-2)}
.kdh-baslik{font-size:17px; font-weight:800}
.kdh-alt{font-size:12.5px; color:var(--ink-2); margin-top:2px}
.kasa-detay-kapat{width:34px; height:34px; border-radius:10px; background:var(--surface); color:var(--ink-2); font-size:15px; font-weight:800; border:1px solid var(--line)}

.kasa-sag-panel .kmd-foot{padding:14px 16px; border-top:1px solid var(--line); background:var(--surface-2)}
/* Garson paket sekmesi */
.grs-sekme-row{display:flex; gap:8px; padding:12px 16px 0}
.grs-sekme{flex:1; padding:11px; border-radius:var(--radius-sm); background:var(--surface-2); color:var(--ink-2); font-size:13.5px; font-weight:800; border:1.5px solid transparent}
.grs-sekme.on{background:var(--brand-soft); border-color:var(--brand); color:var(--brand-d)}
.grs-paket-bolum{padding:16px}
.grs-yeni-paket{width:100%; padding:14px; border-radius:var(--radius-sm); background:#8e44ad; color:#fff; font-size:14px; font-weight:800; margin-bottom:14px}
.grs-paket-list{display:flex; flex-direction:column; gap:10px}
.grs-paket-kart{background:var(--surface-2); border-radius:var(--radius); padding:13px 15px}
.grs-pk-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px}
.grs-pk-no{font-size:13.5px; font-weight:800}
.grs-pk-durum{font-size:12px; font-weight:800}
.grs-pk-urunler{font-size:13px; color:var(--ink-2); margin-bottom:4px}
.grs-pk-tutar{font-size:14px; font-weight:800; color:var(--brand-d)}
.grs-paket-bar{position:sticky; bottom:0; display:flex; gap:12px; align-items:center; padding:14px 16px; background:var(--surface); border-top:1px solid var(--line)}
.grs-pb-bilgi{flex:1; font-size:14px; font-weight:800}
.grs-pb-gonder{padding:13px 20px; border-radius:var(--radius-sm); background:#8e44ad; color:#fff; font-size:14px; font-weight:800}
.qr-kat-baslik-row{display:flex; justify-content:space-between; align-items:center; padding-right:16px}
.qr-siparislerim{padding:8px 14px; border-radius:99px; background:var(--cocoa-soft); color:var(--cocoa); font-size:12.5px; font-weight:800}

/* Müşteri bildirim banner'ı */
.qr-bildirim{position:fixed; top:-100px; left:50%; transform:translateX(-50%); z-index:200; display:flex; align-items:center; gap:12px; background:var(--ink); color:#fff; padding:14px 20px; border-radius:14px; box-shadow:var(--shadow-lg); max-width:90vw; transition:top .35s cubic-bezier(.2,.8,.2,1)}

.qb-metin{display:flex; flex-direction:column; font-size:13px; line-height:1.3}
.qb-metin strong{font-size:14.5px; margin-bottom:1px}

/* Takip ekranı */
.qr-takip-list{padding:16px; display:flex; flex-direction:column; gap:14px}

.qtk-ust{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
.qtk-no{font-size:13px; font-weight:800; color:var(--ink-2)}
.qtk-tutar{font-size:15px; font-weight:800; color:var(--brand-d)}
.qtk-urunler{font-size:13px; color:var(--ink-2); margin-bottom:16px; line-height:1.4}
.qtk-iptal{text-align:center; padding:12px; background:var(--danger-soft); color:var(--danger); border-radius:var(--radius-sm); font-weight:800; font-size:13.5px}

/* OTP doğrulama */
.od-otp{padding:8px 0}
.od-otp-bilgi{background:var(--cocoa-soft); color:var(--cocoa); padding:14px; border-radius:var(--radius); font-size:13px; line-height:1.5; font-weight:600}
.od-otp-not{font-size:12px; color:var(--ink-3); text-align:center; margin-top:10px}

/* OTP kanal seçimi (kayıt) */
.qr-kanal-baslik{font-size:13px; font-weight:700; color:var(--ink-2); margin:6px 0 10px; text-align:left}
.qr-kanal-row{display:flex; gap:10px; margin-bottom:16px}
.qr-kanal{flex:1; position:relative; display:flex; flex-direction:column; align-items:center; gap:5px; padding:14px 8px; border-radius:var(--radius); background:var(--surface-2); border:1.5px solid transparent}
.qr-kanal.on{background:var(--brand-soft); border-color:var(--brand)}
.qr-kanal.disabled{opacity:.5; cursor:not-allowed}
.qk-ic{font-size:26px}
.qk-ad{font-size:13px; font-weight:800}
.qk-yakinda{position:absolute; top:5px; right:5px; font-size:9px; font-weight:800; background:var(--ink-3); color:#fff; padding:2px 6px; border-radius:99px}

/* Ürün kartları (dikey · tam genişlik görsel üstte) */
.qr-menu-list{flex:1; padding:14px; display:flex; flex-direction:column; gap:18px}
.qr-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow)}
.qr-card.qr-out{opacity:.55}
.qr-img{width:100%; aspect-ratio:16/10; background-size:cover; background-position:center; display:block}
.qr-img-ph{display:grid; place-items:center}
.qr-card-body{display:flex; align-items:center; gap:12px; padding:14px 16px}
.qr-card-info{flex:1; min-width:0}
.qr-card-ad{font-weight:800; font-size:17px; line-height:1.25; margin-bottom:3px}
.qr-card-desc{font-size:12.5px; color:var(--ink-2); line-height:1.4; margin-bottom:7px}
.qr-card-fiyat{font-weight:800; font-size:18px; color:var(--brand-d)}
.qr-card-add{flex:none; width:46px; height:46px; border-radius:99px; background:var(--brand); color:var(--brand-ink); display:grid; place-items:center; font-size:28px; font-weight:700; box-shadow:var(--shadow)}
.qr-card-add:active{transform:scale(.92); background:var(--brand-d); color:#fff}
.qr-card-tukendi{flex:none; font-size:11.5px; font-weight:800; color:var(--danger); background:var(--danger-soft); padding:8px 13px; border-radius:9px}

/* Sepet bar (yüzen) */
.qr-sepet-bar{position:sticky; bottom:0; display:flex; align-items:center; gap:12px; margin:14px; padding:15px 18px; border-radius:var(--radius); background:var(--brand); color:var(--brand-ink); box-shadow:var(--shadow-lg)}
.qr-sb-n{width:26px; height:26px; border-radius:99px; background:var(--brand-ink); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:800}
.qr-sb-t{flex:1; font-weight:800; font-size:15px}
.qr-sb-f{font-weight:800; font-size:16px}

/* Sepet ekranı */
.qr-sepet-list{flex:1; padding:14px}
.qr-bos{text-align:center; padding:60px 20px; color:var(--ink-3); font-size:14px}
.qr-si{display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--line)}
.qr-si-info{flex:1}
.qr-si-ad{font-weight:700; font-size:15px}
.qr-si-secim{font-size:11.5px; color:var(--ink-2); margin-top:3px; line-height:1.4}
.qr-si-not{font-size:11.5px; color:var(--cocoa); margin-top:4px; font-style:italic}
.qr-si-sag{text-align:right}
.qr-si-fiyat{font-weight:800; font-size:15px; margin-bottom:8px}
.qr-si-adet{display:flex; align-items:center; gap:10px; background:var(--surface-2); border-radius:99px; padding:4px}
.qr-si-adet button{width:28px; height:28px; border-radius:99px; background:var(--surface); font-size:16px; font-weight:800; color:var(--ink)}
.qr-si-adet span{font-weight:800; min-width:18px; text-align:center}
.qr-sepet-foot{position:sticky; bottom:0; padding:16px 18px; background:var(--surface); border-top:1px solid var(--line)}
.qr-sf-toplam{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; font-size:15px}
.qr-sf-toplam strong{font-size:24px; font-weight:800}
.qr-sf-not{text-align:center; font-size:11.5px; color:var(--ink-3); margin-top:8px}

/* Onay ekranı */
.qr-onay{justify-content:center; align-items:center; padding:40px 24px}
.qr-onay-ic{text-align:center; width:100%}
.qr-onay-tik{width:80px; height:80px; margin:0 auto 18px; border-radius:99px; background:var(--ok); color:#fff; display:grid; place-items:center; font-size:42px; font-weight:800}
.qr-onay-baslik{font-size:23px; font-weight:800; margin-bottom:8px}
.qr-onay-alt{font-size:14.5px; color:var(--ink-2); line-height:1.6; margin-bottom:14px}
.qr-onay-masa{display:inline-block; padding:7px 15px; border-radius:99px; background:var(--surface-2); font-size:13px; font-weight:700; margin-bottom:24px}

/* Splash (açılış reklamı) */
.qr-splash{justify-content:flex-end; background:#111; position:relative; overflow:hidden}
.qr-splash-img{position:absolute; inset:0; background-size:cover; background-position:center}
.qr-splash-ph{display:grid; place-items:center; background:linear-gradient(160deg,#3a2418,#6b3f23 60%,#a8693a)}
.qr-splash-atla{position:absolute; top:16px; right:16px; z-index:3; padding:8px 16px; border-radius:99px; background:rgba(0,0,0,.5); backdrop-filter:blur(8px); color:#fff; font-size:13px; font-weight:700}
.qr-splash-alt{position:relative; z-index:2; padding:28px 24px 40px; background:linear-gradient(transparent,rgba(0,0,0,.85) 40%); color:#fff}
.qr-splash-rozet{display:inline-block; padding:5px 12px; border-radius:99px; background:var(--brand); color:var(--brand-ink); font-size:11px; font-weight:800; margin-bottom:12px}
.qr-splash-baslik{font-size:30px; font-weight:800; letter-spacing:-.5px; line-height:1.1; margin-bottom:8px}
.qr-splash-altyazi{font-size:15px; opacity:.85; margin-bottom:20px}
.qr-splash-bar{height:4px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden}
.qr-splash-bar-fill{height:100%; width:100%; background:var(--brand); border-radius:99px; transform-origin:left; animation:splashBar 3s linear forwards}
@keyframes splashBar{from{transform:scaleX(0)} to{transform:scaleX(1)}}

/* Sadakat karşılama/kayıt */
.qr-sadakat-ikon{font-size:48px; text-align:center; margin-bottom:8px}

/* Menü barı sadakat butonu */
.qr-tb-sadakat{width:auto; min-width:34px; height:34px; padding:0 11px; border-radius:99px; background:var(--cocoa-soft); color:var(--cocoa); font-size:15px; font-weight:800; display:flex; align-items:center; gap:4px}
.qr-tb-sadakat span{font-size:13px}

/* Damga şeridi */
.qr-damga-serit{padding:12px 16px; background:linear-gradient(135deg,var(--cocoa-soft),#f7ede4); border-bottom:1px solid var(--line)}
.qr-damga-ust{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12.5px}

.qr-os-bedava{font-size:13px; font-weight:700; color:var(--brand-d); line-height:1.4}
.qr-os-kalan{font-size:13px; color:var(--ink-2); font-weight:600}

/* ---------- Üye profili + adres defteri ---------- */
.qr-profil{padding:18px}
.qpr-ozet{display:flex; gap:12px; margin-bottom:12px}
.qpr-mag, .qpr-damga{flex:1; background:var(--brand-soft); border-radius:var(--radius); padding:18px; text-align:center}
.qpr-damga{background:var(--cocoa-soft)}
.qpr-mag-deger{font-size:30px; font-weight:800; color:var(--brand-d); line-height:1}

<script>
/* ============================================================
   1) FIRESTORE ŞEMASI (referans — gerçek init burada bağlanır)
   ------------------------------------------------------------
   Koleksiyon yapısı, override mantığı ve rol kapsamı aşağıda
   dokümante edildi. Faz 1'de bu şema ve kurallar Firebase'e
   taşınır; bu dosya arayüz iskeleti + mantık demosudur.
   ============================================================ */

const SCHEMA = {
  // --- MERKEZ (genel müdür yazar, herkes okur) ---

  "branches/{bId}/sessions/{sId}":  { masa:"", durum:"acik|kapali", acilis:"" },
  "branches/{bId}/orders/{oId}":    { sessionId:"", kisi_adi:"", kalemler:[], kanal:"pos|qr", durum:"mutfak|hazir", tutar:0, zaman:"" },

  "supply_orders/{oId}":            { bId:"", kalemler:[], durum:"", tutar:0 },
  "supply_ledger/{bId}":            { borc:0, alacak:0 },

/* ============================================================
   2) GÜVENLİK KURALLARI (firestore.rules — Faz 1)
   ------------------------------------------------------------
   Asıl güvenlik burada. Arayüz sadece kolaylık; veri erişimi
   sunucu kurallarıyla zorlanır. Aşağıdaki blok Firebase'e
   olduğu gibi yüklenir.
   ============================================================ */

const FIRESTORE_RULES = String.raw`
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    function user()    { return get(/databases/$(database)/documents/users/$(request.auth.uid)).data; }
    function rol()     { return user().rol; }
    function subem()   { return user().sube_id; }
    function genel()   { return rol() == 'genel_mudur'; }
    function mudur()   { return rol() == 'sube_muduru'; }
    function kasa()    { return rol() == 'kasa'; }
    function kendiSube(bId) { return subem() == bId; }
    function girisli() { return request.auth != null && user().aktif == true; }

    // --- MERKEZ TANIMLAR: sadece genel müdür yazar, herkes okur ---
    match /products/{p}    { allow read: if girisli(); allow write: if girisli() && genel(); }
    match /recipes/{r}     { allow read: if girisli(); allow write: if girisli() && genel(); } // REÇETE KİLİTLİ
    match /ingredients/{i} { allow read: if girisli(); allow write: if girisli() && genel(); }

    // --- KAMPANYA: genel müdür her şeyi; şube müdürü sadece kendi kapsamlı ---
    match /campaigns/{c} {
      allow read:  if girisli();
      allow write: if girisli() && (genel() ||
                     (mudur() && request.resource.data.kapsam == [subem()]));
    }

    // --- ŞUBE ALTI ---
    match /branches/{bId} {
      // Şube dokümanı: genel müdür yazar (yeni şube ekleme dahil), herkes okur
      allow read:  if girisli();
      allow write: if girisli() && genel();

      // Fiyat override: genel müdür veya o şubenin müdürü
      match /pricing/{pId} {
        allow read:  if girisli();
        allow write: if girisli() && (genel() || (mudur() && kendiSube(bId)));
      }
      // Satış/oturum: kasa + müdür kendi şubesinde yazar; genel müdür okur
      match /sessions/{sId} {
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId) && (kasa() || mudur());
      }
      match /orders/{oId} {
        allow read:   if girisli() && (genel() || kendiSube(bId));
        allow create: if girisli() && kendiSube(bId);          // kasa + QR
        allow update: if girisli() && kendiSube(bId);
        // SİLME yalnızca müdür — kayıt dışı satış kapısını kapatır, loglanır
        allow delete: if girisli() && kendiSube(bId) && (mudur() || genel());
      }
      match /stock/{ingId} {
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId);
      }
      match /customers/{cId} {  // şube bazlı sadakat
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId);
      }
      match /cashclose/{d} {
        allow read:  if girisli() && (genel() || kendiSube(bId));
        allow write: if girisli() && kendiSube(bId) && (mudur() || genel());
      }
    }

    // --- ORTAK DEFTER: şube kendi siparişini yazar, genel müdür hepsini görür ---
    match /supply_orders/{oId} {
      allow read:  if girisli();
      allow write: if girisli() && (genel() || (mudur() && request.resource.data.bId == subem()));
    }
    match /supply_ledger/{bId} {
      allow read:  if girisli() && (genel() || kendiSube(bId));
      allow write: if girisli() && genel();
    }

    // --- KULLANICILAR: sadece genel müdür yönetir ---
    match /users/{uid} {
      allow read:  if girisli() && (genel() || request.auth.uid == uid);
      allow write: if girisli() && genel();
    }
  }
}`;

/* ============================================================
   OPSİYON SEÇENEĞİ KAPATMA (otomatik stok + manuel)
   - Manuel: kasa/müdür "ürün:grup:seçenek" anahtarıyla kapatır
   - Otomatik: seçeneğin reçetesindeki hammadde stoğu yetmiyorsa
   Kapalı seçenek seçilemez; gruptaki diğerleriyle devam edilir.
   Gerçekte branches/{b}/option_overrides koleksiyonunda tutulur.
   ============================================================ */
let OPTION_CLOSED = {};   // { "Minipan (14 Adet)|3|5": true }
let FORCE_OPEN = {};      // müdür stok 0 iken zorla açtı → stok eksiye düşebilir
let FORCE_LOG = [];       // { urun, secenek, kim, zaman } denetim kaydı

function optKey(urun, gi, si){ return urun+"|"+gi+"|"+si; }

/* Seçenek stok açısından yapılabilir mi? (reçetedeki her hammadde yeterli mi) */
function secenekStokYeterli(sec){
  if(!sec.recete || !sec.recete.length) return true;
  return sec.recete.every(r=> !STOCK[r.ing] || STOCK[r.ing].mevcut >= r.g);
}

/* Seçenek kapalı mı? (manuel VEYA otomatik stok)
   Müdür force-open yaptıysa stok kapatması geçersiz olur. */
function secenekKapali(urun, gi, si, sec){
  const k = optKey(urun,gi,si);
  if(OPTION_CLOSED[k]) return "manuel";
  if(FORCE_OPEN[k]) return false;              // müdür zorla açtı
  if(!secenekStokYeterli(sec)) return "stok";
  return false;
}

/* Manuel aç/kapa — kasa + müdür yetkili */
function toggleSecenekKapat(urun, gi, si){
  const k = optKey(urun,gi,si);
  if(OPTION_CLOSED[k]) delete OPTION_CLOSED[k];
  else OPTION_CLOSED[k]=true;
  renderOptionModal();
}

/* Stok 0 seçeneği zorla aç — SADECE MÜDÜR/GENEL · stok eksiye düşebilir · loglanır */
function forceOpenSecenek(urun, gi, si){
  if(state.role!=="mudur" && state.role!=="genel") return;  // yetki kontrolü
  const k = optKey(urun,gi,si);
  if(FORCE_OPEN[k]){
    delete FORCE_OPEN[k];                       // geri al
  } else {
    FORCE_OPEN[k]=true;
    const sec = PRODUCT_OPTIONS[urun][gi].secenekler[si];
    FORCE_LOG.push({urun, secenek:sec.ad, kim:ROLES[state.role].ad, zaman:new Date().toLocaleTimeString('tr')});
    note("⚠ "+sec.ad+" zorla açıldı — stok eksiye düşebilir (loglandı)");
  }
  renderOptionModal();
}

/* Stok kapatma modu aç/kapa (kasa + müdür) */
function toggleKapatMod(){
  OPT_STATE.kapatMod = !OPT_STATE.kapatMod;
  renderOptionModal();
}

/* Ürün satılabilir mi? Manuel pasif DEĞİL + reçetedeki her hammadde yeterli */
function urunSatilabilir(p){
  if(!p.aktif) return false;
  const recipe = RECIPES[p.ad];
  if(!recipe) return true;
  return recipe.every(r=> !STOCK[r.ing] || STOCK[r.ing].mevcut >= r.g);
}
function addToCart(idx){
  const p = DEMO_PRODUCTS[idx];
  const opts = PRODUCT_OPTIONS[p.ad];
  if(opts && opts.length){
    openOptionModal(idx);          // opsiyonlu ürün → modal aç
  } else if(state.kasaPaket){
    // kasa paket sepetine ekle
    state.kasaPaket.sepet.push({ad:p.ad, fiyat:p.fiyat, secimler:[]});
    note(p.ad+" → 🥡 Paket sepeti");
    go("satis");
  } else if(state.kasaEkle){
    // kasa masa sepetine ekle (geçici, gönderince tek fiş)
    if(!state.kasaEkle.sepet) state.kasaEkle.sepet=[];
    state.kasaEkle.sepet.push({ad:p.ad, fiyat:p.fiyat, secimler:[], paket:false});
    note(p.ad+" → sepet ("+state.kasaEkle.kisi+")");
    go("satis");
  } else {
    // opsiyonsuz ürün → direkt adisyona
    state.cart.push({ad:p.ad, fiyat:p.fiyat, q:1, secimler:[], ekstraRecete:[]});
    go("satis");
  }
}

/* ============================================================
   OPSİYON SEÇİM MODALI (POS + QR ortak mantık)
   Zorunlu alanlar seçilmeden "Ekle" pasif.
   Fiyat toplanır + seçimlerin reçeteleri ürüne iliştirilir.
   ============================================================ */
let OPT_STATE = null;
function openOptionModal(idx){
  const p = DEMO_PRODUCTS[idx];
  OPT_STATE = { idx:idx, p:p, secim:{}, not:"" };
  // varsayılan: zorunlu_tekli ilk seçeneği seçili başlat
  PRODUCT_OPTIONS[p.ad].forEach((grup,gi)=>{
    if(grup.tip==="zorunlu_tekli") OPT_STATE.secim[gi]=[0];
    else OPT_STATE.secim[gi]=[];
  });
  renderOptionModal();
  document.getElementById("optModal").classList.add("on");
}
function closeOpt(){ document.getElementById("optModal").classList.remove("on"); OPT_STATE=null; }

function toggleOpt(gi, si){
  const grup = PRODUCT_OPTIONS[OPT_STATE.p.ad][gi];
  const sel = OPT_STATE.secim[gi];
  const sec = grup.secenekler[si];

  // Kapalı seçenek seçilemez (manuel veya stok) — İstemiyorum hariç
  if(!sec.istemiyorum && secenekKapali(OPT_STATE.p.ad, gi, si, sec)) return;

  if(grup.tip==="zorunlu_tekli"){
    OPT_STATE.secim[gi]=[si];                       // tek seçim
    renderOptionModal(); return;
  }

  // "İstemiyorum" seçilince diğer tüm seçimler temizlenir
  if(sec.istemiyorum){
    OPT_STATE.secim[gi] = (sel.length===1 && sel[0]===si) ? [] : [si];
    renderOptionModal(); return;
  }

  // Normal çoklu (en fazla max)
  const i = sel.indexOf(si);
  if(i>=0){
    sel.splice(i,1);                                // seçili → kaldır
  } else {
    // "İstemiyorum" seçiliyse onu kaldır
    const istIdx = grup.secenekler.findIndex(s=>s.istemiyorum);
    const istPos = sel.indexOf(istIdx);
    if(istPos>=0) sel.splice(istPos,1);
    if(sel.length < (grup.max||99)) sel.push(si);   // max sınırı
  }
  renderOptionModal();
}

/* Zorunlu kurallar sağlandı mı? (Ekle butonu için)
   - zorunlu_tekli: tam 1 seçili olmalı
   - coklu: max'ı aşmasın (en az 0 olabilir — İstemiyorum kalıbı) */
function optGecerli(){
  const gruplar = PRODUCT_OPTIONS[OPT_STATE.p.ad];
  const urun = OPT_STATE.p.ad;
  return gruplar.every((grup,gi)=>{
    const sel = OPT_STATE.secim[gi];
    // seçili bir seçenek kapandıysa geçersiz (kullanıcı tekrar seçmeli)
    const kapaliSecili = sel.some(si=>{
      const sec=grup.secenekler[si];
      return !sec.istemiyorum && secenekKapali(urun,gi,si,sec);
    });
    if(kapaliSecili) return false;
    const n = sel.length;
    if(grup.tip==="zorunlu_tekli") return n===1;
    if(grup.tip==="coklu") return n <= (grup.max||99);
    return true;
  });
}

/* Seçili opsiyonların toplam ek fiyatı */
function optEkFiyat(){
  let ek=0;
  PRODUCT_OPTIONS[OPT_STATE.p.ad].forEach((grup,gi)=>{
    OPT_STATE.secim[gi].forEach(si=>{ ek += (grup.secenekler[si].fiyat||0); });
  });
  return ek;
}

function renderOptionModal(){
  const p = OPT_STATE.p;
  const gruplar = PRODUCT_OPTIONS[p.ad];
  let html = '<div class="opt-head"><span class="opt-emoji">'+p.emoji+'</span>'+
    '<div><div class="opt-name">'+p.ad+'</div><div class="opt-base">'+p.fiyat+' ₺ taban</div></div>'+
    '<button class="opt-kapat-mod'+(OPT_STATE.kapatMod?' on':'')+'" onclick="toggleKapatMod()" title="Seçenek kapat/aç">'+
    (OPT_STATE.kapatMod?'✓ Düzenleniyor':'⚙ Stok')+'</button>'+
    '<button class="opt-x" onclick="closeOpt()">✕</button></div>'+
    (OPT_STATE.kapatMod?'<div class="kapat-bilgi">Tükenen malzemeyi kapat — müşteri kalan seçeneklerle devam eder. Tekrar dokun: aç.</div>':'')+
    '<div class="opt-body">';
  gruplar.forEach((grup,gi)=>{
    const sel = OPT_STATE.secim[gi];
    let etiket="";
    if(grup.tip==="zorunlu_tekli") etiket='<span class="og-tip og-zor">Zorunlu</span>';
    else etiket='<span class="og-tip og-coklu">En fazla '+grup.max+'</span>';
    const sayac = grup.tip==="coklu" ? '<span class="og-sayac">'+sel.length+'/'+grup.max+'</span>' : '';
    html += '<div class="opt-grup"><div class="opt-grup-h"><span class="og-ad">'+grup.ad+'</span>'+
            '<span class="og-meta">'+sayac+etiket+'</span></div><div class="opt-secenekler">';
    grup.secenekler.forEach((sec,si)=>{
      const secili = sel.indexOf(si)>=0;
      const fiyatTxt = sec.fiyat ? '+'+sec.fiyat+' ₺' : '';
      const tekli = grup.tip==="zorunlu_tekli";
      const ist = sec.istemiyorum ? ' opt-ist' : '';
      const kapali = sec.istemiyorum ? false : secenekKapali(p.ad, gi, si, sec);
      // max dolu ve bu seçili değilse soluk göster
      const dolu = grup.tip==="coklu" && !secili && !sec.istemiyorum && sel.length>=grup.max;

      if(OPT_STATE.kapatMod && !sec.istemiyorum){
        // KAPATMA MODU: her seçenek aç/kapa satırı
        const manuelKapali = OPTION_CLOSED[optKey(p.ad,gi,si)];
        const stokKapali = !secenekStokYeterli(sec);
        const forceAcik = FORCE_OPEN[optKey(p.ad,gi,si)];
        const mudurMu = state.role==="mudur" || state.role==="genel";
        // Stok 0 ve müdürse: "yine de aç" düğmesi
        let forceBtn = '';
        if(stokKapali && mudurMu && !manuelKapali){
          forceBtn = '<span class="force-btn'+(forceAcik?' on':'')+'" onclick="event.stopPropagation();forceOpenSecenek(\''+p.ad.replace(/'/g,"\\'")+'\','+gi+','+si+')">'+
                     (forceAcik?'✓ açık (eksiye düşer)':'yine de aç')+'</span>';
        }
        html += '<button class="opt-sec opt-kapat-row'+(manuelKapali?' kapali':'')+'" onclick="toggleSecenekKapat(\''+p.ad.replace(/'/g,"\\'")+'\','+gi+','+si+')">'+
                '<span class="kapat-tgl">'+(manuelKapali?'✕':'●')+'</span>'+
                '<span class="os-ad">'+sec.ad+'</span>'+
                (stokKapali&&!forceAcik?'<span class="kapat-etiket stok">stok 0</span>':'')+
                (forceAcik?'<span class="kapat-etiket force">zorla açık</span>':'')+
                (manuelKapali?'<span class="kapat-etiket">kapalı</span>':'')+
                forceBtn+'</button>';
      } else {
        // NORMAL MOD: kapalıysa soluk + seçilemez
        const kapaliCls = kapali ? ' opt-kapali' : '';
        const kapaliEt = kapali==='stok' ? '<span class="kapat-etiket stok">tükendi</span>'
                       : kapali==='manuel' ? '<span class="kapat-etiket">bugün yok</span>' : '';
        html += '<button class="opt-sec'+(secili?' on':'')+ist+(dolu?' opt-disabled':'')+kapaliCls+'" onclick="toggleOpt('+gi+','+si+')">'+
                '<span class="os-mark '+(tekli?'radio':'check')+'">'+(secili?(tekli?'●':'✓'):'')+'</span>'+
                '<span class="os-ad">'+sec.ad+'</span>'+
                kapaliEt+
                (fiyatTxt?'<span class="os-fiyat">'+fiyatTxt+'</span>':'')+'</button>';
      }
    });
    html += '</div></div>';
  });
  // ürün notu
  html += '<div class="opt-grup"><div class="opt-grup-h"><span class="og-ad">Not</span></div>'+
          '<textarea class="opt-not" placeholder="Bu ürünle ilgili notunu buradan iletebilirsin." '+
          'oninput="OPT_STATE.not=this.value">'+(OPT_STATE.not||'')+'</textarea></div>';
  html += '</div>';
  const gecerli = optGecerli();
  const toplam = p.fiyat + optEkFiyat();
  html += '<div class="opt-foot">'+
    '<div class="opt-toplam"><div class="ot-l">Toplam</div><div class="ot-v">'+toplam+' ₺</div></div>'+
    '<button class="btn btn-primary" '+(gecerli?'':'disabled style="opacity:.4;pointer-events:none"')+' onclick="confirmOpt()">'+
    (gecerli?'Sepete ekle':'Zorunlu alanı seç')+'</button></div>';
  const inner = document.getElementById("optModalInner");
  // scroll pozisyonunu koru (innerHTML değişince başa zıplamasın)
  const body = inner.querySelector(".opt-body");
  const scrollY = body ? body.scrollTop : 0;
  inner.innerHTML = html;
  const yeniBody = inner.querySelector(".opt-body");
  if(yeniBody && scrollY) yeniBody.scrollTop = scrollY;
}

/* Seçim onaylandı: fiyat + reçete ile sepete ekle */
function confirmOpt(){
  if(!optGecerli()) return;
  const p = OPT_STATE.p;
  const gruplar = PRODUCT_OPTIONS[p.ad];
  const secimler=[]; const ekstraRecete=[]; let ekFiyat=0;
  gruplar.forEach((grup,gi)=>{
    OPT_STATE.secim[gi].forEach(si=>{
      const sec=grup.secenekler[si];
      if(!sec.istemiyorum) secimler.push(sec.ad);   // "İstemiyorum" etikete yazılmaz
      ekFiyat += (sec.fiyat||0);
      if(sec.recete) sec.recete.forEach(r=>{ if(r.g>0) ekstraRecete.push(r); });
    });
  });
  const yeniKalem = {
    ad:p.ad, fiyat:p.fiyat+ekFiyat, q:1,
    secimler:secimler, ekstraRecete:ekstraRecete, not:OPT_STATE.not||""
  };
  if(OPT_STATE.qr){
    // QR menüden eklendi → müşteri sepetine
    QR.sepet.push(yeniKalem);
    closeOpt();
    note(p.ad+" eklendi");
    renderQR();
  } else if(OPT_STATE.garson){
    if(GARSON.paketModu){
      // garson paket sepetine ekle
      if(!GARSON.paketSepet) GARSON.paketSepet=[];
      GARSON.paketSepet.push({ad:yeniKalem.ad, fiyat:yeniKalem.fiyat, secimler:yeniKalem.secimler});
      closeOpt();
      note(p.ad+" → Paket sepeti");
      renderGarson();
    } else {
      // Garson masa sepetine ekle (geçici, gönderince fiş)
      if(!GARSON.masaSepet) GARSON.masaSepet=[];
      GARSON.masaSepet.push({ad:yeniKalem.ad, fiyat:yeniKalem.fiyat, secimler:yeniKalem.secimler, paket:false});
      closeOpt();
      note(p.ad+" → sepet");
      GARSON.view="menu"; renderGarson();
    }
  } else if(state.kasaPaket){
    // Kasa paket sepetine ekle
    state.kasaPaket.sepet.push({ad:yeniKalem.ad, fiyat:yeniKalem.fiyat, secimler:yeniKalem.secimler});
    closeOpt();
    note(p.ad+" → 🥡 Paket sepeti");
    go("satis");
  } else if(state.kasaEkle){
    // kasa masa sepetine ekle (geçici)
    if(!state.kasaEkle.sepet) state.kasaEkle.sepet=[];
    state.kasaEkle.sepet.push({ad:yeniKalem.ad, fiyat:yeniKalem.fiyat, secimler:yeniKalem.secimler, paket:false});
    closeOpt();
    note(p.ad+" → sepet ("+state.kasaEkle.kisi+")");
    go("satis");
  } else {
    // POS'tan eklendi → adisyona
    state.cart.push(yeniKalem);
    closeOpt();
    go("satis");
  }
}

/* ============================================================
   HESAP BÖLME — öğrenci senaryosu
   4 mod: eşit · kişiye göre · ürüne göre · kesir (yarı-yarı)
   Ödeme bölünür ama reçete/tüketim ETKİLENMEZ (adet sabit).
   ============================================================ */
let BOL = null;

function hesapBolAc(total){
  if(total===0){ note("Adisyon boş"); return; }
  // Daha önce bölme başlatıldıysa kaldığı yerden devam et
  if(state.bolDurum && state.bolDurum.total===total){
    BOL = state.bolDurum;
  } else {
    BOL = {
      total: total,

  renderBol();

}

/* Ödememiş kişi sayısı */
function odenmemisSayisi(){
  return BOL.kisiler.filter((_,ki)=>!BOL.odenenler[ki]).length;
}

/* Tek kişi kalanın tümünü ödesin (toggle) */
function bolTumunuAl(ki){
  if(BOL.tekKisiKalan===ki) BOL.tekKisiKalan=undefined;  // geri al → moda dön
  else BOL.tekKisiKalan=ki;
  renderBol();
}

/* Kişi ekle/çıkar/adlandır */
function bolKisiEkle(){
  if(Object.keys(BOL.odenenler).length>0){ note("Ödeme başladı — kişi değiştirilemez"); return; }
  if(BOL.kisiler.length>=10){ note("En fazla 10 kişi"); return; }
  BOL.kisiler.push("Kişi "+(BOL.kisiler.length+1));
  renderBol();
}
function bolKisiCikar(ki){
  if(Object.keys(BOL.odenenler).length>0){ note("Ödeme başladı — kişi değiştirilemez"); return; }
  if(BOL.kisiler.length<=1){ note("En az 1 kişi olmalı"); return; }
  BOL.kisiler.splice(ki,1);
  // o kişinin ödemesi ve ürün atamalarını temizle
  delete BOL.odenenler[ki];
  BOL.odenenler = Object.fromEntries(Object.entries(BOL.odenenler).map(([k,v])=>[+k>ki?+k-1:+k,v]).filter(([k])=>k!==ki));
  BOL.atama.forEach(at=>{ delete at[ki]; });
  renderBol();
}
function bolKisiAdla(ki, ad){
  BOL.kisiler[ki] = ad || ("Kişi "+(ki+1));
}

/* Kişi başına düşen tutarları hesapla (moda göre)
   ÖNEMLİ: Ödenmiş kişilerin payı SABİT (ödediği tutar).
   Kalan tutar yalnızca ÖDEMEMİŞ kişiler arasında bölünür. */
function bolHesapla(){
  const n = BOL.kisiler.length;
  const paylar = BOL.kisiler.map(()=>0);

  // Ödenmiş kişiler → ödedikleri tutarı sabitle
  let odenenToplam = 0;
  const odemeyenler = [];
  BOL.kisiler.forEach((_,ki)=>{
    if(BOL.odenenler[ki]){
      paylar[ki] = BOL.odenenler[ki].tutar;
      odenenToplam += BOL.odenenler[ki].tutar;
    } else {
      odemeyenler.push(ki);
    }
  });
  const kalan = +(BOL.total - odenenToplam).toFixed(2);
  const m = odemeyenler.length;   // ödememiş kişi sayısı
  if(m===0) return paylar;        // herkes ödedi

  // "Tek kişi tüm kalanı" override
  if(BOL.tekKisiKalan!==undefined && odemeyenler.includes(BOL.tekKisiKalan)){
    odemeyenler.forEach(ki=>{ paylar[ki] = (ki===BOL.tekKisiKalan) ? kalan : 0; });
    return paylar;
  }

  if(BOL.mod==="esit" || BOL.mod==="kisi"){
    // kalanı ödememiş kişilere eşit böl (kişi modu da kalan-bazlıda eşit gibi davranır)
    const pay = Math.floor(kalan/m*100)/100;
    odemeyenler.forEach(ki=>paylar[ki]=pay);
    const fark = +(kalan - pay*m).toFixed(2);
    if(fark>0) paylar[odemeyenler[m-1]] = +(paylar[odemeyenler[m-1]]+fark).toFixed(2);
    return paylar;
  }
  if(BOL.mod==="urun" || BOL.mod==="kesir"){
    // ürün ataması olan kalan kişilere oranla; atanmamış kalan eşit
    let atanmamis = kalan;
    state.cart.forEach((c,ci)=>{
      const at = BOL.atama[ci];
      const tutar = c.fiyat*c.q;
      const kisiler = Object.keys(at).map(Number).filter(k=>odemeyenler.includes(k));
      if(kisiler.length>0){
        const toplamOran = kisiler.reduce((s,k)=>s+at[k],0);
        kisiler.forEach(k=>{ paylar[k] += tutar*(at[k]/toplamOran); });
        atanmamis -= tutar;
      }
    });
    // atanmamış kalanı ödememiş kişilere eşit dağıt
    if(atanmamis>0.01){
      const pay = atanmamis/m;
      odemeyenler.forEach(ki=>paylar[ki]+=pay);
    }
    return paylar;
  }
  return paylar;
}

/* Ürünü bir kişiye ata (ürün modu: tek kişi · kesir modu: birden çok, oranlı) */
function bolAta(ci, ki){
  const at = BOL.atama[ci];
  if(BOL.mod==="urun"){
    BOL.atama[ci] = (at[ki]!==undefined) ? {} : {[ki]:1};   // tek kişi, toggle
  } else { // kesir
    if(at[ki]!==undefined) delete at[ki];
    else at[ki]=1;                                          // eşit pay (yarı-yarı)
  }
  renderBol();
}

/* Ödenecek tutara göre kazanılacak Mag (oran + ürün bonusu) */
function odKazanilacakMag(tutar, ki){
  let mag = Math.round(tutar * SADAKAT.kazancOrani);
  // ürün bonusu: bu kişiye atanan ürünlerden (kesir/ürün modunda) veya tüm sepetten
  // basitlik: sepetteki ürün bonuslarını toplam paya oranla — burada sadece oran + sabit bonusları ekle
  state.cart.forEach(c=>{
    if(SADAKAT.urunBonus[c.ad]){
      // eşit/kişi modunda herkese değil; demo: bonusu hesabı ödeyene ekle (ilk ödeyen)
      // gerçekte ürün kime aitse ona — şimdilik oransal
    }
  });
  return mag;
}

/* Mag bozdurma ayarla */
function odMagAyarla(d){
  const ob = BOL.odemeBekleyen;
  const maxBoz = Math.min(ob.musteri.mag, Math.floor(ob.tutar/SADAKAT.bozdurmaKuru));
  ob.kullanilanMag = Math.max(0, Math.min(maxBoz, ob.kullanilanMag + d));
  renderOdemeYontem();
}
function odMagMax(){
  const ob = BOL.odemeBekleyen;
  ob.kullanilanMag = Math.min(ob.musteri.mag, Math.floor(ob.tutar/SADAKAT.bozdurmaKuru));
  renderOdemeYontem();
}
