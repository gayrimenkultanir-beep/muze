<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Külliye Dijital Rehber</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- OVERLAY -->
<div id="ol"></div>

<!-- ================= INTRO ================= -->
<section id="intro" class="screen active">
  <div class="wrap">
    <h1>SULTAN II. BAYEZİD KÜLLİYESİ</h1>
    <p>Dijital Gezi Deneyimi</p>

    <button data-action="startTour">YOLCULUĞA BAŞLA</button>
    <button data-action="goToBook">Gönül Köprüsü</button>
    <button data-action="goToAdmin">Admin</button>
  </div>
</section>

<!-- ================= TOUR ================= -->
<section id="tour" class="screen">

  <!-- HEADER -->
  <header class="hdr">
    <div id="hTit">DURAK 1</div>

    <div class="progress">
      <div id="pf"></div>
    </div>

    <div class="pinfo">
      <span id="ppct">%0</span>
      <span id="peta"></span>
    </div>

    <button id="abtn" data-action="togAudio">🔊</button>
    <div id="aind"></div>
  </header>

  <!-- CONTENT -->
  <main id="tb"></main>

  <!-- NAV -->
  <div class="nav">
    <button id="bbk" data-action="prevStop">← Geri</button>
    <button id="bnxt" data-action="nextStop">İleri →</button>
  </div>

  <!-- TIMELINE -->
  <div id="tls" class="timeline"></div>

</section>

<!-- ================= BOOK ================= -->
<section id="book" class="screen">
  <div class="wrap">

    <h2>GÖNÜL KÖPRÜSÜ</h2>

    <input id="bkn" placeholder="Ad Soyad">
    <input id="bkc" placeholder="Şehir">
    <textarea id="bkno" placeholder="Notunuz"></textarea>

    <button data-action="saveNote">Gönder</button>

    <div id="nl"></div>
    <div id="npg"></div>

    <button data-action="goToIntro">← Geri</button>

  </div>
</section>

<!-- ================= ADMIN ================= -->
<section id="admin" class="screen">

  <!-- LOGIN -->
  <div id="alg" class="wrap">
    <h2>Admin Giriş</h2>
    <input id="ap" type="password" placeholder="Şifre">
    <button data-action="doLog">Giriş</button>
    <p id="aerr" style="display:none;color:red;">Hatalı şifre</p>
  </div>

  <!-- PANEL -->
  <div id="acon" class="wrap">

    <h2>İstatistik</h2>

    <div class="stats">
      <div>Canlı: <span id="slv"></span></div>
      <div>Bugün: <span id="std"></span></div>
      <div>Hafta: <span id="swk"></span></div>
      <div>Not: <span id="snt"></span></div>
    </div>

    <div id="dch" class="chart"></div>
    <div id="dlb" class="labels"></div>

    <div id="sht"></div>
    <div id="cit"></div>

    <button data-action="doOut">Çıkış</button>

  </div>

</section>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
